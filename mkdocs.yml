site_name: ClawEnvKit
site_description: Open-source harnessing toolkit for claw-like agents — auto-generate training environments, evaluate with reliable verification.
site_url: https://clawenvkit.readthedocs.io/
repo_url: https://github.com/xirui-li/ClawEnvKit
repo_name: xirui-li/ClawEnvKit

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Concepts:
    - System Design: design.md
    - Task Specification: task-spec.md
    - Mock Services: services.md
    - Scoring & Grading: scoring.md
  - Guides:
    - Task Generation: generation.md
    - Compatibility Gate: compatibility-gate.md
    - File Tasks & Multimodal: file-task-support.md
  - Agents:
    - Overview: agents/index.md
    - OpenClaw (Native Plugin): agents/openclaw.md
    - Other Frameworks: agents/others.md
  - Reference:
    - Backbone Models: models.md
    - CLI: cli.md
    - Python API: api.md
  - Contributing:
    - Adding Mock Services: contributing/services.md
    - Adding Agent Frameworks: contributing/agents.md
  - Experiments: experiments.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true
