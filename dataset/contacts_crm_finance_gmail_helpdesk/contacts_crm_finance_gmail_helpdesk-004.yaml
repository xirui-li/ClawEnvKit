tools:
- description: List CRM customers, optionally filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information about a specific customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
- description: Search the internal contacts directory by name, department, or keyword
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full details for a specific contact by ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send an internal message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: Send an email via Gmail
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
