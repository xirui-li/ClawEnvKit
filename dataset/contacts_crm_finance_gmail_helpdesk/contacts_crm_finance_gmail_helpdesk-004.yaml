- check:
    rubric: "Evaluate the agent's churn risk review output on the following dimensions:\n\
      1. CUSTOMER IDENTIFICATION (0–0.25): Did the agent correctly identify all four\
      \ at-risk or churned customers?\n   The correct customers are: Pinnacle Logistics\
      \ (cust-101, at-risk), Greenfield Media (cust-102, churned),\n   Apex Retail\
      \ Group (cust-103, at-risk), and Harborview Healthcare (cust-105, churned).\n\
      \   Score 0.25 if all four are named, 0.15 if three, 0.05 if fewer.\n\n2. ACCOUNT\
      \ MANAGER OUTREACH (0–0.35): Did the agent find account managers in the contacts\
      \ directory\n   (e.g., Rachel Torres, Derek Huang, Simone Okafor) and send them\
      \ internal messages about the at-risk/churned\n   customers? Score 0.35 if messages\
      \ were sent to at least two account managers with relevant customer context,\n\
      \   0.20 if only one message was sent, 0.0 if no messages were sent.\n\n3. CRM\
      \ EXPORT REPORT (0–0.25): Did the agent export a CRM report that includes the\
      \ at-risk and churned\n   customer IDs (cust-101, cust-102, cust-103, cust-105)\
      \ and a meaningful summary for leadership?\n   Score 0.25 if the export includes\
      \ all four customers and a coherent summary, 0.15 if partial,\n   0.0 if no\
      \ export was performed.\n\n4. CLARITY AND PROFESSIONALISM (0–0.15): Is the agent's\
      \ final output well-organized, clearly summarizing\n   what was done, which\
      \ customers were flagged, which contacts were notified, and what was exported?\n\
      \   Score 0.15 for a clear and professional summary, 0.05 for a partial or disorganized\
      \ response.\n\nTotal score = sum of dimension scores (max 1.0).\n"
    type: llm_judge
  name: churn_review_quality
  weight: 0.4
