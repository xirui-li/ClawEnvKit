prompt: 'We need to do a quarterly churn risk review. Pull the list of all customers
  and identify any who are at-risk or churned. For each at-risk or churned customer,
  find the responsible account manager in the contacts directory and send them a brief
  heads-up message about the customer''s status. Finally, export a CRM report summarizing
  the at-risk and churned customers so leadership can review it.

  '
reference_solution:
- Call list_customers (no filter, or filter by status=at-risk and status=churned in
  separate calls) to retrieve all customers.
- Identify the four at-risk or churned customers: Pinnacle Logistics (cust-101), Greenfield
    Media (cust-102), Apex Retail Group (cust-103), Harborview Healthcare (cust-105).
- Call search_contacts with department=Account Management to find internal account
  managers (Rachel Torres, Derek Huang, Simone Okafor).
- Call send_message for at least two account managers, informing them of the at-risk
  or churned customers they should follow up on.
- Call export_report with a title such as "Q4 Churn Risk Review", including customer_ids
  [cust-101, cust-102, cust-103, cust-105] and a summary describing the churn risk
  situation.
- Provide a final text summary listing the flagged customers, the account managers
  notified, and confirmation that the CRM report was exported.
