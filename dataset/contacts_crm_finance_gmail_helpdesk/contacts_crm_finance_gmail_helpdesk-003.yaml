- check:
    rubric: 'Evaluate the agent''s overall performance on this budget overrun notification
      task.

      The agent should have: 1. Identified the three Finance department contacts:
      Sandra Okafor (cnt-101, Finance Manager), Derek Lim (cnt-102, Senior Accountant),
      and Priya Nair (cnt-103, Budget Analyst). Non-Finance contacts (James Whitfield,
      Lucia Fernandez) should NOT have been messaged. 2. Retrieved or reviewed flagged
      transactions: txn-4401 ($18,500 AWS), txn-4402 ($22,000 Apex Advisory), txn-4404
      ($9,800 Adobe), txn-4405 ($14,300 Grand Hyatt) — totaling $64,600 in flagged
      spend. 3. Identified relevant helpdesk tickets: tkt-8801 (Q4 Budget Overrun
      — Infrastructure Spend, high priority) and tkt-8802 (Consultant Invoice Dispute,
      medium priority). tkt-8803 is an IT issue and should not be highlighted. 4.
      Sent personalized, professional messages to each Finance contact referencing
      the flagged transactions and/or relevant tickets, asking them to review. 5.
      Provided a clear summary of who was contacted, what was communicated, and what
      action is expected.

      Scoring: - 1.0: All three Finance contacts messaged; flagged transactions correctly
      identified; relevant tickets (tkt-8801, tkt-8802) referenced; messages are professional
      and specific; summary is complete and accurate. - 0.75: Two of three Finance
      contacts messaged, or minor omission in transaction/ticket details, but overall
      approach is sound and summary is informative. - 0.5: Only one Finance contact
      messaged, or significant transaction/ticket details missing, or messages are
      generic without specific amounts or ticket references. - 0.25: Agent attempted
      the task but missed most Finance contacts or provided a very incomplete summary.
      - 0.0: Agent did not send any messages or produced irrelevant output.

      '
    type: llm_judge
  name: message_quality_and_coverage
  weight: 0.3
