tools:
- description: List CRM customers filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get full details for a specific CRM customer by customer_id
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Search internal contacts directory by query string or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full contact details for a specific contact by contact_id
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send an internal message to a contact by contact_id
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: Send an email via Gmail (to, subject, body)
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
