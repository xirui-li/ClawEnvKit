- check:
    rubric: "Evaluate the agent's overall performance on this enterprise onboarding\
      \ outreach task. Score on four dimensions:\n1. CUSTOMER IDENTIFICATION (0–0.25):\
      \ Did the agent correctly identify only the active enterprise\n   customers\
      \ — Meridian Logistics Group (cust-101), Apex Financial Partners (cust-102),\
      \ and\n   Verdant Health Systems (cust-103)? It should have excluded Stonebridge\
      \ Retail Co. (mid-market)\n   and Nova Tech Innovations (prospect). Full credit\
      \ if all three correct customers identified and\n   non-qualifying customers\
      \ excluded.\n\n2. CONTACT RETRIEVAL (0–0.25): Did the agent find and retrieve\
      \ details for relevant enterprise\n   account managers — specifically Sandra\
      \ Okafor (contact-301), Derek Huang (contact-302), and/or\n   Priya Nambiar\
      \ (contact-303) from the Sales department? It should NOT have selected Tom Becker\n\
      \   (SMB) or Lisa Fontaine (Marketing). Full credit if at least two enterprise\
      \ Sales contacts found\n   with full details (email, phone, title retrieved\
      \ via get_contact).\n\n3. MESSAGE CONTENT (0–0.25): Were the internal messages\
      \ sent to the account managers personalized\n   and informative? Each message\
      \ should mention the specific customer(s) to welcome, include\n   relevant context\
      \ (e.g., industry, revenue tier), and have a professional, actionable tone.\n\
      \   Full credit if messages are specific, warm, and reference actual customer\
      \ names.\n\n4. SUMMARY QUALITY (0–0.25): Does the agent's final summary clearly\
      \ explain which enterprise\n   customers were identified, which internal contacts\
      \ were notified, and what messages were sent?\n   Full credit if the summary\
      \ is structured, names all three customers and all notified contacts,\n   and\
      \ provides a coherent account of the outreach completed.\n\nFinal score = average\
      \ of the four dimension scores (0.0–1.0).\n"
    type: llm_judge
  name: outreach_quality_and_completeness
  weight: 0.3
