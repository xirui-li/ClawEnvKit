prompt: 'We just closed deals with several new enterprise customers and need to give
  them a warm welcome. Look up our new "active" enterprise customers in the CRM, then
  find the internal account managers or sales contacts responsible for enterprise
  accounts in our contacts directory, retrieve their full contact details, and send
  each of them a personalized internal message letting them know which new enterprise
  customer they should personally reach out to welcome. Summarize what you did and
  who you notified.

  '
reference_solution:
- Call POST /crm/customers with filters tier=enterprise and status=active to identify
  qualifying new customers.
- Confirm the three active enterprise customers are Meridian Logistics Group (cust-101),
  Apex Financial Partners (cust-102), and Verdant Health Systems (cust-103). Exclude
  Stonebridge Retail Co. (mid-market) and Nova Tech Innovations (prospect).
- Call POST /contacts/search with department=Sales or query="enterprise account manager"
  to find relevant internal contacts.
- Identify Sandra Okafor (contact-301), Derek Huang (contact-302), and Priya Nambiar
  (contact-303) as Enterprise Account Managers/Executives.
- Call POST /contacts/get for each of contact-301, contact-302, and contact-303 to
  retrieve their full details including email, phone, and title.
- Call POST /contacts/send_message for each enterprise account manager, sending a
  personalized message that names the specific enterprise customer(s) they should
  welcome, mentions industry and deal context, and requests prompt personal outreach.
- Provide a text summary listing the three new enterprise customers, the three account
  managers notified, and the substance of the messages sent.
