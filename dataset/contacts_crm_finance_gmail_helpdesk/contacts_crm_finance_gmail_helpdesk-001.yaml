  name: it_manager_notified
  weight: 0.05
- check:
    rubric: 'Evaluate the agent''s overall performance on this outage notification
      task. Score on three dimensions:

      1. Ticket identification (0–0.33): Did the agent correctly identify ticket tkt-2201
      ("CRITICAL: Primary database cluster unresponsive") as the relevant high-priority
      open ticket, and accurately convey its details (database cluster down since
      09:14 UTC, customer-facing services degraded)?

      2. Contact coverage and messaging (0–0.33): Did the agent message all four Engineering
      contacts (Priya Nair c-001, Marcus Webb c-002, Sofia Delgado c-003, Tom Brandt
      c-006) via internal message, and also send a summary email to IT Manager James
      Okafor (c-004)? Deduct if any Engineering contact was missed or if the IT manager
      was not emailed separately.

      3. Summary quality (0–0.34): Does the agent''s final text output clearly summarize
      who was notified, the ticket details, and confirm that all messages were sent?
      Is the communication professional, urgent in tone, and actionable for the recipients?

      Score 1.0 if all three dimensions are fully satisfied, 0.5–0.8 for partial coverage
      or minor omissions, 0.0–0.4 if the agent missed multiple contacts, used the
      wrong ticket, or provided a poor summary.

      '
    type: llm_judge
  name: notification_quality_and_completeness
  weight: 0.25
