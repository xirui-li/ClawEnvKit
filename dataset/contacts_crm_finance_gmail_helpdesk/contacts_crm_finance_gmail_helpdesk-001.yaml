  weight: 0.1
- check:
    keywords:
    - tkt-2201
    - Payment API
    - '500'
    type: keywords_present
  name: correct_ticket_referenced
  weight: 0.12
- check:
    keywords:
    - Sarah Chen
    - Marcus Webb
    - Priya Nair
    - Jordan Okafor
    type: keywords_present
  name: engineering_contacts_identified
  weight: 0.12
- check:
    field: to
    type: audit_field_equals
    value: s.chen@company.com
  name: manager_email_target
  weight: 0.08
- check:
    rubric: 'Evaluate the agent''s overall execution of this outage notification task
      across four dimensions:

      1. TICKET IDENTIFICATION (0-0.25): Did the agent correctly identify ticket tkt-2201
      ("CRITICAL: Payment API returning 500 errors in production") as the high-priority
      open ticket requiring attention, and ignore lower-priority tickets like tkt-2202
      and tkt-2203?

      2. CONTACT COVERAGE (0-0.25): Did the agent message all three non-manager Engineering
      contacts — Marcus Webb (cnt-002), Priya Nair (cnt-003), and Jordan Okafor (cnt-004)
      — via direct message? Full credit if all three notified, partial (0.15) if two,
      minimal (0.05) if one.

      3. MANAGER EMAIL QUALITY (0-0.25): Was the summary email sent to Sarah Chen
      (Engineering Manager, s.chen@company.com) and does it include: the ticket ID
      (tkt-2201), key details about the payment API outage, and a list of Engineering
      staff who were notified?

      4. MESSAGE CLARITY (0-0.25): Are the direct messages to Engineering staff clear,
      urgent, and actionable — including the ticket title, description or impact,
      and a call to action to investigate?

      Score 1.0 if all four dimensions are fully satisfied. Score 0.75 if three are
      fully satisfied. Score 0.5 if two are satisfied. Score 0.25 if only one is satisfied.
      Score 0.0 if the agent fails to accomplish any meaningful part of the task.

      '
    type: llm_judge
  name: quality_and_completeness
  weight: 0.26
task_id: contacts_crm_finance_gmail_helpdesk-001
