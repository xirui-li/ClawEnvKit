  method: POST
  name: get_contact
  service: contacts
- description: Send an internal message to a contact
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: List helpdesk tickets filtered by status
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get full details of a specific helpdesk ticket
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Send an email via Gmail
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
