prompt: 'There''s a critical production outage ticket in the helpdesk system that
  needs immediate attention from the Engineering department. Find the open high-priority
  ticket, look up all Engineering contacts, and send each of them a direct message
  alerting them to the ticket details so they can take action. Then send a summary
  email to the engineering manager (whoever holds that title) with the ticket description
  and a list of all Engineering staff you notified.

  '
reference_solution: '1. Call list_tickets with status=open to retrieve open helpdesk
  tickets. 2. Identify tkt-2201 as the high-priority critical ticket about the payment
  API outage. 3. Call get_ticket with ticket_id=tkt-2201 to retrieve full ticket details
  including description and impact. 4. Call search_contacts with department=Engineering
  to find all Engineering staff. 5. Review results: Sarah Chen (Engineering Manager,
  cnt-001), Marcus Webb (cnt-002), Priya Nair (cnt-003), Jordan Okafor (cnt-004).
  6. Optionally call get_contact for individual contacts if additional detail is needed.
  7. Call send_message for cnt-002 (Marcus Webb), cnt-003 (Priya Nair), and cnt-004
  (Jordan Okafor) with an urgent alert referencing ticket tkt-2201, the payment API
  500 errors, and a call to action. 8. Call send_email to s.chen@company.com (Sarah
  Chen, Engineering Manager) with a subject like "Engineering Alert: tkt-2201 — Production
  Payment API Outage", including the ticket description, revenue impact, and a list
  of the three Engineering staff who were directly notified. 9. Report back to the
  user confirming: the ticket identified, the four Engineering contacts found, the
  three direct messages sent, and the summary email delivered to Sarah Chen.'
