  name: summary_task_title_correct
  weight: 0.08
- check:
    action: create_task
    field: due_date
    service: todo
    type: audit_field_equals
    value: '2025-08-01'
  name: summary_task_due_date_correct
  weight: 0.07
- check:
    rubric: 'The agent should clearly explain what actions were taken: which tasks
      were marked overdue and tagged ''past-due'', which ''quick-win'' tasks had their
      priority raised to ''high'', and confirm that the ''Weekly Triage Review'' summary
      task was created with the correct due date. The response should be organized,
      specific about task IDs or titles, and not contain errors or omissions about
      tasks that were unchanged (e.g., completed tasks should not have been modified).

      '
    type: llm_judge
  name: response_quality
  weight: 0.08
task_id: todo-008
task_name: triage_and_restructure_tasks_by_deadline
tools:
- description: List tasks, optionally filtering by status. Returns all matching tasks
    with their details.
  endpoint: /todo/tasks
  method: POST
  name: list_tasks
  service: todo
- description: Update an existing task's title, priority, status, or tags by task_id.
  endpoint: /todo/tasks/update
  method: POST
  name: update_task
  service: todo
- description: Create a new task with a title, description, priority, and due date.
  endpoint: /todo/tasks/create
  method: POST
  name: create_task
  service: todo
- description: Delete a task permanently by task_id.
  endpoint: /todo/tasks/delete
  method: POST
  name: delete_task
  service: todo
