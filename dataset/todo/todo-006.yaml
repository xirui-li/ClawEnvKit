difficulty: medium
fixtures:
  tasks:
  - description: Compile all department expenses and submit to finance team.
    due_date: '2024-10-15'
    id: task-101
    priority: high
    status: blocked
    tags:
    - finance
    - quarterly
    title: Finalize Q3 budget report
  - description: Revise the new hire onboarding guide with updated policies.
    due_date: '2024-10-20'
    id: task-102
    priority: low
    status: blocked
    tags:
    - hr
    - documentation
    title: Update onboarding documentation
  - description: Resolve the session timeout issue reported by QA.
    due_date: '2024-10-12'
    id: task-103
    priority: high
    status: in_progress
    tags:
    - engineering
    - bug
    title: Fix login page bug
  - description: Coordinate with team leads to find a suitable time slot.
    due_date: '2024-10-18'
    id: task-104
    priority: low
    status: blocked
    tags:
    - meetings
    title: Schedule team retrospective
  - description: Gather pricing data from at least five competitors.
    due_date: '2024-10-25'
    id: task-105
    priority: medium
    status: todo
    tags:
    - research
    - strategy
    title: Research competitor pricing
  - description: Set up the new staging server for the upcoming release.
    due_date: '2024-10-22'
    id: task-106
    priority: low
