  - description: Q2 quarterly financial report submission
    due_date: '2024-07-30'
    id: task-002
    priority: high
    status: pending
    tags:
    - finance
    - reporting
    title: Submit quarterly report
  - description: Critical bug causing checkout failures on mobile
    due_date: '2024-07-10'
    id: task-003
    priority: low
    status: pending
    tags:
    - urgent
    - engineering
    title: 'Fix production bug #482'
  - description: Update HR onboarding docs for new hires
    due_date: '2024-07-20'
    id: task-004
    priority: medium
