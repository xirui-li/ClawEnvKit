category: ocr_advanced
difficulty: medium
files:
- source: fixtures/media/manifest_ES2341.png
  target: manifest_ES2341.png
- source: fixtures/media/manifest_MX8812.png
  target: manifest_MX8812.png
- source: fixtures/media/manifest_BR4490.png
  target: manifest_BR4490.png
- source: fixtures/media/manifest_DE1177.png
  target: manifest_DE1177.png
- source: fixtures/media/manifest_AR6603.png
  target: manifest_AR6603.png
fixtures:
  images:
  - expected_text: 'MANIFIESTO DE CARGA No. ES2341 Origen: Valencia, España Destino:
      Miami, Estados Unidos Peso declarado: 1.240 kg Descripción: Maquinaria agrícola
      - repuestos Anotación manuscrita: "Revisado por aduana - 14/03/2024 - Sin novedades"
      Sello: DESPACHADO

      '
    id: img-001
    image_path: /workspace/manifest_ES2341.png
    language: es
  - expected_text: 'SHIPPING MANIFEST No. MX8812 Origin: Guadalajara, Mexico Destination:
      Los Angeles, USA Declared Weight: 875 kg Contents: Automotive parts - OEM components
      Handwritten note: "Held for secondary inspection - 02/04/2024" Stamp: CUSTOMS
      HOLD

      '
    id: img-002
    image_path: /workspace/manifest_MX8812.png
    language: es
  - expected_text: 'MANIFESTO DE CARGA No. BR4490 Origem: São Paulo, Brasil Destino:
      Hamburgo, Alemanha Peso declarado: 3.050 kg Conteúdo: Equipamentos eletrônicos
