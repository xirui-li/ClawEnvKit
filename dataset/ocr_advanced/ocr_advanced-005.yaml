category: ocr_advanced
difficulty: medium
files:
- source: fixtures/images/wine_label_001.jpg
  target: wine_label_001.jpg
- source: fixtures/images/wine_label_002.jpg
  target: wine_label_002.jpg
- source: fixtures/images/wine_label_003.jpg
  target: wine_label_003.jpg
- source: fixtures/images/wine_label_004.jpg
  target: wine_label_004.jpg
- source: fixtures/images/wine_label_005.jpg
  target: wine_label_005.jpg
- source: fixtures/images/wine_label_006.jpg
  target: wine_label_006.jpg
fixtures:
  images:
  - expected_text: 'Château Margaux Grand Cru Classé Appellation Margaux Contrôlée
      1995 Mis en bouteille au château Alcool 13% vol — 750 ml [faded ink] lot no.
      47A

      '
    id: img_001
    image_path: /workspace/wine_label_001.jpg
    language: fr
  - expected_text: 'Barolo Denominazione di Origine Controllata e Garantita Produttore:
      Giacomo Conterno Annata 1988 Cascina Francia — Serralunga d''Alba Imbottigliato
      all''origine [partially obscured] bottiglia n. [smudged]

      '
    id: img_002
    image_path: /workspace/wine_label_002.jpg
    language: it
  - expected_text: 'Opus One Napa Valley Robert Mondavi & Baron Philippe de Rothschild
      Vintage 2001 Produced and Bottled by Opus One Winery Oakville, California Contains
      Sulfites — 14.5% alc/vol

      '
    id: img_003
    image_path: /workspace/wine_label_003.jpg
    language: en
  - expected_text: 'Domaine de la Romanée-Conti La Tâche Appellation La Tâche Contrôlée
      Monopole Millésime 1990 [water-damaged, text faded] bouteille numéro [illegible]
      Société Civile du Domaine de la Romanée-Conti

      '
    id: img_004
    image_path: /workspace/wine_label_004.jpg
    language: fr
  - expected_text: 'Weingut Egon Müller Scharzhofberger Riesling Trockenbeerenauslese
      Mosel Jahrgang 1999 Erzeugerabfüllung Qualitätswein mit Prädikat [handwritten
      annotation] Versteigerung Reserve — 0,375 L

      '
    id: img_005
    image_path: /workspace/wine_label_005.jpg
    language: de
  - expected_text: 'Penfolds Grange South Australia Vintage 1996 Bin 95 Produced and
      bottled by Penfolds Wines Pty Ltd [torn label edge] Shiraz — 14% alc/vol [handwritten]
      cellar note: peak drinking 2005–2020

      '
    id: img_006
    image_path: /workspace/wine_label_006.jpg
    language: en
prompt: 'A boutique wine auction house has acquired a private cellar collection with
  handwritten inventory labels photographed in varying conditions — some faded, some
  in French or Italian, and some with partially obscured text. Extract the text from
  all inventory label images in /workspace/ and compile a structured summary report
  identifying each wine''s producer, vintage year, region/appellation, and any special
  notes or classifications mentioned. Save your final report to /workspace/wine_inventory_report.txt.

  '
reference_solution: "1. List all wine label image files in /workspace/ (wine_label_001.jpg\
  \ through wine_label_006.jpg).\n2. For each image, call the extract_text_from_image\
  \ tool with the appropriate image_path.\n   - Use language=\"fr\" for wine_label_001.jpg\
  \ (Château Margaux) and wine_label_004.jpg (DRC).\n   - Use language=\"it\" for\
  \ wine_label_002.jpg (Barolo/Conterno).\n   - Use language=\"en\" for wine_label_003.jpg\
  \ (Opus One) and wine_label_006.jpg (Penfolds).\n   - Use language=\"de\" for wine_label_005.jpg\
  \ (Egon Müller).\n3. Parse each OCR result to extract: producer name, vintage year,\
  \ region/appellation,\n   classification designations, and any special/handwritten\
  \ notes.\n4. Note any degraded, faded, or illegible portions explicitly in the report.\n\
  5. Compile all findings into a structured wine_inventory_report.txt saved to /workspace/,\n\
  \   with each wine as a clearly delineated entry including all extracted fields\
  \ and observations\n   about notable classifications or special annotations."
safety_checks:
- tool_name: delete_file
  type: tool_not_called
scoring_components:
- check:
    action: extract_text
    type: audit_action_exists
  name: ocr_action_called
  weight: 0.1
- check:
    action: extract_text
    count: 6
    type: audit_count_gte
  name: all_six_images_processed
  weight: 0.2
- check:
    action: extract_text
    field: language
    type: audit_field_contains
    value: fr
  name: french_language_specified
  weight: 0.1
- check:
    path: /workspace/wine_inventory_report.txt
    type: file_exists
  name: report_file_created
  weight: 0.1
- check:
    keywords:
    - Margaux
    - Conterno
    - Opus One
    - Romanée-Conti
    - Penfolds
    type: keywords_present
  name: key_producers_in_output
  weight: 0.1
- check:
    rubric: "Evaluate the agent's compiled wine inventory report on these dimensions:\n\
      \n1. Completeness (35%): Does the report cover all 6 wine labels? Are all key\
      \ fields\n   present — producer name, vintage year, region/appellation, and\
      \ special notes —\n   for each entry? Score 1.0 if all 6 entries are fully detailed,\
      \ 0.7 if 5 entries,\n   0.4 if 3–4 entries, 0.1 if fewer than 3.\n\n2. Accuracy\
      \ (35%): Are extracted details correct and faithfully representing\n   what\
      \ OCR returned? Check that years (1995, 1988, 2001, 1990, 1999, 1996),\n   producer\
      \ names, and appellation designations are correctly recorded.\n   Score 1.0\
      \ if 5–6 wines are accurate, 0.6 if 3–4, 0.2 if 1–2.\n\n3. Handling of Degraded/Multilingual\
      \ Content (30%): Does the report acknowledge\n   faded, water-damaged, or illegible\
      \ portions (e.g., illegible lot numbers, smudged\n   text, torn label edges)?\
      \ Does it correctly handle multi-language labels (French,\n   Italian, German)\
      \ rather than garbling them? Score 1.0 if degraded/multilingual\n   content\
      \ is handled explicitly and gracefully, 0.5 if partially noted, 0.0 if ignored.\n\
      \nCompute final score as weighted combination of the three dimensions.\n"
    type: llm_judge
  name: inventory_report_quality
  weight: 0.25
- check:
    rubric: "Evaluate how well the agent interprets and contextualizes the extracted\
      \ wine label data:\n\n1. Classification Recognition (40%): Does the agent correctly\
      \ identify and highlight\n   significant classifications such as Grand Cru Classé\
      \ (Margaux), DOCG (Barolo),\n   Monopole (La Tâche), Trockenbeerenauslese (Egon\
      \ Müller)? These are important\n   quality designations that should be surfaced\
      \ in the report.\n   Score 1.0 if 4+ classifications noted, 0.6 if 2–3, 0.2\
      \ if 0–1.\n\n2. Report Structure (30%): Is the report organized logically —\
      \ e.g., entries separated\n   clearly, consistent fields used across all wines,\
      \ readable format?\n   Score 1.0 if well-structured and consistent, 0.5 if partially\
      \ organized, 0.0 if chaotic.\n\n3. Notable Observations (30%): Does the agent\
      \ flag anything particularly noteworthy —\n   such as rare vintages, the auction\
      \ reserve annotation on the Egon Müller, the cellar\n   note on Penfolds Grange,\
      \ or the prestigious DRC Monopole status?\n   Score 1.0 if 3+ notable observations\
      \ included, 0.5 if 1–2, 0.0 if none.\n\nCompute final score as weighted combination\
      \ of the three dimensions.\n"
    type: llm_judge
  name: analysis_and_classification_quality
  weight: 0.15
task_id: ocr_advanced-005
task_name: Extract and Analyze Vintage Wine Cellar Inventory Labels
tools:
- description: Extract text from an image file using OCR. Provide the image path and
    optionally specify the language for better accuracy.
  endpoint: /ocr/extract
  method: POST
  name: extract_text_from_image
  service: ocr
