tools:
- description: Retrieve a list of helpdesk tickets, optionally filtered by status.
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Fetch full details of a specific helpdesk ticket by its ID.
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Update a ticket's priority, tags, or category.
  endpoint: /helpdesk/tickets/update
  method: POST
  name: update_ticket
  service: helpdesk
- description: Close a helpdesk ticket with a resolution note.
  endpoint: /helpdesk/tickets/close
  method: POST
  name: close_ticket
  service: helpdesk
