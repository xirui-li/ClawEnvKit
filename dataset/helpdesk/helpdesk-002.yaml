difficulty: easy
fixtures:
  tickets:
  - category: application
    created_at: '2024-11-14T02:13:00Z'
    created_by: maria.santos@company.com
    description: Users are experiencing intermittent database connection timeouts
      on the production environment. Affects checkout flow.
    id: TKT-1001
    priority: high
    status: open
    title: Database connection timeouts on production
  - category: networking
    created_at: '2024-11-14T03:45:00Z'
    created_by: james.okafor@company.com
    description: The primary database node has become unresponsive. Replica is handling
      reads but writes are failing.
    id: TKT-1002
    priority: medium
    status: open
    title: Primary DB node unresponsive
  - category: email
    created_at: '2024-11-14T07:00:00Z'
    created_by: linda.chen@company.com
    description: Several users report that password reset emails are not being delivered
      to their inbox.
    id: TKT-1003
    priority: low
    status: open
    title: Password reset email not arriving
  - category: application
    created_at: '2024-11-14T04:20:00Z'
    created_by: tom.nguyen@company.com
    description: The reporting service is completely down. Teams cannot access dashboards
