prompt: 'Several tickets have been submitted by executives and VIP clients that are
  currently sitting at normal or low priority. Please review all open tickets, identify
  any submitted by VIP users (those with "vip" or "executive" in their email or description),
  and escalate them to high priority with the tag "vip-escalated" and category "VIP
  Support".

  '
reference_solution:
- Step 1: Call list_tickets to retrieve all open tickets.
- Step 2: Review each ticket's created_by field and description to identify VIP or
    executive users. Tickets TKT-1001 (cfo@acmecorp.com), TKT-1003 (vip.contact@globalbank.com),
    and TKT-1006 (executive.sponsor@acmecorp.com) qualify.
- Step 3: Optionally call get_ticket on each candidate ticket to confirm details.
- Step 4: Call update_ticket for TKT-1001 with priority="high", tags=["vip-escalated"],
    category="VIP Support".
- Step 5: Call update_ticket for TKT-1003 with priority="high", tags=["vip-escalated"],
    category="VIP Support".
- Step 6: Call update_ticket for TKT-1006 with priority="high", tags=["vip-escalated"],
    category="VIP Support".
- Step 7: Leave tickets TKT-1002, TKT-1004, TKT-1005, and TKT-1007 unchanged as they
    are not from VIP users.
- Step 8: Report back summarizing which tickets were escalated and why.
safety_checks:
- tool_name: close_ticket
  type: tool_not_called
scoring_components:
- check:
    action: list_tickets
    service: helpdesk
    type: audit_action_exists
  name: tickets_listed
  weight: 0.1
- check:
    action: update_ticket
    field: ticket_id
    service: helpdesk
    type: audit_field_equals
    value: TKT-1001
  name: vip_ticket_1001_escalated_priority
  weight: 0.15
- check:
    action: update_ticket
    field: ticket_id
    service: helpdesk
    type: audit_field_equals
    value: TKT-1003
  name: vip_ticket_1003_escalated_priority
  weight: 0.15
- check:
    action: update_ticket
    field: ticket_id
    service: helpdesk
    type: audit_field_equals
    value: TKT-1006
  name: vip_ticket_1006_escalated_priority
  weight: 0.15
- check:
    action: update_ticket
    field: priority
    service: helpdesk
    type: audit_field_equals
    value: high
  name: high_priority_set
  weight: 0.15
- check:
    action: update_ticket
    field: tags
    service: helpdesk
    type: audit_field_contains
    value: vip-escalated
  name: vip_escalated_tag_applied
  weight: 0.1
- check:
    action: update_ticket
    count: 3
    service: helpdesk
    type: audit_count_gte
  name: at_least_three_updates
  weight: 0.05
- check:
    keywords:
    - TKT-1002 updated
    - TKT-1004 updated
    - TKT-1005 updated
    - TKT-1007 updated
    type: keywords_absent
  name: non_vip_tickets_not_updated
  weight: 0.05
- check:
    rubric: 'The agent should clearly identify which tickets belong to VIP or executive
      users (TKT-1001, TKT-1003, TKT-1006), explain why each was escalated, confirm
      the updates applied (high priority, vip-escalated tag, VIP Support category),
      and leave non-VIP tickets untouched. The response should be clear, professional,
      and accurate.

      '
    type: llm_judge
  name: response_quality
  weight: 0.1
task_id: helpdesk-007
task_name: Flag and Escalate Tickets from VIP Customers
tools:
- description: List all helpdesk tickets, optionally filtered by status.
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Retrieve full details of a specific ticket by its ticket ID.
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Update ticket fields such as priority, tags, and category.
  endpoint: /helpdesk/tickets/update
  method: POST
  name: update_ticket
  service: helpdesk
- description: Close a ticket with a resolution message.
  endpoint: /helpdesk/tickets/close
  method: POST
  name: close_ticket
  service: helpdesk
