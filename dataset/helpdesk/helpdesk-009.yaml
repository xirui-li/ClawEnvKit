difficulty: hard
fixtures:
  tickets:
  - category: IT Support
    created_at: '2024-11-15T08:22:00Z'
    created_by: alice.morgan@company.com
    description: Multiple failed login attempts detected on the admin portal from
      an unrecognized IP address in Eastern Europe. Account has been temporarily locked.
    id: TKT-1001
    priority: medium
    status: open
    title: Suspicious login attempts on admin account
  - category: Hardware
    created_at: '2024-11-15T09:05:00Z'
    created_by: james.wu@company.com
    description: The shared HP LaserJet on the 3rd floor is showing an error and not
      printing. Tried restarting but issue persists.
    id: TKT-1002
    priority: low
    status: open
    title: Printer not working on 3rd floor
  - category: IT Support
    created_at: '2024-11-15T10:14:00Z'
    created_by: priya.sharma@company.com
    description: A developer noticed that a misconfigured S3 bucket may have exposed
      customer PII records for approximately 2 hours before being locked down. Exact
