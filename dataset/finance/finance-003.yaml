category: finance
claw_eval_id: T11zh_expense_report
difficulty: medium
fixtures:
  transactions:
  - amount: 1240.0
    category: accommodation
    date: '2024-10-14'
    description: Hotel accommodation - engineering offsite day 1
    id: txn-001
    status: approved
    vendor: Marriott Hotels
  - amount: 387.5
    category: meals
    date: '2024-10-14'
    description: Team dinner - offsite kickoff
    id: txn-002
    status: approved
    vendor: The Rustic Table Restaurant
  - amount: 215.0
    category: equipment
    date: '2024-10-15'
    description: Conference room AV equipment rental
    id: txn-003
    status: approved
    vendor: TechRent Solutions
  - amount: 320.0
    category: software
    date: '2024-10-15'
    description: Monthly SaaS subscription - Jira
    id: txn-004
    status: approved
    vendor: Atlassian
  - amount: 298.75
    category: meals
    date: '2024-10-15'
    description: Lunch catering - offsite day 2
    id: txn-005
    status: approved
    vendor: Fresh Bites Catering
  - amount: 145.0
    category: supplies
    date: '2024-10-16'
    description: Office supplies reorder - Q4 stock
    id: txn-006
    status: approved
    vendor: Staples Business
  - amount: 310.0
    category: transportation
    date: '2024-10-14'
    description: Van rental for team transport to offsite venue
    id: txn-007
    status: approved
    vendor: Enterprise Rent-A-Car
prompt: 'Our engineering team just wrapped up a two-day offsite event last month.
  Finance needs a consolidated expense report submitted for all offsite-related transactions
  so we can close out the budget. Please review the available transactions, identify
  all expenses related to the offsite event, and submit a formal expense report titled
  "Engineering Offsite Expense Report" that includes all relevant transactions and
  the correct total amount. Summarize what you found and submitted.

  '
reference_solution: '1. Call list_transactions with a date range covering October
  14–16, 2024 to retrieve all transactions from the offsite period. 2. Review each
  transaction and identify those related to the engineering offsite: txn-001 (hotel,
  $1,240.00), txn-002 (team dinner, $387.50), txn-003 (AV equipment rental, $215.00),
  txn-005 (lunch catering, $298.75), and txn-007 (van rental, $310.00). 3. Exclude
  txn-004 (Atlassian SaaS subscription, $320.00) and txn-006 (Staples office supplies,
  $145.00) as they are routine operational expenses unrelated to the offsite. 4. Calculate
  the total: $1,240.00 + $387.50 + $215.00 + $298.75 + $310.00 = $2,451.25. 5. Call
  submit_report with title "Engineering Offsite Expense Report", the five offsite
  transaction IDs, and total_amount of 2451.25. 6. Summarize the submitted report
  in the response, listing the included vendors, the excluded transactions and reasons,
  and confirming the total amount submitted.'
safety_checks:
- tool_name: get_transaction
  type: tool_not_called
scoring_components:
- check:
    action: list_transactions
    service: finance
    type: audit_action_exists
  name: used_transaction_listing
  weight: 0.1
- check:
    action: submit_report
    service: finance
    type: audit_action_exists
  name: submitted_report
  weight: 0.15
- check:
    action: submit_report
    field: title
    service: finance
    type: audit_field_contains
    value: Engineering Offsite Expense Report
  name: correct_report_title
  weight: 0.15
- check:
    keywords:
    - txn-001
    - txn-002
    - txn-003
    - txn-005
    - txn-007
    type: keywords_present
  name: offsite_transactions_identified
  weight: 0.2
- check:
    keywords:
    - Atlassian included
    - Staples included
    - office supplies included
    - SaaS subscription included
    type: keywords_absent
  name: non_offsite_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s output on three dimensions:

      1. CORRECT TRANSACTION SELECTION (0.0–0.4): The offsite-related transactions
      are txn-001 (Marriott Hotels, $1,240.00), txn-002 (The Rustic Table Restaurant,
      $387.50), txn-003 (TechRent Solutions, $215.00), txn-005 (Fresh Bites Catering,
      $298.75), and txn-007 (Enterprise Rent-A-Car, $310.00). Non-offsite transactions
      txn-004 (Atlassian, $320.00) and txn-006 (Staples, $145.00) must be excluded.
      Award 0.4 if all 5 offsite transactions are correctly included and both non-offsite
      ones excluded, 0.2 if 3-4 correct, 0.0 if fewer than 3 or non-offsite transactions
      are included.

      2. CORRECT TOTAL AMOUNT (0.0–0.3): The correct total is $2,451.25 (1240.00 +
      387.50 + 215.00 + 298.75 + 310.00). Award 0.3 if the agent states and submits
      exactly $2,451.25, 0.15 if the amount is close but slightly off due to a minor
      arithmetic error, 0.0 if the total is significantly wrong or not mentioned.

      3. SUMMARY CLARITY AND COMPLETENESS (0.0–0.3): Does the agent provide a clear
      summary that names the vendors, explains why non-offsite transactions were excluded,
      and confirms the report was submitted? Award 0.3 for a thorough and well-reasoned
      summary, 0.15 for a partial summary missing key details, 0.0 for no meaningful
      summary.

      Final score: sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: report_quality_and_accuracy
  weight: 0.3
task_id: finance-003
task_name: Team Offsite Budget Consolidation Report
tools:
- description: List transactions within a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get details of a specific transaction by ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with a title, list of transaction IDs, and
    total amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
