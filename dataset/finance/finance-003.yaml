prompt: 'I need you to compile and submit an expense report for all marketing-related
  transactions from March 2024. Find all transactions in the "Marketing" category
  and submit them as a single expense report titled "March 2024 Marketing Expenses"
  with the correct total amount.

  '
reference_solution:
- description: 'Call list_transactions with start_date "2024-03-01" and end_date "2024-03-31"
    to retrieve all transactions for March 2024.

    '
  step: 1
- description: 'Review the returned transactions and filter to only those with category
    equal to "Marketing". The matching transactions are TXN-3001 (Google Ads, $1250.00),
    TXN-3003 (LinkedIn, $875.50), TXN-3005 (Trade show, $2100.00), and TXN-3006 (Merchandise,
    $640.75).

    '
  step: 2
- description: 'Sum the amounts of the four marketing transactions: 1250.00 + 875.50
    + 2100.00 + 640.75 = 4866.25.

    '
  step: 3
- description: 'Call submit_report with title "March 2024 Marketing Expenses", transactions
    list ["TXN-3001", "TXN-3003", "TXN-3005", "TXN-3006"], and total_amount 4866.25.

    '
  step: 4
- description: Confirm the report was successfully submitted and communicate the result
    to the user, including the total amount and the number of transactions included.
  step: 5
