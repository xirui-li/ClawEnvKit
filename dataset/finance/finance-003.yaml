tools:
- description: 'Retrieve a list of transactions within a specified date range. Accepts
    a start_date and end_date to filter results.

    '
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: 'Retrieve full details for a single transaction by its transaction
    ID.

    '
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: 'Submit a completed expense report with a title, list of transaction
    IDs, and the calculated total amount.

    '
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
