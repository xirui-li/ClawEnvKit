  name: report_excludes_wrong_category
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent correctly filtered transactions to include
      only those categorized as "Contractor Services" or "Consulting" with status
      "approved" (TXN-3001, TXN-3002, TXN-3004, TXN-3006, TXN-3007), excluded the
      pending transaction (TXN-3005) and unrelated categories (TXN-3003 Legal, TXN-3008
      Office Supplies), computed the correct total of $17,475.00, and provided a clear
      summary of the submitted report.

      '
    type: llm_judge
  name: report_quality_assessment
  weight: 0.1
task_id: finance-008
task_name: Submit Monthly Contractor Services Expense Report
tools:
- description: 'Retrieve a list of transactions within a specified date range. Accepts
    a JSON body with optional ''start_date'' and ''end_date'' fields (YYYY-MM-DD).

    '
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: 'Retrieve full details of a single transaction by its unique transaction
    ID. Accepts a JSON body with a ''transaction_id'' field.

    '
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: 'Submit a completed expense report for approval. Accepts a JSON body
    with ''title'' (string), ''transactions'' (list of transaction IDs), and ''total_amount''
    (numeric sum of included transactions).

    '
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
