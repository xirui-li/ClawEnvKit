difficulty: easy
fixtures:
  transactions:
  - amount: 87.45
    category: office_supplies
    date: '2024-01-05'
    description: Printer paper and toner cartridges
    id: TXN-1001
    status: approved
    vendor: Staples
  - amount: 134.99
    category: office_supplies
    date: '2024-01-09'
    description: Ergonomic keyboard and mouse set
    id: TXN-1002
    status: approved
    vendor: Best Buy
  - amount: 212.0
    category: meals
    date: '2024-01-14'
    description: Team lunch meeting
    id: TXN-1003
    status: approved
    vendor: Olive Garden
  - amount: 43.2
    category: office_supplies
    date: '2024-01-17'
    description: Sticky notes, pens, and folders
    id: TXN-1004
    status: approved
    vendor: Office Depot
  - amount: 28.75
    category: office_supplies
    date: '2024-01-22'
    description: Whiteboard markers and eraser set
    id: TXN-1005
    status: approved
    vendor: Amazon Business
  - amount: 389.0
    category: travel
    date: '2024-01-28'
    description: Flight to Chicago - client visit
    id: TXN-1006
    status: approved
    vendor: United Airlines
  - amount: 55.6
    category: office_supplies
