prompt: 'Our CFO wants a comprehensive business intelligence snapshot before next
  week''s board meeting. Pull all transactions from Q1 2024 (January through March),
  identify which of our premium customers are in industries that had notable market
  news recently, and compile everything into an expense report summarizing Q1 spending
  alongside a CRM export highlighting those at-risk premium customers. The final deliverable
  should connect our internal financial data with current market context.

  '
reference_solution: "Step 1 — Retrieve Q1 2024 Transactions:\n  Call list_transactions\
  \ with a date range of 2024-01-01 to 2024-03-31.\n  Review all 7 returned transactions\
  \ spanning January through March.\n  Note the total spend across categories: Technology\
  \ ($12,450), Professional Services ($8,750),\n  Software ($24,000), Travel ($6,300),\
  \ Facilities ($31,200), Marketing ($9,800), Legal ($5,500).\n  Grand total: $98,000.\n\
  \nStep 2 — Submit Q1 Expense Report:\n  Call submit_report with title \"Q1 2024\
  \ Expense Report\", include all 7 transaction IDs\n  (txn-001 through txn-007),\
  \ and set total_amount to 98000.00.\n\nStep 3 — Identify Premium Customers in Market-Sensitive\
  \ Industries:\n  Call list_customers filtered by tier=\"premium\" to retrieve Apex\
  \ Semiconductor Corp,\n  Meridian Real Estate Group, Fortis Biomedical Solutions,\
  \ and Cascade Financial Services.\n  Note that Fortis Biomedical is already marked\
  \ \"at-risk\".\n\nStep 4 — Gather Relevant Market News:\n  Call list_feeds or list_articles\
  \ to retrieve recent business and technology news.\n  Retrieve articles: art-001\
  \ (semiconductor supply chain), art-002 (real estate vacancies),\n  art-003 (FDA\
  \ compliance reviews for healthcare). Optionally call get_article for full details.\n\
  \nStep 5 — Connect News to Customers:\n  Match: Apex Semiconductor Corp → art-001\
  \ (supply chain disruptions threaten tech margins).\n  Match: Meridian Real Estate\
  \ Group → art-002 (commercial vacancies at decade high).\n  Match: Fortis Biomedical\
  \ Solutions → art-003 (FDA stricter compliance = cost risk).\n\nStep 6 — Export\
  \ CRM Report for At-Risk Premium Customers:\n  Call export_report with title \"\
  Q1 2024 Premium Customer Risk Assessment\",\n  customer_ids including at minimum\
  \ cust-101, cust-102, and cust-104,\n  and a summary that explains each customer's\
  \ industry headwind and revenue exposure.\n\nStep 7 — Synthesize and Present Findings:\n\
  \  Provide the CFO with a coherent narrative linking Q1 internal spend, premium\
  \ customer\n  risk profiles, and supporting market intelligence from RSS news feeds.\n\
  \  Do NOT call publish_newsletter, as this is an internal board report, not a public\
  \ communication."
