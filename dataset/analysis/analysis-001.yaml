    - Nexus Health
    - Meridian
    - enterprise
    type: keywords_present
  name: enterprise_customer_facts_present
  weight: 0.15
- check:
    rubric: "Evaluate the quality and completeness of the agent's executive summary\
      \ and newsletter output. Score on four dimensions:\n1. Financial accuracy (0–0.25):\
      \ Does the output correctly identify Q3 2024 transactions?\n   It should reference\
      \ key expenses such as AWS ($42,500), Ogilvy & Mather ($18,750),\n   Morrison\
      \ & Foerster ($15,000), and note the pending Concur Travel expense ($7,300).\n\
      \   Full credit if at least 3 specific transactions with amounts are cited.\n\
      \n2. Customer insight (0–0.25): Does the output identify the top enterprise\
      \ customers by revenue?\n   Nexus Health Systems ($540,000), Meridian Financial\
      \ Group ($485,000), and\n   Apex Manufacturing Corp ($312,000) should be mentioned.\
      \ Full credit if all three are named\n   with their revenue figures or relative\
      \ rankings.\n\n3. Market context integration (0–0.25): Does the output weave\
      \ in relevant news?\n   It should reference enterprise SaaS spending growth\
      \ (18% per Gartner/Bloomberg),\n   healthcare IT investment trends relevant\
      \ to Nexus Health, or manufacturing cost pressures\n   relevant to Apex. Full\
      \ credit if at least two market data points are connected to specific customers.\n\
      \n4. Presentation and actionability (0–0.25): Is the output structured as a\
      \ coherent executive summary\n   suitable for board/leadership consumption?\
      \ Does it include a clear narrative, highlight risks\n   (pending transaction,\
      \ inactive customer Cornerstone Logistics), and provide a forward-looking note?\n\
      \   Full credit for a well-organized, professional summary with at least one\
      \ risk or recommendation.\n\nScore: Sum of the four dimension scores. 0.9–1.0\
      \ = excellent synthesis; 0.6–0.89 = good but missing some elements; below 0.6\
      \ = incomplete or inaccurate.\n"
    type: llm_judge
  name: synthesis_quality
  weight: 0.3
task_id: analysis-001
task_name: Quarterly Business Health Report with Market Context
tools:
- description: List financial transactions within a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get details of a specific transaction by ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit a formal expense report with a title, list of transaction IDs,
    and total amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: List CRM customers filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information for a specific customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM customer report with a title, list of customer IDs, and
    a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
- description: List available RSS news feeds by category
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: List articles from RSS feeds filtered by source, category, or max results
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: Get the full content of a specific article by ID
  endpoint: /rss/articles/get
  method: POST
  name: get_article
  service: rss
- description: Publish a newsletter with a title, content body, and list of recipients
  endpoint: /rss/publish
  method: POST
  name: publish_newsletter
  service: rss
