- check:
    rubric: "Evaluate the quality of the agent's financial analysis across three dimensions:\n\
      \n1. Completeness of Q1 Transaction Coverage (40%):\n   Did the agent retrieve\
      \ and reference transactions spanning all three months\n   (January, February,\
      \ and March 2024)? Did it correctly compute or reference\n   the total Q1 spend\
      \ ($98,000)? Did it include all major spending categories\n   (Technology, Professional\
      \ Services, Software, Travel, Facilities, Marketing, Legal)?\n   Score 1.0 if\
      \ all covered, 0.6 if two months or most categories, 0.2 if sparse.\n\n2. Accuracy\
      \ of Submitted Expense Report (30%):\n   Did the submitted expense report include\
      \ a meaningful title referencing Q1 2024,\n   reference multiple transaction\
      \ IDs, and provide a plausible total amount consistent\n   with the transaction\
      \ data? Score 1.0 if all three elements are correct, 0.5 if\n   title and transactions\
      \ are present but total is missing or clearly wrong, 0.0 if report is absent.\n\
      \n3. Cross-Service Data Integration (30%):\n   Did the agent explicitly connect\
      \ Q1 financial spending patterns to customer or market\n   context? For example,\
      \ noting that Facilities spend aligns with real estate market stress,\n   or\
      \ Technology spend aligns with semiconductor/cloud market trends? Score 1.0\
      \ for at\n   least two specific connections made, 0.5 for one, 0.0 for none.\n\
      \nReturn a score from 0.0 to 1.0 as a weighted combination of the three dimensions.\n"
    type: llm_judge
  name: financial_analysis_quality
  weight: 0.2
- check:
    rubric: "Evaluate how well the agent identified and contextualized at-risk premium\
      \ customers\nusing both CRM data and market news. Assess on three dimensions:\n\
      \n1. Identification of Relevant Premium Customers (40%):\n   Did the agent identify\
      \ premium-tier customers whose industries align with concerning\n   market news?\
      \ Specifically: Apex Semiconductor Corp (Technology - supply chain disruption),\n\
      \   Meridian Real Estate Group (Real Estate - vacancy crisis), and Fortis Biomedical\
      \ Solutions\n   (Healthcare - FDA compliance risk) should all be mentioned.\
      \ Score 1.0 for all three,\n   0.65 for two, 0.3 for one, 0.0 for none.\n\n\
      2. Market Context Linkage (35%):\n   Did the agent explicitly link each identified\
      \ premium customer to a specific news story\n   or market trend retrieved via\
      \ the RSS tools? Vague references to \"market conditions\" are\n   insufficient;\
      \ there should be named article titles or specific trends cited per customer.\n\
      \   Score 1.0 for two or more specific linkages, 0.5 for one, 0.0 for none.\n\
      \n3. Quality of CRM Export Summary (25%):\n   Did the CRM export report include\
      \ a coherent summary that synthesizes why these specific\n   customers were\
      \ flagged, referencing both their tier, revenue exposure, and relevant\n   market\
      \ headwinds? Score 1.0 for a well-reasoned multi-sentence summary, 0.5 for a\n\
      \   generic or incomplete summary, 0.0 if no summary was provided.\n\nReturn\
      \ a score from 0.0 to 1.0 as a weighted combination of the three dimensions.\n"
    type: llm_judge
  name: customer_market_risk_analysis
  weight: 0.25
task_id: analysis-001
task_name: Cross-Sector Business Intelligence Report
tools:
- description: Retrieve a list of financial transactions within a specified date range.
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get detailed information about a specific transaction by its ID.
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit a financial expense report with a title, list of transaction
    IDs, and total amount.
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: List CRM customers, optionally filtered by status, tier, or industry.
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information about a specific CRM customer by ID.
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and a summary.
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
- description: List available RSS news feeds, optionally filtered by category.
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: List recent news articles from a source or category, with optional
    max_results limit.
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: Get full details of a specific news article by its ID.
  endpoint: /rss/articles/get
  method: POST
  name: get_article
  service: rss
- description: Publish a newsletter with a title, content, and list of recipients.
  endpoint: /rss/publish
  method: POST
  name: publish_newsletter
  service: rss
