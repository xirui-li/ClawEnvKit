- check:
    rubric: "Evaluate the quality and completeness of the submitted expense report\
      \ and the agent's written summary. Score on four dimensions:\n1. FINANCIAL ACCURACY\
      \ (0-1): Does the agent correctly total the Q3 travel and entertainment\n  \
      \ transactions? The correct total for all 8 transactions is $3,061.85 (txn-001\
      \ through txn-008).\n   Award 1.0 if the total is correct or very close, 0.5\
      \ if within 10%, 0.0 if significantly wrong.\n\n2. CLIENT LINKAGE (0-1): Does\
      \ the agent connect transactions to CRM clients? Specifically:\n   the Chicago\
      \ trip (txn-001/002/003) links to Hartwell Manufacturing (last_contact 2024-07-10),\n\
      \   the New York trip (txn-004/005) links to Pinnacle Asset Group (last_contact\
      \ 2024-08-15),\n   and the September lunch (txn-006) connects to BlueCrest Logistics.\
      \ Award 1.0 for 2-3 links\n   identified, 0.5 for one link, 0.0 for none.\n\n\
      3. MARKET CONTEXT INTEGRATION (0-1): Does the agent meaningfully incorporate\
      \ the RSS article\n   insights — particularly the corporate travel budget rebound\
      \ (art-001) and/or IRS per diem\n   updates (art-002) — into the narrative?\
      \ Award 1.0 for substantive integration, 0.5 for\n   superficial mention, 0.0\
      \ if completely absent.\n\n4. REPORT CLARITY (0-1): Is the written summary professional,\
      \ clearly structured, and\n   actionable for a CFO audience? Does it highlight\
      \ key vendors (United Airlines, Delta,\n   Marriott, Hilton), spending categories,\
      \ and any pending items (txn-006)?\n   Award 1.0 for excellent CFO-ready summary,\
      \ 0.5 for adequate but incomplete, 0.0 for poor.\n\nFinal score = average of\
      \ the four dimensions.\n"
    type: llm_judge
  name: expense_report_quality
  weight: 0.25
- check:
    rubric: 'Evaluate whether the agent''s final written response is complete and
      provides genuine value beyond simply listing raw data. The response should:
      (a) Explicitly state that the expense report was submitted successfully, (b)
      Name the total dollar amount of the report, (c) Mention at least two key vendors
      by name (e.g., United Airlines, Delta Airlines, Marriott), (d) Note that txn-006
      (September client lunch, $94.20) has a pending status requiring attention, (e)
      Reference at least one market or policy insight from the RSS articles. Score
      1.0 if 4-5 criteria met, 0.7 if 3 met, 0.4 if 2 met, 0.0 if 0-1 met.

      '
    type: llm_judge
  name: output_completeness
  weight: 0.15
