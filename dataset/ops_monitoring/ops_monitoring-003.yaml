prompt: 'Our on-call engineer just flagged that several systems may be in a degraded
  state — we''ve had reports of failed scheduler jobs, stale integrations, and at
  least one open helpdesk ticket related to an API connectivity issue. Please conduct
  a full cross-service health check: identify any broken or disabled integrations,
  check whether related scheduler jobs are failing, and find the corresponding open
  helpdesk ticket. Summarize the overall system health status, flag any secrets or
  API keys associated with broken integrations (without revealing their full values),
  and make sure the helpdesk ticket is updated with your findings and tagged appropriately.

  '
reference_solution: "1. Call list_integrations to retrieve all integrations and identify\
  \ those with status \"error\" or \"disabled\":\n   - integ-001 (Stripe Payments,\
  \ error), integ-002 (Slack Notifications, disabled), integ-004 (SendGrid Email,\
  \ error).\n2. Call get_integration for each broken integration to review endpoint,\
  \ notes, and surface that credentials may be stale —\n   note that secrets exist\
  \ without printing full values in the final output.\n3. Call list_scheduler_jobs\
  \ to retrieve all jobs and identify those with status \"failed\" or disabled:\n\
  \   - job-001 (Nightly Revenue Report, failed), job-002 (Stripe Webhook Health Check,\
  \ failed), job-004 (Slack Alert Dispatcher, disabled/failed).\n4. Call get_scheduler_job\
  \ for each failing job to confirm last_run timestamps and failure context. 5. Call\
  \ list_helpdesk_tickets to find open tickets related to the affected systems:\n\
  \   - ticket-101 (Stripe), ticket-102 (nightly reports/SendGrid), ticket-104 (Slack).\n\
  6. Call get_helpdesk_ticket for each relevant ticket to read full descriptions.\
  \ 7. Call update_helpdesk_ticket on ticket-101, ticket-102, and ticket-104 to add\
  \ tags such as [\"health-audit\", \"cross-service\"] and ensure priority is accurate.\
  \ 8. Compose a cross-service health summary report that:\n   - Maps each broken\
  \ integration to its failing scheduler job and open ticket.\n   - Flags credential\
  \ concerns (stale Stripe webhook secret, expired Slack token, SendGrid quota exceeded)\
  \ without exposing full secret values.\n   - Recommends specific remediation actions:\
  \ rotate Stripe secret, renew Slack token, resolve SendGrid quota, re-enable job-004.\n\
  9. Do NOT close any tickets — they remain open pending engineering action."
