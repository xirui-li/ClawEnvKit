prompt: 'Our procurement team suspects that recent global shipping disruptions may
  be affecting our key logistics vendors. Pull up the latest industry news and any
  available public financial data (earnings reports, analyst commentary, or SEC filings)
  for major freight and logistics carriers — specifically looking at how supply chain
  pressures are impacting their costs and margins. Cross-reference this with our internal
  transaction records for logistics-related expenses over the past quarter, then provide
  a consolidated briefing summarizing the external environment and whether our internal
  spending patterns align with or diverge from the industry trends.

  '
reference_solution: "1. Call list_transactions with a date range covering Q4 2024\
  \ (e.g., 2024-10-01 to 2024-12-31) to retrieve\n   all seven logistics transactions\
  \ (txn-001 through txn-007).\n2. Review the transaction list; note that txn-006\
  \ ($31,900 — Maersk, Red Sea diversion surcharge) is the\n   largest and still pending.\
  \ Total spend = $97,600. Maersk appears twice ($14,750 + $31,900 = $46,650).\n3.\
  \ Call web_search with a query such as \"Maersk FedEx UPS earnings 2024 supply chain\
  \ disruption Red Sea\n   freight cost margins\" to identify relevant sources.\n\
  4. Call web_fetch on promising URLs returned by the search — e.g., Maersk or UPS\
  \ investor relations pages,\n   SEC filings, or credible financial news articles\
  \ — to retrieve substantive content about carrier cost\n   pressures, Red Sea re-routing\
  \ surcharges, and margin impacts.\n5. Optionally call web_fetch on additional sources\
  \ (e.g., BNSF or CH Robinson earnings commentary) for\n   broader context.\n6. Synthesize\
  \ the external findings with the internal transaction data: connect industry-wide\
  \ re-routing\n   surcharges to txn-006, note that emergency air cargo costs (txn-003,\
  \ $22,400 UPS) also align with\n   industry trends, and flag the pending large invoice\
  \ for approval.\n7. Produce a written briefing covering: (a) external industry environment\
  \ summary with cited sources,\n   (b) internal Q4 logistics spend breakdown by vendor\
  \ and category, (c) cross-referenced analysis of\n   alignment or divergence, and\
  \ (d) recommendations (e.g., review and approve/dispute txn-006,\n   consider long-term\
  \ rate lock contracts given ongoing disruption).\n8. Do NOT submit an expense report\
  \ or send notifications, as these were not requested."
