- check:
    rubric: "Evaluate the agent's consolidated briefing on supply chain disruption\
      \ impact. Score across four dimensions:\n1. EXTERNAL RESEARCH DEPTH (0–0.25):\
      \ Did the agent fetch real web content (not just search snippets)\n   from at\
      \ least one relevant source such as a carrier earnings report, SEC filing, analyst\
      \ note,\n   or credible news article about logistics cost pressures or the Red\
      \ Sea / shipping disruption?\n   Full credit if substantive fetched content\
      \ is cited or summarized; half credit if only search\n   results are described;\
      \ no credit if external research is absent.\n\n2. INTERNAL DATA ACCURACY (0–0.25):\
      \ Does the briefing correctly identify and reference the internal\n   transaction\
      \ records? It should note the total Q4 logistics spend (sum of txn-001 through\
      \ txn-007\n   = $97,600), call out the largest single charge (txn-006: $31,900\
      \ Maersk Red Sea re-routing\n   surcharge, status pending), and mention that\
      \ Maersk appears twice as a vendor with combined\n   spend of $46,650. Award\
      \ full credit if all three elements are present; partial credit\n   proportionally\
      \ if some are missing.\n\n3. CROSS-REFERENCING AND INSIGHT (0–0.25): Does the\
      \ agent meaningfully connect external industry\n   findings (e.g., carrier surcharges,\
      \ fuel cost increases, Red Sea diversion costs) with the\n   internal data (e.g.,\
      \ the emergency re-routing surcharge on txn-006 aligns with industry-wide\n\
      \   diversion costs)? Award full credit for a clear, logical synthesis; half\
      \ credit for superficial\n   comparison; no credit if the two data sources are\
      \ reported in isolation without connection.\n\n4. CLARITY AND ACTIONABILITY\
      \ (0–0.25): Is the briefing well-structured, easy for a procurement\n   manager\
      \ to act on, and free of hallucinated figures? Does it flag the pending txn-006\
      \ as\n   requiring approval or scrutiny? Award full credit for a clearly organized,\
      \ actionable output;\n   partial credit for a disorganized but mostly accurate\
      \ output; no credit for vague or\n   misleading content.\n\nFinal score = sum\
      \ of four dimension scores (0.0–1.0).\n"
    type: llm_judge
  name: briefing_quality_and_analysis
  weight: 0.45
task_id: finance_research-008
task_name: Supply Chain Disruption — Vendor Spend Analysis and Industry Impact Research
tools:
- description: Retrieve a list of financial transactions within a specified date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Retrieve details of a specific transaction by its ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit a compiled expense report with title, transaction IDs, and total
    amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: Perform a real web search with a query and maximum number of results
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a real web page by URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification message to a recipient with a subject and body
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web_real
