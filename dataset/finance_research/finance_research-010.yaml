- check:
    rubric: 'Evaluate the quality of the agent''s cross-reference analysis between
      internal M&A expenses and publicly announced deals. Score on three dimensions:


      1. Research Depth (40%): Did the agent search for and retrieve real public information
      about major Q4 2024 M&A deals? Did it attempt to look up SEC filings, press
      releases, or credible financial news sources? Award full credit if at least
      2 real deal sources were consulted, partial credit for 1 source, no credit if
      no real web research was done.


      2. Cross-Reference Accuracy (35%): Did the agent attempt to map internal project
      code names (Project Titan, Project Atlas, Project Horizon) to real-world deals
      or plausibly explained deal types? Did it note which vendors (e.g., Sullivan
      & Cromwell, Lazard, DOJ HSR filing) are consistent with real M&A stages (legal
      review, buy-side advisory, antitrust)? Award full credit for thoughtful mapping
      with deal status context, partial credit for surface-level matching, no credit
      for ignoring the cross-reference entirely.


      3. Deal Status Context (25%): Did the agent report on whether publicly identified
      analogous deals closed, were pending, or terminated? Did it explain what the
      antitrust filing fees and proxy solicitation expenses suggest about deal stage?
      Score 1.0 if all three dimensions are well-addressed, 0.7 if two, 0.4 if one,
      0.0 if none.

      '
    type: llm_judge
  name: cross_reference_analysis_quality
  weight: 0.2
- check:
    rubric: 'Evaluate the completeness and professionalism of the submitted M&A Advisory
      Expense Report. Consider:


      1. Transaction Coverage (40%): Did the report include all or nearly all of the
      8 Q4 2024 M&A/Deal Origination transactions? Is the total amount calculated
      correctly (approximate sum: $502,000 across all 8 transactions, or a justified
      subset)? Deduct points if major transactions like the $250,000 Lazard fee or
      $125,000 HSR filing were omitted without explanation.


      2. Narrative Quality (35%): Does the report explain the business context — i.e.,
      what each project-level cluster of expenses represents in a deal lifecycle (origination,
      diligence, legal review, closing)? Is the language professional and appropriate
      for an M&A advisory context?


      3. Actionability (25%): Does the report highlight any items requiring follow-up
      (e.g., the pending $250,000 Lazard fee, or the implications of a completed vs.
      failed deal on expense classification)? Are there any recommendations or flags
      for finance/compliance review?


      Score 1.0 if all three are strong, 0.6 if two are adequate, 0.3 if only one,
      0.0 if the report is superficial or missing critical data.

      '
    type: llm_judge
  name: report_completeness_quality
  weight: 0.15
