  name: list_transactions
  service: finance
- description: Retrieve detailed information about a specific transaction by ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit a formal expense report with title, transaction IDs, and total
    amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: Search the real web for current information, news, SEC filings, or
    financial data
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch and read the content of a specific web page or document
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send an email notification to a recipient with a subject and body
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web_real
