  name: list_transactions
  service: finance
- description: Retrieve details of a specific transaction by ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit a formatted expense report with title, transactions, and total
    amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: Perform a real web search with a query and maximum number of results
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a real web page by URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification message to a recipient with subject and body
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web_real
