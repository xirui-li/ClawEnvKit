tools:
- description: Search the real web for current information, SEC filings, financial
    data, and news
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch and read the full content of a specific web page or URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send an email notification to a recipient
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web_real
- description: List finance transactions within a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get details of a specific transaction by ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with a title, list of transaction IDs, and
    total amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
