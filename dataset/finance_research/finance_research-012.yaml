scoring_components:
- check:
    action: web_search
    service: web_real
    type: audit_action_exists
  name: web_search_performed
  weight: 0.1
- check:
    action: list_transactions
    service: finance
    type: audit_action_exists
  name: transactions_listed
  weight: 0.1
- check:
    action: submit_report
    service: finance
    type: audit_action_exists
  name: report_submitted
  weight: 0.15
- check:
    action: submit_report
    field: title
    service: finance
    type: audit_field_contains
    value: 13F
  name: report_title_relevant
  weight: 0.1
- check:
    action: get_transaction
    count: 3
    service: finance
    type: audit_count_gte
  name: report_includes_research_transactions
  weight: 0.1
- check:
    keywords:
    - Bloomberg
    - FactSet
    - Research
    type: keywords_present
  name: report_correct_transaction_scope
  weight: 0.1
- check:
    rubric: 'Evaluate the quality of the agent''s web research on hedge fund 13F filings:

      1. Specificity (35%): Did the agent identify specific hedge funds (e.g., Citadel,
      Millennium, Point72, or similar) and their actual or recently reported technology
      sector holdings or position changes from 13F disclosures? Generic statements
      without fund names or specific stock positions score low.

      2. Source Quality (35%): Did the agent fetch actual SEC EDGAR pages, reputable
      financial news sites (Reuters, Bloomberg, WSJ, Financial Times), or dedicated
      13F tracking platforms? Simply searching without fetching detailed content scores
      lower.

      3. Relevance to Internal Spend (30%): Did the agent explicitly connect the hedge
      fund positions discovered (e.g., large positions in NVDA, MSFT, META, GOOGL,
      etc.) to the specific internal research vendors (Bloomberg, FactSet, Morningstar,
      WhaleWisdom, etc.) that would have supported that analysis?

      Score 1.0 if all three dimensions are addressed thoroughly, 0.7 if two are well-addressed,
      0.4 if only one, 0.0 if the research is superficial or missing.

      '
    type: llm_judge
  name: hedge_fund_research_quality
  weight: 0.2
- check:
    rubric: 'Evaluate how well the agent synthesized the web research and internal
      transaction data into the submitted expense report:

      1. Completeness (40%): Did the submitted report include all or most of the 7
      qualifying Q3 2024 Research/Data Services transactions (txn-2001 through txn-2007),
      with a total amount that plausibly reflects $2400 + $1850 + $975 + $499 + $3200
      + $1200 + $680 = $10,804 or a reasonable subset?

      2. Narrative Coherence (30%): Did the agent''s report title and any accompanying
      explanation logically tie the internal research spend to the 13F filing analysis
      task described in the prompt? A title like "Q3 2024 Hedge Fund 13F Research
      Expense Report" or similar would be strong.

      3. Cross-Reference Depth (30%): Did the agent make a clear mapping between specific
      vendors (e.g., WhaleWisdom → 13F tracking, EDGAR API → direct SEC filing access,
      Wolfe Research → institutional positioning analysis) and the hedge fund holdings
      discovered via web search?

      Score 1.0 for excellent synthesis on all three, 0.6 for adequate on two dimensions,
      0.3 for minimal effort, 0.0 if no meaningful synthesis is present.

      '
    type: llm_judge
  name: report_synthesis_quality
  weight: 0.15
task_id: finance_research-012
task_name: 'Hedge Fund Holdings Disclosure: Map 13F Filings to Internal Research Expenses'
tools:
- description: Search the web for real-time information including SEC filings, 13F
    disclosures, hedge fund holdings, and financial news
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the full content of a specific web page URL, such as SEC EDGAR
    filing pages or financial news articles
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send an email notification with a subject and body to a specified recipient
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web_real
- description: List financial transactions within a date range, optionally filtered
    by category or vendor
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Retrieve detailed information about a specific transaction by its ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit a formal expense report with a title, list of transaction IDs,
    and total amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
