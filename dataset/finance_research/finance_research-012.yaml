    - '132950'
    type: keywords_present
  name: total_amount_accuracy
  weight: 0.1
- check:
    rubric: 'Evaluate the quality, completeness, and accuracy of the agent''s insurance
      vendor compliance audit summary. Score on the following dimensions:

      1. WEB RESEARCH QUALITY (0–0.25): Did the agent find and cite real, relevant
      financial data such as insurance industry expense ratios, SEC filings from major
      insurers (e.g., Travelers, Progressive, Allstate), or regulatory guidance (e.g.,
      NAIC, SEC disclosures)? A strong response references actual industry benchmarks
      or regulatory standards, not generic statements.

      2. TRANSACTION COVERAGE (0–0.25): Did the agent identify and include the key
      insurance transactions from the fixture data? Specifically: txn-001 (Travelers,
      $18,500), txn-002 (AIG, $42,000), txn-003 (Chubb, $27,800), txn-004 (Travelers,
      $9,400), txn-005 (Zurich, $15,200), txn-006 (Allstate, $11,300, PENDING status
      flagged), and txn-007 (Willis Towers Watson, $8,750). A strong response notes
      the pending status of txn-006 as an anomaly.

      3. COMPLIANCE RISK IDENTIFICATION (0–0.25): Did the agent identify meaningful
      compliance risks or spending anomalies? For example: unusually high D&O coverage
      cost (txn-002 at $42,000), the pending txn-006, or cyber liability trends vs.
      industry norms? Vague statements score 0.1; specific, evidence-based risks score
      0.25.

      4. REPORT COMPLETENESS (0–0.25): Did the agent submit a formal expense report
      and produce a coherent written summary that ties the web research findings to
      the internal transaction data? A strong response includes a clear verdict on
      whether spending aligns with industry norms and actionable next steps.

      Scoring: 1.0 = all four dimensions strong; 0.75 = three strong; 0.5 = two strong;
      0.25 = one strong; 0.0 = minimal or no meaningful analysis.

      '
    type: llm_judge
  name: research_and_analysis_quality
  weight: 0.35
