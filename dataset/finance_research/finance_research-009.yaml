- check:
    rubric: 'Evaluate the quality of the earnings surprise analysis in the notification
      body sent to alerts@investmentcommittee.internal. Judge on three dimensions:


      1. Earnings Data Completeness (40%): Did the agent cover all three companies
      (Microsoft/MSFT, Alphabet/GOOGL, Meta/META)? For each company, did it report
      whether the actual EPS and/or revenue beat or missed consensus analyst estimates?
      Award full credit if all three companies are addressed with specific beat/miss
      context, partial credit (0.5) if only two companies are covered, minimal credit
      (0.2) if only one company is addressed.


      2. Financial Accuracy & Specificity (35%): Did the agent include actual numbers
      (EPS figures, revenue figures, estimate comparisons) rather than vague statements?
      Does the language reflect real financial reporting conventions (e.g., "beat
      by $X", "missed consensus by Y%")? Award full credit if at least two companies
      have specific numerical data, partial credit (0.5) if numbers are present but
      vague or only for one company, minimal credit (0.1) if purely qualitative.


      3. Internal Spend Integration (25%): Did the agent reference the internal expense
      transactions related to these companies (client entertainment at Capital Grille,
      Bloomberg subscription, Meta conference, etc.)? Does the notification connect
      the spend to the relevant company? Award full credit if at least two companies
      have associated spend mentioned, partial credit (0.5) if spend is mentioned
      in aggregate only, minimal credit (0.0) if no internal spend data is referenced.


      Score as a weighted combination of the three dimensions from 0.0 to 1.0.

      '
    type: llm_judge
  name: earnings_analysis_quality
  weight: 0.25
- check:
    actions:
    - web_search
    - send_notification
    service: web_real
    type: audit_sequence
  name: notification_and_search_sequence
  weight: 0.08
- check:
    rubric: 'Evaluate the professional quality and structure of the notification sent
      by the agent to the investment committee. Assess:


      1. Professional Tone (50%): Is the language appropriate for an investment committee
      audience — formal, precise, and free of casual phrasing? Does it read like a
      genuine financial alert memo?


      2. Structure & Readability (30%): Is the notification organized clearly — e.g.,
      with a header, per-company sections, and a summary? Is it easy to scan quickly
      for key findings?


      3. Actionability (20%): Does the notification help the committee make a decision
      or take next steps, rather than just presenting raw data? Does it conclude with
      a summary or implication?


      Score 1.0 if all three dimensions are excellent, 0.7 if two are strong, 0.4
      if only one is adequate, 0.0 if the notification is unprofessional or lacks
      meaningful structure.

      '
    type: llm_judge
  name: notification_professionalism_and_structure
  weight: 0.07
