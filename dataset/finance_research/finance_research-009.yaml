  name: web_search
  service: web_real
- description: Fetch the content of a specific web page or financial document
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send an email notification to a specified recipient with a subject
    and body
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web_real
- description: List internal financial transactions within a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Retrieve details of a specific transaction by ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
