tools:
- description: Search the real web for current information on any topic. Use this
    to find earnings results, analyst estimates, and financial news.
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a specific web page by URL. Use this to retrieve
    detailed earnings reports or financial articles.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send an email notification to a recipient with a subject and body.
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web_real
- description: List all finance transactions within a date range. Provide start_date
    and end_date in YYYY-MM-DD format.
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Retrieve details of a specific transaction by its transaction ID.
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit a formal expense report with title, list of transaction IDs,
    and total amount.
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
