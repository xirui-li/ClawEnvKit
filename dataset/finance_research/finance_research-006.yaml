    count: 3
    service: web_real
    type: audit_count_gte
  name: esg_web_searches_performed
  weight: 0.1
- check:
    action: submit_report
    field: total_amount
    service: finance
    type: audit_field_contains
    value: '42200'
  name: report_total_amount_range
  weight: 0.07
- check:
    actions:
    - list_transactions
    - web_search
    - submit_report
    service: finance
    type: audit_sequence
  name: correct_workflow_sequence
  weight: 0.05
- check:
    keywords:
    - ESG
    - sustainability
    - carbon
    - emissions
    type: keywords_present
  name: esg_keywords_in_output
  weight: 0.1
- check:
    rubric: "Evaluate the quality of the agent's ESG vendor research across three\
      \ dimensions:\n\n1. Coverage (40%): Did the agent search for and retrieve publicly\
      \ available ESG information\n   for at least 4 of the 7 vendors (South Pole\
      \ Group, Schneider Electric, 3Degrees Group,\n   Stericycle, Watershed, Interface\
      \ Inc, ERM Group)? Score higher if more vendors are covered.\n   Full credit\
      \ if 5+, partial for 3-4, minimal for 1-2.\n\n2. Source Quality (30%): Did the\
      \ agent attempt to retrieve substantive ESG data — such as\n   CDP scores, sustainability\
      \ reports, ESG ratings, net-zero commitments, or third-party\n   ratings (MSCI,\
      \ Sustainalytics)? Or did it only retrieve superficial homepage content?\n \
      \  Full credit for at least 2 substantive ESG sources fetched, partial for 1.\n\
      \n3. Synthesis (30%): Did the agent connect the vendor ESG profiles back to\
      \ the internal spend\n   data — identifying which vendors are strong ESG performers\
      \ relative to what was spent,\n   and flagging any potential misalignments (e.g.,\
      \ spending with a vendor that has poor\n   ESG disclosure)? Full credit for\
      \ explicit alignment/misalignment commentary on at least\n   2 vendors, partial\
      \ for generic observations, none for no synthesis.\n\nScore 0.0–1.0 as a weighted\
      \ combination of the three dimensions above.\n"
    type: llm_judge
  name: vendor_research_quality
  weight: 0.2
- check:
    rubric: "Evaluate the quality of the final submitted expense report and any accompanying\
      \ summary\non the following dimensions:\n\n1. Completeness (35%): Does the report\
      \ include all or most of the 7 sustainability/\n   environmental transactions?\
      \ Is the total amount approximately correct ($42,200)?\n   Are transaction IDs\
      \ referenced? Score 1.0 if 6-7 transactions included, 0.6 if 4-5,\n   0.3 if\
      \ fewer.\n\n2. ESG Alignment Commentary (35%): Does the report body or the agent's\
      \ final output\n   contain meaningful narrative about how internal spending\
      \ aligns with vendor ESG\n   performance? This should go beyond simply listing\
      \ vendors — it should offer\n   observations about ESG leaders vs. laggards\
      \ among the vendors, or note specific\n   commitments (e.g., science-based targets,\
      \ B Corp status, CDP ratings). Score 1.0\n   for substantive commentary on 3+\
      \ vendors, 0.5 for brief mentions, 0.0 for none.\n\n3. Professionalism and Structure\
      \ (30%): Is the report title correct (\"Q1 ESG Vendor\n   Spend Alignment Report\"\
      \ or very close)? Is the output well-organized, clearly written,\n   and suitable\
      \ for a sustainability team audience? Does it avoid vague filler language?\n\
      \   Score 1.0 for a polished, structured report, 0.5 for adequate but rough,\
      \ 0.0 for\n   disorganized or incomplete.\n\nScore 0.0–1.0 as a weighted combination\
      \ of the three dimensions above.\n"
    type: llm_judge
  name: report_narrative_quality
  weight: 0.2
task_id: finance_research-006
task_name: 'ESG Spend Alignment Report: Match Internal Sustainability Expenses Against
  Public ESG Disclosures'
tools:
- description: List finance transactions within a date range. Returns transaction
    records with id, date, description, amount, category, vendor, and status.
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get a specific transaction by its transaction_id.
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with a title, list of transaction IDs, and
    total amount.
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: Perform a real web search with a query string and optional max_results
    parameter.
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a real web page by URL.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification/email to a recipient with a subject and body.
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web_real
