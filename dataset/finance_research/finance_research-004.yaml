  weight: 0.1
- check:
    action: web_search
    field: query
    service: web_real
    type: audit_field_contains
    value: SaaS
  name: web_search_saas_benchmarks
  weight: 0.08
- check:
    action: submit_report
    field: title
    service: finance
    type: audit_field_equals
    value: Q1 2024 Spend Benchmarking Report
  name: report_submitted_correct_title
  weight: 0.12
- check:
    action: submit_report
    field: total_amount
    service: finance
    type: audit_field_equals
    value: 57050.0
  name: report_total_amount_correct
  weight: 0.08
- check:
    keywords:
    - Cloud Infrastructure
    - Software
    - Travel
    - Marketing
    type: keywords_present
  name: report_includes_all_transactions
  weight: 0.1
- check:
    rubric: 'Evaluate the quality of the agent''s web research on SaaS industry spending
      benchmarks across these dimensions:


      1. Coverage (40%): Did the agent search for benchmarks across all four spend
      categories present in the transactions (Cloud Infrastructure, Software & SaaS,
      Travel & Events, Marketing & Advertising)? Full marks if all four are researched;
      partial if two or three; minimal if only one.


      2. Source Quality (30%): Did the agent fetch actual web pages or cite recognizable
      industry sources (e.g., Bessemer Venture Partners, OpenView, SaaStr, Gartner,
      IDC, public SaaS benchmarking studies)? Full marks for credible sources; partial
      for generic searches without fetching; minimal for no identifiable sources.


      3. Relevance (30%): Are the benchmarks retrieved actually relevant to mid-size
      SaaS companies (not enterprise Fortune 500 or micro-startups)? Full marks if
      agent explicitly scopes research to mid-size SaaS; partial if general SaaS;
      minimal if completely unrelated.


      Score 0.0–1.0 as a weighted combination of the three dimensions above.

      '
    type: llm_judge
  name: benchmark_research_quality
  weight: 0.2
- check:
    rubric: 'Evaluate how well the agent synthesized internal transaction data with
      industry benchmark research in the submitted expense report:


      1. Category Grouping (30%): Did the agent correctly aggregate transaction amounts
      by category (Cloud Infrastructure: $19,800; Software & SaaS: $11,000; Travel
      & Events: $8,750; Marketing & Advertising: $17,500)?


      2. Benchmark Context (40%): Does the report body or agent output include a meaningful
      industry context note for each spending category — not just a number, but an
      explanation of how the company''s spend compares (above/below/in-line with benchmarks)?


      3. Actionability (30%): Does the agent''s output include at least one insight
      or recommendation based on the comparison (e.g., identifying a category where
      spend seems high or low relative to peers)?


      Score 1.0 if all three dimensions are satisfied, 0.7 if two, 0.3 if one, 0.0
      if none.

      '
    type: llm_judge
  name: report_synthesis_quality
  weight: 0.1
task_id: finance_research-004
task_name: Benchmark Internal Spend Against Industry Peers and Submit Category Analysis
  Report
tools:
- description: List all financial transactions within a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get details of a specific transaction by transaction_id
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with title, list of transaction IDs, and total
    amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: Search the web for real-time information
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a real web page by URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification email to a recipient
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web_real
