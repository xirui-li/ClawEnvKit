scoring_components:
- check:
    action: web_search
    service: web_real
    type: audit_action_exists
  name: web_search_used
  weight: 0.1
- check:
    action: list_transactions
    service: finance
    type: audit_action_exists
  name: finance_transactions_retrieved
  weight: 0.1
- check:
    action: submit_report
    service: finance
    type: audit_action_exists
  name: expense_report_submitted
  weight: 0.1
- check:
    field: title
    type: audit_field_equals
    value: R&D Benchmarking Q4 Analysis
  name: report_title_correct
  weight: 0.1
- check:
    keywords:
    - txn-1001
    - txn-1003
    - txn-1007
    type: keywords_present
  name: rd_transactions_included
  weight: 0.15
- check:
    keywords:
    - NVIDIA
    - AMD
    - Intel
    type: keywords_present
  name: competitor_rd_figures_present
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s competitive intelligence report on the following
      dimensions:

      1. COMPETITOR R&D DATA (0.0–0.4): Does the report include specific, plausible
      R&D expenditure figures (in billions of dollars) for NVIDIA, AMD, and Intel
      sourced from recent annual reports or earnings filings? Does it mention year-over-year
      growth or trends for at least two of the three companies? Award 0.4 if all three
      have figures and growth commentary, 0.2 if two companies are covered, 0.1 if
      only one.

      2. INTERNAL R&D RECONCILIATION (0.0–0.3): Does the agent correctly identify
      the six R&D-category transactions (txn-1001: $42,500 MIT, txn-1002: $8,750 Ansys,
      txn-1003: $31,200 TSMC, txn-1004: $19,400 AWS, txn-1005: $5,800 Hot Chips, txn-1007:
      $7,650 USPTO) and correctly exclude the non-R&D transaction txn-1006 (Marriott,
      Marketing, $12,300)? Does it compute or report the correct total of approximately
      $115,300? Award 0.3 if all correct, 0.15 if minor errors, 0.0 if non-R&D transaction
      is included or total is wrong.

      3. COMPARATIVE INSIGHT (0.0–0.2): Does the report draw a meaningful comparison
      between the company''s internal Q4 R&D spend and the annualized or quarterly
      R&D spend of the peer companies, contextualizing scale or intensity? Award 0.2
      for substantive comparison, 0.1 for superficial mention, 0.0 if absent.

      4. CLARITY AND STRUCTURE (0.0–0.1): Is the output well-organized with clear
      sections (e.g., peer benchmarks, internal spend, comparison, conclusion)? Award
      0.1 if clearly structured, 0.05 if somewhat readable, 0.0 if disorganized.

      Final score = sum of dimension scores (max 1.0).

      '
    type: llm_judge
  name: report_quality_and_accuracy
  weight: 0.3
