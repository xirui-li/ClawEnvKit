category: content_rewriting
difficulty: medium
files: []
fixtures:
  kb:
    articles:
    - author: Sarah Mitchell
      category: security
      content: 'Cloud security is an evolving field. Organizations should enforce
        strong IAM policies, encrypt data at rest and in transit, and regularly audit
        access logs. Multi-factor authentication (MFA) is recommended for all privileged
        accounts. Patch management should follow a monthly cadence. Backup strategies
        must be tested quarterly.

        '
      id: art-001
      last_updated: '2023-01-15'
      title: Cloud Security Best Practices
    - author: David Chen
      category: infrastructure
      content: 'Kubernetes networking enables pod-to-pod communication across nodes.
        Key concepts include Services, Ingress controllers, and CNI plugins. Network
        policies restrict traffic between namespaces. DNS resolution is handled by
        CoreDNS within the cluster.

        '
      id: art-002
      last_updated: '2023-06-10'
      title: Introduction to Kubernetes Networking
    - author: James Okafor
      category: security
      content: 'When a security incident is detected, the on-call team must be paged
        within 15 minutes. Severity levels range from P1 (critical) to P4 (informational).
        All incidents must be documented in the ticketing system. Post-mortems are
        mandatory for P1 and P2 incidents.

        '
      id: art-003
      last_updated: '2023-03-22'
      title: Incident Response Runbook
    - author: Sarah Mitchell
      category: compliance
      content: 'Customer data must be retained for a minimum of 7 years per regulatory
        requirements. Logs are archived after 90 days and deleted after 2 years. PII
        must be anonymized before archival. Deletion requests from customers must
        be fulfilled within 30 days.

        '
      id: art-004
      last_updated: '2023-09-01'
      title: Data Retention Policy
    - author: Priya Nair
      category: hr
      content: 'New engineers should complete the security awareness training within
        their first week. Access provisioning follows the principle of least privilege.
        A buddy system pairs new hires with a senior engineer for the first 60 days.
        All credentials must be stored in the company-approved password manager.

        '
      id: art-005
      last_updated: '2023-11-05'
      title: Onboarding New Engineers
  rss:
    articles:
    - category: security
      date: '2024-03-10'
      id: rss-art-001
      source: feed-002
      summary: 'Leading cloud providers and NIST are pushing organizations to adopt
        Zero Trust models, where no user or system is trusted by default even inside
        the network perimeter. Continuous verification, micro-segmentation, and least-privilege
        access are pillars of the approach. Gartner predicts 60% of enterprises will
        adopt Zero Trust by 2025.

        '
      title: 'Zero Trust Architecture: Why Perimeter Security Is No Longer Enough'
    - category: security
      date: '2024-03-15'
      id: rss-art-002
      source: feed-001
      summary: 'A wave of supply chain attacks targeting cloud-hosted software packages
        has prompted renewed focus on software bill of materials (SBOM) and dependency
        scanning. Security teams are advised to pin dependency versions, use private
        artifact registries, and integrate automated vulnerability scanning into CI/CD
        pipelines.

        '
      title: 'Supply Chain Attacks Surge: How to Secure Your Cloud Dependencies'
    - category: security
      date: '2024-03-18'
      id: rss-art-003
      source: feed-002
      summary: 'New studies show that organizations deploying AI-driven security information
        and event management (SIEM) tools see breach detection times drop from an
        average of 197 days to under 30 days. Cloud-native SIEM solutions integrate
        directly with IAM and audit logs to flag anomalous behavior in real time.

        '
      title: AI-Powered Threat Detection Reduces Cloud Breach Response Times by 40%
    - category: security
      date: '2024-03-20'
      id: rss-art-004
      source: feed-001
      summary: 'A new report reveals that 35% of cloud data breaches in 2023 stemmed
        from customer misconfiguration, particularly publicly exposed storage buckets.
        Experts urge organizations to use cloud security posture management (CSPM)
        tools and automate configuration compliance checks continuously rather than
        relying on periodic audits.

        '
      title: Shared Responsibility Model Confusion Leads to Misconfigured S3 Buckets
    - category: infrastructure
      date: '2024-03-12'
      id: rss-art-005
      source: feed-003
      summary: 'Kubernetes v1.30 introduces graduated network policy features including
        admin network policies that allow cluster administrators to set baseline rules
        overriding namespace-level policies. This change significantly improves multi-tenant
        cluster security posture.

        '
      title: Kubernetes Network Policies Get a Security Overhaul in v1.30
