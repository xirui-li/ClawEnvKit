prompt: I have a really packed Thursday next week (2025-07-24) and my manager mentioned
  I have back-to-back meetings that collectively run more than 3 hours without a break.
  Please find all my meetings on that day as user 'sarah.chen', identify which consecutive
  block is the problem, and delete the last meeting in that block so I have breathing
  room in the afternoon.
reference_solution:
- Call user_events with user='sarah.chen' and date='2025-07-24' to retrieve all events
  for that day.
- Examine the returned events and sort them chronologically by start_time.
- 'Identify consecutive meetings with no gap between end_time of one and start_time
  of the next: evt-001 (09:00–09:30), evt-002 (09:30–10:30), evt-003 (10:30–11:30),
  evt-004 (11:30–12:30) form a 3.5-hour back-to-back block.'
- Determine that this block exceeds 3 hours (it spans exactly 3.5 hours with no breaks).
- Identify evt-004 ('Sprint Planning') as the last meeting in the problematic consecutive
  block.
- Call delete_event with event_id='evt-004' to remove Sprint Planning and create a
  break in the afternoon.
- Report back to the user confirming the deletion and explaining which block was identified.
