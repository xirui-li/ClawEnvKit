  name: key_logistics_present
  weight: 0.15
- check:
    rubric: "Evaluate the quality and completeness of the vendor onboarding briefing\
      \ the agent produced. Score on three dimensions:\n1. COMPLETENESS (0–0.4): Does\
      \ the briefing cover all five vendor onboarding events —\n   evt-101 (CloudSync\
      \ Solutions, Nov 18, Conference Room A, Floor 3),\n   evt-102 (DataBridge Analytics,\
      \ Nov 19, Zoom),\n   evt-103 (PrintPro Supplies, Nov 20, Main Lobby Meeting\
      \ Room),\n   evt-104 (SecureNet IT, Nov 21, IT Suite Floor 5),\n   evt-106 (GreenFleet\
      \ Logistics, Nov 22, Conference Room B, Floor 2)?\n   Award 0.4 if all five\
      \ are covered with correct details, 0.2 if three or four, 0.1 if one or two,\
      \ 0.0 if none.\n\n2. ACCURACY OF DETAILS (0–0.4): For each event, does the briefing\
      \ correctly report\n   attendee names/emails, organizer, exact start/end times,\
      \ and location?\n   Check at minimum: sarah.kim organizes CloudSync (evt-101),\
      \ raj.patel organizes SecureNet (evt-104),\n   anna.bloom organizes GreenFleet\
      \ (evt-106), and that DataBridge is virtual (Zoom).\n   Award 0.4 if all details\
      \ are accurate and specific, 0.2 if mostly correct with minor omissions, 0.0\
      \ if largely inaccurate.\n\n3. USABILITY FOR HR COORDINATOR (0–0.2): Is the\
      \ briefing clearly structured so an HR coordinator\n   can quickly find each\
      \ session's logistics? Does it present information in a scannable,\n   organized\
      \ format (e.g., per-event sections with date, time, location, attendees)?\n\
      \   Award 0.2 if well-organized and actionable, 0.1 if partially structured,\
      \ 0.0 if disorganized or hard to parse.\n\nFinal score = sum of three dimension\
      \ scores (max 1.0).\n"
    type: llm_judge
  name: briefing_quality
  weight: 0.35
