prompt: 'Our new HR coordinator needs a detailed briefing on all upcoming vendor onboarding
  sessions scheduled this week so she can prepare welcome packets and logistics. For
  each session, please pull the full event details including attendees, location,
  and timing, then summarize everything in a clear briefing document she can reference.

  '
reference_solution: "1. Call list_events for the week of 2024-11-18 through 2024-11-22\
  \ to retrieve all events\n   scheduled during that period.\n2. Scan the returned\
  \ list and identify the five events whose titles contain \"Vendor Onboarding\":\n\
  \   evt-101 (CloudSync Solutions), evt-102 (DataBridge Analytics), evt-103 (PrintPro\
  \ Supplies),\n   evt-104 (SecureNet IT), and evt-106 (GreenFleet Logistics). Note\
  \ that evt-105\n   (Quarterly Budget Review) is not a vendor onboarding session\
  \ and should be excluded.\n3. Call get_event for each of the five vendor onboarding\
  \ event IDs (evt-101, evt-102,\n   evt-103, evt-104, evt-106) to retrieve full details\
  \ including attendees, location, organizer,\n   and exact start/end times.\n4. Compile\
  \ the results into a clear, HR-friendly briefing that lists each session in\n  \
  \ chronological order with all logistical details: date, time, location (noting\
  \ Zoom for\n   DataBridge), organizer, and full attendee list. Exclude the budget\
  \ review event."
