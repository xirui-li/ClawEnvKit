tools:
- description: List all calendar events for a given date range
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get full details of a specific calendar event by its ID
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Create a new calendar event with title, time, attendees, and location
  endpoint: /calendar/events/create
  method: POST
  name: create_event
  service: calendar
- description: Delete a calendar event by its ID
  endpoint: /calendar/events/delete
  method: POST
  name: delete_event
  service: calendar
