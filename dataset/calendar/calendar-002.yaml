prompt: I need to schedule a one-hour lunch meeting with Sarah Chen and Marcus Webb
  tomorrow, January 15th 2025. Check if both of them are free between 12:00 PM and
  1:00 PM, and if so, book a meeting called "Lunch Sync" at The Rooftop Bistro for
  that time slot.
reference_solution:
- Call user_events with user=sarah.chen@company.com and date=2025-01-15 to retrieve
  Sarah's schedule
- Call user_events with user=marcus.webb@company.com and date=2025-01-15 to retrieve
  Marcus's schedule
- Review both schedules and confirm neither Sarah nor Marcus has any event conflicting
  with 12:00 PM to 1:00 PM on January 15th (existing events are at 9:00, 10:00, 14:00,
  and 15:30 — no conflict)
- Call create_event with title="Lunch Sync", start_time="2025-01-15T12:00:00", end_time="2025-01-15T13:00:00",
  attendees=["sarah.chen@company.com","marcus.webb@company.com"], location="The Rooftop
  Bistro"
- Report back to the user confirming the meeting has been scheduled successfully with
  the event details
