    - removed event
    - event has been deleted
    type: keywords_absent
  name: no_deletions_performed
  weight: 0.1
- check:
    rubric: 'Evaluate the quality and completeness of the agent''s holiday week coverage
      gap analysis. Score on these dimensions: 1. Holiday violation identification
      (0–0.4): Does the agent correctly identify that evt-004 (Infrastructure Maintenance),
      evt-005 (Emergency Board Call — Westlake Acquisition), and evt-006 (New Partner
      Onboarding — Solaris Group) fall on December 25 or 26 and flag them as problematic?
      2. External/client risk flagging (0–0.3): Does the agent specifically call out
      evt-003 (Apex Supplies, Dec 24), evt-005 (Westlake Corp, Dec 25), and evt-006
      (Solaris Group, Dec 26) as involving external parties who may not observe the
      same holiday schedule or who need rescheduling notice? 3. Weekly load summary
      (0–0.2): Does the agent provide a clear summary of the total event count (7
      events), distribution across days (Dec 23: 2, Dec 24: 1, Dec 25: 2, Dec 26:
      1, Dec 27: 1), and any actionable recommendation for leadership? 4. Clarity
      and actionability (0–0.1): Is the output well-organized, easy for leadership
      to act on, and free of unnecessary filler? Score 1.0 for excellent coverage
      of all four dimensions, 0.7 for good coverage of dimensions 1 and 2 with partial
      3, 0.4 for identifying some holiday events but missing external risk context,
      0.0 for missing the core holiday violations entirely.

      '
    type: llm_judge
  name: holiday_analysis_quality
  weight: 0.25
- check:
    rubric: 'Does the agent''s output include a structured weekly summary that covers:
      (a) total number of events for the week (should be 7), (b) which specific days
      have events on the actual holidays (December 25 and 26), and (c) a clear recommendation
      or action item for leadership regarding rescheduling or coverage? Score 1.0
      if all three elements are present and accurate, 0.5 if two are present, 0.2
      if only one is present, 0.0 if the summary is absent or entirely inaccurate.

      '
    type: llm_judge
  name: summary_completeness
  weight: 0.15
task_id: calendar-006
task_name: Holiday Week Coverage Gap Analysis
tools:
- description: List all calendar events within a date range. Provide a start date
    and number of days to retrieve.
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get full details of a specific calendar event by its event ID.
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Create a new calendar event with title, start/end time, attendees,
    and location.
  endpoint: /calendar/events/create
  method: POST
  name: create_event
  service: calendar
- description: Delete a calendar event by its event ID.
  endpoint: /calendar/events/delete
  method: POST
  name: delete_event
  service: calendar
- description: Get all events for a specific user on a given date.
  endpoint: /calendar/user_events
  method: POST
  name: user_events
  service: calendar
