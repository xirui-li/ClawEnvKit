prompt: 'Our office is closed December 25–26, but we need to ensure critical client-facing
  meetings are not accidentally scheduled during the holiday week of December 23–27,
  2024. Please review all events scheduled that week and identify any that fall on
  December 25 or 26 (the actual holidays), flag any events with external clients or
  partners that may need to be rescheduled, and give me a summary of the overall calendar
  load for that week so leadership can plan coverage accordingly.

  '
reference_solution:
- Call list_events with date='2024-12-23' and days=5 to retrieve all events for the
  holiday week (December 23–27, 2024).
- 'Review the returned events and identify those falling on December 25 (evt-004:
  Infrastructure Maintenance, evt-005: Emergency Board Call — Westlake Acquisition)
  and December 26 (evt-006: New Partner Onboarding — Solaris Group) as holiday violations.'
- Optionally call get_event on evt-004, evt-005, and evt-006 to confirm attendee details
  and external party involvement.
- 'Flag events with external attendees across the full week: evt-001 (Meridian Partners,
  Dec 23), evt-003 (Apex Supplies, Dec 24), evt-005 (Westlake Corp, Dec 25), evt-006
  (Solaris Group, Dec 26) as requiring rescheduling communication.'
- 'Compile a weekly load summary: 7 total events, 2 on Dec 23, 1 on Dec 24, 2 on Dec
  25 (holiday), 1 on Dec 26 (holiday), 1 on Dec 27.'
- Present findings to leadership with specific event IDs, titles, and a recommendation
  to reschedule the three holiday-day events and notify external parties for the client-facing
  meetings.
