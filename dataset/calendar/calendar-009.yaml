prompt: 'I need to set up weekly one-on-one meetings between myself (sarah.chen@company.com)
  and each of my three direct reports — marcus.johnson@company.com, priya.patel@company.com,
  and derek.wu@company.com — every Monday starting next week (2025-02-03). Each session
  should be 30 minutes long, scheduled back-to-back beginning at 9:00 AM, but only
  if those time slots are free for both me and the respective direct report. Check
  each person''s Monday schedule first, avoid any existing conflicts, and create all
  three one-on-ones if possible, or skip and report any that cannot be booked without
  overlap.

  '
reference_solution: "1. Call user_events for sarah.chen@company.com on 2025-02-03\
  \ to retrieve her schedule.\n   Identify busy slots: 08:00–09:00 (Leadership Sync),\
  \ 09:00–09:30 (Budget Planning Prep),\n   11:00–12:00 (All-Hands).\n2. Call user_events\
  \ for marcus.johnson@company.com on 2025-02-03.\n   Identify busy slots: 09:30–11:00\
  \ (Sprint Planning), 11:00–12:00 (All-Hands).\n3. Call user_events for priya.patel@company.com\
  \ on 2025-02-03.\n   Identify busy slots: 10:00–11:00 (Roadmap Review), 11:00–12:00\
  \ (All-Hands).\n4. Call user_events for derek.wu@company.com on 2025-02-03.\n  \
  \ Identify busy slots: 11:00–12:00 (All-Hands), 13:00–13:30 (Onboarding), 14:00–15:00\
  \ (Design Review).\n5. Determine proposed slots starting at 9:00 AM in 30-min blocks:\n\
  \   - Slot 1: 09:00–09:30 → sarah is busy (Budget Planning Prep). This slot is BLOCKED.\n\
  \     Shift or skip: sarah cannot do 09:00–09:30 with anyone.\n   - Reconsider:\
  \ Since sarah is busy 09:00–09:30, shift all slots:\n     Try 09:30–10:00 for marcus:\
  \ sarah free, marcus free → BOOK.\n     Try 10:00–10:30 for priya: sarah free, priya\
  \ free (Roadmap Review starts 10:00) → CONFLICT for priya, SKIP.\n     Try 10:30–11:00\
  \ for derek: sarah free, derek free → BOOK.\n6. Create event: \"1:1 Sarah & Marcus\"\
  \ 2025-02-03T09:30:00–10:00:00, attendees [sarah.chen, marcus.johnson].\n7. Report\
  \ that priya.patel's 10:00 slot conflicts with her Product Roadmap Review; skip\
  \ and notify.\n8. Create event: \"1:1 Sarah & Derek\" 2025-02-03T10:30:00–11:00:00,\
  \ attendees [sarah.chen, derek.wu].\n9. Summarise: 2 one-on-ones created (Marcus\
  \ at 9:30, Derek at 10:30), Priya skipped due to conflict."
