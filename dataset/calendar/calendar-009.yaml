tools:
- description: List all calendar events for a given date range.
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Retrieve full details of a specific event by its ID.
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Create a new calendar event with title, start/end time, attendees,
    and location.
  endpoint: /calendar/events/create
  method: POST
  name: create_event
  service: calendar
- description: Delete an existing calendar event by its ID.
  endpoint: /calendar/events/delete
  method: POST
  name: delete_event
  service: calendar
- description: Get all calendar events for a specific user on a given date.
  endpoint: /calendar/user_events
  method: POST
  name: user_events
  service: calendar
