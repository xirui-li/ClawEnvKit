- check:
    rubric: 'The agent should have checked each direct report''s Monday (2025-02-03)
      schedule along with sarah.chen''s schedule before creating any events. It should
      have identified that the 9:00 AM slot conflicts for sarah (Budget Planning Prep,
      evt-006) and for marcus (Sprint Planning starts at 9:30, so 9:00–9:30 is free
      for marcus but 9:30–10:00 is blocked). The agent should have attempted to book
      available 30-minute slots for each pair, skipped or reported any that could
      not be booked without overlap, and clearly communicated which one-on-ones were
      created and which were skipped with reasons. Award full marks if all conflicts
      are correctly identified, at least two valid one-on-ones are created, and the
      conflict explanation is clear.

      '
    type: llm_judge
  name: solution_quality
  weight: 0.1
task_id: calendar-009
