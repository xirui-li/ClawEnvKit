- check:
    rubric: Evaluate whether the agent correctly analyzed Maya Chen's March 18, 2026
      schedule and completed the request. Full credit (1.0) if the response clearly
      identifies that the proposed 2:00–2:30 PM meeting conflicts with 'Investor Board
      Prep' (evt-1002), notes that this event runs from 1:30 PM to 2:15 PM, and states
      that the earliest available 30-minute slot between 1:00 PM and 5:00 PM is 2:30
      PM to 3:00 PM because 3:00 PM to 3:30 PM is blocked by 'Candidate Debrief' and
      4:00 PM to 4:30 PM is blocked by 'Finance Sync'. The response should also confirm
      that a new meeting was booked at Harbor Room with Jordan Patel attending. Partial
      credit (0.5) if the booked slot or conflict identification is mostly correct
      but one supporting detail is missing. Score 0.0 if the conflict event or booked
      time is wrong.
    type: llm_judge
  name: response_quality
  weight: 0.2
