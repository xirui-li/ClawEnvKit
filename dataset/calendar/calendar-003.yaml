prompt: I'm coordinating a last-minute investor prep session for Maya Chen on March
  18, 2026. Check her calendar that day, tell me which existing event conflicts with
  a new 2:00–2:30 PM prep meeting, then schedule the prep session at the earliest
  open 30-minute slot between 1:00 PM and 5:00 PM at Harbor Room with Jordan Patel
  attending, and summarize what you booked.
reference_solution: '1. List calendar events for March 18, 2026 to inspect Maya Chen''s
  schedule during the 1:00 PM to 5:00 PM window.

  2. Identify that the requested 2:00–2:30 PM slot overlaps with the existing event
  ''Investor Board Prep'' from 1:30 PM to 2:15 PM.

  3. Determine the earliest open 30-minute slot after that conflict within the requested
  window. Since 2:15–2:30 is only 15 minutes and 3:00–3:30 conflicts with Candidate
  Debrief, the earliest valid opening is 2:30–3:00 PM.

  4. Create a new event titled ''Investor Prep Session'' from 2026-03-18T14:30:00
  to 2026-03-18T15:00:00 at Harbor Room, including Maya Chen and Jordan Patel as attendees.

  5. Respond with a concise summary naming the conflicting event and the newly scheduled
  meeting details.'
