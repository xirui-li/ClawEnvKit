prompt: Our project kickoff meeting with the Apex team has been cancelled. Please
  find the event titled 'Apex Project Kickoff' on my calendar and remove it. Let me
  know once it's been deleted.
reference_solution:
- Call list_events with a date range covering November 2024 to retrieve all upcoming
  events.
- Scan the returned events list to find the event with title "Apex Project Kickoff"
  and note its id (evt-001).
- Call delete_event with event_id "evt-001" to remove the event from the calendar.
- Confirm to the user that the "Apex Project Kickoff" event has been successfully
  deleted.
