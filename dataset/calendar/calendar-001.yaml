scoring_components:
- check:
    action: list_events
    service: calendar
    type: audit_action_exists
  name: used_list_events
  weight: 0.15
- check:
    keywords:
    - June 4
    - Design Sprint
    - Cross-team Alignment
    - alice@company.com
    type: keywords_present
  name: key_events_mentioned
  weight: 0.15
- check:
    keywords:
    - June 4
    - busiest
    type: keywords_present
  name: busiest_day_identified
  weight: 0.15
- check:
    keywords:
    - June 5
    type: keywords_present
  name: free_day_identified
  weight: 0.1
- check:
    keywords:
    - created event
    - new event has been scheduled
    - event created
    type: keywords_absent
  name: no_event_creation
  weight: 0.05
- check:
    rubric: 'Evaluate the agent''s weekly capacity summary across three dimensions:

      1. ACCURACY (0–0.4): Does the agent correctly identify June 4 as the busiest
      day (3 events: evt-004 Design Sprint Kickoff, evt-005 Finance & Budget Review,
      evt-006 Cross-team Alignment Call)? Does it note June 2 has 2 events (evt-001,
      evt-002), June 3 has 1 event (evt-003), June 5 has 1 event (evt-007), and June
      6 has 1 event (evt-008)? Score 0.4 if all counts correct, 0.2 if June 4 is correctly
      flagged as busiest but some other counts are wrong, 0.0 if June 4 is missed.

      2. TEAM MEMBER ANALYSIS (0–0.3): Does the agent correctly identify alice@company.com
      as the most frequently appearing attendee (appears in evt-001, evt-003, evt-005,
      evt-006, evt-007, evt-008 — 6 events)? Is bob@company.com correctly noted as
      second most frequent (evt-001, evt-002, evt-006, evt-007, evt-008 — 5 events)?
      Score 0.3 if both alice and bob are correctly ranked with supporting detail,
      0.15 if alice is identified as top but bob is missed or miscounted, 0.0 if no
      member frequency analysis is provided.

      3. ACTIONABILITY (0–0.3): Does the agent provide a clear recommendation about
      which days are most suitable for scheduling additional meetings? It should note
      that June 5 (only 1 short 30-min meeting) and June 3 (1 event in the afternoon)
      offer the most scheduling flexibility. Does the summary give the operations
      manager concrete, usable guidance? Score 0.3 if specific days are recommended
      with reasoning, 0.15 if free days are mentioned but without clear reasoning,
      0.0 if no scheduling recommendations are made.

      '
    type: llm_judge
  name: summary_quality
  weight: 0.4
task_id: calendar-001
task_name: Weekly Team Capacity Overview for Resource Planning
tools:
- description: List all calendar events starting from a given date for a specified
    number of days
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get full details for a single calendar event by its event ID
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Create a new calendar event with title, start/end time, attendees,
    and location
  endpoint: /calendar/events/create
  method: POST
  name: create_event
  service: calendar
- description: Delete a calendar event by its event ID
  endpoint: /calendar/events/delete
  method: POST
  name: delete_event
  service: calendar
- description: Get all events for a specific user on a given date
  endpoint: /calendar/user_events
  method: POST
  name: user_events
  service: calendar
