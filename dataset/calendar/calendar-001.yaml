prompt: 'Please schedule a one-hour team standup meeting titled "Weekly Team Standup"
  for tomorrow at 9:00 AM. Invite Sarah Johnson (sarah.johnson@company.com) and Marcus
  Lee (marcus.lee@company.com), and set the location to "Conference Room B".

  '
reference_solution:
- Step 1: Determine tomorrow's date based on the current date.
- Step 2: Call create_event with title set to "Weekly Team Standup", start_time set
    to tomorrow at 09:00:00, end_time set to tomorrow at 10:00:00 (one hour later),
    attendees list containing sarah.johnson@company.com and marcus.lee@company.com,
    and location set to "Conference Room B".
- Step 3: Confirm to the user that the event has been successfully created, mentioning
    the event title, time, attendees, and location.
