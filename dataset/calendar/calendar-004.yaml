- check:
    rubric: "Evaluate the agent's summary of the calendar cleanup task. Score on three\
      \ dimensions:\n1. ACCURACY (0–0.4): Did the agent correctly identify all three\
      \ pairs of duplicate onboarding events?\n   - \"Brightline Onboarding — IT Setup\
      \ & Systems Access\" (evt-001 kept, evt-002 deleted)\n   - \"Brightline Onboarding\
      \ — Company Culture & Benefits Overview\" (evt-003 kept, evt-004 deleted)\n\
      \   - \"Brightline Onboarding — Legal Compliance & Policy Review\" (evt-005\
      \ kept, evt-006 deleted)\n   Award 0.4 if all three pairs identified correctly,\
      \ 0.2 if two pairs, 0.1 if one pair, 0.0 if none.\n\n2. COMPLETENESS (0–0.4):\
      \ Does the summary include event IDs and titles for both the deleted events\
      \ and the retained events?\n   Award 0.4 if all deleted IDs (evt-002, evt-004,\
      \ evt-006) and retained IDs (evt-001, evt-003, evt-005) are mentioned with titles.\n\
      \   Award 0.2 if only deleted events are listed with IDs.\n   Award 0.1 if IDs\
      \ are mentioned without titles or vice versa.\n\n3. CLARITY & REASONING (0–0.2):\
      \ Does the agent explain the rationale for keeping the earliest instance of\
      \ each duplicate?\n   Award 0.2 if the agent clearly states it kept the earliest-scheduled\
      \ occurrence.\n   Award 0.1 if the rationale is implied but not explicit.\n\
      \   Award 0.0 if no rationale is given.\n\nFinal score = sum of the three dimension\
      \ scores (max 1.0).\n"
    type: llm_judge
  name: summary_quality
  weight: 0.45
task_id: calendar-004
