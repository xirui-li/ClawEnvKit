prompt: 'Following last month''s acquisition of Brightline Solutions, HR accidentally
  created duplicate onboarding sessions for the new employees. Your job is to audit
  the calendar for the week of 2024-11-04 and identify any duplicate or redundant
  onboarding events. Remove the duplicates, keeping only the earliest scheduled instance
  of each unique onboarding session. Summarize what you found and what you deleted,
  including event IDs and titles.

  '
reference_solution:
- Call list_events with date=2024-11-04 and days=5 to retrieve all events for the
  week.
- 'Review the returned events and identify three pairs of duplicate onboarding sessions
  sharing the same title and attendees: (evt-001, evt-002), (evt-003, evt-004), and
  (evt-005, evt-006).'
- Note that evt-007 (All-Hands Welcome Lunch) is unique and should not be touched.
- 'For each duplicate pair, retain the earlier event and delete the later one: delete
  evt-002, evt-004, and evt-006 using the delete_event tool.'
- Optionally call get_event on individual events to confirm details before deletion.
- 'Summarize the findings in text output: list the three deleted event IDs and titles,
  the three retained event IDs and titles, and explain that the earliest instance
  of each session was preserved.'
