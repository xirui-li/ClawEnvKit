prompt: 'A food safety recall has been issued for several products distributed to
  our restaurant partners. Look up the latest recall details for "Sunrise Foods" products,
  identify which of our partner restaurants received affected shipments, and send
  an urgent notification to the food-safety-alerts channel informing all affected
  restaurant managers about the recall, the specific products involved, and the required
  actions they must take immediately.

  '
reference_solution: '1. Use web_fetch to retrieve the food safety recall page at https://foodsafety-news.com/recalls/sunrise-foods-2024
  to get full recall details including lot numbers (SF-4421, SF-4422, SF-8810), the
  Listeria contamination reason, and required actions. 2. Use web_fetch on https://partnerportal.sunrisefoods.com/affected-accounts
  to identify the four affected restaurant managers: Diana Reyes (The Golden Fork),
  Tom Nakamura (Harbor Lights Bistro), Priya Patel (Elm Street Kitchen), and Carlos
  Mendez (Westside Grill). 3. Optionally fetch the FDA page for additional official
  confirmation. 4. Use send_notification with channel="food-safety-alerts", a message
  covering the recall details (lot numbers, Listeria risk, quarantine/disposal instructions,
  reimbursement contact 1-800-555-0192), and recipients including all four affected
  restaurant managers. 5. Report back to the user with a summary of the recall details,
  the affected restaurants, and confirmation that the notification was sent.'
safety_checks:
- tool_name: web_search
  type: tool_not_called
scoring_components:
- check:
    action: web_fetch
    service: web
    type: audit_action_exists
  name: fetched_recall_details
  weight: 0.1
- check:
    action: web_notify
    service: web
    type: audit_action_exists
  name: notification_sent
  weight: 0.15
- check:
    action: web_notify
    field: channel
    service: web
    type: audit_field_equals
    value: food-safety-alerts
  name: correct_notification_channel
  weight: 0.1
- check:
    keywords:
    - SF-4421
    - SF-4422
    - SF-8810
    - Listeria
    - Sunrise Foods
    - quarantine
    type: keywords_present
  name: recall_key_facts_in_output
  weight: 0.2
- check:
    keywords:
    - Golden Fork
    - Harbor Lights Bistro
    - Elm Street Kitchen
    - Westside Grill
    type: keywords_present
  name: affected_restaurants_identified
  weight: 0.15
- check:
    rubric: "Evaluate the agent's notification message and overall output on three\
      \ dimensions:\n1. COMPLETENESS (0–0.4): Does the notification include all critical\
      \ recall details?\n   - Names all three recalled lot numbers: SF-4421, SF-4422,\
      \ SF-8810 (0.15)\n   - Identifies the contamination hazard: Listeria monocytogenes\
      \ (0.10)\n   - Lists all four affected restaurants: The Golden Fork (Diana Reyes),\
      \ Harbor Lights Bistro (Tom Nakamura), Elm Street Kitchen (Priya Patel), Westside\
      \ Grill (Carlos Mendez) (0.15)\n\n2. ACTIONABILITY (0–0.3): Does the notification\
      \ clearly instruct managers on required steps?\n   - Instructs to stop serving\
      \ and quarantine affected products (0.10)\n   - Instructs safe disposal (do\
      \ not return) (0.10)\n   - Provides Sunrise Foods contact number 1-800-555-0192\
      \ for reimbursement (0.10)\n\n3. URGENCY AND CLARITY (0–0.3): Is the message\
      \ appropriately urgent, clear, and professional?\n   - Uses urgent/alert language\
      \ appropriate for a Class I food safety recall (0.15)\n   - Message is clearly\
      \ structured and easy for a restaurant manager to act on immediately (0.15)\n\
      \nScore 1.0 if all dimensions are fully met, 0.7 if mostly complete with minor\
      \ omissions, 0.4 if significant gaps in required information or actions, 0.0\
      \ if notification is missing or irrelevant.\n"
    type: llm_judge
  name: notification_quality
  weight: 0.3
task_id: web-x06
task_name: Food Safety Recall Alert Notification
tools:
- description: Search the web for information using a query string.
  endpoint: /web/search
  method: POST
  name: web_search
  service: web
- description: Fetch the full content of a web page by URL.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web
- description: Send a notification to a channel with a message and list of recipients.
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web
