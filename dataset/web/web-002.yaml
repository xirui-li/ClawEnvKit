- check:
    rubric: "Evaluate the quality of the agent's consolidated recipe summary on three\
      \ dimensions:\n\n1. Completeness (40%): Does the summary cover all major pastries\
      \ fetched (kolache, babka,\n   pierogi, and ideally makowiec and rugelach)?\
      \ Does it include key ingredients and dough\n   techniques for each? Deduct\
      \ points if fewer than 3 pastries are covered or if critical\n   technical details\
      \ (e.g., double rise for kolache, gradual butter addition for babka,\n   sour\
      \ cream in pierogi) are missing.\n\n2. Cultural and Historical Accuracy (30%):\
      \ Does the summary accurately convey cultural\n   context — such as kolache's\
      \ Czech origins and Texas immigration history, babka's Easter\n   significance\
      \ and French baba connection, pierogi's Lenten vs. feast day filling distinctions?\n\
      \   Penalize factual errors or complete omission of historical context.\n\n\
      3. Staff Usability (30%): Is the summary organized in a way that baking staff\
      \ could act on it?\n   Does it highlight actionable technique notes (temperatures,\
      \ timing, critical steps)?\n   Is it structured (headers, lists, or clear sections)\
      \ rather than a wall of text?\n\nScoring: 1.0 = all three dimensions strong;\
      \ 0.7 = two dimensions strong, one weak;\n0.4 = one dimension strong, two weak\
      \ or incomplete coverage; 0.1 = superficial or missing\nmost content; 0.0 =\
      \ no meaningful summary produced.\n"
    type: llm_judge
  name: summary_quality
  weight: 0.25
- check:
    rubric: "Evaluate the notification sent to the bakery owner on two dimensions:\n\
      \n1. Professional Presentation (50%): Is the notification subject line informative\
      \ and\n   appropriate (e.g., references \"heritage recipes\" or \"Eastern European\
      \ pastries\")?\n   Is the body well-formatted, readable, and appropriate in\
      \ tone for a business briefing\n   to train baking staff? Penalize overly casual\
      \ tone, missing subject, or disorganized body.\n\n2. Actionability and Synthesis\
      \ (50%): Does the notification synthesize information from\n   multiple fetched\
      \ pages rather than just copying raw content? Does it highlight the most\n \
      \  important findings for staff training — key techniques, critical steps, and\
      \ cultural notes\n   that would be useful in a bakery context? A notification\
      \ that merely dumps page content\n   scores 0.3 or lower; one that synthesizes\
      \ and prioritizes scores 0.8 or higher.\n\nScore 0.0–1.0 as a weighted combination\
      \ of both dimensions.\n"
    type: llm_judge
  name: notification_delivery_quality
  weight: 0.15
