prompt: 'I''m launching a small artisan bakery focused on traditional Eastern European
  pastries. I''ve found several URLs that may contain authentic heritage recipes and
  baking techniques for items like kolache, babka, and pierogi dough. Please visit
  each of these pages, extract the key recipe details and cultural context, and send
  me a consolidated summary notification with the most important findings — including
  ingredients, techniques, and any historical notes — so I can use it to train my
  baking staff.

  '
reference_solution: "1. Fetch the kolache page: POST /web/fetch with url=\"https://heritagerecipes.example.com/kolache-traditional\"\
  \n   and extract dough recipe, double-rise technique, filling types, and Czech/Texas\
  \ history.\n2. Fetch the babka page: POST /web/fetch with url=\"https://heritagerecipes.example.com/babka-polish\"\
  \n   and extract the enriched dough formula, gradual butter technique, internal\
  \ temperature, and\n   historical connection to French baba au rhum"
