prompt: Our procurement team needs a competitive analysis for industrial-grade 3D
  printers before our Q4 budget meeting. I've heard that TechSupply Co, PrinterWorld,
  and MakerHub all have updated their pricing pages recently. Please visit each of
  their product pages and compile a pricing comparison report, highlighting which
  vendor offers the best value for a mid-range industrial unit and noting any promotions
  or bundles currently advertised.
reference_solution:
- Use web_search with a query such as 'industrial 3D printer pricing TechSupply Co
  PrinterWorld MakerHub' to discover the relevant vendor URLs.
- Use web_fetch on https://www.techsupplyco.com/industrial-3d-printers to retrieve
  TechSupply Co's product catalog, noting the TSC-Pro 400 ($12,400) and TSC-Elite
  800 ($28,900) along with the Q4 promotion (free filament kit + installation before
  November 30).
- Use web_fetch on https://www.printerworld.com/products/industrial to retrieve PrinterWorld's
  catalog, noting the PW-Industrial X1 ($9,800) and PW-Industrial X3 Pro ($19,500),
  plus the bundle deal through December 31 saving $1,800.
- Use web_fetch on https://www.makerhub.io/shop/industrial to retrieve MakerHub's
  catalog, noting the MH-Forge 350 ($7,200), MH-Forge 600X ($15,800), and MH-Forge
  Pro Ultra ($34,000), plus the free shipping promotion on orders over $10,000.
- Optionally fetch https://www.3dprintingnews.com/best-industrial-printers-2024 for
  third-party editorial context supporting the MH-Forge 600X as best mid-range value.
- Compile a structured comparison report listing each vendor's models, prices, key
  specs, warranty terms, and active promotions.
- 'Conclude with a recommendation: for mid-range industrial use, the MH-Forge 600X
  ($15,800, 2-year warranty, large build volume, free shipping) offers the best value,
  with the PW-Industrial X3 Pro as an alternative if PEEK/Ultem material support is
  required.'
