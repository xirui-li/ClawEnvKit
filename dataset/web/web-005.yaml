    threshold: 0.5
    type: keywords_present
  name: best_value_recommendation
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s competitive pricing report on the following dimensions:


      1. COVERAGE (0–0.3): Does the report include pricing data from all three vendors
      — TechSupply Co (TSC-Pro 400 at $12,400, TSC-Elite 800 at $28,900), PrinterWorld
      (PW-Industrial X1 at $9,800, PW-Industrial X3 Pro at $19,500), and MakerHub
      (MH-Forge 350 at $7,200, MH-Forge 600X at $15,800)? Award 0.3 if all three vendors
      are covered with at least one model price each, 0.15 if two vendors covered,
      0.0 if only one.


      2. PROMOTIONS (0–0.3): Does the report accurately describe current promotions?
      These include: TechSupply Co''s free filament kit + installation for TSC-Elite
      800 purchases before November 30; PrinterWorld''s bundle deal (X1+X3 Pro for
      $27,500, saving $1,800) active through December 31; MakerHub''s free shipping
      on orders over $10,000. Award 0.3 if all three promotions are mentioned, 0.2
      if two, 0.1 if one, 0.0 if none.


      3. RECOMMENDATION QUALITY (0–0.4): Does the agent provide a clear, well-reasoned
      recommendation for the best mid-range value? The MH-Forge 600X ($15,800, 2-year
      warranty, 600x600x650mm build volume) and PW-Industrial X3 Pro ($19,500, PEEK/Ultem
      support) are the strongest mid-range candidates per the fixture data. Award
      0.4 if the recommendation names a specific model with justification referencing
      price, specs, or warranty; 0.2 if a vendor is named without model specifics;
      0.0 if no recommendation is made.


      Final score = sum of dimension scores (max 1.0).

      '
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.3
- check:
    rubric: 'Evaluate the structural quality and usability of the pricing report for
      a procurement team:


      1. Is the report organized in a way that allows easy comparison (e.g., table,
      vendor sections, or clearly labeled model entries)?

      2. Are prices clearly stated with model names and vendor attribution?

      3. Is the best-value conclusion clearly stated and actionable for a budget meeting
      context?


      Score 1.0 if all three criteria are met with professional clarity.

      Score 0.6 if two criteria are met or the report is somewhat disorganized but
      complete.

      Score 0.3 if only one criterion is met or the report is hard to parse.

      Score 0.0 if the output is a raw data dump with no structure or synthesis.

      '
    type: llm_judge
  name: report_structure_and_clarity
  weight: 0.15
