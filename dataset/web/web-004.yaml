prompt: 'Our product team is preparing a quarterly roadmap review and needs a briefing
  on the latest trends in edge computing and its adoption in enterprise IoT deployments.
  Search for recent developments, key players, and notable use cases, then summarize
  the most important findings in a structured briefing that highlights opportunities
  relevant to a B2B software company.

  '
reference_solution: "1. Use web_search to query for \"edge computing enterprise IoT\
  \ trends 2024\" and related topics\n   to retrieve the list of relevant search results\
  \ from the fixture data.\n2. Review the search result snippets to identify the most\
  \ relevant and data-rich pages\n   (e.g., TechCrunch market overview, IDC spending\
  \ forecast, Forbes manufacturing piece,\n   NetworkWorld 5G convergence article,\
  \ ZDNet security article, Wired cloud vendor battle,\n   HBR ROI analysis).\n3.\
  \ Use web_fetch on the highest-value URLs (at minimum the TechCrunch and IDC pages)\n\
  \   to retrieve full page content with detailed statistics and recommendations.\n\
  4. Synthesize findings into a structured briefing covering: (a) market size and\
  \ growth\n   (Gartner 75% projection, IDC $232B by 2026 at 22% CAGR), (b) key vendor\
  \ landscape\n   (AWS Outposts 34%, Azure Stack Edge 28%, Google Distributed Cloud),\
  \ (c) top verticals\n   (healthcare, manufacturing, retail, logistics), (d) adoption\
  \ barriers (68% cite security,\n   zero-trust immaturity), (e) B2B software opportunity\
  \ (software layer growing at 31% CAGR,\n   Forrester $80B B2B edge services by 2027,\
  \ HBR 187% median ROI).\n5. Conclude with 2–3 actionable recommendations for a B2B\
  \ software company, such as\n   prioritizing edge-native application development,\
  \ pursuing hyperscaler edge platform\n   partnerships, and addressing zero-trust\
  \ security as a differentiator.\n6. Present the briefing as structured text output\
  \ — no file writing required."
