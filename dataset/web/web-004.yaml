fixtures:
  pages:
  - content: 'Enterprise adoption of edge computing has reached an inflection point
      in 2024. Gartner''s latest research projects that 75% of enterprise-generated
      data will be created and processed outside traditional centralized data centers
      by 2025, up from less than 10% in 2018. The primary drivers are latency-sensitive
      applications, data sovereignty regulations (particularly GDPR in Europe), and
      the explosion of connected IoT devices now numbering over 15 billion globally.
      Leading enterprise adopters include automotive, logistics, and utilities sectors.
      Key vendors gaining traction include Dell Technologies, HPE, and a growing ecosystem
      of specialized edge software providers. The report highlights that companies
      deploying edge infrastructure report average latency improvements of 70ms to
      under 5ms for critical workloads.

      '
    title: 'Edge Computing Surges in Enterprise IoT: 2024 Market Overview'
    url: https://www.techcrunch.com/2024/03/edge-computing-enterprise-iot
  - content: 'IDC''s Worldwide Edge Computing Spending Guide forecasts global investment
      will reach $232 billion by 2026, growing at a compound annual growth rate of
      22%. Healthcare leads in use case diversity, deploying edge for real-time patient
      monitoring, medical imaging AI, and surgical robotics. Retail deployments focus
      on inventory automation and personalized in-store experiences. Industrial manufacturing
      represents the largest single segment by spend. Critically for software vendors,
      the software and platform services layer is growing at 31% CAGR — faster than
      hardware — indicating a maturing market where differentiation is shifting to
      software. IDC recommends B2B software companies prioritize edge-native application
      development and partnerships with hyperscaler edge platforms to capture this
      growth.

      '
    title: 'IDC: Global Edge Computing Spending to Reach $232 Billion by 2026'
    url: https://www.idc.com/research/edge-computing-spending-2024
