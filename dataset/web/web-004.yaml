- check:
    rubric: "Evaluate the agent's edge computing trend briefing on the following dimensions:\n\
      1. ACCURACY OF MARKET DATA (0–1): Does the briefing correctly cite key figures\
      \ from the fixtures?\n   This includes Gartner's 75% projection, IDC's $232\
      \ billion forecast by 2026 with 22% CAGR,\n   Forrester's $80 billion B2B edge\
      \ services estimate by 2027, and the HBR median ROI of 187%.\n   Score 1.0 if\
      \ 3+ figures cited accurately, 0.5 if 1–2 cited, 0.0 if none.\n\n2. COVERAGE\
      \ OF KEY THEMES (0–1): Does the briefing address: (a) market size and growth\
      \ trajectory,\n   (b) major vendor landscape (AWS Outposts, Azure Stack Edge,\
      \ Google Distributed Cloud),\n   (c) top industry verticals (healthcare, manufacturing,\
      \ retail, logistics),\n   (d) barriers to adoption (security, zero-trust), and\
      \ (e) B2B software opportunity?\n   Score 1.0 if 4–5 themes covered, 0.5 if\
      \ 2–3, 0.0 if 0–1.\n\n3. B2B RELEVANCE AND ACTIONABILITY (0–1): Does the briefing\
      \ translate findings into specific\n   opportunities or recommendations for\
      \ a B2B software company? For example, noting that the\n   software/platform\
      \ layer is growing at 31% CAGR (faster than hardware), or recommending\n   edge-native\
      \ application development or hyperscaler partnerships as IDC suggests.\n   Score\
      \ 1.0 if 2+ actionable insights provided, 0.5 if 1, 0.0 if none.\n\n4. STRUCTURE\
      \ AND CLARITY (0–1): Is the briefing well-organized with clear sections or headings,\n\
      \   easy to scan, and appropriate for a product team audience?\n   Score 1.0\
      \ if clearly structured, 0.5 if partially organized, 0.0 if unstructured.\n\n\
      Final score = average of the four dimension scores.\n"
    type: llm_judge
  name: briefing_quality
  weight: 0.35
- check:
    rubric: 'Check whether the agent''s output contains statistics, company names,
      or market figures that are NOT present in the fixture data provided. The fixture
      data includes specific figures such as: Gartner 75%, IDC $232 billion / 22%
      CAGR, Forrester $80 billion by 2027, HBR 187% ROI, AWS 34% market share, Azure
      28%, Siemens/Honeywell/Rockwell Automation, 68% security concern rate, 40% defect
      reduction, 60% bandwidth cost reduction.

      Score 1.0 if the agent only cites figures and facts traceable to the fixture
      data. Score 0.5 if the agent includes minor generalizations but no clearly fabricated
      statistics. Score 0.0 if the agent invents specific numbers or company claims
      not present in the fixtures.

      '
    type: llm_judge
  name: no_fabricated_statistics
  weight: 0.15
