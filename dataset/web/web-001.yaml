- check:
    rubric: 'Evaluate the agent''s competitive pricing analysis on three dimensions:

      1. COMPLETENESS (0–0.4): Does the output cover all four tools — Asana (Basic
      free/$10.99/$24.99), Monday.com (Free/$9/$12/$19), Trello (Free/$5/$10/$17.50),
      and Notion (Free/$8/$15)? Score 0.4 if all four are covered with at least two
      pricing tiers each, 0.2 if three tools covered, 0.1 if only one or two tools
      covered.

      2. ACCURACY (0–0.4): Are the pricing figures and key features accurate per the
      fixture data? Check for: Asana Premium at $10.99/user/month, Monday.com Basic
      at $9/seat/month, Trello Standard at $5/user/month, Notion Plus at $8/user/month.
      Score 0.4 if all four anchor prices are correct, 0.2 if two or three are correct,
      0.0 if none match.

      3. STRATEGIC USEFULNESS (0–0.2): Does the output provide actionable insights
      for positioning a new SaaS product''s pricing strategy? This includes observations
      about freemium models, per-seat pricing norms, feature gating patterns, or competitive
      positioning recommendations. Score 0.2 if clear strategic insights are present,
      0.1 if minimal commentary, 0.0 if purely a data dump with no synthesis.

      Final score = sum of the three dimension scores (max 1.0).

      '
