prompt: 'Our startup is launching a new project management SaaS product next quarter
  and we need a competitive pricing analysis. Search for current pricing information
  on the top project management tools (Asana, Monday.com, Trello, and Notion) and
  summarize their pricing tiers, key features at each tier, and any free plan offerings.
  Provide a structured comparison that our product team can use to position our pricing
  strategy.

  '
reference_solution: '1. Use web_search with a query such as "Asana Monday.com Trello
  Notion pricing plans 2024 comparison" to retrieve relevant search results. 2. Review
  the search result snippets to identify the most relevant URLs for each tool''s pricing
  page. 3. Use web_fetch on each tool''s pricing page URL (asana.com/pricing, monday.com/pricing/,
  trello.com/pricing, notion.so/pricing) to retrieve detailed pricing tier information.
  4. Optionally fetch the G2 comparison page or Monday.com blog post for additional
  context on pricing strategy considerations. 5. Synthesize the fetched content into
  a structured comparison table or summary covering: tool name, free plan details,
  paid tier names and prices, and key differentiating features at each tier. 6. Add
  a brief strategic commentary noting the freemium model prevalence, per-seat pricing
  as the industry norm ($5–$25/user/month range), and feature gating patterns (views,
  automations, SSO at higher tiers) that the product team can use for positioning.
  7. Present the final analysis as a clear, readable text output — no file writing
  required.'
