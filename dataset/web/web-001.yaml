    url: https://asana.com/pricing
  - content: 'Monday.com Pricing Plans (billed annually, minimum 3 seats):

      - Free: Up to 2 seats. 3 boards, unlimited docs, 200+ templates, iOS/Android
      apps.

      - Basic ($9/seat/month): Unlimited free viewers, unlimited items, 5GB storage,
