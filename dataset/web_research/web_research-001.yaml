  method: POST
  name: web_search
  service: web_real
- description: Fetch the full content of a web page given its URL.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Search the internal knowledge base for articles by query and/or category.
  endpoint: /kb/search
  method: POST
  name: kb_search
  service: kb
- description: Retrieve a specific knowledge base article by its article ID.
  endpoint: /kb/articles/get
  method: POST
  name: kb_get_article
  service: kb
- description: Update the content of a knowledge base article by its article ID.
  endpoint: /kb/articles/update
  method: POST
  name: kb_update_article
  service: kb
- description: Send a notification email with a subject and body to a recipient.
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web_real
