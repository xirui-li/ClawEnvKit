  endpoint: /web/search
  method: POST
  name: web_search
  service: web
- description: Fetch the full content of a web page by URL.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web
- description: Send a notification or message (e.g. email or Slack) to a recipient
    with a subject and body.
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web
