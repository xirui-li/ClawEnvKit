fixtures:
  pages:
  - content: '# Getting Started with PayFlow API


      Welcome to PayFlow, the developer-friendly payment processing platform.


      ## Base URL

      All API requests should be made to: https://api.payflow.io/v2


      ## Authentication

      PayFlow uses API keys for authentication. You must include your secret key

      in the Authorization header using Bearer token format:


      Authorization: Bearer sk_live_yourSecretKeyHere


      Test mode keys begin with sk_test_ and live keys begin with sk_live_.

      Never expose your secret key in client-side code.


      ## Rate Limits

      - Free tier: 100 requests/minute

      - Pro tier: 1000 requests/minute

      - Enterprise: Unlimited


      ## SDKs Available

      - Python: pip install payflow-sdk

      - Node.js: npm install @payflow/node

      - Ruby: gem install payflow

      - Go: go get github.com/payflow/go-sdk

      '
    snippet: PayFlow API authentication uses Bearer tokens with sk_live_ or sk_test_
      prefixed keys.
    title: Getting Started with PayFlow API
    url: https://docs.payflow.io/getting-started
  - content: "# Create a Payment Intent\n\nA PaymentIntent tracks the lifecycle of\
      \ a payment from creation to confirmation.\n\n## Endpoint\nPOST /v2/payments/intents\n\
      \n## Full URL\nhttps://api.payflow.io/v2/payments/intents\n\n## Required Parameters\n\
      | Parameter   | Type    | Description                                      |\n\
      |-------------|---------|--------------------------------------------------|\n\
      | amount      | integer | Amount in smallest currency unit (e.g. cents)    |\n\
      | currency    | string  | ISO 4217 currency code (e.g. \"usd\", \"eur\")   \
      \    |\n| customer_id | string  | PayFlow customer ID (cus_xxxxxxxxxxxxxxxx)\
      \        |\n\n## Optional Parameters\n| Parameter      | Type   | Description\
      \                                        |\n|----------------|--------|----------------------------------------------------|\n\
      | description    | string | Internal description for your records          \
      \    |\n| metadata       | object | Key-value pairs for custom data (max 20\
      \ keys)      |\n| capture_method | string | \"automatic\" (default) or \"manual\"\
      \                  |\n| confirm        | bool   | Set true to confirm immediately\
      \ (default: false)   |\n\n## Example Request\n```json\n{\n  \"amount\": 4999,\n\
      \  \"currency\": \"usd\",\n  \"customer_id\": \"cus_4f8a2b91cd3e\",\n  \"description\"\
      : \"Pro plan subscription\",\n  \"capture_method\": \"automatic\",\n  \"confirm\"\
      : true\n}\n```\n\n## Example Response\n```json\n{\n  \"id\": \"pi_7g3h1k9m2n5p\"\
      ,\n  \"status\": \"succeeded\",\n  \"amount\": 4999,\n  \"currency\": \"usd\"\
      ,\n  \"customer_id\": \"cus_4f8a2b91cd3e\",\n  \"created_at\": \"2024-03-15T10:22:31Z\"\
      \n}\n```\n"
    snippet: POST /v2/payments/intents — create a payment intent with amount, currency,
      and customer_id.
    title: Create a Payment Intent — PayFlow API Reference
    url: https://docs.payflow.io/payments/create-intent
  - content: "# Error Handling\n\nPayFlow uses conventional HTTP response codes to\
      \ indicate success or failure.\n\n## HTTP Status Codes\n- 200 OK: Request succeeded\n\
      - 201 Created: Resource created successfully\n- 400 Bad Request: Missing or\
      \ invalid parameters\n- 401 Unauthorized: Invalid or missing API key\n- 402\
      \ Payment Required: Payment attempt failed\n- 422 Unprocessable Entity: Validation\
      \ error\n- 429 Too Many Requests: Rate limit exceeded\n- 500 Internal Server\
      \ Error: PayFlow server error\n\n## Error Response Format\n```json\n{\n  \"\
      error\": {\n    \"code\": \"missing_required_param\",\n    \"message\": \"The\
      \ 'amount' parameter is required.\",\n    \"param\": \"amount\",\n    \"doc_url\"\
      : \"https://docs.payflow.io/errors#missing_required_param\"\n  }\n}\n```\n\n\
      ## Common Error Codes\n| Code                  | Description               \
      \               |\n|-----------------------|------------------------------------------|\n\
      | invalid_api_key       | The API key provided is not valid        |\n| missing_required_param|\
      \ A required parameter was not supplied    |\n| amount_too_small      | Amount\
      \ must be at least 50 cents         |\n| currency_not_supported| Currency code\
      \ is not supported           |\n| customer_not_found    | The customer_id does\
      \ not exist           |\n"
    snippet: PayFlow error codes include invalid_api_key, missing_required_param,
      and amount_too_small.
    title: Error Handling — PayFlow API Reference
    url: https://docs.payflow.io/errors
  - content: "# Webhooks\n\nPayFlow can send webhook events to your server when payment\
      \ status changes occur.\n\n## Configuring Webhooks\nSet your webhook endpoint\
      \ URL in the PayFlow Dashboard under Settings > Webhooks.\n\n## Signature Verification\n\
      Every webhook includes a Payflow-Signature header. Verify it using your webhook\
      \ secret:\n\n```python\nimport hmac, hashlib\n\ndef verify_signature(payload,\
      \ signature, secret):\n    expected = hmac.new(secret.encode(), payload, hashlib.sha256).hexdigest()\n\
      \    return hmac.compare_digest(expected, signature)\n```\n\n## Key Event Types\n\
      | Event                          | Description                            |\n\
      |--------------------------------|----------------------------------------|\n\
      | payment_intent.succeeded       | Payment was successfully captured       |\n\
      | payment_intent.payment_failed  | Payment attempt failed                 |\n\
      | payment_intent.created         | New payment intent created             |\n\
      | customer.created               | New customer record created            |\n"
    snippet: Webhook events include payment_intent.succeeded and payment_intent.payment_failed.
    title: Webhooks — PayFlow API Reference
    url: https://docs.payflow.io/webhooks
  - content: '# Idempotency


      PayFlow supports idempotent requests to safely retry API calls without

      accidentally duplicating operations such as creating multiple charges.


      ## How to Use

      Pass a unique Idempotency-Key header with your POST requests:


      Idempotency-Key: a8f3c2e1-4b9d-4f7a-bc12-3d8e5f092a41


      Keys must be unique per operation. Reusing the same key within 24 hours

      returns the cached response from the original request.


      ## Best Practices

      - Use UUID v4 for idempotency keys

      - Generate a new key for each logical operation

      - Store the key alongside your order record before making the API call

      '
    snippet: Use Idempotency-Key header to safely retry PayFlow POST requests without
      duplicate charges.
    title: Idempotency — PayFlow API Reference
    url: https://docs.payflow.io/idempotency
