  weight: 0.15
- check:
    rubric: "Evaluate the agent's technical brief on three dimensions:\n1. ACCURACY\
      \ (0–1): Does the brief correctly state that (a) authentication uses a Bearer\
      \ token\n   in the Authorization header with keys prefixed sk_live_ or sk_test_,\
      \ (b) the endpoint for\n   creating a payment intent is POST https://api.payflow.io/v2/payments/intents,\
      \ and (c) the\n   three required parameters are 'amount' (integer, in cents),\
      \ 'currency' (ISO 4217 code),\n   and 'customer_id' (PayFlow customer ID)?\n\
      \n2. COMPLETENESS (0–1): Does the brief also mention useful supplementary details\
      \ such as\n   optional parameters (description, capture_method, confirm), error\
      \ handling (e.g., 401\n   for invalid API key, 400 for missing params), idempotency\
      \ keys, or webhook events\n   like payment_intent.succeeded?\n\n3. DEVELOPER\
      \ USABILITY (0–1): Is the brief clearly structured, actionable, and something\n\
      \   a developer could immediately use to start building the integration without\
      \ needing\n   to re-read the raw docs?\n\nScore: 1.0 if all three dimensions\
      \ score 0.8+, 0.7 if two dimensions score 0.8+, 0.4 if only one dimension scores\
      \ 0.8+, 0.0 if accuracy fails entirely.\n"
    type: llm_judge
  name: technical_brief_quality
  weight: 0.35
- check:
    keywords:
    - api.payflow.io
    type: keywords_present
  name: base_url_mentioned
  weight: 0.1
- check:
    keywords:
    - /v1/charges
    - /v1/payments
