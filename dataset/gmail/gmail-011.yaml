category: communication
claw_eval_id: T06_email_reply_draft
difficulty: medium
fixtures:
  inbox:
  - body: 'Hi, please welcome the following new employees starting this week: 1. Priya
      Nair — Junior Data Analyst, starting June 10 2. Marcus Webb — DevOps Engineer,
      starting June 11 3. Sofia Delgado — Product Manager, starting June 12 Please
      send them a welcome note before their first day. Their emails are: priya.nair@acmecorp.com,
      marcus.webb@acmecorp.com, sofia.delgado@acmecorp.com

      '
    date: '2025-06-08T09:15:00Z'
    from: hr@acmecorp.com
    id: msg-001
    priority: high
    read: false
    subject: New Hire Onboarding — Week of June 9
    to: manager@acmecorp.com
  - body: 'Laptops for Priya Nair, Marcus Webb, and Sofia Delgado have been configured
      and will be ready for pickup on their respective start dates. Please inform
      them to visit IT on arrival.

      '
    date: '2025-06-08T11:30:00Z'
    from: it-support@acmecorp.com
    id: msg-002
    priority: normal
    read: false
    subject: Laptop Setup Confirmation for New Hires
    to: manager@acmecorp.com
  - body: 'Desk assignments for the incoming team: Priya Nair — Desk 4B, Marcus Webb
      — Desk 7A, Sofia Delgado — Desk 2C. Badge access will be activated on their
      start dates.

      '
    date: '2025-06-08T13:00:00Z'
    from: facilities@acmecorp.com
    id: msg-003
    priority: normal
    read: false
    subject: Desk Assignments — June New Hires
    to: manager@acmecorp.com
  - body: 'Thank you all for attending the Q2 all-hands. Key highlights: revenue up
      18% YoY, new product launch on track for Q3, and we are expanding the team significantly
      this quarter.

      '
    date: '2025-06-07T16:00:00Z'
    from: ceo@acmecorp.com
    id: msg-004
    priority: normal
    read: true
    subject: Q2 Company All-Hands Recap
    to: allstaff@acmecorp.com
  - body: 'Please remind new hires to complete their payroll enrollment forms within
      3 business days of their start date. Forms are available on the HR portal at
      hr.acmecorp.com/payroll.

      '
    date: '2025-06-08T14:45:00Z'
    from: payroll@acmecorp.com
    id: msg-005
    priority: normal
    read: false
    subject: Payroll Enrollment Reminder for New Starters
    to: manager@acmecorp.com
prompt: 'You have several new employees starting this week and need to send each of
  them a personalized welcome email. Check the inbox for any HR onboarding messages
  that contain the new hire details, then send a warm, personalized welcome email
  to each new hire introducing them to the company, mentioning their role and start
  date, and wishing them success. Summarize what you sent and to whom.

  '
reference_solution: "1. Call list_inbox to retrieve recent emails and identify the\
  \ HR onboarding message (msg-001) from hr@acmecorp.com\n   with subject \"New Hire\
  \ Onboarding — Week of June 9\".\n2. Call get_message with message_id \"msg-001\"\
  \ to read the full details of the new hires:\n   Priya Nair (Junior Data Analyst,\
  \ June 10), Marcus Webb (DevOps Engineer, June 11),\n   Sofia Delgado (Product Manager,\
  \ June 12), and their email addresses.\n3. Call send_email three times, once per\
  \ new hire, with a personalized subject (e.g., \"Welcome to Acme Corp, Priya!\"\
  )\n   and a body that mentions their name, role, start date, and a warm welcome\
  \ message.\n4. Summarize in the text response: confirm that welcome emails were\
  \ sent to all three new hires,\n   list their names, roles, and start dates, and\
  \ note any relevant onboarding details included."
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: inbox_checked
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: welcome_emails_sent
  weight: 0.15
- check:
    keywords:
    - priya.nair@acmecorp.com
    - marcus.webb@acmecorp.com
    - sofia.delgado@acmecorp.com
    type: keywords_present
  name: all_three_recipients_mentioned
  weight: 0.2
- check:
    keywords:
    - Data Analyst
    - DevOps Engineer
    - Product Manager
    type: keywords_present
  name: roles_and_dates_referenced
  weight: 0.15
- check:
    keywords:
    - saved as draft
    - draft saved
    - could not send
    type: keywords_absent
  name: no_drafts_instead_of_sending
  weight: 0.1
- check:
    rubric: "Evaluate the quality and completeness of the welcome emails the agent\
      \ sent and reported. Score on these dimensions: 1. COVERAGE (0–0.4): Were all\
      \ three new hires contacted — Priya Nair (priya.nair@acmecorp.com, Junior Data\
      \ Analyst, June 10),\n   Marcus Webb (marcus.webb@acmecorp.com, DevOps Engineer,\
      \ June 11), and Sofia Delgado (sofia.delgado@acmecorp.com,\n   Product Manager,\
      \ June 12)? Award 0.4 if all three, 0.2 if two, 0.0 if one or none.\n2. PERSONALIZATION\
      \ (0–0.3): Did each email reference the recipient's specific role and start\
      \ date?\n   Award 0.3 if all emails are personalized with role and date, 0.15\
      \ if partially, 0.0 if generic.\n3. TONE AND COMPLETENESS (0–0.3): Were the\
      \ emails warm, professional, and welcoming?\n   Did the agent summarize what\
      \ was sent and to whom in its final response?\n   Award 0.3 if tone is appropriate\
      \ and summary is clear, 0.15 if adequate but lacking warmth or summary, 0.0\
      \ if poor.\nFinal score = sum of dimension scores (max 1.0).\n"
    type: llm_judge
  name: welcome_email_quality
  weight: 0.3
task_id: gmail-011
task_name: Send Personalized Onboarding Welcome Emails to New Hires
tools:
- description: List recent emails in the inbox, optionally filtered by how many days
    back and max results.
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a specific email by its message ID.
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a recipient with a subject and body.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email as a draft without sending it.
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
