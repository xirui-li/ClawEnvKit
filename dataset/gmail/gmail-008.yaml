difficulty: hard
fixtures:
  inbox:
  - body: 'Hi team, since approximately 9:15 AM PST our customers are unable to complete
      purchases. The payment gateway returns a 500 error on every attempt. This is
      causing significant revenue loss. Please treat this as highest priority. We
      need a resolution ETA ASAP.

      '
    date: '2024-11-14T09:42:00Z'
    from: alice.nguyen@clientco.com
    id: msg_001
    priority: critical
    read: false
    subject: 'CRITICAL: Payment gateway down — transactions failing'
    to: support@techcorp.io
  - body: 'We''re seeing replication lag on the primary DB cluster spike to over 30
      minutes as of 10:00 AM. Read replicas are serving stale data and some reports
      are incorrect. Immediate attention required.

      '
    date: '2024-11-14T10:18:00Z'
    from: devops@partnersite.net
    id: msg_002
    priority: critical
    read: false
    subject: 'CRITICAL: Database replication lag exceeding 30 minutes'
    to: support@techcorp.io
  - body: 'Hey, just wanted to let you know the newsletter signup form on your homepage
      has been broken for about a week. Users click subscribe and nothing happens.
      Not urgent but would appreciate a fix soon.

      '
    date: '2024-11-13T15:05:00Z'
    from: bob.martinez@retailclient.com
    id: msg_003
    priority: low
    read: false
    subject: 'Re: Weekly newsletter signup — not working'
    to: support@techcorp.io
  - body: 'Since this morning, none of our 800 enterprise users can log in via SSO.
      They get a 403 Forbidden error. This is completely blocking our workforce. We
      have an SLA that requires resolution within 2 hours. Please escalate immediately.

      '
    date: '2024-11-14T08:55:00Z'
    from: sarah.kim@enterprise-client.io
    id: msg_004
    priority: critical
    read: false
    subject: 'CRITICAL: SSO authentication broken for all enterprise users'
    to: support@techcorp.io
  - body: 'Great news! Your November promotional campaign has wrapped up. Click the
      link below to view your engagement metrics, open rates, and conversion stats
      for the month.

      '
    date: '2024-11-13T11:30:00Z'
    from: marketing@promo-vendor.com
    id: msg_005
    priority: low
    read: true
    subject: Your November campaign stats are ready!
    to: support@techcorp.io
  - body: 'Hi, I wanted to understand what the rate limits are for the REST API on
      the Professional plan. Our integration is hitting limits occasionally but it''s
      not blocking us. Could you point me to docs?

      '
    date: '2024-11-13T14:20:00Z'
    from: james.okafor@smb-customer.com
    id: msg_006
    priority: normal
    read: true
    subject: Question about API rate limits
    to: support@techcorp.io
  - body: 'Automated alert: CDN edge node eu-west-1 is experiencing elevated latency
      (avg 850ms vs baseline 120ms). Affected users in Western Europe may see slower
      load times. Investigation is ongoing. This is not yet critical.

      '
    date: '2024-11-14T07:30:00Z'
    from: ops-alerts@internalmonitor.techcorp.io
    id: msg_007
    priority: high
    read: false
    subject: 'WARNING: CDN edge node degraded performance in EU-West'
    to: support@techcorp.io
prompt: 'I''ve been getting bug reports from customers that may include critical severity
  issues. Please check my recent inbox, identify any unread emails about critical
  bugs or system failures, and forward a consolidated summary of all such issues to
  our engineering lead at eng-lead@techcorp.io. Make sure your message includes the
  original senders, dates, and a brief description of each critical issue so the engineering
  lead can triage immediately.

  '
reference_solution:
- description: Call list_inbox with days_back=2 and max_results=20 to retrieve recent
    emails.
  step: 1
- description: 'Review the returned email list and identify unread messages with priority=critical
    or subjects containing "CRITICAL". These are msg_001 (payment gateway), msg_002
    (database replication), and msg_004 (SSO failure). Note that msg_007 (CDN warning)
    is high but not critical, and msg_003 is low priority.

    '
  step: 2
- description: Call get_message for msg_001 to retrieve full details of the payment
    gateway outage report.
  step: 3
- description: Call get_message for msg_002 to retrieve full details of the database
    replication lag report.
  step: 4
- description: Call get_message for msg_004 to retrieve full details of the SSO authentication
    failure report.
  step: 5
- description: 'Compose a consolidated summary email addressed to eng-lead@techcorp.io
    with a subject such as "ESCALATION: 3 Critical Bug Reports Requiring Immediate
    Triage". The body should list each critical issue with the original sender''s
    name and email, the date received, and a concise description of the problem.

    '
  step: 6
- description: Call send_email with to=eng-lead@techcorp.io, the composed subject,
    and the consolidated body. Do NOT save as a draft — the engineering lead needs
    this immediately.
  step: 7
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: inbox_listed
  weight: 0.1
- check:
    action: get_message
    count: 3
    service: gmail
    type: audit_count_gte
  name: critical_messages_retrieved
  weight: 0.15
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_equals
    value: eng-lead@techcorp.io
  name: email_sent_to_eng_lead
  weight: 0.2
- check:
    action: send_email
    field: subject
    service: gmail
    type: audit_field_contains
    value: critical
  name: subject_references_critical_bugs
  weight: 0.1
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: Payment gateway
  name: body_contains_payment_gateway_issue
  weight: 0.1
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: SSO
  name: body_contains_sso_issue
  weight: 0.1
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: replication
  name: body_contains_database_issue
  weight: 0.05
- check:
    actions:
    - list_inbox
    - send_email
    service: gmail
    type: audit_sequence
  name: inbox_before_send_sequence
  weight: 0.05
- check:
    rubric: 'The sent email to eng-lead@techcorp.io should contain a consolidated
      summary of all three critical issues: (1) payment gateway failure from alice.nguyen@clientco.com,
      (2) database replication lag from devops@partnersite.net, and (3) SSO authentication
      failure from sarah.kim@enterprise-client.io. The summary should include original
      senders, dates or timestamps, and a brief description of each issue to enable
      triage. Non-critical emails (newsletter, rate limits, CDN warning) should NOT
      be included as critical items. Score high if all three critical issues are clearly
      presented with sender attribution and dates.

      '
    type: llm_judge
  name: consolidated_summary_quality
  weight: 0.15
task_id: gmail-008
task_name: Escalate Unread Critical Bug Reports to Engineering Lead
tools:
- description: Retrieve a list of recent emails from the inbox, filtered by number
    of days back and result count.
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Fetch the full content of a specific email by its message ID.
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a specified recipient with a subject and body.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email as a draft, optionally as a reply to an existing message.
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
