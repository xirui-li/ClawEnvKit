difficulty: medium
fixtures:
  inbox:
  - body: 'Hi, I''m following up again on Invoice #BM-4412 for $14,800 issued on October
      3rd. We have not received payment and this is now 60 days overdue. Please advise
      urgently or we will need to pause deliveries to your account.

      '
    date: '2024-11-18'
    from: patricia.okafor@brightonmaterials.com
    id: msg-001
    priority: high
    read: false
    subject: 'RE: Invoice #BM-4412 — Still unpaid after 60 days'
    to: ar@acmecorp.com
  - body: 'Hello, we issued Invoice #DL-0891 for $6,200 on October 28th with net-30
      terms. As of today we haven''t seen payment hit our account. Could you confirm
      payment status or let us know if there''s an issue with the invoice?

      '
    date: '2024-11-20'
    from: james.whitfield@deltalogistics.net
    id: msg-002
    priority: medium
    read: false
    subject: 'Invoice #DL-0891 — Payment confirmation needed'
    to: ar@acmecorp.com
  - body: 'Dear team, thank you for the payment of $3,400 received on November 15th
      for INV-7703. Your account is now up to date. Looking forward to continuing
      our partnership.

      '
    date: '2024-11-16'
    from: helen.strauss@novaprintworks.com
    id: msg-003
    priority: low
    read: true
    subject: Thank you — payment received for INV-7703
    to: ar@acmecorp.com
  - body: 'This is a formal notice that Invoice #SS-2230 for $31,500 issued on August
      15th is now 90 days past due. We have made three prior attempts to collect.
      If payment in full is not received within 7 business days, we will refer this
      matter to our legal counsel.

      '
    date: '2024-11-19'
    from: ravi.mehta@sunstoneit.com
    id: msg-004
    priority: high
    read: false
    subject: 'URGENT: Invoice #SS-2230 — 90 days overdue, legal action pending'
    to: ar@acmecorp.com
  - body: 'Hi there, we''re reviewing our contract and wanted to ask whether we qualify
      for net-45 payment terms going forward. We''ve been on net-30 and our cash flow
      situation has changed. Happy to discuss over a call.

      '
    date: '2024-11-21'
    from: cleo.adeyemi@verdantpackaging.co
    id: msg-005
    priority: low
    read: false
    subject: Question about our account terms
    to: ar@acmecorp.com
  - body: 'Hello, we received Invoice #NF-1158 for $9,750 but there is a disputed
