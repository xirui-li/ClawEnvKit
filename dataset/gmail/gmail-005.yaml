      '
    date: '2024-11-26'
    from: accounts@greenleaflogistics.net
    id: msg-002
    priority: medium
    read: false
    subject: 'Invoice #GL-8803 — Friendly Reminder'
    to: finance@mycompany.com
  - body: 'Hello, following up on Invoice #TP-2024-09 for $8,500.00 submitted on October
