prompt: 'Our company has just finalized the acquisition of Brightwave Technologies
  and we need to notify all key stakeholders immediately. Review the inbox to identify
  who has been part of the acquisition discussions so far, then send each of them
  a personalized merger announcement email confirming the deal is closed, the effective
  date is January 15, 2025, and that a formal integration kickoff meeting will be
  scheduled within two weeks. Make sure the tone is professional and celebratory,
  and address each recipient by name.

  '
reference_solution:
- action: Call list_inbox to retrieve recent messages from the inbox (e.g., days_back=14,
    max_results=10).
  step: 1
- action: Review the returned emails to identify senders who are part of the Brightwave
    acquisition discussions — Patricia Nguyen, Robert Okafor, Linda Marsh, James Wu,
    and Sara Patel. Exclude the newsletter sender (newsletter@industrynews.com) as
    irrelevant.
  step: 2
- action: Optionally call get_message on individual emails to confirm each sender's
    full name and role for personalization purposes.
  step: 3
- action: Send a personalized merger announcement email to each of the five stakeholders
    using send_email. Each email should address the recipient by first name, confirm
    the Brightwave Technologies acquisition is closed, state the effective date of
    January 15, 2025, and mention that an integration kickoff meeting will be scheduled
    within two weeks. Tone should be professional and celebratory.
  step: 4
- action: Report back in text confirming which stakeholders were notified, summarizing
    the content of the announcements sent, and explaining why the newsletter contact
    was excluded.
  step: 5
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_service
  weight: 0.08
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: used_send_email_action
  weight: 0.12
- check:
    field: body
    type: audit_field_contains
    value: January 15, 2025
  name: announcement_contains_effective_date
  weight: 0.1
- check:
    keywords:
    - Patricia Nguyen
    - Robert Okafor
    - Linda Marsh
    - James Wu
    - Sara Patel
    type: keywords_present
  name: key_stakeholders_identified_in_output
  weight: 0.15
- check:
    keywords:
    - newsletter@industrynews.com
    type: keywords_absent
  name: newsletter_excluded
  weight: 0.05
- check:
    rubric: 'Evaluate the quality and completeness of the merger announcement emails
      sent by the agent. Score on these dimensions: 1. COVERAGE (0–0.4): Were all
      five relevant stakeholders contacted — Patricia Nguyen (patricia.nguyen@brightwave.io),
      Robert Okafor (robert.okafor@crestcapital.com), Linda Marsh (linda.marsh@ourlegalteam.com),
      James Wu (james.wu@ourcorp.com), and Sara Patel (sara.patel@brightwave.io)?
      Award 0.4 if all five, 0.25 if four, 0.10 if three or fewer. 2. CONTENT ACCURACY
      (0–0.3): Does each email clearly state that the Brightwave Technologies acquisition
      is closed, the effective date is January 15, 2025, and that an integration kickoff
      meeting will be scheduled within two weeks? Award 0.3 if all three facts present,
      0.15 if two, 0.0 if fewer. 3. PERSONALIZATION & TONE (0–0.3): Is each email
      addressed to the recipient by their first name? Is the tone professional and
      celebratory (not generic or templated without adaptation)? Award 0.3 if clearly
      personalized and appropriate for each recipient''s role, 0.15 if partially personalized,
      0.0 if fully generic. Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: announcement_quality_and_personalization
  weight: 0.3
- check:
    rubric: 'Evaluate whether the agent correctly identified and justified which inbox
      senders to include in the merger announcement. The agent should have included
      the five acquisition-related contacts (Patricia Nguyen, Robert Okafor, Linda
      Marsh, James Wu, Sara Patel) and excluded the irrelevant newsletter sender (newsletter@industrynews.com).
      Score 1.0 if the agent''s output explicitly confirms all five relevant stakeholders
      were selected and the newsletter was excluded with clear reasoning. Score 0.6
      if the right people were contacted but no explicit justification was provided.
      Score 0.3 if one or two relevant stakeholders were missed. Score 0.0 if the
      newsletter recipient was included or the selection logic was fundamentally flawed.

      '
    type: llm_judge
  name: stakeholder_selection_reasoning
  weight: 0.2
task_id: gmail-007
task_name: Send Merger Announcement to Stakeholder List
tools:
- description: Retrieve a list of recent emails from the inbox, filtered by recency
    and number of results.
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a single email by its message ID.
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a specified recipient with a subject and body.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save a draft email, optionally as a reply to an existing message.
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
