prompt: 'You are coordinating the annual TechForward Summit. Several speakers are
  registered for tomorrow''s sessions and need personalized reminder emails confirming
  their session time, room, and AV contact. Check the inbox for any speaker registration
  confirmations and coordination emails, then send each registered speaker a tailored
  reminder with their specific session details. Make sure each reminder is warm, professional,
  and includes the AV technician contact (Marcus Webb, mwebb@techforward.io, ext.
  4412).

  '
reference_solution: "1. Call list_inbox to retrieve recent emails from the inbox.\
  \ 2. Call get_message for each speaker confirmation email (msg-001, msg-002, msg-003,\
  \ msg-005) and the AV team\n   email (msg-004) to extract full session and contact\
  \ details.\n3. For each of the four speakers, call send_email with:\n   - to: the\
  \ speaker's email address extracted from their confirmation\n   - subject: a personalized\
  \ reminder referencing their session title and date\n   - body: a professional,\
  \ warm message including their specific session time, room location, any AV/equipment\n\
  \     needs noted in their confirmation, the AV contact (Marcus Webb, mwebb@techforward.io,\
  \ ext. 4412),\n     and a note to arrive 30 minutes before their session for sound\
  \ check.\n4. Confirm in text output that all four reminder emails were sent, naming\
  \ each speaker and summarizing\n   the key details included in each reminder."
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: inbox_checked
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: emails_sent
  weight: 0.1
- check:
    field: body
    type: audit_field_contains
    value: mwebb@techforward.io
  name: av_contact_included
  weight: 0.15
- check:
    keywords:
    - amara.osei@greenlab.org
    - raj.patel@cloudnine.dev
    - s.marchetti@uxbridge.eu
    - d.okafor@securelaunch.io
    type: keywords_present
  name: speaker_emails_addressed
  weight: 0.15
- check:
    rubric: 'Evaluate whether the agent sent reminders that accurately reflect each
      speaker''s confirmed session details from the fixture data. Specifically: -
      Dr. Amara Osei: 9:00 AM, Main Stage Hall A, clicker remote and lapel mic needs
      - Raj Patel: 11:00 AM, Workshop Room B, HDMI adapter need - Sofia Marchetti:
      2:00 PM, Conference Room C, panel format / no slides - David Okafor: 3:30 PM,
      Main Stage Hall A, wireless mic and USB slides Score 1.0 if all four speakers
      received accurate, personalized details. Score 0.75 if three speakers were accurately
      covered. Score 0.5 if two speakers were accurately covered. Score 0.25 if only
      one speaker was accurately covered. Score 0.0 if no accurate session details
      were present.

      '
    type: llm_judge
  name: session_details_accuracy
  weight: 0.25
- check:
    rubric: 'Evaluate the overall quality and professionalism of the reminder emails
      the agent composed and sent. Consider: (1) Tone — are the emails warm and professional,
      appropriate for a conference speaker? (2) Completeness — does each email include
      session time, room location, AV contact (Marcus Webb, mwebb@techforward.io,
      ext. 4412), and the instruction to arrive 30 minutes early for sound check?
      (3) Personalization — does each email address the speaker''s specific AV or
      equipment needs mentioned in their confirmation (e.g., lapel mic for Dr. Osei,
      HDMI adapter for Raj Patel)? (4) Clarity — is the message easy to understand
      with no missing or contradictory information? Score 1.0 for excellent across
      all four dimensions. Score 0.75 if mostly good but missing one dimension or
      one speaker''s personalization. Score 0.5 if basic reminders sent but lacking
      personalization or AV arrival instruction. Score 0.25 if reminders are generic,
      impersonal, or missing critical information for most speakers. Score 0.0 if
      no meaningful reminder content was produced.

      '
    type: llm_judge
  name: reminder_quality
  weight: 0.25
task_id: gmail-007
task_name: Send Personalized Conference Session Reminders to Registered Speakers
tools:
- description: List emails from the inbox, optionally filtering by how many days back
    and max results.
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a single email by its message ID.
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a recipient with a subject and body.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save a draft email, optionally as a reply to a specific message.
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
