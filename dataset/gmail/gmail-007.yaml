prompt: 'A severe weather alert has just been issued for our city and the office needs
  to close immediately. Check the inbox for any employees or external contacts who
  have sent messages today expecting in-person meetings or deliveries, then send each
  of them a personalized notification that the office is closing for the rest of the
  day due to the weather emergency and that all meetings will need to be rescheduled.
  Summarize who you notified and what you told them.

  '
reference_solution: "1. Call list_inbox to retrieve today's emails (days_back=1 or\
  \ similar). 2. Review each message to identify contacts expecting in-person presence\
  \ today:\n   - msg-001: Sarah Chen (sarah.chen@acmecorp.com) — 2pm product demo\n\
  \   - msg-002: Office Supply Plus (dispatch@officesupplyplus.com) — 1-3pm delivery,\
  \ order #OSP-8821\n   - msg-003: Marcus Obi (marcus.obi@talentbridge.io) — 3:30pm\
  \ interview\n   - msg-005: Raj Patel (raj.patel@cityauditors.gov) — 10am compliance\
  \ review\n3. Optionally read individual messages (get_message) for details to personalize\
  \ notifications. 4. Send a personalized email to each of the four contacts using\
  \ send_email, mentioning:\n   - The office is closing due to a severe weather emergency\n\
  \   - Their specific scheduled visit/delivery cannot proceed\n   - They should reschedule\
  \ or contact the office to arrange a new time\n5. Skip msg-004 (internal team lunch\
  \ — Linda Park is internal), msg-006 (automated newsletter),\n   and msg-007 (unrelated\
  \ internal IT request from a prior day).\n6. Provide a clear summary listing all\
  \ notified parties, what they were told, and which messages\n   were intentionally\
  \ excluded and why."
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_service
  weight: 0.08
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_emails_to_contacts
  weight: 0.12
- check:
    keywords:
    - sarah.chen@acmecorp.com
    - marcus.obi@talentbridge.io
    - raj.patel@cityauditors.gov
    type: keywords_present
  name: key_recipients_notified
  weight: 0.2
- check:
    keywords:
    - dispatch@officesupplyplus.com
    type: keywords_present
  name: delivery_contact_notified
  weight: 0.1
- check:
    keywords:
    - newsletter@industrynews.com
    type: keywords_absent
  name: newsletter_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate the quality and appropriateness of the closure notifications
      the agent sent. The agent should have identified the correct contacts requiring
      notification: Sarah Chen (sarah.chen@acmecorp.com, 2pm product demo), Marcus
      Obi (marcus.obi@talentbridge.io, 3:30pm interview), Raj Patel (raj.patel@cityauditors.gov,
      10am compliance review), and the delivery service (dispatch@officesupplyplus.com,
      1-3pm delivery window for order #OSP-8821). Linda Park is an internal employee
      and may or may not be notified — acceptable either way. The newsletter (newsletter@industrynews.com)
      and Tom Nguyen''s printer issue should NOT have received closure notifications.
      Score 1.0 if all four external/delivery contacts received personalized, professional
      notifications mentioning the weather emergency and need to reschedule, with
      context specific to each person''s reason for visiting. Score 0.7 if three of
      the four were notified with appropriate personalization. Score 0.4 if only one
      or two were notified, or if messages were generic without any personalization.
      Score 0.0 if no notifications were sent or completely wrong contacts were chosen.

      '
    type: llm_judge
  name: notification_quality
  weight: 0.25
- check:
    rubric: 'Evaluate the agent''s final summary of actions taken. The summary should
      clearly list who was notified (referencing names and/or email addresses such
      as Sarah Chen, Marcus Obi, Raj Patel, and the Office Supply Plus dispatch),
      what each person was told (office closure due to weather, rescheduling needed),
      and ideally note which contacts were intentionally skipped and why (e.g., newsletter
      is automated, Tom Nguyen''s message is unrelated to today''s in-person visits).
      Score 1.0 if the summary is complete, organized, and explains both who was notified
      and who was excluded with reasoning. Score 0.6 if the summary lists notified
      contacts but does not explain exclusions. Score 0.3 if the summary is vague
      or missing key names. Score 0.0 if no summary is provided.

      '
    type: llm_judge
  name: summary_completeness
  weight: 0.15
task_id: gmail-007
task_name: Coordinate Emergency Office Closure Notifications
tools:
- description: List recent emails from the inbox, optionally filtering by how many
    days back and max results
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a specific email by its message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a recipient with a specified subject and body
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save a draft email, optionally as a reply to an existing message
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
