difficulty: medium
fixtures:
  inbox:
  - body: 'Hi team, just wanted to let everyone know that we''ve successfully completed
      the backend API integration milestone ahead of schedule. All endpoints are tested
      and documented. Next step is the frontend integration starting Monday.

      '
    date: '2024-11-18T09:15:00Z'
    from: david.kim@techcorp.com
    id: msg_001
    priority: normal
    read: false
    subject: Phoenix Project - Backend API milestone complete
    to: me@techcorp.com
  - body: 'The stakeholder review went well! They approved the new dashboard layout
      with minor tweaks to the color scheme. The revised mockups will be ready by
      Wednesday. Budget remains on track at 62% utilization.

      '
    date: '2024-11-19T14:30:00Z'
    from: priya.patel@techcorp.com
    id: msg_002
    priority: normal
    read: false
    subject: Phoenix Project - UI design review feedback
    to: me@techcorp.com
  - body: 'We''ve hit a blocker in QA — the automated test suite is failing on the
      payment module due to a third-party SDK update. Estimated resolution time is
      2 days. This may push the overall deadline by 3 days unless we parallelize other
      testing tracks. Flagging for PM awareness.

      '
    date: '2024-11-20T11:00:00Z'
    from: tom.harris@techcorp.com
    id: msg_003
    priority: high
    read: false
    subject: Phoenix Project - QA blocker identified
    to: me@techcorp.com
  - body: 'This week in software development: Rust 2.0 reaches stable, new AI coding
      tools comparison, and best practices for microservices architecture...

      '
    date: '2024-11-20T08:00:00Z'
    from: newsletter@devdigest.io
    id: msg_004
    priority: low
    read: false
    subject: Weekly Dev Digest - November 2024
    to: me@techcorp.com
  - body: 'Hey, just a reminder that I need the weekly Phoenix Project status update
      by end of day Friday. Please include progress on milestones, any blockers, and
      budget status. Thanks!

      '
    date: '2024-11-18T16:45:00Z'
    from: sarah.chen@techcorp.com
    id: msg_005
    priority: high
    read: true
    subject: 'Re: Phoenix Project - weekly update request'
    to: me@techcorp.com
  - body: 'Please find attached invoice #4421 for November consulting services totaling
      $8,500. Payment is due within 30 days.

      '
    date: '2024-11-17T10:00:00Z'
    from: alice.morgan@vendorcorp.com
    id: msg_006
    priority: normal
    read: false
    subject: 'Invoice #4421 for November services'
    to: me@techcorp.com
  - body: 'The staging environment has been provisioned and configured. CI/CD pipeline
      is live. We''re ready for the first full integration deploy whenever the frontend
      team gives the green light.

      '
    date: '2024-11-21T09:00:00Z'
    from: david.kim@techcorp.com
    id: msg_007
    priority: normal
    read: false
    subject: Phoenix Project - deployment environment ready
    to: me@techcorp.com
prompt: 'Check my inbox for any emails related to the "Phoenix Project" from the past
  14 days, read through them to understand the current status, and then send a concise
  weekly status update email to my project manager Sarah Chen at sarah.chen@techcorp.com
  summarizing what you found about the project''s progress.

  '
reference_solution:
- description: 'Call list_inbox with days_back=14 and a sufficient max_results (e.g.,
    20) to retrieve recent emails from the past two weeks.

    '
  step: 1
- description: 'Review the returned email list and identify messages with "Phoenix
    Project" in the subject line: msg_001, msg_002, msg_003, msg_005, and msg_007.

    '
  step: 2
- description: 'Call get_message for each Phoenix Project email (at minimum msg_001,
    msg_002, msg_003, and msg_007) to read the full content and understand project
    status.

    '
  step: 3
- description: 'Synthesize the findings: backend API is complete, UI design was approved,
    there is a QA blocker on the payment module causing a potential 3-day delay, and
    the staging environment is ready for deployment.

    '
  step: 4
- description: 'Call send_email with to=sarah.chen@techcorp.com, a subject referencing
    the Phoenix Project weekly status update, and a body summarizing the key findings
    including milestones achieved, current blockers, and next steps.

    '
  step: 5
- description: Do NOT call create_draft — the task requires sending the update, not
    saving it as a draft. Do not send to any other recipients or include unrelated
    content.
  step: 6
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: inbox_listed
  weight: 0.1
- check:
    action: get_message
    count: 3
    service: gmail
    type: audit_count_gte
  name: phoenix_emails_read
  weight: 0.2
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_equals
    value: sarah.chen@techcorp.com
  name: email_sent_to_sarah
  weight: 0.2
- check:
    action: send_email
    field: subject
    service: gmail
    type: audit_field_contains
    value: Phoenix
  name: subject_mentions_phoenix_or_status
  weight: 0.1
- check:
    action: send_email
    count: 1
    service: gmail
    type: audit_count_equals
  name: send_action_called_once
  weight: 0.1
- check:
    keywords:
    - blocker
    - QA
    - payment
    type: keywords_present
  name: body_mentions_blocker
  weight: 0.1
- check:
    keywords:
    - milestone
    - API
    - staging
    type: keywords_present
  name: body_mentions_milestone_or_progress
  weight: 0.05
- check:
    keywords:
    - alice.morgan@vendorcorp.com
    - newsletter@devdigest.io
    type: keywords_absent
  name: no_irrelevant_recipients
  weight: 0.05
- check:
    rubric: 'The sent email should be a coherent and professional weekly status update
      addressed to a project manager. It should summarize at least two of the following
      Phoenix Project updates found in the inbox: backend API completion, UI design
      approval, QA blocker on payment module, and staging environment readiness. The
      email should be concise, organized, and suitable for a managerial audience.
      Penalize if the email is vague, missing key details, or includes unrelated content
      such as vendor invoices.

      '
    type: llm_judge
  name: status_update_quality
  weight: 0.1
task_id: gmail-007
task_name: Archive Research and Send Weekly Project Status Update
tools:
- description: Retrieve a list of emails from the inbox, optionally filtered by recency
    and count
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a specific email by its message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a specified recipient with a subject and body
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save a draft email without sending it, optionally as a reply to an
    existing message
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
