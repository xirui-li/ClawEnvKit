difficulty: easy
fixtures:
  inbox:
  - body: 'Hi, I wanted to reach out to confirm our meeting for Thursday at 2:00 PM
      to go over the Q3 budget figures. Please let me know if that time still works
      for you. Looking forward to connecting. Best, Sarah

      '
    date: '2024-11-14T09:23:00Z'
    from: sarah.chen@acmecorp.com
    id: msg_001
    priority: high
    read: false
    subject: Meeting Request - Q3 Budget Review
    to: user@company.com
  - body: 'This week in tech: AI breakthroughs, new framework releases, and cloud
      computing trends. Read more inside.

      '
    date: '2024-11-14T07:00:00Z'
    from: newsletter@techdigest.io
    id: msg_002
    priority: low
    read: false
    subject: 'Weekly Tech Digest - Issue #142'
    to: user@company.com
  - body: 'Just a friendly reminder that your contract renewal is due by end of month.
      Please review the attached terms and let us know if you have any questions.

      '
    date: '2024-11-13T15:45:00Z'
    from: james.okafor@partnersfirm.com
    id: msg_003
    priority: medium
    read: true
    subject: Contract Renewal Reminder
    to: user@company.com
  - body: 'This is a reminder to submit your timesheets before 5 PM on Friday. Contact
      HR if you have issues.

      '
    date: '2024-11-13T10:00:00Z'
    from: hr@company.com
    id: msg_004
    priority: low
    read: true
    subject: 'Reminder: Submit Timesheets by Friday'
    to: user@company.com
  - body: 'Hi, I wanted to follow up on the proposal we discussed last week. Do you
      have any updates on the timeline? Thanks, David

      '
    date: '2024-11-12T14:30:00Z'
    from: david.martinez@clientgroup.net
    id: msg_005
    priority: medium
    read: false
    subject: Follow-up on Proposal
    to: user@company.com
prompt: 'Check your inbox for any high-priority emails from clients and reply to the
  most recent one from Sarah Chen confirming that you can meet at the time she proposed.
  Keep the reply professional and concise.

  '
reference_solution:
- Call list_inbox to retrieve recent emails from the inbox.
- Identify the high-priority email from Sarah Chen (msg_001) about the Q3 Budget Review
  meeting.
- Call get_message with message_id msg_001 to read the full email content.
- Note that Sarah proposed Thursday at 2:00 PM for the meeting.
- Call send_email with to set to sarah.chen@acmecorp.com, an appropriate subject such as "Re: Meeting
    Request - Q3 Budget Review", and a professional body confirming availability for
    Thursday at 2:00 PM.
- Do not save as draft — the task requires actually sending the reply.
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: inbox_listed
  weight: 0.15
- check:
    action: get_message
    field: message_id
    service: gmail
    type: audit_field_equals
    value: msg_001
  name: correct_message_read
  weight: 0.2
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_contains
    value: sarah.chen@acmecorp.com
  name: reply_sent_to_sarah
  weight: 0.25
- check:
    action: send_email
    field: subject
    service: gmail
    type: audit_field_contains
    value: Meeting
  name: reply_subject_contains_meeting
  weight: 0.15
- check:
    keywords:
    - Thursday
    - confirm
    - 120
    type: keywords_present
  name: confirmation_keywords_present
  weight: 0.1
- check:
    rubric: 'The agent sent a professional and concise reply to Sarah Chen confirming
      availability for the Thursday 2:00 PM meeting. The response is polite, on-topic,
      and does not include unnecessary information or send emails to unrelated parties.

      '
    type: llm_judge
  name: reply_quality
  weight: 0.15
task_id: gmail-001
task_name: Reply to urgent client email with meeting confirmation
tools:
- description: Retrieve a list of emails from the inbox, optionally filtered by how
    many days back and maximum number of results.
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a single email message by its ID.
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a recipient with a specified subject and body.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email as a draft, optionally linking it as a reply to an existing
    message.
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
