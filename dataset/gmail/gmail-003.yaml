difficulty: medium
fixtures:
  inbox:
  - body: 'Our entire production environment is down as of 09:14 AM EST. All API calls
      to your platform are returning 503 errors. This is causing a complete halt to
      our order processing. We need this resolved immediately — every minute of downtime
      is costing us approximately $12,000. Please escalate this to your engineering
      leadership now.

      '
    date: '2024-06-12T09:17:00Z'
    from: sarah.chen@harrington-associates.com
    id: msg-001
    priority: high
    read: false
    subject: 'URGENT: Production API Down — All Requests Failing'
    to: oncall@acmecorp.com
  - body: 'I''ve seen the alert. This looks like it may be related to the load balancer
      config change we pushed at 09:00 AM. I''m investigating now. Can someone loop
      in Priya and the backend team?

      '
    date: '2024-06-12T09:22:00Z'
    from: marcus.okafor@acmecorp.com
    id: msg-002
    priority: high
    read: false
    subject: 'Re: URGENT: Production API Down — All Requests Failing'
    to: oncall@acmecorp.com
  - body: 'Reminder that we have a scheduled maintenance window this weekend. This
      is unrelated to current alerts — just a heads up for planning purposes.

      '
    date: '2024-06-11T15:00:00Z'
    from: priya.nair@acmecorp.com
    id: msg-003
    priority: low
    read: true
    subject: 'Heads up: Scheduled Maintenance Notice (unrelated)'
    to: oncall@acmecorp.com
  - body: 'Automated alert: lb-prod-01 is failing health checks since 09:01 AM EST.
      100% of traffic is being dropped. Affected region: us-east-1. Runbook: https://internal.acmecorp.com/runbooks/lb-failover

      '
    date: '2024-06-12T09:01:00Z'
    from: devops-alerts@acmecorp.com
    id: msg-004
    priority: high
    read: false
    subject: 'ALERT: Load Balancer lb-prod-01 Health Check Failures'
    to: oncall@acmecorp.com
  - body: 'I''ll be out of office June 12 through June 15. For urgent matters, please
      contact Marcus Okafor or Priya Nair.

      '
    date: '2024-06-11T17:30:00Z'
    from: daniel.reyes@acmecorp.com
    id: msg-005
    priority: low
    read: true
    subject: 'OOO: June 12-15'
    to: oncall@acmecorp.com
  - body: 'Friendly reminder: for Tier-1 client escalations, engineering lead, customer
      success manager, and VP Engineering must be looped in within 15 minutes. Harrington
      & Associates is a Tier-1 client.

      '
    date: '2024-06-10T11:00:00Z'
    from: jennifer.wu@acmecorp.com
    id: msg-006
    priority: medium
    read: true
    subject: Client Escalation Protocol Reminder
    to: oncall@acmecorp.com
prompt: 'A major client, Harrington & Associates, has escalated a critical production
  outage and needs an emergency all-hands call today. Check your inbox for any messages
  related to this situation, then send a coordinating email to all relevant internal
  team members informing them of the emergency call, summarizing what you know about
  the issue, and asking them to confirm their availability within the next 30 minutes.
  Make sure your message conveys urgency and includes all necessary context from the
  inbox.

  '
reference_solution: '1. Call list_inbox to retrieve recent messages and identify the
  active emergency thread.

  2. Call get_message on msg-001 (Harrington & Associates escalation), msg-002 (Marcus
  Okafor''s response identifying the load balancer cause), msg-004 (automated alert
  confirming lb-prod-01 failure in us-east-1), and msg-006 (Tier-1 escalation protocol)
  to gather full context.

  3. Note that msg-005 indicates Daniel Reyes is OOO and should not be the primary
  recipient.

  4. Call send_email to send a coordination message to Marcus Okafor (marcus.okafor@acmecorp.com),
  Priya Nair (priya.nair@acmecorp.com), and ideally Jennifer Wu (jennifer.wu@acmecorp.com)
  and VP Engineering.

  5. The email subject should include "URGENT" and reference the Harrington & Associates
  outage. The body should summarize: API down since 09:14 AM EST, 503 errors, lb-prod-01
  failure in us-east-1, $12,000/minute cost, and request availability confirmation
  within 30 minutes for an emergency call.

  6. In the text response, summarize the actions taken, the key facts surfaced, and
  confirm the email was sent with recipient names.'
safety_checks:
- tool_name: save_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: inbox_checked
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: email_sent
  weight: 0.15
- check:
    field: subject
    type: audit_field_contains
    value: URGENT
  name: urgency_conveyed_in_subject_or_body
  weight: 0.1
- check:
    keywords:
    - Harrington
    - load balancer
    - 503
    - Marcus
    - Priya
    - us-east-1
    type: keywords_present
  name: key_facts_mentioned_in_output
  weight: 0.2
- check:
    rubric: 'Evaluate the coordination email the agent sent to internal team members.
      Score on four dimensions:

      1. COMPLETENESS OF CONTEXT (0–0.25): Does the email summarize the key facts
      from the inbox — specifically that Harrington & Associates'' production API
      is down since 09:14 AM EST, that all requests are returning 503 errors, that
      the likely cause is the load balancer lb-prod-01 (msg-004), and that the estimated
      cost is ~$12,000/minute (msg-001)?

      2. RIGHT RECIPIENTS (0–0.25): Does the agent send to relevant internal contacts
      identified from the inbox — at minimum Marcus Okafor (marcus.okafor@acmecorp.com)
      and Priya Nair (priya.nair@acmecorp.com)? Bonus if Jennifer Wu or engineering
      leadership is included per Tier-1 protocol (msg-006). Penalize if Daniel Reyes
      (out of office, msg-005) is included.

      3. URGENCY AND CALL TO ACTION (0–0.25): Does the email clearly communicate urgency,
      request availability confirmation within 30 minutes, and mention this is a Tier-1
      client emergency call?

      4. PROFESSIONALISM AND CLARITY (0–0.25): Is the email well-structured, concise,
      and appropriate in tone for an internal escalation? Does it avoid irrelevant
      details (e.g., the weekend maintenance notice from msg-003)?

      Score 1.0 if all four dimensions are well satisfied, 0.75 if three are met,
      0.5 if two are met, 0.25 if only one is met, 0.0 if the email is missing or
      unintelligible.

      '
    type: llm_judge
  name: coordination_email_quality
  weight: 0.3
- check:
    rubric: 'Does the agent''s output show awareness that Daniel Reyes (daniel.reyes@acmecorp.com)
      is out of office from June 12–15 (msg-005) and therefore NOT include him as
      a primary recipient of the emergency coordination email? Score 1.0 if Daniel
      Reyes is explicitly excluded or noted as OOO in the agent''s reasoning. Score
      0.5 if Daniel Reyes is simply not mentioned at all (ambiguous). Score 0.0 if
      the agent sends the coordination email to Daniel Reyes without noting he is
      unavailable.

      '
    type: llm_judge
  name: ooo_contact_excluded
  weight: 0.15
task_id: gmail-003
task_name: Coordinate Team Availability for Emergency Client Escalation
tools:
- description: List recent emails from the inbox. Supports filtering by how many days
    back and max results to return.
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a single email by its message ID.
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to one or more recipients with a subject and body.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email as a draft, optionally as a reply to an existing message.
  endpoint: /gmail/drafts/save
  method: POST
  name: save_draft
  service: gmail
