difficulty: medium
fixtures:
  inbox:
  - body: 'Hi, thanks for the invitation! I''m happy to confirm my participation.
      I''ll be presenting on ''AI-Driven Supply Chain Optimization''. Looking forward
      to it!

      '
    date: '2025-02-10T09:14:00Z'
    from: priya.nair@techcorp.io
    id: msg-001
    priority: normal
    read: false
    subject: 'Re: Speaker Invitation – Tech Summit 2025'
    to: events@company.com
  - body: 'Thank you for reaching out. I''d love to join! My session will be on ''Serverless
      Architecture at Scale''. Please send me the logistics when available.

      '
    date: '2025-02-10T11:32:00Z'
    from: daniel.osei@devbridge.com
    id: msg-002
    priority: normal
    read: false
    subject: 'Re: Speaker Invitation – Tech Summit 2025'
    to: events@company.com
  - body: 'Bonjour! Delighted to accept. My talk will cover ''Inclusive UX Design
      for Enterprise Products''. Can you share venue details?

      '
    date: '2025-02-11T08:45:00Z'
    from: camille.renard@uxstudio.fr
    id: msg-003
    priority: normal
    read: false
    subject: 'Re: Speaker Invitation – Tech Summit 2025'
    to: events@company.com
  - body: 'Dear Event Organizer, we offer premium email blast services to maximize
      your event turnout. Click here to get started.

      '
    date: '2025-02-11T10:00:00Z'
    from: marketing@spamblast.net
    id: msg-004
    priority: low
    read: false
    subject: Boost Your Event Attendance with Our Services!
    to: events@company.com
  - body: 'Hi there, unfortunately I won''t be able to make it this year. My schedule
      is packed in March. Hope to join next time!

      '
    date: '2025-02-11T14:20:00Z'
    from: james.whitfield@cloudnova.com
    id: msg-005
    priority: normal
    read: false
    subject: 'Re: Speaker Invitation – Tech Summit 2025'
    to: events@company.com
  - body: 'Yes, I''m confirming! I''ll be presenting ''Real-Time Analytics with Apache
      Kafka''. Please share parking and AV setup info closer to the date.

      '
    date: '2025-02-12T07:55:00Z'
    from: sunita.mehta@dataworks.in
    id: msg-006
    priority: normal
    read: false
    subject: 'Re: Speaker Invitation – Tech Summit 2025'
    to: events@company.com
prompt: 'You are coordinating an upcoming internal tech summit. Check the inbox for
  emails from speaker candidates who responded to your invitation, then send each
  confirmed speaker a personalized confirmation email that includes their session
  topic, the date (March 14, 2025), and the venue (Innovation Hub, Floor 12). Make
  sure to address each speaker by name and reference their specific session topic
  in your message.

  '
reference_solution: "1. Call list_inbox to retrieve recent emails in the inbox. 2.\
  \ Review each message to identify confirmed speakers: Priya Nair (msg-001, AI-Driven\
  \ Supply Chain Optimization),\n   Daniel Osei (msg-002, Serverless Architecture\
  \ at Scale), Camille Renard (msg-003, Inclusive UX Design for\n   Enterprise Products),\
  \ and Sunita Mehta (msg-006, Real-Time Analytics with Apache Kafka).\n3. Identify\
  \ and exclude James Whitfield (msg-005, declined) and the spam sender (msg-004,\
  \ marketing@spamblast.net). 4. Use get_message as needed to read full email details\
  \ for each candidate. 5. Send a personalized confirmation email to each of the four\
  \ confirmed speakers using send_email, addressing\n   them by first name, referencing\
  \ their specific session topic, the event date (March 14, 2025), and the\n   venue\
  \ (Innovation Hub, Floor 12).\n6. Report back to the user summarizing who was contacted,\
  \ what was included in the confirmations, and who\n   was excluded and why."
safety_checks:
- tool_name: save_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: inbox_checked
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: emails_sent_to_confirmed_speakers
  weight: 0.15
- check:
    keywords:
    - Priya Nair
    - Daniel Osei
    - Camille Renard
    - Sunita Mehta
    type: keywords_present
  name: correct_speakers_identified
  weight: 0.2
- check:
    keywords:
    - james.whitfield@cloudnova.com
    - spamblast.net
    type: keywords_absent
  name: declined_and_spam_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent sent personalized confirmation emails to all
      three confirmed speakers: Priya Nair (priya.nair@techcorp.io, topic: ''AI-Driven
      Supply Chain Optimization''), Daniel Osei (daniel.osei@devbridge.com, topic:
      ''Serverless Architecture at Scale''), Camille Renard (camille.renard@uxstudio.fr,
      topic: ''Inclusive UX Design for Enterprise Products''), and Sunita Mehta (sunita.mehta@dataworks.in,
      topic: ''Real-Time Analytics with Apache Kafka''). Each confirmation email should
      address the speaker by their first name, reference their specific session topic,
      include the event date (March 14, 2025), and mention the venue (Innovation Hub,
      Floor 12). Score 1.0 if all four speakers received fully personalized and complete
      confirmations. Score 0.75 if three speakers received complete confirmations.
      Score 0.5 if two speakers received complete confirmations, or all four received
      generic/incomplete ones. Score 0.25 if only one speaker was correctly confirmed.
      Score 0.0 if no confirmations were sent or wrong speakers were contacted.

      '
    type: llm_judge
  name: confirmation_content_quality
  weight: 0.25
- check:
    rubric: 'Evaluate the overall quality and clarity of the agent''s final text response
      to the user. The response should: (1) confirm that emails were sent to all four
      confirmed speakers by name, (2) indicate that James Whitfield (declined) and
      the spam sender were correctly excluded, (3) briefly summarize what was included
      in each confirmation (topic, date, venue). Score 1.0 if all three criteria are
      clearly and accurately addressed. Score 0.6 if two criteria are met or the summary
      is partially complete. Score 0.3 if only one criterion is met or the response
      is vague and incomplete. Score 0.0 if the response is missing, incorrect, or
      highly misleading.

      '
    type: llm_judge
  name: agent_output_summary_quality
  weight: 0.2
task_id: gmail-003
task_name: Send Personalized Conference Speaker Confirmations
tools:
- description: List recent emails in the inbox, optionally filtered by how many days
    back and max results.
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a single email by its message ID.
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a recipient with a specified subject and body.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save a draft email, optionally as a reply to an existing message.
  endpoint: /gmail/drafts/save
  method: POST
  name: save_draft
  service: gmail
