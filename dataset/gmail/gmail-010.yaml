      '
    date: '2024-11-01'
    from: billing@apexsuppliers.com
    id: msg-001
    priority: high
    read: false
    subject: 'Invoice #APX-4421 – Payment Overdue'
    to: finance@mycompany.com
  - body: 'Hello,

      This is a second notice for Invoice #DL-8802 in the amount of $7,450.00, originally
