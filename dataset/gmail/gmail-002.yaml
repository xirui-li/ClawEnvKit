difficulty: easy
fixtures:
  inbox:
  - body: 'Hi Alex,


      We need to finalize the Q3 contract renewal terms by end of week. Please review
      the attached terms and confirm your agreement. Our legal team is standing by.


      Best,

      David Kim

      PartnerCo'
    date: '2024-11-12T09:14:00Z'
    from: david.kim@partnerco.com
    id: msg_001
    priority: high
    read: false
    subject: Q3 Contract Renewal - Action Required
    to: alex.morgan@company.com
  - body: 'Your weekly roundup of the latest in technology news and trends.


      Story 1: AI advancements...

      Story 2: Cloud computing trends...'
    date: '2024-11-13T07:00:00Z'
    from: newsletter@techdigest.io
    id: msg_002
    priority: normal
    read: false
    subject: This Week in Tech - Top Stories
    to: alex.morgan@company.com
  - body: 'Alex,


      We require immediate budget sign-off for the infrastructure upgrade project.
      The vendor deadline is tomorrow at noon. Please advise ASAP.


      Regards,

      Priya Patel

      BigClient Inc.'
    date: '2024-11-14T11:30:00Z'
    from: priya.patel@bigclient.com
    id: msg_003
    priority: high
    read: false
    subject: Urgent Budget Approval Needed
    to: alex.morgan@company.com
  - body: 'Reminder: Benefits open enrollment closes November 20th. Log in to the
      HR portal to review and update your selections.'
    date: '2024-11-10T08:00:00Z'
    from: hr@company.com
    id: msg_004
    priority: normal
    read: true
    subject: Open Enrollment Reminder
    to: alex.morgan@company.com
  - body: 'Dear Alex,


      I regret to inform you that your scheduled shipment #SH-4892 has been delayed
      by 3 business days due to port congestion. Please update your project timelines
      accordingly.


      Sincerely,

      James O''Connor

      Supplier Logistics'
    date: '2024-11-11T15:45:00Z'
    from: james.oconnor@supplier.net
    id: msg_005
    priority: high
    read: false
    subject: Shipment Delay Notification - HIGH PRIORITY
    to: alex.morgan@company.com
  - body: 'Hi everyone,


      Please find the notes from yesterday''s all-hands meeting attached. Key takeaways
      are summarized below...'
    date: '2024-11-13T16:00:00Z'
    from: cto@company.com
    id: msg_006
    priority: normal
    read: true
    subject: Team All-Hands Notes
    to: alex.morgan@company.com
prompt: 'I need you to find any unread high-priority emails in my inbox from the last
  7 days and forward the most recent one to my colleague Sarah Chen at sarah.chen@company.com
  with a brief note at the top saying you are forwarding it on my behalf. Send it
  with the subject prefixed by ''FWD: ''.'
reference_solution:
- 'Step 1: Call list_inbox with days_back=7 to retrieve recent emails.'
- 'Step 2: Filter the results to identify unread emails with priority set to ''high''.
  The high-priority unread emails are msg_001 (2024-11-12), msg_003 (2024-11-14),
  and msg_005 (2024-11-11).'
- 'Step 3: Identify the most recent high-priority unread email, which is msg_003 (Urgent
  Budget Approval Needed, dated 2024-11-14).'
- 'Step 4: Call get_message with message_id=msg_003 to retrieve the full content of
  that email.'
- 'Step 5: Call send_email with to=sarah.chen@company.com, subject=''FWD: Urgent Budget
  Approval Needed'', and a body that begins with a brief note such as ''I am forwarding
  this email on Alex''s behalf.'' followed by the original email content from Priya
  Patel.'
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: inbox_listed
  weight: 0.15
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: high_priority_message_read
  weight: 0.2
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_equals
    value: sarah.chen@company.com
  name: correct_recipient
  weight: 0.2
- check:
    action: send_email
    field: subject
    service: gmail
    type: audit_field_contains
    value: 'FWD: '
  name: subject_prefixed_fwd
  weight: 0.2
- check:
    action: send_email
    field: subject
    service: gmail
    type: audit_field_contains
    value: Urgent Budget Approval Needed
  name: forwarded_most_recent_high_priority
  weight: 0.1
- check:
    rubric: The email body sent to sarah.chen@company.com should include a brief note
      at the top indicating the sender is forwarding this email on Alex's behalf.
      The original email content (about budget approval) should be included in the
      body. Score 1.0 if both conditions are met, 0.5 if only one is met, 0.0 otherwise.
    type: llm_judge
  name: forwarding_note_in_body
  weight: 0.15
task_id: gmail-002
task_name: Forward high-priority email to colleague
tools:
- description: Retrieve a list of emails from the inbox, optionally filtered by how
    many days back to look and maximum number of results to return.
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a single email message by its unique message
    ID.
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a recipient with a specified subject and body.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save a draft email, optionally as a reply to an existing message.
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
