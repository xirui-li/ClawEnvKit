category: communication
claw_eval_id: T02_email_triage
difficulty: medium
fixtures:
  inbox:
  - body: 'Hi, this is a reminder that the Marketing department''s Q4 budget request
      of $142,000 has been sitting with Director Patel since Monday. We need sign-off
      by Friday EOD or the campaign timeline slips by 3 weeks. Please escalate if
      needed.

      '
    date: '2024-10-22T09:15:00Z'
    from: sarah.chen@finance.acme.com
    id: msg-001
    priority: high
    read: false
    subject: 'URGENT: Q4 Budget Approval Needed — Marketing Dept'
    to: manager@acme.com
  - body: 'Sending a follow-up on the Facilities Phase 2 renovation budget ($87,500).
      I submitted this to VP Torres two weeks ago and haven''t heard back. The contractor
