    from: priya.nair@sales.acme.com
    id: msg-005
    priority: low
    read: true
    subject: Sales Conference Budget — Approved ✓
    to: manager@acme.com
  - body: 'Our external counsel retainer renewal ($98,000) is under review by the
      CFO''s office. Submitted October 17th. Legal deadlines are firm — if not approved
