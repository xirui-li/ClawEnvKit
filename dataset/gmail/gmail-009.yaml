    from: james.okafor@ops.acme.com
    id: msg-002
    priority: high
    read: false
    subject: Budget Request — Facilities Renovation (Phase 2)
    to: manager@acme.com
  - body: 'Just a heads-up that the HR department''s annual training budget ($34,200)
