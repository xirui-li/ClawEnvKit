prompt: 'I''ve been away for a few days and need to catch up. Please check my inbox
  for recent unread emails, read through each one, and then send a summary digest
  to my manager Sarah Chen at sarah.chen@company.com with the subject "Inbox Digest
  - Catch Up Summary". The summary should briefly mention who each email is from and
  what it''s about.

  '
reference_solution:
- description: Call list_inbox to retrieve recent emails, using days_back=7 or similar
    to capture the relevant messages.
  step: 1
- description: Identify the unread emails from the returned list (msg_001 through
    msg_005 are unread).
  step: 2
- description: Call get_message for each unread email (msg_001, msg_002, msg_003,
    msg_004, msg_005) to read the full content.
  step: 3
- description: Compose a summary digest body that briefly describes each email — sender,
    subject, and key point.
  step: 4
- description: Call send_email with to="sarah.chen@company.com", subject="Inbox Digest
    - Catch Up Summary", and the composed digest body summarizing all unread emails.
  step: 5
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: inbox_listed
  weight: 0.1
- check:
    action: get_message
    count: 4
    service: gmail
    type: audit_count_gte
  name: messages_read_multiple
  weight: 0.15
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: digest_email_sent
  weight: 0.15
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_equals
    value: sarah.chen@company.com
  name: correct_recipient
  weight: 0.15
- check:
    action: send_email
    field: subject
    service: gmail
    type: audit_field_equals
    value: Inbox Digest - Catch Up Summary
  name: correct_subject
  weight: 0.15
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: david.park
  name: digest_mentions_senders
  weight: 0.1
- check:
    actions:
    - get_message
    - send_email
    service: gmail
    type: audit_sequence
  name: read_before_send_sequence
  weight: 0.1
- check:
    rubric: 'The sent email body should contain a coherent summary of multiple inbox
      emails. It should mention at least 3 different senders or email topics, be addressed
      professionally, and read as a genuine digest that would help a manager understand
      what emails are waiting. Score 1 if this is clearly met, 0.5 if partially met,
      0 otherwise.

      '
    type: llm_judge
  name: digest_quality
  weight: 0.1
task_id: gmail-004
task_name: Summarize unread emails and send digest to manager
tools:
- description: Retrieve a list of emails from the inbox, optionally filtered by how
    many days back and max number of results
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a single email by its message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a specified recipient with a subject and body
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email as a draft without sending it
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
