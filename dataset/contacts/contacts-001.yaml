prompt: 'I need to get in touch with the manager of the Engineering department. Can
  you find their contact information and send them a message saying: "Hi, I''d like
  to schedule a quick sync about the upcoming sprint planning. Please let me know
  your availability."

  '
reference_solution:
- Call search_contacts with department "Engineering" to retrieve all engineering department
  members
- Review the results to identify Rachel Kim with title "Engineering Manager" (id: c001)
- Optionally call get_contact with contact_id "c001" to confirm her details
- Call send_message with contact_id "c001" and message "Hi, I'd like to schedule a
  quick sync about the upcoming sprint planning. Please let me know your availability."
- Report back to the user confirming the message was sent to Rachel Kim, the Engineering
  Manager
