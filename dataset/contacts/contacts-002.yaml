prompt: 'The CEO needs a briefing document before tomorrow''s board meeting. Please
  look up the full profiles of the following three executives: the Chief Financial
  Officer, the Chief Technology Officer, and the VP of Operations. Compile their contact
  details and titles into a concise summary that the CEO can review before the meeting.

  '
reference_solution: '1. Search contacts for "Chief Financial Officer" or "Finance"
  department to identify Sandra Whitfield (c001).

  2. Search contacts for "Chief Technology Officer" or "Technology" department to
  identify Marcus Chen (c002).

  3. Search contacts for "VP of Operations" or "Operations" department to identify
  Priya Nambiar (c003).

  4. Call get_contact with contact_id "c001" to retrieve Sandra Whitfield''s full
  profile.

  5. Call get_contact with contact_id "c002" to retrieve Marcus Chen''s full profile.

  6. Call get_contact with contact_id "c003" to retrieve Priya Nambiar''s full profile.

  7. Compile the retrieved details (name, title, department, email, phone) into a
  clear, professional briefing summary organized by individual, ready for the CEO
  to review before the board meeting.

  8. Do NOT send any messages to the contacts — this is a read-only information retrieval
  task.'
