- check:
    rubric: "Evaluate the agent's output on three dimensions:\n1. COMPLETENESS (0.0–0.4):\
      \ Did the agent successfully look up and display full contact details\n   (name,\
      \ title, email, phone) for all three required contacts — Sandra Okafor (HR,\
      \ c-001),\n   Marcus Delgado (Finance, c-002), and Priya Nambiar (Legal, c-003)?\n\
      \   Award 0.4 if all three are fully detailed, 0.2 if two are complete, 0.1\
      \ if only one, 0.0 if none.\n\n2. MESSAGE ACCURACY (0.0–0.4): Did the agent\
      \ send introductory messages to all three contacts\n   that correctly identify\
      \ the sender as Alex Rivera joining as Senior Product Manager?\n   Award 0.4\
      \ if all three messages were sent with correct identity details, 0.2 if two,\
      \ 0.1 if one, 0.0 if none.\n\n3. TONE AND PROFESSIONALISM (0.0–0.2): Are the\
      \ messages friendly, professional, and appropriate\n   for an introductory business\
      \ context? Award 0.2 if well-crafted, 0.1 if adequate but generic, 0.0 if inappropriate.\n\
      \nFinal score = sum of the three dimension scores (max 1.0).\n"
    type: llm_judge
  name: message_quality_and_completeness
  weight: 0.3
task_id: contacts-002
