prompt: 'I''m a new employee starting next Monday and my manager asked me to introduce
  myself to the key department leads before my first day. Please look up the full
  details (name, title, email, and phone) for the heads of HR, Finance, and Legal,
  then send each of them a brief, friendly introductory message on my behalf — say
  my name is Alex Rivera and I''m joining the company as a Senior Product Manager
  next week.

  '
reference_solution: '1. Search contacts with department="HR" to find Sandra Okafor
  (c-001). 2. Search contacts with department="Finance" to find Marcus Delgado (c-002).
  3. Search contacts with department="Legal" to find Priya Nambiar (c-003). 4. Call
  get_contact for c-001 to retrieve Sandra Okafor''s full details (name, title, email,
  phone). 5. Call get_contact for c-002 to retrieve Marcus Delgado''s full details.
  6. Call get_contact for c-003 to retrieve Priya Nambiar''s full details. 7. Call
  send_message for c-001 with a friendly introduction: "Hi Sandra, my name is Alex
  Rivera and I''m joining the company as a Senior Product Manager next week. I wanted
  to introduce myself before my first day and look forward to working with you and
  the HR team!" 8. Call send_message for c-002 with a similar tailored message to
  Marcus Delgado. 9. Call send_message for c-003 with a similar tailored message to
  Priya Nambiar. 10. Present the full contact details for all three contacts in the
  response, confirm all three messages were sent, and summarize the outreach.'
