- check:
    rubric: 'Evaluate the agent''s executive briefing summary on three dimensions:


      1. Completeness (40%): Does the summary include all three executives — Sandra
      Whitfield (CFO), Marcus Chen (CTO), and Priya Nambiar (VP of Operations)? Does
      it include each person''s full name, title, email address, phone number, and
      department? Deduct proportionally for missing executives or missing fields.


      2. Clarity and Professionalism (35%): Is the summary well-structured and easy
      for a CEO to scan quickly? Does it present information in a logical, consistent
      format (e.g., grouped per individual, labeled fields)? Is the tone appropriate
      for an executive briefing — concise, professional, and free of unnecessary filler?


      3. Accuracy (25%): Are all the details presented factually correct as retrieved
      from the contact profiles? There should be no invented data, swapped fields,
      or incorrect attributions between executives.


      Scoring:

      - 1.0: All three executives fully profiled with correct details, clearly formatted,
      professional tone

      - 0.75: All three executives present but one or two fields missing or minor
      formatting issues

      - 0.5: Two executives fully profiled or all three partially profiled

      - 0.25: Only one executive profiled or significant accuracy issues

      - 0.0: No meaningful briefing content produced or completely incorrect

      '
    type: llm_judge
  name: briefing_summary_quality
  weight: 0.4
