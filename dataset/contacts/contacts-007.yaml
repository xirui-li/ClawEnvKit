scoring_components:
- check:
    action: search_contacts
    field: department
    service: contacts
    type: audit_field_contains
    value: Research
  name: searched_research_department
  weight: 0.15
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: search_was_performed
  weight: 0.1
- check:
    action: get_contact
    service: contacts
    type: audit_action_exists
  name: contact_detail_retrieved
  weight: 0.15
- check:
    action: send_message
    field: contact_id
    service: contacts
    type: audit_field_equals
    value: c002
  name: message_sent_to_correct_contact
  weight: 0.15
- check:
    actions:
    - search_contacts
    - send_message
    service: contacts
    type: audit_sequence
  name: search_before_message_sequence
  weight: 0.1
- check:
