    field: message
    service: contacts
    type: audit_field_contains
    value: collaborat
  name: message_mentions_collaboration
  weight: 0.1
- check:
    action: send_message
    field: message
    service: contacts
    type: audit_field_contains
    value: call
  name: message_mentions_call_or_meeting
  weight: 0.1
- check:
    keywords:
    - message
    - sent
    - Research
    type: keywords_present
  name: output_confirms_message_sent
  weight: 0.05
- check:
    rubric: 'The message sent to the contact should be professional, introduce the
      sender, mention the data science initiative or collaboration opportunity, and
      include a request for a 30-minute call or meeting. It should be courteous and
      specific rather than vague or generic. Score highly if all these elements are
      present.

      '
    type: llm_judge
  name: message_quality_and_professionalism
  weight: 0.1
