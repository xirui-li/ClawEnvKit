prompt: 'I''m looking to collaborate with someone from the Research department on
  an upcoming data science initiative. Please find a senior-level contact in Research
  and send them a message introducing yourself and asking if they''d be available
  for a 30-minute call to discuss potential collaboration opportunities.

  '
reference_solution:
- Call search_contacts with department set to "Research" to retrieve all contacts
  in the Research department.
- Review the results and identify senior-level contacts — Marcus Delgado (Research
  Lead, c002) and Sandra Okonkwo (Senior Research Scientist, c001) are the senior
  candidates; Marcus Delgado as Research Lead is the most appropriate target.
- Call get_contact with contact_id "c002" to retrieve full details about Marcus Delgado.
- Compose a professional message introducing yourself, referencing the data science
  initiative, and requesting a 30-minute call to discuss collaboration.
- Call send_message with contact_id "c002" and the composed message.
- Confirm to the user that the message was successfully sent to Marcus Delgado, Research
  Lead.
