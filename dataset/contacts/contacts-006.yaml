prompt: I need to reach out to someone in the Marketing department about an upcoming
  product launch campaign. Find a contact in Marketing and send them a message letting
  them know that the Q3 product launch campaign materials are ready for review and
  asking them to schedule a kickoff meeting this week.
reference_solution:
- Call search_contacts with department set to "Marketing" to find relevant contacts
- Review the returned list which includes Priya Sharma (Marketing Manager), James
  Okafor (Content Strategist), and Rachel Kim (Brand Designer)
- Call get_contact with the contact_id of one of the Marketing contacts (e.g., c001
  for Priya Sharma as the most senior) to retrieve their full details
- Call send_message with the selected contact's contact_id and a message that states
  the Q3 product launch campaign materials are ready for review and requests scheduling
  a kickoff meeting this week
- Confirm to the user that the message has been sent successfully and provide the
  name and title of the person who was contacted
