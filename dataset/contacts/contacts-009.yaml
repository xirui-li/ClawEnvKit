prompt: 'I need to coordinate the annual performance review cycle across departments.
  Please find the department heads (or most senior contacts) in both the Engineering
  and Finance departments, and send each of them a personalized message letting them
  know that the annual performance review window opens on February 1st and asking
  them to ensure their teams submit self-assessments by February 15th.

  '
reference_solution:
- Search contacts with department filter "Engineering" to retrieve all Engineering
  department members.
- Review results and identify the most senior contact — Patricia Nguyen (VP of Engineering,
  c001).
- Optionally call get_contact with contact_id c001 to confirm full details.
- Search contacts with department filter "Finance" to retrieve all Finance department
  members.
- Review results and identify the most senior contact — Theodore Blanchard (Chief
  Financial Officer, c004).
- Optionally call get_contact with contact_id c004 to confirm full details.
- Call send_message with contact_id c001 and a personalized message to Patricia Nguyen
  stating the review window opens February 1st and self-assessments are due February
  15th.
- Call send_message with contact_id c004 and a personalized message to Theodore Blanchard
  with the same key dates and request.
- Do NOT message lower-level contacts such as Software Engineers or Financial Analysts,
  and do NOT message contacts from other departments such as Marketing or HR.
