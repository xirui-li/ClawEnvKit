- check:
    rubric: 'The agent sent exactly two messages: one to the VP of Engineering (Patricia
      Nguyen, c001) and one to the CFO (Theodore Blanchard, c004). Each message is
      personalized (addresses the recipient by name or role), mentions that the annual
      performance review window opens on February 1st, and requests that team members
      submit self-assessments by February 15th. The messages are professional and
      clearly communicate the required actions. Score 1.0 if both messages fully satisfy
      these criteria, 0.5 if only one message is appropriate or key dates are missing,
      and 0.0 if neither message meets the criteria.

      '
    type: llm_judge
