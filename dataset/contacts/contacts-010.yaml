prompt: 'There is an urgent situation requiring an emergency board meeting tomorrow
  at 9 AM. Please find all contacts who hold a "Director" or "VP" level title across
  any department, and send each of them a message informing them that an emergency
  board meeting has been scheduled for tomorrow at 9 AM in Conference Room A, and
  that attendance is mandatory.

  '
reference_solution:
- Step 1: Search contacts using the search_contacts tool with a query for "Director"
    to find all director-level staff.
- Step 2: Search contacts again with a query for "VP" to find all VP-level staff.
- Step 3: Review results and identify the five executives — Margaret Holloway (c001),
    Daniel Okafor (c002), Priya Nair (c003), Steven Chu (c004), and Naomi Thornton
    (c007).
- Step 4: Optionally call get_contact on each identified executive to confirm their
    details.
- Step 5: Send a message to each of the five executives (c001, c002, c003, c004, c007)
    stating that an emergency board meeting is scheduled for tomorrow at 9 AM in Conference
    Room A and that attendance is mandatory.
- Step 6: Do NOT send messages to non-executive contacts such as Alicia Ferrer (c005),
    James Whitfield (c006), or Raj Patel (c008).
- Step 7: Confirm in the output that all five director/VP contacts have been notified.
