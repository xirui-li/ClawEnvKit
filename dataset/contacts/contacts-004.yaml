    - Marketing
    - Engineering
    type: keywords_absent
  name: no_wrong_department_messaged
  weight: 0.05
- check:
    rubric: 'The agent should have found a contact in the Legal department, retrieved
      their details, and sent a clear, professional message about reviewing a vendor
      contract by end of week. The message should be polite, mention the urgency,
      and include enough context about the contract review request. Score high if
      all these elements are present.

      '
    type: llm_judge
  name: message_quality
  weight: 0.15
