scoring_components:
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: searched_engineering_department
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: sent_internal_message
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_formal_email
  weight: 0.1
- check:
    keywords:
    - Rachel Nguyen
    - VP of Engineering
    type: keywords_present
  name: correct_senior_contact_identified
  weight: 0.2
- check:
    keywords:
    - payment
    - outage
    type: keywords_present
  name: outage_details_in_output
  weight: 0.1
- check:
    field: contact_id
    type: audit_field_equals
    value: c-001
  name: message_recipient_is_senior_contact
  weight: 0.15
- check:
    rubric: "Evaluate the agent's overall performance on this task across three dimensions:\n\
      1. IDENTIFICATION (0.0–0.4): Did the agent correctly identify Rachel Nguyen\
      \ (c-001,\n   VP of Engineering) as the most senior Engineering contact, and\
      \ also note Daniel\n   Okonkwo (c-004, Director of Platform Engineering) as\
      \ another senior figure?\n   Full credit if both named; partial if only one.\n\
      \n2. COMMUNICATION QUALITY (0.0–0.4): Did the agent send Rachel Nguyen both\
      \ an internal\n   message AND a formal email? Was the content of each appropriate\
      \ — the internal\n   message urgent and direct, the email more formal and structured,\
      \ both clearly\n   describing the payment processing outage and requesting immediate\
      \ action?\n   Score based on clarity, tone appropriateness, and whether both\
      \ channels were used.\n\n3. OUTPUT SUMMARY (0.0–0.2): Does the agent's final\
      \ text response clearly confirm\n   what was done — who was contacted, via which\
      \ channels, and what was communicated?\n   Score 0.2 if the summary is complete\
      \ and accurate, 0.1 if partially complete,\n   0.0 if missing or vague.\n\n\
      Final score: sum of the three dimension scores (max 1.0).\n"
    type: llm_judge
  name: quality_and_completeness
  weight: 0.25
task_id: contacts_gmail-001
task_name: Find and notify engineering team about urgent system outage
tools:
- description: Search the contacts directory by name, keyword, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details of a specific contact by their ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send an internal platform message to a contact by their ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: List recent emails in the Gmail inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get the full content of a specific email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email via Gmail to a specified recipient
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft for later sending
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
