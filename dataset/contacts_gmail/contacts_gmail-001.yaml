prompt: 'There''s an urgent company-wide HR policy update going out today regarding
  the new remote work reimbursement program. Please find all contacts in the HR department
  and send each of them a professional message letting them know they need to review
  and acknowledge the updated Remote Work Reimbursement Policy (document reference:
  POL-2024-RWR) by end of day Friday. Also send a follow-up email to the HR department
  head summarizing who was notified.

  '
reference_solution:
- action: Call search_contacts with department='HR' to retrieve all HR department
    contacts
  step: 1
- action: 'Review the returned contacts: Patricia Nguyen (HR Director), Marcus Webb,
    Simone Delacroix, Jerome Okafor, Aisha Morrow'
  step: 2
- action: Call send_message for each of the 4+ HR contacts, including the policy reference
    POL-2024-RWR, a request to review and acknowledge, and the end-of-day Friday deadline
  step: 3
- action: Identify Patricia Nguyen as the HR Director based on her title in the contacts
    data
  step: 4
- action: Call send_email to p.nguyen@company.com with a summary listing all notified
    HR staff members, referencing the policy update and confirming the notifications
    were sent
  step: 5
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: search_contacts
    field: department
    service: contacts
    type: audit_field_equals
    value: HR
  name: searched_hr_department
  weight: 0.12
- check:
    action: send_message
    count: 4
    service: contacts
    type: audit_count_gte
  name: messaged_all_hr_contacts
  weight: 0.18
- check:
    action: send_message
    field: message
    service: contacts
    type: audit_field_contains
    value: POL-2024-RWR
  name: message_references_policy_doc
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_summary_email
  weight: 0.1
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_contains
    value: p.nguyen@company.com
  name: summary_email_to_hr_director
  weight: 0.1
- check:
    rubric: "Evaluate the quality of the in-app messages sent to HR contacts on three\
      \ dimensions:\n\n1. Professionalism (35%): Is the message tone appropriate for\
      \ a corporate policy notification?\n   A good message uses clear, formal language\
      \ without being overly bureaucratic.\n   It should feel like an internal business\
      \ communication, not a casual note.\n\n2. Completeness (35%): Does the message\
      \ include:\n   - Reference to the policy document (POL-2024-RWR)?\n   - A clear\
      \ call to action (review and acknowledge)?\n   - A deadline mention (end of\
      \ day Friday)?\n   Score higher if all three elements are present.\n\n3. Personalization\
      \ (30%): Does the message acknowledge the recipient's role or use their name?\n\
      \   A generic blast message scores 0.3; a message that acknowledges context\
      \ scores 0.7+.\n\nOverall scoring:\n- 1.0: All three dimensions are strong;\
      \ message is professional, complete, and personalized\n- 0.7: Two dimensions\
      \ are strong; minor gaps in completeness or personalization\n- 0.4: Only one\
      \ dimension is strong; message is incomplete or impersonal\n- 0.1: Message is\
      \ vague, missing key policy details, or inappropriate in tone\n- 0.0: No meaningful\
      \ message content or policy reference found\n"
    type: llm_judge
  name: message_quality
  weight: 0.2
- check:
    rubric: "Evaluate the summary email sent to the HR Director (Patricia Nguyen)\
      \ on three dimensions:\n\n1. Accuracy & Coverage (40%): Does the email list\
      \ all HR contacts who were notified?\n   Expected contacts: Marcus Webb, Simone\
      \ Delacroix, Jerome Okafor, Aisha Morrow\n   (Patricia Nguyen herself may or\
      \ may not be listed depending on agent interpretation.)\n   Score: 1.0 if all\
      \ 4 non-director HR staff are mentioned; 0.7 if 3; 0.4 if 2; 0.1 if fewer.\n\
      \n2. Clarity & Organization (30%): Is the summary well-structured and easy to\
      \ read?\n   A good summary email has a clear subject, a brief intro explaining\
      \ the action taken,\n   and an organized list or paragraph naming the notified\
      \ individuals.\n\n3. Context & Purpose (30%): Does the email explain WHY the\
      \ summary is being sent and\n   reference the policy (POL-2024-RWR) and the\
      \ Friday deadline?\n   Score 1.0 if both policy reference and deadline are present;\
      \ 0.5 if only one; 0.0 if neither.\n\nOverall scoring:\n- 1.0: All four contacts\
      \ named, well-organized, policy and deadline referenced\n- 0.7: Three contacts\
      \ named or minor organizational issues\n- 0.4: Two or fewer contacts named,\
      \ or policy context missing entirely\n- 0.1: Summary is sent but lacks meaningful\
      \ content\n- 0.0: No summary email sent to the HR Director\n"
    type: llm_judge
  name: summary_email_quality
  weight: 0.2
task_id: contacts_gmail-001
task_name: Find and notify all HR department contacts about policy update
tools:
- description: Search for contacts by name query or department filter
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details of a specific contact by their ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send an in-app message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: List recent emails from the Gmail inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a specific email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email via Gmail to a specified recipient
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft in Gmail
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
