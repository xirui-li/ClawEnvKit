prompt: 'The city''s parking enforcement office has a backlog of contested parking
  violation notices that need to be digitized for the appeals tribunal. Extract the
  text from all available parking violation notice images so the legal team can review
  the citation details, including violation codes, fine amounts, officer badge numbers,
  and timestamps. Summarize the key details from each notice in a clear, organized
  format.

  '
reference_solution: "1. Identify all six parking violation notice image paths from\
  \ the available fixtures:\n   /workspace/violations/notice_PVN-2024-0441.jpg through\
  \ notice_PVN-2024-0789.jpg.\n2. Call the extract_text_from_image tool for each image\
  \ path with language set to \"en\",\n   submitting each of the six notice images\
  \ to the OCR /ocr/extract endpoint.\n3. Collect the extracted text from all six\
  \ responses. 4. Parse and organize the extracted text into a structured summary\
  \ per citation, including:\n   citation number, date/time, vehicle and plate info,\
  \ location, violation code and description,\n   fine amount, issuing officer (name\
  \ and badge), payment due date, and contest-by deadline.\n5. Highlight the highest-value\
  \ fine (PVN-2024-0603, $525.00 for disabled placard violation)\n   and the most\
  \ urgent contest deadlines for the legal team.\n6. Present the full organized summary\
  \ as text output to assist the appeals tribunal."
