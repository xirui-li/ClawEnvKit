  weight: 0.05
- check:
    rubric: 'Evaluate the agent''s summary of parking violation notices on the following
      dimensions:

      1. COMPLETENESS (all 6 citations covered): Does the output include details from
      all six notices — PVN-2024-0441, PVN-2024-0558, PVN-2024-0603, PVN-2024-0677,
      PVN-2024-0712, and PVN-2024-0789? Score 1.0 if all six are present, 0.7 if five,
      0.4 if four or fewer.

      2. ACCURACY of key fields: Are the violation codes, fine amounts, officer badges,
      and contest-by dates correctly reported? For example: citation 0603 should show
      $525.00 fine and violation code 80.81B; citation 0558 should show $150.00 and
      officer D. Kim badge #1893; citation 0789 should show $65.00 and violation 80.65E.
      Deduct significantly for errors or omissions of these critical appeal-relevant
      fields.

      3. ORGANIZATION: Is the output structured in a way that would be useful for
      the legal team — e.g., organized per citation with labeled fields rather than
      raw OCR dumps?

      4. APPEAL RELEVANCE: Does the summary highlight contest deadlines (e.g., April
      7, May 1, May 4, May 12) and the highest-value citation (PVN-2024-0603 at $525.00)
      in a way that aids tribunal prioritization?

      Scoring guide: 1.0 = all 6 citations, accurate key fields, well-organized, appeal-relevant
      highlights; 0.7 = 5+ citations, mostly accurate, reasonably organized; 0.4 =
      3-4 citations or significant inaccuracies; 0.1 = fewer than 3 citations or severely
      disorganized output.

      '
    type: llm_judge
  name: summary_quality_and_completeness
  weight: 0.4
