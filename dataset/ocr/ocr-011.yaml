- check:
    rubric: "Evaluate the agent's output for completeness and structure in summarizing\
      \ all six meter reading cards. The output should present each card's data in\
      \ a clear, structured format covering: Meter ID, Account number, Reading date,\
      \ kWh value, and Technician name. Expected entries include:\n  - MTR-4421 /\
      \ ACC-88201 / 03/07/2025 / 14382 kWh / J. Hendricks\n  - MTR-5593 / ACC-77045\
      \ / 03/08/2025 / 9871 kWh / B. Okafor\n  - MTR-3310 / ACC-65512 / 03/09/2025\
      \ / 22107 kWh / S. Walsh\n  - MTR-6678 / ACC-90334 / 03/11/2025 / 7654 kWh /\
      \ M. Delacroix\n  - MTR-2205 / ACC-54987 / 03/12/2025 / 18450 kWh / R. Patel\n\
      \  - MTR-7741 / ACC-31128 / 03/14/2025 / 5320 kWh / T. Nguyen\nScore 1.0 if\
      \ all 6 cards are fully and accurately represented with all five fields. Score\
      \ 0.7 if all 6 cards are present but 1-2 fields are missing or unclear across\
      \ the set. Score 0.4 if only 3-5 cards are present with reasonably complete\
      \ data. Score 0.1 if fewer than 3 cards are present or data is largely incomplete.\
      \ Score 0.0 if the output does not meaningfully represent any meter card data.\n"
    type: llm_judge
  name: output_completeness_and_structure
  weight: 0.3
- check:
    rubric: 'Evaluate whether the agent''s output is practically useful for a billing
      reconciliation team. Consider: (1) Is the data organized so a billing analyst
      could quickly locate and cross-check any account? (2) Are the kWh values (14382,
      9871, 22107, 7654, 18450, 5320) presented clearly and unambiguously? (3) Does
      the output note all technician names (Hendricks, Okafor, Walsh, Delacroix, Patel,
      Nguyen) which are needed for accountability tracking? (4) Is the date information
      (ranging 03/07/2025 to 03/14/2025) preserved accurately? Score 1.0 if the output
      is well-organized, all values are accurate, and a billing analyst could use
      it directly. Score 0.6 if mostly useful but missing some organizational clarity
      or a few specific values. Score 0.3 if the output is partially useful but would
      require significant rework. Score 0.0 if the output is not usable for billing
      reconciliation.

      '
    type: llm_judge
  name: billing_usefulness
  weight: 0.2
task_id: ocr-011
task_name: Extract Text from Utility Meter Reading Cards for Billing Reconciliation
tools:
