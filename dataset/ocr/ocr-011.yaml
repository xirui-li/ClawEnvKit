prompt: 'Our billing department has a backlog of handwritten utility meter reading
  cards that need to be digitized for monthly reconciliation. Each card image contains
  a meter ID, customer account number, reading date, and kilowatt-hour value. Please
  extract the text from all available meter reading card images and provide a structured
  summary of each card''s contents so the billing team can cross-check against our
  automated readings.

  '
reference_solution: "1. Identify all meter reading card images available in the fixture\
  \ set (img-001 through img-006), each with a distinct image_path. 2. Call the extract_text\
  \ tool (POST /ocr/extract) for each image, passing the image_path and language='en'.\
  \ 3. Collect the extracted text from all six responses. 4. Parse each result to\
  \ identify the five key fields: Meter ID, Account number, Reading date, kWh reading,\
  \ and Technician name. 5. Present a structured summary (e.g., table or labeled list)\
  \ covering all six cards so the billing team can efficiently cross-check:\n   MTR-4421/ACC-88201/03-07-2025/14382\
  \ kWh/J. Hendricks,\n   MTR-5593/ACC-77045/03-08-2025/9871 kWh/B. Okafor,\n   MTR-3310/ACC-65512/03-09-2025/22107\
  \ kWh/S. Walsh,\n   MTR-6678/ACC-90334/03-11-2025/7654 kWh/M. Delacroix,\n   MTR-2205/ACC-54987/03-12-2025/18450\
  \ kWh/R. Patel,\n   MTR-7741/ACC-31128/03-14-2025/5320 kWh/T. Nguyen."
