difficulty: medium
fixtures:
  images:
  - expected_text: 'Lot 101 | 1879-S Morgan Silver Dollar | Grade: MS-64 | Mintmark:
      S (San Francisco) | Weight: 26.73g | Estimated Value: $1,200 - $1,500 | Reserve:
      $900'
    id: img-101
    image_path: /workspace/lot_101.jpg
    language: en
  - expected_text: 'Lot 102 | 1909-S VDB Lincoln Cent | Grade: VF-30 | Mintmark: S
      (San Francisco) | Weight: 3.11g | Estimated Value: $850 - $1,100 | Reserve:
      $700'
    id: img-102
    image_path: /workspace/lot_102.jpg
    language: en
  - expected_text: 'Lot 103 | 1916-D Mercury Dime | Grade: F-12 | Mintmark: D (Denver)
      | Weight: 2.50g | Estimated Value: $2,400 - $3,000 | Reserve: $2,000'
    id: img-103
    image_path: /workspace/lot_103.jpg
    language: en
  - expected_text: 'Lot 104 | 1804 Draped Bust Silver Dollar (Class III Restrike)
      | Grade: VF-20 | No Mintmark | Weight: 26.96g | Estimated Value: $18,000 - $22,000
      | Reserve: $15,000'
    id: img-104
    image_path: /workspace/lot_104.jpg
    language: en
  - expected_text: 'Lot 105 | 1932-D Washington Quarter | Grade: EF-40 | Mintmark:
      D (Denver) | Weight: 6.25g | Estimated Value: $320 - $450 | Reserve: $275'
    id: img-105
    image_path: /workspace/lot_105.jpg
    language: en
  - expected_text: 'Lot 106 | 1955 Doubled Die Lincoln Cent | Grade: AU-55 | No Mintmark
      (Philadelphia) | Weight: 3.11g | Estimated Value: $1,600 - $2,000 | Reserve:
      $1,300'
    id: img-106
    image_path: /workspace/lot_106.jpg
