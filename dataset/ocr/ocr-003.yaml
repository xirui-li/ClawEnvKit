difficulty: medium
files:
- source: fixtures/images/drug_label_amoxicillin.png
  target: drug_label_amoxicillin.png
- source: fixtures/images/drug_label_metformin.png
  target: drug_label_metformin.png
- source: fixtures/images/drug_label_lisinopril.png
  target: drug_label_lisinopril.png
- source: fixtures/images/drug_label_atorvastatin.png
  target: drug_label_atorvastatin.png
