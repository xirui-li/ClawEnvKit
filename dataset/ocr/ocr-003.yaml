    id: rx-002
    image_path: /prescriptions/rx-002-kim.png
    language: en
  - expected_text: 'Patient: Rosa Torres DOB: 11/05/1985 Rx: Amoxicillin 500mg Three
      times daily for 10 days No Refills Dr. Brian Cho MD NPI: 1122334455 Date: 2024-01-20'
    id: rx-003
