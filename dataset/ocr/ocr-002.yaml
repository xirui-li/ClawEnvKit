      \ no DEA number (not controlled)\n  - Carlos Torres: Hydrocodone/Acetaminophen\
      \ 5-325mg, Dr. Priya Nambiar, DEA BN7823401\n  - Linda Wu: Lisinopril 10mg,\
      \ Dr. Samuel Reeves, 6 refills\n  - Arun Patel: Alprazolam 0.5mg, Dr. Keisha\
      \ Washington, DEA BW3341892\n  - Bridget O'Connor: Metformin 1000mg, Dr. James\
      \ Okafor, 12 refills\n  - David Kim: Adderall XR 20mg, Dr. Priya Nambiar, DEA\
      \ BN7823401\nScore 1.0 if all 6 prescriptions are covered with accurate details\
      \ and a clear controlled-substance flag section. Score 0.7 if 4-5 prescriptions\
      \ are fully covered with minor omissions. Score 0.4 if 2-3 prescriptions are\
      \ covered or key details are consistently missing. Score 0.1 if fewer than 2\
      \ prescriptions are covered or output is largely inaccurate.\n"
    type: llm_judge
  name: summary_completeness_and_accuracy
  weight: 0.25
task_id: ocr-002
task_name: Extract prescription details from pharmacy images
tools:
- description: Extract text content from a scanned image file using OCR. Provide the
    image path and optionally specify the language.
  endpoint: /ocr/extract
  method: POST
  name: extract_text_from_image
  service: ocr
