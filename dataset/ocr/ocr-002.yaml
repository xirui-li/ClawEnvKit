    - Arun Patel
    - David Kim
    type: keywords_present
  name: patient_names_present
  weight: 0.1
- check:
    rubric: "Evaluate whether the agent correctly identified and flagged controlled\
      \ substances among the prescriptions. Controlled substances in the fixture data\
      \ are:\n  - img-002: Hydrocodone (opioid) prescribed to Carlos Torres by Dr.\
      \ Priya Nambiar\n  - img-004: Alprazolam (benzodiazepine) prescribed to Arun\
      \ Patel by Dr. Keisha Washington\n  - img-006: Adderall XR (stimulant) prescribed\
      \ to David Kim by Dr. Priya Nambiar\nScore 1.0 if all three are correctly identified\
      \ as controlled substances with the substance class noted (opioid/benzodiazepine/stimulant).\
      \ Score 0.7 if two of three are correctly flagged. Score 0.4 if only one is\
      \ flagged. Score 0.0 if none are flagged or non-controlled medications are incorrectly\
