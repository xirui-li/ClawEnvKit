    - Sofia Andersen
    - Marcus Webb
    - 'Room: 315'
    - 'Room: 501'
    type: keywords_absent
  name: excludes_other_rooms
  weight: 0.1
- check:
    rubric: "Evaluate the agent's compiled summary of minibar charges for room 412\
      \ (guest Haruto Tanaka). Score on these dimensions:\n1. COMPLETENESS (0–0.4):\
      \ Does the summary cover all three charge dates (Nov 15: $15.50, Nov 16: $26.00,\
      \ Nov 17: $22.00)?\n   Does it include the Nov 14 receipt showing $0.00 / no\
      \ items consumed?\n   Full credit if all four receipt dates are addressed; partial\
      \ credit if 2–3 are covered; zero if fewer than 2.\n\n2. ACCURACY (0–0.3): Are\
      \ item names, quantities, and prices correctly extracted and reported?\n   E.g.,\
      \ Sparkling Water x2 $6.00, Pringles x1 $5.50, Snickers x1 $4.00 on Nov 15;\n\
      \   Corona Beer x2 $14.00, Toblerone x1 $7.50, OJ x1 $4.50 on Nov 16;\n   Heineken\
      \ x1 $7.00, Mixed Nuts x2 $11.00, Evian x1 $4.00 on Nov 17.\n   Deduct for factual\
      \ errors or omissions of specific items.\n\n3. RELEVANCE & FOCUS (0–0.2): Does\
      \ the agent correctly restrict the summary to room 412 only,\n   excluding receipts\
      \ for room 315 (Sofia Andersen) and room 501 (Marcus Webb)?\n   Full credit\
      \ if no irrelevant room data appears; zero if other guests' data is mixed in.\n\
      \n4. DISPUTE UTILITY (0–0.1): Does the output include a clear total or conclusion\
      \ useful for a billing manager\n   (e.g., cumulative charge of $63.50 across\
      \ the stay, or a clear statement that charges existed on 3 of 4 nights)?\n\n\
      Final score: sum of dimension scores (0.0–1.0). Score 1.0 only if all four dimensions\
      \ are fully satisfied.\n"
    type: llm_judge
  name: dispute_summary_quality
  weight: 0.4
task_id: ocr-010
task_name: Extract Hotel Minibar Receipts for Guest Dispute Resolution
tools:
- description: Extract text content from an image file using OCR. Provide the image
    path and optionally the language of the text.
  endpoint: /ocr/extract
  method: POST
  name: extract_text_from_image
  service: ocr
