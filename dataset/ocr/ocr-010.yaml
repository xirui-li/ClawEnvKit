difficulty: medium
files: []
fixtures:
  images:
  - expected_text: 'Fromagerie Leclerc | Brie de Meaux AOP | France | Lait cru de
      vache | Affinage: 4 semaines | Poids net: 250g | CONTIENT: LAIT. Peut contenir
      des traces de NOIX. Conserver entre 2-8°C. Lot: FR-2024-0881'
    id: img-001
    image_path: /workspace/labels/fromage_brie_leclerc.jpg
    language: fr
  - expected_text: 'Quesos Garcia Hermanos | Manchego DOP | La Mancha, España | Leche
      de oveja pasteurizada | Madurado: 6 meses | Peso neto: 400g | CONTIENE: LECHE.
      Sin gluten. Temp. conservacion: 4-10°C. Lote: ES-2024-1142'
    id: img-002
    image_path: /workspace/labels/manchego_garcia.jpg
    language: es
  - expected_text: 'Caseificio Bella Vista | Gorgonzola DOP Piccante | Lombardia,
