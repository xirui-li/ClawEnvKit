    id: img_004
    image_path: /workspace/artifact_greek_pottery.jpg
    language: en
  - expected_text: 'Oval Tortoise Brooch | Viking Age, 9th–10th Century | Origin:
      Scandinavia (likely Norway) | Material: Bronze with gilt overlay | Dimensions:
      11.4 cm x 7.2 cm | Accession No: VIK-1965-0031 | Found: Burial mound, Vestfold
