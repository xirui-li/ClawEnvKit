difficulty: medium
files:
- source: fixtures/images/artifact_roman_coin.jpg
  target: artifact_roman_coin.jpg
- source: fixtures/images/artifact_egyptian_vase.jpg
  target: artifact_egyptian_vase.jpg
- source: fixtures/images/artifact_medieval_sword.jpg
  target: artifact_medieval_sword.jpg
- source: fixtures/images/artifact_greek_pottery.jpg
  target: artifact_greek_pottery.jpg
- source: fixtures/images/artifact_viking_brooch.jpg
  target: artifact_viking_brooch.jpg
fixtures:
  images:
  - expected_text: 'Roman Denarius | Circa 74 AD | Emperor Vespasian | Silver alloy,
      3.2g | Provenance: Excavated Colosseum site, Rome, 1923 | Accession No: ROM-1923-0047
      | Condition: Good — minor surface wear'
    id: img_001
    image_path: /workspace/artifact_roman_coin.jpg
    language: en
  - expected_text: 'Canopic Jar — Limestone | New Kingdom Period, 1550–1070 BC | Deity:
      Hapy (baboon head lid) | Contents: Preserved lung fragments | Found: Tomb KV-38,
      Valley of the Kings | Accession No: EGY-1901-0012 | Condition: Fair — lid repaired'
    id: img_002
    image_path: /workspace/artifact_egyptian_vase.jpg
    language: en
  - expected_text: 'Arming Sword | 13th Century CE | Origin: Northern France | Material:
      High-carbon steel, oak grip | Length: 92 cm | Accession No: MED-1887-0203 |
      Donated by: Lord Archibald Pemberton, 1887 | Condition: Excellent — minor pitting
      on blade'
    id: img_003
    image_path: /workspace/artifact_medieval_sword.jpg
    language: en
  - expected_text: 'Attic Red-Figure Kylix | 480–470 BC | Artist: Attributed to the
      Brygos Painter | Scene: Symposium with musicians | Dimensions: H 12 cm, D 32
