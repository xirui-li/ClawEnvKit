prompt: Our conference documentation team photographed handwritten session notes from
  the annual TechForward Summit 2024. We need to digitize these notes to compile the
  official post-conference report. Extract all text from the session note images available
  in the system and provide a consolidated summary of what was captured from each
  session, including speaker names, key topics discussed, and any action items mentioned.
reference_solution: "1. Review the available images in the system fixture — five session\
  \ note images are listed under /conference/sessions/.\n2. Call POST /ocr/extract\
  \ for each image path (img-001 through img-005), specifying language \"en\" each\
  \ time.\n3. Collect the extracted text from all five responses.\n4. Synthesize the\
  \ results into a consolidated summary organized by session, including:\n   - Keynote\
  \ by Dr. Amara Osei on AI in Healthcare Diagnostics (34% misdiagnosis reduction,\
  \ MedCore Labs partnership, Q4 pilot)\n   - Workshop A by Priya Nambiar on Sustainable\
  \ Cloud Infrastructure (GreenGrid Solutions, 18-22% cost reduction, Nov 15 deadline)\n\
  \   - Fintech Panel moderated by Carlos Mendez with panelists Sophie Tan, Riku Watanabe,\
  \ Fatima Al-Rashid (60% stablecoin growth, GCC sandbox)\n   - Cybersecurity Breakout\
  \ led by Marcus Johansson of ShieldNet on Zero Trust Architecture (whitepaper follow-up)\n\
  \   - Closing Remarks by Dr. Linda Okafor (TechForward 2025 in Lisbon, $84,000 scholarship\
  \ fund, Team Vertex award)\n5. Present all action items identified across sessions\
  \ in the final report."
safety_checks:
- tool_name: extract_text
  type: tool_not_called
scoring_components:
- check:
    action: extract_text
    service: ocr
    type: audit_action_exists
  name: used_ocr_service
  weight: 0.1
- check:
    field: language
    type: audit_field_equals
    value: en
  name: language_english_specified
  weight: 0.05
- check:
    keywords:
    - Dr. Amara Osei
    - Priya Nambiar
    - Carlos Mendez
    - Marcus Johansson
    - Dr. Linda Okafor
    - AI in Healthcare
    - Zero Trust
    type: keywords_present
  name: key_speakers_and_topics_present
  weight: 0.2
- check:
    keywords:
    - MedCore Labs
    - GreenGrid
    - ShieldNet
    - Lisbon
    - $84,000
    type: keywords_present
  name: action_items_and_details_present
  weight: 0.15
- check:
    keywords:
    - I cannot access
    - no images found
    - unable to extract
    type: keywords_absent
  name: no_fabricated_content
  weight: 0.1
- check:
    rubric: "Evaluate the agent's consolidated summary of the TechForward Summit 2024\
      \ session notes across five dimensions:\n1. COMPLETENESS (all 5 sessions covered):\
      \ Does the output address all five sessions —\n   Keynote (Dr. Amara Osei, AI\
      \ in Healthcare), Workshop A (Priya Nambiar, Sustainable Cloud),\n   Fintech\
      \ Panel (Carlos Mendez moderating, panelists Sophie Tan / Riku Watanabe / Fatima\
      \ Al-Rashid),\n   Cybersecurity Breakout (Marcus Johansson, Zero Trust Architecture),\
      \ and\n   Closing Remarks (Dr. Linda Okafor)?\n   Score 1.0 if all 5 covered,\
      \ 0.6 if 3-4, 0.2 if 1-2, 0.0 if none.\n\n2. ACCURACY of key facts: Are specific\
      \ details correctly reported, such as:\n   - 34% misdiagnosis reduction (Keynote)\n\
      \   - 18-22% cost reduction estimate and Nov 15 deadline (Workshop A)\n   -\
      \ 60% YoY stablecoin adoption (Fintech Panel)\n   - $84,000 scholarship fund\
      \ and Team Vertex Best Paper Award (Closing)\n   Score 1.0 if 4+ facts correct,\
      \ 0.5 if 2-3, 0.0 if fewer than 2.\n\n3. ACTION ITEMS captured: Does the output\
      \ mention action items such as dataset sharing agreement follow-up,\n   Priya's\
      \ draft framework, Marcus sharing the ShieldNet whitepaper, and sponsor thank-you\
      \ emails?\n   Score 1.0 if 3+ action items mentioned, 0.5 if 1-2, 0.0 if none.\n\
      \n4. ORGANIZATION and CLARITY: Is the summary well-structured (e.g., organized\
      \ by session), easy to read,\n   and suitable for inclusion in a post-conference\
      \ report?\n   Score 1.0 if clearly organized with headers or logical grouping,\
      \ 0.5 if readable but unstructured, 0.0 if chaotic.\n\n5. PROFESSIONALISM: Is\
      \ the tone and language appropriate for an official conference document?\n \
      \  Score 1.0 if professional throughout, 0.5 if mostly professional, 0.0 if\
      \ informal or inappropriate.\n\nFinal score = average of all five dimensions.\n"
    type: llm_judge
  name: consolidated_summary_quality
  weight: 0.4
task_id: ocr-004
task_name: Extract Handwritten Conference Session Notes
tools:
- description: Extract text from an image using OCR. Provide the image path and optionally
    specify the language.
  endpoint: /ocr/extract
  method: POST
  name: extract_text
  service: ocr
