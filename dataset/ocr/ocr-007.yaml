prompt: Our restaurant chain just received a compliance audit request from the health
  department covering five locations. We have scanned copies of the most recent food
  safety inspection reports for each location stored in our system. Please extract
  the text from all five inspection report images and provide a consolidated summary
  identifying each location's inspection score, any critical violations noted, and
  the inspector's name and date. We need this information to prepare our formal response
  to the health department.
reference_solution: "1. Identify the five inspection report images listed in the system\
  \ fixtures, each with a distinct image_path under /workspace/inspections/.\n2. Call\
  \ the extract_text_from_image tool (POST /ocr/extract) for each image path, specifying\
  \ language as 'en':\n   - /workspace/inspections/downtown_branch_report.jpg\n  \
  \ - /workspace/inspections/uptown_branch_report.jpg\n   - /workspace/inspections/westside_branch_report.jpg\n\
  \   - /workspace/inspections/northgate_branch_report.jpg\n   - /workspace/inspections/southpark_branch_report.jpg\n\
  3. Collect the extracted text for all five reports.\n4. Parse each report to identify:\
  \ location name and address, inspection date, inspector name, overall score, number\
  \ and details of critical violations, and any urgent notes.\n5. Present a consolidated\
  \ summary organized by location, highlighting:\n   - Westside Branch (33 Harbor\
  \ Road) as the most urgent case: score 72/100, 2 critical violations (pest activity\
  \ CV-01, handwashing CV-11), probationary status, 48-hour re-inspection required,\
  \ inspector Priya Nair, date Sept 13 2024.\n   - Downtown Branch: score 87/100,\
  \ 1 critical violation CV-03 (cold storage), follow-up Sept 17, inspector Maria\
  \ Delgado, date Sept 14 2024.\n   - Southpark Branch: score 83/100, 1 critical violation\
  \ CV-08 (raw poultry storage), follow-up Sept 19, inspector Angela Tran, date Sept\
  \ 12 2024.\n   - Northgate Branch: score 91/100, 0 critical violations, inspector\
  \ Carlos Reyes, date Sept 16 2024.\n   - Uptown Branch: score 95/100, 0 critical\
  \ violations, inspector James Kowalski, date Sept 15 2024.\n6. Conclude with a brief\
  \ note on the three locations requiring follow-up action to support the health department\
  \ response."
