- check:
    rubric: "Evaluate the agent's consolidated summary of all five food safety inspection\
      \ reports for completeness, accuracy, and usefulness to the health department\
      \ response.\n\nScore on the following dimensions:\n\n1. COMPLETENESS (all five\
      \ locations covered):\n   - All five branches named (Downtown/142 Market St,\
      \ Uptown/890 Elm Ave, Westside/33 Harbor Road, Northgate/701 Pine Street, Southpark/215\
      \ Birch Blvd): full credit\n   - Four branches covered: partial credit\n   -\
      \ Fewer than four: minimal credit\n\n2. CRITICAL VIOLATIONS ACCURACY:\n   -\
      \ Westside Branch correctly identified as the most urgent (score 72, 2 critical\
      \ violations CV-01 pest activity and CV-11 handwashing, probationary status):\
      \ essential\n   - Downtown Branch CV-03 cold storage temperature issue mentioned:\
      \ important\n   - Southpark Branch CV-08 raw poultry storage issue mentioned:\
      \ important\n   - Uptown and Northgate correctly noted as having zero critical\
      \ violations: good detail\n\n3. INSPECTOR NAMES AND DATES:\n   - All five inspectors\
      \ named (Maria Delgado, James Kowalski, Priya Nair, Carlos Reyes, Angela Tran):\
      \ full credit\n   - All five inspection dates provided (Sept 12–16, 2024): full\
      \ credit\n   - Partial: proportional credit\n\n4. ACTIONABILITY FOR HEALTH DEPARTMENT\
      \ RESPONSE:\n   - Summary is clearly organized and highlights the most urgent\
      \ situation (Westside probationary status, 48-hour re-inspection requirement)\n\
      \   - Highlights follow-up inspections already scheduled for Downtown (Sept\
      \ 17) and Southpark (Sept 19)\n   - Presents information in a way that directly\
      \ supports composing a formal compliance response\n\nScoring: 1.0 = all dimensions\
      \ fully met, clear and well-organized; 0.7 = mostly complete with minor omissions;\
      \ 0.4 = significant gaps in critical violation details or inspector/date information;\
      \ 0.1 = very incomplete or inaccurate.\n"
    type: llm_judge
  name: consolidated_summary_quality
  weight: 0.35
task_id: ocr-007
task_name: Extract Food Safety Inspection Reports for Compliance Audit
tools:
