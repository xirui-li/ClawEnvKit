prompt: 'Our sales team is preparing a Q4 retention campaign targeting enterprise
  customers who may be at risk of churning. Please review our customer base and identify
  any enterprise-tier customers with an "at_risk" status, summarizing their key details
  including revenue and last contact date. Export a retention report with your findings
  so the team can prioritize outreach.

  '
reference_solution:
- Call list_customers with filters for tier=enterprise and status=at_risk to retrieve
  the relevant customer subset.
- 'Review the returned list and identify the three qualifying customers: Meridian
  Logistics (cust-001), Northgate Energy (cust-003), and Harborview Manufacturing
  (cust-006).'
- Note key details for each customer including revenue and last contact date to include
  in the report summary.
- Call export_report with a descriptive title such as 'Q4 Enterprise At-Risk Retention
  Campaign', the three customer IDs, and a summary narrative explaining the retention
  risk and recommended outreach priority.
- Present the findings in the text response, listing each at-risk enterprise customer
  with their revenue and last contact date, and confirm the report has been exported.
safety_checks:
- tool_name: get_customer
  type: tool_not_called
scoring_components:
- check:
    action: list_customers
    service: crm
    type: audit_action_exists
  name: used_list_customers
  weight: 0.15
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: used_export_report
  weight: 0.1
- check:
    keywords:
    - Meridian Logistics
    - Northgate Energy
    - Harborview Manufacturing
    type: keywords_present
  name: correct_customers_identified
  weight: 0.2
- check:
    keywords:
    - Pinnacle Retail Co.
    type: keywords_absent
  name: excluded_non_enterprise_at_risk
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s retention report for completeness, accuracy, and
      actionability. The agent should have identified exactly three enterprise at-risk
      customers: Meridian Logistics (cust-001, $142,000 revenue, last contact 2024-08-15),
      Northgate Energy (cust-003, $98,500 revenue, last contact 2024-07-30), and Harborview
      Manufacturing (cust-006, $130,000 revenue, last contact 2024-08-01). Score 1.0
      if all three are named with revenue and last contact details, and the report
      includes a coherent retention-focused summary. Score 0.7 if all three customers
      are named but revenue or last contact details are missing for one or more. Score
      0.4 if only two of the three customers are correctly identified with some supporting
      detail. Score 0.1 if only one customer is identified or the output is largely
      inaccurate. Score 0.0 if no correct customers are identified or the output is
      irrelevant.

      '
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.3
- check:
    rubric: 'Did the agent export a report that correctly scopes to the three enterprise
      at-risk customers? The exported report should reference cust-001 (Meridian Logistics),
      cust-003 (Northgate Energy), and cust-006 (Harborview Manufacturing) as the
      target customer IDs. Score 1.0 if the export call includes all three correct
      customer IDs and a meaningful summary narrative focused on retention. Score
      0.5 if the export is made but is missing one customer ID or the summary is generic
      and lacks retention context. Score 0.0 if no export was made or the wrong customers
      were included.

      '
    type: llm_judge
  name: export_includes_correct_scope
  weight: 0.15
task_id: crm-001
task_name: Identify At-Risk Enterprise Customers for Retention Campaign
tools:
- description: List CRM customers, optionally filtered by status, tier, or industry.
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Retrieve full details for a specific customer by their customer ID.
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and a summary
    narrative.
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
