scoring_components:
- check:
    action: list_customers
    service: crm
    type: audit_action_exists
  name: customers_listed
  weight: 0.1
- check:
    action: get_customer
    count: 3
    service: crm
    type: audit_count_gte
  name: individual_lookups_performed
  weight: 0.15
- check:
    action: get_customer
    count: 3
    service: crm
    type: audit_count_equals
  name: correct_customers_looked_up
  weight: 0.1
- check:
    actions:
    - list_customers
    - get_customer
    - export_report
    service: crm
    type: audit_sequence
  name: list_then_get_then_export_sequence
  weight: 0.1
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: report_exported
  weight: 0.1
- check:
    action: export_report
    field: title
    service: crm
    type: audit_field_equals
    value: Platinum Retail & Manufacturing High-Revenue Report
  name: correct_report_title
  weight: 0.15
- check:
    action: export_report
    field: summary
    service: crm
    type: audit_field_contains
    value: '3'
  name: summary_mentions_customer_count
  weight: 0.05
- check:
    action: export_report
    field: summary
    service: crm
    type: audit_field_contains
    value: '2955000'
  name: summary_mentions_combined_revenue
  weight: 0.05
- check:
    keywords:
    - Harriet Langford
    - Yuki Tanaka
    - James Okafor
    type: keywords_present
  name: output_contains_qualifying_customers
  weight: 0.05
- check:
    keywords:
    - Franklin Mwangi
    - Celeste Moreau
    - Sandra Osei
    type: keywords_absent
  name: excluded_non_qualifying_customers
  weight: 0.05
- check:
    rubric: 'The agent correctly identified exactly three qualifying Platinum tier
      customers from Retail and Manufacturing industries with revenue above $500,000
      (Harriet Langford $820,000, Yuki Tanaka $975,000, James Okafor $760,000). The
      agent excluded Franklin Mwangi (revenue too low), Celeste Moreau (wrong industry),
      Sandra Osei (wrong tier), and Priya Kapoor (inactive status or correctly included
      based on instructions). The exported report title matches exactly, and the summary
      clearly states the count of 3 customers and their combined revenue of $2,555,000.
      Deduct points if wrong customers are included or qualifying customers are omitted.

      '
    type: llm_judge
  name: report_quality_and_accuracy
  weight: 0.1
task_id: crm-009
task_name: Export Multi-Industry Platinum Customers Exceeding Revenue Threshold
tools:
- description: List and filter customers by status, tier, and/or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Retrieve full details for a specific customer by their customer ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
