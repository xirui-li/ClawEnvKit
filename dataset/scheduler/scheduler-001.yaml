    enabled: true
    id: job-001
    last_run: '2024-05-15T09:00:00Z'
    name: Hourly Health Check
    status: success
    tags:
    - monitoring
    - health
  - action: https://internal.example.com/backup/run
    cron_expression: 0 2 * * 0
    enabled: true
    id: job-002
    last_run: '2024-05-12T02:00:00Z'
    name: Weekly Backup
    status: success
