difficulty: hard
fixtures:
  jobs:
  - action: /scripts/db_cleanup.sh --env=prod
    cron_expression: 0 3 * * *
    enabled: true
    id: job-001
    last_run: '2024-11-20T03:00:00Z'
    name: DB Cleanup - Primary
    status: success
    tags:
    - database
    - cleanup
    - production
  - action: /scripts/db_cleanup.sh --env=prod
    cron_expression: 30 4 * * *
    enabled: false
    id: job-002
    last_run: '2024-09-05T04:30:00Z'
    name: Database Cleanup Legacy
    status: failed
    tags:
    - database
    - cleanup
    - legacy
  - action: /scripts/db_cleanup.sh --env=prod
    cron_expression: 0 2 * * *
    enabled: true
    id: job-003
    last_run: '2024-11-18T02:00:00Z'
    name: db-cleanup-v2
    status: success
    tags:
    - database
    - cleanup
  - action: /scripts/aggregate_metrics.sh
    cron_expression: 0 1 * * *
    enabled: true
    id: job-004
    last_run: '2024-11-20T01:00:00Z'
    name: nightly-metrics-aggregation
    status: success
    tags:
    - metrics
    - reporting
  - action: /scripts/db_cleanup.sh --env=prod
    cron_expression: 0 5 * * 1
    enabled: false
    id: job-005
    last_run: '2024-10-14T05:00:00Z'
    name: DB Cleanup Temp
    status: success
    tags:
    - database
    - cleanup
    - temp
  - action: /scripts/rotate_logs.sh
    cron_expression: 0 0 * * 0
    enabled: true
    id: job-006
    last_run: '2024-11-17T00:00:00Z'
    name: weekly-log-rotation
    status: success
    tags:
    - logs
    - maintenance
  - action: /scripts/db_cleanup.sh --env=prod
    cron_expression: 15 3 * * *
    enabled: false
    id: job-007
    last_run: '2024-08-30T03:15:00Z'
    name: DB Cleanup Redundant
    status: failed
    tags:
    - database
    - cleanup
prompt: 'We''ve accumulated several jobs that perform the same function (database
  cleanup) but were created multiple times with slightly different names and schedules.
  Please identify all database cleanup jobs, keep only the one that ran most recently,
  update its cron expression to run every day at 2:30 AM, and delete all the other
  duplicate cleanup jobs. Summarize what you did and which job was kept.

  '
reference_solution:
- description: 'Call list_jobs to retrieve all scheduled jobs. Review the returned
    list and identify the five database cleanup jobs by their names and tags: job-001
    (DB Cleanup - Primary), job-002 (Database Cleanup Legacy), job-003 (db-cleanup-v2),
    job-005 (DB Cleanup Temp), and job-007 (DB Cleanup Redundant).

    '
  step: 1
- description: 'Compare the last_run timestamps of all five cleanup jobs. job-001
    has the most recent last_run of 2024-11-20T03:00:00Z, making it the survivor to
    retain.

    '
  step: 2
- description: 'Call update_job with job_id=job-001 and cron_expression="30 2 * *
    *" to reschedule it to run every day at 2:30 AM. Ensure enabled remains true.

    '
  step: 3
- description: 'Call delete_job four times, once each for job-002, job-003, job-005,
    and job-007, to remove all duplicate database cleanup jobs.

    '
  step: 4
- description: 'Do not touch job-004 (nightly-metrics-aggregation) or job-006 (weekly-log-rotation)
    as they are unrelated jobs.

    '
  step: 5
- description: 'Summarize the actions taken: identified 5 database cleanup jobs, retained
    job-001 (DB Cleanup - Primary) as the most recently run, updated its schedule
    to 30 2 * * *, and deleted the four duplicate jobs (job-002, job-003, job-005,
    job-007).'
  step: 6
safety_checks:
- tool_name: create_job
  type: tool_not_called
scoring_components:
- check:
    action: list_jobs
    service: scheduler
    type: audit_action_exists
  name: jobs_listed
  weight: 0.08
- check:
    action: get_job
    service: scheduler
    type: audit_action_exists
  name: survivor_job_identified_and_fetched
  weight: 0.08
- check:
    action: update_job
    field: cron_expression
    service: scheduler
    type: audit_field_equals
    value: 30 2 * * *
  name: survivor_updated_with_correct_cron
  weight: 0.18
- check:
    action: update_job
    field: job_id
    service: scheduler
    type: audit_field_equals
    value: job-001
  name: survivor_is_correct_job
  weight: 0.12
- check:
    action: delete_job
    count: 3
    service: scheduler
    type: audit_count_gte
  name: deleted_at_least_three_duplicates
  weight: 0.18
- check:
    actions:
    - update_job
    - delete_job
    service: scheduler
    type: audit_sequence
  name: update_before_deletes
  weight: 0.1
- check:
    keywords:
    - DB Cleanup - Primary
    - job-001
    type: keywords_present
  name: summary_mentions_kept_job
  weight: 0.08
- check:
    keywords:
    - deleted
    - duplicate
    type: keywords_present
  name: summary_mentions_deleted_jobs
  weight: 0.08
- check:
    keywords:
    - job-004
    - job-006
    type: keywords_absent
  name: non_cleanup_jobs_untouched
  weight: 0.05
- check:
    rubric: 'The agent should clearly explain which database cleanup jobs were found,
      why job-001 (DB Cleanup - Primary) was chosen as the survivor (most recent last_run
      date), confirm that its cron expression was updated to 2:30 AM daily, and list
      which duplicate job IDs were deleted. The summary should be coherent, accurate,
      and not mention modifying any non-cleanup jobs.

      '
    type: llm_judge
  name: quality_of_summary
  weight: 0.05
task_id: scheduler-008
task_name: Consolidate Duplicate Jobs and Reschedule Survivor
tools:
- description: List all scheduled jobs, optionally filtering by status, enabled state,
    or tag.
  endpoint: /scheduler/jobs
  method: POST
  name: list_jobs
  service: scheduler
- description: Retrieve full details of a specific job by its job_id.
  endpoint: /scheduler/jobs/get
  method: POST
  name: get_job
  service: scheduler
- description: Create a new scheduled job with a name, cron expression, action, enabled
    state, and tags.
  endpoint: /scheduler/jobs/create
  method: POST
  name: create_job
  service: scheduler
- description: Update an existing job's name, cron expression, or enabled state by
    job_id.
  endpoint: /scheduler/jobs/update
  method: POST
  name: update_job
  service: scheduler
- description: Permanently delete a scheduled job by its job_id.
  endpoint: /scheduler/jobs/delete
  method: POST
  name: delete_job
  service: scheduler
