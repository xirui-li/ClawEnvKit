fixtures:
  pages:
  - content: 'RECALL NOTICE RC-2024-0891

      Product: Lithium Battery Pack Series LBP-7xx

      Issuing Authority: Consumer Product Safety Division

      Date Issued: 2024-06-15

      Severity: HIGH — Mandatory Recall


      AFFECTED BATCHES:

      - Batch IDs starting with LBP-701 through LBP-749: CONFIRMED AFFECTED

      - Batch IDs starting with LBP-750 through LBP-769: UNDER INVESTIGATION

      - Batch IDs starting with LBP-770 and above: CLEAR (not affected)


      Manufacture Date Range: January 15, 2024 – April 30, 2024

      Affected Units: Approximately 14,200 units


      RECOMMENDED ACTIONS:

      - CONFIRMED AFFECTED: Immediately cease use. Contact supplier for full replacement.
      Do not ship or sell.

      - UNDER INVESTIGATION: Quarantine stock pending further testing. Await clearance
      notification by 2024-08-01.

      - CLEAR: No action required. Continue normal operations.


      Recall Hotline: 1-800-555-0191

      Reference Portal: https://recalls.safetyhub.org/portal/RC-2024-0891

      '
    snippet: Mandatory recall for LBP-7xx series battery packs manufactured between
      Jan 2024 and Apr 2024 due to thermal runaway risk.
    title: Safety Recall RC-2024-0891 — Lithium Battery Pack Series LBP-7xx
    url: https://recalls.safetyhub.org/notices/electronics/RC-2024-0891
  - content: 'RECALL NOTICE RC-2024-0754

      Product: Industrial Pressure Valve Series IPV-3xx

      Issuing Authority: Industrial Safety Compliance Board

      Date Issued: 2024-05-02

      Severity: MEDIUM — Class II Recall


      AFFECTED BATCHES:

      - Batch IDs IPV-301 through IPV-318: CONFIRMED AFFECTED

      - Batch IDs IPV-319 through IPV-325: UNDER INVESTIGATION

      - Batch IDs IPV-326 and above: CLEAR


      Manufacture Date Range: October 1, 2023 – December 31, 2023

      Affected Units: Approximately 3,800 units


      RECOMMENDED ACTIONS:

      - CONFIRMED AFFECTED: Remove from service immediately. Return to distributor
      for credit or replacement. Do not use in pressurized systems.

      - UNDER INVESTIGATION: Tag and segregate. Perform additional pressure testing
      before use. Report results to compliance team.

      - CLEAR: Standard inspection schedule applies. No recall action needed.


      Recall Hotline: 1-800-555-0442

      Reference Portal: https://recalls.safetyhub.org/portal/RC-2024-0754

      '
    snippet: Class II recall for IPV-3xx pressure valves manufactured Q4 2023 due
      to seal degradation under high-temperature conditions.
    title: Safety Recall RC-2024-0754 — Industrial Pressure Valve Series IPV-3xx
    url: https://recalls.safetyhub.org/notices/industrial/RC-2024-0754
  - content: 'ADVISORY NOTICE RC-2024-1023

      Product: Thermal Flask Series TF-2xx

      Issuing Authority: Product Quality Assurance Office

      Date Issued: 2024-07-08

      Severity: LOW — Voluntary Advisory


      AFFECTED BATCHES:

      - Batch IDs TF-201 through TF-219: CONFIRMED AFFECTED

      - Batch IDs TF-220 through TF-229: UNDER INVESTIGATION

      - Batch IDs TF-230 and above: CLEAR


      Manufacture Date Range: November 2023 – February 28, 2024

      Affected Units: Approximately 6,500 units


      RECOMMENDED ACTIONS:

      - CONFIRMED AFFECTED: Offer customers free lid replacement kit. Log all complaints.
