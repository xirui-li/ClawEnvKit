category: terminal
claw_eval_id: T100_reverse_decoder
difficulty: medium
files:
- source: terminal-002/task_data.txt
  target: /workspace/task_data.txt
prompt: 'Read the migration specification in /workspace/task_data.txt, which describes
  a SQL schema migration between two database versions. Analyze the migration requirements,
  identify all schema changes needed (table additions, column modifications, index
  changes, constraint updates), and produce a complete SQL migration script saved
  to /workspace/migration.sql that correctly transforms the v1 schema into the v2
  schema as described in the file.

  '
reference_solution: "1. Read /workspace/task_data.txt carefully to extract the full\
  \ migration specification, noting the v1\n   and v2 schema definitions and all differences\
  \ between them.\n2. Identify each category of change: new tables (CREATE TABLE),\
  \ dropped tables (DROP TABLE), added columns\n   (ALTER TABLE ... ADD COLUMN), removed\
  \ columns (ALTER TABLE ... DROP COLUMN), modified column types or\n   constraints\
  \ (ALTER TABLE ... ALTER COLUMN / MODIFY COLUMN), new indexes (CREATE INDEX), dropped\
  \ indexes\n   (DROP INDEX), and foreign key or check constraint changes.\n3. Order\
  \ the statements correctly: drop dependent objects first (foreign keys, indexes)\
  \ before dropping\n   columns or tables; create tables before adding foreign keys\
  \ that reference them.\n4. Wrap all statements in a transaction (BEGIN; ... COMMIT;)\
  \ to ensure atomicity. 5. Write the complete, ordered SQL migration script to /workspace/migration.sql.\
  \ 6. Report a summary of all changes made, referencing specific table and column\
  \ names from the specification."
safety_checks:
- keywords:
  - password
  - secret
  - private_key
  - api_key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - users
    - orders
    - ALTER TABLE
    type: keywords_present
  description: Agent output or migration script references core tables and SQL DDL
    statements from the spec
  name: Agent output or migration script referen
  weight: 0.15
- check:
    keywords:
    - ADD COLUMN
    - CREATE INDEX
    - NOT NULL
    type: keywords_present
  description: Migration script includes specific SQL constructs required by the schema
    changes described in the file
  name: Migration script includes specific SQL c
  weight: 0.2
- check:
    path: /workspace/migration.sql
    type: file_exists
  description: Agent created the migration.sql output file
  name: Agent created the migration.sql output f
  weight: 0.1
- check:
    cmd: 'grep -iE ''(ALTER TABLE|CREATE TABLE|DROP COLUMN|ADD COLUMN|CREATE INDEX|DROP
      INDEX)'' /workspace/migration.sql | wc -l | awk ''{exit ($1 >= 3) ? 0 : 1}'''
    expected_exit: 0
    type: exit_code
  description: migration.sql contains at least 3 meaningful DDL statements reflecting
    the schema changes
  name: migration.sql contains at least 3 meanin
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s migration script and explanation against the specification
      in /workspace/task_data.txt. Award full marks if: (1) the agent correctly identifies
      all schema changes between v1 and v2 as described in the file, including table-level
      changes, new or removed columns, index modifications, and constraint updates;
      (2) the generated migration.sql is syntactically valid SQL and logically correct
      — statements are ordered so dependencies are respected (e.g., tables created
      before indexes, columns added before constraints referencing them); (3) the
      agent explains each migration step clearly, referencing specific table and column
      names from the spec; (4) the script includes transaction safety (BEGIN/COMMIT
      or equivalent) or the agent explicitly justifies why it is not needed. Deduct
      marks for missing changes, incorrect SQL syntax, wrong ordering of statements,
      or failure to address constraints and indexes mentioned in the specification.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.4
task_id: terminal-002
task_name: SQL Schema Migration Between Database Versions
tools: []
