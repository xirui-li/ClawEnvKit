  - content: 'ClearLedger Engineering Overview. ClearLedger powers real-time reconciliation
      for enterprise clients using a distributed ledger approach. Our primary languages
      are Java (Spring Boot) and Kotlin, deployed as containerized microservices on
      Google Cloud (GKE). We use BigQuery for analytics, Cloud Spanner for globally
      consistent transactional storage, and Pub/Sub for messaging. Our mobile clients
      are built in Flutter. We follow a monorepo strategy managed with Bazel, and
      deploy using Cloud Build and Spinnaker. Security is a first-class concern: all
      secrets managed via HashiCorp Vault, and we run continuous penetration testing
      through an in-house red team.

      '
