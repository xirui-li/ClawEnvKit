    - Go
    - Kotlin
    - TypeScript
    - Kubernetes
    - serverless
    type: keywords_present
  name: key_technologies_mentioned
  weight: 0.2
- check:
    keywords:
    - NovaPay
    - ClearLedger
    - SwiftRemit
    type: keywords_present
  name: company_names_covered
  weight: 0.1
- check:
