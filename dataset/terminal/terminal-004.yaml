  - content: 'NovaPay Engineering Blog — Our 2024 Tech Stack. At NovaPay, we''ve built
      our payment processing platform on a modern cloud-native foundation. Our backend
      services are written primarily in Go (about 70%) and Rust (30%) for performance-critical
      paths. We deploy everything on AWS using EKS (Elastic Kubernetes Service), with
      RDS Aurora for transactional data and DynamoDB for session management. Our data
      pipeline relies on Apache Kafka for event streaming and Apache Flink for real-time
      analytics. CI/CD is handled via GitHub Actions and ArgoCD. We recently migrated
      our fraud detection module to a Python-based ML pipeline using SageMaker.

      '
    snippet: NovaPay runs on a Kubernetes-based microservices architecture deployed
