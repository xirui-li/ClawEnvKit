    - I could not find
    - no information available
    - unable to research
    type: keywords_absent
  name: no_hallucinated_sources
  weight: 0.05
- check:
    rubric: "Evaluate the agent's technology stack comparison report for NovaPay,\
      \ ClearLedger, and SwiftRemit on four dimensions:\n1. ACCURACY (0–0.25): Does\
      \ the report correctly attribute technologies to each company?\n   NovaPay =\
      \ AWS + EKS + Go + Rust + Kafka + Flink + SageMaker.\n   ClearLedger = Google\
      \ Cloud + GKE + Java + Kotlin + BigQuery + Cloud Spanner + HashiCorp Vault.\n\
      \   SwiftRemit = Azure + serverless (Azure Functions) + TypeScript + Python\
      \ + Cosmos DB + Terraform.\n   Award 0.25 if all three companies' stacks are\
      \ accurately described, 0.15 if two are accurate, 0.05 if only one.\n\n2. STRUCTURE\
      \ AND COMPARABILITY (0–0.25): Is the output organized so the three companies\
      \ can be meaningfully compared?\n   Award 0.25 if it uses a table, side-by-side\
      \ format, or clearly labeled sections per company covering\n   cloud provider,\
      \ languages, and infrastructure highlights. Award 0.15 for partial structure.\
      \ Award 0.0 for\n   unstructured prose with no clear company delineation.\n\n\
      3. DIFFERENTIATION INSIGHTS (0–0.25): Does the report highlight meaningful differences\
      \ — e.g., NovaPay's\n   performance-focused Rust/Go vs. ClearLedger's enterprise\
      \ Java/Kotlin vs. SwiftRemit's serverless TypeScript?\n   Does it note cloud\
      \ provider lock-in implications or architectural philosophy differences?\n \
      \  Award 0.25 for at least two substantive differentiating insights, 0.15 for\
      \ one insight, 0.0 for none.\n\n4. COMPLETENESS (0–0.25): Are all three companies\
      \ covered with at least cloud provider, primary languages,\n   and one infrastructure\
      \ detail each? Award 0.25 if all three are fully covered, 0.15 if two, 0.05\
      \ if one.\n\nFinal score = sum of the four dimension scores (max 1.0).\n"
    type: llm_judge
  name: comparison_quality
  weight: 0.45
