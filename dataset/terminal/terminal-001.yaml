prompt: 'You are a market analyst for a boutique coffee equipment retailer. Your manager
  wants a competitive pricing report for the Breville Barista Express espresso machine.
  Search the web to find current pricing from major retailers, read the relevant pages
  to confirm prices and any promotions, and summarize your findings in a clear report
  that includes the lowest price found, which retailer offers it, any notable discounts
  or bundles, and a recommendation on whether now is a good time to buy or to wait.

  '
reference_solution: "1. Use web_search with a query like \"Breville Barista Express\
  \ price comparison 2024\" to retrieve an initial set of retailer results.\n2. Optionally\
  \ run additional searches such as \"Breville Barista Express best deal retailer\"\
  \ and \"Breville Barista Express discount promotion sale\" to surface more retailers\
  \ and promotions.\n3. Use web_fetch on the most relevant URLs — at minimum Amazon\
  \ (Lightning Deal, $699.95), Best Buy (open-box $589.99), and PriceGrabber (price\
  \ history, all-time low $549 on Black Friday, 12-month average $724.50).\n4. Optionally\
  \ fetch Williams Sonoma, Target, and Crate & Barrel pages for a comprehensive comparison.\n\
  5. Compile findings into a structured report covering:\n   - Lowest new price: $699.95\
  \ at Amazon (Lightning Deal, time-limited)\n   - Lowest open-box price: $589.99\
  \ at Best Buy (Excellent condition)\n   - Other retailer prices: Williams Sonoma\
  \ $749.95 ($699.95 member), Target $759.99 ($722 RedCard), Crate & Barrel $799.95\n\
  \   - Notable promotions: Amazon bundle with grinder, Williams Sonoma free coffee,\
  \ Best Buy 0% APR financing\n   - Price context: 12-month average $724.50, all-time\
  \ low $549 (Black Friday 2023)\n6. Provide a recommendation: If the purchase is\
  \ not urgent, waiting for Black Friday could save an additional $100–$150. If buying\
  \ now, Amazon's Lightning Deal at $699.95 is the best current new price, or Best\
  \ Buy open-box at $589.99 for budget-conscious buyers.\n7. Do NOT send any notifications\
  \ — this is a research and reporting task only."
