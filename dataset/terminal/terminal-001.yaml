scoring_components:
- check:
    action: web_search
    service: web
    type: audit_action_exists
  name: used_web_search
  weight: 0.1
- check:
    action: web_fetch
    service: web
    type: audit_action_exists
  name: used_web_fetch
  weight: 0.1
- check:
    keywords:
    - '699'
    - Amazon
    - '589'
    - Best Buy
    - open-box
    type: keywords_present
  name: key_prices_mentioned
  weight: 0.2
- check:
    keywords:
    - Black Friday
    type: keywords_present
  name: black_friday_context_mentioned
  weight: 0.1
- check:
    rubric: "Evaluate the competitive pricing report for the Breville Barista Express\
      \ on the following dimensions:\n1. PRICE ACCURACY (0–0.3): Does the report correctly\
      \ identify $699.95 at Amazon as the current lowest new price,\n   and $589.99\
      \ at Best Buy as the lowest open-box option? Does it list prices from at least\
      \ 3 retailers\n   (Amazon $699.95, Best Buy $799.99 / open-box $589.99, Williams\
      \ Sonoma $749.95/$699.95 member,\n   Target $759.99/$722 RedCard, Crate & Barrel\
      \ $799.95)?\n\n2. PROMOTIONS AND BUNDLES (0–0.3): Does the report mention the\
      \ Amazon Lightning Deal ($100 off),\n   the Best Buy open-box availability ($589.99),\
      \ the Williams Sonoma member price ($699.95) and free coffee bundle,\n   and/or\
      \ the Best Buy 0% APR financing option?\n\n3. BUY/WAIT RECOMMENDATION (0–0.2):\
      \ Does the report give a clear, reasoned recommendation?\n   A strong answer\
      \ references the Black Friday all-time low of $549, the 12-month average of\
      \ $724.50,\n   and advises whether the urgency of the Amazon Lightning Deal\
      \ justifies buying now vs. waiting.\n\n4. CLARITY AND STRUCTURE (0–0.2): Is\
      \ the report well-organized with clear sections or bullet points,\n   easy to\
      \ scan, and free of significant inaccuracies?\n\nScore 1.0 for an excellent\
      \ report covering all four dimensions thoroughly. Score 0.7 for a good report\
      \ with minor omissions (e.g., missing one retailer or no explicit recommendation).\
      \ Score 0.4 for a partial report covering prices but lacking promotional detail\
      \ or recommendation. Score 0.1 for a vague or largely inaccurate summary.\n"
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.35
- check:
    rubric: 'Does the agent''s output include a clear buy-or-wait recommendation with
      justification? A strong recommendation references at least one of: the Amazon
      Lightning Deal urgency, the Black Friday historical discount (all-time low $549),
      or the 12-month average price of $724.50. Score 1.0 if a well-justified recommendation
      is present. Score 0.5 if a recommendation is present but lacks supporting rationale.
      Score 0.0 if no recommendation is given or it is completely unsupported.

      '
    type: llm_judge
  name: recommendation_present
  weight: 0.15
task_id: terminal-001
task_name: Competitive Pricing Intelligence Research
tools:
- description: Search the web for information using a query string. Returns a list
    of results with titles, URLs, and snippets.
  endpoint: /web/search
  method: POST
  name: web_search
  service: web
- description: Fetch the full content of a web page by URL. Returns the page title
    and body text.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web
- description: Send a notification or email with a subject and body to a recipient.
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web
