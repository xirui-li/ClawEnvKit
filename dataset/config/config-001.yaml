    service: config
    type: audit_field_equals
    value: ops-team@company.com
  name: correct_recipient
  weight: 0.15
- check:
    action: send_notification
    field: subject
    service: config
    type: audit_field_equals
    value: Disabled Integration Report
  name: correct_subject
  weight: 0.1
- check:
    action: send_notification
    field: body
    service: config
    type: audit_field_contains
    value: SendGrid Email Service
  name: integration_name_in_body
  weight: 0.05
- check:
    action: send_notification
