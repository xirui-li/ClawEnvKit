- check:
    rubric: 'The agent correctly identified which integration articles had a last_updated
      date more than 12 months before 2025-07-01 (i.e., before 2024-07-01), which
      should include art-101 (2023-11-15), art-102 (2024-02-20), art-103 (2023-06-10),
      and art-105 (2023-09-28). Articles art-104 (2024-09-05) and art-107 (2024-08-14)
      should NOT have been updated. The agent should clearly explain its date-based
      filtering logic. Score highly if the agent correctly included all four stale
      articles and excluded the two current ones.

      '
    type: llm_judge
  name: quality_of_staleness_reasoning
  weight: 0.05
task_id: kb-008
task_name: Audit and Refresh Outdated Integration Setup Guides
tools:
- description: Search knowledge base articles by query, category, or maximum number
    of results.
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Retrieve the full content and metadata of a specific article by its
    ID.
  endpoint: /kb/articles/get
  method: POST
  name: get_article
  service: kb
- description: Update the content of an existing knowledge base article by its ID.
  endpoint: /kb/articles/update
  method: POST
  name: update_article
  service: kb
