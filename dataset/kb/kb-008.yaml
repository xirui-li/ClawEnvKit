difficulty: hard
fixtures:
  articles:
  - author: Maria Chen
    category: integrations
    content: 'Follow these steps to connect your account to Salesforce:

      1. Navigate to Settings > Integrations.

      2. Click ''Add Integration'' and select Salesforce.

      3. Enter your Salesforce credentials and authorize the connection.

      4. Map the required fields and click Save.

      '
    id: art-101
    last_updated: '2023-11-15'
    title: Setting Up the Salesforce Integration
  - author: James Okafor
    category: integrations
    content: 'To enable Slack notifications:

      1. Go to Settings > Integrations > Slack.

      2. Click ''Connect to Slack'' and sign in.

      3. Choose the channel where notifications should appear.

      4. Configure the event triggers and save.

      '
    id: art-102
    last_updated: '2024-02-20'
    title: Slack Notification Integration Guide
  - author: Priya Nair
    category: integrations
    content: 'Integrate with Zapier to automate workflows:

      1. Log in to your Zapier account.

      2. Create a new Zap and select our app as the trigger.

      3. Authenticate using your API key found in Settings > API.

      4. Configure actions and test your Zap.

      '
    id: art-103
    last_updated: '2023-06-10'
    title: Zapier Automation Setup
  - author: Laura Schmidt
    category: integrations
    content: 'Connect Google Analytics to track user behavior:

      1. In Settings > Integrations, select Google Analytics.

      2. Enter your Tracking ID (UA-XXXXXXX-X).

      3. Enable the events you want to track.

      4. Verify the connection using the Test button.

      '
    id: art-104
    last_updated: '2024-09-05'
    title: Google Analytics Integration
  - author: David Park
    category: integrations
    content: 'Sync contacts and deals with HubSpot:

      1. Navigate to Settings > Integrations > HubSpot.

      2. Authenticate with your HubSpot account.

      3. Select the objects to sync (Contacts, Deals, Companies).

      4. Set sync frequency and save settings.

      '
    id: art-105
    last_updated: '2023-09-28'
    title: HubSpot CRM Integration
  - author: Aisha Obi
    category: support
    content: 'If you cannot reset your password:

      1. Check your spam folder for the reset email.

      2. Ensure you are using the correct registered email address.

      3. Contact support if the issue persists.

      '
    id: art-106
    last_updated: '2024-12-01'
    title: Password Reset Troubleshooting
  - author: Tom Eriksson
    category: integrations
    content: 'To accept payments via Stripe:

      1. Go to Settings > Integrations > Payments.

      2. Click ''Connect Stripe Account''.

      3. Complete the Stripe OAuth flow.

      4. Configure currency and payment methods.

      5. Run a test transaction to verify.

      '
    id: art-107
    last_updated: '2024-08-14'
    title: Stripe Payment Integration
prompt: 'Our third-party integration documentation is falling behind — customers keep
  reporting that the setup steps no longer match what they see in the product. Search
  for all integration-related articles, identify which ones have not been updated
  in the past 12 months (relative to today, 2025-07-01), and update each stale article
  by appending a standardized notice at the end of its content: "⚠️ This article was
  flagged for review on 2025-07-01. Please verify all steps against the latest product
  version before following this guide." Make sure every outdated integration article
  receives this update.

  '
reference_solution: "1. Call search_articles with query \"integration\" and category\
  \ \"integrations\" to retrieve all integration articles.\n2. Review each returned\
  \ article's last_updated date against the cutoff date of 2024-07-01 (12 months before\
  \ 2025-07-01).\n3. Identify stale articles: art-101 (2023-11-15), art-102 (2024-02-20),\
  \ art-103 (2023-06-10), art-105 (2023-09-28).\n4. Note that art-104 (2024-09-05)\
  \ and art-107 (2024-08-14) are within 12 months and should NOT be updated.\n5. For\
  \ each stale article, call get_article to retrieve its current full content.\n6.\
  \ Call update_article for each stale article, appending the exact notice:\n   \"\
  ⚠️ This article was flagged for review on 2025-07-01. Please verify all steps against\
  \ the latest product version before following this guide.\"\n7. Confirm all four\
  \ stale articles (art-101, art-102, art-103, art-105) have been updated and report\
  \ the results."
