category: knowledge
claw_eval_id: T15zh_kb_search
difficulty: medium
fixtures:
  articles:
  - author: Sandra Kowalski
    category: onboarding
    content: 'Welcome to the company! Complete the following steps in your first week:
      1. Set up your workstation using Windows 7. 2. Register with HR using the legacy
      HRConnect portal at hr.internal/legacy. 3. Attend orientation on Monday at 9am
      in Building A, Room 12. 4. Submit your tax forms via paper to the HR office
      on Floor 2.'
    id: art-001
    last_updated: '2019-03-15'
    title: New Employee Onboarding Checklist
  - author: Marcus Delgado
    category: onboarding
    content: 'To set up your IT accounts: 1. Request a laptop from IT using the ServiceNow
      portal. 2. Enable two-factor authentication on your Google Workspace account.
      3. Join the company Slack workspace using your corporate email. 4. VPN access
      is provisioned automatically within 24 hours.'
