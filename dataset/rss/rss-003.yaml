    title: Federal Reserve Signals Potential Rate Cut in Q4 2024
  - category: finance
    date: '2024-10-13'
    id: art-102
    source: Bloomberg Markets
    summary: The S&P 500 climbed to an all-time high as strong Q3 earnings from major
