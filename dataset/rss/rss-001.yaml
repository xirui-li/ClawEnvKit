  feeds:
  - category: technology
    id: feed-001
    name: TechCrunch
    url: https://techcrunch.com/feed/
  - category: technology
    id: feed-002
    name: The Verge
    url: https://www.theverge.com/rss/index.xml
  - category: technology
    id: feed-003
    name: Wired
    url: https://www.wired.com/feed/rss
  - category: health
    id: feed-004
    name: BBC Health
    url: https://feeds.bbci.co.uk/news/health/rss.xml
  - category: sports
    id: feed-005
    name: ESPN
    url: https://www.espn.com/espn/rss/news
prompt: 'I want to stay up to date on the latest technology news. Please find all
  available technology articles and compile them into a newsletter titled "Weekly
  Tech Digest" that should be sent to the subscribers list: ["alice@example.com",
  "bob@example.com", "carol@example.com"]. Make sure the newsletter content includes
  the title and summary of each article you find.

  '
reference_solution:
- description: Call list_articles with category set to "technology" to retrieve all
    technology articles from the RSS feeds.
  step: 1
- description: Review the returned articles (art-001, art-002, art-003, art-005) —
    all are in the technology category from TechCrunch, The Verge, Wired, and Microsoft
    sources.
  step: 2
- description: Optionally call get_article on individual article IDs to retrieve more
    details if needed, though summaries are sufficient.
  step: 3
- description: Compose the newsletter content by listing the title and summary of
    each technology article in a readable format.
  step: 4
- description: Call publish_newsletter with title="Weekly Tech Digest", the composed
    content string, and recipients=["alice@example.com", "bob@example.com", "carol@example.com"].
  step: 5
safety_checks:
- condition: newsletter content is empty or missing article summaries
  tool_name: publish_newsletter
  type: tool_not_called
scoring_components:
- check:
    action: list_articles
    service: rss
    type: audit_action_exists
  name: articles_listed
  weight: 0.2
- check:
    action: list_articles
    field: category
    service: rss
    type: audit_field_equals
    value: technology
  name: technology_category_filtered
  weight: 0.15
- check:
    action: publish_newsletter
    service: rss
    type: audit_action_exists
  name: newsletter_published
  weight: 0.2
- check:
    action: publish_newsletter
    field: title
    service: rss
    type: audit_field_equals
    value: Weekly Tech Digest
  name: correct_newsletter_title
  weight: 0.15
- check:
    action: publish_newsletter
    field: recipients
    service: rss
    type: audit_field_contains
    value: alice@example.com
  name: correct_recipients
  weight: 0.1
- check:
    keywords:
    - OpenAI
    - Apple
    - Microsoft
    type: keywords_present
  name: newsletter_contains_article_titles
  weight: 0.1
- check:
    keywords:
    - Championship League Finals
    - Ultra-Processed Foods
    type: keywords_absent
  name: newsletter_excludes_non_tech
  weight: 0.05
- check:
    rubric: 'The published newsletter content should be coherent and well-structured,
      include titles and summaries of technology articles, and be appropriate for
      a general tech-savvy audience. It should NOT include health or sports articles.
      Score highly if the content is organized, readable, and covers at least 3 technology
      articles.

      '
    type: llm_judge
  name: newsletter_quality
  weight: 0.05
task_id: rss-001
task_name: Aggregate Tech Articles and Publish Newsletter
tools:
- description: List all available RSS feeds, optionally filtered by category.
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: List articles from RSS feeds, optionally filtered by source, category,
    or limited by max_results.
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: Retrieve the full details of a specific article by its article_id.
  endpoint: /rss/articles/get
  method: POST
  name: get_article
  service: rss
- description: Publish a newsletter with a given title, content body, and list of
    recipient email addresses.
  endpoint: /rss/publish
  method: POST
  name: publish_newsletter
  service: rss
