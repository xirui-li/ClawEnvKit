difficulty: easy
fixtures:
  articles:
  - category: technology
    date: '2024-11-10'
    id: art-001
    source: TechCrunch
    summary: OpenAI has released GPT-5, featuring significantly enhanced reasoning
      capabilities and a 200K context window, marking a major leap in large language
      model performance.
    title: OpenAI Unveils New GPT-5 Model with Improved Reasoning
  - category: technology
    date: '2024-11-09'
    id: art-002
    source: The Verge
    summary: Apple's second-generation Vision Pro headset is 30% lighter than its
      predecessor and starts at $2,499, aiming to broaden adoption of spatial computing.
    title: Apple Announces Vision Pro 2 with Lighter Design and Lower Price
  - category: technology
    date: '2024-11-08'
    id: art-003
    source: Wired
    summary: DeepMind's latest AlphaFold iteration now predicts protein structures
      with near-experimental accuracy across a broader set of molecular configurations.
    title: Google DeepMind Achieves Breakthrough in Protein Folding Accuracy
  - category: health
    date: '2024-11-10'
    id: art-004
    source: BBC Health
    summary: A comprehensive 10-year longitudinal study found that diets high in ultra-processed
      foods are associated with a 28% increased risk of dementia.
    title: New Study Links Ultra-Processed Foods to Cognitive Decline
  - category: technology
    date: '2024-11-07'
    id: art-005
    source: TechCrunch
    summary: Microsoft announced that its Copilot AI assistant will be available to
      all Office 365 subscribers starting December 2024, eliminating the previous
      enterprise-only restriction.
    title: Microsoft Expands Copilot AI to All Office 365 Plans
  - category: sports
    date: '2024-11-09'
    id: art-006
    source: ESPN
    summary: This year's Championship League finals drew over 400 million global viewers,
