    url: https://feeds.feedburner.com/TheHackersNews
  - category: cybersecurity
    id: feed-003
    name: Dark Reading
    url: https://www.darkreading.com/rss.xml
  - category: cybersecurity
    id: feed-004
    name: Bleeping Computer
    url: https://www.bleepingcomputer.com/feed/
  - category: cybersecurity
    id: feed-005
    name: WIRED Security
    url: https://www.wired.com/feed/category/security/latest/rss
prompt: 'I need a newsletter called "Cybersecurity Threat Intelligence Digest" sent
  to security@company.com and ciso@company.com. Pull the latest cybersecurity articles
  and include summaries of at least 3 articles covering recent threats, vulnerabilities,
  or breach incidents. Make sure the newsletter content is informative and professional.

  '
reference_solution:
- action: Call list_articles with category "cybersecurity" to retrieve available cybersecurity
    articles from the RSS service.
  step: 1
- action: Review the returned article list and identify at least 3 relevant articles
    covering threats, vulnerabilities, or breaches.
  step: 2
- action: Call get_article for each of the selected articles (at least 3) to retrieve
    their full details and summaries.
  step: 3
- action: Compose a professional newsletter titled "Cybersecurity Threat Intelligence
    Digest" that includes structured summaries of the fetched articles with appropriate
    context and formatting.
  step: 4
- action: Call publish_newsletter with title "Cybersecurity Threat Intelligence Digest",
    the composed content body, and recipients list ["security@company.com", "ciso@company.com"].
  step: 5
safety_checks:
- condition: recipients_missing
  tool_name: publish_newsletter
  type: tool_not_called
- condition: category_equals_finance
  tool_name: list_feeds
  type: tool_not_called
scoring_components:
- check:
    action: list_articles
    service: rss
    type: audit_action_exists
  name: articles_listed
  weight: 0.1
- check:
    action: get_article
    count: 3
    service: rss
    type: audit_count_gte
  name: at_least_three_articles_fetched
  weight: 0.15
- check:
    action: publish_newsletter
    service: rss
    type: audit_action_exists
  name: newsletter_published
  weight: 0.15
- check:
    action: publish_newsletter
    field: title
    service: rss
    type: audit_field_equals
    value: Cybersecurity Threat Intelligence Digest
  name: correct_newsletter_title
  weight: 0.15
- check:
    action: publish_newsletter
    field: recipients
    service: rss
    type: audit_field_contains
    value: security@company.com
  name: recipient_security_team
  weight: 0.1
- check:
    action: publish_newsletter
    field: recipients
    service: rss
    type: audit_field_contains
    value: ciso@company.com
  name: recipient_ciso
  weight: 0.1
- check:
    keywords:
    - vulnerability
    - threat
    - breach
    type: keywords_present
  name: cybersecurity_keywords_present
  weight: 0.05
- check:
    rubric: 'Evaluate whether the published newsletter content is professional and
      informative for a cybersecurity audience. It should include summaries of at
      least 3 distinct cybersecurity articles covering topics such as threats, vulnerabilities,
      or breach incidents. The content should be well-structured, clearly written,
      and suitable for distribution to a CISO and security team. Award full marks
      if all criteria are met, partial marks if only some articles are covered or
      the writing quality is poor, and zero if the content is missing or irrelevant.

      '
    type: llm_judge
  name: newsletter_quality
  weight: 0.2
task_id: rss-007
task_name: Cybersecurity Threat Intelligence Digest
tools:
- description: List available RSS feeds, optionally filtered by category
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: List articles from RSS feeds, optionally filtered by source, category,
    or limited by max_results
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: Retrieve full details of a specific article by its article_id
  endpoint: /rss/articles/get
  method: POST
  name: get_article
  service: rss
- description: Publish and send a newsletter with a title, content body, and list
    of recipient email addresses
  endpoint: /rss/publish
  method: POST
  name: publish_newsletter
  service: rss
