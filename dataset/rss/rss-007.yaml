difficulty: medium
fixtures:
  articles:
  - category: cybersecurity
    date: '2024-11-12'
    id: art-101
    source: Krebs on Security
    summary: A sophisticated ransomware group dubbed 'VoltLock' has been actively
      targeting energy and water utility providers across Germany, France, and the
      Netherlands. Security researchers at Mandiant have attributed the attacks to
      a financially motivated threat actor operating since early 2024, with ransom
      demands averaging $4.2 million per incident.
    title: New Ransomware Strain Targets Critical Infrastructure Across Europe
  - category: cybersecurity
    date: '2024-11-10'
    id: art-102
    source: The Hacker News
    summary: A critical unauthenticated remote code execution vulnerability (CVE-2024-20418,
      CVSS 10.0) has been identified in Cisco IOS XE Software's web UI feature. Approximately
      50,000 internet-facing devices remain unpatched. Cisco has released an emergency
      patch and urges administrators to apply it without delay.
    title: Critical Zero-Day Vulnerability Discovered in Cisco IOS XE — Patch Immediately
  - category: cybersecurity
    date: '2024-11-11'
    id: art-103
    source: Dark Reading
    summary: A major U.S. healthcare provider confirmed a data breach affecting over
      9 million patients after attackers exploited a misconfigured cloud storage bucket.
      Exposed data includes names, Social Security numbers, insurance details, and
      medical histories. The company faces regulatory scrutiny under HIPAA and multiple
      class-action lawsuits.
    title: Data Breach at Healthcare Giant Exposes 9 Million Patient Records
  - category: cybersecurity
    date: '2024-11-09'
    id: art-104
    source: Bleeping Computer
    summary: A widespread phishing campaign has been observed using convincing fake
      Microsoft Teams meeting invitations to harvest corporate credentials. The operation,
      active since October 2024, has targeted over 200 organizations in finance and
      legal sectors. Attackers use adversary-in-the-middle proxies to bypass MFA protections.
    title: Phishing Campaign Leverages Fake Microsoft Teams Invites to Steal Credentials
  - category: cybersecurity
    date: '2024-11-08'
    id: art-105
    source: WIRED Security
    summary: The Lazarus Group has been observed distributing a new cross-platform
      malware family called 'InvisibleFerret' through fake LinkedIn recruiting messages.
      Targets in the cryptocurrency and fintech industries are tricked into downloading
      malicious coding challenges. The malware exfiltrates browser credentials, crypto
      wallet keys, and proprietary source code.
    title: North Korean Hackers Deploy Novel Malware via LinkedIn Job Scams
  - category: cybersecurity
    date: '2024-11-07'
    id: art-106
    source: Dark Reading
    summary: The Cybersecurity and Infrastructure Security Agency has added five newly
      exploited vulnerabilities to its Known Exploited Vulnerabilities catalog, including
      flaws in Fortinet FortiOS, Apache ActiveMQ, and Atlassian Confluence. Federal
      agencies are mandated to remediate these by November 25, 2024. Private sector
      organizations are also urged to prioritize patching.
    title: CISA Adds Five Actively Exploited Vulnerabilities to KEV Catalog
