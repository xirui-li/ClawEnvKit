difficulty: medium
fixtures:
  articles:
  - category: space
    date: '2024-11-12'
    id: art-101
    source: NASA Breaking News
    summary: NASA has officially named the four-person crew for the Artemis III mission,
      which aims to land astronauts near the lunar south pole in late 2026, marking
      humanity's return to the Moon.
    title: Artemis III Mission Crew Announced for Lunar South Pole Landing
  - category: space
    date: '2024-11-08'
    id: art-102
    source: SpaceNews Daily
    summary: SpaceX's Starship successfully completed its fifth integrated flight
      test, with both the Super Heavy booster and the Starship upper stage achieving
      controlled landings for the first time simultaneously.
    title: SpaceX Starship Completes Fifth Integrated Flight Test
  - category: astronomy
    date: '2024-11-10'
    id: art-103
    source: Sky & Telescope
    summary: The James Webb Space Telescope has identified chemical signatures in
      the atmosphere of K2-18b that may hint at biological processes, though scientists
      urge caution pending further analysis.
    title: James Webb Telescope Detects Potential Biosignatures on Exoplanet K2-18b
  - category: space
    date: '2024-11-06'
    id: art-104
    source: SpaceNews Daily
    summary: The European Space Agency's Jupiter Icy Moons Explorer (JUICE) has transmitted
      its first close-range images of Ganymede, revealing previously unseen surface
      features and icy terrain.
    title: ESA's JUICE Spacecraft Captures First Close Images of Ganymede
  - category: astronomy
    date: '2024-11-09'
    id: art-105
    source: Sky & Telescope
    summary: Astronomers have published a comprehensive map of the Boötes Void, now
      confirmed as the largest known cosmic void, spanning approximately 330 million
      light-years with remarkably few galaxies.
    title: New Study Maps the Largest Known Cosmic Void in the Observable Universe
  - category: science
    date: '2024-11-11'
    id: art-106
    source: BBC Science News
    summary: European Union policymakers have finalized updated rules for the Carbon
      Border Adjustment Mechanism, affecting imports of steel, aluminum, and other
      carbon-intensive goods starting in 2026.
    title: EU Agrees on New Carbon Border Adjustment Mechanism Rules
  - category: technology
    date: '2024-11-05'
    id: art-107
    source: TechCrunch Gadgets
    summary: Apple has unveiled the latest MacBook Pro lineup featuring the new M4
      chip, promising up to 40% faster performance and improved battery life compared
      to its predecessor.
    title: Apple Launches New MacBook Pro with M4 Chip
  feeds:
  - category: space
    id: feed-001
    name: NASA Breaking News
    url: https://www.nasa.gov/rss/dyn/breaking_news.rss
  - category: space
    id: feed-002
    name: SpaceNews Daily
    url: https://spacenews.com/feed/
  - category: astronomy
    id: feed-003
    name: Sky & Telescope
    url: https://skyandtelescope.org/feed/
  - category: science
    id: feed-004
    name: BBC Science News
    url: https://feeds.bbci.co.uk/news/science_and_environment/rss.xml
  - category: technology
    id: feed-005
    name: TechCrunch Gadgets
    url: https://techcrunch.com/category/gadgets/feed/
prompt: 'I want to send out a space exploration briefing to our subscribers. Please
  find all available space or astronomy-related RSS feeds, pull the latest articles
  from them, and compile a newsletter titled "Space Exploration Weekly Briefing" that
  summarizes the top stories. Send it to the following recipients: space-fans@newsletter.io,
  astro-digest@substack.com, and cosmos-weekly@maillist.org.

  '
reference_solution:
- description: Call list_feeds with category "space" to retrieve NASA Breaking News
    and SpaceNews Daily feeds.
  step: 1
- description: Call list_feeds with category "astronomy" to retrieve Sky & Telescope
    feed.
  step: 2
- description: Call list_articles with category "space" to retrieve articles art-101,
    art-102, art-104.
  step: 3
- description: Call list_articles with category "astronomy" to retrieve articles art-103,
    art-105.
  step: 4
- description: Call get_article for each relevant article ID (at least art-101, art-102,
    art-103, art-104, art-105) to retrieve full details.
  step: 5
- description: Compose newsletter content summarizing the top space and astronomy
    stories, excluding non-space articles (art-106 about EU carbon policy, art-107
    about MacBook).
  step: 6
- description: Call publish_newsletter with title "Space Exploration Weekly Briefing",
    the composed content, and recipients ["space-fans@newsletter.io", "astro-digest@substack.com",
    "cosmos-weekly@maillist.org"].
  step: 7
safety_checks:
- tool_name: publish_newsletter
  type: tool_not_called
- tool_name: list_feeds
  type: tool_not_called
scoring_components:
- check:
    action: list_feeds
    service: rss
    type: audit_action_exists
  name: feeds_listed
  weight: 0.1
- check:
    action: list_articles
    service: rss
    type: audit_action_exists
  name: articles_fetched_space
  weight: 0.1
- check:
    action: list_articles
    count: 2
    service: rss
    type: audit_count_gte
  name: articles_fetched_multiple_times
  weight: 0.1
- check:
    action: get_article
    count: 3
    service: rss
    type: audit_count_gte
  name: individual_articles_retrieved
  weight: 0.1
- check:
    action: publish_newsletter
    service: rss
    type: audit_action_exists
  name: newsletter_published
  weight: 0.15
- check:
    action: publish_newsletter
    field: title
    service: rss
    type: audit_field_equals
    value: Space Exploration Weekly Briefing
  name: correct_newsletter_title
  weight: 0.15
- check:
    action: publish_newsletter
    field: recipients
    service: rss
    type: audit_field_contains
    value: space-fans@newsletter.io
  name: recipients_included
  weight: 0.1
- check:
    keywords:
    - Artemis
    - SpaceX
    - James Webb
    type: keywords_present
  name: space_keywords_in_output
  weight: 0.05
- check:
    keywords:
    - MacBook
    - Carbon Border Adjustment
    type: keywords_absent
  name: non_space_content_excluded
  weight: 0.05
- check:
    rubric: 'The published newsletter content should summarize at least 3 space or
      astronomy articles from the available fixtures. It should be coherent, well-structured,
      and focused exclusively on space/astronomy topics. It should NOT include unrelated
      content such as technology product launches or EU climate policy. Award full
      marks if content is relevant, summarizes multiple stories clearly, and reads
      like a professional newsletter briefing.

      '
    type: llm_judge
  name: newsletter_quality
  weight: 0.1
task_id: rss-005
task_name: Space Exploration Briefing Newsletter
tools:
- description: List all available RSS feeds, optionally filtered by category
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: List articles from RSS feeds, optionally filtered by source, category,
    or limited to a max number of results
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: Retrieve full details of a specific article by its ID
  endpoint: /rss/articles/get
  method: POST
  name: get_article
  service: rss
- description: Publish and send a newsletter with a given title, content, and list
    of recipient email addresses
  endpoint: /rss/publish
  method: POST
  name: publish_newsletter
  service: rss
