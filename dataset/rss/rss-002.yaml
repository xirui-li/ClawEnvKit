difficulty: medium
fixtures:
  articles:
  - category: technology
    date: '2024-11-12'
    id: art-001
    source: TechCrunch
    summary: OpenAI has unveiled GPT-5, which introduces advanced multimodal reasoning,
      allowing the model to process text, images, and structured data simultaneously.
      Enterprise adoption is expected to surge in Q3.
    title: OpenAI Announces GPT-5 With Multimodal Reasoning Capabilities
  - category: technology
    date: '2024-11-11'
    id: art-002
    source: The Verge
    summary: Apple's M4 Ultra chip delivers 2.4x performance improvement over the
      M3 Ultra in machine learning tasks, signaling a major shift in professional
      computing hardware preferences away from x86 architecture.
    title: Apple Silicon M4 Ultra Benchmarks Shatter Records in Pro Workloads
  - category: finance
    date: '2024-11-12'
    id: art-003
    source: Bloomberg Markets
    summary: Fed Chair Jerome Powell indicated the central bank is unlikely to cut
      rates further in Q4 2024 after inflation figures came in at 3.1%, above the
      2% target. Bond markets reacted sharply, with 10-year yields rising 18 basis
      points.
    title: Federal Reserve Signals Pause in Rate Cuts Amid Sticky Inflation Data
  - category: finance
    date: '2024-11-11'
    id: art-004
    source: Financial Times
    summary: Goldman Sachs revised its 12-month S&P 500 price target upward to 6,500,
      citing accelerating productivity gains from enterprise AI adoption as a key
      driver of corporate earnings growth heading into 2025.
    title: Goldman Sachs Raises 2025 S&P 500 Target to 6,500 on AI Productivity Gains
  - category: technology
    date: '2024-11-10'
    id: art-005
    source: Wired
    summary: Anthropic's Claude 3.7 model now supports a 500,000 token context window,
      enabling analysis of entire codebases or large document repositories in a single
      pass. Pricing remains competitive with GPT-4o.
    title: Anthropic Releases Claude 3.7 With Extended Context Window of 500K Tokens
  - category: finance
    date: '2024-11-10'
    id: art-006
    source: Financial Times
    summary: The ECB has begun a live pilot of the digital euro with Santander, Deutsche
      Bank, BNP Paribas, ING, UniCredit, and Societe Generale, processing synthetic
      transactions to test interoperability and settlement speeds.
    title: European Central Bank Launches Digital Euro Pilot With Six Major Banks
  - category: technology
    date: '2024-11-09'
    id: art-007
    source: TechCrunch
    summary: Microsoft expanded Azure AI Studio to support fine-tuning of Llama 3,
      Mistral, and Phi-3 models at enterprise scale, directly competing with Google
      Vertex AI and AWS Bedrock for the enterprise MLOps market.
    title: Microsoft Azure AI Studio Now Supports Fine-Tuning of Open-Source LLMs
      at Scale
