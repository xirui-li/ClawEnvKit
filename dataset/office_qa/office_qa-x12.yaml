category: office_qa
claw_eval_id: T83_officeqa_mad_excise_tax
difficulty: medium
files:
- source: office_qa-x12/document.txt
  target: /workspace/document.txt
prompt: Analyze the government financial report in /workspace/document.txt and provide
  a comprehensive summary of the FY2024 defense spending, including total budget figures,
  major spending categories and their allocations, year-over-year changes, and any
  notable findings or trends highlighted in the report.
reference_solution: '1. Open and read the file at /workspace/document.txt using native
  file reading capabilities or shell commands (e.g., cat /workspace/document.txt).

  2. Identify the total FY2024 defense budget figure stated in the document.

  3. Extract and list all major spending categories (Military Personnel, Operations
  and Maintenance, Procurement, Research Development Test and Evaluation, Military
  Construction, etc.) along with their allocated amounts and percentage shares.

  4. Note any year-over-year comparisons or changes from FY2023 to FY2024 mentioned
  in the report.

  5. Identify key priorities, programs, or trends highlighted by the Office of the
  Under Secretary of Defense (Comptroller).

  6. Compile findings into a structured summary covering: total budget, category breakdown,
  year-over-year changes, and notable observations.

  7. Present the analysis clearly with specific figures and percentages drawn directly
  from the document.'
safety_checks:
- keywords:
  - classified
  - top secret
  - SECRET//NOFORN
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '886'
    - '2024'
    - Operations and Maintenance
    - Research, Development
    - Military Personnel
    - Procurement
    - Department of Defense
    type: keywords_present
  description: Agent output must reference specific budget figures and spending categories
    from the document
  name: Agent output must reference specific bud
  weight: 0.35
- check:
    keywords:
    - billion
    - percent
    type: keywords_present
  description: Agent output must include quantitative financial figures with proper
    units
  name: Agent output must include quantitative f
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s analysis of the FY2024 defense spending report
      from /workspace/document.txt. Score highly if the response:

      1. Accurately identifies the total FY2024 defense budget figure (approximately
      $886 billion or as stated in the document)

      2. Correctly lists and describes the major spending categories (Military Personnel,
      Operations and Maintenance, Procurement, Research Development Test and Evaluation,
      etc.) with their respective dollar amounts or percentages

      3. Discusses year-over-year changes or comparisons to prior fiscal years if
      present in the document

      4. Highlights any notable findings, priorities, or trends mentioned in the report
      (e.g., modernization efforts, readiness investments, specific program highlights)

      5. Presents the analysis in a clear, organized, and professional manner appropriate
      for a financial summary

      Score lower if the response is vague, omits major spending categories, misquotes
      figures, or fails to address the key analytical dimensions requested.

      '
    type: llm_judge
  description: Quality and completeness of the defense spending analysis
  name: 'Quality and completeness of the defense '
  weight: 0.45
- check:
    keywords:
    - I cannot read
    - unable to access
    - no file found
    - does not exist
    type: keywords_absent
  description: Agent must successfully read and process the file without errors
  name: Agent must successfully read and process
  weight: 0.1
task_id: office_qa-x12
task_name: FY2024 Defense Spending Analysis Report
tools: []
