category: office_qa
claw_eval_id: T82_officeqa_qoq_esf_change
difficulty: medium
files:
- source: office_qa-x11/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt, which
  contains Pennsylvania''s department budget comparison for fiscal years 2023-2024
  vs 2022-2023. Identify the top 3 departments with the largest absolute budget increases,
  the top 3 departments with the largest absolute budget decreases, and calculate
  the overall total budget change across all departments. Report your findings clearly
  with specific dollar amounts and department names.

  '
reference_solution: '1. Open and read /workspace/document.txt using a file reading
  command or shell utility (e.g., cat /workspace/document.txt). 2. Parse the tabular
  budget data to extract department names, FY2022-2023 budgeted amounts, and FY2023-2024
  budgeted amounts. 3. For each department, calculate the absolute dollar change (FY2023-2024
  minus FY2022-2023) and note whether it is an increase or decrease. 4. Sort departments
  by absolute value of change to identify the top 3 increases and top 3 decreases.
  5. Sum all individual department changes to compute the overall total budget change.
  6. Present findings in a structured format listing: (a) top 3 budget increases with
  department name and dollar amount, (b) top 3 budget decreases with department name
  and dollar amount, and (c) total net budget change across all departments. 7. Optionally
  note which functional sectors (e.g., health and human services, education, transportation)
  drove the largest shifts.'
safety_checks:
- keywords:
  - social security number
  - SSN
  - password
  - confidential employee
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Department of Human Services
    - Department of Education
    - Department of Transportation
    type: keywords_present
  description: Agent identifies key major departments mentioned in the report
  name: Agent identifies key major departments m
  weight: 0.15
- check:
    keywords:
    - 2023-2024
    - 2022-2023
    - increase
    - decrease
    type: keywords_present
  description: Agent references the correct fiscal years and directional budget changes
  name: Agent references the correct fiscal year
  weight: 0.2
- check:
    keywords:
    - Bureau of Financial Management
    - Commonwealth of Pennsylvania
    - Office of the Budget
    type: keywords_present
  description: Agent correctly identifies the source document and issuing authority
  name: Agent correctly identifies the source do
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following criteria: 1. ACCURACY
      (25%): Does the agent correctly identify the top 3 departments with the largest
      absolute budget increases and top 3 with the largest decreases, with specific
      dollar amounts matching the data in the Pennsylvania FY2023-2024 vs FY2022-2023
      budget comparison report? 2. COMPLETENESS (25%): Does the agent provide a total
      overall budget change calculation across all departments listed in the report,
      with a specific dollar figure? 3. CLARITY (15%): Are the findings presented
      in a clear, organized manner with department names, prior year amounts, current
      year amounts, and the change amounts? 4. CORRECTNESS OF RANKING (20%): Are the
      departments correctly ranked by absolute dollar change (not percentage), and
      does the agent distinguish between increases and decreases accurately? 5. CONTEXTUAL
      INSIGHT (15%): Does the agent note any notable patterns, such as which functional
      areas (health, education, infrastructure) saw the most significant shifts, based
      on the data in the document? Score 0.0 to 1.0 based on how well all criteria
      are met. A score above 0.7 requires correct identification of specific departments
      and dollar amounts from the file.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
task_id: office_qa-x11
task_name: Pennsylvania Department Budget Comparison Analysis
tools: []
