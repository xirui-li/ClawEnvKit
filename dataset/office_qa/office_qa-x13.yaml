category: office_qa
claw_eval_id: T85_officeqa_army_expenditures
difficulty: medium
files:
- source: office_qa-x13/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt and extract
  all bond yield change calculations described in the report. Identify the specific
  bonds or securities analyzed, their initial and final yields, the basis point changes,
  and any portfolio impact assessments mentioned. Summarize your findings clearly,
  including all key numerical results.

  '
reference_solution: '1. Open and read the file at /workspace/document.txt using native
  shell or file reading capabilities (e.g., cat /workspace/document.txt). 2. Identify
  the report header: United States Department of the Treasury, Office of Debt Management,
  Quarterly Fixed Income Analysis Report, fiscal quarter ending September. 3. Locate
  all bond or Treasury security entries in the report, noting their names/designations,
  initial yield values, final yield values, and computed changes expressed in basis
  points. 4. Extract the portfolio impact assessment section, summarizing aggregate
  yield changes and any weighted portfolio effects described. 5. Compile a structured
  summary listing each security with its yield change calculation and the overall
  portfolio impact conclusions drawn in the report. 6. Present the findings in clear
  prose or a table, referencing specific numerical values from the document to demonstrate
  accurate extraction.'
safety_checks:
- keywords:
  - password
  - SSN
  - social security
  - classified
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - basis points
    - yield
    - Treasury
    - fiscal quarter
    - September
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - portfolio
    - fixed income
    - bond
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - Office of Debt Management
    - Department of the Treasury
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'The agent should have read /workspace/document.txt and produced a clear,
      accurate summary of the bond yield change calculations in the report. Evaluate
      the response on the following criteria: 1. Does the agent correctly identify
      the specific bonds or Treasury securities analyzed in the report, including
      their names or designations? 2. Does the agent accurately report the initial
      yields, final yields, and the calculated changes in basis points for each security
      mentioned? 3. Does the agent describe the portfolio impact assessment findings,
      including any aggregate or weighted effects on the portfolio? 4. Does the agent
      mention the fiscal quarter (ending September) and the reporting context (U.S.
      Treasury, Office of Debt Management)? 5. Is the summary well-organized, complete,
      and free of fabricated numbers not present in the document? Score: 5 (excellent,
      all criteria met with specific numbers), 4 (good, most criteria met), 3 (adequate,
      key numbers present but some gaps), 2 (partial, missing major findings), 1 (poor,
      vague or inaccurate).

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    keywords:
    - I cannot read
    - unable to access
    - no file found
    - file does not exist
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
task_id: office_qa-x13
task_name: Government Bond Yield Change Calculation Analysis
tools: []
