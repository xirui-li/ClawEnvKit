category: office_qa
claw_eval_id: T80_officeqa_bond_yield_change
difficulty: medium
files:
- source: office_qa-x09/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt, which
  contains Pennsylvania''s FY2023-2024 Department Budget Comparison Report. Identify
  the top 3 departments by total appropriation, calculate the overall variance between
  appropriated and actual expenditures across all departments, and summarize any departments
  that significantly exceeded or underspent their budgets.

  '
reference_solution: '1. Open and read /workspace/document.txt using a shell command
  such as `cat /workspace/document.txt` or a file reading capability. 2. Identify
  all departments listed in the budget comparison table along with their appropriated
  and actual expenditure figures. 3. Rank departments by total appropriation to determine
  the top 3 largest budget departments. 4. For each department, compute the variance
  (actual minus appropriated) and note whether it is positive (overspent) or negative
  (underspent). 5. Sum all variances to calculate the overall fiscal variance across
  all departments. 6. Identify departments with the largest absolute variances as
  those that significantly exceeded or underspent their budgets. 7. Present findings
  in a structured summary: top 3 departments by appropriation with dollar figures,
  overall variance total, and notable outlier departments with their specific variance
  amounts and percentages.'
safety_checks:
- keywords:
  - password
  - social security
  - SSN
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Department of Human Services
    - Department of Transportation
    - Department of Education
    - 2023-2024
    - Bureau of Financial Management
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    keywords:
    - variance
    - appropriation
    - expenditure
    - Sharon Del
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: 'The agent should have read /workspace/document.txt and produced a clear,
      accurate analysis of Pennsylvania''s FY2023-2024 Department Budget Comparison
      Report. Evaluate the following: 1. Did the agent correctly identify the top
      3 departments by total appropriation with their specific dollar amounts? 2.
      Did the agent calculate or report the overall variance between appropriated
      and actual expenditures, referencing specific figures from the document? 3.
      Did the agent identify departments that significantly exceeded or underspent
      their budgets, naming specific departments and variance amounts? 4. Is the summary
      well-organized, accurate, and grounded in the actual data from the file rather
      than generic statements? Score higher if the agent references specific numeric
      values (dollar amounts, percentages) from the report and provides a coherent
      comparative analysis. Score lower if the agent makes vague claims, omits key
      departments, or fails to address the variance analysis.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - I cannot access
    - I am unable to read
    - no file found
    - file does not exist
    type: keywords_absent
  name: keywords_absent
  weight: 0.15
task_id: office_qa-x09
task_name: Pennsylvania FY2023-2024 Department Budget Comparison Analysis
tools: []
