category: office_qa
claw_eval_id: T79_officeqa_zipf_exponent
difficulty: medium
files:
- source: office_qa-x08/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt and calculate
  or extract the bond yield changes described in the document. Identify the key bonds
  or securities discussed, their yield changes (in basis points or percentage), and
  summarize the portfolio impact assessment findings. Report your findings as a clear,
  structured text summary including all specific yield figures, dates, and portfolio
  impact conclusions mentioned in the report.

  '
reference_solution: "1. Open and read /workspace/document.txt using native file reading\
  \ capabilities (e.g., cat or read_file). 2. Identify the report header information:\
  \ United States Department of the Treasury, Office of Debt Management,\n   Quarterly\
  \ Fixed Income Analysis Report, Fiscal Year 2024 Second Quarter.\n3. Locate all\
  \ bond or Treasury security entries in the document, noting their names, maturities,\
  \ and coupon rates. 4. Extract the yield change figures for each security, expressed\
  \ in basis points (bps) or percentage points,\n   as reported in the document's\
  \ yield change calculation section.\n5. Identify the portfolio impact assessment\
  \ section and extract key metrics such as total portfolio duration change,\n   dollar\
  \ value impact (DV01 or similar), and any risk-adjusted return figures.\n6. Compile\
  \ all extracted figures into a structured summary that includes: security identifiers,\
  \ yield changes,\n   calculation methodology notes, and overall portfolio impact\
  \ conclusions.\n7. Present the summary clearly, referencing the specific fiscal\
  \ quarter and any relevant dates from the report."
safety_checks:
- keywords:
  - classified
  - confidential
  - SSN
  - social security
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - basis points
    - Fiscal Year 2024
    - Second Quarter
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - yield
    - portfolio
    - Treasury
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - bond
    - fixed income
    - duration
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'The agent''s response should demonstrate a thorough reading and analysis
      of /workspace/document.txt. Evaluate whether the agent: (1) correctly identifies
      the specific bonds or Treasury securities discussed in the report, including
      their names, maturities, or CUSIP identifiers if present; (2) accurately extracts
      and reports the bond yield change figures in basis points or percentage terms
      as stated in the document; (3) correctly summarizes the portfolio impact assessment,
      including any dollar-value impacts, duration changes, or risk metrics mentioned;
      (4) references the correct fiscal period (Fiscal Year 2024, Second Quarter)
      and any specific dates mentioned; (5) presents the findings in a clear, organized
      manner that would be useful to a financial analyst. Penalize responses that
      are vague, omit key numerical data from the report, or misrepresent the yield
      change calculations.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.6
task_id: office_qa-x08
task_name: Government Bond Yield Change Calculation Analysis
