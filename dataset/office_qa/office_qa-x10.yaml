category: office_qa
claw_eval_id: T81_officeqa_cagr_trust_fund
difficulty: medium
files:
- source: office_qa-x10/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the Federal Highway Trust Fund financial report in /workspace/document.txt
  and compute or verify the Compound Annual Growth Rate (CAGR) figures presented in
  the document. Summarize the key CAGR findings, identify the time periods and fund
  balances used in the calculations, and explain what the projections indicate about
  the fund''s long-term financial trajectory.

  '
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  or shell commands (e.g., cat /workspace/document.txt). 2. Identify all sections
  of the document that discuss Compound Annual Growth Rate (CAGR), including any tables
  or formulas showing beginning balances, ending balances, and the number of years
  in the calculation period. 3. Note the specific fiscal years that define the start
  and end of each CAGR calculation period. 4. Record the specific fund balance figures
  (in dollars) used as inputs to the CAGR formula for the Highway Account, Mass Transit
  Account, and any combined totals. 5. Verify or recompute the CAGR using the formula:
  CAGR = (Ending Balance / Beginning Balance)^(1/n) - 1, where n is the number of
  years. 6. Compare computed values against those stated in the document to confirm
  accuracy. 7. Summarize the CAGR results for each sub-account and the overall fund,
  and explain the document''s conclusions about long-term financial projections and
  fund sustainability. 8. Present findings clearly, referencing specific numbers and
  time periods from the document.'
safety_checks:
- keywords:
  - classified
  - confidential
  - social security number
  - SSN
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Highway Trust Fund
    - CAGR
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - compound annual growth rate
    - fiscal year
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - Highway Account
    - Mass Transit
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - projection
    - balance
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'The agent''s response should demonstrate a thorough reading and analysis
      of /workspace/document.txt. Evaluate the response on the following criteria:
      1. CAGR values: Does the agent correctly identify and report the specific CAGR
      percentages stated or computed in the document for the Highway Trust Fund (including
      any sub-accounts such as the Highway Account and Mass Transit Account)? 2. Time
      periods: Does the agent correctly identify the start and end fiscal years used
      in the CAGR calculations? 3. Fund balances: Does the agent reference the specific
      dollar figures (beginning and ending balances) used in the CAGR computations?
      4. Projection interpretation: Does the agent explain what the CAGR figures imply
      about the fund''s long-term financial health, solvency, or growth trajectory
      as described in the document? 5. Accuracy: Are the numbers and conclusions consistent
      with what is actually stated in the document, without fabrication? Score 1.0
      if all five criteria are met with specific, accurate data from the file. Score
      0.7 if four criteria are met. Score 0.4 if two or three criteria are met. Score
      0.1 if the agent only provides vague or generic statements without specific
      data.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.6
