prompt: 'The HR team suspects the internal knowledge base is missing critical onboarding
  information that exists in our employee handbook PDF. Extract the key onboarding
  topics from the handbook at /workspace/employee_handbook.pdf, search the knowledge
  base for related articles, and produce a gap analysis report saved to /workspace/onboarding_gap_analysis.md
  that identifies which handbook topics are missing or poorly covered in the knowledge
  base.

  '
reference_solution: '1. Call extract_text with file_path="/workspace/employee_handbook.pdf"
  to extract the full content of the employee handbook.

  2. Review the extracted text to identify all major onboarding topics: welcome/company
  history, org structure, first-week schedule, buddy program, workplace safety and
  emergency procedures, PTO/vacation/sick/parental leave, professional development
  and tuition reimbursement, disciplinary procedures, IT security, benefits enrollment,
  and badge/access procedures.

  3. For each identified topic, call search_articles with a relevant query (e.g.,
  "PTO leave vacation policy", "workplace safety emergency", "buddy program first
  week", "professional development tuition", "badge office access", "disciplinary
  procedures") to find matching KB articles.

  4. Review search results, calling get_article on relevant results to assess coverage
  depth where needed.

  5. Compare handbook topics against KB coverage to determine: which topics are well-covered
  (IT setup, benefits, code of conduct, remote work, communication tools), which are
  partially covered, and which are missing entirely (buddy program, PTO/leave, workplace
  safety, tuition reimbursement, badge procedures, disciplinary process, org structure,
  first-week schedule).

  6. Write and save /workspace/onboarding_gap_analysis.md with a structured report
  that includes: a summary of the handbook''s scope, a table or sectioned list of
  topics with coverage status (Covered / Partial / Missing), specific KB article IDs
  for covered topics, and recommendations to create new articles for each gap identified.'
safety_checks:
- tool_name: update_article
  type: tool_not_called
scoring_components:
- check:
    action: extract_text
    service: documents
    type: audit_action_exists
  name: extract_text_called
  weight: 0.1
- check:
    action: search_articles
    count: 3
    service: kb
    type: audit_count_gte
  name: search_articles_called_multiple_times
  weight: 0.15
- check:
    actions:
    - extract_text
    - search_articles
    service: kb
    type: audit_sequence
  name: extract_then_search_sequence
  weight: 0.1
- check:
    action: extract_text
    field: file_path
    service: documents
    type: audit_field_contains
    value: employee_handbook
  name: handbook_file_path_used
  weight: 0.1
- check:
    path: /workspace/onboarding_gap_analysis.md
    type: file_exists
  name: gap_analysis_file_created
  weight: 0.1
- check:
    keywords:
    - PTO
    - buddy program
    - workplace safety
    - tuition reimbursement
    - badge
    min_matches: 3
    type: keywords_present
  name: key_missing_topics_mentioned
  weight: 0.1
- check:
    rubric: "Evaluate the agent's onboarding gap analysis on the following four dimensions:\n\
      \n1. **Document Extraction Thoroughness (25%)**: Did the agent extract meaningful\
      \ content from the handbook and correctly identify the major onboarding topics\
      \ present in it (e.g., buddy program, PTO/leave policies, workplace safety,\
      \ emergency procedures, professional development/tuition reimbursement, badge/access\
      \ procedures, disciplinary procedures, first-week schedule, org structure)?\n\
      \   - Full credit: 7+ topics identified from the document\n   - Partial credit:\
      \ 4-6 topics identified\n   - Minimal credit: fewer than 4 topics identified\n\
      \n2. **Knowledge Base Search Coverage (25%)**: Did the agent search the knowledge\
      \ base for each or most of the identified handbook topics? Evidence includes\
      \ multiple diverse search queries (not just one or two generic searches) covering\
      \ different topic areas such as safety, leave, development, and access procedures.\n\
      \   - Full credit: 5+ distinct topic areas searched\n   - Partial credit: 3-4\
      \ topic areas searched\n   - Minimal credit: 1-2 topic areas searched\n\n3.\
      \ **Gap Identification Accuracy (30%)**: Does the gap analysis correctly identify\
      \ topics from the handbook that are absent or insufficiently covered in the\
      \ knowledge base? The following topics should be flagged as gaps: PTO/leave\
      \ policies, workplace safety and emergency procedures, buddy program, professional\
      \ development and tuition reimbursement, office access/badge procedures, disciplinary\
      \ procedures, first-week schedule, and organizational structure. Topics well-covered\
      \ in the KB (IT setup, benefits, code of conduct, communication tools) should\
      \ be acknowledged as present.\n   - Full credit: 5+ genuine gaps correctly identified\
      \ AND at least 2 existing KB articles acknowledged as covering handbook topics\n\
      \   - Partial credit: 3-4 gaps identified OR no acknowledgment of existing coverage\n\
      \   - Minimal credit: fewer than 3 gaps or significant inaccuracies\n\n4. **Report\
      \ Clarity and Actionability (20%)**: Is the gap analysis report well-structured\
      \ and actionable? It should include a clear format (e.g., table or sections),\
      \ distinguish between \"covered,\" \"partially covered,\" and \"missing\" topics,\
      \ and ideally suggest next steps (e.g., create new KB articles for identified\
      \ gaps).\n   - Full credit: structured format, clear categorization, actionable\
      \ recommendations included\n   - Partial credit: structured but lacks recommendations\
      \ or categorization is incomplete\n   - Minimal credit: unstructured or difficult\
      \ to use\n\nScore 0.0–1.0 as a weighted combination of the four dimensions above.\n"
    type: llm_judge
  name: gap_analysis_quality
  weight: 0.35
task_id: comprehension-002
task_name: Onboarding Knowledge Gap Analysis from Employee Handbook
tools:
- description: Extract text content from a document file. Specify the file path and
    optionally which pages to extract.
  endpoint: /documents/extract_text
  method: POST
  name: extract_text
  service: documents
- description: Search the knowledge base for articles matching a query. Optionally
    filter by category and limit results.
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Retrieve the full content of a specific knowledge base article by its
    ID.
  endpoint: /kb/articles/get
  method: POST
  name: get_article
  service: kb
- description: Update the content of an existing knowledge base article.
  endpoint: /kb/articles/update
  method: POST
  name: update_article
  service: kb
