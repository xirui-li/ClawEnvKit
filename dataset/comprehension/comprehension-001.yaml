category: comprehension
claw_eval_id: T97_pinbench_eli5_model_summary
difficulty: medium
files:
- source: comprehension-001/document.pdf
  target: /workspace/document.pdf
prompt: 'Analyze the research paper at /workspace/document.pdf and provide a detailed
  summary covering: the model architecture (including key components, layers, or design
  choices), the main experimental results (specific metrics and benchmark scores),
  and the primary contributions or conclusions of the work.'
reference_solution: '1. Use native shell capabilities to extract text from the PDF
  at /workspace/document.pdf using a tool such as pdftotext, pdfplumber, or PyMuPDF
  (e.g., run: pdftotext /workspace/document.pdf - or use a Python script with PyMuPDF/pdfplumber).

  2. Read through the extracted text to identify the model architecture section, noting
  key components such as the number of layers, attention heads, hidden dimensions,
  novel modules, or design innovations.

  3. Locate the experiments and results sections to extract specific quantitative
  metrics such as accuracy, F1 scores, BLEU scores, perplexity, or performance on
  named benchmarks.

  4. Identify the abstract and conclusion sections to summarize the primary contributions
  and findings of the paper.

  5. Compose a structured response that covers: (a) model architecture and design
  choices, (b) key experimental results with specific numbers, and (c) main contributions
  and conclusions.'
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - transformer
    - attention
    - parameters
    - benchmark
    - accuracy
    type: keywords_present
  name: keywords_present
  weight: 0.35
- check:
    rubric: 'The agent should provide a comprehensive analysis of the AI research
      paper. Evaluate whether the response: (1) accurately describes the model architecture
      including specific components such as attention mechanisms, layer configurations,
      or novel design choices mentioned in the paper; (2) reports concrete experimental
      results with specific numeric metrics such as accuracy percentages, BLEU scores,
      perplexity values, or other benchmark scores from the paper; (3) clearly articulates
      the primary contributions and conclusions of the work; (4) demonstrates genuine
      understanding of the technical content rather than vague generalities. Penalize
      responses that are vague, missing key architectural details, or omit specific
      quantitative results.'
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - I cannot read
    - unable to access
    - cannot open
    - no content
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
- check:
    path: /workspace/document.pdf
    type: file_exists
  name: file_exists
  weight: 0.05
task_id: comprehension-001
task_name: AI Research Paper Architecture and Results Analysis
tools: []
