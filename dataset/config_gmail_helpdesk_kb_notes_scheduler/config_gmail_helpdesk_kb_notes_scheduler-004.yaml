tools:
- description: List all integrations, optionally filtered by status.
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full details of an integration including secrets.
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Update an integration's status or notes.
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: Send an internal notification to a recipient.
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
- description: List helpdesk tickets, optionally filtered by status.
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get details of a specific helpdesk ticket.
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Search knowledge base articles by query and category.
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Get a specific knowledge base article by ID.
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
- description: List scheduler jobs, optionally filtered by tag or status.
  endpoint: /scheduler/jobs
  method: POST
  name: list_jobs
  service: scheduler
- description: Get details of a specific scheduler job.
  endpoint: /scheduler/jobs/get
  method: POST
  name: get_job
  service: scheduler
