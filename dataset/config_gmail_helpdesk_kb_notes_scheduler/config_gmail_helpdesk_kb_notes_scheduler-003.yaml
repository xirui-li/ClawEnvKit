prompt: 'Our legacy Salesforce sync integration (used by the sales ops team) is being
  permanently retired as part of the Q4 platform consolidation. Disable the integration,
  update its notes to reflect the decommission reason and date, then check if there
  are any open helpdesk tickets related to it and close them with an appropriate resolution.
  Finally, send an email to the sales ops team lead (sarah.chen@company.com) summarizing
  what was done, and create a scheduled job to run a monthly audit of all disabled
  integrations going forward.

  '
reference_solution:
- Call list_inbox or get_message to review the email from sarah.chen@company.com (msg-001)
  confirming the Salesforce retirement timeline for context.
- Call list_integrations to identify intg-001 (Salesforce CRM Sync) as the target
  integration.
- Call update_integration with integration_id=intg-001, status=disabled, and notes
  updated to reflect decommission reason (Q4 platform consolidation) and date (end
  of November 2024).
- Call list_tickets to retrieve open tickets, then identify tkt-101 and tkt-103 as
  Salesforce-related tickets.
- Call close_ticket for tkt-101 with a resolution explaining the integration has been
  permanently retired as part of Q4 consolidation.
- Call close_ticket for tkt-103 with a resolution explaining the integration has been
  retired and duplicate records should be cleaned up manually since no further syncs
  will occur.
- Call create_job to schedule a monthly disabled-integration audit job (e.g., name='Monthly
  Disabled Integration Audit', cron_expression='0 0 1 * *', action='audit_disabled_integrations',
  enabled=true, tags=['audit','integration'], created_by='agent').
- 'Call send_email to sarah.chen@company.com summarizing: intg-001 disabled, notes
  updated, tkt-101 and tkt-103 closed, and the new monthly audit job created.'
- Report a clear summary in the text output covering all actions taken, the integration
  ID, ticket IDs closed, and the new job details.
