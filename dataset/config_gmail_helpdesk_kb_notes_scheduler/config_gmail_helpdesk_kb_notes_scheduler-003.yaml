- check:
    rubric: 'Evaluate the agent''s response on four dimensions:

      1. INTEGRATION DECOMMISSION (0-0.25): Did the agent correctly disable intg-001
      (Salesforce CRM Sync) and update its notes to include a decommission reason
      referencing Q4 platform consolidation and a date? Full credit if both status
      and notes were updated; half credit if only one was changed.

      2. TICKET RESOLUTION (0-0.25): Did the agent identify and close the two Salesforce-related
      tickets (tkt-101 "Salesforce sync failing for West region contacts" and tkt-103
      "Salesforce duplicate records after last sync") with appropriate resolutions
      explaining the integration is being retired? Full credit if both closed with
      meaningful resolutions; half credit if only one closed; zero if neither closed
      or if unrelated tickets (tkt-102, tkt-104) were incorrectly closed.

      3. STAKEHOLDER COMMUNICATION (0-0.25): Did the agent send an email to sarah.chen@company.com
      summarizing the decommission actions taken? Full credit if the email clearly
      references the integration name, the tickets closed, and the new scheduled audit
      job; half credit if the email is sent but lacks key details.

      4. SCHEDULED JOB CREATION (0-0.25): Did the agent create a scheduled job for
      monthly auditing of disabled integrations? Full credit if the job has a monthly
      cron expression (e.g., "0 0 1 * *") and a descriptive name referencing integration
      auditing; half credit if a job was created but with incorrect schedule or vague
      purpose.

      Final score = sum of dimension scores (0.0 to 1.0).

      '
    type: llm_judge
  name: overall_quality
  weight: 0.2
