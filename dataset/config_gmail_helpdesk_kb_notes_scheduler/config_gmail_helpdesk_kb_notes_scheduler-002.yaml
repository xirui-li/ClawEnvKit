- description: Update integration status or notes
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: Send an internal notification
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
- description: List helpdesk tickets filtered by status
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get details of a specific helpdesk ticket
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: List scheduler jobs filtered by status or tag
  endpoint: /scheduler/jobs
  method: POST
  name: list_jobs
  service: scheduler
- description: Get details of a specific scheduler job
