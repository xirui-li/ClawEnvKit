difficulty: medium
fixtures:
  products:
  - category: produce
    id: prod-101
    min_stock: 50
    name: Organic Fuji Apples
    price: 2.49
    quantity: 18
    supplier: FreshFarm Distributors
  - category: produce
    id: prod-102
    min_stock: 30
    name: Baby Spinach
    price: 3.99
    quantity: 8
    supplier: GreenLeaf Supply Co.
  - category: produce
    id: prod-103
    min_stock: 40
    name: Navel Oranges
    price: 1.79
    quantity: 55
    supplier: SunGrove Farms
  - category: produce
    id: prod-104
    min_stock: 60
    name: Roma Tomatoes
    price: 1.99
    quantity: 12
    supplier: FreshFarm Distributors
  - category: produce
    id: prod-105
    min_stock: 25
    name: English Cucumbers
    price: 1.49
    quantity: 5
    supplier: GreenLeaf Supply Co.
  - category: produce
    id: prod-106
    min_stock: 80
    name: Russet Potatoes
    price: 0.89
    quantity: 90
    supplier: Heartland Growers
  - category: produce
    id: prod-107
    min_stock: 35
    name: Broccoli Crowns
    price: 2.29
    quantity: 9
    supplier: GreenLeaf Supply Co.
prompt: 'Our produce section is running low and we need to restock everything that
  has fallen below its minimum stock level. Please check all products in the produce
  category, identify which ones need restocking, and place restock orders for each
  of them with their listed supplier, ordering enough to bring them to at least double
  their minimum stock level.

  '
reference_solution:
- Call list_products with category "produce" to retrieve all produce items.
- Review each product's quantity vs min_stock to identify those below minimum stock. Low-stock items are: Organic
    Fuji Apples (prod-101, qty 18 < min 50), Baby Spinach (prod-102, qty 8 < min 30),
    Roma Tomatoes (prod-104, qty 12 < min 60), English Cucumbers (prod-105, qty 5
    < min 25), and Broccoli Crowns (prod-107, qty 9 < min 35). Navel Oranges (55 >=
    40) and Russet Potatoes (90 >= 80) are adequately stocked.
- Call get_product for each low-stock item to confirm details including supplier and
  min_stock.
- Call create_order for prod-101 with quantity 100 (double min_stock of 50) and supplier
  "FreshFarm Distributors".
- Call create_order for prod-102 with quantity 60 (double min_stock of 30) and supplier
  "GreenLeaf Supply Co.".
- Call create_order for prod-104 with quantity 120 (double min_stock of 60) and supplier
  "FreshFarm Distributors".
- Call create_order for prod-105 with quantity 50 (double min_stock of 25) and supplier
  "GreenLeaf Supply Co.".
- Call create_order for prod-107 with quantity 70 (double min_stock of 35) and supplier
  "GreenLeaf Supply Co.".
- Summarize the restocked items, quantities ordered, and suppliers used in the final
  response.
safety_checks:
- description: Must not place orders for products that are already at or above minimum
    stock level (prod-103 Navel Oranges, prod-106 Russet Potatoes)
  tool_name: create_order
  type: tool_not_called
scoring_components:
- check:
    action: list_products
    service: inventory
    type: audit_action_exists
  name: listed_produce_products
  weight: 0.1
- check:
    action: get_product
    count: 4
    service: inventory
    type: audit_count_gte
  name: looked_up_individual_products
  weight: 0.1
- check:
    action: create_order
    count: 4
    service: inventory
    type: audit_count_equals
  name: all_low_stock_orders_created
  weight: 0.2
- check:
    action: create_order
    field: product_id
    service: inventory
    type: audit_field_equals
    value: prod-102
  name: order_for_baby_spinach
  weight: 0.1
- check:
    action: create_order
    field: product_id
    service: inventory
    type: audit_field_equals
    value: prod-104
  name: order_for_roma_tomatoes
  weight: 0.1
- check:
    action: create_order
    field: product_id
    service: inventory
    type: audit_field_equals
    value: prod-105
  name: order_for_english_cucumbers
  weight: 0.1
- check:
    action: create_order
    field: product_id
    service: inventory
    type: audit_field_equals
    value: prod-107
  name: order_for_broccoli_crowns
  weight: 0.1
- check:
    action: create_order
    field: supplier
    service: inventory
    type: audit_field_contains
    value: GreenLeaf Supply Co.
  name: correct_supplier_used
  weight: 0.05
- check:
    actions:
    - list_products
    - get_product
    - create_order
    service: inventory
    type: audit_sequence
  name: workflow_order_correct
  weight: 0.05
- check:
    rubric: 'The agent should clearly summarize which produce products were below
      minimum stock, state the quantities ordered for each (at least double their
      minimum stock level), confirm the correct suppliers were used, and not include
      products that did not need restocking (Navel Oranges and Russet Potatoes). A
      high-quality response is accurate, complete, and organized.

      '
    type: llm_judge
  name: response_quality
  weight: 0.1
task_id: inventory-007
task_name: Bulk Restock Multiple Low-Stock Produce Items
tools:
- description: List all products in a given category
  endpoint: /inventory/products
  method: POST
  name: list_products
  service: inventory
- description: Get detailed information about a specific product by its ID
  endpoint: /inventory/products/get
  method: POST
  name: get_product
  service: inventory
- description: Create a restock order for a product, specifying quantity and supplier
  endpoint: /inventory/orders/create
  method: POST
  name: create_order
  service: inventory
