difficulty: hard
fixtures:
  products:
  - category: pharmaceutical
    id: prod-401
    min_stock: 50
    name: Ibuprofen 200mg (100-count)
    price: 8.99
    quantity: 30
    supplier: MedSupply Co.
  - category: pharmaceutical
    id: prod-402
    min_stock: 40
    name: Amoxicillin 500mg (30-count)
    price: 14.5
    quantity: 12
    supplier: PharmaDirect Inc.
  - category: pharmaceutical
    id: prod-403
    min_stock: 30
    name: Loratadine 10mg (45-count)
    price: 11.25
    quantity: 55
    supplier: MedSupply Co.
  - category: pharmaceutical
    id: prod-404
    min_stock: 35
    name: Omeprazole 20mg (42-count)
    price: 16.8
    quantity: 8
    supplier: WellCare Pharma
  - category: pharmaceutical
    id: prod-405
    min_stock: 20
