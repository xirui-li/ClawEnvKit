      note (Q4 2024, note-001), retrieved its full details including the attendee
      list, and shared it with all four listed attendees. The agent should NOT have
      shared an older Board Strategy Session (Q3 2024) instead. Penalize if the agent
      skipped retrieving full note details before sharing or shared with wrong/incomplete
      recipients.

      '
    type: llm_judge
  name: sharing_quality
  weight: 0.0
task_id: notes-009
task_name: Find and Share Board Strategy Session Notes
tools:
- description: List available notes, optionally limiting the number of results returned.
  endpoint: /notes/list
  method: POST
  name: list_notes
  service: notes
- description: Retrieve the full details of a specific note by its ID, including content,
    attendees, and tags.
  endpoint: /notes/get
  method: POST
  name: get_note
  service: notes
- description: Share a note with one or more recipients specified by email address.
  endpoint: /notes/share
  method: POST
  name: share_note
  service: notes
