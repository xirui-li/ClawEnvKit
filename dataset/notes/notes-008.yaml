task_id: notes-008
task_name: Find and Share Customer Onboarding Meeting Notes
tools:
- description: List available notes, optionally limiting the number of results returned.
  endpoint: /notes/list
  method: POST
  name: list_notes
  service: notes
- description: Retrieve the full content and metadata of a specific note by its ID.
  endpoint: /notes/get
  method: POST
  name: get_note
  service: notes
- description: Share a specific note with one or more recipients by providing the
    note ID and a list of recipient email addresses.
  endpoint: /notes/share
  method: POST
  name: share_note
  service: notes
