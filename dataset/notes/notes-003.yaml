prompt: 'I need you to find the most recent weekly standup meeting notes and share
  them with all the attendees listed in that note. Please make sure everyone who was
  at the meeting gets a copy.

  '
reference_solution:
- Call list_notes to retrieve the available notes.
- Review the returned list and identify the most recent weekly standup note, which
  is "Weekly Standup - October 7, 2024" with id note-001 (dated 2024-10-07).
- Call get_note with note_id "note-001" to retrieve the full details including the
  attendees list.
- Note the attendees are maria.santos@company.com, james.kim@company.com, priya.nair@company.com,
  and tom.walsh@company.com.
- Call share_note with note_id "note-001" and recipients set to all four attendee
  email addresses.
- Confirm to the user that the most recent standup notes from October 7, 2024 have
  been shared with all attendees.
