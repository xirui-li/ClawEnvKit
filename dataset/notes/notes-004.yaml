    - marcus.okafor@company.com
    - priya.sharma@company.com
    - daniel.wu@company.com
    type: keywords_present
  name: all_attendees_mentioned_in_output
  weight: 0.25
task_id: notes-004
task_name: Share Product Launch Meeting Notes with Stakeholders
tools:
- description: List available notes, optionally limiting the number of results returned.
  endpoint: /notes/list
  method: POST
  name: list_notes
  service: notes
- description: Retrieve the full details of a specific note by its ID, including content
    and attendees.
  endpoint: /notes/get
  method: POST
  name: get_note
  service: notes
- description: Share a note with one or more recipients by providing the note ID and
    a list of email addresses.
  endpoint: /notes/share
  method: POST
  name: share_note
  service: notes
