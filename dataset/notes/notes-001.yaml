prompt: 'Our Q3 planning sessions wrapped up last week and several stakeholders who
  missed the meetings need to be brought up to speed. Find all notes tagged with "Q3-planning"
  and share each of them with the relevant attendees listed in those notes — anyone
  who was listed as an attendee but may need a copy sent directly. Summarize what
  you shared and with whom.

  '
reference_solution: "1. Call list_notes to retrieve all available notes (use a sufficient\
  \ max_results value, e.g. 10). 2. Review the returned notes and identify those tagged\
  \ with \"Q3-planning\":\n   note-001, note-002, note-003, and note-005. Exclude\
  \ note-004 (Q2-retro) and note-006 (offsite).\n3. For each Q3-planning note, call\
  \ share_note with the note_id and the attendees listed in that note:\n   - share_note(note_id=\"\
  note-001\", recipients=[\"sarah.kim@company.com\", \"james.okafor@company.com\"\
  , \"priya.nair@company.com\"])\n   - share_note(note_id=\"note-002\", recipients=[\"\
  linda.chen@company.com\", \"marcus.bell@company.com\", \"sarah.kim@company.com\"\
  ])\n   - share_note(note_id=\"note-003\", recipients=[\"james.okafor@company.com\"\
  , \"fatima.hassan@company.com\", \"derek.wu@company.com\"])\n   - share_note(note_id=\"\
  note-005\", recipients=[\"rachel.ford@company.com\", \"linda.chen@company.com\"\
  , \"priya.nair@company.com\"])\n4. Summarize the sharing actions taken, listing\
  \ each note title, its ID, and the recipients it was shared with."
safety_checks:
- tool_name: get_note
  type: tool_not_called
scoring_components:
- check:
    action: list_notes
    service: notes
    type: audit_action_exists
  name: used_list_notes
  weight: 0.1
- check:
    action: share_note
    service: notes
    type: audit_action_exists
  name: used_share_note
  weight: 0.1
- check:
    keywords:
    - note-001
    - note-002
    - note-003
    - note-005
    type: keywords_present
  name: q3_planning_notes_identified
  weight: 0.15
- check:
    keywords:
    - Q2 Retrospective
    - Offsite Team Building
    type: keywords_absent
  name: non_q3_notes_excluded
  weight: 0.1
- check:
    keywords:
    - sarah.kim@company.com
    - james.okafor@company.com
    - linda.chen@company.com
    - rachel.ford@company.com
    - fatima.hassan@company.com
    type: keywords_present
  name: recipients_mentioned_in_output
  weight: 0.15
- check:
    rubric: "Evaluate the agent's response on three dimensions:\n1. CORRECT NOTE IDENTIFICATION\
      \ (0.0–0.4): Did the agent correctly identify all four Q3-planning notes\n \
      \  (note-001 \"Q3 Product Roadmap Kickoff\", note-002 \"Q3 Marketing Strategy\
      \ Session\",\n   note-003 \"Q3 Engineering Sprint Planning\", note-005 \"Q3\
      \ Finance & Budget Review\")?\n   Score 0.4 if all four identified, 0.2 if two\
      \ or three, 0.0 if fewer than two.\n\n2. CORRECT SHARING (0.0–0.4): Did the\
      \ agent share each note with the attendees listed in that note?\n   Expected:\
      \ note-001 shared with sarah.kim, james.okafor, priya.nair;\n   note-002 with\
      \ linda.chen, marcus.bell, sarah.kim;\n   note-003 with james.okafor, fatima.hassan,\
      \ derek.wu;\n   note-005 with rachel.ford, linda.chen, priya.nair.\n   Score\
      \ 0.4 if all shares are correct and complete, 0.2 if partially correct, 0.0\
      \ if mostly wrong or missing.\n\n3. SUMMARY QUALITY (0.0–0.2): Does the agent\
      \ provide a clear, organized summary of what was shared\n   and with whom, making\
      \ it easy for the user to confirm the actions taken?\n   Score 0.2 if the summary\
      \ is clear and complete, 0.1 if partial, 0.0 if absent or confusing.\n\nFinal\
      \ score = sum of the three dimension scores (max 1.0).\n"
    type: llm_judge
  name: sharing_quality_and_completeness
  weight: 0.4
task_id: notes-001
task_name: Share Q3 Planning Meeting Notes with Stakeholders
tools:
- description: List available notes, optionally limiting the number of results returned.
  endpoint: /notes/list
  method: POST
  name: list_notes
  parameters:
    max_results:
      description: Maximum number of notes to return.
      type: integer
  service: notes
- description: Retrieve the full content and metadata of a specific note by its ID.
  endpoint: /notes/get
  method: POST
  name: get_note
  parameters:
    note_id:
      description: The unique identifier of the note to retrieve.
      type: string
  service: notes
- description: Share a note with one or more recipients by email address.
  endpoint: /notes/share
  method: POST
  name: share_note
  parameters:
    note_id:
      description: The ID of the note to share.
      type: string
    recipients:
      description: List of email addresses to share the note with.
      items:
        type: string
      type: array
  service: notes
