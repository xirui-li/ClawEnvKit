  scheduler:
    jobs:
    - action: ping_payment_gateway
      cron_expression: '*/5 * * * *'
      enabled: false
      id: job-001
      last_run: '2024-11-13T01:55:00Z'
      name: Payment Gateway Health Monitor
      status: disabled
