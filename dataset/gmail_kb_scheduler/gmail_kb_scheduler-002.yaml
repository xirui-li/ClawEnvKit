        '
      date: '2024-11-13T17:55:00Z'
      from: marcus.obi@brightwave.io
      id: msg-003
      priority: high
      read: false
      subject: Webhook delivery failures — missing order events
      to: support@ourcompany.com
    - body: 'Hello, we noticed our invoice for October was $2,400 higher than expected.
        It looks like we were billed for the Enterprise tier but we are on the Pro
