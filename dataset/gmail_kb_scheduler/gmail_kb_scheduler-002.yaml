difficulty: medium
files: []
fixtures:
  gmail:
    inbox:
    - body: 'INCIDENT SUMMARY


        Time: 2024-01-15 02:34 UTC

        Severity: P1 - Critical

        Affected Service: Orders API (prod)


        ROOT CAUSE:

        The connection pool was exhausted due to a long-running analytics query (query
        ID: qry-8821) that held 48 connections open for over 20 minutes without a
        timeout limit set. This caused all new Order API requests to queue and eventually
        time out.


        RESOLUTION STEPS:

        1. Identified the offending query using pg_stat_activity.

        2. Terminated query ID qry-8821 via SELECT pg_terminate_backend(pid).

        3. Set statement_timeout = 300000 (5 minutes) in postgresql.conf.

        4. Restarted the connection pool manager (PgBouncer) to release stale connections.

        5. Verified Orders API response times returned to normal (<200ms).


        PREVENTION:

        - Run /opt/scripts/db_health_check.sh weekly to detect runaway queries early.

        - Set query timeout limits for all analytics roles.


        Incident Commander: Priya Nair

        Duration: 47 minutes

        Customers Affected: ~1,200'
      date: '2024-01-15T02:34:00Z'
      from: alerts@monitoring.acme.com
      id: msg-001
      priority: high
      read: false
      subject: '[CRITICAL] Production DB Timeout Incident - 2024-01-15 02:34 UTC'
      to: oncall@acme.com
    - body: Just a friendly reminder that the quarterly all-hands is this Friday at
        3pm in the main conference room. Lunch will be provided.
      date: '2024-01-15T09:00:00Z'
      from: hr@acme.com
      id: msg-002
      priority: normal
      read: true
      subject: 'Reminder: All-Hands Meeting Friday 3pm'
      to: oncall@acme.com
    - body: The staging deployment pipeline has been updated to use the new Docker
        base images. Please re-trigger any pending staging deployments.
      date: '2024-01-15T10:15:00Z'
      from: devops@acme.com
      id: msg-003
      priority: normal
      read: false
      subject: Deployment pipeline update - staging env
      to: oncall@acme.com
    - body: All SSL certificates for *.acme.com have been renewed successfully. Expiry
