  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a specific email by its message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a recipient
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
- description: Search knowledge base articles by query and category
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Retrieve a specific knowledge base article by ID
  endpoint: /kb/articles/get
  method: POST
  name: get_article
  service: kb
- description: Update the content of a knowledge base article
  endpoint: /kb/articles/update
  method: POST
  name: update_article
  service: kb
- description: List scheduled jobs, optionally filtered by status, enabled state,
    or tag
  endpoint: /scheduler/jobs
  method: POST
  name: list_jobs
  service: scheduler
- description: Get details of a specific scheduled job
  endpoint: /scheduler/jobs/get
  method: POST
  name: get_job
  service: scheduler
- description: Create a new scheduled job with a cron expression and action
  endpoint: /scheduler/jobs/create
  method: POST
  name: create_job
  service: scheduler
- description: Update an existing scheduled job
  endpoint: /scheduler/jobs/update
  method: POST
  name: update_job
  service: scheduler
- description: Delete a scheduled job by ID
  endpoint: /scheduler/jobs/delete
  method: POST
  name: delete_job
  service: scheduler
