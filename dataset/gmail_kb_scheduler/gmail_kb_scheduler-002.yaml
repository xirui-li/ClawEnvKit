  kb:
    articles:
    - author: engineering-ops
      category: incidents
      content: 'As of November 13, 2024, we identified an issue with our payment gateway
        integration affecting a subset of enterprise accounts. The root cause is a
        misconfigured connection pool timeout introduced in release v4.7.2. Engineering
        is working on a hotfix (ETA: November 15). Mitigation: affected accounts can
        switch to the legacy gateway endpoint as a temporary workaround. Contact support
        with your Account ID to be whitelisted.

        '
      id: kb-101
      last_updated: '2024-11-13T22:00:00Z'
      title: Payment Gateway Timeout — Known Issue and Mitigation Steps
    - author: api-team
      category: troubleshooting
      content: 'If you are receiving 429 rate limit errors despite being within contracted
        limits, this may be caused by a known rate limiter miscalculation bug introduced
        in v4.7.1 affecting accounts with sub-accounts or org hierarchies. A patch
        was deployed on November 10; if issues persist, open a ticket with your Account
        ID for manual quota recalculation. Check your request headers for X-RateLimit-Remaining
        to diagnose.

        '
      id: kb-102
      last_updated: '2024-11-10T14:30:00Z'
      title: API Rate Limiting — Troubleshooting 429 Errors
    - author: platform-team
      category: incidents
      content: 'A webhook delivery reliability incident is currently active (opened
        November 12, 2024). Events are being dropped by our message queue under high
        load conditions. The affected queue is being scaled and a fix is expected
        by November 16. Customers experiencing >10% drop rates should contact support
        to enable a backup delivery channel. Incident tracking ID: INC-4421.

        '
      id: kb-103
      last_updated: '2024-11-13T10:00:00Z'
      title: Webhook Delivery Reliability — November 2024 Incident
    - author: infra-team
      category: incidents
      content: 'On November 14, 2024, a database bottleneck was detected in the job
        scheduler infrastructure causing export and processing jobs to remain in queued
