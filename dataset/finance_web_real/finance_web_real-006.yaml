category: finance
claw_eval_id: T62_finance_pltr_cagr
difficulty: medium
fixtures:
  finance:
    transactions:
    - amount: 899.0
      category: Software & Subscriptions
      date: '2024-10-03'
      description: Monthly SaaS license renewal
      id: txn-1001
      status: approved
      vendor: Salesforce
    - amount: 450.0
      category: Software & Subscriptions
      date: '2024-10-08'
      description: Cloud storage expansion
      id: txn-1002
      status: approved
      vendor: AWS
    - amount: 320.0
      category: Software & Subscriptions
      date: '2024-10-11'
      description: Team collaboration tool
      id: txn-1003
      status: approved
      vendor: Notion
    - amount: 1200.0
      category: Meals & Entertainment
      date: '2024-10-15'
      description: Office catering for all-hands
      id: txn-1004
      status: approved
      vendor: Panera Bread
    - amount: 780.0
      category: Software & Subscriptions
      date: '2024-10-19'
      description: Security scanning platform
      id: txn-1005
      status: approved
      vendor: Snyk
    - amount: 660.0
      category: Software & Subscriptions
      date: '2024-10-24'
      description: Design tool annual seat
      id: txn-1006
