tools:
- description: Retrieve full details of a specific transaction by its ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: List all transactions within a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Search the web for information about vendors, companies, or topics
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a specific web page URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Submit a formal expense report with transaction details and total amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
