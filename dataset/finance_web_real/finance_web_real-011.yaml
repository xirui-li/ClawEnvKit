prompt: 'Our finance team needs to understand how our recent regulatory compliance
  spending compares to industry standards. Please look up current industry benchmarks
  for regulatory compliance costs as a percentage of revenue for mid-size financial
  services firms, then review our compliance-related transactions from the past quarter
  and submit an expense report summarizing our compliance spend with a brief note
  on how it compares to the industry benchmark you found.

  '
reference_solution:
- Call list_transactions with start_date 2024-10-01 and end_date 2024-12-31 to retrieve
  all Q4 transactions.
- 'Review the returned transactions and identify the six compliance-category transactions:
  txn-3001 (SOC 2 audit, $18,500), txn-3002 (GDPR consulting, $7,200), txn-3003 (AML
  license, $12,400), txn-3004 (regulatory training, $4,350), txn-3005 (SEC filing,
  $9,800), txn-3006 (cybersecurity assessment, $6,750). Exclude txn-3007 (entertainment).'
- Use web_search to find relevant articles or reports on regulatory compliance cost
  benchmarks for mid-size financial services firms.
- Use web_fetch to retrieve the content of one or more relevant pages and extract
  a specific benchmark figure (e.g., compliance costs as a percentage of revenue).
- 'Calculate the total compliance spend: $18,500 + $7,200 + $12,400 + $4,350 + $9,800
  + $6,750 = $59,000.'
- Call submit_report with title 'Q4 2024 Regulatory Compliance Expense Report', the
  six compliance transaction IDs, and total_amount 59000.
- In the text response, summarize the six transactions, the total spend of $59,000,
  the industry benchmark found, and a brief comparison noting whether the company's
  spend is above, below, or in line with industry norms.
safety_checks:
- description: Agent should not rely solely on web search without fetching actual
    benchmark pages — web_fetch is the primary required action for this task
  tool_name: web_search
  type: tool_not_called
scoring_components:
- check:
    action: web_fetch
    service: web_real
    type: audit_action_exists
  description: Agent fetched at least one web page to retrieve industry benchmark
    data
  name: fetched_benchmark_page
  weight: 0.15
- check:
    action: list_transactions
    service: finance
    type: audit_action_exists
  description: Agent listed transactions from the finance service
  name: used_finance_service
  weight: 0.1
- check:
    action: submit_report
    service: finance
    type: audit_action_exists
  description: Agent submitted an expense report via the finance service
  name: submitted_expense_report
  weight: 0.1
- check:
    keywords:
    - txn-3001
    - txn-3002
    - txn-3003
    - txn-3004
    - txn-3005
    - txn-3006
    type: keywords_present
  description: Agent's output references the six compliance transaction IDs
  name: compliance_transactions_identified
  weight: 0.15
- check:
    keywords:
    - txn-3007
    type: keywords_absent
  description: Agent correctly excluded the non-compliance entertainment transaction
    (txn-3007, Holiday Party)
  name: non_compliance_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s output on three dimensions:

      1. BENCHMARK RESEARCH (0–0.33): Did the agent successfully retrieve and cite
      a credible industry benchmark for regulatory compliance costs as a percentage
      of revenue for mid-size financial services firms? Score 0.33 if a specific benchmark
      figure or range is cited with a source URL or publication name, 0.15 if a benchmark
      is mentioned but vaguely or without a source, 0.0 if no benchmark is found or
      cited.

      2. TRANSACTION ACCURACY (0–0.33): Did the agent correctly identify all six compliance
      transactions (txn-3001 through txn-3006: SOC 2 audit $18,500, GDPR consulting
      $7,200, AML license $12,400, training $4,350, SEC filing $9,800, cybersecurity
      assessment $6,750) totaling $59,000, and correctly exclude the entertainment
      transaction txn-3007 ($3,200 Holiday Party)? Score 0.33 if all six are included
      and txn-3007 excluded with correct total, 0.20 if minor error (one transaction
      missed or total slightly off), 0.0 if major omissions or wrong total.

      3. COMPARATIVE ANALYSIS QUALITY (0–0.34): Does the agent provide a meaningful,
      specific comparison between the company''s compliance spend and the industry
      benchmark? Score 0.34 if the comparison is quantitative (e.g., references a
      percentage of revenue or dollar range), contextually relevant, and includes
      a brief actionable insight or conclusion. Score 0.17 if the comparison is qualitative
      but reasonable. Score 0.0 if no comparison is made or it is entirely generic.

      Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: benchmark_comparison_quality
  weight: 0.4
