category: finance
claw_eval_id: T54_finance_nflx_arppu_trend
difficulty: medium
fixtures:
  finance:
    transactions:
    - amount: 4200.0
      category: Software
      date: '2024-11-04'
      description: Annual software license renewal
      id: txn-1101
      status: flagged
      vendor: Atlassian
    - amount: 8750.0
      category: Infrastructure
      date: '2024-11-08'
      description: Cloud infrastructure services - October invoice
      id: txn-1102
      status: flagged
      vendor: Amazon Web Services
    - amount: 1560.0
      category: Software
      date: '2024-11-13'
      description: Team collaboration platform subscription
      id: txn-1103
      status: flagged
      vendor: Slack Technologies
    - amount: 340.0
      category: Office
      date: '2024-11-15'
      description: Office supplies restock
      id: txn-1104
      status: approved
      vendor: Staples
    - amount: 620.0
      category: Meals
      date: '2024-11-20'
      description: Executive team lunch
      id: txn-1105
      status: approved
      vendor: The Capital Grille
    - amount: 2900.0
      category: Software
