category: finance
claw_eval_id: T69_micron_capex_analysis
difficulty: medium
fixtures:
  finance:
    transactions:
    - amount: 1240.0
      category: Technology
      date: '2024-11-05'
      description: Cloud hosting services - AWS
      id: txn-001
      status: approved
