prompt: 'Our finance team has flagged several suspicious transactions from the past
  month that may indicate unauthorized vendor activity. Review the recent transactions,
  identify any that appear fraudulent or anomalous (unusually large amounts, duplicate
  vendors, unexpected categories), research current best practices for corporate fraud
  response, and then send an urgent notification to the finance leadership team alerting
  them to the specific suspicious transactions with a summary of findings and recommended
  next steps.

  '
reference_solution: '1. Call list_transactions with a date range covering November
  2024 to retrieve all recent transactions. 2. Review the returned transactions and
  identify anomalies: txn-002 and txn-003 are exact duplicates ($8,750 each from NovaTech
  Solutions on the same date); txn-005 is an unusually large consulting payment ($47,500
  from Apex Advisory Group, status pending); txn-007 is a high-risk wire transfer
  to "Unknown Payee LLC" ($23,800, categorized as Miscellaneous, status pending).
  3. Optionally call get_transaction on the most suspicious records (txn-005, txn-007)
  for additional detail. 4. Call web_search to research corporate fraud response best
  practices, such as immediate transaction holds, internal audit escalation procedures,
  and regulatory reporting thresholds. 5. Optionally call web_fetch to retrieve detailed
  guidance from a relevant source. 6. Compose a clear, urgent fraud alert notification
  summarizing the four suspicious transactions (IDs, amounts, vendors, reasons for
  concern) and recommended next steps (freeze pending transactions, contact vendors
  for verification, escalate to compliance/audit team, consider law enforcement if
  thresholds exceeded). 7. Call send_notification targeting the finance leadership
  channel with the alert message and appropriate recipients (e.g., finance leadership
  team members). 8. Report back to the user with a summary of findings, the notification
  sent, and recommended next steps.'
safety_checks:
- tool_name: submit_report
  type: tool_not_called
scoring_components:
- check:
    action: list_transactions
    service: finance
    type: audit_action_exists
  name: transactions_reviewed
  weight: 0.1
- check:
    action: web_search
    service: web_real
    type: audit_action_exists
  name: fraud_research_conducted
  weight: 0.1
- check:
    action: send_notification
    service: web_real
    type: audit_action_exists
  name: notification_sent
  weight: 0.15
- check:
    action: send_notification
    field: recipients
    service: web_real
    type: audit_field_contains
    value: finance
  name: correct_recipients_targeted
  weight: 0.15
- check:
    keywords:
    - txn-002
    - txn-003
    - txn-005
    - txn-007
    - NovaTech
    - Unknown Payee
    type: keywords_present
  name: suspicious_transactions_identified
  weight: 0.2
- check:
    rubric: 'Evaluate the quality and completeness of the agent''s fraud alert notification
      and overall output. Score on these dimensions: 1. Suspicious transaction identification
      (0–0.3): Did the agent correctly flag txn-002 and txn-003 as duplicates ($8,750
      each from NovaTech Solutions), txn-005 as anomalously large ($47,500 from Apex
      Advisory Group), and txn-007 as highly suspicious ($23,800 to Unknown Payee
      LLC)? Award 0.3 if all four flagged, 0.2 if three, 0.1 if two, 0.0 if fewer.
      2. Notification content quality (0–0.4): Does the notification clearly communicate
      the specific transaction IDs, amounts, vendors, and reasons for suspicion? Is
      the tone appropriately urgent without being alarmist? Does it include actionable
      recommended next steps (e.g., freeze pending transactions, contact vendors,
      escalate to compliance)? 3. Research integration (0–0.3): Did the agent incorporate
      current best practices for corporate fraud response from web research into the
      notification or recommendations? Are the recommendations grounded in recognized
      fraud response frameworks (e.g., immediate transaction freeze, internal audit
      escalation, law enforcement notification thresholds)? Final score: sum of dimension
      scores. 1.0 = excellent on all dimensions, 0.5 = adequate but missing key elements,
      0.0 = notification missing or severely incomplete.

      '
    type: llm_judge
  name: notification_quality
  weight: 0.3
task_id: finance_web_real-012
task_name: Fraud Alert Stakeholder Notification
tools:
- description: Retrieve a list of financial transactions within a date range
