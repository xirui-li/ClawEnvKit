- description: Get detailed information about a specific transaction by ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit a formal expense report with selected transactions
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: Search the web for information on a given topic
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a specific web page by URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification message to specified recipients via a channel
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web_real
