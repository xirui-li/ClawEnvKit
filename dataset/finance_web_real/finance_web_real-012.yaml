      vendor: Panera Bread Catering
    - amount: 875.0
      category: Professional Services
      date: '2024-11-19'
      description: Legal consultation - contract review
      id: txn-005
      status: approved
      vendor: Morrison & Foerster LLP
    - amount: 2100.0
      category: Technology
      date: '2024-11-22'
