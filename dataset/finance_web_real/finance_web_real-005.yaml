  name: get_transaction
  service: finance
- description: Submit a compiled expense report with title, transactions, and total
    amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: Search the web for information
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a specific web page by URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification to a channel or recipients
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web_real
