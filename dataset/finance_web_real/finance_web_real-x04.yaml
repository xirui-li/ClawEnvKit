  weight: 0.1
- check:
    action: submit_report
    field: title
    service: finance
    type: audit_field_equals
    value: Q4 Travel Expense Review
  name: correct_report_title
  weight: 0.1
- check:
    keywords:
    - txn-001
    - txn-002
    - txn-004
    - txn-005
    - txn-006
    - txn-007
    type: keywords_present
  name: travel_transactions_identified
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s compliance analysis and expense report summary
      on three dimensions:

      1. IRS Rate Research (0–0.4): Did the agent successfully look up current IRS
      standard mileage rate (should be around $0.67/mile for 2024) and/or GSA per
      diem rates? Did it apply these to flag specific transactions? For txn-004 (320
      miles × current IRS rate should equal roughly $214.40, but the submitted amount
      is $198.40 — agent should note whether this is under or over the IRS rate)?
      For txn-006 ($1,245 for 3 nights in NYC = $415/night — agent should compare
      to GSA NYC per diem lodging rate which is typically $250–$350/night and flag
      this as potentially high)?

      2. Transaction Coverage and Accuracy (0–0.3): Does the agent correctly identify
      all 7 transactions, distinguish travel-category transactions (txn-001, txn-002,
      txn-004, txn-005, txn-006, txn-007) from the meals transaction (txn-003), and
      calculate a reasonable total? The travel-only total should be approximately
      $3,019.20. Does the agent note that txn-003 is meals/entertainment rather than
      travel?

      3. Compliance Note Quality (0–0.3): Does the agent provide a clear, actionable
      compliance note? Does it specifically call out txn-006 (NYC hotel at $415/night)
      as potentially exceeding per diem limits? Does it address txn-004 mileage reimbursement
      relative to IRS rates? Is the note professional and useful for a finance reviewer?

      Score 1.0 if all three dimensions are well-addressed with specific transaction
      references and real rate data. Score 0.7 if two dimensions are well-addressed.
      Score 0.4 if only one dimension is addressed or analysis is vague. Score 0.0
      if no meaningful compliance analysis is provided.

      '
    type: llm_judge
  name: compliance_analysis_quality
  weight: 0.35
