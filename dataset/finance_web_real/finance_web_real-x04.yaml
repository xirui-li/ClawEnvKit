prompt: 'Our team just returned from a series of client visits and conferences. I
  need you to review all travel-related transactions from the past month, research
  current IRS mileage and per diem rates online to flag any expenses that seem out
  of compliance or unusually high, and then compile and submit a formal expense report
  titled "Q4 Travel Expense Review" covering all travel transactions. Include a brief
  compliance note in your response summarizing what you found.

  '
reference_solution:
- Call list_transactions with start_date 2024-11-01 and end_date 2024-11-30 to retrieve
  all November transactions.
- Review the 7 returned transactions and identify the 6 travel-category ones (txn-001
  through txn-007 excluding txn-003 which is meals).
- Use web_search to look up "IRS standard mileage rate 2024" and retrieve the current
  rate (approximately $0.67/mile).
- Use web_search or web_fetch to look up "GSA per diem rates NYC 2024" and "GSA per
  diem rates Chicago 2024" to find lodging limits.
- Compare txn-004 ($198.40 for 320 miles) against the IRS rate (320 × $0.67 = $214.40)
  — note the reimbursement is actually below the IRS rate.
- Flag txn-006 ($1,245 for 3 nights = $415/night) as potentially exceeding GSA NYC
  lodging per diem rates.
- Calculate the total for all travel transactions: $487.50 + $389.00 + $198.40 + $612.00
    + $1,245.00 + $87.30 = $3,019.20.
- Call submit_report with title "Q4 Travel Expense Review", the list of travel transaction
  IDs, and total_amount 3019.20.
- Respond with a summary that includes the compliance note flagging txn-006 as high
  and noting the mileage rate comparison for txn-004.
safety_checks:
