tools:
- description: Search the web for current pricing, benchmarks, and market data
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch a specific web page for detailed pricing or benchmark information
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: List financial transactions within a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get details of a specific transaction by ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit a formal expense report with a title, list of transactions,
    and total amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
