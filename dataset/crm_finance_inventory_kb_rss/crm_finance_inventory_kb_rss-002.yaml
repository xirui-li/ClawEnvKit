  name: workflow_sequence
  weight: 0.05
- check:
    rubric: 'Evaluate the quality of the agent''s customer health check analysis across
      three dimensions:


      1. Completeness (40%): Did the agent retrieve and reference accurate details
      for all three customers — Nexus Dynamics (platinum, Technology, active, $485k),
      Bright Horizon Medical (gold, Healthcare, at-risk, $312k), and Coastal Freight
      Partners (gold, Logistics, active, $278.5k)? A complete analysis names all three
      and includes their tier, status, and revenue.


      2. Risk Identification (30%): Did the agent specifically flag Bright Horizon
      Medical as "at-risk" and note that its last contact was over two months ago
      (2024-09-02)? Did it recommend escalation or a recovery plan consistent with
      at-risk account procedures?


      3. Actionability (30%): Did the agent provide distinct, industry-relevant observations
      for each customer rather than generic notes? For example, mentioning Nexus Dynamics''
      platinum SLA obligations, Bright Horizon''s compliance sensitivity, or Coastal
      Freight''s SLA/uptime needs.


      Score 1.0 if all three dimensions are fully addressed, 0.7 if two dimensions
      are well covered, 0.4 if only one dimension is adequately addressed, 0.0 if
      the analysis is superficial or missing.

      '
    type: llm_judge
  name: customer_health_analysis_quality
  weight: 0.2
- check:
    rubric: 'Evaluate the quality of the knowledge base article update performed by
      the agent:


      1. Relevance (50%): Did the agent update an article that is genuinely relevant
      to one or more of the three target customers? Acceptable choices include kb-101
      (Technology), kb-102 (Healthcare), kb-103 (Logistics), kb-104 (At-Risk Accounts),
      or kb-105 (Platinum Tier). Updating an unrelated article scores 0.0 on this
      dimension.


      2. Content Quality (50%): Did the updated content meaningfully reference the
      current status of the relevant customer accounts (e.g., noting Bright Horizon
      Medical''s at-risk status, Nexus Dynamics'' active platinum standing, or Coastal
      Freight''s recent engagement)? The update should add substantive information,
      not just a placeholder or timestamp.


      Score 1.0 if both dimensions are fully satisfied, 0.6 if the article is relevant
      but the update content is thin, 0.2 if the article is irrelevant but content
      is otherwise reasonable, 0.0 if no meaningful update was made.

      '
    type: llm_judge
  name: kb_update_quality
  weight: 0.1
