  method: POST
  name: list_customers
  service: crm
- description: Get full profile details for a specific customer by customer_id
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer_ids, and summary
    text
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
- description: Search the knowledge base for articles by query, category, or max_results
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Get the full content of a knowledge base article by article_id
  endpoint: /kb/articles/get
  method: POST
  name: get_article
  service: kb
- description: List available RSS feeds, optionally filtered by category
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: List RSS articles filtered by source, category, or max_results
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
