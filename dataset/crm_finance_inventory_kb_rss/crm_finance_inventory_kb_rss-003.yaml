prompt: 'Our sales team needs a churn risk report for the upcoming quarterly review.
  Identify all customers who are at risk of churning (status = "at_risk"), look up
  their individual profiles to confirm revenue and last contact details, then check
  our finance transactions from the past quarter to see if any recent payments are
  associated with these customers. Finally, export a CRM report titled "Q3 Churn Risk
  Summary" that includes all at-risk customer IDs and a summary paragraph describing
  the risk landscape and recommended next steps.

  '
reference_solution:
- Call list_customers with status="at_risk" to retrieve the filtered list, identifying
  cust-101 (Meridian Logistics), cust-102 (Apex Retail Group), and cust-104 (Brightwave
  Media).
- Call get_customer for each of the three at-risk customer IDs to confirm revenue
  figures and last_contact dates.
- Call list_transactions with a date range covering Q2–Q3 2024 (e.g., start_date="2024-05-01",
  end_date="2024-08-31") to retrieve recent financial activity.
- Review transactions to identify relevant entries for at-risk customers — notably
  txn-3002 (Apex Retail partial payment, $8,500) and txn-3004 (Brightwave Media late
  payment, $5,200) — as signals of financial stress.
- Compose a summary paragraph describing the three at-risk customers, their revenue
  exposure ($84,000 + $47,500 + $31,200 = $162,700 total), financial warning signs
  from transactions, and recommended next steps (prioritized outreach, payment plans,
  executive escalation).
- Call export_report with title="Q3 Churn Risk Summary", customer_ids=["cust-101","cust-102","cust-104"],
  and the composed summary paragraph.
- Present the exported report details and key findings in the text response.
