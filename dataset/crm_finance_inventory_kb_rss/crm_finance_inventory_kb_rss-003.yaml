- check:
    rubric: "Evaluate the agent's final output on three dimensions:\n1. ACCURACY (0–0.4):\
      \ Does the output correctly identify all three at-risk customers\n   (cust-101\
      \ Meridian Logistics, cust-102 Apex Retail Group, cust-104 Brightwave Media)\n\
      \   and exclude active customers (Solaris Energy, Ironclad Manufacturing) and\
      \ the churned\n   customer (Cascade Pharma)? Score 0.4 if all three at-risk\
      \ customers are named and\n   non-at-risk customers are not misclassified, 0.2\
      \ if two are named, 0.0 if fewer than two.\n\n2. FINANCIAL INTEGRATION (0–0.3):\
      \ Does the output reference relevant finance transaction\n   findings, such\
      \ as Apex Retail Group's partial payment (txn-3002, $8,500) or Brightwave\n\
      \   Media's late payment (txn-3004, $5,200) as indicators of financial stress?\
      \ Score 0.3\n   if at least two transaction insights are woven into the analysis,\
      \ 0.15 if one, 0.0 if none.\n\n3. ACTIONABILITY OF SUMMARY (0–0.3): Does the\
      \ exported report summary (or the agent's\n   description of it) include concrete\
      \ recommended next steps, such as scheduling outreach\n   to Meridian Logistics\
      \ (last contact 2024-07-15), escalating Brightwave Media (last\n   contact 2024-06-10,\
      \ lowest revenue), or prioritizing Apex Retail Group for a payment\n   plan?\
      \ Score 0.3 if recommendations are specific and tied to customer data, 0.15\
      \ if\n   generic recommendations are given, 0.0 if no recommendations are present.\n\
      \nTotal score = sum of three dimension scores (max 1.0).\n"
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.25
