tools:
- description: List CRM customers with optional filters for status, tier, and industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information about a specific customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and summary
    text
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
- description: List available RSS feeds, optionally filtered by category
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: List RSS articles filtered by source, category, or max results
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: Get full details of a specific RSS article by ID
  endpoint: /rss/articles/get
  method: POST
  name: get_rss_article
  service: rss
