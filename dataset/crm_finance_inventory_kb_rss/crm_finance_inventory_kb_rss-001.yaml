prompt: 'Our sales leadership team is preparing for the quarterly business review
  and needs a comprehensive health briefing on our enterprise-tier customers. Please
  identify all enterprise customers, look up any relevant knowledge base articles
  about enterprise account management best practices, check if there are any recent
  industry news feeds relevant to their sectors, and then export a CRM report summarizing
  the enterprise customer landscape with key insights. Present your findings clearly
  so leadership can walk into the meeting prepared.

  '
reference_solution:
- Call list_customers with tier=enterprise to retrieve all enterprise-tier customers
  (Meridian Financial Group, Apex Healthcare Systems, Brightstone Retail Co., Vantage
  Logistics Ltd., Cascade Manufacturing Inc.).
- Optionally call get_customer for individual enterprise customers to retrieve full
  details including revenue and last_contact dates.
- Call search_articles with query="enterprise account management" and category="account-management"
  to find relevant KB articles (kb-101, kb-102, kb-103).
- Call get_article for kb-101 (Enterprise Account Management Best Practices) and kb-102
  (Churn Prevention Playbook) to retrieve actionable guidance for the briefing.
- Call list_feeds to discover available RSS feed categories (healthcare, finance,
  retail).
- Call list_articles for healthcare, finance, and retail categories to retrieve recent
  industry news relevant to enterprise customers' sectors (rss-201, rss-202, rss-203).
- Synthesize findings: identify four active/at-risk enterprise customers, flag Brightstone
    Retail Co. as at-risk and connect to retail sector headwinds, highlight growth
    opportunities for Apex Healthcare and Meridian Financial based on industry news,
    and note Cascade Manufacturing as churned.
- Call export_report with a title such as "Q4 Enterprise Customer Health Briefing",
  include customer IDs [cust-001, cust-002, cust-003, cust-004, cust-006], and a summary
  incorporating KB best practices and industry news insights.
- Present a structured briefing to leadership covering customer health status, industry
  context, risk flags, and recommended actions.
