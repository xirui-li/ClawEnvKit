  service: crm
- description: Search knowledge base articles by query, category, or max_results
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Get the full content of a knowledge base article by article_id
  endpoint: /kb/articles/get
  method: POST
  name: get_article
  service: kb
- description: List available RSS feeds by category
  endpoint: /rss/feeds
  method: POST
