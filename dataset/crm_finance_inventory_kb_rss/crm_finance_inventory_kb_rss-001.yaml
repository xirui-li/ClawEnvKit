prompt: 'Our sales director needs an urgent briefing on enterprise customers who haven''t
  been contacted in over 90 days and have high revenue potential. Identify these at-risk
  accounts from our CRM, check if there are any relevant knowledge base articles about
  re-engagement strategies, and look up any recent industry news that might be relevant
  to these accounts. Finally, export a CRM report summarizing the at-risk customers
  so the sales team can act on it.

  '
reference_solution: "1. Call list_customers with tier=enterprise and status=active\
  \ to retrieve all enterprise customers.\n2. Review the last_contact dates for each\
  \ customer to identify those not contacted in 90+ days.\n   At-risk accounts: Harborview\
  \ Healthcare (2024-07-30), Pinebrook Energy Corp (2024-08-10),\n   Apex Manufacturing\
  \ Ltd (2024-08-28), Skybridge Logistics (2024-09-05), and potentially\n   Meridian\
  \ Financial Group (2024-09-15) depending on the reference date.\n3. Optionally call\
  \ get_customer for the highest-priority at-risk accounts to retrieve full details.\n\
  4. Call search_articles with query=\"re-engagement enterprise accounts\" and category=\"\
  sales\"\n   to find relevant KB articles.\n5. Retrieve the content of kb-101 (Re-Engagement\
  \ Playbook) and kb-103 (Q4 Industry Outlook)\n   using get_article to extract specific\
  \ strategies and talking points.\n6. Call list_feeds or list_articles to find recent\
  \ industry news relevant to the at-risk accounts'\n   industries (finance, manufacturing,\
  \ healthcare, logistics, energy).\n7. Review the RSS articles (rss-201 for finance/Meridian,\
  \ rss-202 for manufacturing/Apex,\n   rss-203 for healthcare/Harborview) and connect\
  \ them to the relevant at-risk customers.\n8. Call export_report with a title such\
  \ as \"At-Risk Enterprise Accounts — Q4 2024\",\n   including the customer IDs of\
  \ the at-risk accounts and a concise summary of findings.\n9. Present a structured\
  \ executive briefing that includes: the at-risk account list with revenue\n   and\
  \ days-since-contact, industry-specific talking points from the KB and RSS, recommended\n\
  \   re-engagement actions per account, and confirmation that the CRM export was\
  \ submitted."
