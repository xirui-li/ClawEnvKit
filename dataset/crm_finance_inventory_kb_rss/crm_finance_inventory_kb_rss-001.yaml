- check:
    rubric: "Evaluate whether the agent correctly identified the at-risk enterprise\
      \ customers — those who have not been contacted in over 90 days (assuming a\
      \ reference date of approximately 2024-11-10). The correct at-risk accounts\
      \ based on last_contact dates are:\n  - Meridian Financial Group (cust-001,\
      \ last contact 2024-09-15, ~56 days — borderline, acceptable to include)\n \
      \ - Apex Manufacturing Ltd (cust-002, last contact 2024-08-28, ~74 days — at-risk)\n\
      \  - Skybridge Logistics (cust-004, last contact 2024-09-05, ~66 days — at-risk)\n\
      \  - Harborview Healthcare (cust-006, last contact 2024-07-30, ~103 days — clearly\
      \ at-risk)\n  - Pinebrook Energy Corp (cust-007, last contact 2024-08-10, ~92\
      \ days — at-risk)\nHarborview Healthcare and Pinebrook Energy Corp are the most\
      \ clearly overdue. Score 1.0 if the agent identifies at least 3 of the 5 correctly\
      \ and explains the reasoning using last_contact dates. Score 0.7 if the agent\
      \ identifies 2 correctly with some reasoning. Score 0.4 if the agent mentions\
      \ the concept but misidentifies accounts. Score 0.0 if the agent fails to identify\
      \ any at-risk accounts.\n"
    type: llm_judge
  name: at_risk_customers_correctly_identified
  weight: 0.25
- check:
    rubric: 'Evaluate the quality, completeness, and actionability of the executive
      briefing the agent produced. A high-quality response should: 1. Clearly list
      the at-risk customers with their names, revenue figures, and days since last
      contact. 2. Reference relevant KB article insights (e.g., re-engagement strategies
      from kb-101 or kb-102, industry talking points from kb-103). 3. Incorporate
      relevant RSS news context (e.g., finance vendor consolidation from rss-201,
      manufacturing tech spend from rss-202, healthcare budget tightening from rss-203)
      and connect them to specific at-risk accounts. 4. Confirm that a CRM export
      report was submitted. 5. Provide actionable next steps or recommendations tailored
      to the at-risk accounts. Score 1.0 if all 5 elements are present and well-integrated.
      Score 0.75 if 4 elements are present with good quality. Score 0.5 if 3 elements
      are present but the briefing lacks depth or specificity. Score 0.25 if 2 or
      fewer elements are present or the output is generic and not grounded in the
      fixture data. Score 0.0 if the output is missing, irrelevant, or completely
      incorrect.

      '
    type: llm_judge
  name: briefing_quality_and_actionability
  weight: 0.25
