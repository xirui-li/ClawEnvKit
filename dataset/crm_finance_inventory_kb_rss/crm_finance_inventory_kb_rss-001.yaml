scoring_components:
- check:
    action: list_customers
    service: crm
    type: audit_action_exists
  name: enterprise_customers_listed
  weight: 0.15
- check:
    action: list_articles
    service: rss
    type: audit_action_exists
  name: rss_market_context_retrieved
  weight: 0.1
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: crm_report_exported
  weight: 0.15
- check:
    keywords:
    - Axiom Logistics
    - Vantage Healthcare Partners
    - Meridian Financial Group
    - Crestline Manufacturing
    - Apex Cybersecurity
    type: keywords_present
  name: key_customers_identified_in_output
  weight: 0.2
- check:
    keywords:
    - at_risk
    - churned
    type: keywords_present
  name: at_risk_and_churned_flagged
  weight: 0.1
- check:
    keywords:
    - Solaris Retail Group
    type: keywords_absent
  name: standard_tier_excluded_from_report
  weight: 0.05
- check:
    rubric: "Evaluate the agent's final digest and exported report on the following\
      \ dimensions:\n1. COVERAGE (0–0.3): Does the output include all four active/at-risk/churned\
      \ enterprise customers\n   — Axiom Logistics (cust-001, $4.2M, logistics, active),\
      \ Vantage Healthcare Partners (cust-002,\n   $7.8M, healthcare, active), Meridian\
      \ Financial Group (cust-003, $5.1M, finance, at_risk), and\n   Crestline Manufacturing\
      \ (cust-004, $3.6M, manufacturing, active), plus Apex Cybersecurity Inc\n  \
      \ (cust-006, $2.9M, technology, churned)? Deduct if any enterprise customer\
      \ is omitted.\n\n2. MARKET CONTEXT (0–0.3): Does the output incorporate relevant\
      \ RSS market context for each\n   customer's industry? Specifically: supply\
      \ chain disruptions for Axiom Logistics, healthcare M&A\n   for Vantage Healthcare,\
      \ regulatory pressure for Meridian Financial, and automation trends for\n  \
      \ Crestline Manufacturing? Award full marks if at least 3 of 4 are clearly linked.\n\
      \n3. RISK HIGHLIGHTING (0–0.2): Does the output clearly flag Meridian Financial\
      \ Group as at_risk\n   and Apex Cybersecurity as churned, with commentary on\
      \ why this warrants leadership attention\n   (e.g., last contact was 2024-09-12\
      \ and 2024-07-05 respectively)?\n\n4. EXPORT COMPLETENESS (0–0.2): Did the agent\
      \ produce a coherent summary suitable for a CRM\n   export, including a meaningful\
      \ report title and summary text that would be useful for sales\n   leadership?\n\
      \nScore 1.0 for excellent coverage of all dimensions, 0.75 for good with minor\
      \ gaps, 0.5 for partial (major customer or context missing), 0.25 for minimal\
      \ effort, 0.0 for missing output.\n"
    type: llm_judge
  name: digest_quality_and_completeness
  weight: 0.25
