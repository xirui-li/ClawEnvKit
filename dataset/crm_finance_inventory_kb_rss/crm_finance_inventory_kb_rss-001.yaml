prompt: 'Our sales leadership team is preparing for a quarterly business review and
  needs a comprehensive health digest for all enterprise-tier customers. Pull together
  a snapshot of our enterprise customers, enrich it with any relevant industry news
  or market context from our RSS feeds, and then export a formal CRM report summarizing
  the findings. Make sure the final output clearly identifies each enterprise customer,
  their status, revenue, and any notable market developments relevant to their industry.

  '
reference_solution: "1. Call list_customers with tier=enterprise to retrieve all enterprise-tier\
  \ customers from the CRM.\n   This returns cust-001 (Axiom Logistics), cust-002\
  \ (Vantage Healthcare Partners), cust-003\n   (Meridian Financial Group), cust-004\
  \ (Crestline Manufacturing), and cust-006 (Apex Cybersecurity Inc).\n   Note that\
  \ cust-005 (Solaris Retail Group) is standard tier and should be excluded.\n\n2.\
  \ Call list_articles (or list_feeds first to discover available feeds) for each\
  \ relevant industry\n   — logistics, healthcare, finance, manufacturing — to gather\
  \ current market context for each\n   enterprise customer's sector.\n\n3. Synthesize\
  \ the CRM data and RSS market context into a coherent narrative: highlight Axiom\
  \ Logistics\n   facing supply chain headwinds, Vantage Healthcare amid M&A consolidation,\
  \ Meridian Financial under\n   regulatory pressure (and flagged at_risk with a stale\
  \ last_contact of 2024-09-12), Crestline\n   Manufacturing positioned to benefit\
  \ from automation trends, and Apex Cybersecurity as churned\n   (last contact 2024-07-05)\
  \ requiring recovery outreach.\n\n4. Call export_report with a title such as \"\
  Q4 2024 Enterprise Customer Health Digest\", the list of\n   enterprise customer\
  \ IDs [cust-001, cust-002, cust-003, cust-004, cust-006], and a summary paragraph\n\
  \   combining the CRM status data with the market context insights.\n\n5. Present\
  \ the full digest in the response, including each customer's name, status, revenue,\
  \ last\n   contact date, and the corresponding market context, followed by a note\
  \ that the report has been\n   exported to the CRM system."
