- check:
    rubric: 'Evaluate the quality and completeness of the enterprise customer health
      briefing provided by the agent. Score on the following dimensions:

      1. CUSTOMER COVERAGE (0–0.3): Does the output correctly identify all four enterprise-tier
      customers — Meridian Financial Group (cust-001, finance, $480K, active), Apex
      Healthcare Systems (cust-002, healthcare, $620K, active), Brightstone Retail
      Co. (cust-003, retail, $310K, at_risk), and Vantage Logistics Ltd. (cust-004,
      logistics, $275K, active)? Does it correctly exclude standard-tier customers
      (Orion Tech Solutions, Summit Energy Partners) and note the churned status of
      Cascade Manufacturing Inc.?

      2. RISK INSIGHT (0–0.25): Does the output specifically call out Brightstone
      Retail Co. as at-risk and connect this to the retail sector margin pressure
      news (rss-202: "Retail Sector Faces Margin Pressure Amid Consumer Slowdown")?
      Does it reference the churn prevention playbook or at-risk escalation guidance
      from the KB?

      3. INDUSTRY NEWS INTEGRATION (0–0.25): Does the output incorporate relevant
      RSS news for the enterprise customers'' industries — healthcare spending growth
      (rss-201) as a positive signal for Apex Healthcare, financial compliance spending
      (rss-203) as an opportunity for Meridian Financial, and retail headwinds (rss-202)
      as a risk factor for Brightstone?

      4. ACTIONABILITY FOR LEADERSHIP (0–0.2): Is the briefing structured and actionable
      for a QBR audience? Does it reference best practices from the KB (e.g., monthly
      touchpoints for accounts over $300K ARR, executive check-ins, QBR preparation
      guidance from kb-103)?

      Scoring: 0.9–1.0 = all four dimensions well-covered with specific data; 0.7–0.89
      = three dimensions covered; 0.5–0.69 = two dimensions covered or significant
      gaps; below 0.5 = missing key enterprise customers or no meaningful synthesis.

      '
    type: llm_judge
  name: briefing_quality
  weight: 0.3
