  kb:
    articles:
    - author: Sarah Nguyen
      category: sales
      content: 'When enterprise accounts go dark for 60+ days, initiate a structured
        re-engagement campaign. Start with a personalized executive outreach email
        referencing the account''s specific usage history. Follow up with a value-add
        touchpoint such as an industry report or product roadmap briefing. Escalate
        to an in-person executive business review if no response after 2 attempts.
        Key metrics to reference: contract renewal date, upsell opportunities, and
        recent support tickets.'
      id: kb-101
      last_updated: '2024-10-01'
      title: Re-Engagement Playbook for Dormant Enterprise Accounts
    - author: Marcus Reid
      category: sales
      content: 'Use a composite health score combining: product engagement (40%),
        support ticket frequency (20%), payment timeliness (20%), and executive relationship
        strength (20%). Customers scoring below 60 are at-risk. Schedule quarterly
        business reviews for all enterprise accounts regardless of health score. Alert
        the account manager when last contact exceeds 60 days.'
      id: kb-102
      last_updated: '2024-09-15'
      title: Enterprise Customer Health Score Framework
    - author: Sarah Nguyen
      category: sales
      content: Finance and healthcare verticals are facing regulatory headwinds in
        Q4 2024. Manufacturing customers are investing in automation. Energy sector
        deals often stall in Q3-Q4 due to budget freezes. Retail partners are accelerating
        digital transformation initiatives ahead of the holiday season. Use these
        talking points to tailor re-engagement messaging by industry vertical.
