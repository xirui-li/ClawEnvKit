- check:
    rubric: "Evaluate the quality and completeness of the agent's Q1 2024 revenue\
      \ reconciliation briefing. Score on these dimensions:\n1. Transaction coverage\
      \ (0–0.3): Does the briefing account for Q1 2024 transactions (txn-001 through\
      \ txn-008)?\n   Does it correctly total or summarize the revenue (total should\
      \ be approximately $729,300)?\n   Does it identify the top contributors — Nexon\
      \ Capital Partners ($360,000 across txn-002 and txn-006),\n   Meridian Technologies\
      \ ($158,050 across txn-001 and txn-005), and Solaris Health Group ($109,500\
      \ across txn-003 and txn-007)?\n\n2. Customer cross-reference (0–0.3): Does\
      \ the briefing correctly link transactions to enterprise CRM customers\n   (cust-001\
      \ Meridian Technologies, cust-002 Hargrove Logistics, cust-003 Solaris Health\
      \ Group, cust-005 Nexon Capital Partners)?\n   Does it note that Brightfield\
      \ Retail Co (cust-004) is a standard-tier customer?\n\n3. KB policy integration\
      \ (0–0.2): Does the briefing reference relevant knowledge base policies such\
      \ as the\n   Revenue Recognition Policy (kb-101) requiring controller review\
      \ for contracts over $100,000,\n   or the Quarterly Reconciliation Checklist\
      \ (kb-102)?\n\n4. Actionability and clarity (0–0.2): Is the briefing well-structured,\
      \ clearly written, and actionable for\n   a finance team? Does it flag any notable\
      \ items (e.g., Nexon's two large payments totaling $360,000)?\n\nScore 1.0 for\
      \ excellent coverage of all four dimensions, 0.7 for good coverage of three,\
      \ 0.4 for partial coverage of two, 0.1 for minimal effort.\n"
    type: llm_judge
  name: reconciliation_briefing_quality
  weight: 0.25
- check:
    rubric: 'Did the agent submit a CRM export report (via the export_report tool)
      that includes the enterprise customers with Q1 2024 financial activity? The
      report should include at minimum cust-001 (Meridian Technologies), cust-003
      (Solaris Health Group), and cust-005 (Nexon Capital Partners) — the three highest-revenue
      enterprise customers in the transaction data. Score 1.0 if all three are included
      with a meaningful summary, 0.5 if two are included or the summary is thin, 0.0
      if the export was skipped or only one customer included.

      '
    type: llm_judge
  name: export_report_includes_enterprise_customers
  weight: 0.15
