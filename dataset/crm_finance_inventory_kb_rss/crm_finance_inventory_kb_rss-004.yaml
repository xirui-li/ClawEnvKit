      title: Customer Tier Definitions and SLA Requirements
prompt: 'Our finance team needs a quarterly revenue reconciliation briefing for Q1
  2024. Pull all transactions from that period, then cross-reference with our top-tier
  enterprise customers to identify which high-value clients had significant financial
  activity. Finally, compile a CRM export report summarizing the reconciliation findings,
  and check our knowledge base for any existing billing or reconciliation policies
  that should be referenced in the briefing.

  '
reference_solution:
- action: Call list_transactions with start_date=2024-01-01 and end_date=2024-03-31
    to retrieve all Q1 2024 transactions (txn-001 through txn-008).
  step: 1
- action: 'Review the transactions and identify the vendors: Nexon Capital Partners
    ($360,000 total), Meridian Technologies ($158,050 total), Solaris Health Group
    ($109,500 total), Hargrove Logistics ($78,000), and Brightfield Retail Co ($23,750).'
  step: 2
- action: Call list_customers with tier=enterprise to retrieve enterprise CRM customers
    and cross-reference with transaction vendors.
  step: 3
- action: Call search_articles with query='reconciliation billing policy' and category='billing'
    to find relevant KB articles (kb-101, kb-102).
  step: 4
- action: Call get_article for kb-101 (Revenue Recognition Policy) and kb-102 (Quarterly
    Reconciliation Checklist) to retrieve full policy content.
  step: 5
- action: Call export_report with a title such as 'Q1 2024 Revenue Reconciliation
    Report', include customer_ids for cust-001, cust-002, cust-003, and cust-005,
    and write a summary covering total Q1 revenue (~$729,300), top contributors, and
    policy references.
  step: 6
- action: Deliver a structured briefing to the user summarizing Q1 transaction totals
    by customer, enterprise customer cross-reference, KB policy requirements (controller
    review for >$100K contracts), and the reconciliation checklist steps.
  step: 7
