  kb:
    articles:
    - author: Finance Team
      category: billing
      content: Enterprise contracts exceeding $100,000 must be reviewed by the finance
        controller before recognition. Payments should be matched to signed SOWs within
        30 days of receipt. Any discrepancies must be escalated to the CFO.
      id: kb-101
      last_updated: '2024-01-15'
      title: Revenue Recognition Policy for Enterprise Contracts
    - author: Compliance Team
      category: billing
      content: 'Steps for quarterly reconciliation: 1) Pull all transactions for the
        quarter. 2) Match each transaction to a customer account. 3) Verify amounts
        against signed contracts. 4) Flag any unmatched or disputed transactions.
        5) Submit reconciliation report to finance director by the 10th of the following
        month.'
