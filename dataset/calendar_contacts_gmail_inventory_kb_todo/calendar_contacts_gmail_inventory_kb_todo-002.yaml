tools:
- description: List calendar events for a given date range
  endpoint: /calendar/events
  method: POST
  name: list_calendar_events
  service: calendar
- description: Get full details of a specific calendar event by its ID
  endpoint: /calendar/events/get
  method: POST
  name: get_calendar_event
  service: calendar
- description: Search for contacts by name, email, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get detailed information about a specific contact by ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send an email to a recipient
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email as a draft
  endpoint: /gmail/drafts/save
  method: POST
  name: save_draft
  service: gmail
- description: Create a new todo task with title, description, priority, and due date
  endpoint: /todo/tasks/create
  method: POST
  name: create_task
  service: todo
- description: List existing todo tasks with optional status filter
  endpoint: /todo/tasks
  method: POST
  name: list_tasks
  service: todo
- description: Get all events for a specific user on a given date
  endpoint: /calendar/user_events
  method: POST
  name: get_user_events
  service: calendar
