prompt: 'A new software engineer, Priya Sharma, is joining the team on Monday, January
  13, 2025. Please set up her onboarding week: find her contact details, check what
  onboarding documentation exists in the knowledge base, schedule a "Welcome & Onboarding
  Kickoff" meeting for 9:00–10:00 AM on January 13 with all relevant attendees (include
  Priya and her manager), create a to-do task to track her equipment setup, and send
  Priya a welcome email summarizing her first-day schedule and any key onboarding
  resources you found. Report back with a summary of everything you''ve done.

  '
reference_solution:
- description: Search contacts for 'Priya Sharma' to retrieve her email (priya.sharma@company.com)
    and confirm her department and manager.
  step: 1
- description: Search contacts for 'Diana Chen' or filter by Engineering department
    to identify Priya's manager (diana.chen@company.com).
  step: 2
- description: Search the knowledge base with query 'onboarding' to find relevant
    articles (kb-001 New Employee Onboarding Checklist, kb-003 IT Equipment Setup
    Guide, kb-004 Office Access).
  step: 3
- description: Retrieve key articles (e.g., kb-001, kb-003) to extract specific onboarding
    steps and resources to include in the welcome email.
  step: 4
- description: Check the calendar for January 13, 2025 to confirm the 9:00–10:00 AM
    slot is free before creating the event.
  step: 5
- description: Create a calendar event titled 'Welcome & Onboarding Kickoff' on 2025-01-13
    from 09:00 to 10:00, with attendees including priya.sharma@company.com, diana.chen@company.com,
    and optionally marcus.lee@company.com.
  step: 6
- description: Create a to-do task such as 'Set up equipment for Priya Sharma' with
    high priority and due date of 2025-01-13, referencing the IT setup guide.
  step: 7
- description: Send a welcome email to priya.sharma@company.com with subject like
    'Welcome to the Team, Priya!' summarizing her first-day schedule (9 AM kickoff
    meeting), key onboarding resources from the KB, and IT setup instructions.
  step: 8
- description: 'Report back with a structured summary covering: the event created
    (title, time, attendees), KB resources found, the to-do task created, and the
    welcome email sent to Priya.'
  step: 9
