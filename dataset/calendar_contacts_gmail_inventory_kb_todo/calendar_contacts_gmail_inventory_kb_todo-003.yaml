- check:
    rubric: 'Evaluate the agent''s final summary report on these dimensions:

      1. EVENT CREATION (0–0.3): Did the agent confirm creation of a "Welcome & Onboarding
      Kickoff" (or similar) meeting on January 13, 2025 at 9:00–10:00 AM? Does it
      mention attendees including Priya Sharma (priya.sharma@company.com) and her
      manager Diana Chen (diana.chen@company.com)?

      2. KNOWLEDGE BASE INTEGRATION (0–0.2): Did the agent reference specific onboarding
      resources found in the KB, such as the "New Employee Onboarding Checklist" (kb-001),
      "IT Equipment Setup Guide" (kb-003), or "Engineering Handbook" (kb-002)? Does
      the welcome email or summary mention at least one concrete resource?

      3. WELCOME EMAIL QUALITY (0–0.2): Was a welcome email sent to priya.sharma@company.com?
      Does the summary describe the email content as including first-day schedule
      details and onboarding resources?

      4. TO-DO TASK CREATION (0–0.15): Did the agent create a task related to equipment
      setup or onboarding tracking for Priya Sharma, with appropriate priority and
      due date?

      5. SUMMARY COMPLETENESS (0–0.15): Is the final report clear, well-organized,
      and does it cover all four actions (event created, KB resources found, task
      created, email sent) with specific details rather than vague statements?

      Score 1.0 if all five dimensions are fully satisfied. Score 0.7–0.9 if 3–4 dimensions
      are well covered. Score 0.4–0.6 if only 2 dimensions are covered. Score below
      0.4 if the output is incomplete or missing critical actions.

      '
    type: llm_judge
  name: output_quality
  weight: 0.2
