tools:
- description: List calendar events for a given date range
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get details of a specific calendar event by ID
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Search contacts by name, email, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full details of a contact by ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Search knowledge base articles by query or category
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Get a specific knowledge base article by ID
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
- description: Send an email to a recipient
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
