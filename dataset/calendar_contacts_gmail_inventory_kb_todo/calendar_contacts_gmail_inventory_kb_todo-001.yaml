prompt: 'I need a full briefing on what''s happening in the company this week (starting
  2024-03-11, covering 7 days). For each calendar event, look up any attendees you
  can find in the contacts directory and note their department and title. Then check
  if there are any related knowledge base articles about the meeting topics, and summarize
  everything in a clear weekly schedule report I can share with leadership — including
  who''s involved, what departments are represented, and any relevant background from
  the knowledge base.

  '
reference_solution: "1. Call list_events with date=\"2024-03-11\" and days=7 to retrieve\
  \ all 5 events for the week. 2. For each event, note the attendee email addresses\
  \ listed in the event details. 3. Call search_contacts for each unique attendee\
  \ email (or name) to find their contact record,\n   retrieving name, title, and\
  \ department for: Sarah Chen, Marcus Obi, Linda Park, James Wu, Priya Nair, Tom\
  \ Reyes.\n4. Call search_articles for each event topic (e.g., \"budget review\"\
  , \"product roadmap\", \"town hall\",\n   \"security compliance\", \"customer success\"\
  ) to find relevant KB articles.\n5. Retrieve relevant articles (art-001 through\
  \ art-004) using get_article to pull background content. 6. Compose a structured\
  \ weekly briefing report organized by day, listing each event with its time,\n \
  \  location, attendees (with titles and departments), and a brief KB-sourced background\
  \ note where available.\n7. Conclude with a summary of which departments are active\
  \ this week and any notable cross-departmental events\n   (e.g., the All-Hands on\
  \ Wednesday involves Finance, HR, Product, Operations, and Customer Success).\n\
  8. Present the report as text output — do not send any emails."
