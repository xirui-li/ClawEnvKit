tools:
- description: List all calendar events for a given date range. Provide start date
    and number of days to look ahead.
  endpoint: /calendar/events
  method: POST
  name: list_calendar_events
  service: calendar
- description: Get full details of a specific calendar event by its ID.
  endpoint: /calendar/events/get
  method: POST
  name: get_calendar_event
  service: calendar
- description: Search for contacts by name, email, or department.
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full contact details by contact ID.
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a direct message to a contact using their contact ID.
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: List all to-do tasks, optionally filtered by status.
  endpoint: /todo/tasks
  method: POST
  name: list_tasks
  service: todo
- description: Create a new to-do task with title, description, priority, and due
    date.
  endpoint: /todo/tasks/create
  method: POST
  name: create_task
  service: todo
- description: Send an email to a recipient with subject and body.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
