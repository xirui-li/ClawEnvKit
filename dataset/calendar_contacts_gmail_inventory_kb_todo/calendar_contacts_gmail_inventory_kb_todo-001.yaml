- check:
    rubric: "Evaluate the weekly schedule briefing report produced by the agent on\
      \ the following dimensions:\n1. EVENT COVERAGE (0–0.3): Does the report cover\
      \ all 5 events from the week of 2024-03-11?\n   These are: \"Q1 Budget Review\"\
      \ (Mon), \"Product Roadmap Planning\" (Tue), \"All-Hands Town Hall\" (Wed),\n\
      \   \"Security Compliance Training\" (Thu), and \"Customer Success Sync\" (Fri).\n\
      \   Score 0.3 if all 5 are present, 0.2 if 4, 0.1 if 3, 0.0 if fewer.\n\n2.\
      \ ATTENDEE AND DEPARTMENT DETAIL (0–0.3): Does the report correctly identify\
      \ attendees with their\n   titles and departments? Key examples: Sarah Chen\
      \ (VP of Finance, Finance), James Wu (Head of Product, Product),\n   Linda Park\
      \ (Chief People Officer, HR), Tom Reyes (Security Engineer, IT Security),\n\
      \   Priya Nair (Customer Success Lead, Customer Success), Marcus Obi (Operations\
      \ Manager, Operations).\n   Score 0.3 if 5+ people correctly identified with\
      \ department/title, 0.2 if 3–4, 0.1 if 1–2, 0.0 if none.\n\n3. KNOWLEDGE BASE\
      \ INTEGRATION (0–0.2): Does the report reference relevant KB article content\
      \ for at least\n   2 events? For example, noting that the Q1 Budget Review covers\
      \ departmental spend and capital expenditures\n   (art-001), or that the All-Hands\
      \ requires slides submitted 48 hours in advance (art-003), or that\n   Security\
      \ Compliance Training must be logged in HR within 5 business days (art-004).\n\
      \   Score 0.2 if 2+ events have KB context, 0.1 if 1, 0.0 if none.\n\n4. LEADERSHIP\
      \ READINESS (0–0.2): Is the report well-structured, clearly written, and suitable\
      \ for sharing\n   with leadership? It should have a logical structure (e.g.,\
      \ day-by-day or event-by-event), use professional\n   language, and provide\
      \ a useful summary of departments involved across the week.\n   Score 0.2 if\
      \ excellent, 0.1 if adequate but missing structure or summary, 0.0 if disorganized\
      \ or incomplete.\n\nFinal score = sum of dimension scores (max 1.0).\n"
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.35
