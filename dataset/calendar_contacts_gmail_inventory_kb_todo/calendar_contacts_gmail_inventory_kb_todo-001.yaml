scoring_components:
- check:
    action: list_events
    service: calendar
    type: audit_action_exists
  name: calendar_events_listed
  weight: 0.15
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: contacts_looked_up
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: summary_email_sent
  weight: 0.1
- check:
    action: create_task
    service: todo
    type: audit_action_exists
  name: followup_task_created
  weight: 0.1
- check:
    keywords:
    - Marcus Lee
    - conflict
    - '2024-01-15'
    - Budget Review
    - Roadmap
    type: keywords_present
  name: conflict_identified_in_output
  weight: 0.15
- check:
    rubric: "Evaluate the quality and completeness of the agent's weekly digest output.\
      \ The agent should have: (1) Identified all 6 events across Jan 15–19, including\
      \ their titles (Q1 Budget Review, Product Roadmap Sync,\n    Engineering Standup,\
      \ Design Sprint Kickoff, Vendor Negotiation Call, All-Hands Team Meeting).\n\
      (2) Flagged the scheduling conflict on Jan 15: Marcus Lee (Senior Product Manager)\
      \ is double-booked\n    for both evt-001 (Q1 Budget Review, 09:00–10:30) and\
      \ evt-002 (Product Roadmap Sync, 10:00–11:00),\n    which overlap by 30 minutes.\n\
      (3) Included relevant team member names and roles (Sarah Chen/CFO, Marcus Lee/Senior\
      \ Product Manager,\n    Priya Nair/Engineering Lead, Diana Ross/Head of Design,\
      \ Tom Walsh/Senior Engineer).\n(4) Sent a summary email containing the digest.\
      \ (5) Created a follow-up to-do task to resolve the conflict before the sprint.\
      \ Scoring: 1.0 if all five elements are present and accurate; 0.75 if conflict\
      \ is flagged and email sent but task creation or some event details are missing;\
      \ 0.5 if partial digest with no conflict identification; 0.25 if only events\
      \ are listed with no analysis or follow-up; 0.0 if the output is incomplete\
      \ or incorrect.\n"
    type: llm_judge
  name: digest_quality_and_completeness
  weight: 0.25
- check:
    rubric: 'Evaluate whether the email sent by the agent contains a well-structured
      digest suitable for a manager. It should mention: the week of January 15 2024,
      the double-booking conflict involving Marcus Lee on Monday January 15 (Q1 Budget
      Review overlapping with Product Roadmap Sync), at least three other events from
      the week, and a recommendation or note about resolving the conflict before the
      quarterly planning sprint. Score 1.0 for a clear, professional email covering
      all points; 0.5 if the conflict is mentioned but the email is vague or missing
      key events; 0.0 if no conflict is mentioned or the email is off-topic.

      '
    type: llm_judge
  name: email_mentions_conflict_and_team
  weight: 0.15
task_id: calendar_contacts_gmail_inventory_kb_todo-001
task_name: Weekly Team Availability Digest
tools:
- description: List calendar events for a date range given a start date and number
    of days.
  endpoint: /calendar/events
  method: POST
  name: list_calendar_events
  service: calendar
- description: Get details of a specific calendar event by event ID.
  endpoint: /calendar/events/get
  method: POST
  name: get_calendar_event
  service: calendar
- description: Search for contacts by name, email, or department.
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full contact details by contact ID.
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: List recent emails from the inbox.
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Send an email with a subject and body to a recipient.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Create a new to-do task with title, description, priority, and due
    date.
  endpoint: /todo/tasks/create
  method: POST
  name: create_task
  service: todo
- description: List existing to-do tasks, optionally filtered by status.
  endpoint: /todo/tasks
  method: POST
  name: list_tasks
  service: todo
