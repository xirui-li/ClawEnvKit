  name: checked_scheduler_jobs
  weight: 0.1
- check:
    keywords:
    - intg-001
    - intg-002
    - intg-004
    - Salesforce
    - Stripe
    - Twilio
    type: keywords_present
  name: correct_integrations_flagged_for_rotation
  weight: 0.2
- check:
