tools:
- description: List all configured integrations, optionally filtered by status
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full integration details including credentials and configuration
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Update integration status or notes
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: List helpdesk tickets filtered by status, priority, or category
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Retrieve full details of a specific helpdesk ticket
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: List scheduled jobs filtered by status, enabled state, or tag
  endpoint: /scheduler/jobs
  method: POST
  name: list_jobs
  service: scheduler
- description: Retrieve full details of a specific scheduled job
  endpoint: /scheduler/jobs/get
  method: POST
  name: get_job
  service: scheduler
- description: Send an email notification to a recipient
  endpoint: /config/notify
  method: POST
  name: send_notification
  service: config
