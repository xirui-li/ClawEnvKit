- tool_name: send_email
  type: tool_not_called
scoring_components:
- check:
    action: list_events
    service: calendar
    type: audit_action_exists
  description: Agent listed calendar events to survey the week's schedule.
  name: used_calendar_list
  weight: 0.1
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  description: Agent searched the contacts directory to find team member details.
  name: used_contacts_service
  weight: 0.1
- check:
    keywords:
    - sarah.chen@company.com
    - marcus.webb@company.com
    - priya.nair@company.com
    type: keywords_present
  description: Agent's output includes the email addresses for all three team members.
  name: contact_details_present
  weight: 0.15
- check:
    keywords:
    - Q4 Budget Review
    - All-Hands
    - Vendor Demo
    type: keywords_present
  description: Agent's output references specific events from the fixture data that
    affect team availability.
  name: key_events_mentioned
  weight: 0.15
- check:
    keywords:
    - created event
    - deleted event
    - event has been created
    - successfully deleted
    type: keywords_absent
  description: Agent only summarized — did not create or delete any calendar events.
  name: no_calendar_modifications
  weight: 0.1
- check:
    rubric: "Evaluate the agent's weekly availability digest on four dimensions:\n\
      1. COMPLETENESS (0–0.25): Does the output cover all five days (Mon Nov 18 –\
      \ Fri Nov 22)?\n   Does it account for all three team members (Sarah Chen, Marcus\
      \ Webb, Priya Nair)?\n   Are all 7 fixture events represented with correct dates\
      \ and times?\n\n2. ACCURACY (0–0.25): Are the event details correct? For example:\n\
      \   - Nov 18: Q4 Budget Review 9–10:30am (Sarah, Marcus); Product Roadmap Sync\
      \ 2–3pm (Sarah, Priya)\n   - Nov 19: Engineering Stand-up 10–10:30am (Marcus,\
      \ Priya)\n   - Nov 20: Vendor Demo 11am–12pm (Priya, Sarah); 1:1 Marcus & Director\
      \ 3–3:30pm (Marcus)\n   - Nov 21: All-Hands 1–2:30pm (all three)\n   - Nov 22:\
      \ Design Review — Aurora Prototype 9:30–11am (Sarah, Priya)\n   Deduct for wrong\
      \ times, missing attendees, or incorrect event names.\n\n3. CONTACT DETAILS\
      \ (0–0.25): Does the output include each person's email AND either phone or\
      \ title?\n   - Sarah Chen: Senior Product Manager, sarah.chen@company.com, +1-555-0142\n\
      \   - Marcus Webb: Lead Software Engineer, marcus.webb@company.com, +1-555-0187\n\
      \   - Priya Nair: DevOps Engineer, priya.nair@company.com, +1-555-0231\n\n4.\
      \ ACTIONABILITY (0–0.25): Does the agent synthesize the data into genuinely\
      \ useful guidance?\n   For example, does it identify windows when all three\
      \ team members appear free (e.g., Tuesday Nov 19 afternoon, Wednesday Nov 20\
      \ morning before 11am, Friday Nov 22 afternoon), or flag conflicts that would\
      \ make scheduling harder?\n\nScoring: Sum the four dimension scores. 1.0 = excellent\
      \ on all four, 0.75 = strong but one dimension weak, 0.5 = acceptable but incomplete\
      \ or inaccurate in notable ways, 0.25 = partial output missing major elements,\
      \ 0.0 = mostly wrong or missing.\n"
    type: llm_judge
  name: availability_summary_quality
  weight: 0.4
task_id: calendar_contacts_gmail-001
task_name: Weekly Team Availability Digest for New Project Kickoff
tools:
- description: List calendar events for a date range. Requires a start date and number
    of days.
  endpoint: /calendar/events
  method: POST
  name: list_calendar_events
  service: calendar
- description: Get all calendar events for a specific user on a given date.
  endpoint: /calendar/user_events
  method: POST
  name: get_user_events
  service: calendar
- description: Search the company contacts directory by name, email, or department.
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full contact details for a person by their contact ID.
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: List recent emails from the Gmail inbox.
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve a single email by its message ID.
  endpoint: /gmail/messages/get
  method: POST
  name: get_email
  service: gmail
- description: Send an email to a recipient.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Create a new calendar event with title, start/end time, attendees,
    and location.
  endpoint: /calendar/events/create
  method: POST
  name: create_calendar_event
  service: calendar
- description: Delete a calendar event by its event ID.
  endpoint: /calendar/events/delete
  method: POST
  name: delete_calendar_event
  service: calendar
