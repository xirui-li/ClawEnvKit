prompt: 'A new hire named Priya Sharma is joining the engineering team next Monday.
  Please look up her contact details, check what onboarding-related emails have arrived
  recently, and schedule a 1-hour onboarding kickoff meeting for her first day (next
  Monday at 10:00 AM) with her manager and the HR representative mentioned in the
  onboarding email. Confirm the meeting details in your response.

  '
reference_solution: 1. Search contacts for "Priya Sharma" to retrieve her email (priya.sharma@company.com)
  and confirm she is in Engineering. 2. Search or retrieve contact for "Daniel Okafor"
  (Engineering Manager) to get his email. 3. List recent inbox emails (list_inbox)
  to find onboarding-related messages. 4. Read email msg-001 from Sandra Reyes, which
  requests a 10 AM kickoff meeting on Priya's first day and asks to be included —
  extract Sandra's email (sandra.reyes@company.com). 5. Retrieve Sandra Reyes' contact
  details if needed to confirm her email. 6. Create a calendar event titled "Onboarding
  Kickoff — Priya Sharma" on next Monday (2025-01-27) from 10:00 AM to 11:00 AM, with
  attendees [priya.sharma@company.com, daniel.okafor@company.com, sandra.reyes@company.com],
  location "Engineering Bay" or similar. 7. Confirm the created event details in the
  text response, noting all three attendees and the source of the scheduling request.
