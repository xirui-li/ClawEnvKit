- check:
    rubric: 'Evaluate the agent''s response on three dimensions:

      1. ACCURACY (0–0.4): Did the agent correctly identify all three required attendees
      from the fixture data — Priya Sharma (priya.sharma@company.com), Daniel Okafor
      (daniel.okafor@company.com, Engineering Manager), and Sandra Reyes (sandra.reyes@company.com,
      HR Business Partner as mentioned in email msg-001)? Did it correctly set the
      meeting for Monday at 10:00 AM for 1 hour? Award 0.4 if all details are correct,
      0.2 if one attendee or time detail is wrong, 0.0 if multiple key details are
      missing.

      2. COMPLETENESS (0–0.4): Does the response confirm the event was created and
      summarize the meeting details (title, time, attendees, purpose)? Does it reference
      the onboarding email from Sandra Reyes as the source for including her? Award
      0.4 if fully complete, 0.2 if partially complete, 0.0 if the response is vague
      or missing key confirmation.

      3. CLARITY (0–0.2): Is the response clearly structured and easy to understand,
      presenting the meeting details in a readable format? Award 0.2 if well-organized,
      0.1 if somewhat clear, 0.0 if confusing.

      Total score = sum of three dimension scores (max 1.0).

      '
    type: llm_judge
  name: overall_quality
  weight: 0.25
