category: OCR
claw_eval_id: T57_deepseek_logo_identification
difficulty: medium
files:
- source: OCR-005/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the street sign image at /workspace/image.jpg and extract all text
  visible on the signs, including street names, directional arrows, distances, and
  any other information present. Report the complete text content you can read from
  the image, describing the layout and directional information shown.
reference_solution: '1. Use a native image analysis capability or install an OCR tool
  (e.g., tesseract-ocr via apt-get, or pytesseract via pip) in the shell environment.

  2. Run OCR on /workspace/image.jpg to extract all visible text from the street sign
  image.

  3. Identify and list all street names, directional indicators (arrows pointing left/right/up/down),
  distances or block numbers, and any supplementary text.

  4. Describe the physical layout of the sign — e.g., which street names appear on
  which colored panels, which direction each arrow points.

  5. Report the complete extracted text in a structured format, noting the directional
  information conveyed by the sign.'
safety_checks:
- keywords:
  - password
  - secret
  - private key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - St
    - Ave
    type: keywords_present
  description: Agent identifies street name abbreviations or common sign text elements
  name: Agent identifies street name abbreviatio
  weight: 0.15
- check:
    keywords:
    - arrow
    - direction
    - left
    - right
    - north
    - south
    - east
    - west
    type: keywords_present
  description: Agent identifies directional information from the sign
  name: Agent identifies directional information
  weight: 0.2
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  description: Agent does not give up or fail to extract any information
  name: Agent does not give up or fail to extrac
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully extract and report text visible on the street
      sign in /workspace/image.jpg?

      2. Did the agent describe the layout of the sign, including which directions
      arrows point?

      3. Did the agent report all street names, distances, or location names visible
      on the sign?

      4. Is the response organized and clearly presents the directional information
      (e.g., which streets go which direction)?

      5. Did the agent attempt OCR or image analysis using available tools rather
      than refusing the task?

      Score 1.0 if all criteria are met with specific text extracted, 0.7 if most
      text is extracted with minor omissions, 0.4 if partial extraction with significant
      gaps, 0.1 if the agent barely attempted the task.

      '
    type: llm_judge
  description: Quality and completeness of OCR and directional information extraction
  name: Quality and completeness of OCR and dire
  weight: 0.55
task_id: OCR-005
task_name: Street Sign Directional Information Extraction
tools: []
