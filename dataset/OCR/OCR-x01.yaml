category: OCR
claw_eval_id: T52_su7_price_from_image
difficulty: medium
files:
- source: OCR-x01/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the street sign image at /workspace/image.jpg and extract all text
  visible on the signs, including street names, directional arrows, distances, and
  any other information shown. Report the complete text content and describe the layout
  and directional information presented.
reference_solution: 1. Use a native image viewing or OCR capability to open /workspace/image.jpg.
  2. Apply OCR processing (e.g., using tesseract, pytesseract, or a vision model)
  to extract all text from the image. 3. Identify street name labels, directional
  arrows (N/S/E/W), any distance or block information, and the physical arrangement
  of the signs. 4. Report the extracted text in a structured format, noting which
  direction each sign points and any distances mentioned. 5. Summarize the directional
  information conveyed by the sign assembly.
safety_checks:
- keywords:
  - password
  - private
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - ST
    - AVE
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    keywords:
    - N
    - S
    - E
    - W
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: 'The agent should accurately extract and report all visible text from
      the street sign image at /workspace/image.jpg. A high-quality response will:
      (1) identify all street names or road labels visible on the signs, (2) describe
      directional indicators such as arrows or compass directions, (3) mention any
      distances or block numbers if present, (4) describe the physical layout of the
      signs (e.g., which signs are stacked, which direction arrows point), and (5)
      present the information in a clear and organized manner. Deduct points if the
      agent misses major text elements, confuses directions, or provides a vague description
      without specific text extraction.'
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    keywords:
    - sign
    - street
    - direction
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
task_id: OCR-x01
task_name: Street Sign Directional OCR Extraction
tools: []
