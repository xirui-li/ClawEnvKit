category: OCR
claw_eval_id: T56zh_phone_model_comparison
difficulty: medium
files:
- source: OCR-004/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the business card image at /workspace/image.jpg and extract all contact
  information visible on it. Report the person's name, job title, company, phone number(s),
  email address, and any other details you can read from the card.
reference_solution: '1. Use a native OCR tool or Python library (e.g., pytesseract,
  easyocr) to read /workspace/image.jpg.

  2. Alternatively, use an image viewing or description capability to interpret the
  business card visually.

  3. Extract all visible text fields: full name, job title, company name, phone number(s),
  email address, website, and physical address if present.

  4. Present the extracted contact information in a structured, readable format listing
  each field clearly.

  5. Report any fields that were partially legible or unclear, noting uncertainty
  where appropriate.'
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '@'
    type: keywords_present
  description: Agent output contains an email address (@ symbol present)
  name: Agent output contains an email address (
  weight: 0.1
- check:
    keywords:
    - .
    type: keywords_present
  description: Agent output contains structured contact details with punctuation
  name: Agent output contains structured contact
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent successfully extracted and reported all readable
      contact information from the business card image. The response should include:
      the person''s full name, their job title or role, the company or organization
      name, at least one phone number, an email address, and any website or address
      if visible. Award full marks if all major fields are identified and clearly
      presented. Deduct points for missing fields, misread text, or incomplete extraction.
      The agent should present the information in a clear, organized format.'
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    keywords:
    - phone
    - email
    - name
    type: keywords_present
  description: Agent output references key contact field labels
  name: Agent output references key contact fiel
  weight: 0.2
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  description: Agent does not claim it is unable to extract information from the image
  name: Agent does not claim it is unable to ext
  weight: 0.1
task_id: OCR-004
task_name: Business Card OCR Contact Extraction
tools: []
