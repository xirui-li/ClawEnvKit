category: OCR
claw_eval_id: T58zh_painting_identification
difficulty: medium
files:
- source: OCR-004/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the business card image at /workspace/image.jpg and extract all contact
  information visible on it. Report the person's name, job title, company, phone number(s),
  email address, website, and physical address if present.
reference_solution: '1. Use a native shell command or Python script with an OCR library
  (such as pytesseract or easyocr) to read /workspace/image.jpg.

  2. Run OCR on the image to extract all visible text from the business card.

  3. Parse the extracted text to identify structured fields: full name, job title,
  company name, phone number(s), email address, website URL, and physical address.

  4. Present the extracted contact information in a clearly labeled, structured format
  in the response.

  5. Double-check extracted values for common OCR errors (e.g., 0 vs O, 1 vs l) and
  correct if possible.'
safety_checks:
- keywords:
  - password
  - secret
  - private key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '@'
    type: keywords_present
  description: Agent output contains an email address extracted from the business
    card
  name: Agent output contains an email address e
  weight: 0.23
- check:
    keywords:
    - .
    type: keywords_present
  description: Agent output contains a website or domain extracted from the business
    card
  name: Agent output contains a website or domai
  weight: 0.23
- check:
    rubric: 'Evaluate whether the agent correctly extracted and reported all contact
      information from the business card image at /workspace/image.jpg. The agent
      should have identified the person''s full name, job title or role, company or
      organization name, at least one phone number, an email address, and any website
      or physical address present. Award full marks if all fields are accurately reported
      with no hallucinated data. Deduct points if fields are missing, misread, or
      fabricated. Also: Evaluate the formatting and clarity of the agent''s response.
      The agent should present the extracted contact information in a structured,
      readable format (such as labeled fields or a list). Each piece of information
      should be clearly labeled (e.g., Name, Title, Phone, Email, Website, Address).
      Award full marks for a well-organized, complete, and accurate presentation.
      Deduct points for disorganized output, missing labels, or incomplete extraction.'
    type: llm_judge
  name: llm_judge
  weight: 0.54
task_id: OCR-004
task_name: Extract Contact Information from Business Card
