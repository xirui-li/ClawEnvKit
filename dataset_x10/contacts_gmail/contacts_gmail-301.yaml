  name: acknowledgments_sent
  weight: 0.15
- check:
    keywords:
    - Priya Sharma
    - Marcus Webb
    - Derek Osei
    - urgent
    - production
    - budget
    - deal
    type: keywords_present
  name: urgent_senders_identified
  weight: 0.2
- check:
    keywords:
    - techdigest.io
    - newsletter
    type: keywords_absent
  name: non_urgent_excluded
  weight: 0.1
- check:
    rubric: "Evaluate the agent's response on three dimensions:\n1. IDENTIFICATION\
      \ (0–0.4): Did the agent correctly identify the three high-priority unread emails?\n\
      \   - msg-001 from Priya Sharma (production outage), msg-002 from Marcus Webb\
      \ (Q4 budget), and msg-005 from Derek Osei (enterprise deal).\n   - All three\
      \ named and their subjects summarized: 0.4. Two identified: 0.25. One: 0.1.\
      \ None: 0.0.\n   - The agent should NOT flag msg-003 (newsletter, external),\
      \ msg-004 (read, normal priority), or msg-006 (unread but normal priority) as\
      \ urgent.\n\n2. CONTACT RESOLUTION & MESSAGING (0–0.4): Did the agent look up\
      \ each urgent sender in the contacts directory and send them an internal acknowledgment\
      \ message?\n   - Full credit (0.4): All three senders (Priya Sharma/cnt-101,\
      \ Marcus Webb/cnt-102, Derek Osei/cnt-104) were found and messaged via the internal\
      \ system.\n   - Partial (0.2): Two of three messaged correctly.\n   - Minimal\
      \ (0.1): One messaged.\n   - The acknowledgment messages should be professional,\
      \ brief, and indicate the user has seen the message and will follow up.\n\n\
      3. SUMMARY QUALITY (0–0.2): Is the final summary clear, organized, and actionable?\n\
      \   - Does it list what urgent emails were found, who was messaged, and what\
      \ the next steps are?\n   - Clear and complete: 0.2. Partially organized: 0.1.\
      \ Vague or missing: 0.0.\n\nTotal score = sum of the three dimensions (max 1.0).\n"
    type: llm_judge
  name: output_quality_and_completeness
  weight: 0.35
task_id: contacts_gmail-301
