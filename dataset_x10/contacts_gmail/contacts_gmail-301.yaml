tools:
- description: Search the internal contacts directory by name, email, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details for a specific contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send an internal message to a contact via the messaging system
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: List emails from the Gmail inbox, optionally filtered by recency and
    count
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a specific email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email via Gmail
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft in Gmail
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
