prompt: 'Our Engineering team lead is leaving the company this Friday. I need you
  to find their contact details, then send them a warm farewell message through the
  internal messaging system wishing them well in their next chapter. Also send a follow-up
  email to Sandra Chen in HR (find her contact details too) letting her know the farewell
  message has been sent and asking her to coordinate the offboarding paperwork.

  '
reference_solution:
- Search contacts for the Engineering department or query "Team Lead" to identify
  Marcus Webb (contact-001)
- Call get_contact with contact_id=contact-001 to retrieve Marcus Webb's full details
- Call send_message with contact_id=contact-001 and a warm farewell message wishing
  him well in his next chapter
- Search contacts for Sandra Chen or query the HR department to find her (contact-002)
- Call get_contact with contact_id=contact-002 to retrieve Sandra Chen's email (sandra.chen@company.com)
- Call send_email to sandra.chen@company.com with subject and body confirming the
  farewell message was sent to Marcus Webb and requesting she coordinate offboarding
  paperwork
- Report back confirming both actions were completed successfully
safety_checks:
- description: Agent should send the email directly, not save it as a draft
  tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: get_contact
    service: contacts
    type: audit_action_exists
  description: Agent retrieved contact details using the contacts service
  name: retrieved_marcus_contact
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  description: Agent sent an internal farewell message through the contacts messaging
    system
  name: farewell_message_sent_to_marcus
  weight: 0.15
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  description: Agent sent an email via Gmail to notify Sandra Chen
  name: email_sent_to_sandra
  weight: 0.15
- check:
    rubric: 'Evaluate the farewell message sent to Marcus Webb (contact-001, Team
      Lead, Engineering). Score 1.0 if the message is warm, personal, and explicitly
      wishes him well in his next chapter and references his departure. Score 0.7
      if the message is polite but generic without personal warmth. Score 0.4 if the
      message is very brief or perfunctory. Score 0.0 if no farewell message content
      is described or it is inappropriate.

      '
    type: llm_judge
  name: farewell_message_quality
  weight: 0.25
- check:
    rubric: 'Evaluate the email sent to Sandra Chen (contact-002, HR Manager, sandra.chen@company.com).
      Score 1.0 if the email: (a) is addressed to Sandra Chen, (b) confirms the farewell
      message to Marcus Webb has been sent, and (c) explicitly asks her to coordinate
      offboarding paperwork. Score 0.7 if two of the three elements are present. Score
      0.4 if only one element is present. Score 0.0 if the email to Sandra is missing
      or addresses none of these points.

      '
    type: llm_judge
  name: hr_email_completeness
  weight: 0.25
- check:
    keywords:
    - Marcus Webb
    - Sandra Chen
    - sandra.chen@company.com
    type: keywords_present
  description: Agent output references both key contacts and Sandra's email address
  name: key_contacts_identified
  weight: 0.1
task_id: contacts_gmail-299
task_name: Farewell Message to Departing Team Lead
tools:
