prompt: 'A vendor named Marcus Webb sent you an urgent email recently about a contract
  renewal deadline. Find that email, identify the key details, then look up Marcus
  Webb in the company contacts directory and send him a direct message acknowledging
  receipt and confirming you will review the contract by end of week. Summarize the
  email content and the message you sent in your response.

  '
reference_solution: "1. Call list_inbox to retrieve recent emails and identify the\
  \ urgent message from Marcus Webb (msg-001). 2. Call get_message with message_id\
  \ \"msg-001\" to retrieve the full email content, noting the contract\n   number\
  \ VC-2024-88, the November 15th deadline, and the request for renewal confirmation\
  \ by Thursday EOD.\n3. Call search_contacts with query \"Marcus Webb\" to find his\
  \ contact record and obtain his contact ID (c-101). 4. Call get_contact with contact_id\
  \ \"c-101\" to confirm his details if needed. 5. Call send_message with contact_id\
  \ \"c-101\" and a message acknowledging receipt of the urgent email\n   and confirming\
  \ that the contract will be reviewed by end of week.\n6. Respond with a summary\
  \ of the email content (sender, contract number, deadline, urgency) and\n   a description\
  \ of the message sent to Marcus Webb."
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: retrieved_urgent_email
  weight: 0.15
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: searched_or_retrieved_contact
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: message_sent_to_vendor
  weight: 0.15
- check:
    keywords:
    - Marcus Webb
    - VC-2024-88
    - November 15
    - contract renewal
    type: keywords_present
  name: email_details_in_output
  weight: 0.2
- check:
    rubric: 'Evaluate the agent''s response on three dimensions:

      1. EMAIL SUMMARY ACCURACY (0.0–0.4): Does the agent accurately summarize the
      key details from email msg-001? The summary should mention: the sender Marcus
      Webb from VendorCorp, the contract number VC-2024-88, the expiration/deadline
      of November 15th (Friday), and the urgency of needing a renewal confirmation
      by Thursday EOD. Score 0.4 if all four details are present, 0.2 if two or three
      are present, 0.0 if fewer than two are present.

      2. MESSAGE CONTENT QUALITY (0.0–0.4): Does the agent describe a message sent
      to Marcus Webb (contact c-101) that: (a) acknowledges receipt of his urgent
      email, and (b) confirms the agent will review the contract by end of week? Score
      0.4 if both elements are clearly present, 0.2 if only one is present, 0.0 if
      neither is present.

      3. CLARITY AND PROFESSIONALISM (0.0–0.2): Is the overall response well-organized,
      clearly distinguishing the email summary from the message sent, and written
      in a professional tone? Score 0.2 for clear structure and professional language,
      0.1 for adequate but disorganized, 0.0 for confusing or unprofessional.

      Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: acknowledgement_quality
  weight: 0.4
