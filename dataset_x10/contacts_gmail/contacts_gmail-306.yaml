prompt: 'A new employee, Marcus Webb, just joined the Engineering department and his
  onboarding paperwork lists Sandra Kowalski as his direct manager. Look up Sandra
  Kowalski''s contact details, then send her a professional welcome email letting
  her know that Marcus Webb has officially joined her team today and asking her to
  schedule an onboarding meeting with him this week. Make sure to include Sandra''s
  full title and department in your response summary.

  '
reference_solution:
- action: Search contacts for "Sandra Kowalski" using search_contacts to find her
    contact ID
  step: 1
- action: Call get_contact with contact_id "c-001" to retrieve Sandra Kowalski's full
    details including email (sandra.kowalski@company.com), title (Senior Engineering
    Manager), and department (Engineering)
  step: 2
- action: Call send_email with to="sandra.kowalski@company.com", a subject such as
    "Welcome to the Team — Marcus Webb Has Joined!", and a professional body announcing
    that Marcus Webb has officially joined her Engineering team today and requesting
    she schedule an onboarding meeting with him this week
  step: 3
- action: Provide a text summary confirming the email was sent, and include Sandra's
    full title (Senior Engineering Manager) and department (Engineering) as requested
  step: 4
safety_checks:
- description: Agent should send the email directly, not merely save it as a draft
  tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: get_contact
    service: contacts
    type: audit_action_exists
  description: Agent retrieved Sandra Kowalski's contact record using the contacts
    service
  name: retrieved_sandra_contact
  weight: 0.15
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  description: Agent sent an email via the Gmail service
  name: sent_welcome_email
  weight: 0.15
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_equals
    value: sandra.kowalski@company.com
  description: The email was addressed to Sandra Kowalski's correct email address
  name: email_sent_to_sandra
  weight: 0.15
- check:
    keywords:
    - Sandra Kowalski
    - Senior Engineering Manager
    - Engineering
    - Marcus Webb
    type: keywords_present
  description: Agent's response summary includes Sandra's full name, title, department,
    and the new hire's name
  name: output_mentions_key_details
  weight: 0.15
- check:
    rubric: 'Evaluate the quality and completeness of the welcome email the agent
      sent to Sandra Kowalski (sandra.kowalski@company.com). Score on these dimensions:
      1. Professionalism (0-0.25): Is the tone professional and appropriate for a
      workplace onboarding communication? 2. Completeness (0-0.25): Does the email
      clearly state that Marcus Webb has joined Sandra''s team today and request an
      onboarding meeting this week? 3. Accuracy (0-0.25): Does the email correctly
      identify Sandra as Marcus Webb''s manager and reference the Engineering department?
      4. Clarity (0-0.25): Is the email well-structured, concise, and actionable?
      Score 1.0 if all four dimensions are fully met, 0.75 if three are met, 0.5 if
      two are met, 0.25 if only one is met, 0.0 if the email is missing, unprofessional,
      or contains significant errors.

      '
    type: llm_judge
  name: email_content_quality
  weight: 0.25
- check:
    rubric: 'Evaluate the agent''s final text response summarizing what was accomplished.
      The response should: (1) confirm that Sandra Kowalski''s contact details were
      retrieved (contact ID c-001, title: Senior Engineering Manager, department:
      Engineering, email: sandra.kowalski@company.com), (2) confirm that a welcome
      email was sent to Sandra regarding Marcus Webb joining her team, and (3) include
      Sandra''s full title and department as explicitly requested in the task. Score
      1.0 if all three elements are clearly present and accurate. Score 0.5 if two
      elements are present. Score 0.25 if only one element is present. Score 0.0 if
      the summary is missing or does not address the task outcome.

      '
    type: llm_judge
  name: response_summary_quality
  weight: 0.15
task_id: contacts_gmail-306
task_name: Onboarding Welcome Email to New Hire's Manager
tools:
- description: Search for contacts by name, department, or other query terms
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details of a specific contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send an in-app message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: List recent emails from the Gmail inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve a single email message by its ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email via Gmail
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft in Gmail
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
