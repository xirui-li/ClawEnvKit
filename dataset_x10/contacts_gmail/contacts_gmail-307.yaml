prompt: 'There''s an urgent security vulnerability that needs immediate attention.
  Search for all contacts in the Engineering department, then send each of them a
  direct message letting them know they must apply the critical security patch (CVE-2024-8821)
  to their systems before end of business today. Also send a follow-up email to the
  Engineering department mailing list (engineering@company.com) summarizing who was
  notified and asking them to confirm receipt. Report back with a summary of everyone
  you contacted and the messages sent.

  '
reference_solution:
- description: 'Use search_contacts with department="Engineering" to retrieve all
    Engineering department contacts. This returns Priya Nair (c-101), Marcus Webb
    (c-102), Soo-Jin Park (c-103), Tomás Herrera (c-104), and Derek Okafor (c-106).

    '
  step: 1
- description: 'Send a direct message to each Engineering contact (c-101, c-102, c-103,
    c-104, c-106) using send_message, informing them of the critical security patch
    CVE-2024-8821 and the end-of-business deadline to apply it.

    '
  step: 2
- description: 'Use send_email to send a follow-up message to engineering@company.com
    summarizing that all five Engineering team members were notified about CVE-2024-8821
    and requesting they confirm receipt.

    '
  step: 3
- description: Report back in text with a summary listing each person messaged (name
    and contact ID), the content of the messages sent, and confirmation that the follow-up
    email was dispatched to the mailing list.
  step: 4
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: searched_engineering_contacts
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: sent_direct_messages
  weight: 0.15
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_followup_email
  weight: 0.1
- check:
    keywords:
    - CVE-2024-8821
    type: keywords_present
  name: cve_referenced_in_output
  weight: 0.1
- check:
    keywords:
    - Priya Nair
    - Marcus Webb
    - Soo-Jin Park
    - Tomás Herrera
    - Derek Okafor
    type: keywords_present
  name: engineering_contacts_named_in_output
  weight: 0.15
- check:
    keywords:
    - Lena Fischer messaged
    - Aisha Patel messaged
    type: keywords_absent
  name: non_engineering_excluded
  weight: 0.1
- check:
    rubric: "Evaluate the agent's output on three dimensions:\n1. COVERAGE (0.0–0.4):\
      \ Did the agent successfully message all four Engineering contacts\n   (Priya\
      \ Nair c-101, Marcus Webb c-102, Soo-Jin Park c-103, Tomás Herrera c-104, Derek\
      \ Okafor c-106)?\n   Score 0.4 if all five messaged, 0.2 if three or four, 0.0\
      \ if fewer than three.\n   Non-engineering contacts (Lena Fischer, Aisha Patel)\
      \ must NOT have been messaged.\n\n2. MESSAGE CONTENT (0.0–0.3): Did the messages\
      \ sent to contacts clearly reference the\n   critical security patch CVE-2024-8821\
      \ and convey urgency (end of business today deadline)?\n   Score 0.3 if both\
      \ elements present, 0.15 if only one, 0.0 if neither.\n\n3. FOLLOW-UP EMAIL\
      \ (0.0–0.3): Did the agent send a follow-up email to engineering@company.com\n\
      \   that summarizes who was notified and requests confirmation of receipt?\n\
      \   Score 0.3 if email sent with both summary and confirmation request, 0.15\
      \ if only one element,\n   0.0 if no email sent or email is missing both elements.\n\
      \nFinal score = sum of the three dimension scores (max 1.0).\n"
    type: llm_judge
  name: message_quality_and_completeness
  weight: 0.3
task_id: contacts_gmail-307
task_name: Notify Engineering Team About Critical Security Patch
tools:
- description: Search for contacts by name query or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details for a specific contact by ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a direct message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: Send an email with a specified recipient, subject, and body
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
