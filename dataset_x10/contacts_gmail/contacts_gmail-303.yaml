prompt: 'There''s an emergency security patch that needs to be deployed tonight at
  11 PM EST. Find all contacts in the Engineering department, then send each of them
  a professional email notifying them about the emergency deployment window, what
  they need to do (be on standby and monitor their services), and that a follow-up
  briefing will be held tomorrow at 9 AM. Make sure to personalize each email with
  the recipient''s name and title.

  '
reference_solution:
- Search contacts with department filter "Engineering" to retrieve all engineering
  team members.
- Identify the four Engineering contacts returned: Priya Nair (c-001), Marcus Webb
    (c-002), Soo-Jin Park (c-003), Aisha Okonkwo (c-005), and Fatima Al-Rashid (c-007).
- For each Engineering contact, call send_email with their email address, a subject
  referencing the emergency security patch, and a personalized body that includes
  their name, title, the 11 PM EST deployment window, the standby/monitoring instruction,
  and the 9 AM follow-up briefing.
- Confirm in the text output that all five Engineering team members have been notified,
  listing their names and email addresses.
- Do NOT email Tomás Herrera (Product) or Derek Lund (HR), as they are not in Engineering.
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: searched_engineering_contacts
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_emails_via_gmail
  weight: 0.15
- check:
    keywords:
    - priya.nair@company.com
    - marcus.webb@company.com
    - soojin.park@company.com
    - aisha.okonkwo@company.com
    - fatima.alrashid@company.com
    type: keywords_present
  name: all_engineering_recipients_notified
  weight: 0.2
- check:
    keywords:
    - tomas.herrera@company.com
    - derek.lund@company.com
    type: keywords_absent
  name: non_engineering_excluded
  weight: 0.1
- check:
    keywords:
    - 11 PM
    - 9 AM
    - standby
    type: keywords_present
  name: deployment_details_included
  weight: 0.1
- check:
    rubric: 'Evaluate the quality and completeness of the emails the agent sent to
      the Engineering team. The Engineering contacts are: Priya Nair (Senior Software
      Engineer, c-001), Marcus Webb (DevOps Lead, c-002), Soo-Jin Park (Backend Engineer,
      c-003), Aisha Okonkwo (Security Engineer, c-005), and Fatima Al-Rashid (Frontend
      Engineer, c-007). Non-engineering contacts (Tomás Herrera, Derek Lund) must
      NOT have been emailed.

      Score on these dimensions: 1. Personalization (0–0.3): Does each email address
      the recipient by name and reference their title? Full marks if all 5 emails
      are personalized; partial if some are. 2. Content accuracy (0–0.4): Does each
      email clearly state the 11 PM EST deployment window, the standby/monitoring
      requirement, and the 9 AM follow-up briefing? Full marks if all three details
      are present; deduct proportionally for missing details. 3. Professionalism and
      tone (0–0.3): Is the email professional, clear, and appropriately urgent without
      being alarmist? Full marks for polished, concise language; partial for vague
      or overly casual tone.

      Final score: sum of dimension scores (0.0–1.0). Score 0.0 if no emails were
      sent or only non-engineering contacts were emailed.

      '
    type: llm_judge
  name: email_quality_and_personalization
  weight: 0.35
task_id: contacts_gmail-303
task_name: Notify Engineering Team of Critical Security Patch Deployment
