prompt: 'I''ve been out sick for a few days and need to catch up on urgent project
  escalations in my inbox. Please check my recent emails for any unread messages marked
  as high priority or related to project escalations, then find the relevant internal
  contacts mentioned and send each of them a brief follow-up message letting them
  know I''m back and will address their concerns today.

  '
reference_solution:
- Call list_inbox to retrieve recent emails (e.g., last 7 days).
- Review the results and identify unread emails with high priority or escalation-related subjects: msg-001
    (Sarah Chen, Project Phoenix), msg-002 (James Okafor, Q4 budget), msg-005 (Sarah
    Chen, Project Phoenix follow-up), msg-006 (Priya Nair, demo environment down).
- Optionally call get_message on individual high-priority messages to read full details.
- Determine the unique senders requiring follow-up: Sarah Chen, James Okafor, and
    Priya Nair.
- Call search_contacts for each sender name (e.g., query "Sarah Chen", "James Okafor",
  "Priya Nair") to find their contact IDs (cnt-101, cnt-102, cnt-105).
- Optionally call get_contact to confirm contact details.
- Call send_message for each contact with a personalized follow-up message referencing
  their specific escalation and confirming availability today.
- Summarize in the output which escalations were found, which contacts were notified,
  and what messages were sent.
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: inbox_checked
  weight: 0.1
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: contacts_service_used
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: messages_sent_to_contacts
  weight: 0.1
- check:
    keywords:
    - Sarah Chen
    - James Okafor
    - Priya Nair
    - Project Phoenix
    - budget approval
    - demo environment
    type: keywords_present
  name: high_priority_escalations_identified
  weight: 0.2
- check:
    keywords:
    - offsite planning is an escalation
    - weekly status is urgent
    type: keywords_absent
  name: low_priority_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent correctly identified the high-priority unread
      escalation emails and distinguished them from routine messages. The agent should
      have identified exactly three unique senders with urgent/escalation issues:
      Sarah Chen (msg-001, msg-005 — Project Phoenix deadline), James Okafor (msg-002
      — Q4 budget approval), and Priya Nair (msg-006 — client demo environment down).
      Linda Park''s offsite planning email and Tom Reyes''s read status update should
      NOT be treated as escalations. Score 1.0 if all three escalation senders are
      correctly identified and the non-urgent emails are excluded. Score 0.6 if two
      of three escalation senders are identified. Score 0.3 if only one is identified
      or non-urgent emails are incorrectly included. Score 0.0 if the agent fails
      to distinguish urgent from routine messages.

      '
    type: llm_judge
  name: escalation_triage_quality
  weight: 0.25
- check:
    rubric: 'Evaluate the quality of the follow-up messages sent to the escalation
      contacts (Sarah Chen cnt-101, James Okafor cnt-102, Priya Nair cnt-105). Each
      message should: (1) acknowledge the sender''s specific concern (e.g., Project
      Phoenix deadline, Q4 budget, demo environment), (2) confirm the user is back
      and will address the issue today, and (3) be professional and appropriately
      brief. Score 1.0 if messages to all three contacts are personalized, reference
      the specific issue, and convey urgency and availability. Score 0.6 if messages
      are sent but are generic without referencing the specific escalation topic.
      Score 0.3 if only some contacts are messaged or messages are incomplete. Score
      0.0 if no follow-up messages are sent or messages are entirely off-topic.

      '
    type: llm_judge
  name: followup_message_quality
  weight: 0.15
task_id: contacts_gmail-308
task_name: Identify Unread Project Escalation Emails and Notify Relevant Contacts
tools:
- description: List recent emails from the Gmail inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a specific email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Search the internal contacts directory by name, email, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details of a contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a direct message to a contact via the contacts system
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
