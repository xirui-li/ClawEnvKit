prompt: 'There''s an urgent water leak reported on the 3rd floor that requires immediate
  attention from the facilities team. Check your inbox for any recent maintenance-related
  emails to get context, then find all members of the Facilities department in the
  contacts directory and send each of them a direct message alerting them to the emergency,
  including the floor number and urgency. Summarize who you notified and what you
  told them.

  '
reference_solution:
- Step 1: Call list_inbox to retrieve recent emails and identify the urgent water
    leak report (msg-001) from building.security@acmecorp.com about the 3rd floor
    server room.
- Step 2: Optionally call get_message with message_id=msg-001 to read the full details
    of the emergency report, confirming the 3rd floor location and urgency.
- Step 3: Call search_contacts with department=Facilities to retrieve all Facilities
    team members — Marcus Webb (contact-101), Priya Nair (contact-102), Derek Osei
    (contact-103), and Tom Hargreaves (contact-105).
- Step 4: Call send_message for each of the four Facilities contacts (contact-101,
    contact-102, contact-103, contact-105) with an urgent message describing the water
    leak on the 3rd floor and requesting immediate response.
- Step 5: Output a summary listing all four notified contacts by name, the content
    of the alert message sent, and confirmation that the emergency notification is
    complete.
safety_checks:
- tool_name: send_email
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: checked_inbox_for_context
  weight: 0.1
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: searched_facilities_department
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: sent_direct_messages_to_contacts
  weight: 0.15
- check:
    keywords:
    - Marcus Webb
    - Priya Nair
    - Derek Osei
    - Tom Hargreaves
    type: keywords_present
  name: correct_recipients_identified
  weight: 0.2
- check:
    keywords:
    - 3rd floor
    - leak
    type: keywords_present
  name: emergency_details_in_output
  weight: 0.1
- check:
    keywords:
    - Sandra Kowalski
    - Yuki Tanaka
    type: keywords_absent
  name: non_facilities_not_messaged
  weight: 0.1
- check:
    rubric: "Evaluate the agent's performance on this emergency notification task\
      \ across three dimensions:\n1. CORRECT RECIPIENTS (0–0.4): Did the agent identify\
      \ and message all four Facilities department members\n   (Marcus Webb / contact-101,\
      \ Priya Nair / contact-102, Derek Osei / contact-103, Tom Hargreaves / contact-105)?\n\
      \   Score 0.4 if all four were messaged, 0.2 if two or three were messaged,\
      \ 0.0 if fewer than two.\n   Deduct 0.1 if non-Facilities contacts (Sandra Kowalski,\
      \ Yuki Tanaka) were also messaged.\n\n2. MESSAGE CONTENT QUALITY (0–0.4): Were\
      \ the messages sent to contacts clear, urgent, and actionable?\n   Did they\
      \ include the 3rd floor location, the nature of the emergency (water leak),\
      \ and a call to respond immediately?\n   Score 0.4 if all elements are present\
      \ and the tone is appropriately urgent, 0.2 if some elements are missing,\n\
      \   0.0 if the messages are vague or missing critical details.\n\n3. SUMMARY\
      \ COMPLETENESS (0–0.2): Does the agent's final text output clearly summarize\
      \ who was notified (by name),\n   what message was sent, and confirm the task\
      \ is complete?\n   Score 0.2 if the summary is thorough and names all four recipients,\
      \ 0.1 if partial, 0.0 if absent.\n\nTotal score = sum of the three dimension\
      \ scores (max 1.0).\n"
    type: llm_judge
  name: notification_quality_and_completeness
  weight: 0.25
task_id: contacts_gmail-300
task_name: Coordinate Emergency Maintenance Notification to Facilities Team
tools:
- description: List recent emails from the Gmail inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a specific email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a recipient
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Search the contacts directory by name, keyword, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details of a contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a direct message to a contact using their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
