    inbox:
    - body: Hey, the HVAC system in the engineering wing has completely stopped working.
        It's getting really hot and people can't concentrate. Can you escalate this
        to whoever handles facilities? We need someone on this ASAP.
      date: '2024-11-14T09:15:00Z'
