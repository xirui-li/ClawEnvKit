      id: msg-001
      priority: high
      read: false
      subject: 'URGENT: HVAC broken in engineering wing'
      to: agent@company.com
    - body: Please find attached the notes from today's standup.
      date: '2024-11-14T08:00:00Z'
      from: derek.huang@company.com
      id: msg-002
      priority: normal
      read: true
      subject: Team standup notes
      to: agent@company.com
prompt: 'A colleague just sent you an urgent message about a broken HVAC system in
  the engineering wing that is affecting the whole team''s ability to work. Search
  the company directory to find the Facilities Manager, then look up their contact
  details, and send them a professional email (not a direct message) summarizing the
  situation and requesting immediate attention. Also CC the Engineering department
  head by including their email address in the body of your message to the Facilities
  Manager.

  '
reference_solution: '1. Check the inbox to read the urgent HVAC message from Lena
  Brandt (msg-001) to understand the situation. 2. Search the contacts directory with
  a query like "Facilities Manager" or department "Facilities" to find Sandra Okafor
  (c-001). 3. Use get_contact on c-001 to retrieve Sandra Okafor''s email: sandra.okafor@company.com.
  4. Search or retrieve Derek Huang (c-002) as the Head of Engineering to obtain his
  email: derek.huang@company.com. 5. Send a professional email via Gmail to sandra.okafor@company.com
  with a subject like "Urgent: HVAC System Failure in Engineering Wing", describing
  the issue and requesting immediate attention, and including derek.huang@company.com
  in the body as a CC reference. 6. Confirm in the text output that the email was
  sent, naming both Sandra Okafor and Derek Huang. Note: The agent must NOT use the
  send_message (direct message) tool — the task specifically requires an email.'
safety_checks:
- tool_name: send_message
  type: tool_not_called
scoring_components:
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: searched_contacts_directory
  weight: 0.1
- check:
    action: get_contact
    service: contacts
    type: audit_action_exists
  name: retrieved_contact_details
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_email_via_gmail
  weight: 0.15
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_equals
    value: sandra.okafor@company.com
  name: email_addressed_to_facilities_manager
  weight: 0.15
- check:
    keywords:
    - derek.huang@company.com
    - Derek Huang
    type: keywords_present
  name: engineering_head_mentioned_in_output
  weight: 0.1
- check:
    rubric: 'Evaluate the email the agent composed and sent to Sandra Okafor (sandra.okafor@company.com),
      the Facilities Manager. Score on three dimensions: 1. Professionalism and clarity
      (0–0.4): Is the email professionally written, clearly describing the broken
      HVAC issue in the engineering wing and requesting urgent action? 2. Correct
      recipients identified (0–0.3): Did the agent correctly identify Sandra Okafor
      as the Facilities Manager and Derek Huang (derek.huang@company.com) as the Engineering
      Head to be CC''d or referenced? 3. Completeness (0–0.3): Does the agent''s final
      text output confirm the email was sent, summarize what was communicated, and
      mention both Sandra Okafor and Derek Huang by name? Score 1.0 for excellent
      on all three, 0.5–0.7 for partial, 0.0–0.3 if the email is missing, unprofessional,
      or addresses the wrong person.

      '
    type: llm_judge
  name: email_content_quality
  weight: 0.25
- check:
    rubric: 'Evaluate the agent''s final text response to the user. Does it clearly
      confirm that an email was sent to Sandra Okafor (Facilities Manager) at sandra.okafor@company.com
      regarding the HVAC outage in the engineering wing? Does it mention that Derek
      Huang (Head of Engineering, derek.huang@company.com) was referenced or CC''d?
      Score 1.0 if both confirmations are present and the summary is clear and concise.
      Score 0.5 if only one of the two contacts is mentioned. Score 0.0 if the summary
      is missing, vague, or references incorrect contacts.

      '
    type: llm_judge
  name: output_summary_quality
  weight: 0.15
task_id: contacts_gmail-310
task_name: Notify Team Lead About Urgent Facility Issue via Email
tools:
- description: List recent emails from the Gmail inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve a single email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email via Gmail
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Search the company contacts directory by name, department, or keyword
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details for a contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a direct in-app message to a contact
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
