  name: engineering_contacts_searched
  weight: 0.1
- check:
    action: create_draft
    service: gmail
    type: audit_action_exists
  name: draft_saved_not_sent
  weight: 0.15
- check:
    keywords:
    - Sandra Okafor
    - VP of Engineering
    type: keywords_present
  name: correct_recipient_identified
  weight: 0.15
- check:
    keywords:
    - email sent
    - message delivered
    - successfully sent
    type: keywords_absent
  name: draft_not_sent_directly
  weight: 0.1
- check:
    rubric: "Evaluate the agent's overall performance on this task across three dimensions:\n\
      1. CORRECT RECIPIENT (0–0.4): Did the agent correctly identify Sandra Okafor\n\
      \   (contact-101, VP of Engineering, sandra.okafor@acmecorp.com) as the most\n\
      \   senior Engineering contact and address the draft to her? Award 0.4 if correct,\n\
      \   0.2 if addressed to another Engineering contact (e.g., Priya Nair), 0.0\
      \ if\n   addressed to someone outside Engineering or not identified.\n\n2. DRAFT\
      \ CONTENT QUALITY (0–0.4): Does the draft email acknowledge the system\n   outage\
      \ that occurred from 9:00 AM to 11:30 AM, express a genuine apology,\n   and\
      \ include a commitment to follow up within 24 hours? Award 0.4 if all three\n\
      \   elements are present, 0.2 if two are present, 0.1 if only one, 0.0 if none.\n\
      \n3. TASK COMPLIANCE — DRAFT ONLY (0–0.2): Did the agent save a draft rather\
      \ than\n   sending the email immediately? Award 0.2 if the agent explicitly\
      \ saved a draft\n   and did NOT call send_email, 0.1 if ambiguous, 0.0 if the\
      \ agent sent the email\n   directly instead of drafting it.\n\nFinal score =\
      \ sum of the three dimension scores (max 1.0).\n"
    type: llm_judge
  name: draft_quality_and_completeness
  weight: 0.3
task_id: contacts_gmail-304
task_name: Draft Apology Email to Affected Department After System Outage
tools:
- description: List recent emails from the Gmail inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a specific email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email immediately
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email as a draft for later review before sending
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
- description: Search the contacts directory by name, keyword, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details of a specific contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a direct message to a contact via the contacts service
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
