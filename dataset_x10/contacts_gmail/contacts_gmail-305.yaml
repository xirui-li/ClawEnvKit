prompt: 'There''s an active production incident affecting the payment processing system.
  I need you to find all engineers in the Infrastructure department from our contacts
  directory, then check my inbox for any recent emails about the payment outage to
  get context, and finally send a direct message to each Infrastructure engineer alerting
  them about the incident with a brief summary of what''s happening. Make sure your
  response lists all the engineers you contacted and confirms the messages were sent.

  '
reference_solution:
- action: Call list_inbox to retrieve recent emails and identify the payment outage
    incident context (messages msg-001, msg-002, msg-003).
  step: 1
- action: Optionally call get_message on the high-priority incident emails to read
    full details about the 503 errors, load balancer misconfiguration, and P0 escalation.
  step: 2
- action: Call search_contacts with department=Infrastructure to retrieve all Infrastructure
    team members (Priya Nair, Marcus Webb, Yuki Tanaka, Darnell Foster, Aisha Okonkwo).
  step: 3
- action: For each Infrastructure contact (contact-101 through contact-104 and contact-107),
    call send_message with a concise incident alert referencing the payment outage,
    503 errors, suspected load balancer cause, and P0 severity.
  step: 4
- action: Respond with a summary listing all 5 engineers contacted by name, the message
    content sent, and confirmation that messages were delivered. Do NOT message Sofia
    Reyes (Engineering) or Tom Hargreaves (DevOps).
  step: 5
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: searched_infrastructure_contacts
  weight: 0.15
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: checked_inbox_for_incident_context
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: sent_messages_to_engineers
  weight: 0.15
- check:
    keywords:
    - Priya Nair
    - Marcus Webb
    - Yuki Tanaka
    - Darnell Foster
    - Aisha Okonkwo
    type: keywords_present
  name: all_four_engineers_mentioned
  weight: 0.2
- check:
    keywords:
    - payment
    - outage
    type: keywords_present
  name: incident_context_included
  weight: 0.1
- check:
    keywords:
    - Sofia Reyes was messaged
    - Tom Hargreaves was messaged
    - sent message to Sofia
    - sent message to Tom
    type: keywords_absent
  name: non_infra_not_messaged
  weight: 0.1
- check:
    rubric: "Evaluate the agent's response on three dimensions:\n1. COMPLETENESS (0-1):\
      \ Did the agent identify and message all 5 Infrastructure engineers\n   (Priya\
      \ Nair contact-101, Marcus Webb contact-102, Yuki Tanaka contact-103,\n   Darnell\
      \ Foster contact-104, Aisha Okonkwo contact-107)? Score 1.0 if all 5 confirmed,\n\
      \   0.6 if 3-4 contacted, 0.2 if fewer than 3.\n\n2. INCIDENT CONTEXT (0-1):\
      \ Did the agent incorporate relevant details from the inbox emails\n   (e.g.,\
      \ payment gateway 503 errors, load balancer misconfiguration, P0 escalation\
      \ from CTO,\n   14:15 UTC deployment rollback) into the alert messages or summary?\
      \ Score 1.0 if 2+ specific\n   details referenced, 0.5 if only generic mention\
      \ of outage, 0.0 if no context used.\n\n3. ACCURACY (0-1): Did the agent correctly\
      \ exclude non-Infrastructure contacts\n   (Sofia Reyes from Engineering, Tom\
      \ Hargreaves from DevOps) from the messaging?\n   Score 1.0 if correctly excluded,\
      \ 0.0 if either was messaged.\n\nFinal score = average of the three dimensions.\n"
    type: llm_judge
  name: quality_and_completeness
  weight: 0.2
task_id: contacts_gmail-305
task_name: Find and Notify On-Call Engineers for Production Incident
tools:
- description: List recent emails from Gmail inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve a single email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Search contacts by name, keyword, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full details of a contact by ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a direct message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: Send an email via Gmail
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
