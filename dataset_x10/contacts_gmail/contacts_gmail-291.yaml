  name: checked_inbox_for_outage_context
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: sent_messages_to_leads
  weight: 0.15
- check:
    keywords:
    - payment
    - outage
    - incident
    - bridge
    type: keywords_present
  name: outage_context_in_messages
  weight: 0.15
- check:
    keywords:
    - Marcus Webb
    - Priya Nair
    - Fatima Al-Rashid
    - Aisha Okonkwo
    type: keywords_present
  name: correct_recipients_identified
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s overall performance on this incident notification
      task across three dimensions:

      1. CONTACT IDENTIFICATION (0–0.4): Did the agent correctly identify the senior
      Engineering contacts to notify? The Engineering department contains: Priya Nair
      (Senior Software Engineer, c-001), Marcus Webb (Engineering Lead, c-002), Tomás
      Herrera (Junior Software Engineer, c-003), Aisha Okonkwo (Staff Engineer, c-004),
      and Fatima Al-Rashid (Principal Engineer, c-006). The agent should have prioritized
      leads and senior staff: Marcus Webb, Aisha Okonkwo, Fatima Al-Rashid, and Priya
      Nair. Tomás Herrera (Junior) is lower priority. Score 0.4 if 3+ senior contacts
      identified, 0.2 if 1–2, 0.0 if none or only junior.

      2. INBOX CONTEXT INTEGRATION (0–0.3): Did the agent check the inbox and incorporate
      relevant outage details into the messages? The inbox contains msg-001 (94% error
      rate, incident bridge URL https://bridge.company.com/incident-4471, affected
      endpoints) and msg-002 (James Kowalski''s note about database connection pool
      issue). Score 0.3 if the agent referenced the incident bridge link or specific
      error details in the messages, 0.15 if inbox was checked but context was only
      vaguely referenced, 0.0 if inbox was ignored.

      3. MESSAGE URGENCY AND CLARITY (0–0.3): Were the messages sent to contacts urgent,
      clear, and actionable? A good message should convey: critical production outage,
      payment system affected, request to join incident bridge immediately, and any
      relevant technical context. Score 0.3 if messages are urgent, specific, and
      include the bridge or action step; 0.15 if messages are generic but mention
      the outage; 0.0 if messages are vague or missing key urgency.

      Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: message_quality_and_completeness
  weight: 0.35
task_id: contacts_gmail-291
task_name: Find and Notify Engineering Leads About Critical Outage
tools:
- description: Search the contacts directory by name, keyword, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details for a specific contact by their ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send an internal message to a contact via the contacts system
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: List recent emails from the Gmail inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a specific email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email via Gmail
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft in Gmail
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
