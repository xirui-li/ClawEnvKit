category: operations
claw_eval_id: T18_ticket_triage
difficulty: medium
fixtures:
  tickets:
  - category: billing
    created_at: '2024-07-15T23:12:00Z'
    created_by: maria.chen@example.com
    description: Customer Maria Chen reports her card is being declined at checkout
      despite sufficient funds. Issue started around 11 PM last night.
    id: TKT-1041
    priority: high
    status: open
    title: Unable to process payment — card declined
  - category: billing
    created_at: '2024-07-15T23:45:00Z'
    created_by: james.okafor@example.com
    description: Customer James Okafor says his monthly invoice did not arrive and
      his subscription dashboard shows an error.
    id: TKT-1042
    priority: medium
    status: open
    title: Invoice not generated for July subscription
  - category: access
    created_at: '2024-07-16T00:03:00Z'
    created_by: priya.nair@example.com
    description: Customer Priya Nair cannot log in at all — getting a 503 Service
      Unavailable. Reported at midnight.
    id: TKT-1043
    priority: high
    status: open
    title: Login page returns 503 error
  - category: billing
    created_at: '2024-07-16T00:22:00Z'
    created_by: tom.reyes@example.com
    description: Customer Tom Reyes sees two identical charges of $49.99 on his account
