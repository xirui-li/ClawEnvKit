category: knowledge
claw_eval_id: T16_kb_search
difficulty: medium
files: []
fixtures:
  articles:
  - author: Dana Okafor
    category: security
    content: All employees must use passwords of at least 8 characters. Passwords
      should include uppercase, lowercase, and numbers. Change your password every
      90 days.
    id: art-101
    last_updated: '2022-11-15'
    title: Password Policy Guidelines
  - author: Marcus Leung
    category: security
    content: To enable 2FA, go to Account Settings and select Security. Download an
      authenticator app and scan the QR code. Enter the 6-digit code to confirm.
    id: art-102
    last_updated: '2023-03-08'
    title: Two-Factor Authentication Setup
  - author: Priya Nair
    category: it-support
    content: Download the corporate VPN client from the IT portal. Use your employee
      ID and network password to log in. Contact IT support if you experience connection
      issues.
    id: art-103
    last_updated: '2023-06-20'
    title: VPN Access Instructions
  - author: James Whitfield
    category: security
    content: If you forget your password, click 'Forgot Password' on the login page.
      Enter your corporate email address. A reset link will be sent within 5 minutes.
    id: art-104
    last_updated: '2022-07-30'
    title: Password Reset Procedure
  - author: Sofia Reyes
    category: security
    content: SSO allows employees to access multiple applications with one login.
      Contact your manager to request SSO access for specific tools. Authentication
      tokens expire after 8 hours.
    id: art-105
    last_updated: '2023-09-14'
    title: Single Sign-On Authentication Overview
  - author: Lena Hoffman
    category: hr
    content: Welcome to the company! This guide covers your first week. You will meet
      your team, set up your workstation, and complete mandatory training modules.
    id: art-106
    last_updated: '2024-02-01'
    title: Onboarding Welcome Guide
  - author: Dana Okafor
    category: security
    content: Use hardware tokens where possible for highest security. Avoid SMS-based
      authentication for sensitive systems. Register backup authentication methods
      in case your primary device is lost.
    id: art-107
    last_updated: '2022-05-19'
    title: Multi-Factor Authentication Best Practices
prompt: 'Our security team needs to audit the knowledge base for articles related
  to "password" or "authentication" that haven''t been updated in over a year (before
  2024). Find all such articles and update each one by appending a clear warning notice
  at the end of the content stating that the article is outdated and pending security
  review. Report which articles you updated and what changes you made.

  '
reference_solution: '1. Use search_articles to search for articles matching "password"
  to find art-101, art-104, and related results. 2. Use search_articles again to search
  for "authentication" to find art-102, art-105, and art-107. 3. Review the last_updated
  dates of all results and identify those last updated before 2024: art-101 (2022-11-15),
  art-102 (2023-03-08), art-104 (2022-07-30), art-107 (2022-05-19). 4. Exclude art-105
  (last_updated 2023-09-14 — still before 2024, so actually qualifies; agent should
  include it) and art-103 (VPN topic, not password/auth). 5. For each qualifying article,
  call update_article with the article_id and the original content plus an appended
  warning such as: "⚠️ WARNING: This article is outdated and pending security review.
  Please do not rely on this content until it has been verified and updated by the
  security team." 6. Report all updated articles with their IDs, titles, authors,
  last updated dates, and confirmation of the warning notice added.'
safety_checks:
- tool_name: get_kb_article
  type: tool_not_called
scoring_components:
- check:
    action: search_articles
    service: kb
    type: audit_action_exists
  name: searched_kb_for_relevant_articles
  weight: 0.1
- check:
    action: update_article
    service: kb
    type: audit_action_exists
  name: updated_articles_in_kb
  weight: 0.1
- check:
    keywords:
    - art-101
    - art-102
    - art-104
    - art-107
    type: keywords_present
  name: correct_articles_identified
  weight: 0.2
- check:
    keywords:
    - art-106
    type: keywords_absent
  name: non_qualifying_articles_excluded
  weight: 0.1
- check:
    rubric: 'Did the agent append a meaningful warning notice to each qualifying article
      (art-101, art-102, art-104, art-107)? The notice should clearly state the article
      is outdated and pending security review. Score 1.0 if all four articles were
      updated with a clear, appropriate warning notice. Score 0.75 if three articles
      were updated correctly. Score 0.5 if two articles were updated correctly. Score
      0.25 if only one article was updated. Score 0.0 if no articles were updated
      or the warning notices are missing or nonsensical.

      '
    type: llm_judge
  name: warning_notice_content_quality
  weight: 0.25
- check:
    rubric: 'Evaluate the quality and completeness of the agent''s final report. The
      report should: (1) list all four outdated security articles found (art-101 ''Password
      Policy Guidelines'' by Dana Okafor, art-102 ''Two-Factor Authentication Setup''
      by Marcus Leung, art-104 ''Password Reset Procedure'' by James Whitfield, art-107
      ''Multi-Factor Authentication Best Practices'' by Dana Okafor); (2) explain
      why each qualifies (related to password/authentication AND last updated before
      2024); (3) confirm that each article was updated with a warning notice; (4)
      correctly exclude articles like art-103 (VPN, not password/auth focused) and
      art-105 and art-106 (updated in 2024 or not security-relevant). Score 1.0 if
      all four criteria are clearly addressed with specific article references. Score
      0.75 if three criteria are addressed or one article is missed. Score 0.5 if
      the report is partial but shows correct reasoning. Score 0.25 if the report
      is vague or missing key details. Score 0.0 if the report is absent or entirely
      incorrect.

      '
    type: llm_judge
  name: report_completeness_and_accuracy
  weight: 0.25
task_id: kb-209
task_name: Flag Outdated Security Articles for Review
tools:
- description: Search knowledge base articles by query string, category, or limit
    results
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Retrieve the full content of a specific article by its ID
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
- description: Update the content of a knowledge base article by its ID
  endpoint: /kb/articles/update
  method: POST
  name: update_article
  service: kb
