- check:
    rubric: Evaluate whether the agent clearly and accurately reports the completed
      KB update. Score 1.0 if the response states that KB-101 ('Shipping Options and
      Delivery Times') was the article updated, summarizes all three inserted festival
      details (free standard shipping for orders placed by April 10, expedited shipping
      unavailable from April 8 to April 12, and contact logistics@northstarcrafts.com
      for shipping issues), and does not claim unrelated articles like KB-104 or KB-103
      were changed. Score 0.7 if the correct article is identified and at least two
      of the three changes are summarized accurately. Score 0.4 if the article is
      correct but only one change is summarized or the summary is vague. Score 0.0
      if the wrong article is reported or the update summary is materially incorrect.
    type: llm_judge
  name: response_quality
  weight: 0.15
