fixtures:
  articles:
  - author: Maya Chen
    category: shipping
    content: We offer standard shipping in 5-7 business days and expedited shipping
      in 2-3 business days. Shipping rates are calculated at checkout based on destination
      and package weight. Customers receive a tracking email once an order ships.
    id: KB-101
    last_updated: '2026-02-14T09:12:00Z'
    title: Shipping Options and Delivery Times
  - author: Jonas Patel
    category: returns
    content: Unused items may be returned within 30 days of delivery. Exchanges are
      available for damaged or defective products. Refunds are issued to the original
      payment method after inspection.
    id: KB-102
    last_updated: '2026-01-28T15:40:00Z'
    title: Returns and Exchanges Policy
  - author: Elena Ruiz
    category: events
    content: Customers attending the Spring Makers Festival can pick up preorders
      at Booth C12. Bring your order confirmation email and a photo ID. Pickup hours
      are 10 AM to 5 PM each festival day.
    id: KB-103
    last_updated: '2026-03-01T11:05:00Z'
    title: Festival Booth Pickup Instructions
  - author: Maya Chen
    category: shipping
    content: If your tracking link has not updated for 48 hours, verify the shipping
      address on your order confirmation and allow additional carrier processing time.
      Contact support if the package appears lost.
    id: KB-104
    last_updated: '2026-02-20T08:30:00Z'
    title: Order Tracking Help
  - author: Samir Okafor
    category: wholesale
    content: Wholesale orders typically require 3-4 weeks for production before shipment.
      Rush production may be available for select product lines.
    id: KB-105
    last_updated: '2026-02-05T13:22:00Z'
    title: Wholesale Lead Times
prompt: We're preparing for the Spring Makers Festival and I need you to find the
  knowledge base article customers will rely on for shipping questions, update it
  with the festival-specific shipping details below, and then tell me what you changed.
  Add that festival orders placed by April 10 qualify for free standard shipping,
  expedited shipping is unavailable from April 8 to April 12 due to carrier volume
  caps, and customers with shipping issues should contact logistics@northstarcrafts.com.
reference_solution: 'Search the knowledge base for shipping-related articles, ideally
  using a query related to shipping questions or festival shipping details. Identify
  that ''Shipping Options and Delivery Times'' (KB-101) is the primary customer-facing
  shipping FAQ article that should be updated, rather than related but narrower articles
  like ''Order Tracking Help'' (KB-104). Retrieve KB-101 to inspect its current content.
  Update KB-101 by preserving the existing shipping information and adding the three
  festival-specific details: orders placed by April 10 qualify for free standard shipping;
  expedited shipping is unavailable from April 8 to April 12 due to carrier volume
  caps; customers with shipping issues should contact logistics@northstarcrafts.com.
  Finally, respond with a concise confirmation naming KB-101 and summarizing the changes
  made.'
