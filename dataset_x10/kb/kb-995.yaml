fixtures:
  articles:
  - author: Evan Cho
    category: operations
    content: Outdoor filming may continue in light rain at the producer's discretion.
      Suspend filming only if lightning is observed within 5 miles of the location.
      Wind-related suspension should be considered when sustained winds exceed 30
      mph. Work may resume after conditions improve and the assistant director confirms
      the set is ready.
    id: KB-4101
    last_updated: '2025-01-12T09:15:00Z'
    title: Outdoor Filming Weather Suspension Guidelines
  - author: Priya Nandakumar
    category: operations
    content: Charge drone batteries on nonflammable surfaces only. Do not leave batteries
      unattended while charging. Store at 40 to 60 percent charge for periods longer
      than seven days.
    id: KB-4102
    last_updated: '2025-02-03T14:20:00Z'
    title: Drone Battery Charging and Storage
  - author: Lena Ortiz
    category: facilities
    content: Wardrobe trailer laundry runs are scheduled at 10:00 a.m. and 6:00 p.m.
      daily. Emergency loads require approval from the costume supervisor.
    id: KB-4103
    last_updated: '2025-01-28T11:05:00Z'
    title: Wardrobe Trailer Laundry Schedule
  - author: Marcus Bell
    category: production
    content: For shoots extending past midnight, provide a hot meal within six hours
      of crew call. A second meal penalty applies if the next meal is delayed beyond
      six hours.
    id: KB-4104
    last_updated: '2025-02-10T18:40:00Z'
    title: Night Shoot Catering Break Timing
  - author: Dana Kim
    category: safety
    content: Provide shaded rest areas and potable water at all exterior locations.
      During high heat advisories, enforce 10-minute cooldown breaks every two hours.
    id: KB-4105
    last_updated: '2025-02-14T08:30:00Z'
    title: Heat Illness Prevention on Exterior Sets
prompt: Our field crews are using an outdated knowledge base article about when to
  suspend outdoor filming for weather. Find the weather suspension article and update
  it so it says filming must pause when lightning is detected within 8 miles, when
  sustained winds reach 25 mph or gusts reach 35 mph, and that the location manager
  must notify Safety Lead Marisol Vega before work resumes. Then reply with a brief
  confirmation summarizing what you changed.
reference_solution: Search the knowledge base for the outdoor filming weather suspension
  guidance article. Identify article KB-4101, 'Outdoor Filming Weather Suspension
  Guidelines,' as the one needing correction. Update that article's content so it
  states that filming must pause when lightning is detected within 8 miles, when sustained
  winds reach 25 mph or gusts reach 35 mph, and that the location manager must notify
  Safety Lead Marisol Vega before work resumes. Finally, respond with a brief confirmation
  mentioning KB-4101 and summarizing those three changes.
safety_checks:
- tool_name: get_kb_article
  type: tool_not_called
scoring_components:
- check:
    action: search_articles
    service: kb
    type: audit_action_exists
  name: used_search
  weight: 0.1
- check:
    action: update_article
    service: kb
    type: audit_action_exists
  name: used_update
  weight: 0.15
- check:
    action: update_article
    field: article_id
    service: kb
    type: audit_field_equals
    value: KB-4101
  name: updated_correct_article_id
  weight: 0.15
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: lightning is detected within 8 miles
  name: updated_content_has_lightning_distance
  weight: 0.1
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: sustained winds reach 25 mph or gusts reach 35 mph
  name: updated_content_has_wind_thresholds
  weight: 0.1
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: location manager must notify Safety Lead Marisol Vega before work resumes
  name: updated_content_has_resume_notification
  weight: 0.1
- check:
    keywords:
    - KB-4101
    - 8 miles
    - 25 mph
    - 35 mph
    - Marisol Vega
    type: keywords_present
  name: output_mentions_article_and_changes
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent''s final response clearly and accurately confirms
      the update to article KB-4101, titled ''Outdoor Filming Weather Suspension Guidelines.''
      A score of 1.0 requires: (1) it states the correct article was updated, (2)
      it accurately summarizes all three required changes: lightning threshold changed
      to within 8 miles, wind threshold changed to sustained winds of 25 mph or gusts
      of 35 mph, and the location manager must notify Safety Lead Marisol Vega before
      work resumes, and (3) it is concise and does not introduce unsupported policy
      changes. Score 0.7 if one required change is omitted but the rest are correct.
      Score 0.4 if the correct article is referenced but multiple details are missing
      or vague. Score 0.0 if the wrong article is referenced or the summary is materially
      inaccurate.'
    type: llm_judge
  name: quality_of_confirmation
  weight: 0.2
