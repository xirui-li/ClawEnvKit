- check:
    rubric: 'Evaluate whether the agent correctly updated article KB-4101, ''Prop
      Warehouse Fog Machine Storage and Checkout,'' and accurately summarized the
      changes. Full credit (1.0) if the response clearly reflects all core corrections:
      fog machines are stored in the ventilated effects cabinet rather than Shelf
      C; checkout requires stage operations supervisor approval rather than no advance
      notice; maximum checkout duration is 24 hours rather than 48 hours; and tanks
      must be emptied before storage rather than fluid remaining in the tank. Partial
      credit (0.5) if only 2-3 of these corrections are accurately conveyed. Score
      0.0 if the response is vague, keeps outdated guidance, or refers to the wrong
      article.'
