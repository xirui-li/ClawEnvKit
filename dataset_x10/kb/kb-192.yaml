prompt: I'm preparing for our investor day and noticed our internal knowledge base
  may have outdated event logistics. Find the article about the 2025 investor day
  venue, correct it so it reflects the current location and entry instructions, and
  then reply with a brief confirmation summarizing what you changed.
reference_solution:
- Identify the relevant knowledge base article about investor day logistics, focusing
  on the event venue article.
- Retrieve article KB-201 to inspect its current content and confirm it contains outdated
  logistics.
- 'Update KB-201 so the content replaces the old venue and access details with the
  current information: Summit Hall, 455 Meridian Avenue, Boston, and instructions
  to enter through the east entrance and check in at the investor registration desk.'
- Respond with a short confirmation that specifies KB-201 was updated and summarizes
  the corrected venue and entry instructions.
safety_checks:
- tool_name: search_articles
  type: tool_not_called
scoring_components:
- check:
    action: get_kb_article
    service: kb
    type: audit_action_exists
  name: used_article_retrieval
  weight: 0.12
- check:
    action: update_article
    service: kb
    type: audit_action_exists
  name: used_article_update
  weight: 0.12
- check:
    action: update_article
    field: article_id
    service: kb
    type: audit_field_equals
    value: KB-201
  name: updated_correct_article
  weight: 0.14
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: Summit Hall, 455 Meridian Avenue, Boston
  name: updated_content_has_correct_venue
  weight: 0.12
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: enter through the east entrance and check in at the investor registration
      desk
  name: updated_content_has_correct_access
  weight: 0.1
- check:
    actions:
    - get_kb_article
    - update_article
    service: kb
    type: audit_sequence
  name: logical_order_get_before_update
  weight: 0.1
- check:
    keywords:
    - KB-201
    - Summit Hall
    - 455 Meridian Avenue
    - east entrance
    - investor registration desk
    type: keywords_present
  name: output_mentions_key_changes
  weight: 0.1
- check:
    keywords:
    - Harbor Center
    - 18 Dock Lane
    - public waterfront doors
    - main lobby desk
    type: keywords_absent
  name: output_avoids_old_details
  weight: 0.08
- check:
    rubric: Evaluate whether the agent clearly confirms that article KB-201 ('2025
      Investor Day logistics') was the one updated, accurately states the corrected
      venue as Summit Hall, 455 Meridian Avenue, Boston, and accurately states the
      revised entry instructions as entering through the east entrance and checking
      in at the investor registration desk. Score 1.0 if all details are correct and
      the summary is concise and complete; 0.5 if the correct article is identified
      but one key detail is missing or imprecise; 0.0 if the wrong article is referenced
      or the summary contradicts the fixture-based update requirements.
    type: llm_judge
  name: response_quality_and_accuracy
  weight: 0.12
scoring_components_note: Weights sum to 1.0
