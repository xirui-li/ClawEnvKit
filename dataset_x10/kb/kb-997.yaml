- check:
    action: get_kb_article
    service: kb
    type: audit_action_exists
  name: used_article_retrieval
  weight: 0.12
- check:
    action: update_article
    service: kb
    type: audit_action_exists
  name: used_article_update
  weight: 0.12
- check:
    action: update_article
    field: article_id
    service: kb
    type: audit_field_equals
    value: KB-4101
  name: updated_correct_article
  weight: 0.14
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: Thursday 2:00 PM
  name: updated_content_includes_new_cutoff
  weight: 0.1
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: 120 Wh
  name: updated_content_includes_new_wh_limit
  weight: 0.1
- check:
    actions:
    - get_kb_article
    - update_article
    service: kb
    type: audit_sequence
  name: logical_order_get_before_update
  weight: 0.08
- check:
    keywords:
    - KB-4101
    - Desert Bloom Arts Festival
    - Thursday 2:00 PM
    - 120 Wh
    type: keywords_present
  name: output_mentions_key_changes
  weight: 0.14
- check:
    keywords:
    - 160 Wh
    - Wednesday 6:00 PM
    type: keywords_absent
  name: output_avoids_wrong_old_values
  weight: 0.08
- check:
    rubric: 'Evaluate whether the agent clearly confirms that article KB-4101 (''Desert
      Bloom Arts Festival: Drone Battery Shipping Rules'') was the one updated, accurately
      states both required corrections, and does not introduce unrelated edits. Score
      1.0 if the response explicitly says the carrier cutoff changed from Wednesday
      6:00 PM to Thursday 2:00 PM and the battery limit changed from 160 Wh to 120
      Wh, while keeping the summary concise and operationally useful. Score 0.5 if
      it identifies the correct article but misses one change or states one change
      ambiguously. Score 0.0 if it references the wrong article, omits both changes,
      or includes incorrect operational details.'
    type: llm_judge
  name: response_quality_and_accuracy
  weight: 0.12
