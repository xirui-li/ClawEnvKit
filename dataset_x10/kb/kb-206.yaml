  weight: 0.08
- check:
    keywords:
    - KB-4101
    - Bayview Ferry Terminal Shuttle and Parking
    - temporary pickup zone beside Lot D
    - 6:00 AM to 10:30 PM
    type: keywords_present
  name: output_mentions_article_and_changes
  weight: 0.13
- check:
    keywords:
    - KB-4102
    - KB-4103
    - KB-4105
    type: keywords_absent
  name: output_avoids_wrong_article_ids
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent clearly reports that it updated article KB-4101,
      titled ''Bayview Ferry Terminal Shuttle and Parking'', and accurately summarizes
      the revised guidance. A perfect score requires all of the following: (1) identifies
      the correct article by ID or exact title, (2) states that the shuttle pickup
      moved from the old east curb outside Gate 2 guidance to the temporary pickup
      zone beside Lot D, (3) states the revised operating hours as 6:00 AM to 10:30
      PM, and (4) presents the result concisely as a confirmation plus summary. Score
      0.75 if one detail is missing or slightly vague, 0.5 if the correct article
      is identified but the summary is incomplete, and 0.0 if the wrong article is
      referenced or the changes are materially incorrect.'
    type: llm_judge
  name: response_quality
  weight: 0.2
