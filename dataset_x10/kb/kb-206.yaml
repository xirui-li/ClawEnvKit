category: knowledge
claw_eval_id: T16_kb_search
difficulty: medium
fixtures:
  articles:
  - author: Nina Alvarez
    category: transportation
    content: Passengers using the Bayview Ferry Terminal can park in Lot C and board
      the complimentary shuttle from the east curb outside Gate 2. Shuttle service
      runs daily from 5:30 AM to 11:00 PM every 20 minutes. During peak commute windows,
      attendants may direct overflow parking to Lot D.
    id: KB-4101
    last_updated: '2026-03-18T09:15:00Z'
    title: Bayview Ferry Terminal Shuttle and Parking
  - author: Marcus Lee
    category: transportation
    content: The Harbor Garage accepts tap-to-pay cards, mobile wallets, and prepaid
      validation codes issued by conference organizers. Lost ticket fees are assessed
      at the daily maximum rate.
    id: KB-4102
    last_updated: '2026-02-27T14:02:00Z'
    title: Harbor Garage Payment Options
  - author: Nina Alvarez
    category: transportation
    content: Covered bicycle lockers are available on the north side of the Bayview
      Ferry Terminal. Riders must register for a locker code through the commuter
      portal before first use.
    id: KB-4103
    last_updated: '2026-01-30T08:40:00Z'
    title: Bayview Ferry Terminal Bicycle Storage
  - author: Operations Desk
    category: alerts
    content: Due to roadway repairs near the Bayview waterfront, private vehicles
      should expect delays on Harbor Drive. Travelers are encouraged to allow an extra
      15 minutes for arrival.
    id: KB-4104
    last_updated: '2026-04-01T06:20:00Z'
    title: Storm Week Passenger Advisory
  - author: Elena Brooks
    category: events
    content: For ticketed evening events at South Pier, shuttle pickup begins 90 minutes
      before doors open and departs from the west plaza rideshare lane.
    id: KB-4105
    last_updated: '2026-03-05T11:55:00Z'
    title: South Pier Event Shuttle Schedule
prompt: Our harbor operations team says one knowledge base article about the Bayview
  ferry terminal shuttle is outdated after this week's storm reroute. Find the right
  article, update it so it reflects the current shuttle pickup location and operating
  hours, and then tell me which article you changed plus a brief summary of the new
  guidance.
reference_solution: 'Search the knowledge base for Bayview ferry terminal shuttle
  information, ideally within the transportation category, to locate the outdated
  article. Identify KB-4101, ''Bayview Ferry Terminal Shuttle and Parking,'' as the
  article that contains the old pickup location and hours. Update that article''s
  content so it reflects the current guidance: shuttle pickup is now at the temporary
  pickup zone beside Lot D, and service runs daily from 6:00 AM to 10:30 PM. Then
  respond with a short confirmation naming KB-4101 and summarizing the two key changes.'
