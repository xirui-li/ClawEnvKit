    id: KB-203
    last_updated: '2025-02-18T11:05:00Z'
    title: Requesting Workplace Accommodations
  - author: Samir Bose
    category: events
    content: Approved therapy dog visits may be scheduled for designated wellness
      events coordinated by People Operations. Event organizers must confirm insurance
