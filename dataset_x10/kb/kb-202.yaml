category: knowledge
claw_eval_id: T16_kb_search
difficulty: medium
fixtures:
  articles:
  - author: Mina Patel
    category: workplace
    content: All visitors must check in at reception, wear a badge, and be escorted
      by their host while on site. Deliveries should be directed to the loading entrance.
    id: KB-201
    last_updated: '2025-01-10T09:15:00Z'
    title: Office Visitor Check-In Procedure
  - author: Jordan Lee
    category: workplace
    content: Employees may occasionally bring well-behaved pets to the office with
