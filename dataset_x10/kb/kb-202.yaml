    id: KB-204
    last_updated: '2025-03-01T16:40:00Z'
    title: Therapy Dog Visit Guidelines for Wellness Events
  - author: Nora Chen
    category: workplace
    content: Use headphones for calls, keep shared desks tidy, and reserve focus rooms
      for quiet work. Food with strong odors should be avoided in common areas.
    id: KB-205
    last_updated: '2025-01-27T08:55:00Z'
    title: Open Office Etiquette
prompt: Our workplace team found that the knowledge base article about bringing animals
  to the office is misleading. Please update the correct article so it clearly states
  that pets are not allowed in the office, trained service animals are permitted,
  emotional support animals require HR review before any visit, and employees should
  contact workplace@northstar.example for accommodation questions. Then tell me which
  article you updated and summarize the changes.
reference_solution: Search the knowledge base for the office animal or pet policy
  article in the workplace category. Identify KB-202, 'Bringing Pets to the Office,'
  as the article containing the outdated statement that pets may be brought with manager
  approval. Retrieve it if needed to confirm the current wording. Update KB-202 so
  the content clearly states that pets are not allowed in the office, trained service
  animals are permitted, emotional support animals require HR review before any visit,
  and employees should contact workplace@northstar.example for accommodation questions.
  Finally, respond with a concise confirmation naming KB-202 and summarizing the policy
  changes.
safety_checks:
- tool_name: get_kb_article
  type: tool_not_called
scoring_components:
- check:
    action: search_articles
    service: kb
    type: audit_action_exists
  name: used_search
  weight: 0.1
- check:
    action: update_article
    service: kb
    type: audit_action_exists
  name: used_article_update
  weight: 0.15
- check:
    action: update_article
    field: article_id
    service: kb
    type: audit_field_equals
    value: KB-202
  name: updated_correct_article
  weight: 0.15
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: trained service animals are permitted
  name: content_reflects_service_animals_only
  weight: 0.15
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: emotional support animals require HR review before any visit
  name: content_includes_hr_review_and_contact
  weight: 0.1
- check:
    keywords:
    - KB-202
    - Bringing Pets to the Office
    - pets are not allowed
    - service animals
    - workplace@northstar.example
    type: keywords_present
  name: output_mentions_article_and_summary
  weight: 0.1
- check:
    keywords:
    - manager approval
    - employees may occasionally bring well-behaved pets
    type: keywords_absent
  name: output_avoids_wrong_policy
  weight: 0.05
- check:
    rubric: Evaluate whether the agent correctly updated the workplace article KB-202
      titled 'Bringing Pets to the Office' rather than unrelated articles like KB-203
      or KB-204, and whether the final response accurately summarizes the new policy.
      Score 1.0 if the response clearly states that pets are not allowed in the office,
      trained service animals are permitted, emotional support animals require HR
      review before any visit, and accommodation questions should go to workplace@northstar.example,
      while naming KB-202 or its title. Score 0.5 if the correct article is identified
      but one required policy detail is missing or vague. Score 0.0 if the wrong article
      is referenced or the summary materially preserves the old pet-friendly policy.
    type: llm_judge
  name: response_quality
  weight: 0.2
task_id: kb-202
task_name: Update office pet policy article for service animal clarification
tools:
