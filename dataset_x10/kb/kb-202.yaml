  name: search_articles
  service: kb
- description: Retrieve a knowledge base article by article ID
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
- description: Update the content of a knowledge base article
  endpoint: /kb/articles/update
  method: POST
  name: update_article
  service: kb
