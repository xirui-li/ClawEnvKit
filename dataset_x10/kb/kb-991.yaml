prompt: A touring artist manager says our knowledge base article about Studio B's
  backline is wrong about the piano. Please verify the current article, update it
  so it clearly states that Studio B does not have an acoustic grand piano on site
  and that keyboard rentals must be arranged through SoundCart Rentals with at least
  48 hours' notice, then tell me what you changed.
reference_solution: Identify the relevant article about Studio B backline information,
  retrieve it to confirm the current incorrect wording, then update article kb-4101
  so the content no longer says an acoustic grand piano is available on request. Replace
  that section with language stating that Studio B does not have an acoustic grand
  piano on site and that keyboard rentals must be arranged through SoundCart Rentals
  with at least 48 hours' notice. Finally, respond with a concise summary of the changes
  made, mentioning Studio B, the removed incorrect piano claim, SoundCart Rentals,
  and the 48-hour notice requirement.
