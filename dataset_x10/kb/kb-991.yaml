- check:
    rubric: 'Evaluate whether the agent clearly and accurately reports the completed
      KB correction for article kb-4101, ''Studio B Backline and Instrument Availability.''
      A score of 1.0 requires: (1) stating that the incorrect claim about an acoustic
      grand piano was corrected, (2) stating that Studio B does not have an acoustic
      grand piano on site, (3) stating that keyboard rentals must be arranged through
      SoundCart Rentals, (4) including the 48-hour notice requirement, and (5) briefly
