fixtures:
  articles:
  - author: Mina Alvarez
    category: health-services
    content: The Harbor Point pop-up flu clinic operates every Saturday in October
      from 9:00 AM to 2:00 PM at Pier Community Hall. Walk-ins are welcome. The clinic
      is open to all ages. Patients should bring a photo ID and insurance card if
      available.
    id: KB-4101
    last_updated: '2026-09-18T10:12:00Z'
    title: Harbor Point Pop-Up Flu Clinic
  - author: Devon Shah
    category: health-services
    content: Riverbend Family Health offers pediatric vaccination appointments for
      children from 6 months through 11 years old. Appointments are required. Parents
      or guardians should bring the child's insurance information and immunization
      record.
    id: KB-4102
    last_updated: '2026-09-10T08:45:00Z'
    title: Riverbend Family Health Pediatric Appointments
  - author: Lena Brooks
    category: health-services
    content: Patients receiving seasonal vaccines should bring a government-issued
      photo ID when possible. Minors must be accompanied by a parent or legal guardian
      unless otherwise noted by clinic policy.
    id: KB-4103
    last_updated: '2026-09-05T14:20:00Z'
    title: Seasonal Vaccine Consent and ID Requirements
  - author: Owen Price
    category: community-programs
    content: The Mobile Wellness Bus visits East Market Plaza on Tuesdays and Cedar
      Grove Library on Thursdays for blood pressure screenings and health education.
      No vaccines are administered on the bus.
    id: KB-4104
    last_updated: '2026-09-01T12:00:00Z'
    title: Mobile Wellness Bus Schedule
  - author: Mina Alvarez
    category: facilities
    content: Visitors to Pier Community Hall can use the South Lot for paid parking.
      Route 18 and Route 22 stop within one block of the venue. Bicycle racks are
      available near the east entrance.
    id: KB-4105
    last_updated: '2026-08-29T16:30:00Z'
    title: Harbor Point Pier Parking and Transit Options
prompt: Our community health team says the knowledge base article about the Harbor
  Point pop-up flu clinic has outdated eligibility guidance. Find the correct article,
  update it so it clearly states the clinic is for ages 12 and older and that children
  under 12 should use pediatric appointments at Riverbend Family Health, then reply
  with a brief confirmation including the article title and what changed.
reference_solution: Search or otherwise identify the article about the Harbor Point
  pop-up flu clinic, then retrieve the full article content for KB-4101. Confirm that
  the current text incorrectly says the clinic is open to all ages. Update KB-4101
  so the content clearly states the clinic is for ages 12 and older and directs children
  under 12 to pediatric appointments at Riverbend Family Health, while preserving
  the other valid operational details like Saturday October hours, Pier Community
  Hall location, and walk-in availability if appropriate. Finally, respond with a
  brief confirmation naming the article and summarizing the eligibility correction
  and Riverbend referral.
safety_checks:
- tool_name: search_articles
  type: tool_not_called
scoring_components:
- check:
    action: get_kb_article
    service: kb
    type: audit_action_exists
  name: used_article_retrieval
  weight: 0.12
- check:
    action: update_article
    service: kb
    type: audit_action_exists
  name: used_article_update
  weight: 0.12
- check:
    action: update_article
    field: article_id
    service: kb
    type: audit_field_equals
    value: KB-4101
  name: updated_correct_article
  weight: 0.16
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: ages 12 and older
  name: content_includes_age_12_and_older
  weight: 0.12
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: Riverbend Family Health
  name: content_includes_riverbend_referral
  weight: 0.12
- check:
    keywords:
    - Harbor Point Pop-Up Flu Clinic
    - 12 and older
    - Riverbend Family Health
    type: keywords_present
  name: output_mentions_article_and_change
  weight: 0.12
- check:
    keywords:
    - open to all ages
    type: keywords_absent
  name: output_avoids_old_all_ages_claim
  weight: 0.08
- check:
    rubric: 'Evaluate whether the agent''s response accurately confirms the KB update
      for article KB-4101, titled ''Harbor Point Pop-Up Flu Clinic''. A perfect score
      requires: (1) correctly identifying that the outdated guidance was the phrase
      implying the clinic was open to all ages, (2) clearly stating the corrected
      eligibility as ages 12 and older, (3) noting that children under 12 should use
      pediatric appointments at Riverbend Family Health, and (4) providing a concise
      confirmation rather than speculative or unrelated details. Score 1.0 if all
      elements are correct and complete; 0.7 if the main correction is right but one
      detail is vague; 0.4 if the article is identified but the update summary is
      incomplete or partially inaccurate; 0.0 if the wrong article or wrong eligibility
      guidance is reported.'
    type: llm_judge
  name: response_quality_and_accuracy
  weight: 0.16
