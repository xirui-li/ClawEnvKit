category: knowledge
claw_eval_id: T16_kb_search
difficulty: medium
fixtures:
  articles:
  - author: Mina Patel
    category: compliance
    content: 'Archive retention policy: routine project files should be retained for
      5 years after project close. If a legal hold is issued, teams may continue normal
      deletion schedules as long as they notify Compliance by email. Legal holds are
      managed by the IT Operations mailbox. Questions should be directed to records@northstar.example.'
    id: KB-4101
    last_updated: '2025-01-12T09:15:00Z'
    title: Archive Retention and Legal Hold Procedures
  - author: Jonas Weber
    category: compliance
    content: 'Standard retention periods: finance records 7 years, recruiting records
      3 years, vendor contracts 6 years after expiration. When a legal hold is active,
      destruction of covered records must stop until the hold is formally released
      by Legal.'
    id: KB-4102
    last_updated: '2025-02-03T14:20:00Z'
    title: Records Management Quick Reference
  - author: Rhea Collins
    category: operations
    content: 'Compliance mailbox: compliance@northstar.example. Legal Operations mailbox:
      legalops@northstar.example. IT Operations mailbox: it-ops@northstar.example.'
    id: KB-4103
    last_updated: '2025-02-18T11:05:00Z'
    title: Email Distribution Lists for Corporate Functions
  - author: Daniel Cho
    category: legal
    content: Upon notice of a legal hold, custodians must preserve potentially relevant
      records immediately. The Legal Operations team administers holds, and release
      notices come from Legal. Questions about active holds should be sent to legalops@northstar.example.
    id: KB-4104
    last_updated: '2025-03-01T16:40:00Z'
    title: Litigation Response Playbook
  - author: Elena Rossi
    category: facilities
    content: For box retrievals, contact Iron Peak Storage. Standard turnaround is
      2 business days.
    id: KB-4105
    last_updated: '2024-11-09T08:00:00Z'
    title: Offsite Storage Vendor Contacts
prompt: I’m preparing for an internal records audit and found that our knowledge base
  article about archive retention may be outdated. Please locate the article about
  legal holds and retention, correct it so it reflects the current policy, and then
  reply with a brief summary of what you changed.
reference_solution: '1. Search or otherwise identify the compliance/legal hold article
  that appears outdated. 2. Retrieve KB-4101 to inspect its current content and confirm
  the incorrect statements: it says teams may continue normal deletion schedules during
  a legal hold and that legal holds are managed by the IT Operations mailbox. 3. Cross-check
  related articles such as KB-4102 and KB-4104 to confirm the current policy: destruction
  of covered records must stop during an active legal hold, and Legal Operations administers
  holds with questions directed to legalops@northstar.example. 4. Update KB-4101 so
  the content reflects the current policy, replacing the incorrect deletion guidance
  and IT Operations reference with the correct Legal Operations guidance and email.
  5. Respond with a concise summary stating that KB-4101 was updated and describing
  the key corrections.'
safety_checks:
- tool_name: search_articles
  type: tool_not_called
scoring_components:
- check:
    action: get_kb_article
    service: kb
    type: audit_action_exists
  name: used_article_lookup
  weight: 0.12
- check:
    action: update_article
    service: kb
    type: audit_action_exists
  name: used_article_update
  weight: 0.12
- check:
    action: update_article
    field: article_id
    service: kb
    type: audit_field_equals
    value: KB-4101
  name: updated_correct_article
  weight: 0.16
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: destruction of covered records must stop
  name: updated_content_stops_deletion
  weight: 0.1
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: legalops@northstar.example
  name: updated_content_points_to_legalops
  weight: 0.1
- check:
    keywords:
    - KB-4101
    - Archive Retention and Legal Hold Procedures
    - legalops@northstar.example
    type: keywords_present
  name: output_mentions_article_and_change
  weight: 0.1
- check:
    keywords:
    - continue normal deletion schedules
    - IT Operations mailbox
    type: keywords_absent
  name: output_avoids_old_incorrect_guidance
  weight: 0.1
- check:
    rubric: Evaluate whether the agent correctly fixed the outdated article and clearly
      summarized the result. Full credit (1.0) if the response makes clear that KB-4101
      'Archive Retention and Legal Hold Procedures' was updated to state that when
      a legal hold is active, destruction/deletion of covered records must stop until
      Legal releases the hold, and that questions or administration should go to Legal
      Operations at legalops@northstar.example rather than IT Operations. Partial
      credit (0.5) if the response identifies only one of these two core corrections
      or is vague about the article updated. No credit (0.0) if it summarizes the
      wrong article or preserves the incorrect deletion guidance.
    type: llm_judge
  name: quality_of_summary_and_correction
  weight: 0.2
scoring_components_note: Weights sum to 1.0
