category: knowledge
claw_eval_id: T15zh_kb_search
difficulty: medium
fixtures:
  articles:
  - author: Dana Kowalski
    category: security
    content: 'All employees must use passwords of at least 8 characters. Passwords
      should include uppercase, lowercase, and numbers. Multi-factor authentication
      is recommended but not required. Passwords must be changed every 180 days. This
      policy was last reviewed under the 2021 NIST guidelines.

      '
    id: art-101
    last_updated: '2021-11-15'
    title: Password Policy Requirements
  - author: Marcus Trent
    category: security
    content: 'Employees working remotely must connect via the company VPN using the
      legacy Cisco AnyConnect client. Split tunneling is currently enabled for all
      users. Access logs are reviewed monthly. This document reflects infrastructure
      as of Q3 2022.

      '
    id: art-102
    last_updated: '2022-08-30'
    title: VPN Access and Remote Work Guidelines
  - author: Priya Nambiar
    category: security
    content: 'In the event of a security incident, contact the IT helpdesk at ext.
      4400. The CISO must be notified within 48 hours. This playbook was updated to
      align with ISO 27001:2013 standards. A full review is scheduled for 2024.

      '
    id: art-103
    last_updated: '2023-03-10'
    title: Incident Response Playbook
  - author: Dana Kowalski
    category: security
    content: 'Company data is classified into four tiers: Public, Internal, Confidential,
      and Restricted. Encryption at rest is required for Confidential and Restricted
      data. Cloud storage of Restricted data requires CISO approval. Updated to reflect
      the 2023 data governance framework.

      '
    id: art-104
    last_updated: '2023-07-22'
    title: Data Classification and Handling
  - author: James Okafor
    category: security
    content: 'All third-party vendors with access to internal systems must complete
      a security questionnaire annually. The current questionnaire is based on the
      SIG Lite 2020 template. Vendor risk scores are tracked in a spreadsheet maintained
      by IT. Last reviewed prior to the 2022 vendor onboarding cycle.

      '
    id: art-105
    last_updated: '2022-04-18'
    title: Third-Party Vendor Security Assessment
  - author: Marcus Trent
    category: security
    content: 'Company-issued devices must not be used for personal activities that
      violate local laws. USB storage devices are permitted with manager approval.
      Antivirus software must be kept up to date. This policy was drafted in 2020
      and has not been formally reviewed since.

      '
