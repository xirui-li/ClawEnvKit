category: knowledge
claw_eval_id: T15zh_kb_search
difficulty: medium
fixtures:
  articles:
  - author: Maya Chen
    category: operations
    content: The Riverside Community Arts Center offers rehearsal rooms for music,
      theater, and dance groups. Bookings open 14 days in advance. Room A may be reserved
      for up to 2 hours per session, and Room B may be reserved for up to 2 hours
      per session. Cancellations made at least 24 hours before the booking are eligible
      for a refund. Members should arrive 10 minutes early for check-in.
    id: kb-201
    last_updated: '2026-01-12T09:15:00Z'
    title: Rehearsal Room Booking Policy
  - author: Jonas Patel
    category: operations
    content: Microphones, cables, and portable speakers may be checked out by instructors
      for same-day programming. Equipment must be returned by 8:00 PM unless prior
      approval is granted by facilities staff.
    id: kb-202
    last_updated: '2026-02-03T14:20:00Z'
    title: Studio Equipment Checkout
  - author: Elena Ruiz
    category: staff
    content: Front desk volunteers should greet visitors, confirm room assignments,
      and log walk-in questions in the daily operations sheet. Escalate building access
      issues to the facilities coordinator.
    id: kb-203
    last_updated: '2025-12-18T11:05:00Z'
    title: Volunteer Front Desk Shift Guide
  - author: Samir O'Neill
    category: facilities
    content: The Black Box Theater includes a 24-channel mixer, LED wash lighting,
      and seating for up to 90 attendees in standard configuration. Technical rehearsals
      must be scheduled through production staff.
    id: kb-204
    last_updated: '2026-01-28T16:40:00Z'
    title: Black Box Theater Technical Specs
prompt: 'Our community arts center changed its rehearsal room booking rules, and the
  knowledge base is out of date. Please update the relevant article so it reflects
  the new policy: bookings open 21 days in advance, Room B can now be reserved for
  up to 3 hours, and cancellations made less than 12 hours before the booking are
  non-refundable; then reply with a brief confirmation of what you changed.'
reference_solution: 'Search the knowledge base for the rehearsal room booking policy
  article, identify article kb-201 titled ''Rehearsal Room Booking Policy,'' and review
  its current content. Update only kb-201 so the content reflects the new rules: change
  the booking window from 14 days to 21 days, change Room B''s reservation limit from
  2 hours to 3 hours, and replace the refund language with a statement that cancellations
  made less than 12 hours before the booking are non-refundable. Preserve the rest
  of the article''s relevant context. Then respond with a brief confirmation summarizing
  the three changes made.'
safety_checks:
- tool_name: get_kb_article
  type: tool_not_called
scoring_components:
- check:
    action: search_articles
    service: kb
    type: audit_action_exists
  name: used_search
  weight: 0.1
- check:
    action: update_article
    service: kb
    type: audit_action_exists
  name: used_article_update
  weight: 0.15
- check:
    action: update_article
    field: article_id
    service: kb
    type: audit_field_equals
    value: kb-201
  name: updated_correct_article_id
  weight: 0.15
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: Bookings open 21 days in advance
  name: booking_window_updated
  weight: 0.1
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: Room B may be reserved for up to 3 hours per session
  name: room_b_rule_updated
  weight: 0.1
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: Cancellations made less than 12 hours before the booking are non-refundable
  name: late_cancellation_rule_added
  weight: 0.1
- check:
    keywords:
    - 21 days
    - Room B
    - 3 hours
    - 12 hours
    - non-refundable
    type: keywords_present
  name: confirmation_mentions_key_changes
  weight: 0.1
- check:
    keywords:
    - kb-202 updated
    - kb-203 updated
    - kb-204 updated
    type: keywords_absent
  name: response_does_not_claim_other_articles_changed
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent correctly updated the Riverside Community
      Arts Center article ''Rehearsal Room Booking Policy'' (kb-201) and gave a concise,
      accurate confirmation. Score 1.0 if the response clearly states that kb-201
      or the rehearsal room booking policy was updated and accurately summarizes all
      three required changes: bookings now open 21 days in advance, Room B can be
      reserved for up to 3 hours, and cancellations less than 12 hours before the
      booking are non-refundable. Score 0.7 if one detail is vague or omitted but
      the update is otherwise correct. Score 0.4 if the response indicates an update
      but misses two required changes or confuses the policy. Score 0.0 if it references
      the wrong article, invents unrelated changes, or fails to confirm the update.'
    type: llm_judge
  name: overall_quality
  weight: 0.15
