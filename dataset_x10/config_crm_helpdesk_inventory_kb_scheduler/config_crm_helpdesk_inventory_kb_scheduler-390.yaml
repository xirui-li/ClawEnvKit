tools:
- description: Search the knowledge base for articles by query and category
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Retrieve a specific knowledge base article by ID
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
- description: List all integrations, optionally filtered by status
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full details of an integration including API key and secret
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Send an email notification to a specified recipient
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
- description: List scheduled jobs, optionally filtered by status, enabled state,
    or tag
  endpoint: /scheduler/jobs
  method: POST
  name: list_jobs
  service: scheduler
- description: Create a new scheduled job with a cron expression, action, tags, and
    enabled state
  endpoint: /scheduler/jobs/create
  method: POST
  name: create_job
  service: scheduler
