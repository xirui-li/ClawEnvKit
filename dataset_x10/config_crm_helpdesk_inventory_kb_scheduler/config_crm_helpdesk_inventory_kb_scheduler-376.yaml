- check:
    rubric: "Evaluate the agent's final summary notification and overall output on\
      \ these dimensions:\n1. COMPLETENESS (0-0.4): Does the output cover all required\
      \ elements?\n   - Meridian Logistics customer details (cust-101, enterprise\
      \ tier, $480k revenue)\n   - Integration status: \"Meridian Logistics Sync\"\
      \ (intg-001) is \"degraded\", endpoint https://api.meridianlogistics.com/v2/sync\n\
      \   - Open ticket tkt-501 (\"intermittent 503 errors since November 14th\",\
      \ high priority)\n   - At least one KB article title referenced (e.g., \"Troubleshooting\
      \ Integration 503 Errors\")\n   Score 0.4 if all four present, 0.3 if three,\
      \ 0.2 if two, 0.1 if one, 0.0 if none.\n\n2. ACTIONABILITY (0-0.3): Does the\
      \ output include concrete recommended next steps?\n   Score 0.3 if specific\
      \ actions are recommended (e.g., check upstream service health, escalate to\
      \ engineering on-call, notify customer every 2 hours per runbook), 0.15 if vague\
      \ suggestions, 0.0 if no recommendations.\n\n3. NOTIFICATION QUALITY (0-0.3):\
      \ Was a notification sent to the engineering team with a clear subject and body\
      \ summarizing the issue?\n   Score 0.3 if the notification is well-structured\
      \ and includes integration name, status, ticket reference, and next steps. Score\
      \ 0.15 if partially complete. Score 0.0 if no notification or notification is\
      \ missing critical details.\n\nFinal score = sum of dimension scores (max 1.0).\n"
    type: llm_judge
  name: summary_quality
  weight: 0.2
