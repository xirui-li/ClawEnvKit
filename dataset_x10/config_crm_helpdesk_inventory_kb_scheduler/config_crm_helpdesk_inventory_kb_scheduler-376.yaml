tools:
- description: List CRM customers, optionally filtered by status, tier, or industry.
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get full details for a specific customer by customer_id.
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: List all integrations in the config store, optionally filtered by status.
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full integration details including API key, secret, and endpoint.
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: List helpdesk tickets, optionally filtered by status.
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get full details for a specific helpdesk ticket by ticket_id.
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Search the knowledge base for articles by query, category, or max_results.
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Get the full content of a knowledge base article by article_id.
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
- description: Send a notification email to a recipient with a subject and body.
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
- description: Update a helpdesk ticket's priority, tags, or category.
  endpoint: /helpdesk/tickets/update
  method: POST
  name: update_ticket
  service: helpdesk
