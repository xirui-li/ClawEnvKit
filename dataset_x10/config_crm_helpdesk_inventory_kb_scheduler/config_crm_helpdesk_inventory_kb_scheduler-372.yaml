tools:
- description: List all integrations, optionally filtered by status
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full details of an integration including secrets and notes
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Update an integration's status or notes
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: Send a notification email via the config service
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
- description: List helpdesk tickets filtered by status, priority, or category
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get full details of a specific helpdesk ticket
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Update a ticket's priority, tags, or category
  endpoint: /helpdesk/tickets/update
  method: POST
  name: update_ticket
  service: helpdesk
- description: Close a helpdesk ticket with a resolution note
  endpoint: /helpdesk/tickets/close
  method: POST
  name: close_ticket
  service: helpdesk
