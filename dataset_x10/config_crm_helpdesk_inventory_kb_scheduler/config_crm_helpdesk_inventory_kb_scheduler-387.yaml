prompt: 'Our payment gateway integration has been flagged as having a compromised
  API key. Investigate the affected integration, find any related knowledge base articles
  about it, update those articles to reflect that the integration is currently under
  security review and that the old credentials are invalid, then notify the security
  team. Also check if there are any open helpdesk tickets related to the payment gateway
  and tag them appropriately. Summarize your findings and all actions taken.

  '
reference_solution: '1. Call list_integrations to identify all integrations, then
  call get_integration with integration_id=int-001 to retrieve full details of the
  Stripe Payment Gateway, noting the compromised credentials. 2. Call update_integration
  with integration_id=int-001 to update its status to "under_review" and add a note
  indicating the API key is suspected compromised and credentials are being rotated.
  3. Call search_articles with query="Stripe" or category="integrations" to find related
  KB articles. Identify kb-201 and kb-202 as Stripe-related. 4. Call get_kb_article
  for kb-201 and kb-202 to review their current content, which contains the now-invalid
  credentials. 5. Call update_article for kb-201 to replace the content with a security
  notice: the integration is under security review, the previously listed API key
  and webhook secret are invalid and must not be used, and users should contact the
  security team for updated credentials. 6. Call update_article for kb-202 similarly,
  removing the webhook secret reference and adding the security review notice. 7.
  Call list_tickets to find open tickets, then identify tkt-101, tkt-102, and tkt-104
  as Stripe-related billing tickets. 8. Call update_ticket for tkt-101, tkt-102, and
  tkt-104 to add a tag such as "security-incident" or "api-key-compromised" to flag
  them as related to the security event. 9. Call config_notify to send an email to
  the security team (e.g., security@company.com) with a subject like "URGENT: Stripe
  API Key Compromised — int-001" and a body summarizing the incident, affected tickets,
  and updated KB articles. 10. Provide a written summary covering: the affected integration
  (int-001, Stripe Payment Gateway), the KB articles updated (kb-201, kb-202) and
  what was changed, the helpdesk tickets flagged (tkt-101, tkt-102, tkt-104), the
  notification sent, and recommended next steps (credential rotation, monitoring).'
