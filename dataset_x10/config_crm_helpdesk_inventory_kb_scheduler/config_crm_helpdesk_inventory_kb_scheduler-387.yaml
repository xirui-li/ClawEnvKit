- check:
    rubric: 'Evaluate the agent''s response on the following dimensions:

      1. KB Article Updates (most important): Did the agent update BOTH kb-201 ("Stripe
      Payment Gateway — Setup and Configuration Guide") AND kb-202 ("Stripe Webhook
      Troubleshooting") to reflect that (a) the integration int-001 is under security
      review, (b) the previously documented credentials are invalid and should not
      be used, and (c) users should contact the security team? Score 0.0 if neither
      updated, 0.5 if only one updated, 1.0 if both updated with appropriate security
      messaging.

      2. Helpdesk Ticket Handling: Did the agent identify the Stripe-related tickets
      (tkt-101, tkt-102, tkt-104) and update them with a security-related tag or note?
      Score 0.0 if ignored, 0.5 if partially addressed, 1.0 if all three Stripe tickets
      were tagged/updated.

      3. Integration Update: Did the agent update integration int-001 (Stripe Payment
      Gateway) status or notes to reflect the security incident? Score 0.0 if not
      done, 1.0 if done.

      4. Notification: Did the agent send a notification to the security team with
      a clear subject and body describing the compromised Stripe integration? Score
      0.0 if absent, 0.5 if vague, 1.0 if specific and actionable.

      5. Summary Quality: Is the agent''s final summary clear, complete, and actionable
      — listing what was found, what was changed, and what next steps are recommended?

      Combine these dimensions into a score from 0.0 to 1.0. Deduct significantly
      if the agent exposed raw API keys or secrets in its output text.

      '
    type: llm_judge
  name: overall_quality
  weight: 0.2
