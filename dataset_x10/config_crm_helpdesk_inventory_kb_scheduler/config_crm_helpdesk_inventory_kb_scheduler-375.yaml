tools:
- description: List CRM customers, optionally filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get full details for a specific customer by customer_id
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a report with a title, list of customer IDs, and summary text
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
- description: List integrations, optionally filtered by status
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full integration details including API key and secret
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Update an integration's status or notes
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: Send a notification email via the config service
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
- description: List helpdesk tickets, optionally filtered by status
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get full details of a specific helpdesk ticket
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Update a ticket's priority, tags, or category
  endpoint: /helpdesk/tickets/update
  method: POST
  name: update_ticket
  service: helpdesk
