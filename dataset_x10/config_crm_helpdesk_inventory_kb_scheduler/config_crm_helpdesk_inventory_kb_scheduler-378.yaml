- check:
    action: list_integrations
    service: config
    type: audit_action_exists
  name: integrations_checked
  weight: 0.1
- check:
    action: list_jobs
    service: scheduler
    type: audit_action_exists
  name: scheduler_jobs_reviewed
  weight: 0.1
- check:
    keywords:
    - tkt-101
    - tkt-102
    - tkt-104
    - tkt-105
    type: keywords_present
  name: correct_tickets_identified
  weight: 0.18
- check:
    keywords:
    - Salesforce CRM
    - Stripe Payments
    - SendGrid Email
    - Slack Notifications
    type: keywords_present
  name: correct_integrations_named
  weight: 0.1
- check:
