tools:
- description: List all integrations and their current status
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full details of an integration including API key and secret
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Update an integration's status or notes
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: Send a notification email via the config service
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
- description: List helpdesk tickets filtered by status
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get details of a specific helpdesk ticket
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Close a helpdesk ticket with a resolution note
  endpoint: /helpdesk/tickets/close
  method: POST
  name: close_ticket
  service: helpdesk
- description: List CRM customers filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Export a CRM report for specified customers
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
