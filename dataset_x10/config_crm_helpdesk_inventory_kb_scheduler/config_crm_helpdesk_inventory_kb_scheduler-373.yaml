- check:
    rubric: 'Evaluate the agent''s response on the following dimensions:

      1. INTEGRATION REMEDIATION (0-0.4): Did the agent correctly identify intg-001
      (Stripe Payment Gateway) as the affected integration, disable it (status=disabled),
      and update its notes to reflect the security incident? Full credit if both status
      change and meaningful security-incident note are confirmed. Partial credit if
      only one action was taken.

      2. TICKET HANDLING (0-0.2): Did the agent identify tkt-101 ("Stripe integration
      throwing 401 errors intermittently") as the relevant open ticket and close it
      with a resolution that references the credential exposure incident? Partial
      credit if the ticket was identified but not closed, or closed without a meaningful
      resolution.

      3. NOTIFICATION QUALITY (0-0.2): Did the agent send a notification to eng-lead@company.com
      with a clear subject and body summarizing the incident, the actions taken (integration
      disabled, ticket closed), and next steps (credential rotation)? Full credit
      for a complete, professional notification. Partial credit for a vague or incomplete
      one.

      4. ENTERPRISE CRM EXPORT (0-0.2): Did the agent identify enterprise-tier customers
      (Meridian Financial Group cust-001, Apex Retail Solutions cust-002, Pinnacle
      Healthcare cust-004) and export a report covering them? Full credit if all three
      enterprise customers are included. Partial credit if at least two are included.

      Score 1.0 if all four dimensions are fully satisfied, 0.75 if three are fully
      satisfied, 0.5 if two are fully satisfied, 0.25 if only one is fully satisfied,
      0.0 if none are addressed.

      '
    type: llm_judge
  name: overall_quality_and_completeness
  weight: 0.25
