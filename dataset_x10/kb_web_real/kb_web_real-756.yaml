fixtures:
  kb:
    articles:
    - author: Sarah Chen
      category: product-features
      content: Our platform offers task creation, assignment, and basic deadline tracking.
        Users can create projects, add team members, and monitor progress through
        a simple dashboard. Integrations include Slack and email notifications.
      id: art-101
      last_updated: '2023-06-15'
      title: 'Project Management Overview: Core Features Guide'
    - author: Marcus Rivera
      category: product-features
      content: Collaboration features include shared workspaces, comment threads on
        tasks, and file attachments up to 25MB. Real-time editing is not currently
        supported. Teams can use @mentions to notify colleagues.
      id: art-102
      last_updated: '2023-04-20'
      title: Team Collaboration Tools and Best Practices
    - author: Priya Nair
      category: analytics
      content: Project leads can generate weekly status reports, view burndown charts,
        and export data to CSV. Custom dashboards are available on Enterprise plans.
