      id: art-103
      last_updated: '2023-08-01'
      title: Reporting and Analytics for Project Leads
    - author: James Okafor
      category: product-features
      content: 'Users can set up basic if-then automation rules: e.g., when a task
        is marked complete, notify the project owner. Up to 10 active automations
