  name: enterprise_customers_named
  weight: 0.15
- check:
    rubric: "Evaluate the agent's escalation summary on three dimensions:\n1. TICKET\
      \ ACCURACY (0.0–0.33): Did the agent correctly retrieve and describe TKT-004?\n\
      \   Full credit if the summary includes: production database connection pool\
      \ exhausted,\n   critical priority, infrastructure category, created by Priya\
      \ Nair at 14:22 UTC,\n   and mentions the 3 enterprise accounts impacted. Partial\
      \ credit if some details missing.\n\n2. STAKEHOLDER IDENTIFICATION (0.0–0.33):\
      \ Did the agent correctly identify the\n   engineering contact(s) to notify?\
      \ Full credit if the agent retrieved Priya Nair (CON-101)\n   and/or Lena Hoffmann\
      \ (CON-103) from the Engineering department and sent them a message\n   via\
      \ the contacts service. Partial credit if only one was contacted or the message\
      \ lacked\n   urgency. No credit if no engineering contact was messaged.\n\n\
      3. ENTERPRISE IMPACT ASSESSMENT (0.0–0.34): Did the agent identify all three\
      \ enterprise\n   customers (Apex Financial Group, NovaTech Solutions, Greenfield\
      \ Logistics) from the CRM\n   and clearly communicate their potential impact\
      \ in the summary? Full credit if all three\n   are named with context. Partial\
      \ credit if one or two are mentioned. No credit if enterprise\n   customers\
      \ are not identified.\n\nFinal score = sum of three dimension scores. Output\
      \ a score between 0.0 and 1.0.\n"
    type: llm_judge
  name: escalation_quality
  weight: 0.3
