tools:
- description: Search for contacts by name, email, or keyword, optionally filtered
    by department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details of a specific contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send an internal message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: Retrieve full details of a specific helpdesk ticket by ticket ID
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Update a helpdesk ticket's priority, tags, or category
  endpoint: /helpdesk/tickets/update
  method: POST
  name: update_ticket
  service: helpdesk
- description: List CRM customers filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Retrieve full details of a specific CRM customer by customer ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Send an email via Gmail
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
