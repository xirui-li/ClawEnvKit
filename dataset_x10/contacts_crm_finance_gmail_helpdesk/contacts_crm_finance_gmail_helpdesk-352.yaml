prompt: 'A critical helpdesk ticket has come in and needs immediate attention. Find
  ticket TKT-004, get the full details, then look up the contact information for the
  person who created it so you can reach out directly. Also identify any VIP customers
  in our CRM who might be affected (tier: enterprise), and send a direct message to
  the relevant internal contact in the engineering department to alert them about
  the issue. Summarize everything you found and the actions you took.

  '
reference_solution:
- Call get_ticket with ticket_id TKT-004 to retrieve the full critical infrastructure
  ticket details.
- Note that the ticket was created_by priya.nair@company.com; search contacts for
  Priya Nair or search by department Engineering to find her contact record.
- Call get_contact with contact_id CON-101 to retrieve Priya Nair's full contact details
  (Senior Infrastructure Engineer).
- Optionally also retrieve CON-103 (Lena Hoffmann, Platform Lead) as another engineering
  stakeholder.
- Call list_customers with tier=enterprise to identify the three enterprise customers
  potentially affected (Apex Financial Group CUST-201, NovaTech Solutions CUST-202,
  Greenfield Logistics CUST-203).
- Call send_message to CON-101 (and optionally CON-103) with an urgent alert about
  TKT-004 describing the production outage and requesting immediate action.
- Summarize all findings in the output: ticket details, ticket creator contact info,
    enterprise customers at risk, and confirmation that the engineering contact was
    messaged.
- Do NOT close the ticket — it is still active and being investigated.
