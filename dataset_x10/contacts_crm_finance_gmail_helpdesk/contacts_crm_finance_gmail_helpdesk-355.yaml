  name: send_message
  service: contacts
- description: List CRM customers filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Retrieve full details for a specific CRM customer by customer ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report summarizing selected customers
  endpoint: /crm/export
  method: POST
  name: export_report
