- check:
    rubric: 'Evaluate the agent''s overall execution and summary on the following
      dimensions:

      1. TICKET IDENTIFICATION (0–1): Did the agent correctly identify TKT-1001 "Production
      API Gateway Down" as the critical ticket and ignore lower-priority tickets (TKT-1002,
      TKT-1003)?

      2. ENGINEERING TEAM NOTIFICATION (0–1): Did the agent send direct messages to
      all three Engineering contacts — Priya Nair (CON-201), Marcus Webb (CON-202),
      and Yuki Tanaka (CON-203)? Score 1.0 if all three messaged, 0.5 if two, 0.0
      if one or fewer. Did the messages include meaningful outage details (API gateway
      down, port 443, since 03:15 UTC)?

      3. CUSTOMER EMAIL (0–1): Did the agent send an email to at least one active
      enterprise or pro customer (e.g., Apex Logistics at ops@apexlogistics.com or
      Northgate Retail at support@northgateretail.com) acknowledging the outage and
      stating the team is working on it? Score 1.0 if email sent with appropriate
      content, 0.5 if sent but vague, 0.0 if not sent.

      4. SUMMARY QUALITY (0–1): Does the agent''s final summary clearly state who
      was notified (names), which ticket was addressed (TKT-1001), and what customer
      communication was sent?

      Scoring: Average the four dimensions. Return a score between 0.0 and 1.0.

      '
    type: llm_judge
  name: message_quality_and_completeness
  weight: 0.25
