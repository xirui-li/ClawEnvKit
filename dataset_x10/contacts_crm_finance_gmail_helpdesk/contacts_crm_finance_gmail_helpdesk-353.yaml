prompt: 'We have a critical production outage reported in our helpdesk system. Please
  find the open critical or high-priority ticket(s), then look up all contacts in
  the Engineering department, and send each of them a direct message summarizing the
  outage details and urging immediate attention. Also send a follow-up email to the
  customer affected (if identifiable from CRM) letting them know we are actively working
  on the issue. Summarize what you did and who you notified.

  '
reference_solution: '1. Call list_tickets (status: open) to retrieve all open helpdesk
  tickets. 2. Identify TKT-1001 "Production API Gateway Down" as the critical-priority
  ticket. 3. Call get_ticket with ticket_id TKT-1001 to retrieve full outage details.
  4. Call search_contacts with department "Engineering" to find Engineering team members.
  5. Identify CON-201 (Priya Nair), CON-202 (Marcus Webb), CON-203 (Yuki Tanaka) as
  Engineering contacts. 6. Call send_message for each Engineering contact (CON-201,
  CON-202, CON-203) with a message summarizing the outage: API gateway down since
  03:15 UTC, connection timeouts on port 443, all customer-facing services impacted,
  immediate attention required. 7. Call list_customers to identify active enterprise
  customers who may be affected (e.g., Apex Logistics, Northgate Retail). 8. Call
  send_email to at least one affected customer (e.g., ops@apexlogistics.com) with
  subject referencing the outage and body stating the team is actively investigating
  and working toward resolution. 9. Output a summary listing: the critical ticket
  found (TKT-1001), the three Engineering contacts messaged (Priya Nair, Marcus Webb,
  Yuki Tanaka), and the customer email(s) sent.'
