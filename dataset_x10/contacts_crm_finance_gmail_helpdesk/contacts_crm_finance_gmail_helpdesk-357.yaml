prompt: 'Our finance team suspects there may be duplicate or suspicious vendor charges
  in the past month. Please review all recent transactions, identify any vendors with
  multiple charges or unusually high amounts, then look up the relevant internal contacts
  responsible for vendor management and send them a summary message alerting them
  to review these transactions. Finally, send an email to the finance director summarizing
  your findings.

  '
reference_solution: "1. Call list_transactions with a date range covering November\
  \ 2024 (e.g., start_date: 2024-11-01, end_date: 2024-11-30)\n   to retrieve all\
  \ 7 transactions.\n2. Analyze the results: identify OfficeMax Pro with 3 charges\
  \ (txn-001, txn-003, txn-007) totaling ~$3,410;\n   CloudNest Inc with two identical\
  \ $3,800 charges (txn-002, txn-004) flagged as a likely duplicate;\n   TechSource\
  \ Direct with a single high-value $9,500 charge (txn-006) marked pending.\n3. Search\
  \ contacts for \"Procurement\" or \"Vendor\" to find Sandra Okafor (cnt-101, Vendor\
  \ Relations Manager)\n   and search for \"IT Procurement\" to find Priya Nambiar\
  \ (cnt-103).\n4. Send an internal message to Sandra Okafor (cnt-101) summarizing\
  \ the OfficeMax Pro repeat charges and\n   the CloudNest duplicate, requesting she\
  \ verify with the vendors.\n5. Send an internal message to Priya Nambiar (cnt-103)\
  \ flagging the TechSource Direct $9,500 hardware charge\n   for confirmation.\n\
  6. Search contacts for \"Finance Director\" or \"Derek Huang\" to find cnt-102.\
  \ 7. Send an email to Derek Huang (d.huang@company.com) with a subject like \"Vendor\
  \ Expense Audit — November 2024\n   Anomalies\" summarizing all three flagged patterns,\
  \ listing transaction IDs and amounts, and recommending\n   that pending transactions\
  \ (txn-003, txn-004, txn-006, txn-007) be held until vendor confirmation is received.\n\
  8. Report findings in the output, including vendor names, transaction IDs, amounts,\
  \ and the contacts notified."
