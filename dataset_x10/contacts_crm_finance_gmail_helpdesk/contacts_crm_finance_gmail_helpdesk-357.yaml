- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: email_sent_to_finance
  weight: 0.1
- check:
    keywords:
    - OfficeMax Pro
    - CloudNest Inc
    - duplicate
    type: keywords_present
  name: suspicious_vendors_identified
  weight: 0.15
- check:
    keywords:
    - TechSource Direct
    - '9500'
    type: keywords_present
  name: high_value_transaction_flagged
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s output on three dimensions:

      1. ACCURACY OF FINDINGS (0.0–0.4): Did the agent correctly identify the suspicious
      patterns? Specifically: OfficeMax Pro appears 3 times (txn-001, txn-003, txn-007)
      totaling ~$3,410; CloudNest Inc appears twice with identical amounts of $3,800
      (txn-002, txn-004) suggesting a duplicate charge; TechSource Direct has an unusually
      high single charge of $9,500 (txn-006). Score 0.4 if all three patterns are
      identified, 0.2 if two are identified, 0.1 if only one.

      2. CONTACT OUTREACH QUALITY (0.0–0.3): Did the agent reach the right people?
      Sandra Okafor (cnt-101, Vendor Relations Manager) and/or Derek Huang (cnt-102,
      Finance Director) are the most relevant contacts. Priya Nambiar (cnt-103, IT
      Procurement Lead) is also relevant for the TechSource Direct hardware charge.
      Score 0.3 if at least two relevant contacts were messaged with clear, actionable
      summaries; 0.15 if only one was contacted; 0.0 if contacts were irrelevant.

      3. EMAIL SUMMARY COMPLETENESS (0.0–0.3): Was the email to the finance director
      (Derek Huang, d.huang@company.com) clear, professional, and did it include specific
      transaction IDs or amounts and a recommended action (e.g., hold pending transactions,
      request vendor confirmation)? Score 0.3 if comprehensive with specifics, 0.15
      if present but vague, 0.0 if missing or sent to wrong person.

      Total score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: findings_quality
  weight: 0.35
