prompt: 'Our sales team wants to launch a targeted outreach campaign for our top-tier
  enterprise customers. Please identify all enterprise-tier customers from our CRM,
  then find the appropriate internal sales contact responsible for enterprise accounts,
  and send them a message summarizing which enterprise customers need follow-up along
  with any relevant context from their CRM profiles. Also draft an email to our sales
  director (find them in the contacts directory) with a concise briefing on the enterprise
  customer landscape so they can prepare for the upcoming strategy meeting.

  '
reference_solution: "1. Call list_customers with tier=enterprise to retrieve all enterprise-tier\
  \ CRM customers.\n   This returns Meridian Technologies, Apex Financial Group, Crestview\
  \ Healthcare, and Pinnacle Energy Corp.\n\n2. Optionally call get_customer for each\
  \ enterprise customer to retrieve full details including\n   revenue, status, and\
  \ last_contact date. Note that Crestview Healthcare has status=at_risk and\n   the\
  \ oldest last_contact date (2024-09-10), making it the highest priority.\n\n3. Call\
  \ search_contacts with department=Sales or query=\"enterprise account manager\"\
  \ to find\n   Sandra Okafor (cont-101, Enterprise Account Manager) as the right\
  \ internal contact to notify.\n\n4. Call search_contacts again or refine the search\
  \ to find Derek Huang (cont-102, Sales Director)\n   as the email draft recipient.\n\
  \n5. Call get_contact for Sandra Okafor (cont-101) and Derek Huang (cont-102) to\
  \ confirm their details.\n6. Call send_message to Sandra Okafor (contact_id=cont-101)\
  \ with a message summarizing the four\n   enterprise customers, highlighting Crestview\
  \ Healthcare's at_risk status and overdue contact,\n   and listing revenue figures\
  \ to prioritize outreach.\n\n7. Call create_draft addressed to Derek Huang (d.huang@company.com)\
  \ with subject such as\n   \"Enterprise Customer Briefing — Strategy Meeting Prep\"\
  \ and a body covering the four enterprise\n   accounts, their combined revenue,\
  \ Crestview's at_risk flag, and recommended next steps.\n\n8. Report back to the\
  \ user confirming the internal message was sent to Sandra Okafor and the\n   draft\
  \ email was saved for Derek Huang, with a summary of the enterprise customer landscape."
