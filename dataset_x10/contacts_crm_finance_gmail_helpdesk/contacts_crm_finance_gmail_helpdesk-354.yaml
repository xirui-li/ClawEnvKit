- check:
    rubric: "Evaluate the quality and completeness of the agent's enterprise customer\
      \ outreach coordination. Score on these dimensions:\n1. Enterprise customer\
      \ coverage (0-0.3): Did the agent correctly identify all four enterprise-tier\n\
      \   customers — Meridian Technologies (cust-001, $485K), Apex Financial Group\
      \ (cust-002, $720K),\n   Crestview Healthcare (cust-004, $610K, at_risk), and\
      \ Pinnacle Energy Corp (cust-006, $930K)?\n   Score 0.3 if all four named, 0.15\
      \ if two or three, 0.0 if fewer than two.\n\n2. Risk flagging (0-0.25): Did\
      \ the agent specifically call out Crestview Healthcare as at_risk\n   and note\
      \ that their last contact was 2024-09-10 (the most overdue of the enterprise\
      \ accounts)?\n   Score 0.25 if clearly flagged with context, 0.1 if mentioned\
      \ but without urgency, 0.0 if missed.\n\n3. Internal routing accuracy (0-0.25):\
      \ Did the agent correctly identify Sandra Okafor (Enterprise\n   Account Manager)\
      \ as the right internal contact to message, and Derek Huang (Sales Director)\
      \ as\n   the email draft recipient? Score 0.25 if both correct, 0.1 if one correct,\
      \ 0.0 if neither.\n\n4. Communication quality (0-0.2): Are the internal message\
      \ and email draft well-structured,\n   professional, and actionable? Do they\
      \ include relevant revenue figures and customer context\n   to help the recipients\
      \ prepare? Score 0.2 if both are clear and substantive, 0.1 if one is\n   adequate,\
      \ 0.0 if both are vague or missing.\n\nFinal score = sum of dimension scores\
      \ (max 1.0).\n"
    type: llm_judge
  name: outreach_briefing_quality
  weight: 0.22
