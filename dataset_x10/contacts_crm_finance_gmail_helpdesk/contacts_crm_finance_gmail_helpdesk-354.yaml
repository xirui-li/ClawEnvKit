tools:
- description: List CRM customers filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information about a specific CRM customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Search internal contacts directory by name, department, or keyword
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full details of an internal contact by contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send an internal message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: Save a draft email with recipient, subject, and body
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
