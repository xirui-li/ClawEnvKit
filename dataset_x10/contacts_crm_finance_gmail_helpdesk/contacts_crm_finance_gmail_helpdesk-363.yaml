prompt: 'Our support team needs to proactively reach out to VIP (enterprise-tier)
  customers who currently have open critical-priority helpdesk tickets. For each such
  customer, find their primary contact in the contacts directory, then prepare a draft
  email addressed to that contact acknowledging the issue and promising expedited
  resolution. Include the ticket title and a professional apology in each draft. Summarize
  what you''ve done in your response.

  '
reference_solution:
- Call list_tickets with status=open to retrieve all open helpdesk tickets.
- Identify tickets with priority=critical: tkt-301 (Meridian Logistics / cust-101),
    tkt-302 (Apex Financial Group / cust-102), tkt-304 (Orion Healthcare / cust-104).
- Call list_customers (or get_customer for each) to confirm cust-101, cust-102, and
  cust-104 are enterprise-tier; confirm cust-103 and cust-105 are not enterprise and
  should be excluded.
- Search contacts for each enterprise customer: find Sandra Okafor (con-201) for Meridian
    Logistics, James Whitfield (con-202) for Apex Financial Group, Dr. Leon Hartmann
    (con-204) for Orion Healthcare.
- Call get_contact for each to retrieve their email addresses.
- Call create_draft three times — one per customer — with the contact's email as recipient,
  a subject referencing the ticket title, and a body that includes a professional
  apology and commitment to expedited resolution.
- Do NOT call send_email; drafts are for team review before sending.
- Summarize in the response: which customers were identified, which contacts were
    found, and that three draft emails have been saved for review.
