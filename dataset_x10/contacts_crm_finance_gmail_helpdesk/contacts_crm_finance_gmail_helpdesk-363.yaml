    - successfully sent
    - send_email called
    type: keywords_absent
  name: no_emails_sent_directly
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s output on three dimensions:

      1. CORRECT IDENTIFICATION (0–0.33): Did the agent correctly identify exactly
      three enterprise customers with open critical tickets — Meridian Logistics (tkt-301),
      Apex Financial Group (tkt-302), and Orion Healthcare (tkt-304) — while excluding
      Greenfield Retail (medium priority) and Bluewave Tech (starter tier, low priority)?
      Score 0.33 if all three correct and no false inclusions, 0.15 if two correct,
      0.0 if fewer than two or wrong customers included.

      2. DRAFT CONTENT QUALITY (0–0.33): Were three separate draft emails prepared
      (not sent), each addressed to the correct contact (Sandra Okafor at s.okafor@meridianlogistics.com,
      James Whitfield at j.whitfield@apexfinancial.com, Dr. Leon Hartmann at l.hartmann@orionhealthcare.com),
      each referencing the specific ticket title, and each containing a professional
      apology and promise of expedited resolution? Score 0.33 if all three drafts
      are complete and professional, 0.20 if two are complete, 0.10 if one is complete,
      0.0 if none.

      3. SUMMARY CLARITY (0–0.34): Does the agent''s final summary clearly explain
      what was done — which customers were identified, which contacts were found,
      and that drafts (not live emails) were saved for review? Score 0.34 if the summary
      is clear, accurate, and actionable; 0.17 if partially complete; 0.0 if missing
      or misleading.

      '
    type: llm_judge
  name: draft_quality_and_completeness
  weight: 0.3
