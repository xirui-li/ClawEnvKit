tools:
- description: List CRM customers, filterable by tier, status, and industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get full details of a specific CRM customer by customer_id
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: List helpdesk tickets, filterable by status
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get full details of a specific helpdesk ticket by ticket_id
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Search the contacts directory by name, company, or keyword; optionally
    filter by department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full details of a specific contact by contact_id
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Save a draft email with recipient, subject, body, and optional reply_to_message_id
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
- description: Send an email immediately with to, subject, and body
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
