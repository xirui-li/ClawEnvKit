- check:
    rubric: "Evaluate the agent's outreach summary on three dimensions:\n1. COVERAGE\
      \ (0–0.4): Did the agent identify and act on all three flagged transactions\n\
      \   (txn-1041 / NovaTech Solutions $4,850, txn-1042 / Meridian Office Supply\
      \ $2,310,\n   txn-1043 / Apex Cybersecurity Group $7,200)? Award 0.4 if all\
      \ three are addressed,\n   0.2 if two, 0.1 if one, 0.0 if none.\n\n2. MESSAGE\
      \ QUALITY (0–0.4): Were the messages sent to contacts (Sandra Okafor, Derek\
      \ Huang,\n   Priya Nambiar) professional and specific — referencing the transaction\
      \ amount, date, and\n   requesting invoice confirmation? Award 0.4 if all messages\
      \ are specific and professional,\n   0.2 if generic or missing key details,\
      \ 0.0 if no messages described.\n\n3. SUMMARY CLARITY (0–0.2): Does the final\
      \ summary clearly list which vendor contacts were\n   reached, the transaction\
      \ IDs and amounts, and confirm that outreach was completed?\n   Award 0.2 for\
      \ a clear structured summary, 0.1 for partial, 0.0 for absent.\n\nTotal score\
      \ = sum of the three dimension scores (max 1.0).\n"
    type: llm_judge
  name: outreach_quality_and_completeness
  weight: 0.25
