prompt: 'Our finance team flagged three transactions from last month that need vendor
  verification before we can close the books. For each flagged transaction, find the
  corresponding vendor contact in our directory and send them a message requesting
  invoice confirmation. Then compile a summary report of your outreach efforts, including
  the transaction details and which contacts you reached.

  '
reference_solution: "1. Call list_transactions or get_transaction for txn-1041, txn-1042,\
  \ and txn-1043 to retrieve\n   details of the three flagged transactions (NovaTech\
  \ Solutions $4,850, Meridian Office Supply\n   $2,310, Apex Cybersecurity Group\
  \ $7,200).\n2. For each vendor, call search_contacts with the vendor name (e.g.,\
  \ \"NovaTech Solutions\") to\n   locate the corresponding contact in the directory.\n\
  3. Call get_contact for each matched contact (cnt-201 Sandra Okafor, cnt-202 Derek\
  \ Huang,\n   cnt-203 Priya Nambiar) to confirm their details.\n4. Call send_message\
  \ for each contact with a professional message referencing the specific\n   transaction\
  \ ID, amount, date, and requesting invoice confirmation.\n5. Compile and output\
  \ a summary listing each flagged transaction, the vendor contact reached,\n   and\
  \ confirmation that the outreach message was sent. Do NOT contact Green Fork Catering\
  \ or\n   PixelFlow Inc, as their transactions are already approved."
