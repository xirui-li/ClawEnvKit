- check:
    rubric: 'Evaluate the agent''s response on the following dimensions:

      1. TICKET IDENTIFICATION (0.0–0.25): Did the agent correctly identify ticket-042
      ("CRITICAL: Production Database Cluster Unreachable") as the relevant high-priority
      infrastructure ticket, and ignore the low-priority tickets (ticket-043, ticket-044)?

      2. ENGINEER NOTIFICATION (0.0–0.35): Did the agent send internal messages to
      all three Engineering department contacts — Sarah Chen (contact-001), Marcus
      Rivera (contact-002), Priya Nair (contact-003), and James Okafor (contact-006)?
      Award full credit if all four are notified, partial (0.2) if at least two are
      notified, 0.0 if none.

      3. IT MANAGER EMAIL (0.0–0.20): Did the agent find Tom Weston (contact-004,
      IT Manager) and send him a summary email that includes the ticket details and
      the names of engineers notified?

      4. MESSAGE QUALITY (0.0–0.20): Are the messages sent to engineers clear, urgent
      in tone, and include relevant ticket details (database cluster outage, ticket
      ID ticket-042, time of incident)? Is the summary email to Tom Weston well-structured
      and informative?

      Scoring: Sum the sub-scores. Return 1.0 if all four dimensions are fully satisfied,
      0.75 if three are fully satisfied, 0.5 if two are fully satisfied, 0.25 if only
      one is satisfied, 0.0 if none.

      '
    type: llm_judge
  name: quality_and_completeness
  weight: 0.35
