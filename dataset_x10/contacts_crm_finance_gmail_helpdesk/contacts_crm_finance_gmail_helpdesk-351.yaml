prompt: 'We have a critical infrastructure outage reported in our helpdesk system.
  Please find the open high-priority ticket related to infrastructure or outage, then
  search for all contacts in the Engineering department, and send each of them a message
  letting them know about the ticket details and asking them to investigate urgently.
  Finally, send a summary email to the IT manager (search for them in contacts) with
  the list of engineers you notified and the ticket details.

  '
reference_solution: '1. Call list_tickets (status: open) to retrieve open helpdesk
  tickets and identify ticket-042 ("CRITICAL: Production Database Cluster Unreachable")
  as the high-priority infrastructure ticket. 2. Call get_ticket with ticket_id: ticket-042
  to retrieve full details of the outage ticket. 3. Call search_contacts with department:
  Engineering to find all Engineering contacts: Sarah Chen (contact-001), Marcus Rivera
  (contact-002), Priya Nair (contact-003), and James Okafor (contact-006). 4. Call
  send_message for each Engineering contact (contact-001, contact-002, contact-003,
  contact-006) with a message describing the critical database outage, referencing
  ticket-042, and requesting urgent investigation. 5. Call search_contacts with a
  query for "IT Manager" or department: IT to find Tom Weston (contact-004). 6. Call
  get_contact with contact_id: contact-004 to retrieve Tom Weston''s email address
  (tom.weston@company.com). 7. Call send_email to tom.weston@company.com with a subject
  referencing the critical outage and a body summarizing ticket-042 details and listing
  the four engineers who were notified. 8. Report back to the user confirming all
  actions taken, the ticket details, the engineers messaged, and the summary email
  sent to Tom Weston.'
