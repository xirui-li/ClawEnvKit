prompt: 'Our finance team needs to close out Q3 vendor expenses. Please find all transactions
  from September 2024, identify which vendors are over $500, then look up the internal
  contact responsible for vendor relations (search for someone in the Procurement
  department), and send them a message summarizing the high-value transactions. Finally,
  submit a formal expense report titled "Q3 Vendor Expense Reconciliation" covering
  all September transactions with the correct total.

  '
reference_solution: "1. Call list_transactions with start_date \"2024-09-01\" and\
  \ end_date \"2024-09-30\" to retrieve all\n   six September transactions (txn-001\
  \ through txn-006).\n2. Review the results and identify the four transactions where\
  \ amount > $500:\n   txn-002 NovaTech Cloud $1,850.00, txn-003 Harvest Table Catering\
  \ $620.75,\n   txn-005 Mercer & Holt Legal $2,400.00, txn-006 WorkSpace Solutions\
  \ $875.00.\n3. Calculate the total of all six transactions: $342.50 + $1,850.00\
  \ + $620.75 + $215.00 + $2,400.00 + $875.00 = $6,303.25. 4. Call search_contacts\
  \ with department \"Procurement\" to find Diana Reyes (con-101), Vendor Relations\
  \ Manager. 5. Call send_message with contact_id \"con-101\" and a message summarizing\
  \ the four high-value vendors\n   and their amounts, noting these require attention\
  \ for Q3 close-out.\n6. Call submit_report with title \"Q3 Vendor Expense Reconciliation\"\
  , all six transaction IDs\n   (txn-001 through txn-006), and total_amount 6303.25.\n\
  7. Report back to the user confirming the expense report was submitted, the total\
  \ amount, which vendors\n   exceeded $500, and that Diana Reyes was notified."
