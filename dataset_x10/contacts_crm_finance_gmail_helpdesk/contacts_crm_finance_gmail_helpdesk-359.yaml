tools:
- description: List finance transactions within a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get details of a specific transaction by ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit a formal expense report with title, transaction IDs, and total
    amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: Search contacts by name or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full details of a contact by ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
