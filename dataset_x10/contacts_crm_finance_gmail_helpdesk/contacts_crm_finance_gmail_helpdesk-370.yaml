tools:
- description: Search contacts by name, department, or other query
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full details of a contact by ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a direct message to a contact by contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: List CRM customers filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get full details of a CRM customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with customer IDs and summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
