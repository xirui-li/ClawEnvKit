    - body: 'Team, we''ve closed three new enterprise accounts this quarter: Meridian
        Health Systems, Vantage Logistics Group, and BlueSky Retail Co. Please ensure
        each receives a warm welcome email from our enterprise sales team this week.
        Make it personal and industry-specific.'
      date: '2024-06-06'
