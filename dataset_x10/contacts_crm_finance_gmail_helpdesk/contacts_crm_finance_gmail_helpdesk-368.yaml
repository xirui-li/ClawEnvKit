- check:
    action: list_tickets
    service: helpdesk
    type: audit_action_exists
  name: checked_helpdesk_tickets
  weight: 0.1
- check:
    keywords:
    - Nexovate
    - flagged
    - '14200'
    - duplicate
    type: keywords_present
  name: flagged_transactions_identified
  weight: 0.15
- check:
    keywords:
    - Sandra Okafor
    - Derek Lim
    type: keywords_present
  name: procurement_contacts_named
  weight: 0.1
- check:
    keywords:
    - tkt-301
    - tkt-303
    type: keywords_present
  name: helpdesk_tickets_referenced
  weight: 0.05
- check:
    rubric: 'Evaluate the agent''s final summary on four dimensions:

      1. TRANSACTION ANALYSIS (0–0.25): Did the agent correctly identify the two flagged
      Nexovate Solutions transactions — txn-8802 ($14,200 duplicate on Nov 14) and
      txn-8804 ($8,750 consulting fee on Nov 16) — and explain why they are suspicious?

      2. CONTACT OUTREACH (0–0.25): Did the agent find and message the correct procurement
      contacts — Sandra Okafor (cnt-501, Senior Procurement Manager) and/or Derek
      Lim (cnt-502, Vendor Relations Specialist)? Full credit if both were messaged;
      partial if only one.

      3. HELPDESK CORRELATION (0–0.25): Did the agent identify the relevant open tickets
      — tkt-301 (duplicate invoice) and tkt-303 (missing PO for Nexovate) — and connect
      them to the finance anomaly?

      4. SUMMARY CLARITY (0–0.25): Is the final output well-organized, actionable,
      and clearly communicates the risk and next steps to a non-technical stakeholder?

      Score 1.0 if all four dimensions are fully addressed, 0.75 if three, 0.5 if
      two, 0.25 if one, 0.0 if none.

      '
    type: llm_judge
  name: output_quality_and_completeness
  weight: 0.2
