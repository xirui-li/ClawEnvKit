prompt: 'Our finance team flagged several suspicious transactions from last week that
  may indicate a vendor billing error or potential fraud. I need you to investigate
  the flagged transactions, then find and contact the relevant internal procurement
  contacts who handle vendor relationships, and finally check if any related helpdesk
  tickets have been opened about this issue. Summarize your findings and confirm that
  the appropriate procurement staff have been messaged.

  '
reference_solution: '1. Call list_inbox to retrieve recent emails and identify the
  CFO''s urgent message (msg-001) about Nexovate Solutions. 2. Call get_message with
  message_id=msg-001 to read the full details of the CFO''s alert. 3. Call list_transactions
  with a date range covering the past week (2024-11-11 to 2024-11-18) to retrieve
  all recent transactions. 4. Review the results and identify txn-8802 ($14,200 flagged
  duplicate from Nexovate on Nov 14) and txn-8804 ($8,750 flagged consulting fee from
  Nexovate on Nov 16) as the suspicious entries. 5. Call list_customers or get_customer
  to pull the CRM record for Nexovate Solutions (cust-901) to understand the vendor
  relationship context. 6. Call list_tickets with status=open to retrieve all open
  helpdesk tickets. 7. Review tickets and identify tkt-301 (duplicate invoice from
  Nexovate) and tkt-303 (missing PO for Nexovate) as directly related to the finance
  anomaly. 8. Call search_contacts with department=Procurement to find internal procurement
  staff. 9. Call get_contact for cnt-501 (Sandra Okafor) and cnt-502 (Derek Lim) to
  confirm their details. 10. Call send_message for cnt-501 and cnt-502 with a message
  summarizing the flagged transactions (txn-8802, txn-8804), the related open tickets
  (tkt-301, tkt-303), and requesting immediate review. 11. Provide a written summary
  to the user covering: the two flagged Nexovate transactions totaling $22,950, the
  two related open helpdesk tickets, the procurement contacts who were notified, and
  recommended next steps.'
