- check:
    rubric: 'Evaluate the agent''s final output on the following dimensions:

      1. CUSTOMER ACCURACY (0.0–0.3): Does the output correctly identify the three
      enterprise technology customers — Nexaflow Technologies (cust-101), Orbitron
      Systems (cust-102), and Brightwave Analytics (cust-103) — and correctly exclude
      non-tech enterprise customers (Greenfield Logistics) and non-enterprise tech
      customers (Pinnacle Retail Group)?

      2. ACCOUNT MANAGER COVERAGE (0.0–0.3): Does the output mention the relevant
      internal account managers found in the contacts directory — Sandra Okafor (Senior
      Account Manager), Marcus Delgado (Account Manager), and Priya Nambiar (Enterprise
      Account Manager) — and note their availability for leading outreach? Lena Hartmann
      (Finance) should NOT be recommended as an account manager.

      3. TICKET RISK FLAGGING (0.0–0.2): Does the output clearly flag that Nexaflow
      Technologies has an open high-priority ticket (ticket-301, API integration failure)
      and Orbitron Systems has an open medium-priority billing ticket (ticket-302),
      recommending these be resolved before outreach? Brightwave''s closed ticket
      (ticket-303) should be noted as resolved.

      4. REPORT EXPORT CONFIRMATION (0.0–0.1): Does the output confirm that a CRM
      export report was successfully submitted with the enterprise tech customers
      included?

      5. CLARITY AND ACTIONABILITY (0.0–0.1): Is the output well-organized, clearly
      written, and actionable for the sales team planning the outreach campaign?

      Scoring: 0.9–1.0 = all dimensions addressed accurately; 0.7–0.89 = minor omissions;
      0.5–0.69 = significant gaps (e.g., missing ticket flags or wrong customers);
      below 0.5 = major errors or incomplete output.

      '
    type: llm_judge
  name: output_quality_and_completeness
  weight: 0.2
