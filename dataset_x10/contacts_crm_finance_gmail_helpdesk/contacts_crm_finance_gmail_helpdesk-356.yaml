prompt: 'Our sales team is preparing a targeted outreach campaign for enterprise-tier
  customers in the technology industry. Please identify all enterprise technology
  customers from our CRM, look up the internal contacts responsible for managing these
  accounts (search for "account manager" in the contacts directory), and then export
  a CRM report summarizing the enterprise tech customers along with a brief note about
  which internal account managers are available to lead the outreach. Also check if
  there are any open helpdesk tickets related to these customers so we can flag any
  that need attention before outreach begins.

  '
reference_solution:
- Call list_customers with tier=enterprise and industry=technology to retrieve Nexaflow
  Technologies (cust-101), Orbitron Systems (cust-102), and Brightwave Analytics (cust-103).
  Note that Greenfield Logistics (logistics industry) and Pinnacle Retail Group (standard
  tier) do not qualify.
- Call search_contacts with query="account manager" to find internal contacts Sandra
  Okafor (cont-201), Marcus Delgado (cont-202), Priya Nambiar (cont-203), and Tom
  Whitfield (cont-204). Note Lena Hartmann is in Finance and not relevant.
- Optionally call get_contact on one or more account managers to confirm their details
  and department.
- Call list_tickets with status=open to retrieve open helpdesk tickets. Identify ticket-301
  (Nexaflow, high priority API failure) and ticket-302 (Orbitron, medium priority
  billing issue) as relevant to the enterprise tech customers. Note ticket-303 (Brightwave)
  is already closed.
- Call export_report with the three enterprise tech customer IDs (cust-101, cust-102,
  cust-103), a descriptive title such as "Enterprise Technology Customer Outreach
  Report", and a summary that includes the available account managers and open ticket
  flags.
- Present a clear summary to the sales team listing the three target customers, the
  recommended account managers, and the two open tickets that should be resolved before
  outreach begins.
