tools:
- description: List CRM customers filtered by status, tier, and/or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information about a specific customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with selected customers and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
- description: Search internal contacts directory by query or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get detailed information about a specific internal contact
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: List helpdesk tickets filtered by status
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get details of a specific helpdesk ticket
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Send a message to an internal contact by contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
