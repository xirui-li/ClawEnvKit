    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.1
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: used_message_reading
  weight: 0.15
- check:
    action: create_draft
    service: gmail
    type: audit_action_exists
  name: created_reply_draft
  weight: 0.15
- check:
    action: create_draft
    contains: CNE-4714
    field: body
    service: gmail
    type: audit_field_contains
  name: draft_mentions_correct_code
  weight: 0.12
- check:
    action: create_draft
    contains: CNE-4471
    field: body
    service: gmail
    type: audit_field_contains
  name: draft_mentions_wrong_old_code
  weight: 0.08
- check:
    action: create_draft
    contains: marina.chen@northstararts.org
    field: to
    service: gmail
    type: audit_field_contains
  name: draft_addressed_to_marina
  weight: 0.08
- check:
    actions:
    - list_inbox
    - get_message
    - create_draft
    service: gmail
    type: audit_sequence
  name: logical_order_review_then_draft
  weight: 0.07
- check:
    keywords:
    - CNE-4714
    - Marina
    type: keywords_present
  name: final_output_mentions_correct_code
  weight: 0.1
- check:
    keywords:
    - CNE-4471 is correct
    type: keywords_absent
  name: final_output_avoids_claiming_old_code_is_correct
  weight: 0.05
- check:
    rubric: Evaluate whether the agent correctly identifies CNE-4714 as the valid
      carnet code based on Priya Nandakumar's 'Final customs packet approved for touring
      exhibit' message, recognizes that CNE-4471 came from an older superseded February
      worksheet, and states that a draft reply to Marina Chen was prepared. Score
      1.0 if all three are clearly and accurately conveyed with no contradictions;
      0.5 if the correct code is given but the explanation of the incorrect earlier
      code or the draft status is incomplete; 0.0 if the code is wrong or the explanation
      is materially inaccurate.
    type: llm_judge
  name: response_quality_and_accuracy
  weight: 0.1
