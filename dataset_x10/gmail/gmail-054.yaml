category: communication
claw_eval_id: T06_email_reply_draft
difficulty: medium
fixtures:
  inbox:
  - body: 'Hi team,


      Before we release the Calder mobile for the Harbor City Arts loan, we need written
      confirmation that your outgoing crate will meet our handling specs. Please confirm
      the interior dimensions will be at least 84 x 36 x 36 inches, with Ethafoam
      blocking and a humidity indicator card inside. Our preferred pickup window is
      Tuesday, May 14 between 9:00 AM and 12:00 PM at the North Bay Museum loading
      dock.


      Please reply to me directly so I can attach your confirmation to the loan file.


      Best,

      Marisol Vega

      Loans Registrar

      North Bay Museum'
    date: '2026-05-08T09:12:00'
    from: Marisol Vega <mvega@northbaymuseum.org>
    id: msg-3401
    priority: high
    read: false
    subject: Lender crate requirements for Calder mobile
    to: Exhibitions Team <exhibitions@harborcityarts.org>
  - body: The designer uploaded revised wall text proofs to the shared drive. Please
      review by end of day.
    date: '2026-05-08T11:05:00'
    from: Theo Park <theo@harborcityarts.org>
    id: msg-3402
    priority: normal
    read: true
    subject: Updated vinyl text proofs
    to: Exhibitions Team <exhibitions@harborcityarts.org>
  - body: Reminder that the freight elevator will be offline Thursday from 7 AM to
      10 AM for scheduled maintenance.
    date: '2026-05-07T16:40:00'
    from: Facilities Desk <facilities@harborcityarts.org>
    id: msg-3403
    priority: normal
    read: true
    subject: Freight elevator maintenance Thursday
    to: All Staff <all@harborcityarts.org>
  - body: I've narrowed the courier options to three vendors and will circulate rates
      tomorrow.
    date: '2026-05-06T14:18:00'
    from: Nina Solis <nsolis@harborcityarts.org>
    id: msg-3404
    priority: normal
    read: false
    subject: Courier shortlist for summer loans
    to: Exhibitions Team <exhibitions@harborcityarts.org>
prompt: I need to respond to a museum lender about a shipping crate for an upcoming
  exhibition. Find the email with the crate requirements, then draft a reply to Marisol
  Vega confirming we can meet the specs and pickup window; in your response to me,
  briefly summarize the key requirements and say that the draft is ready.
reference_solution: '1. List recent inbox messages to locate the lender email about
  crate requirements. 2. Open message msg-3401 from Marisol Vega and read the details
  carefully. 3. Extract the required facts: minimum interior dimensions 84 x 36 x
  36 inches, Ethafoam blocking, humidity indicator card, and preferred pickup window
  Tuesday, May 14 between 9:00 AM and 12:00 PM at the North Bay Museum loading dock.
  4. Save a draft reply addressed to Marisol Vega <mvega@northbaymuseum.org> confirming
  that the team can meet those crate specifications and pickup window, and that the
  confirmation can be attached to the loan file. 5. Respond to the user with a concise
  summary of the requirements and note that the draft is ready, without claiming the
  email was sent.'
