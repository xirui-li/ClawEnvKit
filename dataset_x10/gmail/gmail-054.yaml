    - sent the email
    - email has been sent
    type: keywords_absent
  name: output_avoids_false_send_claim
  weight: 0.02
- check:
    rubric: 'Evaluate whether the agent accurately identifies the lender email from
      Marisol Vega at North Bay Museum about the Calder mobile and clearly summarizes
      the concrete requirements: minimum interior dimensions of 84 x 36 x 36 inches,
      Ethafoam blocking, humidity indicator card, and preferred pickup window Tuesday,
      May 14 between 9:00 AM and 12:00 PM at the North Bay Museum loading dock. Also
      assess whether the agent states that a draft reply is ready rather than claiming
      it was sent. Score 1.0 if all facts are correct and complete, 0.5 if partially
      complete or slightly inaccurate, 0.0 if the wrong email is used or key requirements
      are missed.'
    type: llm_judge
  name: summary_and_draft_quality
  weight: 0.1
scoring_notes: Weights sum to 1.0
task_id: gmail-054
task_name: Read crate specs and draft museum lender reply
tools:
