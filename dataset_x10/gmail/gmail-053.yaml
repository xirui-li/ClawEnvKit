category: communication
claw_eval_id: T06_email_reply_draft
difficulty: medium
fixtures:
  inbox:
  - body: Hi, we had to move the intake cutoff for the Jefferson permit microfilm
      batch. Please note the new deadline is Thursday, May 16 by 3:00 PM, not Friday
      morning as discussed on the phone. Also, the reels must remain upright and should
      not be left in the loading bay because humidity has been fluctuating. Please
      confirm your courier label reflects the revised intake window. Thanks, Marta
    date: '2026-05-12T09:18:00Z'
    from: Marta Ruiz <mruiz@cityarchives.gov>
    id: msg-3301
    priority: high
    read: false
    subject: Revised intake window for microfilm scan batch
    to: you@northlinepreservation.com
  - body: Can you confirm the exact intake deadline for the Jefferson permit microfilm
      scan batch? I need to finalize the courier sheet today. If there are any special
      handling instructions from the archives, include those too.
    date: '2026-05-12T10:02:00Z'
    from: Nina Patel <npatel@northlinepreservation.com>
    id: msg-3302
    priority: high
    read: false
    subject: Need final archive intake timing for courier sheet
    to: you@northlinepreservation.com
  - body: The calibration cards for the newspaper digitization project are here. I'll
      leave them in Studio B.
    date: '2026-05-11T16:40:00Z'
    from: Leo Grant <leo@northlinepreservation.com>
    id: msg-3303
    priority: low
    read: true
    subject: Color calibration cards arrived
    to: you@northlinepreservation.com
  - body: Reminder that the freight elevator will be offline from 7 AM to 9 AM on
      Wednesday for scheduled maintenance.
    date: '2026-05-11T14:05:00Z'
    from: Facilities Desk <facilities@northlinepreservation.com>
    id: msg-3304
    priority: normal
    read: true
    subject: Freight elevator maintenance Wednesday
    to: you@northlinepreservation.com
  - body: Tentatively, we were expecting the Jefferson permit reels Friday morning,
      but I'll confirm once facilities signs off.
    date: '2026-05-09T13:22:00Z'
    from: Marta Ruiz <mruiz@cityarchives.gov>
    id: msg-3305
    priority: normal
    read: true
    subject: Original intake estimate for microfilm batch
    to: you@northlinepreservation.com
prompt: I need to know whether the city archives changed the intake deadline for the
  microfilm scan batch, and then notify Nina Patel with the correct deadline and handling
  note. Check my recent email, send her a concise update, and tell me what you sent.
reference_solution: First, list recent inbox emails to identify messages about the
  Jefferson permit microfilm scan batch. Read the relevant messages, especially Nina
  Patel's request and Marta Ruiz's revised intake window email, noting that the updated
  deadline is Thursday, May 16 by 3:00 PM and that the reels must remain upright and
  not be left in the loading bay because of humidity fluctuations. Then send an email
  to Nina Patel at npatel@northlinepreservation.com with a concise update containing
  the corrected deadline and handling note. Finally, respond to the user summarizing
  that Nina was notified and restating the key details that were sent.
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.12
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: read_relevant_message
  weight: 0.08
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_update_email
  weight: 0.12
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_contains
    value: npatel@northlinepreservation.com
  name: email_sent_to_nina
  weight: 0.12
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: Thursday, May 16 by 3:00 PM
  name: email_mentions_correct_deadline
  weight: 0.12
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: upright
  name: email_mentions_handling_note
  weight: 0.1
- check:
    actions:
    - list_inbox
    - get_message
    - send_email
    service: gmail
    type: audit_sequence
  name: logical_order
  weight: 0.08
- check:
    keywords:
    - Nina Patel
    - Thursday, May 16 by 3:00 PM
    - upright
    - humidity
    type: keywords_present
  name: output_mentions_key_facts
  weight: 0.1
- check:
    keywords:
    - Friday morning is the deadline
    type: keywords_absent
  name: output_avoids_wrong_old_deadline
  weight: 0.06
- check:
    rubric: 'Evaluate whether the agent accurately reports the outcome of the task
      and the substance of the sent email. A score of 1.0 requires: (1) correctly
      identifying that Marta Ruiz''s newer email supersedes the earlier estimate,
      (2) stating the correct revised intake deadline as Thursday, May 16 by 3:00
      PM, (3) including the handling guidance that the reels must remain upright and
      should not be left in the loading bay due to humidity fluctuations, and (4)
      clearly saying that Nina Patel was notified. Score 0.7 if one minor detail is
      missing but the deadline and recipient are correct. Score 0.4 if the agent gets
      the general idea but omits either the handling note or who was notified. Score
      0.0 if it reports the outdated Friday morning timing or fails to indicate that
      Nina was contacted.'
    type: llm_judge
  name: response_quality
  weight: 0.1
task_id: gmail-053
task_name: Find archival scan deadline and notify records coordinator
tools:
- description: List recent inbox emails
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
