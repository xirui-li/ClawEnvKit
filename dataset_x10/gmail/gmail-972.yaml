category: organization
claw_eval_id: T93_pinbench_email_triage_report
difficulty: medium
fixtures:
  inbox:
  - body: Hi, we're short on volunteers for the Harborlight Pop-Up Bookstore this
      Saturday, April 13. Could you cover either the morning shift from 9:00 AM to
      12:30 PM at Pier Warehouse 4, or the afternoon shift from 1:00 PM to 4:30 PM
      at Pier Warehouse 4? Let me know which one works best. Thanks! Maya
    date: '2026-04-08T09:14:00'
    from: Maya Chen <maya@harborlightbooks.org>
    id: msg-5301
    priority: normal
    read: false
    subject: Can you cover one volunteer shift this Saturday?
    to: me@workspace-mail.com
  - body: Hi Maya — I can take the afternoon shift, 1:00 PM to 4:30 PM at Pier Warehouse
      4. Happy to help. Best, Alex
    date: '2026-04-08T09:42:00'
    from: me@workspace-mail.com
    id: msg-5302
    priority: normal
    read: true
    subject: 'Re: Can you cover one volunteer shift this Saturday?'
    to: Maya Chen <maya@harborlightbooks.org>
  - body: Thanks for helping at this weekend's pop-up. Setup opens at 8:15 AM. Please
      use the south entrance at Pier Warehouse 4. Bring a photo ID.
    date: '2026-04-10T16:05:00'
    from: Harborlight Ops <ops@harborlightbooks.org>
    id: msg-5303
    priority: normal
    read: false
    subject: Saturday volunteer packet
    to: me@workspace-mail.com
  - body: Attached are the revised signage proofs for the spring display. Please review
      by Monday.
    date: '2026-04-09T11:20:00'
    from: Nina Alvarez <nina@seabrightdesign.co>
    id: msg-5304
    priority: low
    read: false
    subject: Proofs for window signage
    to: me@workspace-mail.com
  - body: Hi again — I'm finalizing the volunteer grid. Can you remind me which shift
      you took for Saturday at the Harborlight Pop-Up Bookstore? I want to avoid double-booking
      anyone.
    date: '2026-04-11T08:03:00'
    from: Maya Chen <maya@harborlightbooks.org>
    id: msg-5305
    priority: high
    read: false
    subject: Quick check-in on Saturday staffing
    to: me@workspace-mail.com
prompt: I need to confirm which volunteer shift I agreed to cover at the Harborlight
  Pop-Up Bookstore this Saturday. Check my recent email, then send a short note to
  Maya Chen with the correct shift time and location, and tell me what you sent.
reference_solution: 'First, list recent inbox messages to find the Harborlight Pop-Up
  Bookstore thread and Maya Chen''s follow-up asking which shift was taken. Then read
  the relevant messages to confirm the prior commitment: the user agreed to the afternoon
  shift from 1:00 PM to 4:30 PM at Pier Warehouse 4. Next, send an email to Maya Chen
  confirming that exact shift and location. Finally, reply to the user with a concise
  summary of what was sent, including Maya''s name, the afternoon shift time, and
  Pier Warehouse 4.'
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.12
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: read_relevant_message
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_confirmation_email
  weight: 0.18
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_contains
    value: maya@harborlightbooks.org
  name: email_recipient_correct
  weight: 0.1
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: 1:00 PM to 4:30 PM
  name: email_includes_correct_shift_details
  weight: 0.12
- check:
    actions:
    - list_inbox
    - get_message
    - send_email
    service: gmail
    type: audit_sequence
  name: logical_order
  weight: 0.08
- check:
    keywords:
    - Maya Chen
    - afternoon shift
    - 1:00 PM to 4:30 PM
    - Pier Warehouse 4
    type: keywords_present
  name: output_mentions_key_facts
  weight: 0.1
- check:
    keywords:
    - 9:00 AM to 12:30 PM
    - morning shift
    type: keywords_absent
  name: output_avoids_wrong_shift
  weight: 0.05
- check:
    rubric: Evaluate whether the agent correctly resolved the staffing question using
      the inbox context and clearly reported the result. Score 1.0 if the response
      states that Maya Chen was sent a confirmation for the afternoon shift, includes
      both the exact time '1:00 PM to 4:30 PM' and location 'Pier Warehouse 4', and
      briefly summarizes what was sent. Score 0.7 if the correct shift is identified
      but one detail or the sent-summary is missing. Score 0.4 if the response is
      partially correct or ambiguous about morning vs afternoon. Score 0.0 if it gives
      the wrong shift, wrong recipient, or fails to indicate that an email was sent.
    type: llm_judge
  name: response_quality
  weight: 0.15
task_id: gmail-972
task_name: Confirm pop-up bookstore volunteer shift and notify coordinator
tools:
- description: List inbox emails from the Gmail mock service.
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email by message ID.
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email from the Gmail mock service.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft in the Gmail mock service.
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
