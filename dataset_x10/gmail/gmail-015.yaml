category: communication
claw_eval_id: T02_email_triage
difficulty: medium
fixtures:
  inbox:
  - body: 'We have to cancel tomorrow''s 10:00 AM table read. Stage 4 lost power overnight
      and facilities says the room is unavailable. Please notify the cast list immediately:
      june.park@talentgrid.com, diego.martin@talentgrid.com, lena.okafor@talentgrid.com,
      and evan.ross@talentgrid.com. Use release code STAGE4-RED and let them know
      we will resend once facilities confirms a new slot.'
    date: '2026-04-03T08:12:00Z'
    from: Mara Levin <mara.levin@northlightpictures.com>
    id: msg-1501
    priority: high
    read: false
    subject: 'URGENT: Release cast hold for Friday table read'
    to: you@company.com
  - body: Electrical fault isolated, but Stage 4 remains closed through Friday pending
      inspection. No occupancy permitted.
    date: '2026-04-03T07:48:00Z'
    from: Facilities Desk <facilities@northlightpictures.com>
    id: msg-1502
    priority: normal
    read: true
    subject: Stage 4 outage update
    to: you@company.com
  - body: Wardrobe racks for Monday fitting will arrive at 2 PM instead of noon.
    date: '2026-04-02T16:05:00Z'
    from: Tessa Bloom <tessa.bloom@northlightpictures.com>
    id: msg-1503
    priority: low
    read: true
    subject: Wardrobe rack delivery moved
    to: you@company.com
  - body: When releasing a cast hold, include the release code and note that a revised
      invite will follow.
    date: '2026-04-01T11:20:00Z'
    from: Production Office <production.office@northlightpictures.com>
    id: msg-1504
    priority: low
    read: true
    subject: 'Reference: cast communications format'
    to: you@company.com
prompt: Please check my recent emails and send a clear cancellation notice to the
  cast list for tomorrow's table read. The note should explain that Stage 4 lost power,
  mention the release code the production office provided, and tell everyone that
  a reschedule will follow once facilities confirms a new slot. Then tell me what
  you sent.
reference_solution: First list recent inbox emails to find the urgent message about
  the table read cancellation. Read the relevant email from Mara Levin and confirm
  the cast recipient list, the reason for cancellation (Stage 4 lost power and is
  unavailable), and the release code STAGE4-RED. Then send an email to june.park@talentgrid.com,
  diego.martin@talentgrid.com, lena.okafor@talentgrid.com, and evan.ross@talentgrid.com
  explaining that tomorrow's 10:00 AM table read is canceled, including the release
  code STAGE4-RED, and stating that a rescheduled invite will follow once facilities
  confirms a new slot. Finally, report back succinctly with what was sent and the
  key details included.
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.1
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: read_relevant_message
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_email
  weight: 0.15
- check:
    action: send_email
    contains: june.park@talentgrid.com, diego.martin@talentgrid.com, lena.okafor@talentgrid.com,
      evan.ross@talentgrid.com
    field: to
    service: gmail
    type: audit_field_contains
  name: sent_to_cast_list
  weight: 0.15
- check:
    action: send_email
    contains: STAGE4-RED
    field: body
    service: gmail
    type: audit_field_contains
  name: includes_correct_code
  weight: 0.1
- check:
    actions:
    - list_inbox
    - get_message
    - send_email
    service: gmail
    type: audit_sequence
  name: logical_order
  weight: 0.1
- check:
    keywords:
    - Stage 4
    - lost power
    - STAGE4-RED
    - reschedule
    type: keywords_present
  name: output_mentions_key_facts
  weight: 0.1
- check:
    rubric: Evaluate the agent's final response for completeness and accuracy against
      the inbox fixtures. Full credit (1.0) if it clearly states that a cancellation
      notice was sent to the cast list from Mara Levin's urgent email, correctly explains
      the reason as Stage 4 losing power / being unavailable for Friday, includes
      the release code STAGE4-RED, and notes that a new slot will be sent after facilities
      confirms it. Partial credit (0.5) if it gets most facts right but omits one
      key detail such as the code or the follow-up reschedule note. No credit (0.0)
      if it invents recipients, misses the cancellation context, or fails to describe
      what was sent.
    type: llm_judge
  name: response_quality
  weight: 0.2
task_id: gmail-015
task_name: Send cast hold release notice for rehearsal cancellation
tools:
- description: List recent inbox emails
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
