  weight: 0.05
- check:
    actions:
    - list_inbox
    - get_message
    - create_draft
    service: gmail
    type: audit_sequence
  name: logical_order
  weight: 0.05
- check:
    rubric: Evaluate whether the agent's final response accurately summarizes the
      humidity alert email and clearly states what was drafted. Full credit (1.0)
      if it identifies Lena Ortiz/North Quay Logistics as the sender, crate MM-17,
      destination Marston Museum, the peak reading of 71% RH, that the crate was moved
      to Bay 3 climate control, and that loading was paused pending registrar review,
      while also noting the pickup window of 9:00-11:00 AM. Partial credit (0.5) if
      it captures most facts but misses one or two concrete details. No credit (0.0)
      if it is vague, inaccurate, or omits the operational risk.
    type: llm_judge
  name: summary_and_draft_quality
  weight: 0.1
scoring_notes: Weights sum to 1.0
