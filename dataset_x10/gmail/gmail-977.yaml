    field: to
    service: gmail
    type: audit_field_contains
    value: lena.ortiz@northquaylogistics.com
  name: draft_addresses_lena
  weight: 0.08
- check:
    action: create_draft
    field: reply_to_message_id
    service: gmail
    type: audit_field_equals
    value: msg-5801
  name: draft_references_correct_message
  weight: 0.08
- check:
    action: create_draft
