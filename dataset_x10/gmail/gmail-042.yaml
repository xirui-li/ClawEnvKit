prompt: I need to respond to a filmmaker asking about the required on-screen credit
  for archival footage in our upcoming documentary. Check the relevant email thread,
  tell me the exact credit language they requested and the delivery deadline they
  mentioned, then save a draft reply confirming we can comply and asking them to send
  the final approval contact.
reference_solution: First, list recent inbox messages to find the thread about archival
  footage credit wording. Next, open the message from Marta Silva regarding 'Tide
  Lines' and read it carefully to extract the exact requested on-screen credit language
  and the delivery deadline of May 14. Then save a draft reply addressed to Marta
  Silva that confirms we can comply with the requested credit wording and asks her
  to send the final approval contact. Finally, respond to the user with a concise
  summary that includes the exact credit language, the deadline, and that a draft
  reply has been saved rather than sent.
