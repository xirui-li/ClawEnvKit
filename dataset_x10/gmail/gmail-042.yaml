- check:
    rubric: Evaluate whether the agent accurately identifies the relevant thread from
      Marta Silva at Northlight Docs about the documentary 'Tide Lines', states the
      exact requested credit language as 'Archival footage courtesy of Harbor City
      Archive', and reports the delivery deadline as May 14. Also evaluate whether
      the agent clearly says a draft reply was prepared confirming compliance and
      requesting the final approval contact. Score 1.0 if all facts are correct and
      complete, 0.7 if one minor detail is missing but the core facts are right, 0.4
      if the agent identifies the right email but misstates either the credit wording
      or deadline, and 0.0 if it uses the wrong email or gives materially incorrect
      information.
    type: llm_judge
  name: response_quality_and_accuracy
  weight: 0.15
