prompt: Please check my recent emails and find the message about the gala projection
  cue for the kinetic sculpture reveal. Tell me the exact approved cue phrase and
  when it should be used, then send a short confirmation email to producer Maya Chen
  so she has the final wording.
reference_solution: First, list recent inbox messages to locate the relevant conversation
  about the kinetic sculpture reveal and Maya Chen's request. Next, open the specific
  message from Rafiq Bell with the final cue wording and read it carefully. Extract
  the exact approved phrase 'Begin Phase Glass' and the condition that it should be
  spoken only after the house lights reach 30% and the scrim is fully flown, noting
  that the older phrase 'Start Glass Sequence' is outdated. Then send a concise email
  to Maya Chen at maya.chen@aurora-productions.co containing the exact approved phrase
  and the condition for when it should be called. Finally, respond to the user with
  a brief summary of the approved cue phrase, when it should be used, and that Maya
  Chen has been notified.
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.1
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: used_message_read
  weight: 0.15
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_confirmation_email
  weight: 0.15
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_equals
    value: maya.chen@aurora-productions.co
  name: email_sent_to_maya
  weight: 0.1
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: Begin Phase Glass
  name: email_mentions_approved_phrase
  weight: 0.1
- check:
    actions:
    - list_inbox
    - get_message
    - send_email
    service: gmail
    type: audit_sequence
  name: logical_order
  weight: 0.1
- check:
    keywords:
    - Begin Phase Glass
    - house lights reach 30%
    - scrim is fully flown
    - Maya Chen
    type: keywords_present
  name: output_mentions_key_facts
  weight: 0.1
- check:
    keywords:
    - final phrase is Start Glass Sequence
    - approved cue is Start Glass Sequence
    type: keywords_absent
  name: output_avoids_old_phrase_as_final
  weight: 0.05
- check:
    rubric: Evaluate whether the agent correctly identifies the relevant email content
      and communicates the result clearly. Full credit (1.0) if the response states
      that the approved cue phrase from Rafiq Bell's email is exactly 'Begin Phase
      Glass', explains that it should be used only after the house lights reach 30%
      and the scrim is fully flown, and confirms that a concise email was sent to
      Maya Chen with the final wording. Partial credit (0.5) if the phrase is correct
      but one condition or the recipient confirmation is missing or vague. No credit
      (0.0) if the agent gives the outdated phrase 'Start Glass Sequence', misses
      the timing conditions, or fails to indicate that Maya Chen was notified.
    type: llm_judge
  name: response_quality
  weight: 0.15
task_id: gmail-050
task_name: Confirm gala projection cue and notify producer
tools:
- description: List inbox emails from the Gmail mock service
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email from the Gmail mock service
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft in the Gmail mock service
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
