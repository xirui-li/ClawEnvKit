  method: POST
  name: get_message
  service: gmail
- description: Save an email draft in Gmail
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
- description: Send an email in Gmail
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
