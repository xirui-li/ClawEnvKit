      confirm which reel is actually being released and the collection time window.
      Best, Marta
    date: '2026-04-03T09:18:00'
    from: Marta Ivers <marta.ivers@northquaypost.com>
    id: msg-6801
    priority: high
    read: false
    subject: 'Urgent: courier label for nitrate reel pickup'
    to: you@studioexample.com
  - body: 'For tomorrow''s handoff: the correct nitrate reel is NR-1487, not NR-1847.
      Security approved pickup between 1:30 PM and 2:15 PM at the east loading entrance.
