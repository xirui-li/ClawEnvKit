category: communication
claw_eval_id: T05zh_email_reply_draft
difficulty: medium
fixtures:
  inbox:
  - body: 'Hi team, CBP has placed shipment NLG-4471 on documentation hold at JFK
      for the incoming exhibition crates from Lisbon. To release it, we need three
      items today: 1) signed commercial invoice, 2) lender declaration confirming
      non-sale temporary import, and 3) wood packaging compliance statement. If we
      receive all three by 4:30 PM Eastern today, we can still target inspection clearance
      tomorrow morning. Please reply confirming timing and whether the lender declaration
      will come directly from you or from the registrar. Best, Marta Silva, Harbor
      Freight Brokerage'
    date: '2026-03-18T10:12:00Z'
    from: Marta Silva <marta.silva@harborfreightbrokerage.com>
    id: msg-2601
    priority: high
    read: false
    subject: 'URGENT: Customs hold on incoming exhibition crates'
    to: ops@northlightgallery.org
  - body: The crate labels were updated with the new object numbers. No action needed
      unless customs asks for photos.
    date: '2026-03-17T15:40:00Z'
    from: Jonah Price <jonah@northlightgallery.org>
    id: msg-2602
