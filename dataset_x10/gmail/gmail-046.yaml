- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.1
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: used_message_read
  weight: 0.15
- check:
    action: create_draft
    service: gmail
    type: audit_action_exists
  name: created_reply_draft
  weight: 0.15
- check:
    action: create_draft
    field: to
    service: gmail
    type: audit_field_contains
    value: marta.silva@harborfreightbrokerage.com
  name: draft_addresses_broker
  weight: 0.08
- check:
    action: create_draft
    field: body
    service: gmail
    type: audit_field_contains
    value: 4:30 PM Eastern
  name: draft_mentions_deadline
  weight: 0.08
- check:
    action: create_draft
    field: body
    service: gmail
    type: audit_field_contains
    value: signed commercial invoice
  name: draft_mentions_required_documents
  weight: 0.09
- check:
    actions:
    - list_inbox
    - get_message
    - create_draft
    service: gmail
    type: audit_sequence
  name: logical_order_list_read_draft
  weight: 0.1
- check:
    keywords:
    - NLG-4471
    - JFK
    - documentation hold
    - tomorrow morning
    type: keywords_present
  name: output_mentions_key_hold_details
  weight: 0.1
- check:
    keywords:
    - already cleared
    - released
    - resolved
    type: keywords_absent
  name: output_avoids_false_resolution
  weight: 0.05
- check:
    rubric: Evaluate whether the agent accurately summarizes the customs hold email
      from Marta Silva and clearly states the needed next steps. A perfect response
      should mention shipment NLG-4471, that the hold is at JFK, that CBP needs three
      items (signed commercial invoice, lender declaration confirming non-sale temporary
      import, and wood packaging compliance statement), and that the deadline is 4:30
      PM Eastern today to preserve a target of inspection clearance tomorrow morning.
      It should also state that a draft reply was prepared to Marta Silva confirming
      what will be sent and when. Score 1.0 for complete and accurate coverage, 0.5
      for partially correct but missing one or two critical details, 0.0 for major
      inaccuracies or omission of the core facts.
    type: llm_judge
  name: summary_and_draft_quality
  weight: 0.1
task_id: gmail-046
task_name: Review customs hold email and draft broker response
tools:
