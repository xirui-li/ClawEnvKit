- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.08
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: used_message_reading
  weight: 0.12
- check:
    action: create_draft
    service: gmail
    type: audit_action_exists
  name: draft_created
  weight: 0.12
- check:
    action: create_draft
    field: to
    service: gmail
    type: audit_field_contains
    value: priya.shah@harborbridgebrokerage.com
  name: draft_addressed_to_priya
  weight: 0.08
- check:
    action: create_draft
    field: body
    service: gmail
    type: audit_field_contains
    value: manufacturer specification sheet
  name: draft_mentions_required_document
  weight: 0.1
- check:
    action: create_draft
    field: body
    service: gmail
    type: audit_field_contains
    value: serial plate
  name: draft_asks_about_serial_plate_photo
  weight: 0.1
- check:
    actions:
    - list_inbox
    - get_message
    - create_draft
    service: gmail
    type: audit_sequence
  name: logical_order_followed
  weight: 0.1
- check:
    keywords:
    - shipment LAE-4471
    - too broad for tariff verification
    - 3:00 PM Pacific
    - draft
    type: keywords_present
  name: output_mentions_hold_reason_and_deadline
  weight: 0.1
- check:
    keywords:
    - sent the email
    - I emailed Priya
    type: keywords_absent
  name: output_avoids_false_claim_of_sending
  weight: 0.05
- check:
    rubric: Evaluate whether the agent accurately summarizes the key facts from Priya
      Shah's message about shipment LAE-4471 and clearly reports that a draft reply
      is ready. Full credit (1.0) if the response states that CBP placed the shipment
      on hold because 'motorized display armature' was too broad for tariff verification,
      identifies the needed manufacturer specification sheet with wattage and country
      of origin for the drive unit, mentions the fallback option of a clear photo
      of the serial plate on the motor housing, includes the 3:00 PM Pacific timing/urgency,
      and says a draft to Priya Shah is prepared rather than sent. Partial credit
      (0.5) if it captures most but not all of these details or is slightly vague.
      No credit (0.0) if it misses the core hold reason, names the wrong recipient,
      or claims the email was sent.
    type: llm_judge
  name: summary_and_draft_quality
  weight: 0.15
scoring_components_note: Weights sum to 1.0
task_id: gmail-058
task_name: Summarize customs hold details and draft broker reply
tools:
- description: List inbox emails within a date range
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft, optionally as a reply
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
