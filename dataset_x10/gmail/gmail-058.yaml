category: communication
claw_eval_id: T06_email_reply_draft
difficulty: medium
fixtures:
  inbox:
  - body: 'Forwarding the broker note below. Please review before replying.


      --- Forwarded message ---

      From: Priya Shah <priya.shah@harborbridgebrokerage.com>

