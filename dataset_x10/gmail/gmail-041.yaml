category: communication
claw_eval_id: T05zh_email_reply_draft
difficulty: medium
fixtures:
  inbox:
  - body: Hi team, initial hold for Harbor House volunteer orientation is Tuesday,
      May 14 at 5:30 PM in Room B. This is still tentative while facilities confirms
      setup.
    date: '2026-05-08T09:12:00Z'
    from: Lena Ortiz <lena@harborhouse.org>
    id: msg-2101
    priority: normal
    read: false
    subject: Volunteer orientation draft schedule
    to: me@workspace.ai
  - body: 'Update: Room B is unavailable due to projector maintenance. Please move
      the Harbor House volunteer orientation to Room D if the Tuesday slot remains
      in place.'
    date: '2026-05-09T14:05:00Z'
    from: Facilities Desk <facilities@harborhouse.org>
    id: msg-2102
    priority: normal
    read: false
    subject: Room change for Harbor House volunteer orientation
    to: me@workspace.ai
  - body: 'Confirmed now: Harbor House volunteer orientation will be Wednesday, May
      15 at 6:00 PM in Room D. Please tell volunteers to bring a photo ID for check-in
      at the front desk.'
    date: '2026-05-10T16:41:00Z'
    from: Lena Ortiz <lena@harborhouse.org>
    id: msg-2103
    priority: high
    read: false
    subject: 'Final confirmation: Harbor House volunteer orientation'
    to: me@workspace.ai
  - body: Can you send me the final Harbor House volunteer orientation details once
      they're locked? I need the confirmed date, time, room, and any item volunteers
      should bring so I can send the reminder.
    date: '2026-05-10T17:03:00Z'
    from: Maya Chen <maya.chen@harborhouse.org>
    id: msg-2104
    priority: high
    read: false
    subject: Need final orientation details for volunteer reminder
    to: me@workspace.ai
  - body: The donor breakfast coffee order is confirmed for Friday at 7:15 AM. No
      action needed from you.
    date: '2026-05-10T08:20:00Z'
    from: Dev Patel <dev@harborhouse.org>
    id: msg-2105
    priority: low
    read: true
    subject: Coffee delivery for donor breakfast
    to: me@workspace.ai
prompt: I need to confirm the details for next week's volunteer orientation because
  several threads have been flying around. Check my recent inbox, figure out the final
  confirmed date, time, and room for the Harbor House orientation, then email Maya
  Chen with the confirmed details and a short note about the one thing volunteers
  should bring. Reply to me with a brief summary of what you found and that the email
  was sent.
reference_solution: First, list recent inbox messages to identify emails about Harbor
  House volunteer orientation. Read the relevant messages, especially the tentative
  schedule, the room change, the final confirmation from Lena Ortiz, and Maya Chen's
  request. Determine that the final confirmed details are Wednesday, May 15 at 6:00
  PM in Room D, and that volunteers should bring a photo ID. Send an email to maya.chen@harborhouse.org
  with those confirmed details and a short note mentioning the photo ID requirement.
  Finally, respond to the user with a concise summary of the confirmed orientation
  details and state that the email to Maya Chen was sent.
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.12
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: read_relevant_message
  weight: 0.08
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_email_to_coordinator
  weight: 0.18
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_equals
    value: maya.chen@harborhouse.org
  name: email_recipient_correct
  weight: 0.12
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: Wednesday, May 15 at 6:00 PM in Room D
  name: email_contains_confirmed_details
  weight: 0.15
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: photo ID
  name: email_mentions_photo_id
  weight: 0.1
- check:
    keywords:
    - Maya Chen
    - Wednesday, May 15
    - 6:00 PM
    - Room D
    - photo ID
    - sent
    type: keywords_present
  name: output_mentions_key_facts
  weight: 0.1
- check:
    keywords:
    - Tuesday, May 14 at 5:30 PM in Room B
    type: keywords_absent
  name: output_avoids_outdated_details
  weight: 0.05
- check:
    rubric: Evaluate whether the agent correctly resolved the conflicting Harbor House
      orientation emails and communicated the final answer clearly. Score 1.0 if the
      response accurately states that the final confirmed orientation from Lena Ortiz
      is Wednesday, May 15 at 6:00 PM in Room D, includes that volunteers should bring
      a photo ID, and clearly says an email was sent to Maya Chen. Score 0.5 if the
      response is partially correct but misses one key detail (date, time, room, recipient,
      or photo ID) or is ambiguous about whether the email was sent. Score 0.0 if
      it uses outdated details from the earlier tentative messages, omits multiple
      critical facts, or fails to indicate completion.
    type: llm_judge
  name: overall_quality
  weight: 0.1
task_id: gmail-041
task_name: Find volunteer orientation details and notify coordinator
tools:
- description: List inbox emails from the Gmail service
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email message by ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email from the Gmail service
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft in the Gmail service
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
