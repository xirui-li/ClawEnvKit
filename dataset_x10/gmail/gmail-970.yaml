category: organization
claw_eval_id: T93_pinbench_email_triage_report
difficulty: medium
fixtures:
  inbox:
  - body: 'Hi — forwarding the draft moderator packet before it goes out. Current
      details in the packet say: moderator call time 5:15 PM ET, green room Studio
      B, Zoom link https://zoom.us/j/5551002003. Please sanity check against ops before
      sending anything externally.'
    date: '2026-04-02T09:12:00'
    from: Nina Park <nina.park@civicforums.org>
    id: msg-5101
    priority: high
    read: false
    subject: Moderator packet draft for climate finance webinar
    to: me@workspace-mail.com
  - body: Use this revised ops sheet for the Apr 11 climate finance webinar. Correct
      moderator call time is 5:30 PM ET. Correct green room is Studio D. Correct Zoom
      link is https://zoom.us/j/5551002444. Please ignore any earlier packet drafts.
    date: '2026-04-02T09:26:00'
    from: Omar Reyes <omar.reyes@civicforums.org>
    id: msg-5102
    priority: high
    read: false
    subject: REVISED webinar ops sheet — use this version
    to: me@workspace-mail.com
  - body: 'Confirmed: I can moderate the Apr 11 climate finance webinar. Please send
      final access details when locked.'
    date: '2026-04-01T16:48:00'
    from: Leah Benton <leah.benton@publicledger.media>
    id: msg-5103
    priority: normal
    read: true
    subject: Moderator availability confirmed
    to: me@workspace-mail.com
  - body: Reminder that Studio B will be unavailable Thursday evening due to HVAC
      maintenance.
    date: '2026-04-01T11:05:00'
    from: Facilities Desk <facilities@civicforums.org>
    id: msg-5104
    priority: low
    read: true
    subject: Studio B HVAC maintenance Thursday
    to: me@workspace-mail.com
  - body: Archive links for March sessions attached in the internal system.
    date: '2026-03-29T14:20:00'
    from: Events Archive <archive@civicforums.org>
    id: msg-5105
    priority: low
    read: true
    subject: Last month's webinar recording links
    to: me@workspace-mail.com
prompt: I need you to check my recent email about next week's climate finance webinar
  and send the moderator the corrected logistics. The final note should clearly state
  the right Zoom link, green room, and call time, and briefly mention that the earlier
  details were outdated.
reference_solution: 'First, inspect recent inbox messages to find the webinar logistics
  thread. Read the draft packet from Nina Park, the revised ops sheet from Omar Reyes,
  and the moderator confirmation from Leah Benton. Determine that the earlier packet
  details were outdated and that the correct final logistics are: moderator call time
  5:30 PM ET, green room Studio D, and Zoom link https://zoom.us/j/5551002444. Then
  send an email to Leah Benton at leah.benton@publicledger.media with a concise subject
  and body that provides those corrected details and mentions that the earlier information
  was outdated. Finally, respond to the user confirming that the email was sent and
  summarizing the corrected logistics.'
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox
  weight: 0.1
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: reviewed_relevant_message
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_email
  weight: 0.15
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_contains
    value: leah.benton@publicledger.media
  name: sent_to_correct_moderator
  weight: 0.1
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: Studio D
  name: includes_correct_room
  weight: 0.1
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: https://zoom.us/j/5551002444
  name: includes_correct_link
  weight: 0.1
- check:
    actions:
    - list_inbox
    - get_message
    - send_email
    service: gmail
    type: audit_sequence
  name: logical_order_review_then_send
  weight: 0.1
- check:
    keywords:
    - Leah Benton
    - 5:30 PM ET
    - Studio D
    - https://zoom.us/j/5551002444
    type: keywords_present
  name: output_mentions_key_corrections
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent''s response clearly and accurately states
      that an email was sent to Leah Benton with the corrected webinar logistics from
      Omar Reyes''s revised ops sheet. A perfect score (1.0) requires all of the following:
      identifies Leah Benton as the recipient, includes the corrected call time of
      5:30 PM ET, includes the corrected green room Studio D, includes the corrected
      Zoom link https://zoom.us/j/5551002444, and notes that earlier details (5:15
      PM ET / Studio B / https://zoom.us/j/5551002003) were outdated or superseded.
      Score 0.7 if one key correction is missing but the rest are accurate; 0.4 if
      multiple details are vague or incomplete; 0.0 if the response is inaccurate
      or does not reflect the completed action.'
    type: llm_judge
  name: quality_of_summary
  weight: 0.15
task_id: gmail-970
task_name: Send corrected webinar moderator details
tools:
- description: List inbox emails from the last several days
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
