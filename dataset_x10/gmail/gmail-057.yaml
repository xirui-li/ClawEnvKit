prompt: I’m covering front desk tonight and need to know whether the loading dock
  access code changed for tomorrow’s after-hours floral delivery at the Marlowe Hotel.
  Check my recent email, then send a short note to night porter Priya Nair with the
  correct code and the delivery window, and tell me what you sent.
reference_solution: First list recent inbox emails to identify any message about the
  Marlowe Hotel loading dock, florist delivery, or access code changes. Read the relevant
  security email with subject 'Updated loading dock keypad code for Thursday florist
  delivery' to confirm the exact code and delivery window. Then send an email to night
  porter Priya Nair that briefly states the loading dock access code is 4829# and
  that the florist delivery window is 6:15 AM to 6:45 AM. Finally, respond to the
  user with a short confirmation summarizing what was sent, including Priya's name,
  the code, and the delivery window.
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.12
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: read_relevant_message
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_notification
  weight: 0.12
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_contains
    value: priya
  name: sent_to_priya
  weight: 0.12
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: 4829#
  name: email_mentions_code
  weight: 0.1
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: 6:15 AM to 6:45 AM
  name: email_mentions_window
  weight: 0.1
- check:
    actions:
    - list_inbox
    - send_email
    service: gmail
    type: audit_sequence
  name: logical_order_list_before_send
  weight: 0.09
- check:
    keywords:
    - Priya Nair
    - 4829#
    - 6:15 AM to 6:45 AM
    - loading dock
    type: keywords_present
  name: output_mentions_key_details
  weight: 0.1
- check:
    keywords:
    - cashmere scarf
    - petty cash
    - 42 ivory tablecloths
    type: keywords_absent
  name: output_avoids_irrelevant_details
  weight: 0.05
- check:
    rubric: Evaluate whether the agent clearly reports the correct operational update
      from the inbox and summarizes the sent email accurately. Full credit (1.0) if
      the response states that the relevant message was the security email about the
      Thursday florist delivery, gives the exact loading dock keypad code 4829#, includes
      the delivery window 6:15 AM to 6:45 AM, and says that a concise note was sent
      to Priya Nair/night porter. Partial credit (0.5) if it gets most details right
      but misses one of code, recipient, or window. No credit (0.0) if it confuses
      the message with unrelated fixture emails such as linen count, lost scarf, or
      petty cash.
    type: llm_judge
  name: response_quality
  weight: 0.1
task_id: gmail-057
task_name: Find venue access code update and notify night porter
tools:
- description: List recent inbox emails
  endpoint: /gmail/messages
