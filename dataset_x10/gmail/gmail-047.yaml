category: communication
claw_eval_id: T05zh_email_reply_draft
difficulty: medium
fixtures:
  inbox:
  - body: 'Hi, quick correction from this morning''s draft schedule: the Harbor Lights
      documentary livestream will begin at 7:30 PM Eastern on Thursday, October 16.
      Sponsor guests should use the mezzanine entrance and arrive by 6:45 PM for badge
      pickup and seating. Please make sure North Pier Partners gets the corrected
      timing, since their invite proof still showed 7:00 PM. Thanks.'
    date: '2026-10-12T09:18:00'
    from: Maya Chen <maya.chen@harborlightsdoc.org>
    id: msg-2701
    priority: high
    read: false
    subject: Updated run of show for Harbor Lights livestream
    to: me@workspace.ai
  - body: Your stream key for event HL-8841 was rotated at 08:02 AM. No action needed
      unless external embeds fail.
    date: '2026-10-12T08:05:00'
    from: Events Bot <noreply@streamhub.io>
    id: msg-2702
    priority: low
    read: true
    subject: Stream key rotated successfully
    to: me@workspace.ai
  - body: Morning — our guest list is locked, but our printed invite proof still says
      7:00 PM. Can you confirm the actual livestream start time and when our guests
      should arrive for check-in? If possible, send the final details directly to
      sponsorrelations@northpierpartners.com so our team can circulate it internally.
    date: '2026-10-12T08:41:00'
    from: Jordan Alvarez <jordan@northpierpartners.com>
    id: msg-2703
    priority: high
    read: false
    subject: Sponsor guest timing for Harbor Lights?
    to: me@workspace.ai
  - body: Attaching the revised parking map separately. VIP overflow should use Lot
      C after 6 PM.
    date: '2026-10-11T16:22:00'
    from: Lena Ortiz <lena@harborlightsdoc.org>
    id: msg-2704
    priority: normal
    read: true
    subject: Parking map for Thursday
    to: me@workspace.ai
  - body: Reminder that invoice INV-2048 for captioning services is due Friday.
    date: '2026-10-10T11:03:00'
    from: Accounting <ap@harborlightsdoc.org>
    id: msg-2705
    priority: normal
    read: true
    subject: 'Invoice reminder: captioning vendor'
    to: me@workspace.ai
prompt: Please check my recent emails to confirm the corrected start time for the
  Harbor Lights documentary livestream and then send a note to sponsorrelations@northpierpartners.com
  with the final timing and guest check-in details. In your response to me, briefly
  confirm what you sent.
reference_solution: First, list recent inbox messages to find the relevant emails
  about Harbor Lights sponsor timing. Read the message from Jordan Alvarez asking
  for confirmation and the message from Maya Chen containing the corrected run-of-show
  details. Then send an email to sponsorrelations@northpierpartners.com stating that
  the Harbor Lights documentary livestream begins at 7:30 PM Eastern on Thursday,
  October 16, and that sponsor guests should use the mezzanine entrance and arrive
  by 6:45 PM for badge pickup and seating. Finally, reply to the user with a brief
  confirmation summarizing that the email was sent and the key details included.
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.1
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: read_relevant_message
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_email
  weight: 0.15
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_equals
    value: sponsorrelations@northpierpartners.com
  name: sent_to_correct_recipient
  weight: 0.15
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: 7:30 PM Eastern
  name: email_includes_corrected_time
  weight: 0.1
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: arrive by 6:45 PM
  name: email_includes_checkin_details
  weight: 0.1
- check:
    keywords:
    - sponsorrelations@northpierpartners.com
    - 7:30 PM Eastern
    - 6:45 PM
    - mezzanine entrance
    type: keywords_present
  name: output_confirms_send_and_details
  weight: 0.1
- check:
    keywords:
    - 7:00 PM is the final start time
    type: keywords_absent
  name: output_avoids_wrong_time
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent completed the task accurately and clearly.
      Full credit (1.0) if the response states that an email was sent to sponsorrelations@northpierpartners.com
      and correctly reflects the fixture facts from Maya Chen''s ''Updated run of
      show for Harbor Lights livestream'' and Jordan Alvarez''s ''Sponsor guest timing
      for Harbor Lights?'' emails: livestream begins at 7:30 PM Eastern on Thursday,
      October 16; sponsor guests should arrive by 6:45 PM; guests should use the mezzanine
      entrance for badge pickup and seating. Partial credit (0.5) if the send is confirmed
      but one detail is missing or slightly unclear. No credit (0.0) if the response
      gives the wrong time, omits the send confirmation, or fails to mention the guest
      check-in details.'
    type: llm_judge
  name: quality_of_completion
  weight: 0.15
task_id: gmail-047
task_name: Send corrected livestream timing to sponsor guest list
tools:
- description: List inbox emails from Gmail
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single Gmail message by ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email from Gmail
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save a Gmail draft
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
