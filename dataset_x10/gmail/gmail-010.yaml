category: communication
claw_eval_id: T01zh_email_triage
difficulty: medium
fixtures:
  inbox:
  - body: 'Hi team,


      Following up on the nitrate reel transfer for the Silver Frame restoration project.
      Our courier coordinator, Lena Ortiz, can only lock the route once we confirm
      the loading dock window and the number of cases.


      Please reply directly to Lena at lena.ortiz@citylinecouriers.com with the confirmed
      pickup window.


      Best,

      Marta'
    date: '2026-03-18T09:12:00Z'
    from: Marta Ivers <marta.ivers@silverframearchive.org>
    id: msg-1001
    priority: high
    read: false
    subject: 'Re: Pickup timing for nitrate reel transfer'
    to: operations@northlightstudio.com
  - body: 'Good news — Building Ops confirmed Dock 3 for Thursday, March 21. Security
      approved access from 2:00 PM to 4:30 PM, but the courier needs to arrive no
      later than 4:00 PM for check-in. There will be 6 sealed transport cases, all
      labeled Silver Frame.


      Please make sure the courier coordinator has the exact window and case count.


      - Dev'
    date: '2026-03-18T10:04:00Z'
    from: Dev Malik <dev.malik@northlightstudio.com>
    id: msg-1002
    priority: high
    read: false
    subject: Dock booking confirmed for archive pickup
    to: operations@northlightstudio.com
  - body: 'Hello,


      I’m finalizing tomorrow’s route sheet for the archive transfer. Please confirm
      the pickup window, dock location, and total number of cases by end of day so
      I can assign the vehicle.


      Thanks,

      Lena Ortiz

      Courier Coordinator

      CityLine Couriers'
    date: '2026-03-18T11:26:00Z'
    from: Lena Ortiz <lena.ortiz@citylinecouriers.com>
    id: msg-1003
    priority: high
    read: false
    subject: Need final pickup window today
    to: operations@northlightstudio.com
  - body: Reminder that backup generator testing will occur Friday at 7:00 AM. No
      action needed.
    date: '2026-03-17T16:40:00Z'
    from: Facilities Desk <facilities@northlightstudio.com>
    id: msg-1004
    priority: low
    read: true
    subject: Weekly generator maintenance notice
    to: operations@northlightstudio.com
  - body: The color timing session has been moved to Studio B at 1 PM. Please update
      the internal board.
    date: '2026-03-18T08:15:00Z'
    from: Priya Nand <priya.nand@northlightstudio.com>
    id: msg-1005
    priority: medium
    read: true
    subject: Color session moved to Studio B
    to: operations@northlightstudio.com
prompt: I need to confirm the pickup window for our film restoration reels and reply
  to the courier coordinator with the correct details. Check the relevant email thread,
  then send a concise confirmation to the coordinator and tell me what you sent.
reference_solution: First, list recent inbox messages to identify the relevant archive
  pickup thread. Read the key messages, especially Marta Ivers's note directing a
  reply to Lena Ortiz, Dev Malik's message with the confirmed logistics, and Lena
  Ortiz's request for final details. Then send an email to lena.ortiz@citylinecouriers.com
  confirming Thursday, March 21 pickup at Dock 3, access window 2:00 PM to 4:30 PM,
  arrival no later than 4:00 PM, and 6 sealed transport cases labeled Silver Frame.
  Finally, respond to the user with a brief summary of the confirmation that was sent.
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.1
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: used_message_reading
  weight: 0.15
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_confirmation_email
  weight: 0.15
- check:
    action: send_email
    contains: lena.ortiz@citylinecouriers.com
    field: to
    service: gmail
    type: audit_field_contains
  name: email_sent_to_lena
  weight: 0.1
- check:
    action: send_email
    contains: 2:00 PM to 4:30 PM
    field: body
    service: gmail
    type: audit_field_contains
  name: email_mentions_pickup_window
  weight: 0.1
- check:
    action: send_email
    contains: '6'
    field: body
    service: gmail
    type: audit_field_contains
  name: email_mentions_case_count
  weight: 0.1
- check:
    keywords:
    - Lena Ortiz
    - Dock 3
    - 2:00 PM to 4:30 PM
    - 6 sealed transport cases
    type: keywords_present
  name: output_mentions_key_details
  weight: 0.1
- check:
    keywords:
    - Dock 2
    - 8 cases
    - 5:00 PM
    type: keywords_absent
  name: output_avoids_invented_details
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent correctly identified the relevant thread and
      accurately reported what was sent to Lena Ortiz at lena.ortiz@citylinecouriers.com.
      A perfect score requires: (1) the response clearly states that the courier was
      sent a confirmation, (2) it includes the correct pickup window of Thursday,
      March 21, 2:00 PM to 4:30 PM, with arrival no later than 4:00 PM, (3) it includes
      Dock 3 and 6 sealed transport cases labeled Silver Frame, and (4) it is concise
      and businesslike. Score 1.0 if all details are correct and complete; 0.7 if
      one minor detail is missing; 0.4 if the main window is correct but multiple
      supporting details are missing; 0.0 if key facts are wrong or the action taken
      is unclear.'
    type: llm_judge
  name: response_quality_and_accuracy
  weight: 0.15
task_id: gmail-010
task_name: Confirm archival pickup window for film restoration reels
tools:
- description: List inbox emails from the Gmail service
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email from the Gmail service
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft in the Gmail service
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
