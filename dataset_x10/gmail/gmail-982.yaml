category: synthesis
claw_eval_id: T94_pinbench_project_alpha_summary
difficulty: medium
fixtures:
  inbox:
  - body: 'Quick note before I board: Theo Park is joining us for the pickup shots
      tomorrow. Please send him the logistics. IMPORTANT correction: call time is
      6:10 AM, not 6:40. Meet at the freight elevator entrance on the Mercer Street
      side because the lobby doors stay locked that early. Building security also
      asked that everyone bring a photo ID for roof access. Theo''s address is theo.park.freelance@gmail.com.'
    date: '2026-04-03T16:42:00Z'
    from: Mina Alvarez <mina@northlightstudio.com>
    id: msg-6301
    priority: high
    read: false
    subject: Tomorrow rooftop sunrise pickup shots
    to: me@workspace.test
  - body: Thanks — just checking whether the meetup is still 6:40 AM at the main lobby,
      or if anything changed. I need to book my car tonight.
    date: '2026-04-03T17:05:00Z'
    from: Theo Park <theo.park.freelance@gmail.com>
    id: msg-6302
    priority: high
    read: false
    subject: 'Re: Tomorrow rooftop sunrise pickup shots'
    to: me@workspace.test
  - body: Packed the 24mm and 50mm primes. Battery bricks are charging now.
    date: '2026-04-03T15:10:00Z'
    from: Jules Han <jules@northlightstudio.com>
    id: msg-6303
    priority: normal
    read: true
    subject: Lens kit packed
    to: me@workspace.test
  - body: All visitors accessing the roof must present a government-issued photo ID
      at check-in. Early arrivals should use the Mercer Street freight elevator entrance.
    date: '2026-04-03T14:20:00Z'
    from: Mercer Tower Security <security@mercertower.com>
    id: msg-6304
    priority: normal
    read: true
    subject: Roof access reminder for production visitors
    to: me@workspace.test
  - body: The color review is now at 2 PM instead of 1 PM.
    date: '2026-04-02T19:30:00Z'
    from: Nadia Bloom <nadia@northlightstudio.com>
    id: msg-6305
    priority: low
    read: true
    subject: Color pass moved
    to: me@workspace.test
prompt: I need you to check my recent emails and send a correction to Theo Park about
  tomorrow's rooftop filming meetup. The original note had the wrong time — the correct
  meetup is 6:10 AM at the freight elevator on the Mercer Street side, and please
  mention that everyone should bring photo ID for roof access. Then tell me briefly
  what you sent.
reference_solution: 'First, inspect recent inbox messages to find the relevant thread
  about the rooftop filming meetup. Read the message from Mina Alvarez and/or Theo
  Park to confirm the corrected logistics: Theo''s email address is theo.park.freelance@gmail.com,
  the correct meetup time is 6:10 AM, the meeting point is the freight elevator on
  the Mercer Street side, and attendees must bring photo ID for roof access. Then
  send Theo a concise correction email with those details, making clear that the earlier
  6:40 AM/main lobby information was wrong. Finally, respond to the user with a brief
  summary of what was sent, including the corrected time, location, and ID reminder.'
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: used_email_send
  weight: 0.15
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_contains
    value: theo.park.freelance@gmail.com
  name: sent_to_theo
  weight: 0.1
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: 6:10 AM
  name: includes_corrected_time
  weight: 0.1
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: photo ID
  name: includes_access_instruction
  weight: 0.1
- check:
    keywords:
    - Theo Park
    - 6:10 AM
    - Mercer Street
    - photo ID
    type: keywords_present
  name: output_mentions_key_details
  weight: 0.15
- check:
    keywords:
    - 6:40 AM at the main lobby
    type: keywords_absent
  name: output_avoids_wrong_logistics
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent accurately reports the action taken and the
      corrected logistics from the inbox. A perfect score (1.0) requires: it states
      that an email was sent to Theo Park/theo.park.freelance@gmail.com; it clearly
      identifies the corrected meetup time as 6:10 AM; it includes the location detail
      ''freight elevator on the Mercer Street side''; and it mentions the requirement
      to bring photo ID for roof access. Score 0.7 if one of these details is missing
      or slightly vague. Score 0.4 if the agent indicates an email was sent but misses
      multiple critical details. Score 0.0 if no send action is reflected or the summary
      repeats the incorrect 6:40 AM/main lobby logistics.'
    type: llm_judge
  name: response_quality
  weight: 0.2
task_id: gmail-982
task_name: Send corrected rooftop filming call time
tools:
- description: List inbox emails from the last several days
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
