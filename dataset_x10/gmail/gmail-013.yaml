category: communication
claw_eval_id: T02_email_triage
difficulty: medium
fixtures:
  inbox:
  - body: Sharing the draft run-of-show for Thursday's Harbor Lights launch. Current
      venue listed as Pier 48 Warehouse, guest check-in at 5:30 PM, remarks at 6:15
      PM. Please flag any conflicts by end of day.
    date: '2026-04-01T09:12:00Z'
    from: Maya Chen <maya@northstar-events.com>
    id: msg-901
    priority: normal
    read: false
    subject: Harbor Lights launch run-of-show draft
    to: you@company.com
  - body: We have a permitting problem at Pier 48 Warehouse for the Harbor Lights
      launch on Thursday. Please do not direct guests there until we confirm the backup
      site. I will send an update shortly.
    date: '2026-04-02T14:08:00Z'
    from: Luis Ortega <luis@bayfrontvenues.com>
    id: msg-902
    priority: high
    read: false
    subject: 'Urgent: Harbor Lights venue issue'
    to: you@company.com
  - body: 'The Harbor Lights launch has been moved to Seacliff Pavilion, 18 Marina
      View Ave. Timing is unchanged: guest check-in 5:30 PM, program starts 6:15 PM.
      Please update your operations team and any printed signage references to Pier
      48 Warehouse.'
    date: '2026-04-02T15:02:00Z'
    from: Luis Ortega <luis@bayfrontvenues.com>
    id: msg-903
    priority: high
    read: false
    subject: Confirmed backup venue for Harbor Lights
    to: you@company.com
  - body: Attached is the latest proof for the Harbor Lights welcome board. It still
      shows Pier 48 Warehouse on the footer because we used yesterday's event brief.
      Let me know if venue text needs to be revised before 4 PM.
    date: '2026-04-02T15:20:00Z'
    from: Nina Patel <nina@printdock.co>
    id: msg-904
    priority: normal
    read: false
    subject: Signage proof for Harbor Lights welcome board
    to: you@company.com
  - body: 'Separate item: I have 12 parking vouchers reserved for the Friday client
      dinner at Alder House. No action needed unless headcount changes.'
    date: '2026-04-02T11:05:00Z'
    from: Avery Brooks <avery@northstar-events.com>
    id: msg-905
    priority: low
    read: true
    subject: Parking vouchers for Friday client dinner
    to: you@company.com
prompt: Please check my recent inbox for updates about the Harbor Lights product launch
  and figure out whether the venue has changed. Then send a short email to ops@northstar-events.com
  with the confirmed venue details and give me a brief summary of what you found.
reference_solution: First, list recent inbox messages to find emails related to the
  Harbor Lights launch. Read the relevant messages, especially the urgent venue issue
  and the confirmed backup venue email from Luis Ortega. Determine that Pier 48 Warehouse
  had a permitting problem and that the event was moved to Seacliff Pavilion, 18 Marina
  View Ave, with timing unchanged at 5:30 PM check-in and 6:15 PM start. Send an email
  to ops@northstar-events.com notifying them of the confirmed venue change and including
  the updated venue details. Finally, respond to the user with a brief summary stating
  that the venue changed from Pier 48 Warehouse to Seacliff Pavilion and that operations
  were notified.
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.12
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: reviewed_specific_message
  weight: 0.08
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_ops_notification
  weight: 0.18
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_equals
    value: ops@northstar-events.com
  name: ops_recipient_correct
  weight: 0.12
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: Seacliff Pavilion
  name: email_mentions_new_venue
  weight: 0.1
- check:
    actions:
    - list_inbox
    - get_message
    - send_email
    service: gmail
    type: audit_sequence
  name: logical_review_order
  weight: 0.1
- check:
    keywords:
    - Seacliff Pavilion
    - 18 Marina View Ave
    - Pier 48 Warehouse
    - 5:30 PM
    - 6:15 PM
    type: keywords_present
  name: summary_includes_key_facts
  weight: 0.1
- check:
    keywords:
    - venue unchanged
    - still at Pier 48
    type: keywords_absent
  name: summary_avoids_wrong_conclusion
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent correctly determined the Harbor Lights launch
      moved from Pier 48 Warehouse to Seacliff Pavilion based on the inbox, sent a
      concise notification to ops@northstar-events.com, and reported the result clearly
      to the user. A perfect score requires: (1) identifying the confirmed venue from
      Luis Ortega''s ''Confirmed backup venue for Harbor Lights'' email, (2) including
      the address 18 Marina View Ave and unchanged timing of 5:30 PM check-in and
      6:15 PM program start, (3) noting that Pier 48 Warehouse was the old venue and
      should no longer be used, and (4) providing a brief user-facing summary of what
      was found and what was sent. Score 1.0 if all elements are accurate and complete;
      0.7 if the venue change is correct but one supporting detail is missing; 0.4
      if the agent identifies a venue issue but misses the confirmed replacement or
      timing; 0.0 if the conclusion is wrong or no meaningful summary is provided.'
    type: llm_judge
  name: overall_task_quality
  weight: 0.15
task_id: gmail-013
task_name: Summarize urgent venue-change emails and notify operations
tools:
- description: List recent inbox emails
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email draft
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
