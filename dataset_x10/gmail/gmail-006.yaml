      instructions, reply today so I can add them to the label notes. Best, Marta'
    date: '2026-04-01T09:14:00Z'
    from: Marta Ivers <marta@northlineprops.com>
    id: msg-601
    priority: high
    read: false
    subject: Typewriter prop shipment for Thursday shoot
    to: studioops@brightharbor.co
  - body: Facilities booked the vendor for Friday at 3 PM. Please leave the kitchenette
      accessible.
    date: '2026-04-01T11:20:00Z'
    from: Leo Grant <leo@brightharbor.co>
    id: msg-602
