prompt: Please check my recent emails and find the note about the donor dinner seating
  correction. Then send the corrected seating update to the hotel events manager and
  tell me briefly what you sent.
reference_solution: '1. List recent inbox emails to locate the message about the donor
  dinner seating correction.

  2. Open the urgent email from Mina Ortega with subject "Urgent: donor dinner seating
  correction before print."

  3. Extract the required details: send to Lena Park at lena.park@grandmeridianhotel.com;
  corrected seating is Dr. Evelyn Shaw at Table 3 Seat 2 and Marco Bell at Table 5
  Seat 1; mention that this replaces the earlier seating note sent that afternoon.

  4. Send an email to Lena Park with a clear subject about the donor dinner seating
  correction and a concise body containing the corrected seating assignments and the
  replacement note.

  5. Respond to the user with a brief confirmation summarizing what was sent and to
  whom.'
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: used_inbox_listing
  weight: 0.1
- check:
    action: get_message
    service: gmail
    type: audit_action_exists
  name: read_relevant_message
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_email
  weight: 0.15
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_equals
    value: lena.park@grandmeridianhotel.com
  name: sent_to_correct_manager
  weight: 0.1
- check:
    action: send_email
    field: body
    service: gmail
    type: audit_field_contains
    value: Dr. Evelyn Shaw should be seated at Table 3 Seat 2, and Marco Bell should
      move to Table 5 Seat 1
  name: email_includes_corrected_seating
  weight: 0.15
- check:
    keywords:
    - Lena Park
    - Dr. Evelyn Shaw
    - Table 3 Seat 2
    - Marco Bell
    - Table 5 Seat 1
    type: keywords_present
  name: output_mentions_key_details
  weight: 0.1
- check:
    keywords:
    - drafted only
    - could not send
    - sent to Mina
    - Table 3 Seat 1
    type: keywords_absent
  name: output_avoids_false_claims
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent''s final response accurately states that it
      found the urgent seating correction email from Mina Ortega and sent the correction
      to Lena Park at lena.park@grandmeridianhotel.com. A perfect score requires mentioning
      both corrected placements exactly: Dr. Evelyn Shaw to Table 3 Seat 2 and Marco
      Bell to Table 5 Seat 1, and noting that this replaces the earlier seating note
      so the hotel does not print incorrect place cards. Score 1.0 if all details
      are correct and clearly summarized; 0.5 if the send action is clear but one
      seating detail or the replacement context is missing/imprecise; 0.0 if the response
      is materially inaccurate or incomplete.'
    type: llm_judge
  name: response_quality_and_accuracy
  weight: 0.2
