category: productivity
claw_eval_id: T08_todo_management
difficulty: medium
fixtures:
  tasks:
  - description: Add Google and GitHub OAuth2 providers to the auth service
    due_date: '2024-07-12'
    id: task-001
    priority: high
    status: done
    tags:
    - auth
    - backend
    title: Implement OAuth2 login flow
  - description: Run Alembic migration for the expanded users table
    due_date: '2024-07-14'
    id: task-002
    priority: high
    status: in_progress
    tags:
    - database
    - backend
    title: Migrate user table to new schema
  - description: Create HTML templates for welcome and activation emails
    due_date: '2024-07-13'
    id: task-003
    priority: medium
    status: in_progress
    tags:
    - email
    - design
    title: Design onboarding email templates
  - description: Stripe webhook handler times out under load
    due_date: '2024-07-11'
    id: task-004
    priority: high
    status: blocked
    tags:
    - payments
    - bug
    title: Fix payment gateway timeout bug
  - description: Document all new REST endpoints in Swagger
    due_date: '2024-07-15'
    id: task-005
    priority: medium
    status: blocked
    tags:
    - docs
    - api
    title: Write API documentation for v2 endpoints
  - description: Configure GitHub Actions to deploy to staging on merge
    due_date: '2024-07-14'
    id: task-006
    priority: medium
    status: in_progress
    tags:
    - devops
    - ci
    title: Set up staging environment CI pipeline
  - description: Run axe-core and fix WCAG 2.1 AA violations
    due_date: '2024-07-10'
    id: task-007
    priority: low
    status: done
    tags:
    - frontend
