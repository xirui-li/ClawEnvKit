  tasks:
  - description: Add OAuth2 authentication support for Google and GitHub providers.
    due_date: '2024-06-14'
    id: task-001
    priority: high
    status: in_progress
    tags:
    - auth
    - backend
    title: Implement OAuth2 login flow
  - description: Users are being logged out prematurely due to incorrect session TTL
