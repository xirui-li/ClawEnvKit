    due_date: '2025-02-05'
    id: task-001
    priority: high
    status: in_progress
    tags:
    - design
    - marketing
    - novaspark
    title: Design NovaSpark X1 product page
  - description: Identify and contact relevant influencers for product launch campaign.
    due_date: '2025-02-12'
    id: task-002
    priority: medium
    status: pending
    tags:
    - marketing
    - influencers
    title: Coordinate influencer outreach for NovaSpark X1
  - description: Compile slides for the all-hands meeting announcing the NovaSpark
      X1 launch.
    due_date: '2025-02-08'
    id: task-003
    priority: low
    status: pending
    tags:
    - internal
    - presentation
    title: Prepare internal launch briefing deck
  - description: Configure UTM parameters and dashboards to track launch campaign
      performance.
    due_date: '2025-02-11'
    id: task-004
    priority: medium
