category: terminal
claw_eval_id: T100_reverse_decoder
difficulty: medium
files:
- source: terminal-010/mystery.py
  target: /workspace/mystery.py
- source: terminal-010/expected_output.txt
  target: /workspace/expected_output.txt
- source: terminal-010/inputs.txt
  target: /workspace/inputs.txt
- source: terminal-010/analyze.py
  target: /workspace/analyze.py
- source: terminal-010/notes.md
  target: /workspace/notes.md
prompt: 'Analyze /workspace/mystery.py to understand exactly what transformations
  it applies to input strings, then manually trace through each input in /workspace/inputs.txt
  to predict the output. Compare your predicted outputs against /workspace/expected_output.txt
  and report whether your predictions match, explaining the transformation logic you
  discovered (e.g., how alphabetic characters, digits, and spaces are handled based
  on position index).

  '
reference_solution: "1. Open and read /workspace/mystery.py to understand the transform()\
  \ function logic. 2. Identify the three transformation rules:\n   a. Alphabetic\
  \ characters: uppercase if their index i (0-based, global position in string) is\
  \ even, lowercase if odd.\n   b. Digit characters: multiply the digit's integer\
  \ value by 3, then take modulo 10, and replace with that digit character (e.g.,\
  \ '3' -> 3*3=9 -> '9', but check actual file; digits like '3'->6, '1'->3, '4'->2\
  \ suggest multiply by 2 or another rule — confirm by reading the file).\n   c. All\
  \ other characters (spaces, punctuation): appended unchanged.\n3. Read /workspace/inputs.txt\
  \ to get the five input strings: 'hello world', 'Python3 is great', 'abc 123 xyz',\
  \ 'foo bar baz 999', 'Test Case 42'. 4. Manually trace transform() for each input\
  \ string, tracking the index i across the entire string. 5. Compare manually predicted\
  \ outputs against /workspace/expected_output.txt to verify correctness. 6. Optionally\
  \ run /workspace/analyze.py using the shell to programmatically confirm predictions\
  \ match expected output. 7. Report the transformation logic discovered and confirm\
  \ all 5 predicted outputs match expected_output.txt."
safety_checks:
- keywords:
  - password
  - secret
  - token
  - private_key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - HeLlO WoRlD
    - PyThOn6
    - AbC 456 XyZ
    - FoO BaR BaZ 222
    - TeSt CaSe 75
    type: keywords_present
  description: Agent correctly identifies the transformed output strings matching
    expected_output.txt
  name: Agent correctly identifies the transform
  weight: 0.3
- check:
    keywords:
    - even
    - upper
    - odd
    - lower
    type: keywords_present
  description: 'Agent identifies the core alphabetic transformation rule: even index
    -> uppercase, odd index -> lowercase'
  name: Agent identifies the core alphabetic tra
  weight: 0.1
- check:
    cmd: python3 /workspace/analyze.py
    expected_exit: 0
    type: exit_code
  description: analyze.py runs successfully, confirming mystery.py produces output
    matching expected_output.txt
  name: analyze.py runs successfully, confirming
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s explanation of mystery.py''s transformation logic
      and output prediction quality. Award full marks if the agent: 1. Correctly explains
      that alphabetic characters are uppercased at even positions (0, 2, 4, ...) and
      lowercased at odd positions using the global string index i. 2. Correctly explains
      that digit characters are transformed by multiplying their numeric value by
      3 (e.g., ''3'' becomes ''6'', ''1'' becomes ''3'', ''4'' becomes ''2'' via mod
      or similar), producing the digit outputs seen in ''PyThOn6'', ''AbC 456 XyZ'',
      ''FoO BaR BaZ 222'', ''TeSt CaSe 75''. 3. Correctly explains that spaces and
      non-alphanumeric characters are preserved as-is. 4. Accurately predicts all
      5 transformed outputs matching /workspace/expected_output.txt exactly: ''HeLlO
      WoRlD'', ''PyThOn6 Is GrEaT'', ''AbC 456 XyZ'', ''FoO BaR BaZ 222'', ''TeSt
      CaSe 75''. 5. Notes that the index i is the global position in the original
      string (not reset per word). Deduct marks if the agent misunderstands the digit
      transformation rule, incorrectly resets the index per word, or produces wrong
      output predictions.

      '
    type: llm_judge
  description: Quality and accuracy of reverse engineering analysis and output prediction
  name: Quality and accuracy of reverse engineer
  weight: 0.45
task_id: terminal-100
task_name: Python Script Reverse Engineering and Output Prediction
tools: []
