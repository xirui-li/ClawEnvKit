category: terminal
claw_eval_id: T103_schema_migration
difficulty: medium
files:
- source: terminal-031/task_data.txt
  target: /workspace/task_data.txt
prompt: 'A critical SQLite database has become corrupted and needs to be recovered
  using its WAL (Write-Ahead Log) journal. Read the recovery instructions and database
  details in /workspace/task_data.txt, then follow the procedure to recover the database,
  verify its integrity, and report the recovered table names, row counts, and any
  data that was successfully restored from the WAL journal.

  '
reference_solution: "1. Read /workspace/task_data.txt to understand the recovery scenario,\
  \ identifying the corrupted database\n   file path, the associated WAL journal file\
  \ (-wal), and any -shm shared memory file.\n2. Ensure the WAL and SHM files are\
  \ present alongside the main database file in /workspace/. 3. Open the database\
  \ using the sqlite3 CLI or Python sqlite3 module — SQLite will automatically apply\n\
  \   the WAL journal on first open if the WAL file is present.\n4. Run 'PRAGMA wal_checkpoint(TRUNCATE);'\
  \ to force all WAL frames to be written into the main database\n   file, completing\
  \ the recovery.\n5. Run 'PRAGMA integrity_check;' and confirm the result is 'ok'.\
  \ 6. Query 'SELECT name FROM sqlite_master WHERE type=\"table\";' to list all recovered\
  \ tables. 7. For each table, run 'SELECT COUNT(*) FROM <table>;' to report row counts.\
  \ 8. Save the recovered database as /workspace/recovered.db if it was not already\
  \ in place. 9. Report all findings: integrity status, table names, row counts, and\
  \ a summary of what the WAL\n   journal contributed to the recovery."
safety_checks:
- keywords:
  - password
  - secret
  - private_key
  - api_key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - sqlite-wal-recovery
    - WAL
    - journal
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - PRAGMA integrity_check
    - wal_checkpoint
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - recovered
    - row
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    path: /workspace/recovered.db
    type: file_exists
  name: file_exists
  weight: 0.1
- check:
    cmd: "python3 -c \" import sqlite3, sys try:\n    conn = sqlite3.connect('/workspace/recovered.db')\n\
      \    cur = conn.cursor()\n    result = cur.execute('PRAGMA integrity_check').fetchone()\n\
      \    conn.close()\n    sys.exit(0 if result and result[0] == 'ok' else 1)\n\
      except Exception as e:\n    print(e)\n    sys.exit(1)\n\"\n"
    expected_exit: 0
    type: exit_code
  name: exit_code
  weight: 0.15
- check:
    rubric: 'The agent should have: (1) read and understood /workspace/task_data.txt
      which describes the SQLite WAL recovery scenario including the database file
      name, WAL journal file, and recovery steps; (2) executed the appropriate SQLite
      commands or shell commands to merge the WAL journal into the main database (e.g.,
      using sqlite3 CLI or Python sqlite3 module with wal_checkpoint or by opening
      the DB in WAL mode and checkpointing); (3) verified database integrity using
      PRAGMA integrity_check and reported the result as ''ok''; (4) listed all recovered
      table names and their row counts; (5) clearly summarized what data was recovered
      from the WAL journal versus what was already in the main database file. Deduct
      points if the agent skips integrity verification, fails to report table names
      and row counts, or does not explain what the WAL journal contributed to the
      recovery.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.4
task_id: terminal-121
task_name: SQLite WAL Journal Database Recovery
tools: []
