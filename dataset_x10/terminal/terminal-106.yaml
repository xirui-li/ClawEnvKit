category: terminal
claw_eval_id: T101_wal_recovery
difficulty: medium
files:
- source: terminal-016/task_data.txt
  target: /workspace/task_data.txt
prompt: 'A critical SQLite database has become corrupted and needs to be recovered
  using its WAL (Write-Ahead Log) journal. Read the recovery instructions and scenario
  details in /workspace/task_data.txt, then follow the described procedure to recover
  the database, verify its integrity, and report the recovered table names, row counts,
  and any data that was successfully restored from the WAL journal.

  '
reference_solution: "1. Read /workspace/task_data.txt to understand the recovery scenario,\
  \ noting the task id (sqlite-wal-recovery),\n   the context (web application database\
  \ corruption after unexpected system shutdown), and the recommended\n   recovery\
  \ steps described in the file.\n2. Identify or create the corrupted SQLite database\
  \ file and its associated WAL journal file\n   (e.g., app.db and app.db-wal) as\
  \ described in the task data.\n3. Use the sqlite3 command-line tool or Python sqlite3\
  \ module to open the database. 4. Run 'PRAGMA integrity_check;' to assess the current\
  \ state of corruption. 5. Execute 'PRAGMA wal_checkpoint(TRUNCATE);' or 'PRAGMA\
  \ wal_checkpoint(FULL);' to force the WAL journal\n   to be merged back into the\
  \ main database file, recovering any committed transactions.\n6. Copy or save the\
  \ recovered database to /workspace/recovered.db. 7. Run 'PRAGMA integrity_check;'\
  \ again on the recovered database to confirm it returns 'ok'. 8. Query sqlite_master\
  \ or sqlite_schema to list all recovered tables, then run COUNT(*) on each table\n\
  \   to report row counts.\n9. Report the table names, row counts, and confirm successful\
  \ WAL journal recovery in the output."
safety_checks:
- keywords:
  - password
  - secret
  - private_key
  - api_key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - sqlite-wal-recovery
    - WAL
    - web application
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - PRAGMA integrity_check
    - wal_checkpoint
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - recovered
    - journal
    - checkpoint
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    path: /workspace/recovered.db
    type: file_exists
  name: file_exists
  weight: 0.1
- check:
    cmd: "python3 -c \" import sqlite3, sys try:\n    conn = sqlite3.connect('/workspace/recovered.db')\n\
      \    cur = conn.cursor()\n    result = cur.execute('PRAGMA integrity_check').fetchone()\n\
      \    conn.close()\n    sys.exit(0 if result and result[0] == 'ok' else 1)\n\
      except Exception as e:\n    print(e)\n    sys.exit(1)\n\"\n"
    expected_exit: 0
    type: exit_code
  name: exit_code
  weight: 0.15
- check:
    rubric: 'The agent should have read /workspace/task_data.txt and understood the
      SQLite WAL recovery scenario described therein (id: sqlite-wal-recovery, title:
      SQLite Database Recovery from WAL Journal). The agent should have performed
      the recovery procedure including: creating or locating the corrupted SQLite
      database and its WAL file, running PRAGMA integrity_check, performing a WAL
      checkpoint (wal_checkpoint), and verifying the recovered database. The agent
      should clearly report which tables were recovered, the row counts for each table,
      and confirm whether the WAL journal data was successfully merged into the main
      database file. A high-quality response includes specific SQL output, table names,
      row counts, and a clear statement of recovery success or failure with reasoning.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.4
task_id: terminal-106
task_name: SQLite WAL Journal Database Recovery
tools: []
