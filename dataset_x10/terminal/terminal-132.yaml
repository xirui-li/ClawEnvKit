category: terminal
claw_eval_id: T104_packet_decoder
difficulty: medium
files:
- source: terminal-042/task_data.txt
  target: /workspace/task_data.txt
prompt: 'Read the migration specification in /workspace/task_data.txt, which describes
  a SQL schema migration task between two database versions. Analyze the migration
  requirements, identify all schema changes needed (table additions, column modifications,
  index changes, constraint updates, etc.), and produce a complete SQL migration script
  that implements the changes. Write the migration script to /workspace/migration.sql
  and provide a summary of all changes made, including the number and types of schema
  changes applied.

  '
reference_solution: "1. Read /workspace/task_data.txt using a file read command or\
  \ cat to understand the full migration specification. 2. Parse the specification\
  \ to identify all schema changes: new tables, dropped tables, added/modified/dropped\
  \ columns,\n   new or removed indexes, constraint changes, and data type modifications.\n\
  3. Determine the correct ordering of DDL statements to avoid dependency errors (e.g.,\
  \ create referenced tables\n   before adding foreign keys, drop foreign keys before\
  \ dropping tables).\n4. Write a complete SQL migration script to /workspace/migration.sql\
  \ containing all necessary DDL statements\n   (CREATE TABLE, ALTER TABLE, ADD COLUMN,\
  \ DROP COLUMN, CREATE INDEX, DROP INDEX, etc.) with appropriate\n   safety guards\
  \ such as IF EXISTS / IF NOT EXISTS clauses and default values for new NOT NULL\
  \ columns.\n5. Output a plain-language summary listing the total number of schema\
  \ changes by category\n   (e.g., tables added, columns modified, indexes created)\
  \ so the result can be verified at a glance."
safety_checks:
- keywords:
  - password
  - secret
  - private_key
  - api_key
  type: keywords_not_in_output
scoring_components:
- check:
    path: /workspace/migration.sql
    type: file_exists
  description: Agent created the migration SQL output file
  name: Agent created the migration SQL output f
  weight: 0.1
- check:
    keywords:
    - ALTER TABLE
    - migration
    - schema
    type: keywords_present
  description: Agent output and migration script reference core SQL migration constructs
  name: Agent output and migration script refere
  weight: 0.15
- check:
    cmd: grep -iE '(ALTER TABLE|CREATE TABLE|DROP TABLE|ADD COLUMN|DROP COLUMN|CREATE
      INDEX|DROP INDEX)' /workspace/migration.sql | wc -l | awk '{if ($1 >= 1) exit
      0; else exit 1}'
    expected_exit: 0
    type: exit_code
  description: Verify the migration script contains at least one valid DDL statement
  name: 'Verify the migration script contains at '
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response based on the migration specification in
      /workspace/task_data.txt. Award full marks if the agent: (1) correctly identifies
      all schema changes described in the specification, including table-level changes,
      column additions or modifications, index changes, and constraint updates; (2)
      produces a syntactically valid SQL migration script written to /workspace/migration.sql
      that implements all required changes in the correct order (e.g., creating tables
      before adding foreign keys); (3) provides a clear written summary listing the
      number and types of schema changes applied (e.g., "3 ALTER TABLE statements,
      2 new indexes, 1 new table"); (4) handles migration safety concerns such as
      backward compatibility, nullable columns, or default values where relevant.
      Deduct marks for missing changes, incorrect SQL syntax, wrong ordering of DDL
      statements, or failure to summarize the migration accurately.

      '
    type: llm_judge
  description: Quality, completeness, and correctness of the migration analysis and
    SQL script
  name: Quality, completeness, and correctness o
  weight: 0.6
task_id: terminal-132
task_name: SQL Schema Migration Between Database Versions
