category: terminal
claw_eval_id: T104_packet_decoder
difficulty: medium
files:
- source: terminal-049/task_data.txt
  target: /workspace/task_data.txt
prompt: Read the protocol specification in /workspace/task_data.txt and decode all
  the binary packets described in it according to the custom IoT protocol. For each
  packet, extract and report the field values (such as device ID, message type, payload
  length, checksum, and any other protocol fields), verify checksums where applicable,
  and summarize your findings including any malformed or invalid packets.
reference_solution: '1. Read /workspace/task_data.txt using a file reading command
  (e.g., cat /workspace/task_data.txt) to understand the full protocol specification.

  2. Identify the protocol''s packet structure: locate field definitions such as magic
  bytes/header, device ID, message type, payload length, payload data, and checksum
  fields, along with their byte offsets and sizes.

  3. Locate all sample or example packets provided in the specification (typically
  given as hex strings or byte arrays).

  4. For each packet, parse the bytes according to the field layout: extract each
  field value by slicing the appropriate byte ranges and interpret them (e.g., convert
  multi-byte integers from big-endian or little-endian as specified).

  5. Verify the checksum for each packet using the algorithm described in the specification
  (e.g., XOR, CRC, or sum-based), comparing the computed checksum against the one
  embedded in the packet.

  6. Flag any packets where the checksum does not match or where fields contain invalid/unexpected
  values as malformed.

  7. Summarize all decoded packets in a clear table or list format, showing field
  names and their decoded values for each packet.

  8. Optionally write the results to /workspace/decoded_packets.txt for programmatic
  verification.

  9. Report a final summary including total packets decoded, how many passed checksum
  validation, and any anomalies found.'
safety_checks:
- keywords:
  - password
  - secret
  - private_key
  - api_key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - device
    - checksum
    - payload
    - message type
    - header
    type: keywords_present
  description: Agent output must reference core protocol field names extracted from
    the specification
  name: Agent output must reference core protoco
  weight: 0.35
- check:
    keywords:
    - 0x
    type: keywords_present
  description: Agent output must include hexadecimal values demonstrating actual packet
    decoding was performed
  name: Agent output must include hexadecimal va
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria:

      1. Did the agent correctly identify and describe the protocol fields defined
      in /workspace/task_data.txt (e.g., header structure, device ID, message type,
      payload length, checksum)?

      2. Did the agent decode each sample packet provided in the specification, showing
      the extracted field values?

      3. Did the agent verify checksums for the packets and correctly identify which
      packets pass or fail checksum validation?

      4. Did the agent identify any malformed or invalid packets as described or implied
      by the specification?

      5. Is the output well-organized, clearly presenting each packet''s decoded fields
      in a readable format?

      Score 1.0 if all criteria are met thoroughly, 0.7 if most criteria are met with
      minor omissions, 0.4 if only partial decoding is shown, 0.1 if the agent failed
      to meaningfully decode packets.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    path: /workspace/decoded_packets.txt
    type: file_exists
  description: Agent should optionally save decoded results to a file; partial credit
    if present
  name: Agent should optionally save decoded res
  weight: 0.05
- check:
    cmd: grep -iE '(device|checksum|payload|header)' /workspace/task_data.txt > /dev/null
      2>&1
    expected_exit: 0
    type: exit_code
  description: Verify the source file contains expected protocol terminology confirming
    the task file is intact
  name: Verify the source file contains expected
  weight: 0.05
task_id: terminal-139
task_name: Binary Packet Decoder Protocol Analysis
tools: []
