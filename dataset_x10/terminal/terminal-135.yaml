category: terminal
claw_eval_id: T104_packet_decoder
difficulty: medium
files:
- source: terminal-045/analyze.py
  target: /workspace/analyze.py
- source: terminal-045/expected_output.txt
  target: /workspace/expected_output.txt
- source: terminal-045/sample_data.txt
  target: /workspace/sample_data.txt
- source: terminal-045/notes.md
  target: /workspace/notes.md
prompt: 'Analyze the Python script at /workspace/analyze.py and the input data at
  /workspace/sample_data.txt, then predict the exact output the script would produce
  when run against that input file. Compare your prediction against /workspace/expected_output.txt
  and report any discrepancies or confirm a match, explaining the logic behind each
  function''s output for every line of input data.

  '
reference_solution: "1. Open and read /workspace/analyze.py to understand each function:\
  \ reverse_string (slices string backwards), count_vowels (counts a/e/i/o/u case-insensitively),\
  \ caesar_cipher (shifts alphabetic characters by +3 wrapping at alphabet boundaries),\
  \ and word_freq (lowercases and counts word occurrences). 2. Open /workspace/sample_data.txt\
  \ and note the three lines: 'Hello World', 'Python is great', 'The quick brown fox\
  \ jumps over the lazy dog'. 3. Manually apply each function to each line:\n   -\
  \ 'Hello World': reversed='dlroW olleH', vowels=3, caesar='Khoor Zruog', word_freq={'hello':1,'world':1}\n\
  \   - 'Python is great': reversed='taerg si nohtyP', vowels=5, caesar='Sbwkrq lv\
  \ juhdw', word_freq={'python':1,'is':1,'great':1}\n   - 'The quick brown fox jumps\
  \ over the lazy dog': reversed='god yzal eht revo spmuj xof nworb kciuq ehT', vowels=11,\
  \ caesar='Wkh txlfn eurzq ira mxpsv ryhu wkh odcb grj', word_freq={'the':2,'quick':1,'brown':1,'fox':1,'jumps':1,'over':1,'lazy':1,'dog':1}\n\
  4. Open /workspace/expected_output.txt and compare the predicted output line by\
  \ line. 5. Report whether the prediction matches the expected output exactly, and\
  \ explain any differences found."
safety_checks:
- keywords:
  - password
  - secret
  - token
  - api_key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - dlroW olleH
    - Khoor Zruog
    - '3'
    - lazy dog
    - 'the: 1'
    type: keywords_present
  description: Agent correctly identifies specific transformed outputs including reversed
    strings, Caesar cipher results, vowel counts, and word frequencies from the sample
    data
  name: Agent correctly identifies specific tran
  weight: 0.35
- check:
    keywords:
    - nohtyP si taerg
    - Sbwkrq lv juhdw
    - quick brown fox
    type: keywords_present
  description: Agent correctly predicts outputs for the second and third lines of
    sample_data.txt
  name: Agent correctly predicts outputs for the
  weight: 0.1
- check:
    cmd: diff <(cd /workspace && python3 analyze.py sample_data.txt 2>/dev/null) /workspace/expected_output.txt
    expected_exit: 0
    type: exit_code
  description: Verify that the actual script output matches expected_output.txt exactly
  name: Verify that the actual script output mat
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following criteria: 1. Accuracy:
      Does the agent correctly predict the output for all three lines of sample_data.txt
      (''Hello World'', ''Python is great'', ''The quick brown fox jumps over the
      lazy dog'')? Check that reversed strings, Caesar cipher (+3 shift) results,
      vowel counts, and word frequency dictionaries are all correctly stated. 2. Explanation
      quality: Does the agent explain how each function (reverse_string, count_vowels,
      caesar_cipher, word_freq) works and why it produces the given output? 3. Comparison:
      Does the agent explicitly compare its prediction to /workspace/expected_output.txt
      and confirm a match or identify discrepancies? 4. Completeness: Does the agent
      address all lines in sample_data.txt and all columns in the expected output
      (Original, Reversed, Vowel Count, Caesar +3, Word Freq)? Score 1.0 if all four
      criteria are fully met, 0.7 if three are met, 0.4 if two are met, 0.1 if only
      one is met, 0.0 if none are met.

      '
    type: llm_judge
  description: Holistic evaluation of prediction accuracy, explanation quality, comparison
    to expected output, and completeness
  name: Holistic evaluation of prediction accura
  weight: 0.4
