category: terminal
claw_eval_id: T100_reverse_decoder
difficulty: medium
files:
- source: terminal-009/task_data.txt
  target: /workspace/task_data.txt
prompt: Read the protocol specification in /workspace/task_data.txt and implement
  a binary packet decoder according to the described protocol. Write a Python script
  that decodes the provided sample packets and outputs the decoded field values for
  each packet. Report the decoded results for all sample packets in your response.
reference_solution: '1. Read /workspace/task_data.txt to understand the binary protocol
  specification, including the packet structure, field offsets, data types, byte ordering
  (endianness), magic bytes, and checksum algorithm.

  2. Identify all sample packets provided in the specification (typically given as
  hex strings or byte arrays).

  3. Write a Python script (e.g., /workspace/decoder.py) using the struct module to
  unpack binary fields according to the protocol layout. Handle the magic byte header
  validation, parse each field at its specified byte offset, and implement the checksum
  verification algorithm described in the spec.

  4. Run the decoder against each sample packet and collect the decoded field values
  (sensor_id, timestamp, temperature, humidity, sequence number, checksum status,
  etc.).

  5. Report the decoded results for every sample packet in the response, showing field
  names alongside their decoded numeric or string values, and indicate whether each
  packet''s checksum is valid or invalid.'
safety_checks:
- keywords:
  - private_key
  - secret
  - password
  - credential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - sensor_id
    - timestamp
    - temperature
    - humidity
    - checksum
    type: keywords_present
  description: Agent identifies the core packet fields defined in the protocol specification
  name: 'Agent identifies the core packet fields '
  weight: 0.15
- check:
    keywords:
    - magic
    - '0xAB'
    - payload
    - sequence
    type: keywords_present
  description: Agent references specific protocol constants and structural elements
    from the spec
  name: Agent references specific protocol const
  weight: 0.15
- check:
    path: /workspace/decoder.py
    type: file_exists
  description: Agent created a Python decoder script in the workspace
  name: Agent created a Python decoder script in
  weight: 0.1
- check:
    cmd: cd /workspace && python3 decoder.py 2>&1 | grep -iE '(decoded|packet|sensor|temperature|humidity|error)'
      | head -5 && exit 0
    expected_exit: 0
    type: exit_code
  description: The decoder script runs without fatal errors and produces relevant
    output
  name: The decoder script runs without fatal er
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria:

      1. CORRECTNESS: Did the agent correctly implement a decoder that follows the
      binary protocol described in /workspace/task_data.txt, including proper byte
      ordering, field offsets, and data type handling?

      2. COMPLETENESS: Did the agent decode ALL sample packets provided in the specification
      and report numeric values for each field (sensor_id, timestamp, temperature,
      humidity, sequence number, checksum)?

      3. PROTOCOL FIDELITY: Does the decoder correctly handle the magic byte header
      (0xAB or similar), packet length field, and checksum validation as described
      in the spec?

      4. OUTPUT CLARITY: Are the decoded packet results clearly presented with field
      names and values, making it easy to verify correctness?

      5. ERROR HANDLING: Does the implementation handle malformed packets or checksum
      mismatches as described in the protocol spec?

      Score higher if the agent produces specific numeric decoded values for each
      sample packet and validates checksums. Score lower if the agent only describes
      the protocol without actually decoding the sample data.

      '
    type: llm_judge
  description: Quality and completeness of the binary packet decoder implementation
    and decoded results
  name: Quality and completeness of the binary p
  weight: 0.5
task_id: terminal-099
task_name: Binary Packet Protocol Decoder Implementation
tools: []
