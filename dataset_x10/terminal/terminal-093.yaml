- check:
    rubric: 'The agent should have executed /workspace/task_data.txt as a Python script
      and analyzed its output. A high-quality response will: (1) identify the categories
      of XSS payloads tested (e.g., script tags, event handlers, javascript: URIs,
      encoded variants, DOM-based), (2) report specific counts or ratios of blocked
      vs bypassed payloads, (3) describe the sanitization approach used in the code
      such as regex stripping and HTML entity encoding via html.escape, (4) highlight
