category: terminal
claw_eval_id: T100_reverse_decoder
difficulty: medium
files:
- source: terminal-003/task_data.txt
  target: /workspace/task_data.txt
prompt: 'Analyze the XSS filter testing module in /workspace/task_data.txt by executing
  it and examining its behavior. Run the script to observe which XSS payloads are
  blocked or bypassed, identify the sanitization techniques used, and report a summary
  of the test results including pass/fail counts, which payload categories are tested,
  and any notable bypass patterns or weaknesses in the filter logic.

  '
reference_solution: '1. Read /workspace/task_data.txt to understand the structure
  of the XSS sanitization module. 2. Execute the script with `python3 /workspace/task_data.txt`
  to observe its runtime output including test results. 3. Review the source code
  to identify sanitization techniques: html.escape for entity encoding, re.sub for
  regex-based tag stripping. 4. Catalog the payload categories tested: basic script
  tags, event handler attributes (onerror, onload), javascript: URI schemes, encoded/obfuscated
  variants, and nested or malformed tags. 5. From the execution output, count how
  many payloads were blocked versus those that bypassed the filter. 6. Identify weaknesses
  such as case-insensitive bypass, attribute-based injection surviving regex filters,
  or encoding tricks that evade html.escape. 7. Summarize findings in a structured
  report covering: sanitization methods used, payload categories, block/bypass statistics,
  and recommended improvements.'
