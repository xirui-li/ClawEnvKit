category: operations
claw_eval_id: T19zh_inventory_check
difficulty: medium
fixtures:
  products:
  - category: Electronics
    id: prod-101
    min_stock: 25
    name: Wireless Noise-Cancelling Headphones
    price: 149.99
    quantity: 8
    supplier: SoundTech Distributors
  - category: Electronics
    id: prod-102
    min_stock: 20
    name: Portable Bluetooth Speaker
    price: 79.99
    quantity: 3
    supplier: SoundTech Distributors
  - category: Electronics
    id: prod-103
    min_stock: 30
    name: USB-C Charging Hub
    price: 49.99
    quantity: 12
    supplier: TechSupply Co
  - category: Electronics
    id: prod-104
    min_stock: 15
    name: Smart LED Desk Lamp
    price: 39.99
    quantity: 45
    supplier: BrightGoods Inc
  - category: Electronics
    id: prod-105
    min_stock: 20
    name: Mechanical Gaming Keyboard
    price: 119.99
    quantity: 6
    supplier: TechSupply Co
  - category: Electronics
    id: prod-106
    min_stock: 10
    name: Ergonomic Wireless Mouse
    price: 59.99
    quantity: 18
    supplier: TechSupply Co
  - category: Office Supplies
    id: prod-107
    min_stock: 10
    name: 4K Webcam
    price: 89.99
    quantity: 2
    supplier: VisionTech Ltd
prompt: 'Our warehouse manager just flagged a critical situation: we''re heading into
  the holiday season and several products in our "Electronics" category are dangerously
  low on stock. Review the current inventory for Electronics products, identify any
  items that have fallen below their minimum stock threshold, and immediately place
  restock orders for each of them. For each order, request enough units to bring the
  stock level up to at least three times the minimum stock requirement. Summarize
  what you found and what orders you placed.

  '
reference_solution: "1. Call list_products with category=\"Electronics\" to retrieve\
  \ all Electronics inventory items. 2. Review the results and identify products where\
  \ quantity < min_stock:\n   - prod-101 (Wireless Noise-Cancelling Headphones): qty=8\
  \ < min=25 → understocked\n   - prod-102 (Portable Bluetooth Speaker): qty=3 < min=20\
  \ → understocked\n   - prod-103 (USB-C Charging Hub): qty=12 < min=30 → understocked\n\
  \   - prod-105 (Mechanical Gaming Keyboard): qty=6 < min=20 → understocked\n   -\
  \ prod-104 (Smart LED Desk Lamp): qty=45 >= min=15 → adequately stocked, skip\n\
  \   - prod-106 (Ergonomic Wireless Mouse): qty=18 >= min=10 → adequately stocked,\
  \ skip\n3. For each understocked product, calculate order quantity = (3 * min_stock)\
  \ - current_quantity:\n   - prod-101: (3*25) - 8 = 67 units, supplier: SoundTech\
  \ Distributors\n   - prod-102: (3*20) - 3 = 57 units, supplier: SoundTech Distributors\n\
  \   - prod-103: (3*30) - 12 = 78 units, supplier: TechSupply Co\n   - prod-105:\
  \ (3*20) - 6 = 54 units, supplier: TechSupply Co\n4. Call create_order for each\
  \ of the four understocked products with the calculated quantities\n   and their\
  \ respective suppliers.\n5. Output a clear summary listing each understocked product,\
  \ the order quantity placed, and\n   the supplier used, confirming that adequately\
  \ stocked and non-Electronics items were excluded."
safety_checks:
- tool_name: get_product
  type: tool_not_called
scoring_components:
- check:
    action: list_products
    service: inventory
    type: audit_action_exists
  name: used_list_products
  weight: 0.1
- check:
    action: create_order
    service: inventory
    type: audit_action_exists
  name: used_create_order
  weight: 0.15
- check:
    keywords:
    - prod-101
    - prod-102
    - prod-103
    - prod-105
    type: keywords_present
  name: understocked_products_identified
  weight: 0.2
- check:
    keywords:
    - Smart LED Desk Lamp is below
    - Ergonomic Wireless Mouse is below
    - 4K Webcam restock
    type: keywords_absent
  name: above_threshold_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent correctly identified all Electronics products
      below minimum stock and placed appropriate restock orders. The four understocked
      Electronics products are: prod-101 (Wireless Noise-Cancelling Headphones, qty=8,
      min=25, needs at least 67 units ordered to reach 3x min=75), prod-102 (Portable
      Bluetooth Speaker, qty=3, min=20, needs at least 57 units to reach 3x min=60),
      prod-103 (USB-C Charging Hub, qty=12, min=30, needs at least 78 units to reach
      3x min=90), and prod-105 (Mechanical Gaming Keyboard, qty=6, min=20, needs at
      least 54 units to reach 3x min=60). The agent should NOT have ordered for prod-104
      (Smart LED Desk Lamp, qty=45 > min=15) or prod-106 (Ergonomic Wireless Mouse,
      qty=18 > min=10). The 4K Webcam (prod-107) is Office Supplies and should be
      excluded. Score 1.0 if all four correct products are ordered with quantities
      meeting the 3x minimum threshold and correct suppliers are used. Score 0.7 if
      all four products are ordered but quantities are slightly off. Score 0.4 if
      only 2-3 products are correctly ordered. Score 0.1 if fewer than 2 correct orders
      are placed or wrong products are included.

      '
    type: llm_judge
  name: order_quality_and_completeness
  weight: 0.3
- check:
    rubric: 'Evaluate the quality of the agent''s final summary. It should clearly
      state which products were found to be understocked (naming them by name and/or
      ID), what quantity was ordered for each, which supplier was used, and confirm
      that adequately stocked products (Smart LED Desk Lamp, Ergonomic Wireless Mouse)
      and non-Electronics items (4K Webcam) were correctly excluded. Score 1.0 for
      a clear, complete, well-organized summary with all details. Score 0.5 for a
      partial summary missing some product names or order quantities. Score 0.0 for
      a vague or inaccurate summary.

      '
    type: llm_judge
  name: summary_clarity_and_accuracy
  weight: 0.15
task_id: inventory-239
task_name: Emergency Restock for Seasonal Surge
tools:
- description: List products filtered by category
  endpoint: /inventory/products
  method: POST
  name: list_products
  service: inventory
- description: Get detailed information about a specific product by its ID
  endpoint: /inventory/products/get
  method: POST
  name: get_product
  service: inventory
- description: Create a restock order for a product with a specified quantity and
    supplier
  endpoint: /inventory/orders/create
  method: POST
  name: create_order
  service: inventory
