  products:
  - category: Home Textiles
    id: prod-101
    min_stock: 15
    name: Reindeer Wool Blanket
    price: 89.99
    quantity: 12
    supplier: Nordic Goods AB
  - category: Home Fragrance
    id: prod-102
    min_stock: 20
    name: Pine Scented Candle Set
    price: 24.99
    quantity: 45
    supplier: Nordic Goods AB
  - category: Kitchen
    id: prod-103
    min_stock: 10
    name: Birchwood Serving Board
    price: 54.5
    quantity: 8
    supplier: Nordic Goods AB
  - category: Apparel
    id: prod-104
    min_stock: 25
    name: Merino Wool Socks (3-pack)
    price: 19.99
    quantity: 3
    supplier: Nordic Goods AB
  - category: Apparel
    id: prod-201
    min_stock: 20
    name: Alpine Fleece Jacket
    price: 129.0
