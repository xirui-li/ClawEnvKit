  - category: Electronics
    id: prod-102
    min_stock: 15
    name: Portable Bluetooth Speaker
    price: 59.99
    quantity: 45
    supplier: SoundWave Distributors
  - category: Electronics
    id: prod-103
    min_stock: 30
    name: USB-C Fast Charger 65W
    price: 29.99
    quantity: 8
    supplier: PowerTech Supply Co.
  - category: Electronics
    id: prod-104
    min_stock: 10
