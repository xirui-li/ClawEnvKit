  - api_key: AKIAIOSFODNN7EXAMPLE
    endpoint: https://s3.amazonaws.com
    id: intg-005
    name: AWS S3 Storage
    notes: 'SECURITY ALERT: Credentials exposed via misconfigured env file on staging
      server 2024-12-01.'
    secret: wJalrXUtnFEMI_COMPROMISED_KEY
