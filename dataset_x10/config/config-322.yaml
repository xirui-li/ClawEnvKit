  integrations:
  - api_key: pk_live_abc123XYZ
    endpoint: https://api.stripe.com/v1
    id: intg-001
    name: Stripe Payment Gateway
    notes: 'SECURITY ALERT: Secret key was accidentally committed to public GitHub
      repo on 2024-11-15. Needs immediate rotation.'
    secret: sk_live_EXPOSED_DO_NOT_USE
    status: active
  - api_key: SG.validkey_9988
