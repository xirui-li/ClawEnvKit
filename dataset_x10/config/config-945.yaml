    type: audit_action_exists
  name: listed_integrations
  weight: 0.1
- check:
    action: get_integration
    service: config
    type: audit_action_exists
  name: retrieved_integration_details
  weight: 0.15
- check:
    keywords:
    - intg-001
    - intg-002
    - intg-004
    - intg-005
    - intg-007
    type: keywords_present
  name: active_integrations_identified
  weight: 0.2
- check:
    keywords:
    - ftp_secret_old
    - twilio_secret_lmn901opq234
    type: keywords_absent
  name: inactive_integrations_excluded
  weight: 0.1
- check:
    keywords:
    - sk_live_stripe_z9y8x7w6v5u4
    - SG.sendgrid_secret_xyz789uvw012
    - sf_secret_crm_pqr123stu456
    type: keywords_present
  name: secrets_and_keys_reported
  weight: 0.15
- check:
    rubric: "Evaluate the agent's compliance audit report on three dimensions:\n1.\
      \ COMPLETENESS (0–0.4): Does the report include all five active integrations\
      \ —\n   Stripe Payments (intg-001), SendGrid Email (intg-002), Salesforce CRM\
      \ (intg-004),\n   Datadog Monitoring (intg-005), and Slack Notifications (intg-007)?\n\
      \   Does each entry include the integration name, ID, endpoint, API key, and\
      \ secret?\n   Score 0.4 if all five are fully detailed, 0.2 if three or four\
      \ are present, 0.1 if fewer.\n\n2. ACCURACY (0–0.4): Are the credentials correctly\
      \ matched to their integrations?\n   For example: Stripe secret should be sk_live_stripe_z9y8x7w6v5u4,\n\
      \   Datadog app key should be dd_app_key_abc456def789,\n   Slack signing secret\
      \ should be slack_signing_secret_yz0890abc123.\n   Score 0.4 if all credentials\
      \ are correctly attributed, 0.2 if minor mismatches, 0.0 if major errors.\n\n\
      3. STRUCTURE AND CLARITY (0–0.2): Is the report clearly structured so a security\
      \ team\n   could easily cross-reference it? Does it separate active from inactive\
      \ integrations\n   and present data in a readable, organized format?\n   Score\
      \ 0.2 if well-structured, 0.1 if partially organized, 0.0 if unstructured.\n\
      \nTotal score is the sum of the three dimension scores (max 1.0).\n"
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.3
task_id: config-945
task_name: Audit Integration Secrets for Compliance Report
tools:
- description: List all integrations and their current status
