  transactions:
  - amount: 847.5
    category: Lodging
    date: '2024-03-11'
    description: Hotel accommodation - Marriott Austin Downtown
    id: txn-1101
    status: pending
    vendor: Marriott Hotels
  - amount: 312.8
    category: Meals
    date: '2024-03-11'
    description: Team dinner - Uchi Restaurant
    id: txn-1102
    status: pending
    vendor: Uchi Austin
  - amount: 450.0
    category: Venue
    date: '2024-03-11'
    description: Conference room rental - WeWork 6th Street
    id: txn-1103
    status: pending
    vendor: WeWork
  - amount: 198.4
    category: Meals
    date: '2024-03-12'
    description: Team lunch - Franklin Barbecue
    id: txn-1104
    status: pending
    vendor: Franklin Barbecue
  - amount: 134.6
