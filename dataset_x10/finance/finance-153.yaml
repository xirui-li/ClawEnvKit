    id: txn-002
    status: approved
    vendor: Uchi Austin
  - amount: 320.0
    category: Equipment
    date: '2024-09-05'
    description: Conference room AV equipment rental
    id: txn-003
    status: approved
    vendor: Austin AV Solutions
  - amount: 418.25
    category: Meals
    date: '2024-09-05'
    description: Team lunch catering - offsite day 2
    id: txn-004
    status: approved
    vendor: Whole Foods Market Catering
  - amount: 195.0
    category: Travel
    date: '2024-09-06'
