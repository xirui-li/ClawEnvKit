    - TXN-2024-0881
    - TXN-2024-0892
    - TXN-2024-0917
    - TXN-2024-0931
    type: keywords_present
  name: duplicate_transaction_ids_cited
  weight: 0.15
- check:
    rubric: "Evaluate the agent's duplicate payment investigation report on the following\
      \ dimensions:\n1. COMPLETENESS (0–0.4): Did the agent correctly identify all\
      \ three duplicate pairs?\n   - NimbusCloud Solutions: TXN-2024-0881 and TXN-2024-0892\
      \ ($4,200.00 each, total overpayment $4,200.00)\n   - Hartwell & Crane LLP:\
      \ TXN-2024-0917 and TXN-2024-0931 ($7,500.00 each, total overpayment $7,500.00)\n\
      \   - Pinnacle Office Depot: TXN-2024-0905 and TXN-2024-0958 ($870.50 each,\
      \ total overpayment $870.50)\n   Score 0.4 if all three pairs identified, 0.25\
      \ if two pairs, 0.1 if one pair, 0.0 if none.\n\n2. ACCURACY OF AMOUNTS (0–0.3):\
      \ Did the agent correctly state the overpayment amounts?\n   Total combined\
      \ overpayment across all duplicates is $12,570.50.\n   Score 0.3 if total and\
      \ per-vendor amounts are correct, 0.15 if partially correct, 0.0 if amounts\
      \ are wrong or missing.\n\n3. RECOMMENDATION QUALITY (0–0.3): Did the agent\
      \ provide a clear, actionable recommendation?\n   A good recommendation should:\
      \ flag all three duplicate pairs for chargeback or reversal, reference specific\
      \ transaction IDs, and suggest a process improvement (e.g., invoice matching\
      \ controls).\n   Score 0.3 if recommendation is specific and actionable, 0.15\
      \ if vague but present, 0.0 if absent.\n\nFinal score = sum of dimension scores\
      \ (max 1.0).\n"
    type: llm_judge
  name: overpayment_analysis_quality
  weight: 0.4
