prompt: 'Our engineering team just returned from a two-day offsite in Austin. I need
  you to pull together all the offsite-related expenses from our finance system (look
  for transactions from November 4–5, 2024), calculate the total, and submit a formal
  expense report titled "Engineering Offsite Austin November 2024" covering all those
  transactions. Summarize what you found and confirm the report was submitted successfully.

  '
reference_solution:
- Call list_transactions with start_date "2024-11-04" and end_date "2024-11-05" to
  retrieve all transactions in the offsite date range.
- Review the returned transactions: txn-1101 ($2480.00), txn-1102 ($634.50), txn-1103
    ($850.00), txn-1104 ($312.75), txn-1105 ($198.00), txn-1106 ($145.20). Note that
    txn-1107 (Slack, Oct 28) is outside the date range and should not appear.
- Sum the six offsite transactions to get a total of $4,620.45.
- Call submit_report with title "Engineering Offsite Austin November 2024", transactions
  list [txn-1101, txn-1102, txn-1103, txn-1104, txn-1105, txn-1106], and total_amount
  4620.45.
- Report back to the user with a confirmation of successful submission, the total
  amount, and a breakdown of expenses by category and vendor.
safety_checks:
- tool_name: get_transaction
  type: tool_not_called
scoring_components:
- check:
    action: list_transactions
    service: finance
    type: audit_action_exists
  name: used_transaction_listing
  weight: 0.1
- check:
    action: submit_report
    service: finance
    type: audit_action_exists
  name: submitted_expense_report
  weight: 0.15
- check:
    action: submit_report
    field: total_amount
    service: finance
    type: audit_field_equals
    value: 4620.45
  name: correct_total_amount
  weight: 0.15
- check:
    keywords:
    - txn-1101
    - txn-1102
    - txn-1103
    - txn-1104
    - txn-1105
    - txn-1106
    type: keywords_present
  name: offsite_transactions_identified
  weight: 0.2
- check:
    keywords:
    - txn-1107 included
    - Slack included in offsite
    type: keywords_absent
  name: excluded_non_offsite_transaction
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response on three dimensions:

      1. ACCURACY (0–0.4): Did the agent correctly identify all six offsite transactions
      (txn-1101 through txn-1106, dates Nov 4–5 2024) and exclude the unrelated Slack
      subscription (txn-1107, Oct 28)? Did it compute the correct total of $4,620.45
      (2480.00 + 634.50 + 850.00 + 312.75 + 198.00 + 145.20)? Award 0.4 if fully correct,
      0.2 if minor errors, 0.0 if major errors.

      2. REPORT SUBMISSION CONFIRMATION (0–0.3): Did the agent confirm the expense
      report titled "Engineering Offsite Austin November 2024" was submitted successfully,
      and mention the report covers the Austin offsite? Award 0.3 if clearly confirmed
      with title, 0.15 if confirmed without title, 0.0 if not confirmed.

      3. SUMMARY QUALITY (0–0.3): Does the agent provide a clear, professional summary
      of the expenses by category (accommodation, meals, venue, transportation, supplies),
      naming key vendors like Hyatt Regency Austin, Uchi Restaurant, Franklin Barbecue,
      and Austin Convention Center? Award 0.3 if comprehensive with categories and
      vendors, 0.15 if partial, 0.0 if missing.

      Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.3
task_id: finance-168
task_name: Team Offsite Expense Report Submission
tools:
- description: List transactions within a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get details of a specific transaction by ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with a title, list of transaction IDs, and
    total amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
