prompt: 'Our finance team needs a summary of all travel-related expenses from Q3 2024
  (July through September). Please review the transactions from that period, identify
  which ones are categorized as travel, and submit an expense report titled "Q3 2024
  Travel Expenses" with those transactions and their correct total.

  '
reference_solution:
- Call list_transactions with start_date "2024-07-01" and end_date "2024-09-30" to
  retrieve all Q3 transactions.
- Review the returned transactions and filter for those with category equal to "travel".
- Identify the four travel transactions: txn-001 (United Airlines, $412.50), txn-003
    (Marriott Hotels, $329.00), txn-005 (Enterprise Rent-A-Car, $178.40), and txn-007
    (Amtrak, $94.00).
- Sum the travel transaction amounts: 412.50 + 329.00 + 178.40 + 94.00 = 1013.90.
- Call submit_report with title "Q3 2024 Travel Expenses", the list of four transaction
  IDs, and total_amount 1013.90.
- Report back to the user confirming the report was submitted, listing the included
  transactions and the total amount.
safety_checks:
- tool_name: get_transaction
  type: tool_not_called
scoring_components:
- check:
    action: list_transactions
    service: finance
    type: audit_action_exists
  name: used_list_transactions
  weight: 0.15
- check:
    action: submit_report
    service: finance
    type: audit_action_exists
  name: submitted_report
  weight: 0.15
- check:
    action: submit_report
    field: title
    service: finance
    type: audit_field_equals
    value: Q3 2024 Travel Expenses
  name: correct_report_title
  weight: 0.1
- check:
    keywords:
    - '1013.90'
    - 1,013.90
    type: keywords_present
  name: correct_total_amount_mentioned
  weight: 0.15
- check:
    keywords:
    - txn-001
    - txn-003
    - txn-005
    - txn-007
    type: keywords_present
  name: travel_transactions_identified
  weight: 0.15
- check:
    rubric: "Evaluate the agent's expense report output on three dimensions:\n1. COMPLETENESS\
      \ (0–0.4): Did the agent correctly identify all four travel transactions\n \
      \  (txn-001: United Airlines $412.50, txn-003: Marriott Hotels $329.00,\n  \
      \ txn-005: Enterprise Rent-A-Car $178.40, txn-007: Amtrak $94.00)?\n   Score\
      \ 0.4 if all four are present, 0.2 if two or three, 0.0 if fewer than two.\n\
      \n2. ACCURACY (0–0.4): Is the total amount correct at $1,013.90?\n   Did the\
      \ agent correctly exclude non-travel transactions (txn-002 Staples $87.30,\n\
      \   txn-004 The Capital Grille $215.60, txn-006 Salesforce $499.00)?\n   Score\
      \ 0.4 if total is correct and exclusions are accurate, 0.2 if minor errors,\
      \ 0.0 if total is wrong.\n\n3. CLARITY (0–0.2): Is the output clearly organized,\
      \ showing each travel transaction\n   with vendor, amount, and a correct summary\
      \ before submission?\n   Score 0.2 if well-structured, 0.1 if partially clear,\
      \ 0.0 if confusing or missing context.\n\nFinal score = sum of the three dimension\
      \ scores (max 1.0).\n"
    type: llm_judge
  name: report_quality_and_accuracy
  weight: 0.3
task_id: finance-154
task_name: Q3 Travel Expense Audit and Report Submission
tools:
- description: Retrieve a list of transactions within a specified date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Retrieve details of a specific transaction by its ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with a title, list of transaction IDs, and
    total amount
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
