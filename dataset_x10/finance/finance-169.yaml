category: finance
claw_eval_id: T12_expense_report
difficulty: medium
fixtures:
  transactions:
  - amount: 412.5
    category: travel
    date: '2024-07-08'
    description: Flight to Chicago — client onboarding
    id: txn-001
    status: approved
    vendor: United Airlines
  - amount: 318.0
    category: travel
    date: '2024-07-15'
    description: Hotel stay — Chicago Marriott, 2 nights
    id: txn-002
    status: approved
    vendor: Marriott Hotels
  - amount: 187.4
    category: meals
    date: '2024-08-03'
    description: Team lunch — product planning session
    id: txn-003
    status: approved
    vendor: The Capital Grille
  - amount: 94.75
    category: travel
    date: '2024-08-19'
    description: Uber rides — NYC office visits
    id: txn-004
    status: approved
