category: research
claw_eval_id: T87_pinbench_market_news_brief
difficulty: medium
fixtures:
  articles:
  - category: sustainability
    date: '2024-11-18'
    id: art-001
    source: GreenTech Weekly
    summary: Researchers at MIT have achieved a record-breaking 40.2% efficiency rate
      in next-generation solar panels using perovskite-silicon tandem cells, potentially
      halving the cost of solar energy by 2030.
    title: Solar Panel Efficiency Breaks 40% Barrier for First Time
  - category: energy
    date: '2024-11-17'
    id: art-002
    source: CleanEnergy Today
    summary: Toyota and QuantumScape jointly announced a solid-state battery prototype
      delivering 500 miles per charge with a 10-minute fast-charge capability, targeting
      mass production by 2027.
    title: Solid-State Batteries Promise 500-Mile EV Range Without Charging Anxiety
  - category: sustainability
    date: '2024-11-16'
    id: art-003
    source: EcoInnovation Hub
    summary: Pilot programs in Amsterdam and Singapore demonstrate that machine learning
      algorithms managing city-wide power distribution can cut energy waste by nearly
      a third, saving millions in infrastructure costs.
    title: AI-Powered Smart Grids Reduce Urban Energy Waste by 30%
  - category: technology
    date: '2024-11-15'
    id: art-004
    source: Climate Tech Insider
    summary: Climeworks competitor CarbonLoop secured $800 million in Series C funding
      to deploy 50 direct air capture plants across North America and Europe by 2028,
      aiming to remove 10 million tons of CO2 annually.
    title: Carbon Capture Startup Raises $800M to Scale Direct Air Technology
  - category: energy
    date: '2024-11-14'
    id: art-005
    source: CleanEnergy Today
    summary: Green hydrogen produced via offshore wind electrolysis has reached cost
      parity with natural gas in Denmark, the Netherlands, and Scotland, marking a
      pivotal moment for industrial decarbonization.
    title: Green Hydrogen Costs Fall Below Natural Gas in Three European Markets
  - category: sustainability
    date: '2024-11-13'
    id: art-006
    source: GreenTech Weekly
    summary: Stanford engineers unveiled circuit boards made from mycelium-based composites
