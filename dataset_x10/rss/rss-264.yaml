category: content
claw_eval_id: T22_newsletter_curation
difficulty: medium
fixtures:
  articles:
  - category: ai
    date: '2024-11-18'
    id: art-001
    source: TechCrunch AI
    summary: OpenAI's latest model introduces batch processing APIs that dramatically
