claw_eval_id: T22_newsletter_curation
difficulty: medium
fixtures:
  articles:
  - category: semiconductors
    date: '2024-11-12'
    id: art-101
    source: SemiAnalysis
    summary: Reports emerge that NVIDIA's next-gen Blackwell GPU racks are experiencing
