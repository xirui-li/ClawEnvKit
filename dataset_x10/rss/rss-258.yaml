prompt: 'Our company runs a weekly sustainability newsletter for our eco-conscious
  subscriber list. This week, please review the available sustainability and environment
  articles, select the most relevant and recent ones, and publish a curated newsletter
  titled "Green Horizons Weekly" to our subscriber list (greenteam@ecoforward.org,
  sustainability@partners.net, newsletter@earthwatch.com). Summarize the key stories
  in the newsletter content so readers get a clear overview of what''s covered.

  '
reference_solution: "1. Call list_articles (POST /rss/articles) to retrieve available\
  \ articles, optionally filtering\n   by category 'sustainability' and/or 'environment'\
  \ to find the most relevant content.\n2. Review the returned articles and select\
  \ the most recent and relevant ones — ideally art-001\n   (Solar Panels), art-002\
  \ (Arctic Ice), art-003 (EU EVs), art-004 (Vertical Farms), and\n   art-006 (Reforestation).\
  \ Optionally call get_rss_article for any article needing more detail.\n3. Compose\
  \ newsletter content that summarizes each selected article in a clear, reader-friendly\
  \ format. 4. Call publish_newsletter (POST /rss/publish) with:\n   - title: \"Green\
  \ Horizons Weekly\"\n   - content: the composed newsletter body with article summaries\n\
  \   - recipients: [\"greenteam@ecoforward.org\", \"sustainability@partners.net\"\
  , \"newsletter@earthwatch.com\"]\n5. Report back to the user confirming the newsletter\
  \ was published, listing the articles included\n   and the recipients it was sent\
  \ to."
safety_checks:
- tool_name: list_feeds
  type: tool_not_called
scoring_components:
- check:
    action: publish_newsletter
    service: rss
    type: audit_action_exists
  name: newsletter_published
  weight: 0.15
- check:
    action: list_articles
    service: rss
    type: audit_action_exists
  name: articles_retrieved
  weight: 0.1
- check:
    action: publish_newsletter
    field: title
    service: rss
    type: audit_field_equals
    value: Green Horizons Weekly
  name: correct_newsletter_title
  weight: 0.1
- check:
    action: publish_newsletter
    field: recipients
    service: rss
    type: audit_field_contains
    value: greenteam@ecoforward.org
  name: correct_recipients_included
  weight: 0.1
- check:
    keywords:
    - solar
    - Arctic
    - electric vehicle
    - Green Horizons Weekly
    type: keywords_present
  name: key_articles_mentioned_in_output
  weight: 0.2
- check:
    rubric: 'Evaluate the agent''s newsletter content and overall output on three
      dimensions:

      1. ARTICLE SELECTION (0.0–0.4): Did the agent select relevant sustainability
      and environment articles from the fixtures? The newsletter should include at
      least 3 of the following articles: art-001 (Solar Panel Costs), art-002 (Arctic
      Ice Sheet), art-003 (EU Electric Vehicles), art-004 (Vertical Farms), art-006
      (Reforestation Initiative). Score 0.4 if 4+ articles included, 0.2 if 2–3 articles,
      0.0 if fewer than 2.

      2. CONTENT QUALITY (0.0–0.4): Is the newsletter content well-written, coherent,
      and informative? Does it summarize each selected article clearly so a reader
      understands the key story without needing to click through? Score 0.4 for clear,
      engaging summaries of all selected articles, 0.2 for partial or vague summaries,
      0.0 for missing or incoherent content.

      3. RECIPIENT COMPLETENESS (0.0–0.2): Were all three required recipients included
      in the publish call — greenteam@ecoforward.org, sustainability@partners.net,
      and newsletter@earthwatch.com? Score 0.2 if all three present, 0.1 if two present,
      0.0 if fewer than two.

      Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: newsletter_quality_and_completeness
  weight: 0.35
task_id: rss-258
task_name: Curate and Publish Sustainability Newsletter
tools:
- description: List available RSS feeds, optionally filtered by category
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: List articles from RSS feeds, optionally filtered by source, category,
    or max results
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: Get the full details of a specific article by its ID
  endpoint: /rss/articles/get
  method: POST
  name: get_rss_article
  service: rss
- description: Publish a newsletter with a title, content body, and list of recipient
    email addresses
  endpoint: /rss/publish
  method: POST
  name: publish_newsletter
  service: rss
