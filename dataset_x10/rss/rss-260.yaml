    id: art-006
    source: Wired
    summary: 'Global venture capital investment in AI startups reached a record $47
      billion in Q3 2024, with infrastructure and developer tooling attracting the
      largest share. Analysts warn of a potential correction if revenue growth fails
      to match valuations by mid-2025.

      '
    title: Venture Capital Investment in AI Startups Hits Record $47B in Q3 2024
