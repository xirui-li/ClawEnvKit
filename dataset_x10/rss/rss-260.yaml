fixtures:
  articles:
  - category: technology
    date: '2024-11-12'
    id: art-001
    source: TechCrunch
    summary: 'OpenAI has released GPT-5, featuring advanced multimodal reasoning that
      can process text, images, and audio simultaneously. Early benchmarks show a
      40% improvement over GPT-4 on complex reasoning tasks, with enterprise pricing
      starting at $0.03 per 1K tokens.

      '
    title: OpenAI Launches GPT-5 with Multimodal Reasoning Capabilities
  - category: technology
    date: '2024-11-11'
    id: art-002
    source: The Verge
    summary: 'Google DeepMind announced Gemini Ultra 2, claiming superior performance
      on coding benchmarks and a 60% reduction in hallucination rates. The model integrates
      natively with Google Workspace, posing a direct threat to Microsoft''s Copilot
      ecosystem.

      '
    title: Google DeepMind's Gemini Ultra 2 Challenges OpenAI's Dominance
  - category: technology
    date: '2024-11-10'
    id: art-003
    source: Wired
    summary: 'Apple has completed its acquisition of Synthesia, a UK-based AI video
      generation startup, for $2.1 billion. The deal is expected to accelerate Apple''s
      generative AI features in Final Cut Pro and iMovie, with integration planned
      for WWDC 2025.

      '
    title: Apple Acquires AI Startup Synthesia for $2.1 Billion
  - category: technology
    date: '2024-11-09'
    id: art-004
    source: TechCrunch
    summary: 'The European Union has begun enforcing the AI Act, requiring companies
      deploying high-risk AI systems to register with national authorities and conduct
      mandatory impact assessments. Non-compliance fines can reach €35 million or
      7% of global annual turnover.

      '
    title: 'EU AI Act Enforcement Begins: What Tech Companies Must Do Now'
  - category: technology
    date: '2024-11-08'
    id: art-005
    source: The Verge
    summary: 'Microsoft has rolled out real-time collaboration tools in Azure AI Studio,
