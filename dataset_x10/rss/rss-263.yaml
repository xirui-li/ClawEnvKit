    - newsletter sent
    - published successfully
    - recipients notified
    type: keywords_absent
  name: no_newsletter_published
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent correctly identifies the distribution of feeds
      across categories: technology (3 feeds: TechCrunch feed-001, Wired feed-002,
      MIT Technology Review feed-003), business (2 feeds: Harvard Business Review
      feed-004, The Economist feed-005), science (1 feed: Nature News feed-006), and
      politics (1 feed: Politico feed-007). Score 1.0 if the agent accurately reports
      all four categories with correct feed counts and names. Score 0.7 if three categories
      are correctly described with counts. Score 0.4 if the agent lists feeds but
      does not analyze distribution or counts. Score 0.0 if the category breakdown
      is missing or substantially wrong.

      '
    type: llm_judge
  name: category_distribution_analysis
  weight: 0.2
- check:
    rubric: 'Evaluate the quality of the agent''s editorial gap analysis and strategic
      recommendations. A high-quality response should: (1) clearly flag that technology
      is over-represented with 3 feeds while science and politics each have only 1
      feed, (2) note that business has moderate coverage with 2 feeds, (3) suggest
      that the editorial team consider adding more science or politics sources to
      balance coverage, and (4) present findings in a structured, actionable format
      suitable for an editorial team. Score 1.0 if all four elements are present and
      clearly articulated. Score 0.6 if the imbalance is identified but recommendations
      are vague or incomplete. Score 0.3 if the agent lists feeds without any gap
      analysis or editorial insight. Score 0.0 if the output is disorganized or factually
      incorrect.

      '
    type: llm_judge
  name: editorial_gap_analysis_quality
  weight: 0.2
