category: content
claw_eval_id: T22_newsletter_curation
difficulty: medium
fixtures:
  articles:
  - category: developer-tools
    date: '2024-11-12'
    id: art-101
    source: TechCrunch AI
    summary: Microsoft's AI coding assistant reaches a major milestone, with enterprises
      citing a 35% reduction in code review time.
    title: GitHub Copilot Enterprise Hits 50,000 Business Customers
  - category: developer-tools
