    title: 'Stack Overflow Survey: 76% of Developers Now Use AI Coding Tools Weekly'
  feeds:
  - category: technology
    id: feed-001
    name: TechCrunch AI
    url: https://techcrunch.com/category/artificial-intelligence/feed/
  - category: developer-tools
    id: feed-002
