    summary: JetBrains releases a major update to its AI Assistant, adding project-wide
      context understanding and automated refactoring suggestions.
    title: JetBrains Launches AI Assistant 2.0 with Context-Aware Refactoring
  - category: developer-tools
    date: '2024-11-08'
    id: art-103
    source: InfoQ Engineering
    summary: AWS expands CodeWhisperer's language support and introduces real-time
