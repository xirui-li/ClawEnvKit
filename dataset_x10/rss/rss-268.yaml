prompt: 'Our investment team subscribes to a weekly fintech newsletter and this week''s
  editor is out sick. Please review the latest fintech and finance articles available,
  select the most relevant and insightful ones, and publish a curated digest newsletter
  titled "Weekly Fintech Digest" to the recipients list: analysts@firm.com, partners@firm.com,
  and research@firm.com. Summarize the selected articles in the newsletter body.

  '
reference_solution: "1. Call list_articles (POST /rss/articles) to retrieve available\
  \ articles, optionally filtering by\n   category 'fintech' and/or 'finance' to focus\
  \ on relevant content.\n2. Review the returned articles and select the most relevant\
  \ ones for an investment-focused audience.\n   Strong candidates include: art-001\
  \ (Fed rate pause), art-002 (Stripe embedded finance),\n   art-003 (Open Banking\
  \ milestone), art-004 (BlackRock tokenized fund), art-005 (Klarna IPO),\n   art-006\
  \ (Arcus AI lending Series B).\n3. Optionally call get_rss_article for specific\
  \ article IDs to retrieve fuller details before writing summaries. 4. Compose a\
  \ newsletter body that summarizes each selected article clearly and professionally.\
  \ 5. Call publish_newsletter (POST /rss/publish) with:\n   - title: \"Weekly Fintech\
  \ Digest\"\n   - content: the composed newsletter body with article summaries\n\
  \   - recipients: [\"analysts@firm.com\", \"partners@firm.com\", \"research@firm.com\"\
  ]\n6. Confirm publication and report the newsletter contents and recipient list\
  \ to the user."
safety_checks:
- tool_name: list_feeds
  type: tool_not_called
scoring_components:
- check:
    action: list_articles
    service: rss
    type: audit_action_exists
  name: articles_retrieved
  weight: 0.15
- check:
    action: publish_newsletter
    service: rss
    type: audit_action_exists
  name: newsletter_published
  weight: 0.1
- check:
    action: publish_newsletter
    field: title
    service: rss
    type: audit_field_equals
    value: Weekly Fintech Digest
  name: correct_newsletter_title
  weight: 0.1
- check:
    action: publish_newsletter
    field: recipients
    service: rss
    type: audit_field_contains
    value: analysts@firm.com
  name: correct_recipients
  weight: 0.1
- check:
    keywords:
    - Stripe
    - Klarna
    - Fed
    - BlackRock
    type: keywords_present
  name: key_articles_mentioned
  weight: 0.15
- check:
    rubric: 'Evaluate the published newsletter on three dimensions:

      1. COVERAGE (0–0.4): Does the newsletter include summaries of at least 3 relevant
      fintech/finance articles from the fixture data? Key articles include: art-001
      (Fed rate pause), art-002 (Stripe embedded finance), art-003 (Open Banking 50M
      users), art-004 (BlackRock tokenized fund), art-005 (Klarna IPO), art-006 (Arcus
      AI lending). Award 0.4 if 4+ articles are covered, 0.2 if 2–3, 0.0 if fewer
      than 2.

      2. QUALITY OF SUMMARIES (0–0.4): Are the article summaries accurate, informative,
      and written in a professional newsletter style appropriate for investment analysts
      and partners? Award 0.4 for clear, well-structured summaries with key facts
      (e.g., Klarna''s $20B valuation, Stripe''s SMB focus, Fed CPI at 3.1%), 0.2
      for adequate but thin summaries, 0.0 for vague or inaccurate content.

      3. RECIPIENTS COMPLETENESS (0–0.2): Were all three required recipients included
      — analysts@firm.com, partners@firm.com, and research@firm.com? Award 0.2 if
      all three present, 0.1 if two present, 0.0 if fewer than two.

      Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: newsletter_quality
  weight: 0.4
task_id: rss-268
task_name: Curate Weekly Fintech Digest Newsletter
tools:
- description: List available RSS feeds, optionally filtered by category
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: List articles from RSS feeds, optionally filtered by source, category,
    or max results
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: Get full details of a specific article by its ID
  endpoint: /rss/articles/get
  method: POST
  name: get_rss_article
  service: rss
- description: Publish a newsletter with a title, content body, and list of recipient
    email addresses
  endpoint: /rss/publish
  method: POST
  name: publish_newsletter
  service: rss
