    summary: Over 130 countries are now exploring CBDCs. China's digital yuan has
      processed over $250B in transactions, while the EU's digital euro pilot enters
      its second phase with 5,000 participants.
    title: 'Central Bank Digital Currencies: Progress Report 2024'
  - category: fintech
    date: '2024-11-05'
    id: art-104
    source: Fintech Insider
    summary: A new study from Deloitte shows that banks deploying machine learning
