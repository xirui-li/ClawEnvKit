category: content
claw_eval_id: T22_newsletter_curation
difficulty: medium
fixtures:
  articles:
  - category: fintech
    date: '2024-11-08'
    id: art-101
    source: Fintech Insider
    summary: Major banks in Europe and North America are accelerating open banking
      initiatives, enabling third-party developers to build innovative financial products.
      Analysts predict a $43B market by 2026.
    title: Open Banking APIs Are Reshaping Consumer Finance
  - category: fintech
