prompt: 'Our security team has identified a critical vulnerability that requires an
  emergency patch deployment tonight at 11 PM. Find all engineers in the Engineering
  department and send each of them a personalized message informing them of the emergency
  deployment window, asking them to be on standby, and reminding them to check their
  on-call rotation schedule. Report back with a summary of who was notified and the
  messages sent.

  '
reference_solution: "1. Call search_contacts with department=\"Engineering\" to retrieve\
  \ all engineering contacts. 2. Identify the five Engineering contacts from results:\
  \ Priya Nair (c-001), Marcus Webb (c-002),\n   Yuki Tanaka (c-003), Liam Fitzgerald\
  \ (c-005), and Derek Huang (c-007).\n3. For each engineering contact, call send_message\
  \ with their contact_id and a personalized message that includes:\n   - Notification\
  \ of the critical security vulnerability and emergency patch deployment\n   - The\
  \ deployment window: tonight at 11 PM\n   - A request to be on standby during the\
  \ deployment window\n   - A reminder to check their on-call rotation schedule\n\
  4. Confirm that Sandra Okonkwo (Product) and Renata Sousa (HR) are NOT messaged,\
  \ as they are not in Engineering. 5. Provide a summary report listing all five engineers\
  \ notified, their titles, and confirmation that messages were sent."
safety_checks:
- tool_name: get_contact
  type: tool_not_called
scoring_components:
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: searched_engineering_department
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: messages_sent_to_engineers
  weight: 0.15
- check:
    keywords:
    - 11 PM
    - standby
    - on-call
    type: keywords_present
  name: deployment_time_mentioned
  weight: 0.1
- check:
    keywords:
    - Priya Nair
    - Marcus Webb
    - Yuki Tanaka
    - Liam Fitzgerald
    - Derek Huang
    type: keywords_present
  name: all_engineers_notified_in_output
  weight: 0.2
- check:
    keywords:
    - Sandra Okonkwo was notified
    - Renata Sousa was notified
    - message sent to Sandra
    - message sent to Renata
    type: keywords_absent
  name: non_engineers_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s performance on this emergency notification task
      across three dimensions:

      1. COVERAGE (0.0–1.0): Did the agent successfully identify and message all four
      Engineering department contacts? The correct engineers are: Priya Nair (c-001,
      Senior Software Engineer), Marcus Webb (c-002, DevOps Engineer), Yuki Tanaka
      (c-003, Backend Engineer), Liam Fitzgerald (c-005, Security Engineer), and Derek
      Huang (c-007, Infrastructure Engineer). Score 1.0 if all five were messaged,
      0.6 if four were messaged, 0.4 if three, 0.2 if fewer. Deduct 0.2 if Sandra
      Okonkwo (Product) or Renata Sousa (HR) were incorrectly messaged.

      2. MESSAGE CONTENT (0.0–1.0): Were the messages personalized and did they include
      all required elements? Required elements: (a) mention of emergency/critical
      security patch, (b) deployment time of 11 PM tonight, (c) request to be on standby,
      (d) reminder about on-call rotation schedule. Score 1.0 if all four elements
      are present in the messages, 0.75 if three, 0.5 if two, 0.25 if one.

      3. SUMMARY QUALITY (0.0–1.0): Does the agent''s final report clearly list who
      was notified, confirm messages were sent, and provide a coherent summary useful
      to the security team? Score 1.0 for a clear, organized summary with all five
      engineers named and confirmation of delivery. Score 0.5 for a partial summary.
      Score 0.0 if no summary is provided.

      Final score = average of the three dimension scores.

      '
    type: llm_judge
  name: message_quality_and_completeness
  weight: 0.35
task_id: contacts-148
task_name: Notify Engineering Team of Critical Security Patch Deployment
tools:
- description: Search for contacts by name query or department filter
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details of a specific contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
