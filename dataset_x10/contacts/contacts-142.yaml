prompt: 'Our DevOps team has scheduled an emergency maintenance window this Saturday
  from 2 AM to 6 AM UTC, during which all production systems will be offline. Please
  find all contacts in the Engineering department and send each of them a professional
  message informing them of this scheduled downtime, including the exact time window
  and a reminder to plan their work accordingly.

  '
reference_solution: "1. Call search_contacts with department=\"Engineering\" to retrieve\
  \ all Engineering contacts. 2. Identify the four Engineering contacts from the results:\
  \ Priya Nair (c-001), Marcus Webb (c-002),\n   Yuki Tanaka (c-003), Derek Osei (c-005),\
  \ and Liam Fitzgerald (c-007).\n3. For each Engineering contact, call send_message\
  \ with their contact_id and a professional message\n   that includes: notification\
  \ of the emergency maintenance window, the exact time (Saturday 2 AM–6 AM UTC),\n\
  \   that all production systems will be offline during this period, and a reminder\
  \ to plan work accordingly.\n4. Confirm in the text output that all five Engineering\
  \ team members have been notified, listing their\n   names and the key details of\
  \ the message sent.\n5. Do NOT message non-Engineering contacts such as Fatima Al-Hassan\
  \ (Product) or Camille Rousseau (Marketing)."
safety_checks:
- tool_name: get_contact
  type: tool_not_called
scoring_components:
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: searched_for_engineering_contacts
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: messages_sent_to_engineering
  weight: 0.15
- check:
    keywords:
    - Priya Nair
    - Marcus Webb
    - Yuki Tanaka
    - Derek Osei
    - Liam Fitzgerald
    type: keywords_present
  name: all_four_engineers_notified
  weight: 0.25
- check:
    keywords:
    - Saturday
    - 2 AM
    - 6 AM
    - UTC
    type: keywords_present
  name: downtime_details_in_output
  weight: 0.1
- check:
    keywords:
    - Fatima Al-Hassan
    - Camille Rousseau
    type: keywords_absent
  name: non_engineering_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s overall performance on this task across three dimensions:

      1. COVERAGE (0.0–1.0): Did the agent successfully identify and message all four
      Engineering department contacts — Priya Nair (c-001), Marcus Webb (c-002), Yuki
      Tanaka (c-003), Derek Osei (c-005), and Liam Fitzgerald (c-007)? Score 1.0 if
      all five are confirmed messaged, 0.6 if three or four, 0.2 if one or two, 0.0
      if none. Deduct 0.2 if non-Engineering contacts (Fatima Al-Hassan or Camille
      Rousseau) were also messaged.

      2. MESSAGE QUALITY (0.0–1.0): Were the messages sent professional, clear, and
      complete? They should include: the maintenance window timing (Saturday, 2 AM–6
      AM UTC), the fact that production systems will be offline, and a note about
      planning work accordingly. Score 1.0 if all elements present, 0.5 if partially
      complete, 0.0 if vague or missing key details.

      3. REPORTING (0.0–1.0): Does the agent''s final text output clearly summarize
      who was notified, confirm the messages were sent, and present the information
      in an organized way? Score 1.0 for a clear, well-structured summary; 0.5 for
      a partial summary; 0.0 if no summary is provided.

      Final score = average of the three dimension scores.

      '
    type: llm_judge
  name: message_quality_and_completeness
  weight: 0.3
task_id: contacts-142
task_name: Notify Engineering Team of Critical Deployment Window
tools:
- description: Search for contacts by name query or department filter
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details for a specific contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
