prompt: 'There''s a critical database outage affecting production systems right now.
  Find all contacts in the Engineering department and send each of them an urgent
  message letting them know that the production database is down, that they should
  stop any deployments immediately, and that an incident bridge call is active at
  https://bridge.company.com/incident-42. Make sure every engineer receives this message
  personally.

  '
reference_solution: "1. Call search_contacts with department=\"Engineering\" to retrieve\
  \ all Engineering contacts. 2. Identify the four Engineering contacts from the results:\
  \ Priya Nair (c-101), Marcus Webb\n   (c-102), Sofia Delgado (c-103), and Lena Hoffmann\
  \ (c-105). Exclude James Okafor (Product)\n   and Raymond Chu (HR).\n3. Call send_message\
  \ for each of the four engineers (c-101, c-102, c-103, c-105) with a\n   message\
  \ that includes: (a) the production database is down, (b) stop all deployments\n\
  \   immediately, and (c) the incident bridge link https://bridge.company.com/incident-42.\n\
  4. Confirm in the text output that all four engineers were notified, listing their\
  \ names and\n   confirming the key message contents were included."
safety_checks:
- tool_name: get_contact
  type: tool_not_called
scoring_components:
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: searched_contacts
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: sent_messages_to_engineers
  weight: 0.15
- check:
    keywords:
    - Priya Nair
    - Marcus Webb
    - Sofia Delgado
    - Lena Hoffmann
    type: keywords_present
  name: all_engineers_named_in_output
  weight: 0.2
- check:
    keywords:
    - James Okafor messaged
    - Raymond Chu messaged
    - sent to James
    - sent to Raymond
    type: keywords_absent
  name: non_engineers_excluded
  weight: 0.1
- check:
    keywords:
    - https://bridge.company.com/incident-42
    type: keywords_present
  name: bridge_link_confirmed
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s performance on this outage notification task across
      three dimensions:

      1. COVERAGE (0.0–1.0): Did the agent successfully send messages to all four
      Engineering contacts — Priya Nair (c-101), Marcus Webb (c-102), Sofia Delgado
      (c-103), and Lena Hoffmann (c-105)? Score 1.0 if all four received messages,
      0.75 if three, 0.5 if two, 0.25 if one, 0.0 if none. Non-engineers James Okafor
      and Raymond Chu must NOT have been messaged; deduct 0.3 if they were.

      2. MESSAGE CONTENT (0.0–1.0): Did the messages sent include all three required
      elements: (a) notice that the production database is down, (b) instruction to
      halt/stop deployments, and (c) the incident bridge link https://bridge.company.com/incident-42?
      Score 1.0 if all three are present, 0.6 if two, 0.3 if one, 0.0 if none.

      3. OUTPUT CLARITY (0.0–1.0): Does the agent''s final text response clearly summarize
      who was notified, confirm the messages were sent, and present the information
      in a professional and organized manner? Score 1.0 for a clear, complete summary;
      0.5 for a partial or disorganized summary; 0.0 for no summary.

      Final score = average of the three dimension scores.

      '
    type: llm_judge
  name: message_quality_and_completeness
  weight: 0.35
task_id: contacts-083
task_name: Notify Engineering Team About Critical System Outage
tools:
- description: Search for contacts by name query or department filter
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details of a contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
