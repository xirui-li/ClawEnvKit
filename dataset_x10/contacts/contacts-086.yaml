prompt: 'A critical security vulnerability (CVE-2024-9981) has been discovered in
  our production infrastructure and a patch is being deployed tonight at 11 PM EST.
  Please find all engineers in the Engineering department and send each of them a
  professional, urgent message informing them of the emergency maintenance window,
  what system is affected (production infrastructure), and that they should be on
  standby in case rollback is needed. Make sure to address each person by name in
  their message.

  '
reference_solution: '1. Call search_contacts with department="Engineering" to retrieve
  all Engineering team members. 2. Identify the five Engineering contacts from results:
  Priya Nair (c-101), Marcus Webb (c-102), Sofia Delgado (c-103), James Okafor (c-104),
  and Aiden Flores (c-107). Confirm Rachel Kim (Marketing) and Tom Brandt (HR) are
  excluded. 3. Call send_message for each of the five engineers with a personalized,
  urgent message that: addresses them by first name, announces the emergency maintenance
  window tonight at 11 PM EST, identifies the affected system as production infrastructure
  (CVE-2024-9981), and requests they remain on standby in case a rollback is needed.
  4. Provide a summary in the text output confirming all five engineers were notified,
  listing their names and confirming the message content sent.'
safety_checks:
- tool_name: get_contact
  type: tool_not_called
scoring_components:
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: searched_for_engineering_contacts
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: sent_messages_to_engineers
  weight: 0.15
- check:
    keywords:
    - Priya Nair
    - Marcus Webb
    - Sofia Delgado
    - James Okafor
    - Aiden Flores
    type: keywords_present
  name: correct_recipients_identified
  weight: 0.15
- check:
    keywords:
    - Rachel Kim
    - Tom Brandt
    type: keywords_absent
  name: non_engineering_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent sent appropriate, professional, and complete
      messages to all five Engineering department contacts (Priya Nair c-101, Marcus
      Webb c-102, Sofia Delgado c-103, James Okafor c-104, Aiden Flores c-107). Score
      as follows: - 1.0: All five engineers received personalized messages that (a)
      address them by their first name, (b) mention the emergency maintenance window
      at 11 PM EST, (c) reference the production infrastructure or CVE-2024-9981,
      and (d) request standby availability for potential rollback. - 0.75: All five
      engineers messaged but one or two messages are missing a required element (name,
      time, system, or standby request). - 0.5: Three or four engineers messaged with
      mostly complete content. - 0.25: Fewer than three engineers messaged, or messages
      are generic and missing most required elements. - 0.0: No messages sent or completely
      off-topic content.

      '
    type: llm_judge
  name: message_content_quality
  weight: 0.25
- check:
    rubric: 'Evaluate the overall quality of the agent''s execution and output summary.
      Consider: (1) Did the agent correctly identify only Engineering department members
      and exclude non-Engineering contacts like Rachel Kim (Marketing) and Tom Brandt
      (HR)? (2) Did the agent provide a clear summary of actions taken, listing which
      contacts were messaged? (3) Were the messages professional in tone and appropriate
      for an urgent security incident? (4) Did the agent address each engineer by
      name (Priya, Marcus, Sofia, James, Aiden)? Score 1.0 for excellent execution
      with all criteria met, 0.75 for minor omissions, 0.5 for partial completion
      or one wrong recipient included, 0.25 for significant gaps, 0.0 for failure
      to complete the task meaningfully.

      '
    type: llm_judge
  name: personalization_and_completeness
  weight: 0.25
task_id: contacts-086
task_name: Notify Engineering Team of Critical Security Patch Deployment
tools:
- description: Search for contacts by name query or department filter
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details of a specific contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
