prompt: 'A support ticket has come in reporting that an internal integration''s API
  key may have been accidentally exposed in a public forum post. Retrieve the full
  details of ticket TKT-0041, then look up the affected integration (Stripe Payment
  Gateway) to confirm the current API key and secret. Cross-reference any relevant
  knowledge base articles on key rotation procedures. Send a notification email to
  the security team (security@company.com) summarizing the exposure risk, the affected
  integration details, and recommended next steps. Finally, update the ticket with
  a "security" tag and set its category to "security-incident" to ensure proper routing.

  '
reference_solution: '1. Call get_ticket with ticket_id="TKT-0041" to retrieve the
  full incident description, confirming the Stripe API key exposure via a public GitHub
  gist.

  2. Call list_integrations or get_integration with the Stripe integration identifier
  (intg-stripe-001) to retrieve the current API key (sk_live_4xKj9mNpQr2vWzYt8LbDcEfG),
  secret, and notes including the last rotation date (2023-11-15).

  3. Call search_articles with a query like "API key rotation" or category "security"
  to find KB-0088. Optionally call get_kb_article for KB-0088 to retrieve the full
  rotation procedure.

  4. Call send_email with to="security@company.com", a subject referencing the Stripe
  key exposure, and a body summarizing: the ticket (TKT-0041), the exposed key, the
  duration of exposure (~3 hours per marcus.chen''s follow-up), and the recommended
  steps from KB-0088 (revoke, rotate, monitor).

  5. Call update_ticket with ticket_id="TKT-0041", category="security-incident", and
  tags=["security"] to ensure proper routing and escalation.

  6. Summarize all findings in the text response: ticket details, integration secrets
  confirmed, KB guidance referenced, email sent to security team, and ticket updated.'
