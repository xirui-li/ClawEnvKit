- check:
    rubric: 'Evaluate the quality and completeness of the agent''s security notification
      and overall output. The agent should have: (1) Identified the three problematic
      integrations — Stripe Payments (intg-002, disabled), SendGrid Email (intg-003,
      disabled), and Datadog Monitoring (intg-005, error status). (2) Connected these
      to related helpdesk tickets tkt-101, tkt-102, and tkt-103. (3) Referenced relevant
      KB guidance such as the 90-day key rotation policy (kb-201) or troubleshooting
      steps. (4) Sent a notification to security@company.com with a clear subject
      and body summarizing findings. (5) Updated the notes field on at least one problematic
      integration to reflect today''s review. (6) Provided actionable next steps (e.g.,
      rotate API keys, re-enable integrations, resolve billing dispute). Score 1.0
      if all six elements are present and the notification body is professional and
      specific. Score 0.7 if four or five elements are present. Score 0.4 if two or
      three elements are present. Score 0.1 if the agent only partially engaged with
      the task. Score 0.0 if the notification was not sent or the output is missing
      critical findings.

      '
    type: llm_judge
  name: notification_quality_and_completeness
  weight: 0.2
