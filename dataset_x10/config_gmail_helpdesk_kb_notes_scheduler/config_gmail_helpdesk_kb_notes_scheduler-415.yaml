tools:
- description: List recent emails from the Gmail inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get the full content of a specific email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: List all integrations in the config store, optionally filtered by status
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full details of a specific integration including secrets
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Update an integration's status or notes
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: List helpdesk tickets, optionally filtered by status
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get full details of a specific helpdesk ticket
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Update a helpdesk ticket's priority, tags, or category
  endpoint: /helpdesk/tickets/update
  method: POST
  name: update_ticket
  service: helpdesk
- description: Send an internal notification via the config service
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
