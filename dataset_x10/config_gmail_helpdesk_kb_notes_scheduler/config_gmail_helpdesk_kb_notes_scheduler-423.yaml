tools:
- description: Search the knowledge base for articles by query and category
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Retrieve the full content of a knowledge base article by ID
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
- description: List all integrations in the config store, optionally filtered by status
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full details of a specific integration including secrets
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Update an integration's status or notes
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: Send a notification via the config service
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
- description: List helpdesk tickets, optionally filtered by status
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get full details of a specific helpdesk ticket
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
