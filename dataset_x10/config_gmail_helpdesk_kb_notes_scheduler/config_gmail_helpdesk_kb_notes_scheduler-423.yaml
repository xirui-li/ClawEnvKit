- check:
    rubric: "Evaluate the agent's consolidated safety report on the following dimensions:\n\
      1. POLICY ACCURACY (0-0.25): Does the report correctly summarize the KB article\
      \ kb-101 rotation policy?\n   Specifically: 12-month rotation cycle, 18-month\
      \ critical threshold, 30-day revocation for inactive integrations.\n\n2. RISK\
      \ IDENTIFICATION (0-0.25): Does the report correctly identify the three at-risk\
      \ integrations?\n   - intg-001 (Stripe): flagged by security scanner, last rotated\
      \ 2022 (overdue)\n   - intg-003 (Twilio): inactive but keys not revoked\n  \
      \ - intg-004 (Salesforce): last rotated 2021-08-20, critically overdue per 18-month\
      \ rule\n\n3. TICKET CORRELATION (0-0.25): Does the report link the open helpdesk\
      \ tickets (tkt-501, tkt-502, tkt-503)\n   to the corresponding integrations\
      \ and explain their current status?\n\n4. ACTIONABILITY (0-0.25): Does the report\
      \ provide clear, prioritized recommendations?\n   E.g., immediate revocation\
      \ for intg-004 and intg-003, urgent rotation for intg-001.\n\nScore 1.0 if all\
      \ four dimensions are well-addressed, 0.75 if three, 0.5 if two, 0.25 if one,\
      \ 0.0 if none.\n"
    type: llm_judge
  name: report_quality
  weight: 0.2
