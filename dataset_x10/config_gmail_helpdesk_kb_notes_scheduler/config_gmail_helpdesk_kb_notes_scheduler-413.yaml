- check:
    rubric: 'Evaluate the agent''s final summary on four dimensions:

      1. ACCURACY (0-0.25): Does the output correctly identify that intg-stripe-001
      (Stripe Payment Gateway) was disabled due to a suspected API key compromise?
      Does it reference ticket-8821 ("Possible API key leak in GitHub commit") as
      the primary incident ticket?

      2. RUNBOOK REFERENCE (0-0.25): Does the output reference the API Key Rotation
      Runbook (kb-art-0041) and mention key steps such as disabling the integration,
      rotating credentials, notifying the security team, and conducting a post-incident
      review?

      3. TICKET HANDLING (0-0.25): Does the output describe actions taken on the related
      helpdesk tickets (ticket-8821 and/or ticket-8834)? Does it mention updating
      or closing them with appropriate resolution notes?

      4. NOTIFICATION COMPLETENESS (0-0.25): Does the output confirm that an email
      was sent to security@acme.com summarizing the incident, the actions taken, and
      next steps (e.g., generating new Stripe credentials from the provider dashboard)?

      Score 1.0 if all four dimensions are well-addressed, 0.75 if three, 0.5 if two,
      0.25 if one, 0.0 if none.

      '
    type: llm_judge
  name: summary_quality
  weight: 0.25
