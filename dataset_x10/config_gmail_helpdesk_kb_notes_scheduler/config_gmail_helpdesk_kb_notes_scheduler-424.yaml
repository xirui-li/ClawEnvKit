    articles:
    - author: security-team@company.com
      category: security
      content: '## API Key Rotation Policy


        **Policy Owner:** Security Team

        **Last Updated:** 2024-10-01


        ### Mandatory Rotation Triggers

        1. Key exposed in any public repository or communication channel — rotate
        within 2 hours.

        2. Integration status changes to ''compromised'' or ''degraded'' — rotate
        within 24 hours.

        3. Routine rotation schedule: every 90 days for payment integrations, 180
        days for others.


        ### Rotation Steps

        1. Generate new API key in the provider''s dashboard.

        2. Update the key in the config store via the integration update endpoint.

        3. Test the integration to confirm connectivity.

        4. Revoke the old key in the provider''s dashboard.

        5. Update the integration notes with the rotation date.

        6. Notify security-lead@company.com and the integration owner.

        7. Close or update any related helpdesk tickets with resolution details.


        ### Escalation

        - If rotation cannot be completed within the SLA window, escalate to CISO
        immediately.

        - Document all steps taken in the helpdesk ticket.

        '
      id: kb-501
      last_updated: '2024-10-01'
      title: API Key Rotation Policy and Procedures
