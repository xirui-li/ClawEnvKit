- check:
    rubric: "Evaluate the agent's output on the following dimensions:\n1. IDENTIFICATION\
      \ (0-0.3): Did the agent correctly identify intg-002 (SendGrid, status=compromised)\n\
      \   and intg-004 (Salesforce CRM, status=degraded) as the affected integrations?\
      \ Award 0.3 if both\n   are named with their IDs, 0.15 if only one is identified,\
      \ 0.0 if neither.\n\n2. POLICY CONTENT (0-0.3): Did the agent accurately summarize\
      \ the key rotation steps from kb-501,\n   including the SLA windows (2 hours\
      \ for exposed keys, 24 hours for compromised/degraded) and the\n   7-step rotation\
      \ procedure? Award 0.3 for comprehensive coverage, 0.15 for partial, 0.0 if\
      \ absent.\n\n3. HELPDESK LINKAGE (0-0.2): Did the agent reference the related\
      \ open tickets tkt-201 (SendGrid\n   exposure) and tkt-202 (Salesforce auth\
      \ failures) and indicate they should be updated? Award 0.2\n   if both tickets\
      \ are mentioned, 0.1 if one, 0.0 if neither.\n\n4. ACTIONABILITY (0-0.2): Is\
      \ the notification/summary sent to security-lead@company.com clear,\n   actionable,\
      \ and suitable for a security team lead to act on immediately? Award 0.2 for\
      \ a\n   well-structured, urgent, and complete message; 0.1 for adequate but\
      \ incomplete; 0.0 for vague.\n\nSum the four dimension scores for the final\
      \ score between 0.0 and 1.0.\n"
    type: llm_judge
  name: output_quality_and_completeness
  weight: 0.35
