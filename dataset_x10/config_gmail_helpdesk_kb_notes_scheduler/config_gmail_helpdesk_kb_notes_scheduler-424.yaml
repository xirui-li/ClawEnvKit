      title: Onboarding New Third-Party Integrations
prompt: 'Our security team has flagged that several integrations may be using outdated
  or compromised API keys. Review the current integrations to identify any that are
  marked as having issues, then look up the relevant knowledge base article on our
  API key rotation policy to understand the required steps, and finally notify the
  security team lead (security-lead@company.com) via the config notification system
  with a summary of affected integrations and the remediation steps from the policy.
  Also check if there are any open helpdesk tickets related to this issue and update
  them with your findings.

  '
reference_solution:
- action: Call list_integrations to retrieve all integrations and identify those with
    non-active statuses.
  step: 1
- action: Call get_integration for intg-002 (SendGrid, compromised) and intg-004 (Salesforce
    CRM, degraded) to review their details and notes.
  step: 2
- action: Search the knowledge base using search_articles with query 'API key rotation
    policy' to locate the relevant article.
  step: 3
- action: Call get_kb_article with article_id kb-501 to retrieve the full API Key
    Rotation Policy and Procedures article.
  step: 4
- action: Call list_tickets to find open helpdesk tickets, then get_ticket for tkt-201
    and tkt-202 to review the related security incidents.
  step: 5
- action: Call update_ticket on tkt-201 and tkt-202 to add findings and reference
    the kb-501 policy steps.
  step: 6
- action: 'Call config_notify with to=security-lead@company.com, a subject referencing
    the security alert, and a body summarizing: affected integrations (intg-002 SendGrid
    compromised, intg-004 Salesforce degraded), the SLA windows from kb-501 (2 hours
    for SendGrid, 24 hours for Salesforce), the 7-step rotation procedure, and references
    to open tickets tkt-201 and tkt-202.'
  step: 7
- action: Output a clear text summary to the user covering all findings, policy requirements,
    ticket status, and confirmation that the security lead has been notified.
  step: 8
