- check:
    rubric: "Evaluate the agent's final summary on four dimensions:\n1. TICKET CLOSURE\
      \ (0-0.25): Did the agent close TKT-2041 with a meaningful resolution\n   summary\
      \ that references the completed Stripe v2 migration? Score 0.25 if the resolution\n\
      \   clearly explains the migration is complete and v1 is decommissioned, 0.1\
      \ if vague,\n   0.0 if missing.\n\n2. INTEGRATION STATUS (0-0.25): Did the agent\
      \ correctly set intg-001 (Stripe v1 Legacy)\n   to inactive status and confirm\
      \ intg-002 (Stripe v2) remains active? Score 0.25 if both\n   states are confirmed\
      \ in the output, 0.1 if only one is mentioned, 0.0 if neither.\n\n3. KB ARTICLE\
      \ UPDATE (0-0.25): Did the agent identify KB-0091 (\"Payment Integration Setup\n\
      \   Guide\") as outdated (still references Stripe v1 as primary) and update\
      \ it to reflect\n   Stripe v2 as the current integration? Score 0.25 if article\
      \ was identified and updated\n   with correct reasoning, 0.1 if identified but\
      \ not updated, 0.0 if missed entirely.\n\n4. NOTIFICATION COMPLETENESS (0-0.25):\
      \ Did the agent send a notification to the engineering\n   team summarizing\
      \ the decommission actions taken? Score 0.25 if notification includes\n   integration\
      \ name, ticket reference, and next steps (e.g., key revocation), 0.1 if\n  \
      \ partial, 0.0 if no notification sent.\n\nFinal score = sum of all four dimension\
      \ scores (max 1.0).\n"
    type: llm_judge
  name: resolution_quality
  weight: 0.2
