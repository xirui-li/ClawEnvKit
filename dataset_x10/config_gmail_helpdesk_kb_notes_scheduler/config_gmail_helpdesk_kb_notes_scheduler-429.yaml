tools:
- description: List scheduler jobs filtered by status, enabled state, or tag
  endpoint: /scheduler/jobs
  method: POST
  name: list_jobs
  service: scheduler
- description: Get details of a specific scheduler job by ID
  endpoint: /scheduler/jobs/get
  method: POST
  name: get_job
  service: scheduler
- description: List all integrations filtered by status
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full integration details including API key and secret
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: List helpdesk tickets filtered by status
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get details of a specific helpdesk ticket
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Search knowledge base articles by query or category
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Send a notification via the config service
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
