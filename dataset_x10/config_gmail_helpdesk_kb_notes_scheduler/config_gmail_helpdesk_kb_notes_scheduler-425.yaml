- check:
    rubric: 'Evaluate whether the agent updated the knowledge base article (kb-101:
      "Payment Integration Security Best Practices") with meaningful, accurate content
      about credential rotation procedures following a security incident. Score 1.0
      if: the updated article content includes specific guidance on immediate rotation
      upon suspected exposure, references the incident response process, and improves
      upon the original text (which only mentioned annual rotation and personnel changes).
      Score 0.7 if: the article was updated with some relevant security guidance but
      is missing incident-triggered rotation specifics. Score 0.3 if: the article
      was updated but the content is generic or barely changed from the original.
      Score 0.0 if: the article was not updated or the update is irrelevant to the
      task.

      '
    type: llm_judge
  name: kb_article_quality
  weight: 0.2
- check:
    rubric: 'Evaluate the overall completeness and quality of the agent''s response
      to the security incident involving the Stripe Payments integration (int-001).
      Score 1.0 if: the agent (1) retrieved and reviewed the Stripe integration details,
      (2) marked int-001 as under review or updated its notes to reflect the security
      concern, (3) updated KB article kb-101 with improved rotation guidance, (4)
      sent a notification to security@company.com summarizing findings and actions
      taken, and (5) provided a clear summary in its text output. Score 0.7 if: the
      agent completed 3-4 of the above steps with minor gaps. Score 0.4 if: the agent
      completed 2 steps or the response is incomplete/unclear. Score 0.0 if: the agent
      failed to address the security concern meaningfully or took no substantive action.

      '
    type: llm_judge
  name: overall_task_completeness
  weight: 0.15
