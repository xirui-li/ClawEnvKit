- check:
    rubric: 'Evaluate the agent''s incident report on four dimensions:

      1. ACCURACY (0-0.25): Does the report correctly identify the affected integration
      as ''Stripe Payment Gateway'' (intg-stripe-001), the exposed key prefix ''sk_live_4xQ'',
      the reporter as Marcus Webb, and the related helpdesk ticket tkt-4401 with status
      ''open'' and priority ''critical''? Award 0.25 if all four facts are present,
      0.15 if three, 0.05 if fewer.

      2. REMEDIATION STEPS (0-0.25): Does the report include concrete remediation
      steps drawn from the KB article kb-sec-012? Steps should include: disabling
      the exposed key, generating a new key, updating the config store, notifying
      the security team, and verifying dependent services. Award 0.25 if 4+ steps
      mentioned, 0.15 if 2-3 steps, 0.05 if only 1.

      3. RISK ASSESSMENT (0-0.25): Does the report assess the severity and urgency
      of the exposure (e.g., live key exposed publicly for ~3 hours, 4-hour rotation
      deadline from KB policy, GitHub secret scanning alert corroborating the report)?
      Award 0.25 for thorough risk context, 0.15 for partial, 0.0 if absent.

      4. CLARITY AND STRUCTURE (0-0.25): Is the report well-organized with clear sections
      (e.g., summary, affected systems, timeline, remediation)? Is it actionable and
      professional? Award 0.25 for excellent structure, 0.15 for adequate, 0.05 for
      disorganized.

      Total score = sum of four dimension scores (max 1.0).

      '
    type: llm_judge
  name: incident_report_quality
  weight: 0.35
