      content: 'When an API key is suspected to be compromised: (1) Immediately disable
        the exposed key in the third-party provider''s dashboard. (2) Generate a new
        key and update the config store entry. (3) Update the integration status to
        ''rotation_pending'' in the config store and add a note with the incident
        ticket ID. (4) Notify the security team via config notify. (5) Verify all
        dependent services are using the new key within 2 hours. (6) Close the helpdesk
        ticket with a resolution summary. Key rotation must be completed within 4
        hours of confirmed exposure.

