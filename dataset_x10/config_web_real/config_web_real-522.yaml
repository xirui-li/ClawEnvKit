  service: config
- description: Get full details of a specific integration including secrets
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Update an integration's status or notes
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: Send an internal notification about config changes
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
- description: Search the web for information about APIs, service updates, and documentation
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch a specific web page for detailed information
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification via web channel
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web_real
