  service: web_real
- description: Fetch the content of a real web page by URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: List all integrations, optionally filtered by status
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full details of an integration including secrets
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Update an integration's status, notes, or other fields
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: Send a notification email via the config service
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
