prompt: 'Our security team is preparing for a quarterly compliance audit and needs
  a full inventory of all configured integrations. For each integration, identify
  its current status, and flag any that are inactive or have concerning notes. Then
  search the web to find best practices for API key rotation and summarize the top
  recommendations. Finally, send a notification to the security team (security@company.com)
  with a consolidated report covering the integration statuses and the key rotation
  best practices you found.

  '
reference_solution: "1. Call list_integrations (no status filter) to retrieve all\
  \ 7 integrations and their metadata. 2. Review the returned list and identify flagged\
  \ integrations:\n   - intg-002 (SendGrid): inactive but keys not yet revoked — security\
  \ risk.\n   - intg-003 (Salesforce): active but last rotated 2023-06-01, overdue\
  \ for rotation.\n   - intg-005 (Twilio): suspended due to unusual usage spike, pending\
  \ investigation.\n   - intg-006 (GitHub Actions): active but personal access token\
  \ with no expiry set.\n3. Use web_search to find best practices for API key rotation\
  \ (e.g., \"API key rotation best practices security\"). 4. Optionally use web_fetch\
  \ to retrieve detailed content from a relevant result. 5. Synthesize findings: compile\
  \ the integration status table, highlight the four flagged integrations with reasons,\
  \ and summarize 3–5 key rotation best practices from the web search. 6. Call config_notify\
  \ with to=security@company.com, a clear subject line (e.g., \"Q2 Integration Compliance\
  \ Audit Report\"), and a body containing the full consolidated report. 7. Report\
  \ the summary in the text output — do NOT expose raw secret values or API keys in\
  \ the output."
