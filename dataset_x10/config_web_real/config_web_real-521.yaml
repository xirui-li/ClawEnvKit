tools:
- description: List all integrations and their current status
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full details of a specific integration including secrets
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Update an integration's status or notes
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: Send a notification to a recipient with a subject and body
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
- description: Search the web for information
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch a web page by URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification via web channel
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web_real
