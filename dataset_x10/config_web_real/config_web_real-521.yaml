  weight: 0.15
- check:
    keywords:
    - intg-001
    - intg-003
    - intg-005
    - Stripe
    - Twilio
    - Slack
    type: keywords_present
  name: correct_integrations_identified
  weight: 0.2
- check:
    keywords:
    - sk_live_4xKj9mNpQr2sT8vW
    - whsec_7yBnCdEfGhIjKlMn
    - AC7f2e1d0c9b8a7654
    - twilio_auth_Mn3pQr5sT7uVwXyZ
