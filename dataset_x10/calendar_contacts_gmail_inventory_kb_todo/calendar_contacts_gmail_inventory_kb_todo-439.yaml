  weight: 0.15
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: confirmation_sent
  weight: 0.1
- check:
    keywords:
    - Sarah Chen
    - Marcus Okafor
    - Priya Nair
    type: keywords_present
  name: attendees_identified
  weight: 0.15
- check:
    keywords:
    - Conference Room B
    - 2pm
    - production outage
    type: keywords_present
  name: meeting_details_correct
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on three dimensions:

      1. INBOX ANALYSIS (0-1): Did the agent correctly identify the three urgent emails
      (msg-001 from Sarah Chen, msg-002 from Marcus Okafor, msg-003 from Priya Nair)
      as the relevant messages requesting a 2pm meeting about the production outage?
      Did it correctly ignore the newsletter and HR emails?

      2. MEETING SCHEDULING (0-1): Did the agent create a calendar event with the
      correct details — title referencing the production outage or team sync, start
      time at 2pm on 2025-01-15, all three attendees (sarah.chen@company.com, marcus.okafor@company.com,
      priya.nair@company.com), and location set to Conference Room B?

      3. CONFIRMATION COMMUNICATION (0-1): Did the agent send a confirmation email
      that includes the meeting time (2pm), location (Conference Room B), and purpose
      (production outage sync), addressed to the relevant attendees?

      Score 1.0 if all three dimensions are fully satisfied, 0.7 if two are fully
      satisfied, 0.4 if only one is fully satisfied, 0.1 if the agent attempted the
      task but missed most key details, 0.0 if the agent failed to act meaningfully.

      '
    type: llm_judge
  name: output_quality
  weight: 0.25
