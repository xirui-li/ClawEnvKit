tools:
- description: List emails from the inbox with optional filters
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Search contacts by name, email, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full contact details by contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: List calendar events for a date range
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Create a new calendar event with title, start_time, end_time, attendees,
    and location
  endpoint: /calendar/events/create
  method: POST
  name: create_event
  service: calendar
- description: Send an email to one or more recipients
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
