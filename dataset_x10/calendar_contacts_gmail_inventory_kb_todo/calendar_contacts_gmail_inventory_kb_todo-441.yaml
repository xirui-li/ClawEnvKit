prompt: 'We have a scheduling conflict: two teams have booked the same conference
  room (Boardroom A) for overlapping times next Tuesday. Please investigate the conflicting
  calendar events, identify the attendees involved, look up their contact details,
  check if there''s a knowledge base article about our room booking policy, and then
  send a professional email to all affected attendees explaining the conflict and
  proposing a resolution. Also create a follow-up task to confirm the resolution was
  accepted.

  '
reference_solution: '1. Call list_events for 2025-08-05 to retrieve all calendar events
  on that day. 2. Identify evt-001 (Q3 Budget Review, 10:00-11:30, Boardroom A) and
  evt-002 (Product Roadmap Planning, 10:30-12:00, Boardroom A) as conflicting — both
  in Boardroom A with overlapping times. 3. Call get_event for evt-001 and evt-002
  to confirm attendee lists and organizers. 4. Call search_contacts or get_contact
  to look up contact details for the organizers (sarah.chen@company.com, james.wright@company.com)
  and key attendees. 5. Call search_articles with query "conference room booking policy"
  or category "Facilities" to find kb-001. 6. Call get_kb_article for kb-001 to read
  the policy: first-come-first-served, earlier booking takes priority, later booking
  must reschedule. 7. Call send_email to all affected attendees explaining the conflict,
  citing the policy, noting Q3 Budget Review retains Boardroom A, and asking the Product
  Roadmap team to reschedule or use a virtual meeting. 8. Call create_task to create
  a follow-up task such as "Confirm Boardroom A conflict resolution — verify Product
  Roadmap Planning has been rescheduled" with appropriate priority and due date. 9.
  Summarize the findings, the email sent, and the follow-up task created in the text
  response.'
