  name: policy_applied
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s overall handling of the double-booking conflict.
      Score on these dimensions:

      1. CONFLICT IDENTIFICATION (0-0.25): Did the agent correctly identify both conflicting
      events — "Q3 Budget Review" (evt-001, 10:00-11:30) and "Product Roadmap Planning"
      (evt-002, 10:30-12:00) — both in Boardroom A on 2025-08-05?

      2. POLICY APPLICATION (0-0.25): Did the agent reference the KB article (kb-001)
      about the room booking policy, and correctly apply the first-come-first-served
      rule, noting that Q3 Budget Review (booked first) takes priority and Product
      Roadmap Planning must be rescheduled?

      3. EMAIL QUALITY (0-0.25): Was the email sent to affected attendees (ideally
      including organizers sarah.chen@company.com and james.wright@company.com, and/or
      other attendees)? Is the email professional, clear, empathetic, and does it
      propose a concrete resolution (e.g., rescheduling the Product Roadmap meeting,
      suggesting alternative rooms or virtual options)?

      4. FOLLOW-UP TASK (0-0.25): Did the agent create a meaningful follow-up task
      (e.g., "Confirm room conflict resolution accepted" or similar) with appropriate
      context?

      Score 1.0 if all four dimensions are fully addressed, 0.75 if three are well-addressed,
      0.5 if two, 0.25 if one, 0.0 if none.

      '
    type: llm_judge
  name: email_quality_and_resolution
  weight: 0.3
