prompt: 'I have an important board strategy session coming up this week. Please look
  up the full details of the event titled "Board Strategy Session" on my calendar,
  then find the contact records for all attendees listed in that event, and check
  whether there are any open to-do tasks tagged with "board" or related to strategy
  preparation. Summarize everything in a briefing note: who is attending (with their
  titles and departments), the meeting logistics, and any outstanding prep tasks I
  should be aware of. Also send a quick heads-up message to the contact Sarah Chen
  reminding her to bring the Q3 financial report.

  '
reference_solution: '1. Call list_events or get_event to locate the "Board Strategy
  Session" — retrieve event evt-001 to get full details including attendees, location
  (Executive Boardroom, Floor 12), and time (Nov 14, 9:00–12:00). 2. Search or look
  up each attendee email in contacts: find con-101 (Sarah Chen, CFO, Finance), con-102
  (Marcus Okafor, COO, Operations), con-103 (Linda Park, General Counsel, Legal).
  3. Call list_tasks to retrieve all to-do tasks; identify board-tagged open tasks:
  task-001 (Q3 slides, in_progress), task-002 (agenda, pending/overdue), task-005
  (legal compliance, pending). 4. Call send_message with contact_id con-101 and a
  message reminding Sarah Chen to bring the Q3 financial report. 5. Compose and output
  a briefing note summarizing: meeting logistics, attendee profiles with titles and
  departments, and outstanding prep tasks with their priorities and statuses.'
