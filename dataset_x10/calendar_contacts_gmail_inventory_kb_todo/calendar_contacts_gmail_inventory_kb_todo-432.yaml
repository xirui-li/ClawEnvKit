  name: checked_todo_tasks
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: sent_message_to_sarah_chen
  weight: 0.1
- check:
    keywords:
    - Executive Boardroom
    - Floor 12
    - 09:00
    type: keywords_present
  name: briefing_contains_key_logistics
  weight: 0.15
- check:
    keywords:
    - Sarah Chen
    - Chief Financial Officer
    - Marcus Okafor
    - Linda Park
    type: keywords_present
  name: briefing_contains_attendee_details
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s briefing note on the following dimensions:

      1. EVENT LOGISTICS (0–0.25): Does the output correctly state the Board Strategy
      Session details — date November 14, time 9:00 AM to 12:00 PM, location Executive
      Boardroom Floor 12?

      2. ATTENDEE PROFILES (0–0.25): Does the output identify all three attendees
      with their correct titles and departments? Sarah Chen (CFO, Finance), Marcus
      Okafor (COO, Operations), Linda Park (General Counsel, Legal). Score 0.25 if
      all three are correct, 0.15 if two, 0.05 if one.

      3. OUTSTANDING TASKS (0–0.25): Does the output mention the open board-related
      tasks? Specifically: task-001 "Prepare Q3 financial summary slides" (in_progress,
      high priority), task-002 "Draft board strategy agenda" (pending, overdue), and
      task-005 "Review legal compliance checklist" (pending, high priority). Score
      0.25 if all three are mentioned, 0.15 if two, 0.05 if one.

      4. MESSAGE TO SARAH CHEN (0–0.25): Did the agent send a message to Sarah Chen
      (con-101) reminding her to bring the Q3 financial report, and does the output
      confirm this was done?

      Sum the four dimension scores. A perfect briefing scores 1.0.

      '
    type: llm_judge
  name: briefing_quality_and_completeness
  weight: 0.25
