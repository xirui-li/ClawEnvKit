tools:
- description: List calendar events for a given date range
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get full details of a specific calendar event by ID
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Get all calendar events for a specific user on a given date
  endpoint: /calendar/user_events
  method: POST
  name: user_events
  service: calendar
- description: Search contacts by name, email, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full contact record by contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a direct message to a contact by contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: List to-do tasks with optional status filter
  endpoint: /todo/tasks
  method: POST
  name: list_tasks
  service: todo
- description: Create a new to-do task
  endpoint: /todo/tasks/create
  method: POST
  name: create_task
  service: todo
- description: Send an email to a recipient
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
