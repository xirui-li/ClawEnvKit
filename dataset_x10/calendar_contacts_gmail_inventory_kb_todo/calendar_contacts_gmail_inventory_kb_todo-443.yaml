tools:
- description: List products in inventory, optionally filtered by category
  endpoint: /inventory/products
  method: POST
  name: list_products
  service: inventory
- description: Get details of a specific product by product_id
  endpoint: /inventory/products/get
  method: POST
  name: get_product
  service: inventory
- description: List calendar events for a given date and number of days
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Create a new calendar event with title, start_time, end_time, attendees,
    and location
  endpoint: /calendar/events/create
  method: POST
  name: create_event
  service: calendar
- description: Search contacts by query or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get details of a specific contact by contact_id
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Create a new to-do task with title, description, priority, and due_date
  endpoint: /todo/tasks/create
  method: POST
  name: create_task
  service: todo
- description: List to-do tasks with optional status filter
  endpoint: /todo/tasks
  method: POST
  name: list_tasks
  service: todo
- description: Send an email to a recipient
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
