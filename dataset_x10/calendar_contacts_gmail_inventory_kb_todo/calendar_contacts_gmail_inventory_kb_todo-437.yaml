prompt: 'Our VIP client Sarah Chen is starting her onboarding next week. I need you
  to pull together a full coordination briefing: find her contact details, check what
  onboarding events are already scheduled for her, look up any relevant onboarding
  knowledge base articles, and identify any outstanding onboarding tasks. Then send
  her a personalized welcome message with the schedule and key information she needs
  to know before her first session.

  '
reference_solution: "1. Search contacts for \"Sarah Chen\" using search_contacts,\
  \ then call get_contact with contact-001\n   to retrieve her full details (email:\
  \ sarah.chen@innovatech.com, title: Chief Strategy Officer).\n\n2. Call list_events\
  \ or user_events to retrieve calendar events for the week of Feb 10–12, 2025.\n\
  \   Identify the three Sarah Chen onboarding events: event-001 (Kickoff, Feb 10),\
  \ event-002\n   (Platform Walkthrough, Feb 11), event-003 (Executive Strategy Alignment,\
  \ Feb 12).\n   Optionally call get_event on each for full details.\n\n3. Call search_articles\
  \ with category \"onboarding\" to find kb-001 (VIP Client Onboarding Checklist)\n\
  \   and kb-002 (Executive Client Communication Guidelines). Optionally call get_kb_article\
  \ for full content.\n\n4. Call list_tasks to retrieve all tasks, identify those\
  \ tagged or related to Sarah Chen:\n   task-001 (welcome package, pending, high),\
  \ task-002 (credentials, pending, high),\n   task-004 (strategy deck, in progress,\
  \ high).\n\n5. Optionally check list_inbox to note Sarah Chen's prior email confirming\
  \ the schedule.\n6. Compose a personalized welcome message addressing Sarah Chen\
  \ by full name, summarizing her\n   three-session schedule with dates/times/locations,\
  \ noting that platform credentials will arrive\n   before Feb 10, and providing\
  \ James Holloway's contact as her dedicated Account Executive.\n   Send via send_message\
  \ to contact-001.\n\n7. Deliver a full coordination briefing in the text output\
  \ covering: contact details, schedule,\n   outstanding tasks, KB guidance highlights,\
  \ and confirmation that the welcome message was sent."
