- check:
    rubric: "Evaluate the agent's coordination briefing and welcome message for Sarah\
      \ Chen's onboarding. Score on these dimensions:\n1. Contact accuracy (0–0.25):\
      \ Did the agent correctly retrieve and use Sarah Chen's details\n   (email:\
      \ sarah.chen@innovatech.com, title: Chief Strategy Officer, contact-001)?\n\n\
      2. Schedule completeness (0–0.25): Did the agent identify all three onboarding\
      \ events for Sarah Chen:\n   event-001 (VIP Onboarding Kickoff, Feb 10, 9am,\
      \ Conference Room A/Zoom),\n   event-002 (Platform Walkthrough, Feb 11, 2pm,\
      \ Teams),\n   event-003 (Executive Strategy Alignment, Feb 12, 11am, Boardroom)?\n\
      \   Score 0.25 if all three named, 0.15 if two, 0.05 if one.\n\n3. Task awareness\
      \ (0–0.25): Did the agent surface the outstanding tasks relevant to Sarah Chen,\n\
      \   specifically task-001 (welcome package, pending), task-002 (platform credentials,\
      \ pending),\n   and task-004 (strategy deck, in progress)? Score 0.25 if all\
      \ three mentioned, 0.15 if two, 0.05 if one.\n\n4. Welcome message quality (0–0.25):\
      \ Was the welcome message sent to Sarah Chen personalized,\n   professional,\
      \ and inclusive of her schedule and key contacts (James Holloway as Account\
      \ Executive,\n   Marcus Webb as IT Director)? Did it follow the executive communication\
      \ guidelines (full name,\n   agenda, direct contact info)?\n\nSum the four dimension\
      \ scores for a final score between 0.0 and 1.0.\n"
    type: llm_judge
  name: briefing_quality
  weight: 0.3
