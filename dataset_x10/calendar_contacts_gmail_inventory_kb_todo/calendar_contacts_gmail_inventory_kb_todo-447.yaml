- check:
    rubric: "Evaluate the agent's overall execution of the onboarding scheduling task.\
      \ Score on these dimensions:\n1. KB Policy Compliance (0.0–0.4): Did the agent\
      \ retrieve and correctly apply the onboarding policy from kb-001?\n   The event\
      \ should be titled 'New Hire Orientation - Marcus Webb', scheduled at 9:00 AM\
      \ for 2 hours,\n   in 'Conference Room 3 (Building A)', with attendees alice@company.com,\
      \ hr@company.com, and bob@company.com.\n   Full credit if all details match;\
      \ partial if 2-3 match; zero if policy was ignored.\n\n2. Task Creation Quality\
      \ (0.0–0.3): Did the agent create a to-do task to send Marcus a welcome email\
      \ before the session?\n   The task should reference Marcus Webb and have a reasonable\
      \ priority (medium or high) and due date before the session.\n   Full credit\
      \ if task is well-formed and relevant; partial if created but missing key details.\n\
      \n3. Welcome Communication (0.0–0.3): Did the agent find Marcus Webb's contact\
      \ (marcus.webb@company.com) and send him\n   a welcome message that mentions\
      \ the orientation date, time, and location?\n   Full credit if message is warm,\
      \ informative, and includes session details; partial if sent but vague.\n\n\
      Final score: sum of dimension scores (0.0–1.0).\n"
    type: llm_judge
  name: orientation_quality
  weight: 0.25
