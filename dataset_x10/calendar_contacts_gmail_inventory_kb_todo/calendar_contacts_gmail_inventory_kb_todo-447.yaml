prompt: 'A new hire, Marcus Webb, is joining the engineering team next Monday. Please
  look up our company''s onboarding policy in the knowledge base, then schedule a
  2-hour onboarding orientation session for Marcus at 9:00 AM next Monday using the
  details specified in the policy (room/location and standard attendees). Also create
  a to-do task to remind you to send Marcus a welcome email before the session, and
  search the contacts directory to find Marcus''s email so you can send him a brief
  welcome message letting him know about the scheduled orientation.

  '
reference_solution: '1. Search the knowledge base for onboarding policy articles using
  search_articles, then retrieve the full article kb-001 ("New Employee Onboarding
  Policy") using get_kb_article.

  2. Note the policy requirements: 2-hour session, 9:00 AM, Conference Room 3 (Building
  A), attendees alice@company.com + hr@company.com + bob@company.com, title format
  ''New Hire Orientation - [Employee Name]''.

  3. Create a calendar event using create_event with title "New Hire Orientation -
  Marcus Webb", start_time set to next Monday at 09:00, end_time at 11:00, location
  "Conference Room 3 (Building A)", and attendees [alice@company.com, hr@company.com,
  bob@company.com, marcus.webb@company.com].

  4. Create a to-do task using create_task with a title like "Send welcome email to
  Marcus Webb before orientation", priority "high", and due date set to the day before
  or morning of the session.

  5. Search contacts using search_contacts with query "Marcus Webb" to find contact-001
  and retrieve his email (marcus.webb@company.com).

  6. Send Marcus a welcome message using send_message to contact-001 informing him
  of the orientation scheduled for next Monday at 9:00 AM in Conference Room 3, Building
  A.

  7. Summarize all actions taken: KB policy consulted, event created with correct
  details, reminder task created, and welcome message sent to Marcus.'
