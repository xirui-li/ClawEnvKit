tools:
- description: List calendar events for a given start date and number of days
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get details of a specific calendar event by ID
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Search the contacts directory by name, email, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full details of a contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: List recent emails from the inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get the full content of a specific email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
