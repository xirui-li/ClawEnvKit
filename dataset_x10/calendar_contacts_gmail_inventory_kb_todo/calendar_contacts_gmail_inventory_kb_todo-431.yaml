    - Sarah Chen
    - VP of Finance
    - Product Roadmap Alignment
    - James Whitfield
    - Apex
    - Raj Patel
    - All-Hands
    - clause 7.3
    - infrastructure
    type: keywords_present
  name: key_events_and_people_mentioned
  weight: 0.2
- check:
    rubric: "Evaluate the agent's weekly briefing on the following dimensions:\n1.\
      \ EVENT COVERAGE (0–0.3): Does the briefing accurately cover all 5 events from\
      \ the week of 2024-01-15?\n   - evt-001 Q1 Budget Review (Mon 9am, Conference\
      \ Room A)\n   - evt-002 Product Roadmap Alignment (Tue 2pm, Zoom)\n   - evt-003\
      \ 1:1 with Marcus (Wed 11am)\n   - evt-004 Vendor Contract Negotiation - Apex\
      \ Systems (Thu 1pm, Board Room)\n   - evt-005 All-Hands Town Hall (Fri 10am,\
      \ Main Auditorium)\n   Score 0.3 if all 5 covered with times/locations, 0.15\
      \ if 3-4 covered, 0.0 if fewer than 3.\n\n2. ATTENDEE CONTEXT (0–0.3): Does\
      \ the briefing correctly identify internal attendees with their roles and departments\
      \ from the contacts directory?\n   - Sarah Chen, VP of Finance (Finance)\n \
      \  - Marcus Obi, Senior Engineering Manager (Engineering)\n   - Linda Park,\
      \ Director of Product (Product)\n   - James Whitfield, COO (Executive)\n   -\
      \ Raj Patel, Head of Legal (Legal)\n   Score 0.3 if 4-5 contacts enriched with\
      \ title/department, 0.15 if 2-3, 0.0 if fewer than 2.\n\n3. EMAIL CONTEXT INTEGRATION\
      \ (0–0.25): Does the briefing surface relevant unread email context for the\
      \ meetings?\n   - msg-001: Sarah Chen flagged 12% infrastructure overage for\
      \ Budget Review\n   - msg-002: James Whitfield added mobile app launch timeline\
      \ to Roadmap Alignment agenda\n   - msg-003: Raj Patel warned about unresolved\
      \ clause 7.3 for Apex negotiation\n   Score 0.25 if all 3 email insights are\
      \ included, 0.15 if 2, 0.05 if 1, 0.0 if none.\n\n4. CLARITY AND USABILITY (0–0.15):\
      \ Is the briefing well-organized, easy to follow verbally, and actionable for\
      \ a leadership sync?\n   Score 0.15 if clearly structured with logical flow,\
      \ 0.08 if somewhat organized, 0.0 if disorganized or hard to follow.\n\nTotal\
      \ score = sum of dimension scores (max 1.0).\n"
    type: llm_judge
  name: briefing_quality
  weight: 0.45
