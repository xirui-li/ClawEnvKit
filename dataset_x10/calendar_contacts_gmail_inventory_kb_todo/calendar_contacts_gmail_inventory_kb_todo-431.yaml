prompt: 'I''m preparing for our Monday morning leadership sync and need a full picture
  of what''s happening this week (starting 2024-01-15 for 7 days). Please review all
  scheduled events, identify any attendees who are also in our contacts directory,
  and check whether any of those contacts have unread emails in my inbox related to
  this week''s meetings. Summarize everything in a clear briefing I can share verbally
  — including event titles, times, attendees with their roles/departments, and any
  relevant email context you find.

  '
reference_solution: '1. Call list_events with date=2024-01-15 and days=7 to retrieve
  all 5 events for the week. 2. Extract all unique internal attendee emails from the
  events: sarah.chen, marcus.obi, linda.park, james.whitfield, raj.patel. 3. Call
  search_contacts for each attendee (or search broadly) to retrieve their names, titles,
  and departments from the contacts directory. 4. Call list_inbox to retrieve recent
  emails and identify unread messages from known attendees related to this week''s
  meetings. 5. Cross-reference emails with events: msg-001 (Sarah Chen → Budget Review),
  msg-002 (James Whitfield → Roadmap Alignment), msg-003 (Raj Patel → Apex negotiation).
  6. Compose a structured verbal briefing covering: each event with date/time/location,
  attendees enriched with their roles, and relevant email context flagging key discussion
  points or risks (infrastructure overage, mobile app timeline, clause 7.3).'
