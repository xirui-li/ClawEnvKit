tools:
- description: List calendar events for a given date range
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get details of a specific calendar event by event_id
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: List inventory products, optionally filtered by category
  endpoint: /inventory/products
  method: POST
  name: list_products
  service: inventory
- description: Get details of a specific inventory product by product_id
  endpoint: /inventory/products/get
  method: POST
  name: get_product
  service: inventory
- description: Create a restock order for a product (product_id, quantity, supplier)
  endpoint: /inventory/orders/create
  method: POST
  name: create_order
  service: inventory
- description: Search contacts by name, email, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get details of a specific contact by contact_id
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a message to a contact by contact_id
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: Create a new task (title, description, priority, due_date)
  endpoint: /todo/tasks/create
  method: POST
  name: create_task
  service: todo
- description: List tasks with optional status filter
  endpoint: /todo/tasks
  method: POST
  name: list_tasks
  service: todo
