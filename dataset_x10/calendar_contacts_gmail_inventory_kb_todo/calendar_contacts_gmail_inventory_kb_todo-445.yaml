- check:
    rubric: 'Evaluate the agent''s response on the following dimensions:

      1. EVENT ANALYSIS (0-1): Did the agent correctly identify the three large events
      (evt-001 Q3 All-Hands with 12 attendees, evt-002 Product Roadmap Workshop with
      14 attendees, evt-004 Client Executive Briefing with 11 attendees) and correctly
      exclude the small meetings (evt-003 standup with 3, evt-005 1:1 with 2)?

      2. INVENTORY ASSESSMENT (0-1): Did the agent correctly identify all four understocked
      items — Whiteboard Markers (prod-101, qty 4 vs min 10), Presentation Clicker
      Remote (prod-102, qty 2 vs min 5), Folding Chairs (prod-103, qty 15 vs min 30),
      HDMI Cables (prod-104, qty 8 vs min 12), and Notepads (prod-106, qty 6 vs min
      20) — while correctly noting Bottled Water (prod-105) is adequately stocked?

      3. RESTOCK ORDERS (0-1): Did the agent place restock orders for the understocked
      items with reasonable quantities and correct suppliers (OfficeDepot for markers/notepads,
      TechSupplyCo for clickers/HDMI, FurniturePlus for chairs)?

      4. FACILITIES NOTIFICATION (0-1): Did the agent contact Margaret Holloway (contact-201,
      Facilities Manager) with a clear message summarizing the orders placed and the
      upcoming events requiring supplies?

      5. FOLLOW-UP TASK (0-1): Did the agent create a task to confirm delivery before
      the first major event (Q3 All-Hands on August 5, 2024), with appropriate priority
      and due date?

      6. SUMMARY QUALITY (0-1): Is the final summary clear, organized, and actionable
      — covering events reviewed, items restocked, notification sent, and follow-up
      task created?

      Score: Average the six dimensions. Deduct 0.2 if the agent missed more than
      one understocked item. Deduct 0.2 if the facilities manager was not contacted.
      Score 0.0 if no restock orders were placed at all.

      '
    type: llm_judge
  name: overall_quality_and_completeness
  weight: 0.2
