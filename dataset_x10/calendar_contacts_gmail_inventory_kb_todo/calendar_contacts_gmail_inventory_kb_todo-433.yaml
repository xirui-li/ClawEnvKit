- check:
    keywords:
    - Orion
    - December 10
    - Conference Room B
    - Marcus Webb
    - Priya Nair
    - Tom Okafor
    type: keywords_present
  name: key_details_in_output
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following dimensions:

      1. EMAIL COMPREHENSION (0–1): Did the agent correctly extract all key details
      from msg-101 — the event title "Orion Product Launch" kickoff, date December
      10 2024, time 10:00–11:30 AM, location Conference Room B, and the three requested
      attendees (Marcus Webb, Priya Nair, Tom Okafor) plus the requester Diana Chen?

      2. CONTACT RESOLUTION (0–1): Did the agent look up and correctly identify the
      email addresses for all four attendees (diana.chen@company.com, marcus.webb@company.com,
      priya.nair@company.com, tom.okafor@company.com) from the contacts service?

      3. KNOWLEDGE BASE USE (0–1): Did the agent consult the KB and reference the
      standard kickoff agenda (kb-301) in its summary or event description?

      4. EVENT CREATION ACCURACY (0–1): Was the calendar event created with the correct
      title referencing "Orion", the correct date/time (2024-12-10 10:00–11:30), location
      "Conference Room B", and all four attendees included?

      5. SUMMARY QUALITY (0–1): Is the agent''s final summary clear, complete, and
      professional — confirming what was done, listing attendees by name, and noting
      the event details?

      Scoring: Average the five dimensions. Score 1.0 if all five are fully satisfied,
      0.8 if four, 0.6 if three, 0.4 if two, 0.2 if one, 0.0 if none.

      '
    type: llm_judge
  name: overall_quality
  weight: 0.3
