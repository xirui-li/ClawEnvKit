- check:
    rubric: "Evaluate the agent's output on the following dimensions:\n1. COVERAGE\
      \ (0–0.4): Did the agent create drafts for all relevant external client attendees?\n\
      \   - Sarah Okonkwo (con-201) and James Liu (con-202) from evt-101 (Meridian\
      \ Corp)\n   - Priya Nair (con-203) from evt-102 (Bluewave Solutions)\n   - Carlos\
      \ Mendez (con-204) and Linda Park (con-205) from evt-103 (Apex Dynamics)\n \
      \  Full credit if all 5 are covered; partial credit for 3–4; minimal credit\
      \ for 1–2.\n   The internal standup (evt-104) should NOT generate client drafts.\n\
      \n2. TASK INTEGRATION (0–0.3): Did the agent reference relevant open tasks in\
      \ the appropriate drafts?\n   - Meridian Corp drafts should mention task-301\
      \ (\"Q4 proposal deck\")\n   - Bluewave draft should mention task-302 (\"roadmap\
      \ feedback\")\n   - Apex Dynamics drafts should mention task-303 (\"contract\
      \ renewal terms\")\n   Full credit if all three task references appear in the\
      \ correct drafts.\n\n3. PROFESSIONALISM & CLARITY (0–0.3): Are the draft emails\
      \ professional, clearly written, and do they\n   reference the correct meeting\
      \ title and ask for next-step confirmation?\n   Score 0.3 if all drafts are\
      \ polished and specific; 0.15 if generic but acceptable; 0.0 if poor quality.\n\
      \nFinal score = sum of dimension scores (max 1.0).\n"
    type: llm_judge
  name: draft_quality_and_completeness
  weight: 0.3
