prompt: 'I just finished a series of client check-in meetings this week and need to
  send follow-up emails, but I''m not ready to send them yet — please save them as
  drafts. Look at my calendar events for 2024-11-18, find the attendees for each meeting,
  look up their contact details, and draft a professional follow-up email for each
  attendee summarizing that their meeting occurred and asking them to confirm next
  steps. Also check if there are any open tasks related to these clients and mention
  relevant ones in the drafts. Summarize what drafts you created and for whom.

  '
reference_solution:
- Call POST /calendar/events with date=2024-11-18 and days=1 to retrieve all events
  on that day.
- 'Identify the three external client meetings: evt-101 (Meridian Corp), evt-102 (Bluewave
  Solutions), evt-103 (Apex Dynamics). Exclude evt-104 (internal standup).'
- For each external attendee email, call POST /contacts/search to find their contact
  record and retrieve their full name and title.
- 'Call POST /todo/tasks to list all tasks and identify those tagged or related to
  each client: task-301 for Meridian, task-302 for Bluewave, task-303 for Apex.'
- For each external attendee (Sarah Okonkwo, James Liu, Priya Nair, Carlos Mendez,
  Linda Park), call POST /gmail/drafts/save with a professional follow-up email that
  references the meeting title, thanks them for attending, mentions the relevant open
  task, and asks them to confirm next steps.
- Do NOT call POST /gmail/send — all emails must remain as drafts.
- Summarize in the output which drafts were created, for whom, and what tasks were
  referenced in each.
