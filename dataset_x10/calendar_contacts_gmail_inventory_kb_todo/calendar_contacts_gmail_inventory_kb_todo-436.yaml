    - conflict
    - Budget Review
    - James Okafor
    type: keywords_present
  name: conflict_identified
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s final summary on three dimensions:

      1. ACCURACY (0-0.4): Does the agent correctly identify all four Leadership department
      contacts (Sarah Chen - VP Engineering, Marcus Williams - VP Sales, Priya Patel
      - VP Marketing, James Okafor - CFO) from the contacts search? Does it correctly
      note that James Okafor has a scheduling conflict on December 12 from 10:00-11:30
      AM (Budget Review, event-001) which overlaps with the proposed 10:00 AM-12:00
      PM all-hands meeting?

      2. COMPLETENESS (0-0.3): Does the summary clearly state who was added to the
      meeting (Sarah Chen, Marcus Williams, Priya Patel at minimum), who had a conflict
      (James Okafor), and confirm the event was created for December 12, 2024 from
      10:00 AM to 12:00 PM?

      3. CLARITY (0-0.3): Is the summary well-organized, easy to read, and actionable?
      Does it give the user enough information to follow up with James Okafor separately?

      Score 1.0 if all three dimensions are fully satisfied. Score 0.7 if accuracy
      and completeness are met but clarity is weak. Score 0.4 if the conflict is missed
      or one leadership contact is omitted. Score 0.1 if the summary is largely incorrect
      or missing key information.

      '
    type: llm_judge
  name: summary_quality
  weight: 0.25
