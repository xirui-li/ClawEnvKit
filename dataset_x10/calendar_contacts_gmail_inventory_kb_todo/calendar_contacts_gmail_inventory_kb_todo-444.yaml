tools:
- description: Get detailed information about a specific product by its ID
  endpoint: /inventory/products/get
  method: POST
  name: get_product
  service: inventory
- description: List products, optionally filtered by category
  endpoint: /inventory/products
  method: POST
  name: list_products
  service: inventory
- description: Search contacts by name, keyword, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full details for a specific contact by ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Create a calendar event with title, start/end time, attendees, and
    location
  endpoint: /calendar/events/create
  method: POST
  name: create_event
  service: calendar
- description: List calendar events for a given date range
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Send an email to a recipient with subject and body
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Create a new to-do task with title, description, priority, and due
    date
  endpoint: /todo/tasks/create
  method: POST
  name: create_task
  service: todo
- description: List tasks with optional status filter
  endpoint: /todo/tasks
  method: POST
  name: list_tasks
  service: todo
