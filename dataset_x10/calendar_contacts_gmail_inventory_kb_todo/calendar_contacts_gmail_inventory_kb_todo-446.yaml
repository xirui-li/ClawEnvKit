- check:
    rubric: "Evaluate the agent's output on three dimensions:\n1. ARTICLE AUDIT ACCURACY\
      \ (0.0–0.4): Did the agent correctly identify the outdated KB articles?\n  \
      \ Articles last updated before 2024 should be flagged: kb-101 (Data Retention\
      \ Policy Overview, updated 2023-03-15),\n   kb-102 (Compliance Policy: Annual\
      \ Audit Procedures, updated 2022-11-20), kb-104 (Employee Data Handling Compliance,\n\
      \   updated 2023-06-01), and kb-105 (Vendor Compliance Assessment Template,\
      \ updated 2022-09-05).\n   kb-103 (updated 2024-08-10) should NOT be flagged\
      \ as outdated.\n   Score 0.4 if all four outdated articles are correctly identified\
      \ and kb-103 is excluded.\n   Score 0.2 if at least two outdated articles are\
      \ identified. Score 0.0 if none identified or kb-103 is incorrectly flagged.\n\
      \n2. EMAIL CONTENT QUALITY (0.0–0.4): Was the email sent to sarah.chen@company.com\
      \ (the meeting organizer for evt-001\n   \"Quarterly Compliance Review\")? Does\
      \ the email clearly list the outdated articles by name and/or ID, explain why\n\
      \   they need updating (age of last update), and reference the upcoming compliance\
      \ review meeting?\n   Score 0.4 if all elements present, 0.2 if partially complete,\
      \ 0.0 if email is missing or off-target.\n\n3. TASK CREATION (0.0–0.2): Did\
      \ the agent create a meaningful to-do task to track KB article updates,\n  \
      \ with a relevant title and appropriate priority (medium or high)?\n   Score\
      \ 0.2 if task is well-formed and relevant, 0.1 if created but vague, 0.0 if\
      \ not created.\n\nTotal score = sum of the three dimension scores (max 1.0).\n"
    type: llm_judge
  name: quality_and_completeness_of_summary
  weight: 0.25
