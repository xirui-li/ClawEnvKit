prompt: 'Our compliance team has an upcoming review meeting and needs help preparing.
  First, search the knowledge base for articles related to "data retention" and "compliance
  policy" to identify any outdated content (articles not updated in the past year).
  Then check the calendar for the compliance review meeting this week to get its details
  and attendee list. Finally, send a summary email to the meeting organizer listing
  which KB articles need updating before the meeting, and create a to-do task to track
  the article updates.

  '
reference_solution: '1. Search the knowledge base using search_articles with queries
  like "data retention" and "compliance policy" to retrieve relevant articles. 2.
  Review the returned articles (kb-101, kb-102, kb-103, kb-104, kb-105) and identify
  those with last_updated dates older than one year (before 2024): kb-101 (2023-03-15),
  kb-102 (2022-11-20), kb-104 (2023-06-01), kb-105 (2022-09-05). Note that kb-103
  (2024-08-10) is current. 3. Use list_events to find calendar events this week and
  identify the "Quarterly Compliance Review" (evt-001) on 2025-02-05, organized by
  sarah.chen@company.com. 4. Optionally use get_event to retrieve full details of
  evt-001 and confirm the organizer. 5. Use search_contacts or reference the fixture
  to confirm Sarah Chen''s email is sarah.chen@company.com. 6. Use send_email to send
  a summary to sarah.chen@company.com listing the four outdated articles (kb-101,
  kb-102, kb-104, kb-105) with their titles, last updated dates, and a recommendation
  to update them before the compliance review meeting. 7. Use create_task to create
  a to-do task such as "Update outdated compliance KB articles before quarterly review"
  with high or medium priority and a due date before 2025-02-05. 8. Report back with
  a summary of findings: which articles are outdated, the email sent to Sarah, and
  the task created.'
