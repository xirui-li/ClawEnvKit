- check:
    rubric: "Evaluate the quality and completeness of the competitor pricing report.\
      \ The agent should have fetched and synthesized pricing data from at least three\
      \ of the four competitor pages (TaskFlow Pro at taskflow-pro.com/pricing, OrbitPM\
      \ at orbitpm.io/plans, NexusWork at nexuswork.com/pricing, SprintDesk at sprintdesk.app/pricing).\n\
      Score on these dimensions: - Coverage (0–0.3): Does the report cover at least\
      \ 3 of the 4 competitors with their plan names and prices?\n  Full credit if\
      \ all 4 are covered with accurate prices (e.g., TaskFlow Starter $9/user/mo,\
      \ OrbitPM Growth $19/user/mo,\n  NexusWork Core $12/user/mo, SprintDesk Starter\
      \ $99/mo flat). Partial credit for 2–3 competitors.\n- Accuracy (0–0.3): Are\
      \ the prices and plan names correct and consistent with the fetched page content?\n\
      \  Deduct for invented or incorrect figures.\n- Structure & Clarity (0–0.2):\
      \ Is the report well-organized (e.g., table, sections per competitor, or clear\
      \ comparison)? - Insight (0–0.2): Does the report highlight notable differences\
      \ such as SprintDesk's flat-rate model vs per-user pricing,\n  or OrbitPM's\
      \ free tier, or NexusWork's 30-day trial? Bonus for actionable observations.\n\
      \nScore 1.0 for excellent coverage, accuracy, structure, and insight. Score\
      \ 0.5 for adequate but incomplete. Score 0.0 if the report is missing most competitors\
      \ or contains substantially wrong pricing data.\n"
    type: llm_judge
  name: pricing_report_quality
  weight: 0.35
- check:
    rubric: 'Does the agent''s output correctly identify and explain the different
      pricing models used by the competitors? Specifically: - SprintDesk uses a flat-rate
      per-team model ($99/$249/$599/month) rather than per-user pricing — this is
      a key differentiator. - OrbitPM offers a free tier (up to 5 users, 3 projects)
      which none of the others explicitly offer. - NexusWork offers the longest free
      trial (30 days) vs OrbitPM and SprintDesk (14 and 21 days respectively). - TaskFlow
      Pro and NexusWork both offer Enterprise tiers with custom/high pricing.

      Score 1.0 if the agent identifies at least 2 of these differentiators clearly
      and accurately. Score 0.5 if only 1 differentiator is mentioned or if the flat-rate
      vs per-user distinction is noted but vaguely. Score 0.0 if no meaningful differentiation
      is discussed.

      '
    type: llm_judge
  name: pricing_model_differentiation
  weight: 0.2
