prompt: 'Our startup is preparing to launch a new project management SaaS product
  and needs a competitive pricing analysis. Search for current pricing information
  on the top project management tools (Asana, Monday.com, Trello, and Notion) and
  summarize their pricing tiers, key features at each tier, and any free plan offerings
  so we can position our product competitively.

  '
reference_solution: "1. Use web_search with a query like \"project management software\
  \ pricing 2024 Asana Monday Trello Notion\"\n   to identify relevant pricing pages\
  \ from the search results.\n2. Use web_fetch on https://asana.com/pricing to retrieve\
  \ Asana's detailed tier information\n   (Basic free, Premium $10.99, Business $24.99,\
  \ Enterprise custom).\n3. Use web_fetch on https://monday.com/pricing to retrieve\
  \ Monday.com's tiers\n   (Free 2 seats, Basic $9, Standard $12, Pro $19, Enterprise\
  \ custom).\n4. Use web_fetch on https://trello.com/pricing to retrieve Trello's\
  \ tiers\n   (Free 10 boards, Standard $5, Premium $10, Enterprise $17.50+).\n5.\
  \ Use web_fetch on https://notion.so/pricing to retrieve Notion's tiers\n   (Free\
  \ individual, Plus $8, Business $15, Enterprise custom).\n6. Synthesize all findings\
  \ into a structured report comparing free plan limitations,\n   per-user monthly\
  \ costs at each tier, key differentiating features, and strategic gaps\n   a new\
  \ entrant could exploit (e.g., more generous free tier, lower mid-tier pricing,\n\
  \   better automation allowances). Present the report as text output."
