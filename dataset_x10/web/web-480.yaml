- check:
    rubric: "Evaluate the agent's competitive pricing analysis report on the following\
      \ dimensions:\n1. COMPLETENESS (0–0.4): Does the report cover all four tools\
      \ — Asana, Monday.com, Trello, and Notion?\n   Does it include specific pricing\
      \ figures for each tier (e.g., Asana Premium $10.99/user/month,\n   Monday.com\
      \ Standard $12/seat/month, Trello Standard $5/user/month, Notion Plus $8/user/month)?\n\
      \   Are free plan details mentioned for each product?\n\n2. ACCURACY (0–0.3):\
      \ Are the pricing figures and feature descriptions consistent with the fetched\
      \ page data?\n   For example: Asana Business at $24.99, Monday.com Pro at $19,\
      \ Trello Premium at $10, Notion Business at $15.\n   Penalize hallucinated or\
      \ incorrect figures.\n\n3. STRATEGIC VALUE (0–0.3): Does the report synthesize\
      \ findings into actionable insights for a new SaaS entrant?\n   Does it highlight\
      \ competitive positioning opportunities (e.g., free tier limits, automation\
      \ thresholds,\n   storage caps) that a new product could exploit? Is there a\
      \ clear summary or recommendation?\n\nScoring: 1.0 = all four tools covered\
      \ with accurate pricing and strategic insight; 0.7 = three tools covered accurately\
      \ with some strategic commentary; 0.4 = two tools covered or significant pricing\
      \ inaccuracies; 0.1 = minimal coverage or mostly incorrect data; 0.0 = no useful\
      \ output.\n"
    type: llm_judge
  name: report_quality
  weight: 0.4
