- check:
    rubric: "Evaluate the competitive pricing analysis on three dimensions:\n1. COMPLETENESS\
      \ (0–1): Does the output cover all three companies — Flowdesk, Orbitly, and\
      \ Stackmind — with their plan names, price points, and key features per tier?\n\
      \   - Flowdesk: Starter $19/user/mo, Professional $49/user/mo, Enterprise custom;\
      \ 14-day free trial; 20% annual discount\n   - Orbitly: Free Forever, Growth\
      \ $35/user/mo ($28 annual), Scale $75/user/mo ($60 annual), Enterprise; no paid\
      \ trial but Free Forever available\n   - Stackmind: Starter $29/mo, Builder\
      \ $89/mo, Scale $249/mo, Enterprise; credit-based model; 30-day trial on Builder;\
      \ credit rollover up to 3 months\n   Score 1.0 if all three are fully covered,\
      \ 0.6 if two are well covered, 0.3 if only one.\n\n2. ACCURACY (0–1): Are the\
      \ price points, plan names, and feature details correct and consistent with\
      \ the fetched page content? Penalize for invented or incorrect figures.\n  \
      \ Score 1.0 if all details are accurate, 0.5 if minor errors, 0.0 if major fabrications.\n\
      \n3. INSIGHT QUALITY (0–1): Does the output highlight meaningful competitive\
      \ differences, such as Stackmind's unique credit-based model vs. per-seat pricing,\
      \ Orbitly's Free Forever tier, Flowdesk's migration assistance, or storage/support\
      \ tier comparisons?\n   Score 1.0 for at least 2 well-articulated differentiators,\
      \ 0.5 for 1, 0.0 for none.\n\nFinal score = average of the three dimensions.\n"
    type: llm_judge
  name: pricing_summary_quality
  weight: 0.3
