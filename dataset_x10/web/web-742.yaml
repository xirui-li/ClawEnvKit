prompt: 'Our product team needs a competitive analysis of pricing pages from three
  rival SaaS companies we''ve been tracking: Flowdesk, Orbitly, and Stackmind. Fetch
  their pricing pages and compile a structured summary covering each company''s plan
  names, price points, key features per tier, and any notable promotional offers or
  free trial details. Highlight any significant differences or advantages compared
  to a typical mid-market SaaS offering.

  '
reference_solution:
- description: 'Use web_fetch to retrieve the pricing page for Flowdesk at https://www.flowdesk.io/pricing.
    Extract plan names (Starter, Professional, Enterprise), prices ($19, $49, custom),
    key features per tier, the 14-day free trial offer, and the 20% annual billing
    discount.

    '
  step: 1
- description: 'Use web_fetch to retrieve the pricing page for Orbitly at https://www.orbitly.com/pricing.
    Extract plan names (Free Forever, Growth, Scale, Enterprise), prices ($35/$28
    and $75/$60 monthly/annual), features, and note the absence of a paid free trial
    but presence of a Free Forever tier.

    '
  step: 2
- description: 'Use web_fetch to retrieve the pricing page for Stackmind at https://www.stackmind.ai/pricing.
    Extract plan names (Starter, Builder, Scale, Enterprise), flat monthly prices
    ($29, $89, $249), the AI credit-based model, 30-day free trial on Builder, and
    the credit rollover policy.

    '
  step: 3
- description: Compile a structured comparative report covering all three companies.
    Organize by company with plan names, price points, key features, and promotional
    details. Conclude with a comparative analysis highlighting Stackmind's unique
    credit model, Orbitly's Free Forever tier, and Flowdesk's migration assistance
    and annual discount as notable differentiators.
  step: 4
