- check:
    rubric: 'Evaluate the agent''s competitive pricing analysis across three dimensions:

      1. COMPLETENESS (0–0.4): Does the output cover all three competitors — Nexaflow,
      Orbitly, and Stackmind — with their specific pricing tiers and costs? Full credit
      requires all three covered with at least two tiers each and accurate prices
      (Nexaflow: $29/$79/custom; Orbitly: Free/$49/custom; Stackmind: $15/user/$35/user/custom).
      Partial credit if one competitor is missing or prices are vague.

      2. ACCURACY & DETAIL (0–0.4): Are key differentiators captured? This includes:
      Nexaflow''s 14-day free trial and 15% annual discount; Orbitly''s unlimited
      users on Pro and free Basic tier; Stackmind''s per-seat model, no free tier,
      minimum 3 seats, and 20% annual discount. Score 0.4 if at least 4 of these details
      appear, 0.2 if 2–3, 0.0 if fewer.

      3. USEFULNESS FOR BENCHMARKING (0–0.2): Is the summary structured and actionable
      for a product team? Does it highlight meaningful differences in pricing models
      (flat-rate vs. per-seat vs. freemium)? Does it draw any comparative insight
      or recommendation?

      Total score = sum of three dimension scores (max 1.0).

      '
    type: llm_judge
  name: competitive_analysis_quality
  weight: 0.35
