prompt: 'Our product team needs a competitive analysis of pricing pages from three
  rival SaaS companies we''ve been tracking: Nexaflow, Orbitly, and Stackmind. Search
  for their pricing pages and fetch the content from each, then summarize the key
  pricing tiers, costs, and notable features or limitations for each competitor so
  we can benchmark our own plans.

  '
reference_solution: "1. Use web_search to find pricing pages for Nexaflow, Orbitly,\
  \ and Stackmind (e.g., query\n   \"Nexaflow pricing\", \"Orbitly pricing\", \"Stackmind\
  \ pricing\").\n2. Identify the pricing page URLs from search results:\n   https://www.nexaflow.io/pricing,\
  \ https://www.orbitly.com/pricing,\n   https://www.stackmind.dev/pricing.\n3. Use\
  \ web_fetch on each of the three pricing URLs to retrieve full page content. 4.\
  \ Parse and summarize each competitor's tiers, prices, user limits, key features,\
  \ and\n   discounts from the fetched content.\n5. Present a structured comparison\
  \ covering: Nexaflow (Starter $29, Growth $79, Enterprise\n   custom; 14-day trial;\
  \ 15% annual discount), Orbitly (Basic free, Pro $49 unlimited users,\n   Enterprise\
  \ custom; 20% annual discount), and Stackmind ($15/user Team, $35/user Business,\n\
  \   Enterprise custom; no free tier; 20% annual discount; min 3 seats).\n6. Highlight\
  \ the key model differences: Nexaflow and Orbitly use flat-rate pricing while\n\
  \   Stackmind uses per-seat pricing; only Orbitly has a permanent free tier."
