tools:
- description: Search the web for pages matching a query. Returns a list of results
    with URLs, titles, and snippets.
  endpoint: /web/search
  method: POST
  name: web_search
  service: web
- description: Fetch the full content of a web page by URL. Returns the page title
    and content.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web
- description: Send a notification with a message to specified recipients via a channel.
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web
