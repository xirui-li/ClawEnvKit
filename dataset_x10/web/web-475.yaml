- check:
    rubric: "Evaluate the agent's competitive pricing report on these dimensions:\n\
      1. COVERAGE (0–0.4): Does the report cover all three companies — Nexaflow, Orbitly,\n\
      \   and Stackwise — with their specific plan names and prices?\n   Full credit\
      \ if all three are covered with accurate prices (Nexaflow: $19/$79/custom;\n\
      \   Orbitly: $0/$49/$149/custom; Stackwise: $9/$39-seat/$29-seat/custom).\n\
      \   Partial credit if one or two companies are missing or prices are vague.\n\
      \n2. ACCURACY (0–0.3): Are the plan details correct and specific?\n   Check\
      \ for accurate user limits, storage tiers, support levels, and notable features\n\
      \   (e.g., Stackwise's per-seat model, Orbitly's 30-day trial vs Nexaflow's\
      \ 14-day trial,\n   Stackwise's developer/CI-CD focus). Deduct for factual errors\
      \ or invented details.\n\n3. COMPARATIVE INSIGHT (0–0.3): Does the agent identify\
      \ meaningful patterns or differences\n   across the three companies? Examples:\
      \ Stackwise uses per-seat pricing unlike the others;\n   Orbitly offers a free\
      \ forever tier; Nexaflow and Orbitly offer flat per-month pricing;\n   trial\
      \ lengths differ (14 vs 30 days); Stackwise targets developers while others\
      \ are\n   broader SaaS tools. Award full credit for at least 2 concrete, accurate\
      \ observations.\n\nScore 1.0 for excellent coverage + accuracy + insight. Score\
      \ 0.5 for adequate but incomplete or missing comparative analysis. Score 0.0\
      \ for missing most companies or fabricated data.\n"
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.35
- check:
    rubric: 'Is the report well-structured and useful for a product team benchmarking
      exercise? Evaluate: (1) Is information organized clearly by company and plan
      tier? (2) Are prices and key differentiators easy to scan? (3) Is the tone professional
      and the summary actionable (e.g., highlights what competitors do better or differently)?
      Score 1.0 for a clearly structured, scannable, professional report. Score 0.5
      for a report that has the right content but is disorganized or hard to parse.
      Score 0.0 for a wall of unstructured text or missing structure entirely.

      '
    type: llm_judge
  name: structured_and_actionable_output
  weight: 0.15
