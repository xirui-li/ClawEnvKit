prompt: 'Our product team needs a competitive analysis of pricing pages from three
  rival SaaS companies we''ve been tracking: Nexaflow, Orbitly, and Stackwise. Fetch
  their pricing pages and compile a structured summary of each company''s plans, prices,
  and standout features so we can benchmark our own offering. Include any notable
  differences or patterns you observe across the three.

  '
reference_solution: "1. Fetch the pricing page for Nexaflow at https://www.nexaflow.io/pricing\
  \ to retrieve\n   plan names (Starter, Growth, Enterprise), prices ($19, $79, custom),\
  \ user limits,\n   storage, and support details.\n2. Fetch the pricing page for\
  \ Orbitly at https://www.orbitly.com/pricing to retrieve\n   plan names (Free, Pro,\
  \ Business, Enterprise), prices ($0, $49, $149, custom),\n   trial length (30 days),\
  \ and notable features like white-label and on-premise options.\n3. Fetch the pricing\
  \ page for Stackwise at https://www.stackwise.dev/pricing to retrieve\n   plan names\
  \ (Indie, Team, Scale, Enterprise), per-seat pricing model ($9 flat, $39/seat,\n\
  \   $29/seat), and developer-focused features like CI/CD pipelines and compliance\
  \ reports.\n4. Compile a structured report organized by company, listing each plan\
  \ tier with price,\n   user/storage limits, support level, and standout features.\n\
  5. Add a comparative observations section noting key patterns: Stackwise's per-seat\
  \ model\n   vs flat pricing elsewhere; Orbitly's free forever tier; differing trial\
  \ lengths;\n   Stackwise's developer focus vs broader SaaS positioning of Nexaflow\
  \ and Orbitly.\n6. Present the final report as clean, scannable text suitable for\
  \ a product team review."
