prompt: 'Our market intelligence team has been tracking a competitor called "NovaTech
  Solutions" and their upcoming product launch. Search for the latest information
  about NovaTech Solutions'' new product announcement, fetch the most relevant page
  for details, and then send a notification to the "market-intel" Slack channel alerting
  the product team (recipients: product-team@company.com) with a concise summary of
  what you found. Include the product name, key features, and launch date in your
  notification message.

  '
reference_solution: '1. Use web_fetch to retrieve the NovaTech Solutions Prism AI
  product page (https://www.novatechsolutions.com/products/prism-ai) or the TechCrunch
  article directly, since the task provides enough context to identify the most relevant
  URL from search results. 2. Review the fetched page content to extract: product
  name (Prism AI), key features (real-time pipelines, NLP querying, automated reporting,
  CRM integration, AI dashboards), launch date (April 10, 2024), and pricing ($499/month).
  3. Use web_notify to send a notification to channel "market-intel" with recipients
  ["product-team@company.com"] and a concise message summarizing the competitor product
  launch, including product name, key features, and launch date. 4. Report back to
  the user confirming the notification was sent and summarizing the key intelligence
  gathered about NovaTech Solutions'' Prism AI launch.'
