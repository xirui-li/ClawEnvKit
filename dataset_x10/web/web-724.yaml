- check:
    rubric: "Evaluate the agent's notification message and overall output on three\
      \ dimensions:\n1. COMPLETENESS (0–1): Does the notification message include\
      \ all three required elements?\n   - Product name: \"Prism AI\" must be explicitly\
      \ named.\n   - Key features: At least two of the following must be mentioned:\
      \ real-time data pipelines, NLP/natural language querying, automated reporting,\
      \ CRM integration, AI-driven dashboards.\n   - Launch date: \"April 10, 2024\"\
      \ (or \"April 10\") must be stated.\n   Score 1.0 if all three present, 0.6\
      \ if two present, 0.3 if only one, 0.0 if none.\n\n2. ACCURACY (0–1): Are the\
      \ facts correct per the fixture data?\n   - Pricing should be $499/month (Professional\
      \ tier).\n   - Company is NovaTech Solutions, not a different name.\n   - Launch\
      \ date is April 10, 2024, not a different date.\n   Score 1.0 if all facts accurate,\
      \ deduct 0.3 per factual error.\n\n3. ACTIONABILITY & CLARITY (0–1): Is the\
      \ notification message concise, professional, and useful for the product team?\n\
      \   - Should read like a real Slack alert, not a raw data dump.\n   - Should\
      \ give the product team enough context to act (e.g., attend webinar, assess\
      \ competitive threat).\n   Score 1.0 if clear and actionable, 0.5 if somewhat\
      \ useful but verbose or unclear, 0.0 if confusing or missing context.\n\nFinal\
      \ score = average of the three dimension scores.\n"
    type: llm_judge
  name: notification_quality_and_completeness
  weight: 0.35
