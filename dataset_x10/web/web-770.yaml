  name: promotions_captured
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s competitive pricing analysis on three dimensions:

      1. COMPLETENESS (0–0.4): Does the output cover all three companies — Flowdesk,
      NimbusHR, and ClearMetrics — with their specific pricing tiers and prices? Full
      credit requires: Flowdesk (Starter $0, Growth $49/user/mo, Business $129/user/mo,
      Enterprise custom), NimbusHR (Essential $8/employee/mo, Professional $18/employee/mo,
      Premium $32/employee/mo), ClearMetrics (Free Forever $0, Pro $39/mo annual,
      Team $99/mo, Scale $299/mo). Deduct proportionally for missing tiers or companies.

      2. PROMOTIONAL ACCURACY (0–0.3): Does the output correctly identify promotional
      offers? Must include: Flowdesk''s "3 months free on annual Growth plan before
      June 30", NimbusHR''s 30-day free trial and 15% annual discount, ClearMetrics''
      7-day Pro trial and competitor-switch offer (2 months free). Score 0.3 if all
      four are mentioned, 0.15 if two or three, 0.0 if none.

      3. STRATEGIC USEFULNESS (0–0.3): Is the output structured as a useful comparison
      for a product team making pricing decisions? Does it highlight differentiators
      (per-user vs per-employee vs per-workspace pricing models), notable enterprise
      features (SSO, SLA, API access), and draw any comparative insights? Score 0.3
      for a well-structured, insight-rich comparison; 0.15 for a plain list with no
      synthesis; 0.0 for disorganized or incomplete output.

      Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: competitive_analysis_quality
  weight: 0.3
