prompt: 'Our product team needs a competitive analysis of pricing pages from three
  rival SaaS companies we''ve been tracking: Flowdesk, NimbusHR, and ClearMetrics.
  Fetch their pricing pages and summarize the key pricing tiers, notable features
  at each tier, and any promotional offers or free trial information you find. Present
  your findings as a structured comparison that the team can use to inform our own
  pricing strategy.

  '
reference_solution: '1. Fetch the Flowdesk pricing page at https://www.flowdesk.io/pricing
  to retrieve tier names, prices, features, and the current June 30 promotion (3 months
  free on annual Growth). 2. Fetch the NimbusHR pricing page at https://www.nimbushr.com/plans
  to retrieve per-employee pricing for Essential ($8), Professional ($18), and Premium
  ($32), plus the 30-day free trial and 15% annual discount. 3. Fetch the ClearMetrics
  pricing page at https://www.clearmetrics.app/pricing to retrieve Free Forever, Pro
  ($39/mo annual), Team ($99/mo), and Scale ($299/mo) tiers, plus the competitor-switch
  offer. 4. Synthesize the fetched content into a structured comparison table or report
  covering: pricing model type (per-user, per-employee, per-workspace), tier names
  and prices, key features per tier, free trial availability, promotional offers,
  and enterprise options. 5. Present the analysis as a clear, actionable summary for
  the product team — noting differences in pricing models and highlighting competitive
  positioning opportunities.'
