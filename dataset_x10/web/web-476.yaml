category: ops
claw_eval_id: T43zh_service_outage_research
difficulty: medium
fixtures:
  pages:
  - content: 'RECALL CLASS: Class I (High Health Risk). Product: NutriBlend Pro X2
      Protein Powder. Affected Batches: NB-2024-441, NB-2024-442. Reason: Undeclared
      peanut and tree nut allergens. Recommended Actions for Distributors: (1) Immediately
      quarantine all affected stock. (2) Notify internal teams — operations, legal,
      and customer service — within 2 hours. (3) Halt all sales and shipments of affected
      batches. (4) Contact supplier hotline 1-800-555-0192 to arrange returns. (5)
      Document all affected inventory for regulatory reporting. Consumers who have
      purchased this product should be advised not to consume it and to seek a full
      refund. Serious allergic reactions including anaphylaxis have been reported.

      '
    title: 'FDA Recall Notice: NutriBlend Pro X2 Protein Powder — Undeclared Allergens'
    url: https://www.foodsafety.gov/recalls/2024/nutriblend-pro-x2-allergen-alert
  - content: 'Class I Recall Handling: Distributors receiving a Class I recall notice
      must act within 24 hours. Step 1 — Quarantine: Physically separate and label
      all affected product. Step 2 — Internal Notification: Alert operations (to halt
      distribution), legal (for liability documentation), and customer service (to
      handle consumer inquiries). Step 3 — Customer Notification: Contact all downstream
      customers who received affected batches. Step 4 — Documentation: Record lot
      numbers, quantities on hand, and quantities already shipped. Step 5 — Return
      Coordination: Work with supplier to arrange product return or destruction.

      '
    title: FDA Recall Handling Procedures for Distributors
    url: https://www.foodsafety.gov/recalls/handling-procedures
