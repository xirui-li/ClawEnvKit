difficulty: medium
fixtures:
  pages:
  - content: 'FOOD SAFETY ALERT — November 12, 2024


      NutriSource Foods has issued a voluntary recall of its Organic Almond Butter
      500g jars under SKU-7741.

      Affected batch codes: B2024-1103 through B2024-1109 (production dates November
      3–9, 2024).


      Reason for Recall: Routine microbiological testing identified possible Salmonella
      contamination in samples from the affected batches. No illnesses have been reported
      to date.


      Distribution: Approximately 14,200 units shipped to retail partners across 12
      states.


      Recommended Actions for Retailers:

      1. Immediately quarantine all units matching the above SKU and batch codes.

      2. Do not sell or distribute affected product.

      3. Log all quarantined inventory with batch codes and unit counts.

      4. Submit a return authorization request at nutrisourcefoods.com/recall-return.

      5. Process customer refunds without requiring a receipt.


      Consumer Hotline: 1-800-555-0192 (Mon–Fri, 8am–6pm EST)

      Retailer Contact: recalls@nutrisourcefoods.com

      '
    title: 'Voluntary Recall: Organic Almond Butter SKU-7741 — Possible Salmonella
      Contamination'
    url: https://www.foodsafetyalerts.org/recalls/2024/almond-butter-sku7741
  - content: 'FDA Safety Alert — November 12, 2024


      Product: NutriSource Organic Almond Butter, 500g jars, SKU-7741

      Batch Codes: B2024-1103 through B2024-1109

      Hazard: Potential Salmonella contamination

      Units Affected: ~14,200

      Distribution Area: 12 states (AL, CA, CO, FL, GA, IL, NY, NC, OH, TX, VA, WA)


      The FDA is working with NutriSource Foods to ensure all affected product is
      removed from commerce. Retailers should quarantine stock immediately and not
      wait for return authorization before pulling product from shelves.


      Regulatory Status: Voluntary recall, Class II (remote probability of adverse
      health consequences).

      '
    title: 'FDA Safety Alert: NutriSource Organic Almond Butter Recall'
    url: https://www.fda.gov/safety/recalls-market-withdrawals-safety-alerts/nutrisource-almond-butter-recall-2024
  - content: 'Dear Retail Partner,


      NutriSource Foods is issuing this voluntary recall notice for SKU-7741 Organic
      Almond Butter (500g).


      Affected Batches: B2024-1103, B2024-1104, B2024-1105, B2024-1106, B2024-1107,
      B2024-1108, B2024-1109


      Action Required:

      - Quarantine all affected units immediately.

      - Do not sell or transfer affected product.

      - Complete the return form at nutrisourcefoods.com/recall-return within 5 business
      days.

      - For inventory logging assistance, email recalls@nutrisourcefoods.com.


      Customer Refunds: Honor refunds without receipt for this SKU.

      Consumer Hotline: 1-800-555-0192


      We apologize for any inconvenience and appreciate your prompt cooperation.


      — NutriSource Foods Quality & Safety Team

      '
    title: NutriSource Foods Official Recall Notice — November 2024
    url: https://www.nutrisourcefoods.com/recall-notice-nov2024
