tools:
- description: Search the web for information using a query string. Returns a list
    of relevant results with titles, URLs, and snippets.
  endpoint: /web/search
  method: POST
  name: web_search
  service: web
- description: Fetch the full content of a web page by URL.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web
- description: Send a notification to a specified channel with a message and list
    of recipients.
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web
