    service: web
    type: audit_action_exists
  name: used_web_fetch
  weight: 0.1
- check:
    keywords:
    - TaskFlow
    - PlanBoard
    - SprintDesk
    - NexusPM
    - CollabTask
    threshold: 0.8
    type: keywords_present
  name: key_competitors_mentioned
  weight: 0.15
- check:
    keywords:
    - $7
    - $8
    - $9
    - $10
    - $12
    - $15
    - $18
    - $20
    threshold: 0.6
    type: keywords_present
  name: pricing_figures_present
  weight: 0.15
- check:
    keywords:
    - free plan
    - free forever
    - free tier
    - free trial
    threshold: 0.5
    type: keywords_present
  name: free_plan_coverage
  weight: 0.1
- check:
    rubric: "Evaluate the agent's competitive pricing analysis report on the following\
      \ dimensions:\n1. COVERAGE (0–0.3): Does the report cover all five competitors\
      \ found in the search results —\n   TaskFlow, PlanBoard, SprintDesk, NexusPM,\
      \ and CollabTask? Award 0.3 if all five are covered\n   with pricing details,\
      \ 0.2 if four are covered, 0.1 if three, 0.0 if fewer than three.\n\n2. ACCURACY\
      \ (0–0.3): Are the pricing figures accurate per the fetched page content?\n\
      \   Key facts to verify: TaskFlow Pro at $12/user/month, PlanBoard Growth at\
      \ $9/user/month (annual),\n   SprintDesk Starter at $8/user/month, NexusPM Professional\
      \ at $20/user/month,\n   CollabTask Premium at $7/user/month. Award 0.3 if 4–5\
      \ figures are correct, 0.2 if 2–3, 0.1 if 1.\n\n3. FREE PLAN ANALYSIS (0–0.2):\
      \ Does the report correctly identify which tools have a free plan\n   (TaskFlow\
      \ Free, PlanBoard Free Tier, CollabTask Free Forever) vs. only a free trial\n\
      \   (SprintDesk, NexusPM)? Award 0.2 if distinction is clearly made, 0.1 if\
      \ partially addressed.\n\n4. STRATEGIC USEFULNESS (0–0.2): Does the report synthesize\
      \ findings into actionable insights\n   for a startup benchmarking its own pricing\
      \ — e.g., noting the $7–$12 range for mid-tier plans,\n   the prevalence of\
      \ per-user monthly pricing, or the competitive advantage of a free forever plan?\n\
      \   Award 0.2 for clear strategic takeaways, 0.1 for partial, 0.0 for none.\n\
      \nFinal score = sum of dimension scores (max 1.0).\n"
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.4
