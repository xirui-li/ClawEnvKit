- check:
    rubric: "Evaluate the agent's competitive pricing report on the following dimensions:\n\
      1. COVERAGE (0–0.3): Does the report cover all four competitors — Asana, Monday.com,\
      \ ClickUp, and Notion?\n   Full credit if all four are addressed with pricing\
      \ tiers. Partial if 2–3 covered. Zero if fewer than 2.\n\n2. ACCURACY OF PRICING\
      \ DATA (0–0.3): Are specific pricing figures correctly reported?\n   Look for:\
      \ Asana Premium $10.99/user/month, ClickUp Business $12/member/month (post-August\
      \ 2024 drop),\n   Monday.com Basic $9/seat/month, Notion Plus $10/user/month.\
      \ Full credit for 3+ correct figures.\n\n3. RECENT CHANGES & INSIGHTS (0–0.2):\
      \ Does the report mention notable recent developments?\n   Look for: ClickUp's\
      \ 37% price reduction in August 2024, Monday.com's 30% annual discount through\
      \ December 2024,\n   Asana's Enterprise+ launch with AI Studio, or Notion bundling\
      \ AI. Full credit for 2+ developments mentioned.\n\n4. STRUCTURE & USABILITY\
      \ (0–0.2): Is the report well-organized and suitable for a board meeting?\n\
      \   Full credit if it uses clear sections, headers, or a comparison format.\
      \ Partial if readable but unstructured.\n   Zero if it is a disorganized wall\
      \ of text.\n\nScoring: Sum the four dimension scores. 0.9–1.0 = excellent, 0.7–0.89\
      \ = good, 0.5–0.69 = adequate, below 0.5 = poor.\n"
    type: llm_judge
