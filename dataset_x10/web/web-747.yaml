scoring_components:
- check:
    action: web_search
    service: web
    type: audit_action_exists
  name: used_web_search
  weight: 0.08
- check:
    action: web_fetch
    service: web
    type: audit_action_exists
  name: used_web_fetch
  weight: 0.12
- check:
    keywords:
    - TaskFlow Pro
    - OrbitPM
    - NexusWork
    - SprintDesk
    - ClarityPM
    type: keywords_present
  name: competitor_names_present
  weight: 0.12
- check:
    keywords:
    - $9
    - $29
    - $15
    - $45
    - $99
    - $249
    - $12
    - $22
    - $18
    - $2,500
    type: keywords_present
  name: pricing_figures_present
  weight: 0.13
- check:
    rubric: 'Does the agent''s output correctly identify and contrast the different
      pricing models used by competitors? Specifically: (1) TaskFlow Pro and OrbitPM,
      SprintDesk, and ClarityPM use per-user/month pricing, while (2) NexusWork uses
      a flat-rate model ($99/$249/$599/month regardless of user count). Score 1.0
      if both the per-user and flat-rate distinction is clearly explained with correct
      figures. Score 0.6 if the flat-rate model is mentioned but not clearly contrasted.
      Score 0.3 if pricing figures are listed but no model distinction is made. Score
      0.0 if the output is missing or incorrect.

      '
    type: llm_judge
  name: pricing_models_identified
  weight: 0.15
- check:
    rubric: 'Evaluate how completely and accurately the agent summarizes pricing tiers
      and notable features for all five competitors: TaskFlow Pro (Starter $9, Business
      $29, Enterprise custom), OrbitPM (Free, Pro $15, Scale $45), NexusWork (Starter
      $99, Growth $249, Unlimited $599), SprintDesk (Standard $12, Premium $22), ClarityPM
      (Team $18, Enterprise $2,500/month). Score 1.0 if all five competitors are covered
      with correct tier names, prices, and at least one distinguishing feature each.
      Score 0.7 if four competitors are fully covered or all five are covered but
      features are sparse. Score 0.4 if only two or three competitors are adequately
      covered. Score 0.1 if coverage is superficial or mostly missing.

      '
    type: llm_judge
  name: tier_details_completeness
  weight: 0.25
- check:
    rubric: 'Does the agent''s output provide actionable benchmarking insights beyond
      just listing prices? For example: identifying the lowest entry price point (TaskFlow
      Pro at $9/user/month), the only flat-rate option (NexusWork), the most enterprise-focused
      option (ClarityPM at $2,500/month), or noting free trial lengths (14-day, 21-day,
      30-day) and annual discount ranges (15-20%). Score 1.0 if the output includes
      at least three strategic observations that would help a product team set pricing.
      Score 0.5 if one or two useful observations are made. Score 0.0 if the output
      is purely a data dump with no synthesis or strategic framing.

      '
    type: llm_judge
  name: strategic_benchmarking_value
  weight: 0.15
