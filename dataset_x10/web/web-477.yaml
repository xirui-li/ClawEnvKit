- check:
    rubric: 'Evaluate the quality and completeness of the competitive pricing comparison
      the agent produced. Score on these dimensions: 1. Coverage (0–0.4): Does the
      output cover all three competitors — Notion ($10/$18/user/month), Airtable ($20/$45/user/month),
      and ClickUp ($7/$12/user/month)? Award 0.4 if all three are covered with correct
      pricing tiers, 0.2 if two are covered, 0.0 if only one or none. 2. Accuracy
      (0–0.3): Are the pricing figures and AI bundling details accurate? Notion AI
      is included in Plus/Business; Airtable AI is in Business ($45); ClickUp Brain
      is a $7/user/month add-on. Award 0.3 if all three AI details are correct, 0.15
      if two are correct, 0.0 if none. 3. Strategic Usefulness (0–0.3): Does the output
      synthesize findings into actionable insights for a pricing strategy team — e.g.,
      noting ClickUp''s low entry price, Airtable''s steep scaling cost, or the 2024
      AI bundling trend? Award 0.3 for clear strategic framing, 0.15 for partial insights,
      0.0 for raw data dump with no synthesis. Final score = sum of dimension scores
      (max 1.0).

      '
    type: llm_judge
  name: comparison_quality
  weight: 0.25
- check:
    rubric: 'Evaluate whether the agent''s output is well-structured and easy for
      a product team to consume. Score on these dimensions: 1. Organization (0–0.5):
      Is the output organized by competitor (Notion, Airtable, ClickUp) with clear
      sections or headers? Award 0.5 if clearly structured with distinct sections
      per competitor, 0.25 if partially organized, 0.0 if unstructured prose. 2. Completeness
      of required elements (0–0.5): Does each competitor section include (a) pricing
      tiers, (b) standout features, and (c) recent changes or promotions (e.g., Notion
      AI bundling in Q1 2024, Airtable AI added to Business, ClickUp Brain add-on)?
      Award 0.5 if all three elements are present for all three competitors, 0.25
      if present for at least two competitors, 0.0 if mostly missing. Final score
      = sum of dimension scores (max 1.0).

      '
    type: llm_judge
  name: structured_presentation
  weight: 0.2
