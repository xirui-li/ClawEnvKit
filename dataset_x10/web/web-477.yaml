prompt: 'Our product team is preparing a pricing strategy review for our B2B SaaS
  platform and needs a competitive landscape summary. Search for information about
  the pricing models and key features of the following competitors: Notion, Airtable,
  and ClickUp. For each competitor, summarize their pricing tiers, standout features,
  and any recent changes or promotions mentioned online. Present your findings in
  a structured comparison that the team can use to inform our strategy.

  '
reference_solution:
- Search for "Notion pricing 2024" to retrieve the Notion pricing search result and
  snippet.
- Search for "Airtable pricing 2024" to retrieve the Airtable pricing search result
  and snippet.
- Search for "ClickUp pricing 2024" to retrieve the ClickUp pricing search result
  and snippet.
- Optionally fetch the full page content from https://www.notion.so/pricing, https://www.airtable.com/pricing,
  and https://clickup.com/pricing for detailed tier information.
- Optionally search for "SaaS pricing trends 2024 AI bundling" to surface the TechCrunch
  article about AI bundling trends.
- Synthesize findings into a structured comparison covering: Notion (Free, Plus $10,
    Business $18, Enterprise; AI bundled in paid plans since Q1 2024), Airtable (Free,
    Team $20, Business $45, Enterprise Scale; AI in Business tier), ClickUp (Free,
    Unlimited $7, Business $12, Enterprise; ClickUp Brain AI add-on $7/user/month).
- Highlight strategic insights such as ClickUp's low entry price point, Airtable's
  steep per-seat cost at scale, and the industry trend of AI bundling vs. add-on pricing.
- Present the output as a structured competitive landscape summary with sections per
  competitor and a brief strategic synthesis — no files, text output only.
