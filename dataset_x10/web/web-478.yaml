fixtures:
  pages:
  - content: 'Stackify Pricing Plans (as of 2024):

      Developer Plan – $99/month - Up to 5 hosts - APM with code profiling - Error
      tracking (Retrace) - 7-day log retention - Email support

      Team Plan – $249/month - Up to 15 hosts - Everything in Developer - Custom dashboards
      - 30-day log retention - Slack & PagerDuty integrations - Priority email support

      Enterprise Plan – Custom pricing - Unlimited hosts - Everything in Team - SSO
      / SAML - Dedicated account manager - SLA guarantees - 90-day log retention -
      Custom integrations

      All plans include a 14-day free trial. Annual billing saves 20%.

      '
    title: Stackify Pricing
    url: https://stackify.com/pricing
  - content: 'Loggly Pricing (2024):

      Lite – Free - 200 MB/day log volume - 7-day retention - Basic search - Community
      support

      Standard – $79/month (billed annually) - 1 GB/day log volume - 15-day retention
      - Alerts & anomaly detection - Email support - Up to 5 users

      Pro – $199/month (billed annually) - 3 GB/day log volume - 30-day retention
      - Advanced analytics & dashboards - Slack, PagerDuty, and webhook integrations
      - Up to 25 users - Priority support

      Enterprise – Custom pricing - Unlimited log volume - 90-day retention - Dedicated
      infrastructure - SSO / SAML - Custom SLAs - Unlimited users

      Note: Loggly is a SolarWinds product. Volume add-ons available at $0.50/GB.

      '
    title: Loggly Plans and Pricing
    url: https://www.loggly.com/plans-and-pricing/
  - content: 'Datadog Pricing (2024) – Modular, per-product billing:

      Infrastructure Monitoring - Free: Up to 5 hosts, 1-day metric retention - Pro:
      $15/host/month – 15-month metric retention, 500+ integrations, dashboards -
      Enterprise: $23/host/month – Custom retention, RBAC, audit trail

      APM & Distributed Tracing - Free: 1 host, limited traces - Pro: $31/host/month
      – Full distributed tracing, flame graphs, service maps - Enterprise: $40/host/month
      – Adds Watchdog AI anomaly detection

      Log Management - Ingestion: $0.10/GB ingested - Indexing: $1.70/million log
      events (15-day retention) - Rehydration from archive: $0.05/GB

      Key differentiators: - Pay-per-product model (mix and match) - 450+ out-of-the-box
      integrations - Unified platform: metrics, traces, logs in one UI - Annual commitment
      discounts available - 14-day free trial on all paid plans

      '
