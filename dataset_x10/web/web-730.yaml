fixtures:
  pages:
  - content: 'The triple conjunction of Jupiter, Saturn, and Mars on June 14, 2025
      is a once-in-a-generation event. The three planets will appear within a 5-degree
      field of view, peaking at 4:32 AM local time. The optimal viewing window runs
      from 4:00 AM to 5:15 AM.

      For general observers: Find a location with a clear eastern horizon and minimal
      light pollution. Binoculars (7x50 or 10x50) will show all three planets simultaneously.
      A 4-inch or larger telescope will reveal Jupiter''s Galilean moons and Saturn''s
      rings.

      For astrophotographers: Use a wide-angle lens (24mm–35mm) at f/2.8 or wider.
      Set ISO between 1600 and 3200. Exposure times of 10–20 seconds will capture
      the planets without star trails. A tracking mount is recommended for longer
      exposures. Shoot in RAW format for best post-processing results.

      Weather permitting, this event is visible from all latitudes between 60°N and
      60°S. The next comparable triple conjunction will not occur until 2065.

      '
    title: 'NASA: Triple Conjunction June 2025 — Official Observation Guide'
    url: https://nasa.gov/solar-system/triple-conjunction-june-2025
  - content: 'On June 14, 2025, Jupiter, Saturn, and Mars will gather in a stunning
      pre-dawn display. Here is everything you need to know to make the most of this
      rare event.

      Timing: The conjunction peaks at 4:32 AM local time. Head out by 4:00 AM to
      allow your eyes to adjust to the darkness. The planets will remain close together
      until about 5:15 AM when twilight begins to wash them out.

      Location tips: Choose a spot away from streetlights and buildings. A hilltop
      or open field facing east is ideal. Check your local weather forecast — even
      thin clouds can obscure the view.

      Equipment: No telescope is required, but binoculars dramatically improve the
      experience. If you have a telescope, start with low magnification to frame all
      three planets, then zoom in on each individually.

      Photography tips: A DSLR or mirrorless camera on a tripod works well. Use a
      remote shutter release to avoid camera shake. Bracket your exposures to find
      the best settings for your specific sky conditions.

      '
    title: How to Watch the 2025 Triple Planetary Conjunction
    url: https://earthsky.org/astronomy-essentials/triple-conjunction-viewing-guide
