      \ fetched pages?\n   Key facts to verify: TaskFlow Pro Starter=$9, Business=$29;\
      \ Orbit PM Growth=$19, Scale=$49;\n   NexusWork Basic=$12, Professional=$35,\
      \ Enterprise=$75 plus $199 onboarding fee;\n   SprintDesk Team=$15, Agency=$40.\n\
      \   Score 0.3 if all major figures are accurate, 0.15 if minor errors, 0.0 if\
      \ significantly wrong.\n\n3. INSIGHT & STRATEGY (0–0.25): Does the report highlight\
      \ meaningful strategic observations?\n   Examples: NexusWork's hidden $199 onboarding\
      \ fee, seat minimums, annual discount ranges (15–25%),\n   free tier availability\
      \ (Orbit PM, SprintDesk), enterprise pricing opacity, or the SaaS Insider\n\
      \   blog's recommendation for mid-tier plans for 10–50 user teams.\n   Score\
      \ 0.25 if at least 3 strategic insights are noted, 0.15 if 1–2, 0.0 if none.\n\
      \n4. STRUCTURE & CLARITY (0–0.15): Is the report well-organized and easy to\
      \ read?\n   Score 0.15 if clearly structured (e.g., per-competitor sections,\
      \ summary table, or comparison),\n   0.08 if somewhat organized, 0.0 if unstructured\
      \ wall of text.\n\nSum the four dimension scores for a final score between 0.0\
      \ and 1.0.\n"
