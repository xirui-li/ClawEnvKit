- check:
    rubric: "Evaluate the quality and completeness of the compliance notification\
      \ the agent composed and sent to the legal team. Score on these dimensions:\n\
      1. ACCURACY (0–0.3): Does the notification accurately reflect EU AI Act requirements\n\
      \   found in the fixture data? It should mention: risk classification deadline\
      \ (Q1 2025 /\n   March 31 2025), conformity assessments for high-risk systems,\
      \ EUAIDB registration,\n   incident reporting within 15 business days, and penalties\
      \ (€30M or 6% turnover).\n   Award 0.3 if 4+ facts are accurate, 0.2 if 2-3,\
      \ 0.1 if 1, 0.0 if none.\n\n2. COMPLETENESS (0–0.3): Does the notification cover\
      \ the most actionable items the\n   legal team needs to act on immediately?\
      \ Should include at minimum: risk classification\n   requirement, registration\
      \ deadline, and penalty exposure. Award 0.3 if all three\n   present, 0.2 if\
      \ two, 0.1 if one, 0.0 if none.\n\n3. RECIPIENTS (0–0.2): Were all three recipients\
      \ correctly included — Elena Vasquez,\n   Marcus Okonkwo, and Priya Nair? Award\
      \ 0.2 if all three, 0.1 if two, 0.0 if fewer.\n\n4. CLARITY AND PROFESSIONALISM\
      \ (0–0.2): Is the notification clearly written, well\n   structured, and appropriate\
      \ for a legal compliance audience? Award 0.2 for excellent\n   clarity with\
      \ urgency conveyed, 0.1 for adequate but unstructured, 0.0 for unclear.\n\n\
      Final score = sum of dimension scores (max 1.0).\n"
