fixtures:
  pages:
  - content: "EU AI ACT — ENTERPRISE COMPLIANCE REQUIREMENTS (Updated November 2024)\n\
      Key obligations for enterprise software companies:\n1. RISK CLASSIFICATION:\
      \ All AI systems must be classified under the four-tier risk framework\n   by\
      \ March 31, 2025. High-risk systems include those used in HR, credit scoring,\
      \ and\n   critical infrastructure management.\n\n2. CONFORMITY ASSESSMENT: High-risk\
      \ AI systems require third-party conformity assessments\n   before market placement.\
      \ Internal assessments permitted only for limited categories.\n\n3. TECHNICAL\
      \ DOCUMENTATION: Mandatory technical documentation must be maintained and\n\
      \   available to national authorities upon request. Includes training data descriptions,\n\
      \   model architecture, and performance metrics.\n\n4. EU DATABASE REGISTRATION:\
      \ High-risk AI systems must be registered in the EU AI\n   database (EUAIDB)\
      \ before deployment. Registration portal opens January 2025.\n\n5. HUMAN OVERSIGHT:\
      \ Enterprises must implement human oversight mechanisms allowing\n   operators\
      \ to intervene, override, or shut down AI systems.\n\n6. INCIDENT REPORTING:\
      \ Serious incidents must be reported to national authorities\n   within 15 business\
      \ days of discovery.\n\nPENALTIES: Non-compliance penalties up to €30,000,000\
      \ or 6% of total worldwide annual turnover, whichever is higher.\nTIMELINE:\
      \ Phased implementation — prohibited AI systems banned by February 2025, high-risk\
      \ obligations fully applicable by August 2026.\n"
    title: 'EU AI Act: Enterprise Compliance Requirements 2024 — Official EUR-Lex'
    url: https://eur-lex.europa.eu/ai-act/compliance-2024
  - content: 'EUROPEAN COMMISSION AI REGULATORY FRAMEWORK

      The EU AI Act establishes a risk-based approach to AI regulation across four
      tiers:

      TIER 1 — UNACCEPTABLE RISK (Banned): Social scoring by governments, real-time
      biometric surveillance in public spaces, manipulation of vulnerable groups.

      TIER 2 — HIGH RISK (Regulated): AI in employment decisions, education, essential
      services, law enforcement, migration, and administration of justice. Full compliance
      obligations apply.

      TIER 3 — LIMITED RISK (Transparency): Chatbots and emotion recognition systems
      must disclose AI nature to users. Lighter obligations.

      TIER 4 — MINIMAL RISK (Voluntary): Most AI applications fall here. Voluntary
      codes of conduct encouraged.

      Enterprise deployment guidance updated November 2024 emphasizes that companies
      must conduct a self-assessment audit of all AI tools currently in use and document
      findings by Q1 2025.

      '
    title: 'European Commission: Regulatory Framework for AI — Official Policy Page'
    url: https://digital-strategy.ec.europa.eu/en/policies/regulatory-framework-ai
  - content: 'IAPP ENTERPRISE GUIDE: EU AI ACT COMPLIANCE ROADMAP

      Step-by-step compliance for enterprise software vendors:

      Steps 1-4 (Immediate): Inventory all AI systems, classify by risk tier, appoint
      EU authorized representative, establish internal governance structure.

      Steps 5-8 (Q1 2025): Complete conformity assessments for high-risk systems,
      prepare technical documentation packages, register in EUAIDB, implement human
      oversight controls.

      Steps 9-12 (Ongoing): Establish post-market monitoring, set up incident reporting
      pipeline, conduct annual reviews, train staff on compliance obligations.

      Key contact: EU AI Office at ai-office@ec.europa.eu for official guidance requests.

      '
    title: 'IAPP: Practical Guide to EU AI Act for Enterprise Software Vendors'
    url: https://iapp.org/news/a/eu-ai-act-enterprise-guide-2024
