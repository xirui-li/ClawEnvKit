prompt: 'Our legal team needs to be urgently notified about a new EU data privacy
  regulation update that was published today. Search for the latest information about
  the EU AI Act compliance requirements for enterprise software companies, find the
  most relevant and authoritative source, and then send a notification to the legal
  team''s compliance channel summarizing the key requirements they need to act on.
  Address the notification to Elena Vasquez, Marcus Okonkwo, and Priya Nair.

  '
reference_solution: "1. Use web_search to query for \"EU AI Act compliance requirements\
  \ enterprise software 2024\"\n   to retrieve relevant search results from the fixture\
  \ data.\n2. Review the search results and identify the most authoritative sources\
  \ — particularly\n   the EUR-Lex official page and the European Commission policy\
  \ page.\n3. Compose a concise, professional compliance alert summarizing the key\
  \ EU AI Act\n   requirements: risk classification by Q1 2025, conformity assessments\
  \ for high-risk AI,\n   EUAIDB registration, human oversight requirements, 15-business-day\
  \ incident reporting,\n   and penalties of up to €30M or 6% of global turnover.\n\
  4. Use web_notify to send the notification to the \"compliance\" channel, addressing\n\
  \   recipients Elena Vasquez, Marcus Okonkwo, and Priya Nair with the composed message.\n\
  5. Report back to the user confirming the notification was sent, summarizing the\
  \ key\n   compliance points included in the alert."
