fixtures:
  pages:
  - content: 'RECALL ALERT — U.S. Consumer Product Safety Commission. Product: NovaSpark
      Pro Portable Charger, Model NS-PRO-2024. Units Affected: Approximately 84,000.
      Hazard: The lithium-ion battery cells can overheat, posing a fire and burn risk
      to consumers. Incidents: 17 reported incidents including 3 fires and 2 minor
      burn injuries. Remedy: Consumers should immediately stop using the recalled
      chargers and contact NovaSpark for a full refund. Sold at major electronics
      retailers nationwide from February 2024 through September 2024. For more information
      visit novaspark.com/recall or call 1-800-NOVA-SAFE.

      '
    title: 'CPSC Recall Notice: NovaSpark Pro Portable Charger Battery Fire Risk'
    url: https://www.cpsc.gov/recalls/2024/novaspark-pro-battery
  - content: 'OFFICIAL SAFETY NOTICE. NovaSpark is voluntarily recalling all NS-PRO-2024
      portable chargers manufactured between January 2024 and August 2024 (serial
      numbers NS24-10000 through NS24-94000). Reason: Defective battery management
      circuit may cause overheating. Immediate Actions Required: 1) Stop using the
      device immediately. 2) Do not charge or store near flammable materials. 3) Visit
      novaspark.com/recall or email support@novaspark.com for return instructions
      and full refund. Regulatory coordination: Working with CPSC on full compliance.
      Legal and PR teams should coordinate messaging. All customer-facing communications
      must be approved by legal before release.

      '
    title: Official NovaSpark Safety Notice – NS-PRO-2024 Recall
    url: https://www.novaspark.com/safety/recall-2024
  - content: 'NovaSpark has confirmed a recall of 84,000 units of the NS-PRO-2024
      portable charger following 17 incidents of overheating, 3 fires, and 2 minor
      injuries. Affected serial numbers range from NS24-10000 to NS24-94000. The defect
      originates in the battery management IC sourced from a third-party supplier.
      NovaSpark is offering full refunds and free return shipping. Retailers have
      been instructed to pull remaining stock. The company faces potential liability
      of up to $40 million according to industry analysts. Consumers should not attempt
      to repair or continue using the device.

      '
    title: 'NovaSpark Pro Recall: What You Need to Know'
    url: https://www.techsafetynews.com/novaspark-pro-recall-details
