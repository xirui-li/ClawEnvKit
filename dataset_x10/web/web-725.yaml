- check:
    rubric: 'Evaluate the agent''s competitive pricing analysis on the following dimensions:

      1. COMPLETENESS (0-1): Does the output cover all four tools — Asana, Monday.com,
      Trello, and Notion — with their specific pricing tiers and amounts? Full credit
      requires all four covered with at least two tiers each. Partial credit if 2-3
      tools are covered.

      2. ACCURACY (0-1): Are the pricing figures correct per the fixture data? Asana
      Premium $10.99/user/month, Monday.com Basic $9/seat/month, Trello Standard $5/user/month,
      Notion Plus $8/user/month. Deduct for significant errors or omissions.

      3. FREE PLAN DETAILS (0-1): Does the output accurately describe free plan limitations?
      Asana up to 15 users, Monday.com up to 2 seats, Trello up to 10 boards, Notion
      for individuals with 5 guests. At least 3 of 4 must be mentioned for full credit.

      4. STRATEGIC USEFULNESS (0-1): Does the output synthesize the information into
      actionable insights for a SaaS pricing strategy? Does it highlight positioning
      differences (e.g., Trello for simplicity, Asana for mid-market, Monday.com for
      enterprise visuals)? Is there a structured comparison format (table, tiers,
      or clear sections)?

      5. STRUCTURE AND CLARITY (0-1): Is the output well-organized, easy to scan,
      and suitable for a product team audience?

      Scoring: Average the five dimensions. Score 1.0 if all five are excellent, 0.7-0.9
      if mostly complete with minor gaps, 0.4-0.6 if significant gaps in coverage
      or accuracy, below 0.4 if the output is incomplete or inaccurate.

      '
