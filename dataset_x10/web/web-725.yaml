prompt: 'Our startup is launching a new project management SaaS product next quarter
  and the leadership team needs a competitive pricing analysis. Search for current
  pricing information on the top project management tools — specifically Asana, Monday.com,
  Trello, and Notion — and summarize their pricing tiers, key features at each tier,
  and any free plan details. Provide a structured comparison that our product team
  can use to inform our own pricing strategy.

  '
reference_solution: '1. Use web_search with a query like "Asana Monday.com Trello
  Notion pricing comparison 2024" to retrieve relevant search results from the fixture.
  2. Identify the pricing pages for each tool from the search results (asana.com/pricing,
  monday.com/pricing/, trello.com/pricing, notion.so/pricing). 3. Use web_fetch on
  each pricing page URL to retrieve detailed tier information and feature breakdowns.
  4. Optionally fetch the G2 or Capterra comparison pages for additional context on
  positioning. 5. Synthesize the fetched content into a structured comparison covering:
  free plan limits, entry-level paid tier pricing, mid-tier pricing, enterprise options,
  and key differentiating features per tool. 6. Present the analysis in a clear format
  (e.g., table or per-tool sections) with strategic observations relevant to a new
  SaaS product''s pricing strategy — such as the $8-$15/user/month sweet spot for
  mid-market and the importance of a generous free tier for adoption.'
