prompt: 'Our startup is preparing to launch a new project management SaaS product
  and needs a competitive pricing analysis. Search for current pricing information
  on the top project management tools — specifically Asana, Monday.com, Trello, and
  Notion — and summarize their pricing tiers, key features at each tier, and any free
  plan details so we can position our product competitively.

  '
reference_solution: '1. Use web_search with queries targeting each competitor''s pricing
  page (e.g., "Asana pricing 2024", "Monday.com pricing plans", "Trello pricing tiers",
  "Notion pricing"). 2. Review search results to identify the most relevant URLs (asana.com/pricing,
  monday.com/pricing, trello.com/pricing, notion.so/pricing). 3. Use web_fetch on
  each pricing page URL to retrieve detailed plan information. 4. Compile a structured
  comparison covering: free tier limits, entry paid tier price, mid-tier price, enterprise
  availability, and key differentiating features per tier. 5. Summarize findings in
  a clear table or structured list, noting Asana Premium at $10.99, Monday.com Basic
  at $9, Trello Standard at $5, and Notion Plus at $8 per user/month. 6. Provide strategic
  observations about pricing gaps and positioning opportunities for the new SaaS product.'
