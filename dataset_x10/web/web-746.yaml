- check:
    rubric: "Evaluate the agent's competitive pricing analysis on four dimensions:\n\
      1. COVERAGE (0–0.25): Does the output cover all four tools — Asana, Monday.com,\
      \ Trello, and Notion?\n   Full credit if all four are addressed with pricing\
      \ tiers. Partial if 2–3 are covered. Zero if fewer than 2.\n\n2. ACCURACY (0–0.25):\
      \ Are the pricing figures correct per the fixture data?\n   Asana Premium $10.99/user/month,\
      \ Monday.com Basic $9/seat/month, Trello Standard $5/user/month, Notion Plus\
      \ $8/user/month.\n   Full credit if at least 3 of 4 prices are correctly stated.\
      \ Partial if 1–2 are correct. Zero if none match.\n\n3. FREE TIER DETAIL (0–0.25):\
      \ Does the output describe free plan limitations for each tool?\n   Asana Basic\
      \ (up to 15 users), Monday.com Free (up to 2 seats), Trello Free (10 boards),\
      \ Notion Free (5 guests).\n   Full credit if at least 3 free tiers are described\
      \ with specific limits. Partial if 1–2. Zero if none.\n\n4. STRATEGIC USEFULNESS\
      \ (0–0.25): Does the output provide actionable competitive positioning insights\n\
      \   (e.g., where gaps exist, which tier structures are most competitive, recommendations\
      \ for the startup's pricing)?\n   Full credit for clear, specific recommendations.\
      \ Partial for generic observations. Zero for no strategic insight.\n\nFinal\
      \ score = sum of four dimension scores (max 1.0).\n"
    type: llm_judge
  name: analysis_quality
  weight: 0.4
