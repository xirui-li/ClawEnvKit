fixtures:
  pages:
  - content: 'NutriPure Foods has issued a voluntary recall of its organic granola
      bars, batch B-4471, manufactured on September 15, 2024. The recall is due to
      an undeclared tree nut allergen (cashews) found in the product. The issue was
      discovered during routine third-party testing. Consumers with tree nut allergies
      should not consume this product. Retailers in 12 states have been notified to
      remove the product from shelves. Lot codes 4471-A through 4471-F are affected.
      No allergic reactions or injuries have been reported to date. NutriPure CEO
      Margaret Holloway stated the company is cooperating fully with the FDA.

      '
    title: 'Voluntary Recall: Organic Granola Bars Batch B-4471 — Undeclared Allergen'
    url: https://www.foodsafetynews.com/2024/09/recall-organic-granola-batch-b4471
  - content: 'FDA Recall Classification: Class II. Product: NutriPure Organic Granola
      Bars. Batch: B-4471. Manufacture Date: 2024-09-15. Reason: Undeclared cashew
      allergen. Distribution: 12 states (CA, OR, WA, NV, AZ, TX, CO, IL, NY, FL, GA,
      NC). Action required: Retailers must pull all affected lot codes (4471-A through
      4471-F) from shelves immediately. Consumers should return product for a full
      refund. FDA is monitoring the situation.

      '
    title: FDA Recall Notice — NutriPure Organic Granola Bars
    url: https://www.fda.gov/safety/recalls-market-withdrawals/nutripure-granola-b4471
  - content: 'Official statement from NutriPure Foods CEO Margaret Holloway: ''We
      are proactively recalling batch B-4471 of our organic granola bars out of an
      abundance of caution following the discovery of undeclared cashews during third-party
      testing. No consumer injuries have been reported. We are working closely with
      the FDA and our retail partners to remove the product from circulation as quickly
      as possible. Affected customers may return the product to any point of purchase
      for a full refund. We take food safety extremely seriously and apologize for
      any inconvenience.''

      '
    title: NutriPure Foods Official Recall Statement — September 2024
    url: https://www.nutripurefoods.com/press/recall-statement-sept2024
