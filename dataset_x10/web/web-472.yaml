    - $199
    - Basic
    - Plus
    threshold: 0.8
    type: keywords_present
  name: nexus_pricing_details_present
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s competitive pricing analysis across three dimensions:

      1. COMPLETENESS (0–0.4): Does the output cover all three companies — Acme Analytics,
      BlueSky CRM, and Nexus Reporting — with their specific pricing tiers and costs?
      Full credit if all three are covered with at least two tiers each including
      dollar amounts. Partial credit (0.2) if only two companies are covered. Zero
      if only one or none.

      2. ACCURACY (0–0.4): Are the prices and tier names correct per the fetched data?
      Acme: Starter $19, Professional $79, Enterprise custom. BlueSky: Free $0, Growth
      $45, Scale $120, Enterprise $299. Nexus: Basic $29, Plus $89, Business $199,
      Enterprise contact sales. Deduct 0.1 for each materially wrong price or tier
      name (max deduction 0.4).

      3. BENCHMARKING VALUE (0–0.2): Does the output include a useful comparative
      summary, highlight standout features (e.g., BlueSky''s AI lead scoring, Nexus''s
      white-label exports, Acme''s 14-day trial), or note differentiators that would
      help a product team benchmark? Full credit for actionable insights; partial
      (0.1) for basic comparison; zero for raw data dump only.

      Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: competitive_analysis_quality
  weight: 0.4
