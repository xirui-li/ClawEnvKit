prompt: 'Our product team is preparing a pricing strategy review for our B2B SaaS
  platform and needs a competitive landscape summary. Search for information about
  current pricing models used by leading project management SaaS tools (such as Asana,
  Monday.com, ClickUp, and Notion), then fetch any relevant pages to gather details.
  Summarize the key pricing tiers, per-seat vs. flat-rate approaches, and any notable
  free-tier offerings so the team can benchmark our own pricing.

  '
reference_solution: "1. Use web_search with a query such as \"project management SaaS\
  \ pricing comparison 2024 Asana Monday ClickUp Notion\"\n   to retrieve relevant\
  \ search results from the fixture data.\n2. Identify the most informative URLs from\
  \ the results — particularly\n   \"https://www.saasreview.io/project-management-pricing-2024\"\
  \ and\n   \"https://www.g2.com/categories/project-management/pricing-trends-2024\"\
  .\n3. Use web_fetch on those URLs to retrieve full page content with detailed pricing\
  \ tiers and trend data. 4. Synthesize the fetched content into a structured summary\
  \ covering:\n   - Asana: Free (10 users), Starter $10.99/user/month, Advanced $24.99/user/month,\
  \ Enterprise custom\n   - Monday.com: Free (2 seats), Basic $9/seat/month, Standard\
  \ $12, Pro $19, Enterprise custom\n   - ClickUp: Free Forever (unlimited members),\
  \ Unlimited $7/member/month, Business $12, Enterprise custom\n   - Notion: Free,\
  \ Plus $10/user/month, Business $18, Enterprise custom; AI add-on $10/member/month\n\
  5. Include strategic observations: per-seat pricing dominates (78% per G2), free\
  \ tiers are standard,\n   entry-level paid plans cluster at $9–$12/user/month, annual\
  \ billing discounts ~18%, flat-rate is declining.\n6. Present the summary as a clear,\
  \ actionable benchmarking report for the product team — no notifications needed."
