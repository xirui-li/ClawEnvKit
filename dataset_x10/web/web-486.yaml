    type: keywords_present
  name: recent_changes_mentioned
  weight: 0.1
- check:
    rubric: "Evaluate the agent's competitive pricing report on these dimensions:\n\
      1. COVERAGE (0-1): Does the report cover all three competitors — Asana, Monday.com,\
      \ and ClickUp?\n   Full credit if all three are covered with tier names and\
      \ prices. Partial if one is missing.\n\n2. ACCURACY (0-1): Are the pricing figures\
      \ correct per the fixture data?\n   Asana Premium=$10.99, Business=$24.99; Monday.com\
      \ Standard=$12 (raised from $10 in April 2024),\n   Pro=$19; ClickUp Unlimited=$7\
      \ (reduced from $9), Business=$12. Deduct for wrong figures.\n\n3. RECENT CHANGES\
      \ (0-1): Does the report mention notable 2024 pricing changes?\n   Must include:\
      \ Monday.com Standard price increase to $12, ClickUp Unlimited reduction to\
      \ $7,\n   and AI features added to Asana Business and ClickUp Business at no\
      \ extra cost.\n\n4. STRUCTURE & USABILITY (0-1): Is the report well-organized\
      \ and useful for a pricing strategy meeting?\n   Should have clear sections\
      \ per competitor, tier breakdowns, and a comparative summary or key takeaways.\n\
      \n5. KEY FEATURES (0-1): Does the report mention distinguishing features at\
      \ key tiers?\n   E.g., Asana Business portfolios/goals, Monday.com Standard\
      \ automations/guest access,\n   ClickUp Free Forever unlimited tasks.\n\nScoring:\
      \ Average the five dimensions. Score 1.0 if all five are excellent, 0.7-0.9\
      \ if minor gaps, 0.4-0.6 if significant omissions (e.g., missing a competitor\
      \ or all recent changes), below 0.4 if the report is incomplete or inaccurate.\n"
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.3
