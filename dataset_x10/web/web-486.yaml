prompt: 'Our product team needs a competitive pricing analysis for our project management
  SaaS tool. Search for current pricing information on our top competitors — Asana,
  Monday.com, and ClickUp — and compile a summary of their pricing tiers, key features
  at each tier, and any recent pricing changes. Present your findings as a structured
  report the team can use for our upcoming pricing strategy meeting.

  '
reference_solution: "1. Search for \"Asana pricing 2024\", \"Monday.com pricing 2024\"\
  , and \"ClickUp pricing 2024\"\n   using the web_search tool to find relevant pricing\
  \ pages and recent news.\n2. Search for \"competitor pricing changes 2024 project\
  \ management SaaS\" to surface recent updates. 3. Use web_fetch on the pricing pages\
  \ (asana.com/pricing, monday.com/pricing, clickup.com/pricing)\n   to retrieve detailed\
  \ tier information.\n4. Optionally fetch the G2 comparison page and news articles\
  \ about price changes. 5. Compile findings into a structured report covering:\n\
  \   - Each competitor's pricing tiers with costs and key features\n   - Recent 2024\
  \ pricing changes (Monday.com increase, ClickUp reduction, AI feature additions)\n\
  \   - A comparative summary highlighting positioning and value differences\n6. Present\
  \ the report as text output suitable for the pricing strategy meeting."
