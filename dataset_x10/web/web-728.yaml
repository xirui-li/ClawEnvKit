  name: used_web_fetch
  weight: 0.1
- check:
    keywords:
    - Dropbox
    - Google
    - Box
    - OneDrive
    threshold: 0.9
    type: keywords_present
  name: key_providers_mentioned
  weight: 0.2
- check:
    keywords:
    - $15
    - $6
    - $5
    - $25
    threshold: 0.5
    type: keywords_present
  name: pricing_figures_present
  weight: 0.15
- check:
    rubric: "Evaluate the agent's competitive pricing analysis on three dimensions:\n\
      1. COVERAGE (0–0.4): Does the output cover all four providers — Dropbox, Google\
      \ Workspace, Box, and OneDrive?\n   Full credit if all four are addressed with\
      \ at least one pricing tier each.\n   Partial credit (0.2) if three providers\
      \ are covered. Zero if fewer than three.\n\n2. ACCURACY (0–0.4): Are the pricing\
      \ figures correct per the fixture data?\n   Key facts to verify: Dropbox Essentials\
      \ at $15/user/month with 3 TB; Google Workspace Starter at $6/user/month\n \
      \  with 30 GB; Box Business at $15/user/month with unlimited storage; OneDrive\
      \ Plan 1 at $5/user/month with 1 TB.\n   Full credit if at least 3 of these\
      \ 4 data points are correctly stated. Partial (0.2) for 2 correct. Zero for\
      \ fewer.\n\n3. ACTIONABILITY (0–0.2): Does the summary provide a useful benchmark\
      \ perspective?\n   Does it highlight notable differentiators such as Box's December\
      \ 2024 promotion (20% off),\n   Google's pooled storage model, or Microsoft's\
      \ bundled Teams/email value?\n   Full credit if at least two differentiators\
      \ or strategic observations are noted.\n\nFinal score = sum of the three dimension\
      \ scores (max 1.0).\n"
    type: llm_judge
  name: comparison_quality
  weight: 0.4
