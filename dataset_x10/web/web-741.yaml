- check:
    rubric: 'Evaluate the competitor pricing intelligence report on four dimensions:

      1. ACCURACY OF PRICING DATA (0–0.25): Does the report correctly state ErgoDesk
      Pro''s ErgoChair X1 at $649 (with 15% off via SUMMER15), LumbarKing''s ThroneBack
      500 at $389 (buy-2-get-10%-off bundle), and FlexSeat Co''s FlexCore 3000 at
      $599 (flash sale, down from $799)? Award 0.25 if all three are accurate, 0.15
      if two are accurate, 0.05 if only one.

      2. CUSTOMER SENTIMENT COVERAGE (0–0.25): Does the report mention ErgoDesk Pro''s
      4.2/5 Trustpilot rating and shipping delay concern (3-4 weeks), LumbarKing''s
      mixed customer service reputation, and FlexSeat Co''s 87/100 Consumer Reports
      score? Award 0.25 if all three sentiments are addressed, 0.15 if two, 0.05 if
      one.

      3. ACTIONABILITY FOR PRICING TEAM (0–0.25): Does the report draw meaningful
      conclusions or recommendations? For example: noting that LumbarKing is the budget
      leader (~$389), ErgoDesk Pro is mid-premium ($649+), and FlexSeat Co is premium
      ($599–$949); or flagging time-sensitive promotions (FlexSeat flash sale ending
      Sunday, ErgoDesk sale through August 31st). Award 0.25 for clear, specific recommendations;
      0.15 for partial; 0.05 for vague.

      4. CLARITY AND STRUCTURE (0–0.25): Is the report well-organized, easy to scan,
      and appropriate for a business audience? Does it use sections, headers, or clear
      groupings per competitor? Award 0.25 for excellent structure, 0.15 for adequate,
      0.05 for disorganized.

      Total score = sum of four dimension scores (max 1.0).

      '
    type: llm_judge
  name: report_quality_and_actionability
  weight: 0.4
