difficulty: medium
fixtures:
  pages:
  - content: 'URGENT RECALL NOTICE — Issued: November 14, 2024

      Product: Greenfield Organic Peanut Butter (16oz and 32oz jars) Batch Code: RX4471
      Best-By Date: 2025-03-15 Reason: Potential Salmonella contamination detected
      during routine quality testing.

      Affected Distribution Regions: Pacific Northwest (WA, OR), California, Nevada.
      Retail Locations Affected: Approximately 1,200 stores.

      Recommended Actions: 1. Retailers must remove all batch RX4471 product from
      shelves immediately. 2. Consumers should stop consumption and return product
      to place of purchase for a full refund. 3. Internal safety teams must notify
      distribution partners within 24 hours. 4. Report any illness cases to FDA hotline:
      1-800-FDA-1088.

      Contact: safety@greenfieldfood.com | FDA Case #: FDA-2024-RCL-00892

      '
    title: 'Urgent Recall Notice: Batch RX4471 - Greenfield Organic Peanut Butter'
    url: https://foodsafety.gov/recalls/2024/batch-RX4471
  - content: 'SAFETY ADVISORY — Batch RX4471

      All retail partners are required to: - Immediately quarantine and remove batch
      RX4471 from sales floor. - Issue in-store announcements where applicable. -
      Log removal actions and report to Greenfield Foods compliance team by November
      16, 2024.

      Consumers experiencing symptoms of Salmonella (fever, diarrhea, abdominal cramps)
      should seek medical attention. Greenfield Foods will provide full refunds. No
      receipt required for batch RX4471 returns.

      '
    title: 'Safety Advisory: RX4471 Consumer Guidance and Retailer Actions'
    url: https://foodsafety.gov/recalls/2024/batch-RX4471/advisory
  - content: 'Greenfield Foods Official Statement — November 14, 2024

      We are voluntarily recalling batch RX4471 of our Organic Peanut Butter out of
      an abundance of caution. Salmonella was detected in a single production run.
      No consumer illnesses have been reported to date. We are working closely with
      the FDA (Case #: FDA-2024-RCL-00892) and have halted production pending investigation.
      Affected distribution spans 1,200 retail locations across Washington, Oregon,
      California, and Nevada. Our internal safety team has been notified and distribution
      partners are being contacted.

      '
    title: Greenfield Foods Official Recall Statement
    url: https://greenfieldfood.com/news/recall-2024
