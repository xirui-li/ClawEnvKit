- check:
    rubric: 'Evaluate the competitive pricing intelligence report produced by the
      agent. Score on the following dimensions:

      1. COVERAGE (0-0.4): Does the report cover all three competitors — ErgoDesk
      Pro, LumbarKing, and FlexSeat Co — with specific pricing data? Full credit if
      all three are covered with at least two price points each (e.g., ErgoDesk Pro
      chairs from $349, LumbarKing CoreSupport $279, FlexSeat Co bundles from $599).
      Partial credit if one or two competitors are covered.

      2. PROMOTIONS & DIFFERENTIATORS (0-0.3): Does the report mention ErgoDesk Pro''s
      15% summer sale, LumbarKing''s upcoming $199 budget model launching September
      2024, FlexSeat Co''s bundle savings and referral program, and free shipping
      differences? Full credit for 3-4 of these, partial for 1-2.

      3. ACTIONABLE INSIGHTS (0-0.3): Does the report identify specific pricing gaps
      or opportunities? For example: the $300-$500 price compression trend, bundle
      strategy advantage, LumbarKing''s entry-level threat, or ErgoDesk Pro''s shipping
      weakness (3-4 weeks). Full credit for 2+ concrete, actionable recommendations
      tied to the data.

      Scoring: 1.0 = all three dimensions fully met, 0.7 = two dimensions fully met,
      0.4 = one dimension fully met or all partially met, 0.0 = generic or missing
      key data.

      '
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.35
- check:
    rubric: 'Does the agent''s report include broader market context beyond just listing
      prices? Specifically, check whether the agent references the market trend of
      bundle offerings outperforming single-SKU competitors (23% advantage mentioned
      in the Furniture Insider article), customer sentiment findings (e.g., ErgoDesk
      Pro''s 3.8/5 Trustpilot score with shipping complaints, FlexSeat Co''s customer
      service strength but quality concerns at $319), or the competitive threat from
      LumbarKing''s September 2024 budget launch. Score 1.0 if two or more of these
      contextual elements are present with specific details, 0.5 if one is present,
      0.0 if the report only lists prices without any market or sentiment context.

      '
    type: llm_judge
  name: market_context_included
  weight: 0.15
