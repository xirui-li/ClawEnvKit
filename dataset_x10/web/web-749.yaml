prompt: 'Our startup is launching a project management SaaS product next quarter and
  we need a competitive pricing analysis. Search for information on pricing pages
  and plans for leading project management tools, then compile a summary of their
  pricing tiers, key features at each tier, and any notable free plan offerings so
  we can benchmark our own pricing strategy.

  '
reference_solution: "1. Use web_search to query for \"project management SaaS pricing\
  \ comparison 2024\" or similar terms targeting\n   Asana, monday.com, Trello, ClickUp,\
  \ and Notion pricing pages.\n2. Use web_fetch to retrieve the full pricing page\
  \ content for each of the five tools identified in search results:\n   https://www.asana.com/pricing,\
  \ https://monday.com/pricing, https://trello.com/pricing,\n   https://clickup.com/pricing,\
  \ and https://www.notion.so/pricing.\n3. Extract and organize pricing tiers, per-user\
  \ monthly costs (annual billing), key features per tier,\n   and free plan limitations\
  \ for each tool.\n4. Compile a structured comparison report covering: (a) all pricing\
  \ tiers with costs, (b) notable free plan\n   offerings and their limitations, (c)\
  \ standout features at mid-tier plans, and (d) strategic observations\n   such as\
  \ ClickUp having the most generous free tier (unlimited members) and Trello being\
  \ the most affordable\n   paid option ($5/user/month).\n5. Present the findings\
  \ as a clear, actionable benchmarking summary to inform the startup's own pricing\
  \ strategy.\n   Do NOT send any notifications."
