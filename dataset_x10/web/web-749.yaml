- check:
    rubric: "Evaluate the agent's competitive pricing analysis report on the following\
      \ dimensions:\n1. COVERAGE (0–0.3): Does the report cover all five tools — Asana,\
      \ monday.com, Trello, ClickUp, and Notion?\n   Full credit if all five are covered\
      \ with pricing tiers. Partial credit (0.15) if 3–4 are covered. No credit if\
      \ fewer than 3.\n\n2. PRICING ACCURACY (0–0.3): Are the pricing figures accurate\
      \ and specific?\n   Check for correct values such as: Asana Premium $10.99/user/month,\
      \ monday.com Basic $9/seat/month,\n   Trello Standard $5/user/month, ClickUp\
      \ Unlimited $7/user/month, Notion Plus $8/user/month.\n   Full credit if at\
      \ least 4 tools have accurate pricing. Partial (0.15) if 2–3 are accurate.\n\
      \n3. FREE PLAN ANALYSIS (0–0.2): Does the report highlight notable free plan\
      \ differences?\n   Should mention ClickUp Free Forever (unlimited members, 100MB\
      \ storage), Asana Basic (up to 15 users),\n   monday.com Individual (only 2\
      \ seats), Trello Free (10 boards limit), Notion Free (10 guests).\n   Full credit\
      \ if at least 3 free plans are compared meaningfully.\n\n4. STRATEGIC USEFULNESS\
      \ (0–0.2): Does the report provide actionable benchmarking insights for a new\
      \ SaaS startup?\n   Look for observations like which tool is most affordable\
      \ (Trello), which has the best free tier (ClickUp),\n   or positioning recommendations.\
      \ Full credit for clear strategic takeaways; partial (0.1) for generic observations.\n\
      \nFinal score = sum of dimension scores (max 1.0).\n"
    type: llm_judge
