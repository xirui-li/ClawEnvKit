category: rewriting
claw_eval_id: T91_pinbench_humanize_blog
difficulty: medium
files:
- source: rewriting-010/document.txt
  target: /workspace/document.txt
prompt: Read the technical blog post at /workspace/document.txt and rewrite it in
  a more human, conversational, and engaging tone suitable for a general tech-savvy
  audience. The rewritten version should preserve all key facts, arguments, and structure
  from the original while removing overly formal or academic language. Save your rewritten
  version to /workspace/rewritten_document.txt and provide a brief summary of the
  main changes you made.
reference_solution: '1. Read /workspace/document.txt using native file reading capabilities
  (e.g., cat or open file).

  2. Analyze the content to identify: the core thesis (hidden costs of humanizing
  AI), key facts (GPT-4, 90th percentile on the Uniform Bar Exam, March 2023, RLHF),
  and the overall structure.

  3. Rewrite the blog post section by section, replacing formal/academic phrasing
  with conversational language — using contractions, rhetorical questions, shorter
  sentences, and relatable analogies where appropriate.

  4. Ensure all factual claims, statistics, and named entities (GPT-4, OpenAI, RLHF,
  Uniform Bar Examination) are preserved verbatim or accurately paraphrased.

  5. Save the rewritten version to /workspace/rewritten_document.txt.

  6. Provide a brief summary in the agent''s output describing the tonal and stylistic
  changes made (e.g., replaced passive voice, added conversational transitions, simplified
  jargon).'
safety_checks:
- keywords:
  - password
  - secret
  - api_key
  type: keywords_not_in_output
scoring_components:
- check:
    path: /workspace/rewritten_document.txt
    type: file_exists
  name: file_exists
  weight: 0.05
- check:
    keywords:
    - GPT-4
    - 90th percentile
    - Uniform Bar Examination
    - RLHF
    - OpenAI
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    keywords:
    - March 2023
    - human feedback
    - training
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s rewritten blog post saved to /workspace/rewritten_document.txt
      and the summary provided in the agent''s output against the following criteria:


      1. HUMANIZATION (25 pts): Does the rewritten text use a conversational, engaging
      tone that avoids overly academic or stiff phrasing? Does it feel like something
      a knowledgeable person would write for a blog, not a research paper?


      2. FACT PRESERVATION (25 pts): Are all key facts from the original preserved?
      This includes: GPT-4 scoring in the 90th percentile on the Uniform Bar Examination
      (March 2023), the role of RLHF (Reinforcement Learning from Human Feedback)
      in training, OpenAI''s involvement, and the core argument about the hidden costs
      of humanizing AI outputs.


      3. STRUCTURE RETENTION (20 pts): Does the rewritten version maintain the logical
      flow and structure of the original — introduction, core argument, supporting
      evidence, conclusion?


      4. READABILITY IMPROVEMENT (15 pts): Is the rewritten version noticeably more
      readable and accessible than the original technical text, without dumbing it
      down or losing nuance?


      5. SUMMARY QUALITY (15 pts): Does the agent''s summary clearly and accurately
      describe what changes were made and why, referencing specific stylistic or tonal
      shifts?


      Score out of 100 and provide a brief justification.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    cmd: test -s /workspace/rewritten_document.txt
    expected_exit: 0
    type: exit_code
  name: exit_code
  weight: 0.1
task_id: rewriting-959
task_name: Humanize Technical AI Training Blog Post
tools: []
