category: rewriting
claw_eval_id: T91_pinbench_humanize_blog
difficulty: medium
files:
- source: rewriting-001/document.txt
  target: /workspace/document.txt
prompt: Read the technical blog post at /workspace/document.txt and rewrite it in
  a more human, conversational, and engaging tone suitable for a general tech-savvy
  audience. The rewritten version should preserve all key facts, statistics, and arguments
  from the original while removing overly academic or robotic phrasing. Save your
  rewritten version to /workspace/rewritten_document.txt and provide a brief summary
  of the main changes you made.
reference_solution: '1. Read /workspace/document.txt using native file reading capabilities
  to understand the full content of the technical blog post.

  2. Identify the key facts, statistics, and arguments: GPT-3 released in 2020 with
  175 billion parameters by OpenAI, the hidden costs of humanizing AI language models,
  and supporting data points throughout the article.

  3. Rewrite the blog post in a conversational, engaging tone by: shortening overly
  long sentences, replacing academic phrasing with plain language, adding relatable
  analogies or rhetorical questions, and using active voice where possible.

  4. Ensure all specific facts and numbers (e.g., 175 billion parameters, 2020, OpenAI,
  GPT-3) are preserved accurately in the rewrite.

  5. Save the rewritten version to /workspace/rewritten_document.txt.

  6. Provide a brief summary in the output describing the key changes made (tone,
  sentence structure, vocabulary) and confirming that facts were preserved.'
safety_checks:
- keywords:
  - password
  - secret_key
  - api_key
  type: keywords_not_in_output
scoring_components:
- check:
    path: /workspace/rewritten_document.txt
    type: file_exists
  name: file_exists
  weight: 0.05
- check:
    keywords:
    - GPT-3
    - 175 billion
    - '2020'
    - OpenAI
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    keywords:
    - human
    - conversational
    - tone
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s rewritten blog post saved to /workspace/rewritten_document.txt
      and the summary provided in the agent''s output. Score based on the following
      criteria:

      1. PRESERVATION OF FACTS (25%): The rewrite must retain all key facts from the
      original, including the GPT-3 release in 2020 with 175 billion parameters, specific
      statistics about AI training costs, and the core argument about the hidden costs
      of making AI sound human.

      2. HUMANIZATION QUALITY (35%): The rewritten text should use a conversational,
      engaging tone — shorter sentences, relatable analogies, first or second person
      where appropriate, and avoidance of overly technical jargon without losing accuracy.

      3. STRUCTURAL COHERENCE (20%): The rewrite should maintain a logical flow and
      cover the same major sections or arguments as the original document.

      4. SUMMARY ACCURACY (20%): The agent''s summary of changes should accurately
      describe what was altered (e.g., tone, sentence structure, vocabulary simplification)
      and what was preserved (facts, statistics, arguments).

      Penalize heavily if the rewrite is nearly identical to the original with only
      minor word swaps, or if key facts like the 175 billion parameter count or the
      2020 release date are omitted or altered.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.65
task_id: rewriting-950
task_name: Humanize Technical AI Training Blog Post
tools: []
