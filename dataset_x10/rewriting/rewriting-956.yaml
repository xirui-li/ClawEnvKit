category: rewriting
claw_eval_id: T91_pinbench_humanize_blog
difficulty: medium
files:
- source: rewriting-007/document.txt
  target: /workspace/document.txt
prompt: Read the technical blog post at /workspace/document.txt and rewrite it in
  a more human, conversational, and engaging tone suitable for a general tech-savvy
  audience. The rewritten version should preserve all key facts, arguments, and structure
  from the original while removing overly academic or corporate language. Save the
  rewritten version to /workspace/document_humanized.txt and provide a brief summary
  of the main changes you made.
reference_solution: '1. Read /workspace/document.txt using native file reading capabilities
  (e.g., cat or open file).

  2. Analyze the content to identify: key facts (GPT-4, March 2023, 90th percentile
  on Uniform Bar Exam, RLHF), the central argument about the hidden costs of making
  AI sound human, and the overall structure.

  3. Rewrite the blog post with a conversational tone: use first or second person
  where appropriate, replace jargon with plain language, shorten overly long sentences,
  use active voice, and add relatable framing without altering factual content.

  4. Save the rewritten version to /workspace/document_humanized.txt.

  5. Output a brief summary describing the specific tone and style changes made (e.g.,
  replaced passive constructions, simplified technical terminology, added conversational
  transitions).'
safety_checks:
- keywords:
  - confidential
  - internal use only
  - proprietary
  type: keywords_not_in_output
scoring_components:
- check:
    path: /workspace/document_humanized.txt
    type: file_exists
  name: file_exists
  weight: 0.05
- check:
    keywords:
    - GPT-4
    - 90th percentile
    - Uniform Bar Examination
    - RLHF
    - reinforcement learning from human feedback
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    keywords:
    - OpenAI
    - '2023'
    - human feedback
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s rewritten blog post saved to /workspace/document_humanized.txt
      and the summary provided in the agent''s output. Score based on:

      1. TONE TRANSFORMATION (25%): The rewrite uses conversational, approachable
      language instead of stiff academic or corporate phrasing. Sentences feel natural
      and engaging, not robotic.

      2. FACTUAL PRESERVATION (25%): All key facts from the original are retained
      — including the GPT-4 release in March 2023, its 90th percentile score on the
      Uniform Bar Examination, the role of RLHF (reinforcement learning from human
      feedback), and the core argument about hidden costs of humanizing AI.

      3. STRUCTURAL INTEGRITY (20%): The rewritten post maintains the logical flow
      and argument structure of the original document, including the introduction,
      supporting points, and conclusion.

      4. READABILITY IMPROVEMENT (20%): The rewrite is noticeably more readable —
      shorter sentences, active voice, relatable analogies or examples where appropriate,
      without dumbing down the content.

      5. SUMMARY QUALITY (10%): The agent provides a clear, accurate summary of what
      changes were made and why, demonstrating understanding of the transformation
      task.

      Deduct points if the rewrite is nearly identical to the original, if key facts
      are missing or distorted, or if the tone remains overly technical and impersonal.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.65
task_id: rewriting-956
task_name: Humanize Technical AI Training Blog Post
tools: []
