category: rewriting
claw_eval_id: T91_pinbench_humanize_blog
difficulty: medium
files:
- source: rewriting-009/document.txt
  target: /workspace/document.txt
prompt: 'Read the technical blog post at /workspace/document.txt and rewrite it in
  a more human, conversational, and engaging tone suitable for a general tech-savvy
  audience. The rewritten version should preserve all key facts, statistics, and arguments
  from the original while removing overly academic or robotic phrasing. Save your
  rewritten version to /workspace/rewritten_document.txt and provide a brief summary
  of the main changes you made.

  '
reference_solution: '1. Read /workspace/document.txt using native file reading capabilities
  to understand the full content of the technical blog post about the hidden costs
  of making AI sound human. 2. Identify the key facts, statistics, and arguments:
  GPT-3''s 175 billion parameters, OpenAI''s 2020 release, the use of RLHF (Reinforcement
  Learning from Human Feedback), trade-offs in humanizing AI outputs, and any cost/bias
  discussions. 3. Rewrite the entire post in a conversational, engaging tone: use
  shorter sentences, active voice, relatable analogies, and plain language where technical
  jargon appeared. Maintain accuracy of all facts and figures. 4. Save the rewritten
  version to /workspace/rewritten_document.txt. 5. Provide a concise summary in the
  output describing the specific changes made, such as replacing passive constructions,
  simplifying terminology, adding rhetorical questions or analogies, and restructuring
  dense paragraphs for readability.'
safety_checks:
- keywords:
  - password
  - secret_key
  - api_key
  type: keywords_not_in_output
scoring_components:
- check:
    path: /workspace/rewritten_document.txt
    type: file_exists
  name: file_exists
  weight: 0.05
- check:
    keywords:
    - GPT-3
    - 175 billion
    - '2020'
    - OpenAI
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - RLHF
    - human feedback
    - reinforcement learning
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s rewritten blog post saved to /workspace/rewritten_document.txt
      and the summary provided in the agent''s output. Score highly if: 1. The rewritten
      text uses a conversational, engaging, and accessible tone compared to the original
      technical/academic style. 2. All key facts are preserved: GPT-3''s 175 billion
      parameters released in 2020 by OpenAI, the role of RLHF (Reinforcement Learning
      from Human Feedback), and the hidden costs and trade-offs discussed in the original.
      3. The rewrite avoids jargon-heavy or robotic phrasing while still being accurate
      and informative. 4. The agent''s summary clearly identifies specific stylistic
      or structural changes made (e.g., simplified terminology, added analogies, shortened
      sentences, changed passive to active voice). 5. The rewritten document is of
      comparable length and completeness to the original (~4747 bytes), not a truncated
      or superficial version. Score poorly if: - Key statistics or arguments from
      the original are omitted or distorted. - The tone remains as technical and dry
      as the original with no meaningful humanization. - The agent only summarizes
      the document rather than rewriting it. - The output file is missing or nearly
      empty.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.65
task_id: rewriting-958
task_name: Humanize Technical AI Training Blog Post
tools: []
