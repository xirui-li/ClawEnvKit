    - txn-4101
    - QuickFix Hardware
    - '28.47'
    - epoxy putty
    - qualifies
    type: keywords_present
  name: output_mentions_key_transaction_and_eligibility
  weight: 0.14
- check:
    keywords:
    - txn-4102
    - Metro Coffee Roasters
    - txn-4105
    - souvenir key copies
    type: keywords_absent
  name: output_avoids_nonreimbursable_items
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent clearly and accurately explains the submitted
      expense report using the fixture data and the fetched vendor policy page. A
      perfect answer should: (1) identify txn-4101 for QuickFix Hardware at $28.47
      as the submitted transaction; (2) explain that the purchase was for emergency
      prop repair supplies such as epoxy putty and gloves; (3) state a concrete policy-based
      reason from the fetched vendor website showing the item is eligible for reimbursement,
      such as being a business-use supply or a non-personal operational purchase;
      (4) avoid including unrelated transactions like txn-4102 coffee or txn-4105
      souvenir key copies; and (5) summarize what was submitted in a concise, professional
      way. Score 1.0 if all elements are correct and specific, 0.5 if the right transaction
      is submitted but the policy explanation is vague or partially inaccurate, 0.0
      if the wrong transaction is chosen or the explanation contradicts the evidence.'
    type: llm_judge
  name: quality_of_summary_and_policy_reasoning
  weight: 0.2
