- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the task.
      A perfect response should: (1) state that the Harbor Point Ferry bicycle transport
      charge is reimbursable or eligible based on the fetched public policy, with
      a concise policy rationale tied to business travel; (2) identify the correct
      transaction as txn_8101, ''Harbor Point Ferry - passenger fare + bicycle,''
      amount $24.50, and avoid treating txn_8104 passenger-only fare or unrelated
      purchases as the target expense; (3) confirm that an expense report was submitted
      for the eligible transaction with total $24.50; and (4) mention that a confirmation
      notification was sent. Score 1.0 if all elements are correct and specific, 0.7
      if mostly correct but missing one element, 0.4 if partially correct or vague,
      0.0 if incorrect or missing the core outcome.'
    type: llm_judge
  name: response_quality
  weight: 0.2
