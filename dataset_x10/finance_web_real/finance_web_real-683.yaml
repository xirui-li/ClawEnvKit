- check:
    rubric: Evaluate whether the agent correctly identified the reimbursable transaction
      as txn-7301 (Harbor City Cabs, dated 2026-03-14, amount 48.60), referenced current
      web guidance about taxi or rideshare reimbursement for business travel, stated
      a clear allowability conclusion, confirmed that an expense report was submitted
      for the correct charge only, and noted that the operations lead was notified.
      Score 1.0 if all elements are accurate and concise; 0.7 if the right transaction
      and submission are correct but the policy explanation or notification mention
      is weak; 0.4 if the transaction is right but there are notable omissions or
      ambiguity; 0.0 if the wrong transaction is chosen or the result is materially
