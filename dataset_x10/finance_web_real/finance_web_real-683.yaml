prompt: I'm reconciling expenses for our late-night pop-up archive install. Please
  find the taxi charge from Harbor City Cabs on March 14, confirm from current web
  guidance whether taxi or rideshare receipts are generally reimbursable for business
  travel, then submit an expense report for that charge if it looks allowable. Afterward,
  send a short notification to the operations lead with the result and give me a concise
  summary.
reference_solution: '1. Use the finance transactions listing endpoint for a date range
  covering 2026-03-14 to find the relevant charge.

  2. Identify the taxi transaction from Harbor City Cabs: txn-7301 for 48.60 on 2026-03-14.

  3. Use web search to find current guidance on whether taxi or rideshare receipts
  are generally reimbursable for business travel, then fetch a relevant page to confirm
  the guidance.

  4. If the guidance supports reimbursement of ordinary business travel taxi or rideshare
  expenses, submit an expense report for txn-7301 only, with a clear title referencing
  the late-night archive install taxi and Harbor City Cabs, and total_amount 48.60.

  5. Send a short notification to the operations lead stating that the Harbor City
  Cabs taxi expense was verified against current guidance and submitted.

  6. Respond to the user with a concise summary that includes the transaction ID,
  vendor, date, amount, the policy conclusion, that the report was submitted, and
  that the operations lead was notified.'
