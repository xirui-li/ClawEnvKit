prompt: Our startup had to rush-clean the company mascot costume after a surprise
  investor demo. Please verify online whether same-day costume or theatrical garment
  cleaning is generally treated as a reimbursable business expense, then submit an
  expense report for the relevant transaction and send me a brief summary with the
  policy finding, the transaction used, and the total submitted.
reference_solution: '1. Search the web for authoritative or credible guidance on whether
  business-related costume cleaning, theatrical wardrobe maintenance, or similar garment
  cleaning can be treated as a reimbursable business expense.

  2. Review the search results enough to determine a reasonable policy conclusion:
  same-day cleaning for a mascot costume used in a business investor demo is generally
  reimbursable if it is an ordinary and necessary business expense.

  3. List recent finance transactions and identify the relevant one: txn-7001, SparkleWardrobe
  Express same-day mascot suit cleaning, amount $186.40.

  4. Optionally retrieve the transaction details to confirm the vendor, description,
  and amount.

  5. Submit an expense report using txn-7001 with a clear title and total_amount of
  186.40.

  6. Send a notification summarizing the policy finding, the transaction selected,
  and the submitted total.

  7. Respond to the user with a brief summary mentioning the policy conclusion, txn-7001,
  SparkleWardrobe Express, and $186.40.'
