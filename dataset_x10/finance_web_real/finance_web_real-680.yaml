- check:
    rubric: Evaluate whether the agent gives a concise but complete result summary.
      Score 1.0 if it clearly states that the relevant expense is SparkleWardrobe
      Express same-day mascot suit cleaning (txn-7001) for $186.40, explains the web-verified
      policy finding in practical business-expense terms (for example, that costume/theatrical
