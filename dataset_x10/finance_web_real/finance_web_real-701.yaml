  name: web_search
  service: web_real
- description: Fetch a web page to read the policy details
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification to a channel or recipients
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web_real
- description: List recent finance transactions for the reporting period
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Retrieve a specific transaction's details
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with selected transactions
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
