    - txn_8102
    - txn_8104
    - txn_8106
    type: keywords_absent
  name: output_excludes_non_parking_items
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent clearly and accurately reports the submitted
      expense report for the parking charges tied to exhibit delivery. Full credit
      (1.0) if the response: (a) identifies the correct reimbursable transactions
      txn_8101 ($28.50, City Center Parking), txn_8103 ($18.00, Harbor Garage), and
      txn_8105 ($42.00, Riverfront Parking); (b) states the correct total of $88.50;
      (c) explains that unrelated transactions such as coffee, rideshare, and supplies
      were excluded; (d) summarizes the policy finding from the web source about business-related
      parking reimbursement and states whether the submission appears compliant; and
      (e) confirms the report was submitted. Partial credit (0.5) if one element is
      missing or vague. Low credit (0.0-0.2) if the wrong transactions are included,
      the total is wrong, or policy compliance is not addressed.'
    type: llm_judge
  name: response_quality
  weight: 0.15
