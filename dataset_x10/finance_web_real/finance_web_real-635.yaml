prompt: I need an expense report for the parking charges our art courier incurred
  while delivering the traveling exhibit crates last week. First confirm from our
  travel and expense policy whether parking for business deliveries is reimbursable,
  then find the relevant finance transactions, submit the report, and tell me what
  you submitted plus whether it appears policy-compliant.
reference_solution: '1. Search the web for the organization''s travel and expense
  policy focused on parking reimbursement for business deliveries or work-related
  travel.

  2. Fetch the most relevant policy page and confirm whether parking charges incurred
  for business purposes are reimbursable.

  3. List finance transactions covering the relevant date range last week, which includes
  2026-03-10 through 2026-03-14.

  4. Identify the parking-related exhibit courier transactions: txn_8101 for $28.50,
  txn_8103 for $18.00, and txn_8105 for $42.00.

  5. Exclude unrelated transactions such as coffee (txn_8102), rideshare to donor
  dinner (txn_8104), and packing supplies (txn_8106).

  6. Submit an expense report titled with museum exhibit courier parking language,
  including transactions txn_8101, txn_8103, and txn_8105, with total_amount 88.50.

  7. Respond to the user with a concise summary of what was submitted, the included
  transaction IDs and total, and whether the expenses appear compliant with the policy
  found on the web.'
