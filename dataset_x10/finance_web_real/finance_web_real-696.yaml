- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the task.
      A perfect response should: (1) identify the correct transaction as txn_8401
      from Northlight Custom Frames for $486.75 and not confuse it with PixelForge
      Printing, GalleryRail Systems, or other fixtures; (2) summarize a credible web
      finding that custom framing or display-related costs used in the business can
      generally be treated as an ordinary and necessary business expense or otherwise
      reimbursable under normal business-expense principles, while avoiding overconfident
      legal advice; (3) state that an expense report was submitted and describe what
      was filed; and (4) present the result concisely and coherently. Score 1.0 for
      fully correct and well-qualified, 0.5 for partially correct or missing one major
      element, 0.0 for incorrect transaction, no policy summary, or no filing confirmation.'
    type: llm_judge
