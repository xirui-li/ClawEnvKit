prompt: I'm preparing an expense report for a framed archival print we bought for
  the investor-relations exhibit in our lobby. Please confirm from a credible web
  source whether custom framing for business artwork/display is generally deductible
  or reimbursable as an ordinary business expense, then identify the correct transaction,
  submit an expense report for it, and tell me what you found and what you filed.
reference_solution: '1. Search the web for authoritative guidance on whether business
  display/artwork framing costs can generally be treated as ordinary and necessary
  business expenses or reimbursable business expenses.

  2. Fetch one credible result and confirm the guidance is relevant to business-use
  display or office decor/exhibit expenses.

  3. List recent transactions around 2026-02-08 to 2026-02-12 to find the framed archival
  print purchase.

  4. Use get_transaction on the likely candidate to verify the exact vendor, description,
  amount, and status. The correct transaction is txn_8401: Northlight Custom Frames
  - walnut frame for archival print, $486.75, posted.

  5. Submit an expense report using txn_8401 with total_amount 486.75 and an appropriate
  title such as ''Investor Relations Exhibit Framing Expense''.

  6. Respond with a short summary of the web finding, identify the transaction and
  amount, and confirm that the expense report was submitted.'
