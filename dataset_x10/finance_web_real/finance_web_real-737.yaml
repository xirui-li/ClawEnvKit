- check:
    rubric: Evaluate whether the agent clearly states the conference website finding
      about speaker checked-bag eligibility, correctly identifies the reimbursable
      transaction as txn_8401 (Cascade Air checked baggage fee SEA to PDX, $45.00,
      dated 2026-03-12), and explains that unrelated transactions such as Harbor Hotel
      Portland ($289.40) and MetroCab ($36.20) were not included. Score 1.0 if the
      response is accurate, concise, and confirms the report submission decision based
      on the web policy; 0.5 if it gets the right transaction but gives an incomplete
      or vague policy explanation; 0.0 if it selects the wrong expense, omits the
      policy basis, or claims submission without support.
    type: llm_judge
