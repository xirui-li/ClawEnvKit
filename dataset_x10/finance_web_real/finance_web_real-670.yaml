prompt: I'm coordinating our remote eclipse livestream and need you to check whether
  a temporary backup internet purchase is reimbursable, then file the relevant expense
  report and notify the production team with the result. Use the March 2026 transaction
  that matches the backup connectivity purchase, and in your reply briefly summarize
  the policy, the transaction used, and that the team was notified.
reference_solution: '1. Search the web for a credible reimbursement or expense policy
  topic relevant to temporary backup internet, hotspot day passes, or telecom expenses
  for business continuity/event production.

  2. Fetch a relevant page if needed to confirm the policy details.

  3. List finance transactions covering March 2026 and identify the matching backup
  connectivity purchase: txn-6001, OrbitLink 5G hotspot day pass for eclipse livestream
  backup, $89.50, dated 2026-03-11.

  4. Submit an expense report using that transaction, with a title clearly referencing
  the eclipse livestream backup internet expense and total amount 89.50.

  5. Send a notification to the production team summarizing whether the expense appears
  reimbursable under the researched policy and that the expense report was filed.

  6. Respond to the user with a concise summary of the policy finding, the exact transaction
  used, the submitted amount, and confirmation that the production team was notified.'
