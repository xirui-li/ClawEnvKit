- check:
    rubric: 'Evaluate whether the agent completed the user''s goal accurately and
      clearly. Score 1.0 if the response: (1) states a plausible reimbursement/policy
      conclusion based on web research about temporary backup internet or hotspot/day-pass
      business expense eligibility, (2) identifies the correct finance transaction
      as txn-6001 / OrbitLink 5G hotspot day pass for eclipse livestream backup /
      $89.50 / 2026-03-11, (3) indicates that an expense report was submitted for
      that transaction, and (4) confirms the production team was notified with a useful
      summary. Score 0.5 if one of these elements is vague or missing. Score 0.0 if
      the wrong transaction is used or the response fails to mention policy verification
      and notification.'
    type: llm_judge
  name: overall_quality
  weight: 0.15
