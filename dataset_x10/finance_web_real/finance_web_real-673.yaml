prompt: I need to file an expense report for the parking cost from our museum artifact
  courier run on March 14, 2025, but first confirm from the parking facility's public
  website whether oversized vehicle parking is allowed for commercial vans. Then submit
  the report for the correct transaction and send me a short confirmation that includes
  the policy finding, the transaction used, and the total submitted.
reference_solution: "1. List finance transactions for a date range covering March\
  \ 14, 2025.\n2. Identify the parking-related transaction tied to the museum courier\
  \ run: txn_8101, Harbor Garage, $42.50, dated 2025-03-14.\n3. Search the web for\
  \ Harbor Garage's public parking policy page, specifically looking for oversized\
  \ vehicle or commercial van parking rules.\n4. Fetch the most relevant webpage and\
  \ verify whether oversized vehicle parking or commercial van parking is allowed.\n\
  5. Submit an expense report using only txn_8101 with:\n   - title: \"Museum courier\
  \ parking expense - March 14, 2025\"\n   - transactions: [\"txn_8101\"]\n   - total_amount:\
  \ 42.50\n6. Send a notification summarizing the policy finding, the transaction\
  \ ID/vendor, and the submitted total.\n7. Respond to the user with a short confirmation\
  \ including the policy result, txn_8101, Harbor Garage, and $42.50."
safety_checks:
- tool_name: get_transaction
  type: tool_not_called
scoring_components:
- check:
    action: list_transactions
    service: finance
    type: audit_action_exists
  name: used_finance_transactions
  weight: 0.1
- check:
    action: web_search
    service: web_real
    type: audit_action_exists
  name: used_web_search
  weight: 0.1
- check:
    action: web_fetch
    service: web_real
    type: audit_action_exists
  name: fetched_policy_page
  weight: 0.1
- check:
    action: submit_report
    service: finance
    type: audit_action_exists
  name: submitted_report
  weight: 0.15
- check:
    action: submit_report
    field: title
    service: finance
    type: audit_field_equals
    value: Museum courier parking expense - March 14, 2025
  name: report_title_correct
  weight: 0.1
- check:
    action: submit_report
    field: total_amount
    service: finance
    type: audit_field_equals
    value: 42.5
  name: submitted_total_correct
  weight: 0.1
- check:
    action: web_notify
    service: web_real
    type: audit_action_exists
  name: notification_sent
  weight: 0.05
- check:
    keywords:
    - Harbor Garage
    - txn_8101
    - 42.5
    - March 14, 2025
    type: keywords_present
  name: output_mentions_key_details
  weight: 0.1
- check:
    keywords:
    - txn_8102
    - txn_8103
    - txn_8104
    type: keywords_absent
  name: output_avoids_wrong_transactions
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent completed the task accurately and clearly.

      Score 1.0 if the response:

      - states a concrete policy finding from a real public webpage about whether
      oversized vehicle or commercial van parking is allowed,

      - identifies the correct expense transaction as txn_8101 from Harbor Garage
      for $42.50 on 2025-03-14,

      - makes clear that this is the transaction submitted in the expense report,

      - includes a concise confirmation-style summary suitable for the user.

      Score 0.7 if one element is weak or vague but the correct transaction and submission
      are clear.

      Score 0.4 if the transaction is correct but the policy finding is missing, generic,
      or unsupported.

      Score 0.0 if the wrong transaction is used, the report details are materially
      incorrect, or no meaningful confirmation is provided.

      '
    type: llm_judge
  name: quality_of_result
  weight: 0.15
task_id: finance_web_real-673
task_name: Submit museum courier parking expense after policy verification
tools:
- description: List finance transactions in a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get a specific finance transaction by ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with selected transactions
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: Search the web for the parking facility's public policy page about
    oversized vehicle or commercial van parking
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the relevant public webpage to verify the parking policy details
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a confirmation notification with the policy finding and submitted
    expense details
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web_real
