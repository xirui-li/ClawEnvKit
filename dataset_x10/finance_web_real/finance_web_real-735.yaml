prompt: I'm preparing expenses from our neighborhood parade sponsorship activation.
  Please review my March 2026 transactions, find the mascot-related local transport
  expense, verify via the web whether a short-term costume or prop rental is generally
  treated as a reimbursable business event expense, then submit an expense report
  for the qualifying transaction and send a brief notification to the finance team
  summarizing what you filed and the policy basis.
reference_solution: '1. List finance transactions for March 2026 to review all candidate
  expenses.

  2. Identify the mascot-related local transport charge: txn_8102, dated 2026-03-07,
  described as "SparkStage Rentals mascot costume pickup van," amount $86.40.

  3. Use web search to find a credible source discussing whether short-term costume
  or prop rental for a business event, promotion, or marketing activation is generally
  considered a reimbursable business expense.

  4. Fetch a relevant result page and confirm the policy basis supports reimbursement
  of event-related costume/prop rental or directly associated transport as an ordinary
  business promotional expense.

  5. Submit an expense report with a clear title, including transaction txn_8102 and
  total_amount 86.40.

  6. Send a notification to the finance team summarizing that txn_8102 for mascot
  costume pickup transport was filed, include the amount, and briefly cite the policy
  basis from the web research.

  7. Respond to the user with a concise summary of the transaction selected, the reimbursement
  rationale, confirmation of report submission, and confirmation that finance was
  notified.'
