- check:
    rubric: Evaluate whether the agent clearly and accurately completes the task.
      Score 1.0 if the response identifies txn_8102 as the mascot-related local transport
      expense, states the amount as $86.40, explains that web research supports treating
      short-term costume/prop rental or closely related event support costs as reimbursable
      business event expenses, confirms an expense report was submitted for that transaction,
      and notes that finance was notified with a concise summary. Score 0.7 if one
      of these elements is weak or vague but the core transaction and filing are correct.
      Score 0.4 if the transaction is correct but the policy rationale or notification
      summary is missing or materially unclear. Score 0.0 if the wrong transaction
      is chosen or the explanation is substantially inaccurate.
    type: llm_judge
  name: response_quality
  weight: 0.1
