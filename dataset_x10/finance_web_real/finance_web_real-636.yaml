    - txn_8105
    - Chewy.com
    - '31.26'
    type: keywords_absent
  name: output_avoids_wrong_transaction
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent correctly completed the task end-to-end. A
      perfect score requires: (1) correctly identifying txn_8102, the 2026-03-12 Office
      Depot purchase for paper towels, enzyme cleaner, and disposable gloves, as the
      relevant cleanup-supplies transaction; (2) stating that the expense is reimbursable
      based on the located workplace expense policy, with a brief policy-grounded
      explanation rather than a vague claim; (3) confirming that an expense report
      was submitted for a total of $47.83; and (4) presenting the result clearly and
      concisely. Score 1.0 if all four are satisfied, 0.7 if the right transaction
      and amount are correct but policy explanation is weak, 0.4 if only partial facts
      are correct, 0.0 if the wrong transaction is used or submission status is misstated.'
    type: llm_judge
  name: response_quality
  weight: 0.15
