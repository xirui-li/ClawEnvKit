- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the task.
      A perfect score requires: (1) identifying the correct reimbursable transaction
      as txn_8101 for Petal & Pine Floral Studio, not txn_8104; (2) stating the amount
      $142.75; (3) summarizing the florist website finding about sympathy arrangements
      or condolence flowers based on fetched web content; (4) confirming that an expense
      report was submitted for the matching transaction; and (5) confirming that a
      notification was sent to the Partnerships team including the policy-relevant
      conclusion and transaction details. Score 1.0 if all five are present and accurate,
      0.7 if one element is weak or vague, 0.4 if multiple elements are missing or
      partially incorrect, 0.0 if the wrong transaction or amount is used.'
    type: llm_judge
  name: final_response_quality
  weight: 0.12
