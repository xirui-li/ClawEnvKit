prompt: I bought a replacement backdrop for tomorrow's investor livestream and need
  this handled today. Check whether this kind of studio purchase is reimbursable,
  submit an expense report for the matching transaction, and send a notification to
  producer Maya Chen with the policy result, the transaction details, and whether
  the report was submitted.
reference_solution: 'Search the web for the company''s reimbursement policy related
  to studio, production, or office supply purchases and determine whether a replacement
  livestream backdrop is reimbursable. Then list recent transactions and identify
  the matching purchase: txn-8101, dated 2026-03-18, from PixelCanvas Pro for $89.50,
  described as a seamless paper backdrop. Submit an expense report with a clear title
  referencing the backdrop purchase and include txn-8101 with total amount $89.50.
  After submission, send a notification to Maya Chen summarizing the policy finding,
  the transaction details, and that the expense report was submitted. Finally, respond
  to the user with a concise summary of the policy result, the transaction used, the
  report submission, and the notification sent.'
