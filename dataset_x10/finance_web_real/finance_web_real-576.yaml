- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the request.
      Full credit (1.0) if the response: (a) identifies the correct transaction as
      txn-8101 from PixelCanvas Pro for $89.50 on 2026-03-18, describing it as a seamless
      paper backdrop or equivalent studio backdrop purchase; (b) states the policy
      conclusion about whether this type of studio/production supply is reimbursable,
      based on web research; (c) confirms that an expense report was submitted and
      summarizes it; and (d) states that Maya Chen was notified with the policy result
      and submission status. Partial credit (0.5) if one element is vague or missing
      but the core transaction and outcome are correct. Zero if the wrong transaction
      is used or the response does not address policy, submission, and notification.'
    type: llm_judge
  name: final_response_quality
  weight: 0.12
