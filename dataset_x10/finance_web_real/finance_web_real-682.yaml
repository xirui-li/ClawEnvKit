  weight: 0.08
- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the task
      using the fixture data and policy verification. A perfect response should: (1)
      identify the eligible refreshment transactions as txn_7201 ($86.40, Moonlight
      Deli catering trays for overnight cast hold) and txn_7204 ($24.60, Moonlight
      Deli bottled water and fruit for overnight cast hold), totaling $111.00; (2)
      exclude unrelated expenses such as txn_7202 parking, txn_7203 supplies, and
      txn_7205 wardrobe repair; (3) state whether late-night on-set refreshments are
      reimbursable based on the public policy the agent found, including at least
      one caveat or condition from that policy; (4) mention that Lena Ortiz was notified;
      and (5) present the result concisely and professionally. Score 1.0 if all elements
      are correct and complete, 0.7 if mostly correct with minor omissions, 0.4 if
      partially correct but missing key facts or caveats, 0.0 if incorrect or incomplete.'
    type: llm_judge
  name: overall_quality
  weight: 0.1
