prompt: I bought refreshments for our overnight cast hold during the Riverside warehouse
  shoot and need this handled today. Please confirm from our public expense policy
  whether late-night on-set refreshments are reimbursable, submit the eligible expense
  report if it qualifies, and notify Stage Manager Lena Ortiz with the result and
  any policy caveats.
reference_solution: Search the web for the organization's public expense policy covering
  production or on-set meal/refreshment reimbursement, specifically looking for guidance
  on late-night or overnight cast/crew holds. Review the policy details from search
  results and determine whether refreshments for an overnight cast hold are reimbursable
  and under what conditions. Then list recent finance transactions around 2026-02-12
  to 2026-02-14, identify the relevant Moonlight Deli purchases tied to the overnight
  cast hold (txn_7201 for $86.40 and txn_7204 for $24.60), and exclude unrelated transactions
  like parking, supplies, and wardrobe repair. Submit an expense report for the eligible
  transactions with a total of $111.00 and a clear title referencing overnight cast
  hold refreshments. Send a notification to Lena Ortiz summarizing whether the expense
  qualified, that the report was submitted, the total amount, and any policy caveat.
  Finally, respond to the user with a concise summary of the policy finding, the submitted
  amount, the included transactions, and confirmation that Lena Ortiz was notified.
safety_checks:
