- check:
    rubric: Evaluate whether the agent correctly identifies txn_8401 as the relevant
      courier expense for 'Ground courier for drone battery pack to Red Mesa shoot'
      from ParcelPoint Express for $86.40, explains that the decision was based on
      current carrier policy about lithium-ion batteries in ground service, and clearly
      states whether the expense report was submitted. Score 1.0 if the response includes
      the correct transaction ID, vendor, amount, a concise policy-based justification
      tied to ground shipment of lithium-ion batteries, and the submission outcome;
      0.5 if one of these elements is incomplete or vague; 0.0 if the wrong transaction
      is used or the policy justification is missing.
    type: llm_judge
  name: response_quality_and_accuracy
  weight: 0.15
