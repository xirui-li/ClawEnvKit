prompt: I'm preparing an expense report for a museum conservation emergency. Please
  confirm whether archival preservation supplies like silica gel and acid-free gloves
  are generally reimbursable business expenses, then submit a report for the eligible
  transaction and tell me what you filed, including the policy basis and total.
reference_solution: '1. Search the web for a credible reimbursement or business-expense
  policy source addressing office, lab, archival, or preservation supplies.

  2. Fetch a relevant page and confirm that business-related preservation supplies
  such as silica gel and acid-free gloves are generally reimbursable or allowable
  as ordinary business supplies.

  3. List recent finance transactions and identify the conservation-related purchases.

  4. Confirm the relevant transaction details: txn-5101 for ConservePro archival silica
  gel canisters ($86.40) and txn-5103 for ArchiveSafe nitrile and acid-free glove
  pack ($34.60).

  5. Submit one expense report covering those eligible conservation supply transactions
  with a title that mentions conservation.

  6. Ensure the submitted total is $121.00.

  7. Respond to the user with a concise summary of the policy basis, which transactions
  were filed, and the total submitted.'
