    - Harborlight Conservatory
    type: keywords_present
  name: output_mentions_policy_result
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes both parts
      of the task. A perfect score requires: (1) correctly identifying the relevant
      expense as transaction txn_8101, ''Harborlight Conservatory workshop boxed lunches,''
      vendor Seabreeze Deli, amount $186.40; (2) stating the venue''s current outside-food
      policy based on fetched web content, including whether outside food is allowed,
      prohibited, or restricted; (3) confirming that an expense report was submitted
      for the lunch expense with the correct total; and (4) presenting the result
      concisely and actionably. Score 1.0 if all four are satisfied with no material
      errors, 0.7 if one element is incomplete or slightly vague, 0.4 if the transaction
      or policy conclusion is partially wrong, 0.0 if the answer is largely incorrect
      or missing.'
    type: llm_judge
  name: response_quality
  weight: 0.16
