    - web_search
    - web_fetch
    - submit_report
    service: web_real
    type: audit_sequence
  name: logical_order_policy_before_submission
  weight: 0.1
- check:
    keywords:
    - txn-8502
    - SignalMax
    - '34.99'
    - investor livestream
    type: keywords_present
  name: output_mentions_correct_transaction_and_amount
  weight: 0.15
- check:
    keywords:
    - txn-8501
    - txn-8503
    - txn-8504
    - txn-8505
    type: keywords_absent
  name: output_avoids_unrelated_transactions
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the task.
      A perfect score requires: (1) correctly identifying txn-8502 as the relevant
      expense, with vendor SignalMax and amount $34.99; (2) stating whether emergency
      backup connectivity/data purchases for business continuity are reimbursable
      based on the policy information found on the web; (3) confirming that an expense
      report was submitted for the eligible transaction; (4) briefly summarizing what
      was filed in a user-friendly way without inventing unsupported policy details;
      and (5) not confusing the expense with unrelated transactions such as MetroCharge
      EV station, Greenroom Cafe, CloudBox, or QuickPrint. Score 1.0 for fully correct
      and complete, 0.5 for partially correct or missing one key element, 0.0 for
      incorrect identification or no clear submission outcome.'
    type: llm_judge
  name: final_response_quality
  weight: 0.2
