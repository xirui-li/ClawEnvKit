- description: Fetch a web page to inspect details from a search result.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: List finance transactions in a date range to find the relevant purchases.
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Retrieve a specific transaction for confirmation.
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with the approved transaction.
