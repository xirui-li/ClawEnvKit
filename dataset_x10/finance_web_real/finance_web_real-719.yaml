prompt: I need you to review our late-night taxi charges from the week of 2026-05-11,
  figure out which one was for transporting regatta presentation gear to the marina,
  verify via the web whether taxi or rideshare transport for event materials is generally
  allowed at Chelsea Piers Marina, then submit an expense report for the correct transaction.
  After that, send a short notification to the finance ops channel summarizing what
  you filed and whether the venue guidance appears compatible.
reference_solution: '1. List transactions for the date range covering 2026-05-11 through
  2026-05-16.

  2. Review the returned transactions and identify the one most clearly tied to transporting
  regatta presentation gear to the marina. The best match is txn_8106, "MetroCab Van
  - oversized display cases to Pier 59 marina," amount $118.60.

  3. Use web search to find Chelsea Piers Marina or closely related Chelsea Piers
  venue guidance about taxi, rideshare, or vehicle access/drop-off for event materials.

  4. Fetch a relevant result page and determine whether the venue guidance appears
  compatible with using a taxi/van/rideshare for transporting event materials.

  5. Submit an expense report for txn_8106 with total_amount 118.60 and a sensible
  title referencing regatta presentation gear transport to the marina.

  6. Send a notification to the finance ops channel summarizing that txn_8106 for
  MetroCab Van Service was filed for $118.60 and whether the venue guidance appears
  compatible.

  7. In the final response, briefly state the selected transaction, amount, report
  submission, and the policy compatibility conclusion.'
