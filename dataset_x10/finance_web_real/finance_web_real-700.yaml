  name: avoids_claiming_other_transactions
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent completed the business task accurately and
      clearly. Full credit (1.0) if the response: (a) states a reasonable web-based
      conclusion about whether temporary train-station luggage locker fees are generally
      reimbursable for business travel, ideally noting they are typically reimbursable
      when necessary for business travel and documented; (b) identifies the correct
      transaction as txn-9001, Union Station luggage locker during client handoff
      trip, amount $18.50, vendor Amtrak Station Lockers; (c) says the operations
      team was notified with a concise recommendation; and (d) confirms an expense
      report was submitted for the same amount. Partial credit (0.5) if one of these
      elements is vague or missing but the correct transaction and amount are still
      used. Zero if the wrong transaction is selected, the recommendation is materially
      misleading, or the report/notification status is not conveyed.'
    type: llm_judge
  name: overall_quality
  weight: 0.2
