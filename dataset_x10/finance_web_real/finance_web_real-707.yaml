tools:
- description: Search the web for the company's event-expense reimbursement policy
    or relevant policy page
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch a web page to read the policy details
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: List finance transactions in a date range to locate the piano tuning
    charge
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Retrieve a specific transaction's details
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report for the approved transaction
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
