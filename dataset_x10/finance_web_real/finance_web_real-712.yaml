- check:
    rubric: Evaluate whether the agent correctly identifies txn-8101 (BlueTick Electronics
      emergency keyboard replacement for market-data terminal, $189.47) as the expense
      to report, explains the vendor policy found online in a way that supports whether
      the charge should be expensed or potentially returned/warrantied, confirms that
      a notification was sent to trading-ops, and provides a concise but complete
      final summary. Score 1.0 if all four elements are accurate and clearly connected;
      0.7 if the right transaction and notification are included but the policy explanation
      or recommendation is vague; 0.4 if the transaction is right but the summary
      omits either the notification or the policy-based recommendation; 0.0 if the
      wrong transaction is used or the response is materially inaccurate.
