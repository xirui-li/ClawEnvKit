prompt: One of our analysts had to replace a failed market-data terminal keyboard
  during a client prep session, and I need this handled today. Check the vendor's
  current return/warranty policy online, notify the trading-ops team with the policy
  details and whether the charge should be expensed, then submit an expense report
  for the relevant transaction and reply with a short summary including the transaction
  ID, amount, and what you told the team.
reference_solution: '1. Search the web for BlueTick Electronics'' current return or
  warranty policy related to keyboards or computer accessories.

  2. Fetch a relevant result page to confirm the policy details rather than relying
  on search snippets alone.

  3. Review finance transactions in a date range that includes 2026-02-11 and identify
  the relevant charge: txn-8101 for BlueTick Electronics, described as an emergency
  keyboard replacement for a market-data terminal, amount $189.47.

  4. Send a notification to the trading-ops team summarizing the verified policy details
  and stating whether the charge should be expensed now or whether a return/warranty
  path suggests follow-up.

  5. Submit an expense report that includes txn-8101, with a sensible title referencing
  the emergency market-data terminal keyboard replacement, and total amount 189.47.

  6. Respond to the user with a short summary that includes the transaction ID, vendor,
  amount, the policy conclusion, and that trading-ops was notified.'
