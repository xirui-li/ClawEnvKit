- check:
    rubric: Evaluate whether the agent clearly and accurately explains the verified
      Breeze Airways carry-on/cabin baggage fee policy for a standard economy passenger,
      identifies txn-8201 (Breeze Airways cabin bag fee for Raleigh demo trip, $58.00)
      as the eligible reimbursable expense, and states that other transactions such
      as txn-8202 coffee, txn-8204 minibar snack, and txn-8205 seat selection were
      not included. Score 1.0 if the response is accurate, concise, and ties the policy
      to why txn-8201 was submitted; 0.5 if it is partially correct but misses one
      key detail; 0.0 if it misstates the policy or includes the wrong expense.
    type: llm_judge
