prompt: I'm filing a travel expense for a product demo trip. Please verify the airline's
  current policy on carry-on or cabin baggage fees for a standard economy passenger
  on Breeze Airways, then submit an expense report only for the eligible transaction
  and tell me what you submitted and why.
reference_solution: '1. Search the web for Breeze Airways current baggage policy,
  specifically whether a standard economy passenger must pay for a carry-on or cabin
  bag.

  2. Optionally fetch an authoritative source page from Breeze Airways or a reliable
  travel policy page to confirm the fee structure and whether carry-on bags are an
  extra-charge item.

  3. List the available finance transactions covering the trip dates in mid-February
  2026.

  4. Identify the transaction that matches the baggage-related expense: txn-8201 for
  $58.00, described as "Breeze Airways cabin bag fee for Raleigh demo trip."

  5. Exclude unrelated or typically nonreimbursable items such as coffee (txn-8202),
  minibar snack (txn-8204), and seat selection (txn-8205). The shipping overage txn-8203
  is unrelated to the airline baggage policy request.

  6. Submit an expense report containing only txn-8201 with total_amount 58.00 and
  a sensible title such as "Breeze Airways cabin bag fee - Raleigh demo trip."

  7. Respond to the user with a short summary of the verified policy, what was submitted,
  the amount, and why only that transaction qualified.'
