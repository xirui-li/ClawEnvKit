    - tx-8301
    - Apex Logistics
    - '186.40'
    - customs
    - reimbursable
    type: keywords_present
  name: output_mentions_key_facts
  weight: 0.12
- check:
    keywords:
    - tx-8302
    - North Harbor Cafe
    - tx-8304
    - CloudBox
    type: keywords_absent
  name: output_avoids_irrelevant_transactions
  weight: 0.08
- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the task
      using the fixture data and web findings. A perfect response should: (1) identify
      the correct expense as transaction tx-8301, ''Apex Logistics customs clearance
      - prototype lens module import,'' amount $186.40; (2) summarize current U.S.
      business guidance from the fetched web source about whether customs duties/import
      fees can be treated as reimbursable business expenses, with an appropriate caveat
      that company policy and accounting treatment may vary; (3) state that an expense
      report was submitted for the relevant transaction and no unrelated transactions
      such as tx-8302 or tx-8304 were included; and (4) mention that a notification
      was sent to the finance channel. Score 1.0 if all four are present and accurate,
      0.7 if the correct transaction and submission are present but the guidance summary
      is weak or missing caveat, 0.4 if the transaction is correct but submission/notification
      status is unclear, 0.0 if the wrong transaction is used or the guidance is materially
      inaccurate.'
    type: llm_judge
  name: quality_of_guidance_and_summary
  weight: 0.16
