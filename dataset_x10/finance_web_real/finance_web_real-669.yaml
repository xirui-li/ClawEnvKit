  service: web_real
- description: Fetch a web page containing the carrier's shipping policy details.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: List recent finance transactions to find the shipment expense.
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Retrieve a specific transaction's details.
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report for the eligible shipment transaction.
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
