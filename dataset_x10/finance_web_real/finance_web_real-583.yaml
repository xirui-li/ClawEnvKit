    - list_transactions
    - submit_report
    service: finance
    type: audit_sequence
  name: correct_order_of_actions
  weight: 0.1
- check:
    keywords:
    - txn_8101
    - BlueCurrent Aquatics
    - '186.42'
    - pump
    type: keywords_present
  name: output_mentions_key_facts
  weight: 0.1
- check:
    keywords:
    - txn_8102
    - Harbor Cafe
    type: keywords_absent
  name: avoids_incorrect_transactions
  weight: 0.05
- check:
    rubric: Evaluate whether the agent correctly identified txn_8101 (BlueCurrent
      Aquatics - Emergency pump replacement, $186.42) as the reimbursable transaction,
      verified via web research that the vendor/item is an aquarium or water circulation
      pump, submitted an expense report for exactly that amount, and clearly stated
      that a notification was sent to Facilities. Score 1.0 if all elements are correct
      and concise; 0.7 if the right transaction and amount are used but web verification
      or notification details are weak; 0.4 if the transaction is right but the explanation
      is incomplete or ambiguous; 0.0 if the wrong transaction is selected or the
      amount is incorrect.
    type: llm_judge
  name: response_quality
  weight: 0.15
