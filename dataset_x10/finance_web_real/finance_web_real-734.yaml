- check:
    rubric: 'Evaluate whether the response clearly and accurately summarizes the reimbursement
      research and resulting actions. A perfect score (1.0) should: (a) explain that
      emergency pet-sitting due to a business-travel disruption is not a standard
      universally reimbursable travel expense and should be framed as an exception
      requiring finance review, rather than guaranteed approval; (b) identify the
      eligible transaction as txn_11401 / Paws & Stay Overnight Pet Care for $86.40;
      (c) state that the finance team was notified with a concise rationale tied to
      the canceled return train/client roadshow context; and (d) confirm that an expense
      report was submitted for $86.40. Score 0.7 if mostly correct but missing one
      of these elements, 0.4 if the transaction or reimbursement interpretation is
      vague or partially incorrect, and 0.0 if it claims certainty without support
      or names the wrong expense.'
    type: llm_judge
  name: quality_of_summary_and_judgment
  weight: 0.15
