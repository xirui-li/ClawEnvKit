prompt: I'm traveling for a client roadshow and had to pay for emergency pet-sitting
  after my return train was canceled. Please confirm whether this kind of expense
  is generally reimbursable under common business travel policies, then notify the
  finance team with a concise summary and submit an expense report using the eligible
  transaction. In your reply, tell me what you found, who you notified, and the report
  total.
reference_solution: '1. Search the web for credible guidance on whether emergency
  pet-sitting caused by business travel disruption is commonly reimbursable.

  2. Optionally fetch a relevant result to confirm the nuance: this is generally not
  a standard reimbursable category and should be treated as an exception subject to
  finance approval.

  3. List recent transactions and identify the relevant charge: txn_11401, Paws &
  Stay Overnight Pet Care, $86.40 on 2026-02-18.

  4. Send a notification to the finance team summarizing the situation: client roadshow
  travel, canceled return train, emergency pet-sitting expense, amount $86.40, and
  that reimbursement appears to require exception review rather than being standard
  policy.

  5. Submit an expense report using the Paws & Stay transaction only, with total_amount
  86.40 and a clear title indicating emergency pet-sitting due to travel disruption.

  6. Respond to the user with a concise summary of the policy finding, who was notified,
  and the submitted report total.'
