prompt: I need an expense report for the silent disco cleanup supplies we bought last
  week, but only if the purchase is allowed under current event sanitation guidance.
  Please verify the guidance online, find the relevant transaction, submit the report,
  and reply with the transaction ID, vendor, amount, and a brief note on the policy
  basis.
reference_solution: 'Search the web for current event sanitation or shared-equipment
  hygiene guidance relevant to cleaning headphones or electronics used by multiple
  attendees. Fetch a credible source page to confirm that sanitizing shared equipment
  with electronics-safe disinfecting products is allowed or recommended. Then list
  finance transactions covering the relevant dates and identify the cleanup-supplies
  purchase tied to silent disco sanitation: txn_9103 from CleanStage Supply for $146.35
  on 2026-05-13, described as alcohol-free electronics sanitizing spray. Optionally
  retrieve the transaction details for confirmation. Submit an expense report with
  a title referencing silent disco sanitation/cleanup and include txn_9103 with total_amount
  146.35. In the final response, state that the purchase is allowable based on the
  verified guidance and include the transaction ID, vendor, amount, and a concise
  policy note.'
