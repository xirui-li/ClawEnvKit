prompt: I bought a specialty prop item for our product video shoot and need you to
  file the expense report for the correct transaction. First confirm from our reimbursement
  policy whether collectible or vintage prop purchases are reimbursable, then submit
  the report only for the eligible charge and tell me what you submitted.
reference_solution: '1. Search the web for a reimbursement policy covering collectible,
  antique, or vintage prop purchases used for business production.

  2. Fetch the most relevant policy page and confirm whether such purchases are reimbursable,
  paying attention to any distinction between ordinary props and collectible/vintage
  items.

  3. Review the relevant finance transactions in the date range around 2026-02-11
  to 2026-02-14.

  4. Use get_transaction to inspect the likely candidate transactions, especially
  txn_8101 and txn_8103, because both could plausibly relate to prop sourcing.

  5. Determine that txn_8101 (Lantern & Laurel Antiques, $186.40) is the eligible
  charge to submit based on the policy, while txn_8103 (Velvet Frame Vintage, $312.75)
  should not be submitted if the policy excludes collectible/vintage purchases or
  lacks support for that charge.

  6. Submit an expense report for only txn_8101 with total_amount 186.40 and an appropriate
  title such as ''Product Video Shoot Prop Expense''.

  7. Respond with a concise summary stating what was submitted, the amount, and the
  policy-based reason.'
