- check:
    rubric: 'Evaluate whether the agent clearly and accurately explains the result.
      Full credit (1.0) if the response: (a) identifies the submitted transaction
      as txn_8101 from Lantern & Laurel Antiques for $186.40, (b) states that the
      decision was based on reimbursement policy verification about collectible or
      vintage prop purchases, (c) makes clear that the report was submitted only for
      the eligible charge, and (d) briefly notes why txn_8103 (Velvet Frame Vintage,
      $312.75) was not the submitted expense or was treated as ineligible/unsupported
      based on the policy. Partial credit (0.5) if the correct transaction is named
      but policy reasoning or exclusion of txn_8103 is vague. Zero if the wrong transaction
      is reported or the explanation is materially inaccurate.'
    type: llm_judge
  name: output_quality
