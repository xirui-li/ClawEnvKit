- check:
    rubric: Evaluate whether the response clearly and accurately states that the relevant
      reimbursable transaction is txn-8101 for Harbor State Bank's temporary merchant
      account setup fee of $149.00 tied to the Riverside Night Market, indicates that
      the bank policy was verified on the web and that the fee is non-refundable or
