prompt: Please review last week's finance transactions for the temporary cash-handling
  pop-up at the Riverside Night Market, confirm from the bank's website whether temporary
  event merchant accounts charge a non-refundable setup fee, and if so submit an expense
  report for the relevant charge. Then notify the treasury team with the policy confirmation,
  the transaction you used, and the submitted total.
reference_solution: First, inspect finance transactions for the relevant recent period
  and identify the likely event-related bank fee. The correct transaction is txn-8101
  dated 2026-05-11 for 'Riverside Night Market temporary merchant account setup' from
  Harbor State Bank for $149.00. Next, use web search to find Harbor State Bank information
  about temporary event merchant accounts or merchant services setup fees, then fetch
  the most relevant page and verify that the setup fee is charged and non-refundable
  or otherwise applicable to temporary event accounts. If the policy confirms the
  fee, submit an expense report with a title referencing Riverside Night Market and
  include txn-8101 with a total amount of 149.00. Finally, send a notification to
  the treasury team summarizing the policy confirmation, the transaction ID txn-8101,
  the vendor Harbor State Bank, and the submitted total of $149.00, then respond to
  the user with a concise summary of what was done.
