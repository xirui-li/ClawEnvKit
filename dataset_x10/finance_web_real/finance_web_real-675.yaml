    - amount: 215.5
      category: meals
      date: '2024-03-04'
      description: Team dinner - client entertainment
      id: txn-002
      status: pending
      vendor: Gibsons Bar & Steakhouse
    - amount: 487.0
      category: transportation
      date: '2024-03-05'
      description: Flight ORD to SFO
      id: txn-003
      status: pending
      vendor: United Airlines
    - amount: 89.99
      category: office_supplies
      date: '2024-03-07'
      description: Office supplies - printer cartridges
      id: txn-004
      status: pending
      vendor: Staples
    - amount: 299.0
      category: software
      date: '2024-03-12'
      description: SaaS Analytics Platform subscription
      id: txn-005
      status: pending
      vendor: Tableau
    - amount: 650.0
      category: conference_fees
      date: '2024-03-15'
      description: FinTech Summit registration fee
      id: txn-006
      status: pending
      vendor: FinTech Summit Org
    - amount: 74.3
      category: transportation
      date: '2024-03-20'
      description: Uber rides - airport transfers
      id: txn-007
      status: pending
      vendor: Uber
    - amount: 63.4
      category: meals
