  finance:
    transactions:
    - amount: 86.4
      category: travel
      date: '2026-03-24'
      description: Northeast Regional rail ticket for museum courier artifact handoff
      id: txn_8101
      status: posted
      vendor: Amtrak
    - amount: 5.75
      category: meals
      date: '2026-03-24'
      description: Platform coffee before courier departure
      id: txn_8102
      status: posted
      vendor: Station Kiosk
    - amount: 42.18
      category: supplies
      date: '2026-03-23'
      description: Archival foam inserts for crate stabilization
      id: txn_8103
      status: posted
      vendor: ConservePack
    - amount: 24.9
      category: ground_transport
      date: '2026-03-25'
      description: Ride-share from station to museum loading dock
      id: txn_8104
      status: posted
      vendor: Lyft
    - amount: 63.2
      category: meals
