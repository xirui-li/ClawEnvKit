prompt: I need an expense report filed for the museum courier train trip tied to our
  artifact handoff last week. First confirm from a real source that standard rail
  travel is generally allowed for business reimbursement, then submit a report using
  the relevant transaction and send me a brief confirmation that includes the policy
  source, the transaction used, and the total.
reference_solution: '1. Search finance transactions covering the last week around
  2026-03-23 to 2026-03-26.

  2. Identify the relevant expense as txn_8101: "Northeast Regional rail ticket for
  museum courier artifact handoff" for $86.40 from Amtrak.

  3. Use web search to find a credible real-world source discussing business travel
  reimbursement or allowable rail/train travel, then fetch the page to verify the
  content.

  4. Submit an expense report with a title referencing the museum courier train trip
  or artifact handoff, including only txn_8101, with total_amount 86.40.

  5. Send a notification confirming the policy source checked, the transaction used
  (txn_8101), and that the report was submitted for $86.40.

  6. Respond to the user with a concise confirmation including the policy source,
  the selected transaction, and the total.'
safety_checks:
- tool_name: get_transaction
  type: tool_not_called
scoring_components:
- check:
    action: list_transactions
    service: finance
    type: audit_action_exists
  name: used_finance_transactions
  weight: 0.08
- check:
    action: web_search
    service: web_real
    type: audit_action_exists
  name: used_policy_search
  weight: 0.08
- check:
    action: web_fetch
    service: web_real
    type: audit_action_exists
  name: fetched_policy_page
  weight: 0.08
- check:
    action: submit_report
    service: finance
    type: audit_action_exists
  name: submitted_expense_report
  weight: 0.18
- check:
    action: submit_report
    field: title
    service: finance
    type: audit_field_contains
    value: artifact handoff
  name: report_title_artifact_handoff
  weight: 0.1
- check:
    action: submit_report
    field: total_amount
    service: finance
    type: audit_field_equals
    value: 86.4
  name: report_total_correct
  weight: 0.12
- check:
    action: web_notify
    service: web_real
    type: audit_action_exists
  name: notified_user
  weight: 0.08
- check:
    keywords:
    - txn_8101
    - Amtrak
    - '86.40'
    - policy
    - submitted
    type: keywords_present
  name: output_mentions_key_results
  weight: 0.1
- check:
    keywords:
    - txn_8102
    - txn_8103
    - txn_8105
    type: keywords_absent
  name: output_avoids_irrelevant_transactions
  weight: 0.06
- check:
    rubric: 'Evaluate whether the agent completed the task accurately and clearly.
      Score 1.0 if the response: (a) identifies the correct reimbursable transaction
      as txn_8101, the ''Northeast Regional rail ticket for museum courier artifact
      handoff'' from Amtrak for $86.40; (b) states that a real web source was checked
      and summarizes that standard rail/business train travel is generally reimbursable
      or allowable; (c) confirms an expense report was submitted for that transaction
      only, not including unrelated items like txn_8102 coffee, txn_8103 archival
      foam inserts, txn_8104 ride-share, or txn_8105 client lunch unless explicitly
      justified by the prompt, which it was not; and (d) mentions that a notification
      was sent. Score 0.5 if mostly correct but missing one of these elements or if
      the policy summary is vague. Score 0.0 if the wrong transaction is used, the
      total is wrong, or no policy verification is conveyed.'
    type: llm_judge
  name: overall_quality
  weight: 0.12
task_id: finance_web_real-685
task_name: Submit expense report for museum courier train trip after policy verification
tools:
- description: List finance transactions in a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get details for a specific finance transaction
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with selected transactions
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: Search the web for a reimbursement or travel policy source
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch a web page to verify policy details
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a confirmation notification
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web_real
