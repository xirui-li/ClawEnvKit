prompt: Our lobby event arrangement wilted early, and I need you to submit an expense
  report for the replacement floral purchase from last week. Before submitting, check
  a current web source for a reasonable corporate expense policy or guidance on flowers/event
  decor, then send me a short summary with the policy takeaway, the transaction used,
  and confirmation that the report was filed.
reference_solution: '1. List finance transactions covering the relevant dates around
  last week in March 2026.

  2. Identify the emergency floral replacement purchase: txn_4101, dated 2026-03-11,
  vendor Petal & Stem, amount $186.40.

  3. Use web search to find a current, credible source discussing business expense
  reasonableness or treatment of flowers/event decor for corporate or client-facing
  business purposes.

  4. Fetch the most relevant page and extract a concise takeaway that can be applied
  to this expense.

  5. Submit an expense report using the floral replacement transaction, with a clear
  title indicating emergency floral replacement or similar, and total_amount of 186.40.

  6. Respond with a short summary that names the policy takeaway, cites the selected
  transaction details, and confirms the expense report was submitted.'
