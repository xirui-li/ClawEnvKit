- check:
    rubric: Evaluate whether the agent correctly identified the emergency floral replacement
      transaction as txn_4101 from Petal & Stem for $186.40 dated 2026-03-11, summarized
      a relevant current web-sourced policy or guidance about flowers/event decor
      or business expense reasonableness, and clearly stated whether the expense appears
      allowable under that guidance. Score 1.0 if all elements are accurate and the
      policy takeaway is specific and applied to this purchase; 0.5 if the correct
      transaction is used but the policy summary is vague or weakly applied; 0.0 if
      the wrong transaction is identified or no meaningful policy assessment is provided.
    type: llm_judge
  name: quality_of_summary_and_policy_application
