prompt: I bought a coworking day pass while doing offsite budget modeling last month
  and need to expense it if our policy allows it. Please check the reimbursement guidance,
  find the relevant transaction, submit the expense report if it's eligible, and tell
  me what you did and why.
reference_solution: '1. Search the web for the organization''s reimbursement guidance
  related to coworking day passes, workspace rentals, or temporary workspace expenses.

  2. Fetch a relevant policy page and determine whether a coworking day pass used
  for offsite work is reimbursable.

  3. List transactions covering the prior month and identify the coworking-related
  charge.

  4. Confirm that txn-8101, "HARBOR DESK DAY PASS" for $38.50 on 2026-02-03, is the
  relevant expense and avoid confusing it with txn-8104 print credits for $6.00.

  5. If the policy supports reimbursement, submit an expense report with a title referencing
  the coworking day pass and include txn-8101 with total_amount 38.50.

  6. Respond to the user with a short summary of the policy finding, the transaction
  selected, whether the report was submitted, and why.'
