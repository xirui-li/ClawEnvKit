- check:
    rubric: 'Evaluate whether the agent clearly and accurately explains the outcome
      of the request. A perfect score requires: (1) correctly identifying txn-8101
      dated 2026-02-03 from Harbor Desk for $38.50 as the coworking day-pass transaction;
      (2) distinguishing it from txn-8104 Harbor Desk Print Credits for $6.00 and
      not treating that as the reimbursable item; (3) stating whether the policy found
      on the web allows reimbursement for a coworking day pass in the described offsite
      work context; (4) confirming that an expense report was submitted if eligible;
      and (5) providing a concise rationale tied to the policy and transaction details.
      Score 1.0 if all five are satisfied, 0.5 if partially correct or missing one
      major element, 0.0 if the wrong transaction is used or the explanation is materially
      inaccurate.'
    type: llm_judge
  name: response_quality
  weight: 0.15
