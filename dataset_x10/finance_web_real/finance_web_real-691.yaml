prompt: I paid for parking during an offsite rehearsal-space visit and need to expense
  it if it complies with our reimbursement policy. Please verify the current policy
  online, submit the appropriate expense report for the eligible transaction, and
  then send a brief notification to the production coordinator with the policy conclusion,
  report title, and amount.
reference_solution: '1. Search the web for the company''s current reimbursement policy
  related to parking for offsite work visits or rehearsal-space/site visits.

  2. Fetch the most relevant policy page and verify whether parking is reimbursable
  under the circumstances described.

  3. List transactions covering the relevant dates in February 2025.

  4. Identify the parking transaction: txn-8101, Downtown Garage parking for rehearsal-space
  site visit, $24.00 from ParkFast Garage.

  5. Submit an expense report for the eligible transaction only, using a clear title
  indicating rehearsal-space parking and a total amount of $24.00.

  6. Send a notification to the production coordinator summarizing the policy conclusion,
  the submitted report title, and the $24.00 amount.

  7. Respond to the user with a concise summary of the policy verification, the transaction
  selected, the submitted report, and the notification sent.'
