- check:
    rubric: Evaluate whether the agent clearly states the policy conclusion from the
      web source, correctly identifies the eligible transaction as txn-8101 (Downtown
      Garage parking for rehearsal-space site visit, vendor ParkFast Garage, $24.00),
      confirms submission of an expense report for that amount, and mentions that
      a notification was sent to the production coordinator. Score 1.0 if all four
      elements are accurate and complete; 0.7 if one element is weak or vague; 0.4
      if two elements are missing or inaccurate; 0.0 if the wrong transaction is expensed
      or the policy conclusion is unsupported.
    type: llm_judge
  name: response_quality_and_accuracy
  weight: 0.12
