prompt: I bought a specialty battery pack for our field audio recorder during a remote
  interview shoot and need to expense it if it qualifies. Please verify whether rechargeable
  battery packs for professional audio equipment are reimbursable under our company
  travel-and-production expense policy, then review the relevant transaction and submit
  an expense report if appropriate. In your reply, tell me whether it was eligible,
  the transaction ID, vendor, amount, and that you submitted the report.
reference_solution: Search the web for the company's travel-and-production expense
  policy and find a page that addresses reimbursable production equipment or consumable
  power accessories. Fetch the relevant page and confirm that rechargeable battery
  packs for professional audio equipment are eligible business expenses. Then list
  transactions around 2025-02-11 to 2025-02-13, identify the likely purchase, and
  use get_transaction on txn_8402 to confirm the vendor Harbor Audio Supply, description
  NP-F battery pack for field recorder, and amount $129.99. Submit an expense report
  titled 'Field Audio Battery Pack Expense' including txn_8402 with a total amount
  of 129.99. Finally, reply that the expense was eligible under the policy, specify
  transaction ID txn_8402, vendor Harbor Audio Supply, amount $129.99, and confirm
  the report was submitted.
