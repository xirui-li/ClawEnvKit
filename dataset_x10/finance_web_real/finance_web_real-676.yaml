- description: Fetch a web page to inspect policy details
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification to stakeholders
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web_real
- description: List finance transactions in a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get details for a specific transaction
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report for selected transactions
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
