      and summarizing whether emergency cold-chain preservation purchases are reimbursable;
      (3) confirming that an expense report was submitted because the purchase qualifies;
      and (4) briefly explaining why other transactions such as MetroCab (txn_8402),
      Northside Deli (txn_8403), or CloudBox (txn_8405) were not the relevant expense.
      Score 1.0 for fully accurate and complete, 0.5 for partially correct or missing
      one major element, 0.0 for incorrect identification or unsupported submission.'
