prompt: Our archival freezer failed during a specimen transfer, and I need the dry
  ice refill expense submitted today if it qualifies under policy. Please verify the
  reimbursement policy for emergency cold-chain preservation purchases, identify the
  correct transaction, submit the expense report if allowed, and tell me what you
  did.
reference_solution: '1. Search the web for the organization''s reimbursement or expense
  policy related to emergency cold-chain preservation, specimen protection, or emergency
  operational purchases.

  2. Fetch a relevant policy page and verify that an emergency dry ice refill used
  to preserve archival or specimen materials is reimbursable.

  3. Review recent finance transactions in the relevant date range.

  4. Use the transaction detail endpoint to inspect the likely candidate transaction
  and confirm that txn_8401 is the PolarGas dry ice refill for the archival freezer
  outage, amount $186.40.

  5. Exclude unrelated transactions such as taxi, lunch, software subscription, or
  pending battery purchases.

  6. Submit an expense report with a clear title such as "Emergency archival freezer
  dry ice refill", including transaction txn_8401 and total_amount 186.40.

  7. Respond to the user with a concise summary that the policy was checked, txn_8401
  was identified as eligible, the report was submitted, and include the vendor and
  amount.'
