    - get_transaction
    - submit_report
    service: finance
    type: audit_sequence
  name: logical_order_followed
  weight: 0.1
- check:
    keywords:
    - Atelier North
    - txn-4101
    - '684.50'
    - courier
    type: keywords_present
  name: mentions_key_facts
  weight: 0.12
- check:
    keywords:
    - txn-4102
    - txn-4103
    - txn-4104
    - txn-4105
    type: keywords_absent
  name: avoids_irrelevant_transactions
  weight: 0.05
- check:
    rubric: 'Evaluate whether the response clearly and accurately explains the reimbursement
      decision using both finance data and web research. A perfect score requires:
      (1) correctly identifying txn-4101 as ''Atelier North - climate-controlled courier
      for loaned sculpture crate'' for $684.50; (2) stating that the agent verified
      from a current web source that specialized courier or shipping costs tied to
      business operations are generally reimbursable/allowable business expenses;
      (3) confirming submission of an expense report for that transaction; and (4)
      giving a concise rationale connecting the policy finding to this museum loan
      courier scenario. Score 1.0 if all four are present and accurate, 0.5 if partially
      complete or vague on policy basis, 0.0 if incorrect transaction or no meaningful
      policy justification.'
    type: llm_judge
  name: policy_assessment_quality
  weight: 0.15
