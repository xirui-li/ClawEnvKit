prompt: I need you to file an expense report for the emergency courier we used to
  hand-deliver notarized incorporation papers last month. First confirm from a real
  source whether same-day courier or messenger fees for business filing/document delivery
  are generally deductible as ordinary business expenses, then submit the report for
  the matching transaction and tell me the title, amount, transaction ID, and a brief
  policy note.
reference_solution: '1. Search finance transactions for the relevant period in February
  2025.

  2. Identify the courier-related charge: txn_8101, dated 2025-02-03, vendor MetroSwift
  Couriers, amount $186.40, described as same-day delivery to the Secretary of State
  filing office.

  3. Use real web search to find a credible source discussing deductibility of ordinary
  and necessary business expenses, specifically including delivery, messenger, or
  courier costs.

  4. Fetch the source page and confirm that same-day courier or messenger fees for
  business document delivery are generally deductible as ordinary business expenses.

  5. Submit an expense report in the finance service for txn_8101 with a clear title
  referencing the emergency courier for notarized filing papers and total amount 186.40.

  6. Respond with the submitted report title, transaction ID txn_8101, amount $186.40,
  and a brief policy note explaining that business courier/messenger fees are generally
  deductible ordinary business expenses according to the verified source.'
