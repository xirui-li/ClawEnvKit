    - web_fetch
    - submit_report
    - web_notify
    service: web_real
    type: audit_sequence
  name: correct_order_policy_then_report_then_notify
  weight: 0.1
- check:
    keywords:
    - txn-7101
    - Harbor Desk Collective
    - $38.50
    - coworking day pass
    type: keywords_present
  name: output_mentions_key_transaction_and_amount
  weight: 0.12
- check:
    keywords:
    - Juniper Table
    - CityCab
    - SketchHive
    type: keywords_absent
  name: output_avoids_unrelated_transactions
  weight: 0.06
- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the task.
      A perfect score requires: (1) identifying the correct transaction as txn-7101,
      dated 2025-02-11, vendor Harbor Desk Collective, amount $38.50, for a coworking
      drop-in pass; (2) stating the policy outcome based on fetched web content, specifically
      whether a temporary workspace/coworking expense is reimbursable and under what
      condition or limitation; (3) confirming that an expense report was submitted
      for that transaction rather than unrelated transactions txn-7102 through txn-7105;
      (4) mentioning that a notification was sent to the design operations channel
      with a concise summary; and (5) presenting the result in a concise business-appropriate
      summary. Score 1.0 if all elements are correct and complete, 0.7 if mostly correct
      with one minor omission, 0.4 if the right transaction is used but policy or
      notification details are vague/incomplete, 0.0 if the wrong transaction is chosen
      or the summary is materially inaccurate.'
    type: llm_judge
  name: final_response_quality
  weight: 0.2
