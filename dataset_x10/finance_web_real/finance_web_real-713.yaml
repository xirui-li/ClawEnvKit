- check:
    rubric: Evaluate whether the agent correctly identified the relevant March transaction
      as txn-3102, 'LinguaFrame Pro monthly subtitle translation software,' amount
      89.99, vendor LinguaFrame; summarized web findings about whether subtitle translation
      software/subscriptions are generally treated as reimbursable production or post-production
      expenses; clearly stated whether the expense appeared appropriate to reimburse;
      and confirmed that an expense report was submitted and a notification sent.
      Score 1.0 if all elements are accurate, specific, and coherent; 0.7 if the correct
