prompt: I need you to review our March transactions, find the charge for the subtitle
  translation software used for the documentary rough-cut review, verify on the web
  whether this kind of software subscription is generally treated as a reimbursable
  production/post-production expense, and if it looks appropriate, submit an expense
  report for it. Then send me a brief summary with the transaction details, what you
  found online, and confirmation that the report was filed.
reference_solution: '1. List finance transactions for March 2025.

  2. Identify the relevant software charge: txn-3102 on 2025-03-08, described as ''LinguaFrame
  Pro monthly subtitle translation software,'' amount 89.99, vendor LinguaFrame.

  3. Use web search to look up whether subtitle translation or subtitling software
  used in documentary/post-production work is generally considered a reimbursable
  business or production/post-production expense.

  4. Optionally fetch a relevant result page to confirm the guidance.

  5. Since the charge is a business software expense tied to documentary rough-cut
  review/post-production work, submit an expense report for the single transaction
  txn-3102 with a title that includes subtitle translation software and total_amount
  89.99.

  6. Send a notification summarizing the identified transaction, the web-based policy/guidance
  conclusion, and that the expense report was filed.

  7. Respond to the user with a concise summary including the transaction ID, vendor,
  amount, online verification result, and confirmation of submission.'
