prompt: I had a client lunch during our marina sponsorship pitch and need you to handle
  it end to end. Check the current reimbursement policy online for client meals, find
  the matching transaction, submit an expense report if it qualifies, and send a Slack
  update to producer Maya Chen with the result and any policy caveats.
reference_solution: Search the web for the organization's current client meal reimbursement
  policy, then fetch a relevant policy page to confirm whether a client lunch is reimbursable
  and note any conditions. List transactions around 2026-03-11, identify the matching
  meal transaction as txn-4101 for Harbor House Oyster Bar at $86.40, and submit an
  expense report with a title indicating it is a client lunch expense if the policy
  allows it. Finally, send a Slack notification to Maya Chen summarizing the policy
  result, the submitted expense details, and any caveats, and respond to the user
  with a concise summary of what was done.
safety_checks:
- tool_name: get_transaction
  type: tool_not_called
scoring_components:
- check:
    action: web_search
    service: web_real
    type: audit_action_exists
  name: used_web_policy_tools
  weight: 0.1
- check:
    action: web_fetch
    service: web_real
    type: audit_action_exists
  name: fetched_policy_page
  weight: 0.1
- check:
    action: list_transactions
    service: finance
    type: audit_action_exists
  name: used_finance_transactions
  weight: 0.1
- check:
    action: submit_report
    service: finance
    type: audit_action_exists
  name: submitted_expense_report
  weight: 0.15
- check:
    action: web_notify
    service: web_real
    type: audit_action_exists
  name: sent_notification
  weight: 0.15
- check:
    action: web_notify
    field: recipients
    service: web_real
    type: audit_field_contains
    value: Maya Chen
  name: notified_correct_recipient
  weight: 0.05
- check:
    action: submit_report
    field: title
    service: finance
    type: audit_field_contains
    value: client lunch
  name: report_title_mentions_client_lunch
  weight: 0.05
- check:
    actions:
    - web_search
    - web_fetch
    - web_notify
    service: web_real
    type: audit_sequence
  name: logical_order_policy_then_submit_then_notify
  weight: 0.1
- check:
    keywords:
    - Harbor House Oyster Bar
    - txn-4101
    - $86.40
    - Maya Chen
    type: keywords_present
  name: output_mentions_key_transaction
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the task.
      A perfect response should: (1) identify the correct transaction as txn-4101
      from Harbor House Oyster Bar for $86.40 on 2026-03-11; (2) summarize the relevant
      current web policy for client meal reimbursement, including at least one caveat
      or condition such as business purpose/client context or receipt/policy limits
      if found; (3) state whether the expense was submitted and describe it as a client
      lunch expense rather than confusing it with dock fees, coffee, printing, or
      car service; and (4) mention that Maya Chen was notified with the outcome. Score
      1.0 if all four are correct and specific, 0.7 if one element is weak or vague,
      0.4 if two elements are missing or inaccurate, 0.0 if the wrong transaction
      is used or the task is largely incomplete.'
    type: llm_judge
  name: final_response_quality
  weight: 0.15
task_id: finance_web_real-688
