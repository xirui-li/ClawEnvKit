prompt: Our interpreter services coordinator needs an expense report filed for an
  urgent replacement headset bought during a multilingual investor roadshow. First
  confirm from current public policy guidance whether emergency business equipment
  purchases under $100 are generally reimbursable with receipts, then submit the eligible
  finance transaction as an expense report and tell me the policy basis, the transaction
  you used, and the total submitted.
reference_solution: '1. Search the web for authoritative public guidance on reimbursable
  business expenses or accountable plan reimbursement rules, focusing on ordinary
  and necessary business purchases and substantiation/receipt requirements.

  2. Fetch a relevant result page to verify the policy details before taking action.

  3. List finance transactions covering the fixture dates and identify the urgent
  equipment purchase tied to interpreter services.

  4. Confirm the correct transaction details: txn-3301, Poly Voyager Focus UC replacement
  headset for interpreter booth, vendor TechHub Downtown, amount $84.72.

  5. Submit an expense report using that transaction only, with total_amount set to
  84.72 and an appropriate title such as ''Emergency interpreter headset replacement
  - investor roadshow''.

  6. Respond to the user with a concise summary that includes the policy basis, the
  selected transaction ID and description, and the total submitted, while avoiding
  unrelated transactions.'
