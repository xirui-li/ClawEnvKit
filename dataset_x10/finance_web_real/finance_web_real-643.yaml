- check:
    rubric: 'Evaluate whether the response clearly and accurately completes the task.
      Score 1.0 if it: (1) states that the submitted expense was txn-3301, the ''Poly
      Voyager Focus UC replacement headset for interpreter booth'' from TechHub Downtown
      for $84.72; (2) explains the policy basis from a public source in practical
      terms, specifically that ordinary and necessary business expenses can be reimbursable/accountable-plan
      eligible when substantiated with receipts and business purpose, and notes that
      the purchase was under $100; (3) confirms that an expense report was submitted;
      and (4) briefly distinguishes why the chosen transaction is the relevant urgent
      equipment purchase rather than unrelated items like the client dinner or floral
      arrangement. Score 0.5 if mostly correct but missing one major element or contains
      minor ambiguity. Score 0.0 if it identifies the wrong transaction, wrong amount,
      or gives no meaningful policy justification.'
    type: llm_judge
  name: final_response_quality
  weight: 0.2
