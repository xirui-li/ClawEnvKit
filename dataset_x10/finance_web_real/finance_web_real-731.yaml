  service: web_real
- description: Fetch a web page to verify museum cloakroom details
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: List recent finance transactions to find the relevant transport expense
  endpoint: /finance/transactions
  method: POST
