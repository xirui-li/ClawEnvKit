category: finance
claw_eval_id: T69_micron_capex_analysis
difficulty: medium
fixtures:
  finance:
    transactions:
    - amount: 46.8
      category: Travel
      date: '2026-03-14'
      description: MetroCab ride to Harbor City Museum with garment bag for panel
        costume
      id: txn_8401
      status: posted
      vendor: MetroCab
    - amount: 18.4
      category: Meals
      date: '2026-03-14'
      description: Harbor Bean Coffee client meeting
      id: txn_8402
      status: posted
      vendor: Harbor Bean Coffee
    - amount: 62.15
      category: Office Supplies
      date: '2026-03-13'
      description: StageCraft Rentals emergency steamer for wardrobe prep
      id: txn_8403
      status: posted
      vendor: StageCraft Rentals
    - amount: 24.9
      category: Shipping
      date: '2026-03-12'
      description: BlueLine Courier document drop to museum events desk
      id: txn_8404
