tools:
- description: Search the web for the company's reimbursement or travel/expense policy
    regarding emergency connectivity or hotspot purchases.
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch a web page to confirm policy details from a relevant source.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification to a channel or recipients with the policy finding
    and expense details.
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web_real
- description: List finance transactions in a date range to find the hotspot purchase.
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Retrieve a specific transaction's details.
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report for the reimbursable transaction.
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
