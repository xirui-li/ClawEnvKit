  name: report_total_matches_transaction
  weight: 0.1
- check:
    actions:
    - web_search
    - web_notify
    - submit_report
    service: web_real
    type: audit_sequence
  name: sequence_verify_then_notify_then_report
  weight: 0.1
- check:
    keywords:
    - txn-8101
    - MetroCharge
    - $48.00
    - expense report
    - notified
    type: keywords_present
  name: output_mentions_key_results
  weight: 0.08
- check:
    rubric: 'Evaluate whether the response clearly and accurately summarizes the completed
      work. A perfect score requires: (1) correctly identifying txn-8101 as ''MetroCharge
      Mobile Hotspot Day Pass'' for $48.00 on 2026-02-11; (2) stating that the agent
      verified reimbursement eligibility via web research for an emergency connectivity/hotspot
      expense; (3) stating that a notification was sent to finance ops with both the
      policy finding and transaction details; (4) stating that an expense report was
      submitted for the same $48.00 transaction; and (5) presenting the summary concisely
      without inventing unsupported policy details. Score 1.0 if all five are satisfied,
      0.5 if partially complete or slightly inaccurate, 0.0 if major facts are missing
      or wrong.'
    type: llm_judge
  name: final_response_quality
  weight: 0.12
