- check:
    action: web_search
    service: web_real
    type: audit_action_exists
  name: used_web_research
  weight: 0.08
- check:
    action: web_fetch
    service: web_real
    type: audit_action_exists
  name: fetched_source_page
  weight: 0.08
- check:
