  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with selected transactions
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: Search the web for rideshare receipt requirements or guidance
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch a web page to verify receipt guidance details
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification to the finance team
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web_real
