    - web_search
    - web_fetch
    - web_notify
    service: web_real
    type: audit_sequence
  name: logical_order
  weight: 0.1
- check:
    keywords:
    - txn_8102
    - Lyft
    - $36.45
    - investor breakfast
    type: keywords_present
  name: output_mentions_transaction_and_amount
  weight: 0.08
- check:
