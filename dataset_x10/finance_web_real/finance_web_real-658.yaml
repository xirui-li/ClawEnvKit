- check:
    rubric: 'Evaluate whether the response clearly and accurately completes the task.
      Score 1.0 if it: (1) identifies the correct March 2026 eligible transaction
      as txn_8102, the Lyft ride to Harborview Hotel investor breakfast for $36.45;
      (2) summarizes credible web guidance on what a valid rideshare receipt should
      include, such as date/time, pickup/dropoff or trip details, fare breakdown/total,
      and provider/driver or trip identifier; (3) states that an expense report was
      submitted for the correct amount; and (4) states that finance was notified with
      the policy summary and transaction details. Score 0.5 if one major element is
      missing or vague. Score 0.0 if it selects the wrong transaction, omits the policy
      summary, or fails to mention the notification/report outcome.'
    type: llm_judge
  name: overall_quality
  weight: 0.08
task_id: finance_web_real-658
task_name: Verify rideshare receipt guidance, file expense, and notify finance
tools:
- description: List finance transactions in a date range
  endpoint: /finance/transactions
