- check:
    rubric: Evaluate whether the response clearly states the verified Austin M&IE
      per-diem source/result from the web, correctly identifies txn-8101 (Lone Star
      Cafe dinner, $68.42 on 2026-04-07) as the eligible meal transaction, and explains
      whether it is within policy before submission. Score 1.0 if the answer is accurate,
      cites the policy finding in plain language, confirms submission of an expense
      report for txn-8101 only, and briefly notes why other transactions such as txn-8103
      ($14.25 minibar snack) or txn-8105 ($132.80 team dinner) were not used. Score
