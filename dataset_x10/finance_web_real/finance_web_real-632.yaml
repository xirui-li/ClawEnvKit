prompt: I bought a meal while traveling to our client site in Austin for the solar
  eclipse outreach event, and I need to expense it if it fits the federal per-diem
  guidance. Please verify the current M&IE per-diem for Austin, identify the eligible
  transaction from last week, submit an expense report only if it is within policy,
  and tell me what you found.
reference_solution: 'Search the web for the current federal M&IE per-diem guidance
  for Austin, Texas, ideally from the official GSA per-diem source or an equivalent
  authoritative page. Review the result to determine whether a single meal expense
  of $68.42 would be within the applicable daily M&IE allowance. Then list recent
  finance transactions covering the prior week and identify the meal transaction tied
  to the Austin client outreach trip: txn-8101, Lone Star Cafe dinner, $68.42 on 2026-04-07.
  Ignore unrelated or less appropriate transactions such as the transit pass, office
  supplies, minibar snack, and the larger team dinner. If the verified per-diem supports
  reimbursement of the meal amount, submit an expense report with a clear title referencing
  the Austin eclipse outreach trip and include txn-8101 with total_amount 68.42. Finally,
  respond with a concise summary of the policy finding, the selected transaction,
  whether it was within policy, and that the report was submitted.'
