prompt: I took a prospective marina client to lunch last week and need to file the
  expense if it complies with current U.S. business meal deduction guidance. Please
  verify the guidance from a reliable web source, submit an expense report for the
  eligible transaction, and then send a brief notification to the finance team summarizing
  the policy check and what you filed.
reference_solution: '1. Search the web for current U.S. business meal deduction guidance,
  ideally using an IRS source or another reliable tax authority summary.

  2. Fetch the most relevant source page and verify that ordinary and necessary business
  meals with clients are generally 50% deductible, not 100%.

  3. List transactions covering the relevant dates in March 2026.

  4. Identify the marina client lunch expense as the two Harborview Oyster Bar transactions:
  txn_9301 for $86.40 and txn_9304 for $12.96, totaling $99.36.

  5. Submit an expense report with a title indicating it is the marina client lunch
  expense and include those two transactions with total_amount set to 99.36.

  6. Send a notification to the finance team summarizing that the policy was checked
  against a reliable web source, that the lunch is generally 50% deductible under
  current guidance, and that a report for $99.36 was filed.

  7. In the final response, briefly summarize the policy finding, the transactions
  included, the total submitted, and that finance was notified.'
