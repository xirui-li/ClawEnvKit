- check:
    rubric: 'Evaluate whether the agent clearly and accurately completed the task.
      Score 1.0 if the response: (a) states that current U.S. business meal guidance
      supports ordinary and necessary business meals with clients being generally
      50% deductible rather than 100%, based on a reliable source such as the IRS;
      (b) identifies the correct reimbursable lunch expense as the Harborview Oyster
      Bar charges txn_9301 ($86.40) and txn_9304 ($12.96), totaling $99.36; (c) makes
      clear that unrelated transactions like txn_9302 fuel dock refill, txn_9303 Wi-Fi
      vouchers, and txn_9305 dock cart rental were not filed in this meal report;
      and (d) mentions that finance was notified with a concise summary. Score 0.5
      if one of these elements is incomplete or slightly inaccurate. Score 0.0 if
      the policy conclusion or transaction selection is materially wrong.'
    type: llm_judge
  name: response_quality
  weight: 0.12
