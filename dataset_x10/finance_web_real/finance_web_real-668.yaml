- check:
    rubric: 'Evaluate whether the response clearly and accurately: (1) summarizes
      web research on whether municipal parade permit fees are typically reimbursable
      business expenses, including at least one caveat such as company-policy dependence,
      client-billable treatment, or need for pre-approval; (2) identifies the correct
      finance transaction to submit as tx-5804, NightOwl Car Service - lantern transport
      to waterfront route, amount $48.60; (3) makes clear that the parade permit fee
      tx-5801 for $185.00 was researched for policy context but is not the expense
      being submitted; and (4) provides a concise, actionable final answer. Score
      1.0 if all four are satisfied with no material errors; 0.7 if mostly correct
      but missing one element or minor ambiguity; 0.4 if the correct transaction is
      submitted but the policy summary is weak or confused; 0.0 if the wrong transaction
      is recommended or major facts are incorrect.'
    type: llm_judge
  name: quality_of_reasoning_and_summary
  weight: 0.15
