prompt: We had to buy replacement simultaneous-translation headsets for tonight's
  investor town hall after the venue's backup units failed. Please confirm whether
  this kind of emergency AV accessibility expense is generally reimbursable, submit
  an expense report for the relevant transaction, and notify Event Ops with the report
  details and a short note about the policy basis.
reference_solution: '1. List transactions covering the relevant dates around 2026-03-14.

  2. Identify the emergency translation headset rental transaction: txn_8102, LinguaLive
  AV Services, $486.75.

  3. Use web search to find a credible source discussing reimbursement or business
  justification for emergency accessibility/assistive listening or event continuity
  expenses.

  4. Fetch one of the relevant pages and extract a concise policy basis showing that
  such emergency accessibility-related event expenses are generally reimbursable or
  business-necessary.

  5. Submit an expense report for txn_8102 with a clear title referencing the emergency
  translation headset expense.

  6. Notify Event Ops via web_notify, including the vendor name, amount, transaction/report
  details, and a short note citing the policy basis from the web research.

  7. Respond to the user with a concise summary naming txn_8102, the amount, the reimbursement
  rationale, confirmation that the report was submitted, and that Event Ops was notified.'
