prompt: I need to reimburse a charging session from a client-site visit, but only
  if the station's receipt options support business expense documentation. Review
  the relevant transaction, verify the charging network's receipt or invoice policy
  online, then submit an expense report if it looks acceptable and send me a brief
  confirmation with the policy you found and the report total.
reference_solution: '1. Identify the relevant charging expense from the fixtures as
  txn_1101, the posted MetroCharge DC Fast Charging transaction for $28.47 on 2026-02-11.

  2. Use the finance transaction detail endpoint to retrieve txn_1101 and confirm
  its vendor, description, amount, and status.

  3. Use web search to find MetroCharge''s official receipt, invoice, or charging-session
  documentation policy, then fetch the most relevant page to verify whether business
  receipts or invoices are available.

  4. If the policy indicates that receipts or invoices are available or that charging-session
  receipts can be accessed, submit an expense report for txn_1101 only with a sensible
  title such as ''Client-site EV charging reimbursement'' and total_amount 28.47.

  5. Send a notification confirming that the MetroCharge expense was reviewed, summarize
  the receipt/invoice policy found online, and note that the expense report total
  is $28.47.

  6. In the final response, briefly mention txn_1101, MetroCharge, the verified policy
  conclusion, and that the report was submitted for $28.47.'
