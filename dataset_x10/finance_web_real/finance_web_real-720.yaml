- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the task
      using the fixture data and web verification. A perfect score requires: (1) correctly
      identifying the relevant transaction as txn_1101, ''MetroCharge DC Fast Charging
      - Harbor Point'', amount $28.47; (2) summarizing a real web finding about MetroCharge''s
      receipt/invoice or charging-session documentation policy in a way that supports
      whether reimbursement is acceptable; (3) stating that an expense report was
      submitted for the charging transaction only, not including txn_1102 ($6.85 coffee),
      txn_1103 ($18.00 parking), txn_1104 ($12.14 pending charge), or txn_1105 ($24.63
      office supplies); and (4) providing a concise confirmation message that includes
      the policy conclusion and report total. Score 1.0 if all four are satisfied,
      0.7 if one element is weak or slightly incomplete, 0.4 if the transaction or
      policy conclusion is partially correct but important details are missing, and
      0.0 if the wrong transaction is used or the policy is not meaningfully verified.'
    type: llm_judge
  name: quality_of_summary_and_decision
  weight: 0.15
