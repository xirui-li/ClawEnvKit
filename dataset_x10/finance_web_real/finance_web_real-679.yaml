prompt: A presenter’s on-camera wardrobe had to be emergency steamed before a same-day
  investor video shoot, and I need you to handle the reimbursement. First confirm
  from a credible source whether garment steaming is generally treated as a deductible
  or reimbursable business grooming/wardrobe expense, then submit the appropriate
  expense report for the matching transaction and give me a brief summary with the
  policy takeaway.
reference_solution: '1. Search the web for a credible source discussing whether garment
  steaming, wardrobe maintenance, or grooming-related costs are generally deductible
  or reimbursable in a business context.

  2. Fetch the most relevant source page and confirm the policy takeaway, especially
  the distinction between ordinary personal appearance costs and expenses directly
  tied to a business production need.

  3. List finance transactions around 2026-02-08 to 2026-02-11 and identify the emergency
  garment steaming charge.

  4. Confirm the matching transaction is txn-4101, SteamLab Midtown, for $48.50, described
  as emergency garment steaming for investor shoot wardrobe.

  5. Submit an expense report with a clear title referencing wardrobe steaming and
  include txn-4101 with total_amount 48.50.

  6. Respond with a concise summary naming the submitted transaction, amount, and
  vendor, and include the policy takeaway with an appropriate caveat rather than overstating
  universal eligibility.'
