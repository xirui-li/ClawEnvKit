- check:
    rubric: 'Evaluate whether the agent clearly and accurately explains the reimbursement
      decision and result. Full credit (1.0) if the response: (a) identifies the eligible
      transactions as txn-7811 North Ridge Outfitters thermal emergency liner for
      $86.40 and txn-7813 Raptor Field Supply insulated work gloves for $24.60; (b)
      states the submitted total is $111.00; (c) briefly cites a policy basis from
      the fetched web content showing field safety/protective or emergency operational
      supplies are reimbursable; and (d) makes clear that unrelated items such as
      coffee, lodging, or fuel were not included. Partial credit (0.5) if mostly correct
      but missing one of these elements or slightly vague on policy basis. Zero if
      it includes wrong transactions, wrong total, or no policy justification.'
    type: llm_judge
