  name: web_search
  service: web_real
- description: Fetch a web page containing the reimbursement policy details.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: List finance transactions in a date range to locate the relevant purchases.
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Retrieve full details for a specific transaction before deciding eligibility.
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with the eligible transaction IDs and total
    amount.
