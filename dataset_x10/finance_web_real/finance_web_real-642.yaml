prompt: I bought a replacement thermal liner and work gloves during an overnight rescue
  at our owl sanctuary field site, and I need you to submit the reimbursable expense
  report. First confirm from our travel and field-expense policy whether these items
  are reimbursable, then identify the correct transaction details and submit the report
  only for the eligible expense(s); in your reply, briefly cite the policy basis and
  the total submitted.
reference_solution: '1. Search the web for the organization''s travel or field-expense
  reimbursement policy relevant to emergency field operations and protective supplies.

  2. Fetch the most relevant policy page and confirm that emergency field safety/protective
  supplies are reimbursable, while unrelated discretionary purchases are not.

  3. List transactions around 2026-02-14 to 2026-02-16 to find the likely purchases.

  4. Use get_transaction on the candidate transactions, especially txn-7811 and txn-7813,
  to verify the exact vendor, description, amount, and status.

  5. Determine that the thermal emergency liner ($86.40) and insulated work gloves
  ($24.60) are eligible under the policy, for a total of $111.00.

  6. Submit an expense report with a clear title such as "Owl sanctuary overnight
  rescue field supplies" including transactions txn-7811 and txn-7813 and total_amount
  111.0.

  7. Respond with a concise summary citing the policy basis, naming the included transactions/vendors,
  and stating that the submitted total was $111.00.'
