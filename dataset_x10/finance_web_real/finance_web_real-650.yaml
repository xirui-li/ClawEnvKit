- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the task.
      Score 1.0 if the response: (a) states that current TSA guidance indicates spare/uninstalled
      lithium-ion batteries should be carried in carry-on baggage and not placed in
      checked baggage; (b) identifies txn_8401, ''UN3480 battery-safe zip pouches
      and terminal caps'' from AeroSafe Supply Co., amount $46.72, as the eligible
      expense; (c) indicates an expense report was submitted for that amount; and
      (d) mentions that a notification/update was sent. Score 0.7 if one minor detail
      is missing but the policy conclusion and correct transaction are right. Score
      0.4 if the correct transaction is named but the policy explanation is vague
      or incomplete. Score 0.0 if the wrong transaction is chosen, the policy conclusion
      is materially wrong, or submission status is misstated.'
    type: llm_judge
  name: quality_of_reasoning_and_summary
