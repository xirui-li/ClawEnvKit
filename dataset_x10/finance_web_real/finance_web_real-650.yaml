prompt: I bought replacement lithium-ion battery shipping supplies for our media team
  after a drone shoot, but only reimburse it if current TSA guidance suggests spare
  lithium batteries must be carried in cabin baggage rather than checked. Please verify
  the rule online, submit the expense report for the eligible transaction if appropriate,
  and send me a brief update with the policy conclusion, the transaction used, and
  the submitted total.
reference_solution: '1. Use web search to find current TSA guidance about traveling
  with spare lithium-ion batteries, ideally from tsa.gov or another authoritative
  source.

  2. Optionally fetch the authoritative page to confirm the rule that spare/uninstalled
  lithium batteries must be in carry-on baggage and are not allowed in checked baggage.

  3. Use the finance transactions endpoint to review recent transactions and identify
  the one related to battery-safe shipping/travel supplies: txn_8401 for $46.72 from
  AeroSafe Supply Co.

  4. Since the online policy supports the need for cabin-safe handling of spare batteries,
  determine that txn_8401 is appropriate to reimburse.

  5. Submit an expense report with a title referencing the battery shipping or TSA
  battery rule, including txn_8401 and total_amount 46.72.

  6. Send a notification summarizing the TSA policy conclusion, the selected transaction
  ID/vendor/amount, and that the expense report was submitted.

  7. Respond to the user with a concise summary including the carry-on policy conclusion,
  txn_8401, and the submitted total of $46.72.'
