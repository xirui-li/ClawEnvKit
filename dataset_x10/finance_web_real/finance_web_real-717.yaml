- check:
    rubric: 'Evaluate whether the response clearly and accurately completes the task
      using both policy verification and finance data. A perfect score (1.0) requires:
      (1) it states a policy conclusion from the fetched public page about whether
      a coworking day pass and internet/workspace access are reimbursable or allowed;
      (2) it identifies the correct matching transaction as tx-4101, Harbor Loft Coworking
      day pass for livestream rehearsal, amount $38.50; (3) it states that an expense
      report was submitted and gives the submitted total as $38.50; and (4) it gives
      a concise rationale connecting the policy to the emergency livestream rehearsal
      use case. Score 0.7 if mostly correct but missing one of these elements. Score
      0.4 if it identifies the transaction but gives a vague or unsupported policy
      conclusion. Score 0.0 if it uses the wrong transaction, omits the submission
      result, or invents unsupported facts.'
    type: llm_judge
  name: policy_and_submission_quality
  weight: 0.3
