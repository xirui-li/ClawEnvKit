prompt: Our investor-relations producer used a coworking day pass to get stable internet
  for an emergency livestream rehearsal. Please confirm from the venue's public policy
  page whether day passes and internet/workspace access are reimbursable, then submit
  an expense report for the matching transaction and tell me the policy conclusion,
  the transaction you used, and the total submitted.
reference_solution: '1. Search the web for the coworking venue''s public page describing
  day passes, amenities, or internet/workspace access.

  2. Fetch the most relevant page and read it to determine whether the venue publicly
  offers day passes and includes workspace/internet access, so the expense can be
  justified as a reimbursable business workspace cost.

  3. List recent finance transactions and identify the matching posted transaction
  for the emergency livestream rehearsal: tx-4101 for Harbor Loft Coworking, $38.50.

  4. Submit an expense report for that transaction only, with a title indicating it
  is a coworking day-pass expense for livestream rehearsal.

  5. Respond with a short summary that includes the policy conclusion, the selected
  transaction ID/vendor, and the total amount submitted ($38.50).'
