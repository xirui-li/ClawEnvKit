    - Luna Cafe team lunch
    - CloudTune plugin subscription
    type: keywords_absent
  name: output_avoids_unrelated_charges
  weight: 0.08
- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the task
      end-to-end. A perfect score requires: (1) correctly identifying the relevant
      transaction as txn_11604, ''MetroCourier oversize instrument handling,'' amount
      $34.60, rather than unrelated transactions like txn_11601, txn_11603, or txn_11605;
      (2) stating that the agent verified the rehearsal studio''s public policy via
      web search/fetch and summarizing whether instrument delivery or handling fees
      for booked rehearsals are reimbursable; (3) indicating that an expense report
      was submitted if the policy supports reimbursement; (4) providing a concise
      but actionable final response that includes the reimbursement decision and submitted
      report outcome. Score 1.0 if all elements are correct and specific, 0.5 if partially
      correct or vague on the policy/result, 0.0 if the wrong transaction is chosen
      or the policy conclusion is unsupported.'
    type: llm_judge
  name: quality_of_verification_and_summary
  weight: 0.2
