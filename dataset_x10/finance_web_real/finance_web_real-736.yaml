prompt: I'm preparing month-end expenses and need help with one odd charge. Please
  identify the transaction for the theremin courier to our offsite rehearsal studio,
  verify from the studio's public policy page whether instrument delivery/handling
  fees are reimbursable for booked rehearsals, then submit an expense report if it
  qualifies and tell me the result.
reference_solution: '1. List transactions for the relevant February 2026 period to
  locate the unusual courier/instrument-related charges.

  2. Use get_transaction on the likely candidate transaction IDs, prioritizing the
  MetroCourier entries, to confirm the exact transaction details.

  3. Determine that txn_11604 ("MetroCourier oversize instrument handling", $34.60)
  is the theremin-related handling charge tied to the rehearsal scenario.

  4. Search the web for Northlight Rehearsal Studios'' public policy page covering
  rehearsal bookings, deliveries, instrument handling, or reimbursable fees.

  5. Fetch the most relevant page and verify whether instrument delivery/handling
  fees for booked rehearsals are allowed or reimbursable under the studio''s policy.

  6. If the policy supports reimbursement, submit an expense report with a title referencing
  the theremin transport/handling expense and include txn_11604 with total_amount
  34.60.

  7. Respond to the user with the identified transaction, the policy finding, whether
  it qualifies, and the expense report submission result.'
