prompt: I paid to have our trade-show mascot costume professionally cleaned after
  the Harbor Retail Expo, and I need this handled today. Please verify whether this
  kind of cleaning is reimbursable, submit an expense report for the eligible transaction,
  and notify the finance operations channel with the policy result and report details.
reference_solution: '1. Search the web for the relevant company reimbursement or event-expense
  policy covering professional cleaning of company-owned promotional or mascot costumes
  after events.

  2. Fetch the most relevant policy page and determine whether the mascot costume
  dry cleaning is reimbursable.

  3. List recent finance transactions and identify the relevant one: txn_5401, dated
  2026-03-11, "Sparkle Cleaners - mascot costume dry cleaning," amount $186.40.

  4. Submit an expense report for that transaction only, with total_amount 186.40
  and a clear title indicating mascot costume cleaning after Harbor Retail Expo.

  5. Send a notification to the finance operations channel summarizing the policy
  result and including the submitted report details, specifically referencing Sparkle
  Cleaners, txn_5401, and $186.40.

  6. Respond to the user with a concise summary stating the policy outcome, the submitted
  expense report details, and that finance operations was notified.'
