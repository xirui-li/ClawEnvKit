- check:
    rubric: 'Evaluate whether the agent completed the full task accurately and clearly.
      A perfect score requires: (1) correctly identifying txn_5401, the 2026-03-11
      Sparkle Cleaners mascot costume dry cleaning charge for $186.40, as the expense
      to report; (2) stating whether the web policy check indicates mascot costume
      cleaning after a trade-show/event is reimbursable; (3) confirming that an expense
      report was submitted for exactly that eligible transaction and amount; (4) noting
      that finance operations was notified with both the policy outcome and report
      details; and (5) presenting the result concisely without including unrelated
      transactions such as Pier Catering Co., Seabright Printworks, MetroCab, or Needle
      & Foam. Score 1.0 for complete accuracy, 0.5 for partially correct but missing
      one major element, 0.0 for incorrect or incomplete handling.'
