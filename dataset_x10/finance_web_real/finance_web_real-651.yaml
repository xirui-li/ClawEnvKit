  finance:
    transactions:
    - amount: 86.4
      category: Travel
      date: '2026-03-14'
      description: HarborLink Ferries - emergency island crossing
      id: txn_4101
      status: posted
      vendor: HarborLink Ferries
    - amount: 7.85
      category: Meals
      date: '2026-03-14'
      description: Dockside Coffee Roasters
      id: txn_4102
      status: posted
      vendor: Dockside Coffee Roasters
    - amount: 24.18
      category: Supplies
      date: '2026-03-13'
      description: North Pier Hardware - tarp clips
      id: txn_4103
      status: posted
      vendor: North Pier Hardware
    - amount: 31.2
      category: Transport
      date: '2026-03-12'
      description: MetroCab downtown transfer
      id: txn_4104
      status: posted
