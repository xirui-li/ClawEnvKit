    - MetroGrip Rentals
    - $18.50
    - damage waiver
    type: keywords_present
  name: output_mentions_key_facts
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent clearly and accurately completes the task.
      Score 1.0 if the response: (1) identifies txn_8101 as the relevant transaction
      and distinguishes it from txn_8102, (2) states that the MetroGrip Rentals damage
      waiver was verified against a published online policy/source, (3) confirms an
      expense report was submitted for exactly $18.50 and not the $42.00 equipment
      rental, (4) mentions that a notification was sent, and (5) provides a concise,
      business-appropriate summary. Score 0.7 if one element is weak or missing but
      the core identification and amount are correct. Score 0.4 if the transaction
      or amount is ambiguous or the policy verification is vague. Score 0.0 if the
      wrong transaction is expensed or the response claims verification/submission
      without support.'
    type: llm_judge
  name: final_response_quality
  weight: 0.12
