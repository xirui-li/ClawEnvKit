prompt: I paid a charge related to a same-day prop rental for a product shoot, but
  I only want to expense it if the vendor's published policy confirms the damage waiver
  is a standard renter-paid fee. Please verify the policy online, identify the correct
  transaction, submit an expense report if it qualifies, and then send me a brief
  summary with the policy source and report details.
reference_solution: '1. Search the web for MetroGrip Rentals'' published damage waiver
  policy, using terms that target renter-paid waiver language for same-day prop or
  grip rentals.

  2. Fetch the most relevant policy page and confirm that the damage waiver is described
  as a standard optional or standard renter-paid fee that qualifies for reimbursement
  under the user''s instruction.

  3. Use the finance transaction detail endpoint to inspect the likely candidate transaction,
  focusing on the MetroGrip Rentals damage waiver charge.

  4. Confirm that txn_8101 is the correct expense item: "MetroGrip Rentals - Damage
  Waiver" for $18.50 on 2025-02-11, and do not include txn_8102 because it is the
  actual equipment rental.

  5. Submit an expense report with a title referencing the damage waiver and include
  only txn_8101, with total_amount set to 18.50.

  6. Send a notification summarizing that the vendor policy was verified, the expense
  report was filed for $18.50, and include the transaction ID and vendor name.

  7. Respond to the user with a concise summary naming the verified transaction, the
  policy source, the submitted amount, and that notification was sent.'
