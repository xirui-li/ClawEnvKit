prompt: Our aerial media team needs an expense report for a replacement drone battery
  purchase, but only if it complies with current FAA guidance for carrying lithium-ion
  batteries on aircraft. Review the relevant policy online, find the qualifying transaction
  from March 2026, submit the expense report, and then send a short notification to
  travel ops summarizing the policy takeaway and what you submitted.
reference_solution: '1. Search the web for current FAA guidance on lithium-ion batteries
  in air travel, focusing on official FAA pages about spare lithium batteries in carry-on
  versus checked baggage.

  2. Fetch a relevant result to confirm the policy takeaway: spare/uninstalled lithium-ion
  batteries should be carried in carry-on baggage and are generally not permitted
  in checked baggage.

  3. List finance transactions for March 2026.

  4. Identify the qualifying battery purchase: txn-4101, dated 2026-03-03, description
  "SkyVolt X4 intelligent flight battery replacement," vendor RotorWorks Supply, amount
  $289.99.

  5. Submit an expense report for that transaction with a title that clearly indicates
  it is for the drone battery replacement and a total_amount of 289.99.

  6. Send a notification to travel ops summarizing the FAA policy takeaway and noting
  that the expense report for txn-4101 was submitted.

  7. Respond to the user with a concise summary of the policy finding, the transaction
  selected, the amount, and confirmation that the report and notification were completed.'
