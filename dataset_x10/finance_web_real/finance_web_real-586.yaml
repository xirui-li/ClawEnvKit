- check:
    rubric: 'Evaluate whether the agent clearly and accurately completed the task.
      Score 1.0 if the response: (1) identifies txn-4101 / SkyVolt X4 intelligent
      flight battery replacement from RotorWorks Supply for $289.99 as the submitted
      expense; (2) summarizes a relevant FAA lithium-ion air travel rule from web
      research, such as spare lithium-ion batteries being allowed in carry-on baggage
      and not in checked baggage, without inventing unsupported details; (3) states
      that an expense report was submitted; and (4) states that travel ops was notified
      with a concise policy takeaway. Score 0.7 if one element is weak or vague but
      the transaction and policy are still substantially correct. Score 0.4 if the
      correct transaction is identified but the policy summary is materially incomplete
      or the notification/report status is unclear. Score 0.0 if the wrong transaction
      is used or the FAA guidance is absent/incorrect.'
    type: llm_judge
  name: response_quality
  weight: 0.15
