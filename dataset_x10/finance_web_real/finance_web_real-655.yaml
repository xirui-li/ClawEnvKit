prompt: I'm preparing month-end expenses for a late-night observatory vendor visit.
  Please confirm from our travel/expense policy whether a taxi taken after public
  transit stops is reimbursable, then submit an expense report for the eligible transaction
  from March 2025 and send a brief notification to the finance channel with the policy
  basis, report title, and total.
reference_solution: '1. Search the web for the company''s travel and expense policy,
  specifically looking for rules about taxi or car-service reimbursement when public
  transit is no longer available late at night.

  2. Fetch the most relevant policy page and confirm that late-night taxi transportation
  is reimbursable when transit has stopped running or is unavailable.

  3. List March 2025 transactions and identify the eligible observatory-related taxi
  expense: txn_3102 for Yellow Cab on 2025-03-14 in the amount of $68.40.

  4. Submit an expense report with title ''Late-night observatory taxi reimbursement'',
  including transaction txn_3102 and total_amount 68.40.

  5. Send a notification to the finance channel summarizing the policy basis, the
  report title, and the total submitted.

  6. Respond to the user with a concise summary of the policy finding, the selected
  transaction, the submitted report title, total amount, and confirmation that finance
  was notified.'
