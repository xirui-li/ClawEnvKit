- check:
    rubric: 'Evaluate whether the agent completed the task accurately and clearly.
      Score 1.0 if the response: (a) identifies txn_3102, the 2025-03-14 Yellow Cab
      ride from Ridgeview Observatory, as the reimbursable transaction; (b) states
      the amount as $68.40; (c) explains that reimbursement is allowed based on a
      policy allowing taxi/car service when public transit is unavailable or has stopped
      running late at night; (d) confirms submission of an expense report titled ''Late-night
      observatory taxi reimbursement''; and (e) mentions that a notification was sent
      to finance with the policy basis and total. Score 0.5 if one major element is
      missing or vague but the transaction and amount are correct. Score 0.0 if the
      wrong transaction is chosen, the policy conclusion is unsupported/incorrect,
      or the report submission outcome is not conveyed.'
    type: llm_judge
  name: high_quality_result
  weight: 0.15
