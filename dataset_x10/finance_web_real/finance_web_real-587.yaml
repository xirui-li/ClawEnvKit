    - txn_7813
    - txn_7814
    - txn_7815
    - txn_7816
    type: keywords_absent
  name: output_avoids_unrelated_transactions
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent completed the full business task accurately
      and clearly. Score 1.0 if the response: (a) identifies the correct reimbursable
      transaction as txn_7812 for SkyBridge Airlines checked baggage fee, amount $45.00;
      (b) states that the airline baggage policy was verified from a fetched web source
      and includes a usable source reference or URL; (c) explains whether the fee
      fits the policy for domestic economy checked baggage; (d) confirms an expense
      report was submitted for the baggage charge only, not unrelated items like Harbor
      Hotel txn_7813 or seat selection txn_7815; and (e) mentions that a notification
      was sent to the travel team. Score 0.7 if one element is weak or missing. Score
      0.4 if the correct transaction is identified but policy verification, submission
      status, or notification status is unclear. Score 0.0 if the wrong transaction
      is used or the response invents unsupported policy details.'
    type: llm_judge
  name: quality_of_verification_and_reporting
  weight: 0.2
