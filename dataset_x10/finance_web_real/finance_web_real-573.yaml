prompt: I'm preparing reimbursement for a one-day field research trip to visit branch
  locations. Please verify the current IRS standard mileage rate for business travel,
  then submit an expense report using the eligible travel-related transactions from
  March 2025 and tell me what you included, the total submitted amount, and the mileage
  rate source you used.
reference_solution: '1. Search the web for the current IRS standard mileage rate for
  business travel and open an authoritative result, ideally from IRS.gov, to verify
  the rate.

  2. Review March 2025 finance transactions.

  3. Determine which transactions are eligible for reimbursement in a mileage-based
  field research report: include tolls and parking tied to the trip, but exclude fuel
  because it is already covered by the standard mileage rate; also exclude meals,
  office supplies, and pending items.

  4. Submit an expense report with a title referencing the field research trip and
  include txn-3102 and txn-3103 only, for a total of $32.00.

  5. Respond with a concise summary naming the included transactions, the submitted
  total, and the mileage-rate source used.'
