- check:
    rubric: 'Evaluate whether the agent correctly completes the reimbursement task.
      Score 1.0 if the response: (1) states that the IRS business mileage rate was
      verified from an authoritative source such as IRS.gov, (2) clearly explains
      that fuel should not be reimbursed separately when using the standard mileage
      rate, (3) identifies the eligible March 2025 travel transactions as txn-3102
      FasTrak $8.00 and txn-3103 Civic Center Garage $24.00 while excluding txn-3101
      Shell fuel $42.18, txn-3104 Green Table Cafe meal $36.40, txn-3105 Staples office
      supply $19.87, and pending txn-3106 Lyft $31.55, and (4) reports the submitted
      total as $32.00. Score 0.5 if most of these are correct but one material omission
      or mistake exists. Score 0.0 if the included/excluded transactions or total
      are materially wrong.'
    type: llm_judge
  name: quality_of_policy_check_and_report_summary
  weight: 0.2
