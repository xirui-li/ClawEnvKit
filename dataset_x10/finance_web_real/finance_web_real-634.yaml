prompt: Our harbor operations team needs an expense report filed for last week's emergency
  marina fuel spill response, but only for transactions that comply with the current
  EPA small-spill disposal guidance. Verify the guidance online, submit the eligible
  expenses, and send a notification to Harbor Ops with the report summary and any
  compliance note they should keep on file.
reference_solution: '1. List finance transactions covering 2026-03-11 through 2026-03-13.

  2. Identify the transactions plausibly related to the marina fuel spill response:
  txn-8401, txn-8402, and txn-8404. Exclude txn-8403 because it is a meal expense
  and txn-8405 because it is unrelated maintenance.

  3. Search the web for current EPA guidance on small fuel or oil spill cleanup/disposal,
  then fetch a relevant authoritative page to confirm that absorbents, contaminated
  cleanup materials, and hazardous waste pickup/disposal should be handled and documented
  appropriately.

  4. Submit an expense report titled with marina fuel spill response language, including
  transactions txn-8401, txn-8402, and txn-8404, for a total of $680.62.

  5. Send a notification to Harbor Ops summarizing the submitted report, naming the
  included vendors/expenses, the total amount, and a brief compliance note from the
  EPA guidance.

  6. Respond to the user with a concise summary of what was submitted, the total,
  what was excluded, and that Harbor Ops was notified.'
