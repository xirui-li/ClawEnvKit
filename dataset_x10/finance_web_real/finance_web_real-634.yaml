  weight: 0.1
- check:
    keywords:
    - txn-8401
    - txn-8402
    - txn-8404
    - '680.62'
    - EPA
    type: keywords_present
  name: output_mentions_key_expenses_and_total
  weight: 0.1
- check:
    keywords:
    - txn-8403 approved
    - txn-8405 approved
    type: keywords_absent
  name: output_excludes_noneligible_items
  weight: 0.05
- check:
    rubric: 'Evaluate whether the agent completed the task accurately and clearly.
      A perfect response should: (1) identify the eligible spill-response expenses
      as txn-8401 Absorbent pads for Dock C fuel spill response ($186.40), txn-8402
      Contractor invoice for hazardous waste drum pickup ($420.00), and txn-8404 Nitrile
      gloves and disposal bags for spill cleanup ($74.22); (2) exclude txn-8403 Crew
      lunch during spill response ($58.75) and txn-8405 Replacement mooring rope unrelated
      to spill ($96.10) as not appropriate for this report; (3) state the correct
      total of $680.62; (4) mention that EPA guidance was checked online and summarize
      a relevant compliance note about proper containment/disposal/documentation for
      small fuel spill cleanup materials; and (5) mention that Harbor Ops was notified
      with the report summary. Score 1.0 for fully correct and complete, 0.5 for minor
      omissions or slight ambiguity, 0.0 for major errors in eligibility, total, or
      missing notification/compliance context.'
    type: llm_judge
  name: overall_quality
  weight: 0.07
