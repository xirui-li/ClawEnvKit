- check:
    rubric: Evaluate whether the agent clearly explains that the reimbursable item
      is transaction txn-8101 for ClearAir Supply Co. in the amount of $46.72, and
      that it qualifies based on the online policy for necessary facility/office environmental
      maintenance or similar operational supplies. Score 1.0 if the response accurately
      states what was submitted, cites a plausible policy basis from the web research,
      notes that a notification was sent to operations, and avoids including unrelated
      transactions like txn-8102, txn-8103, txn-8104, or txn-8105. Score 0.5 if it
      gets the right transaction and amount but gives weak or incomplete policy justification
      or omits the notification. Score 0.0 if it submits or describes the wrong expense,
      wrong amount, or lacks policy grounding.
    type: llm_judge
  name: response_quality_and_policy_reasoning
  weight: 0.08
