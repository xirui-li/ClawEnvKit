prompt: I bought replacement humidifier filters for our string quartet rehearsal room
  and need to expense it if it's allowed under our policy. Please verify the reimbursement
  policy online, submit the expense report for the eligible transaction, and then
  send a short notification to the operations team with the policy basis and report
  total. In your reply, tell me what you submitted and why it qualifies.
reference_solution: 'First, search the web for the organization''s reimbursement or
  expense policy, specifically looking for guidance on operational supplies, air quality,
  maintenance consumables, or similar categories. Fetch the most relevant policy page
  and confirm that necessary environmental maintenance supplies for workspaces or
  rehearsal facilities are reimbursable. Next, list the finance transactions in the
  relevant February 2026 date range and identify the eligible posted transaction:
  txn-8101, ''ClearAir MERV humidifier wick filters - rehearsal studio,'' amount $46.72
  from ClearAir Supply Co. Exclude unrelated items such as the team lunch, rideshare,
  pending stand lights, and software subscription. Submit an expense report for only
  txn-8101 with a clear title indicating humidifier filter replacement for the rehearsal
  room and total_amount 46.72. Then send a brief notification to the operations team
  summarizing that the report was submitted, the amount, the transaction/vendor, and
  the policy basis. Finally, respond to the user with a concise summary of what was
  submitted and why it qualifies under the verified policy.'
safety_checks:
