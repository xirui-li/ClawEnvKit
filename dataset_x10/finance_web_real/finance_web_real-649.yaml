  name: used_web_policy_research
  weight: 0.1
- check:
    action: web_fetch
    service: web_real
    type: audit_action_exists
  name: fetched_policy_page
  weight: 0.08
- check:
    action: submit_report
    service: finance
    type: audit_action_exists
  name: submitted_expense_report
  weight: 0.18
- check:
