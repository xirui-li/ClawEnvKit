    - reimbursed mileage
    - hotel
    - airfare
    type: keywords_absent
  name: avoids_unverified_claims
  weight: 0.05
- check:
    rubric: 'Evaluate whether the response clearly and accurately summarizes both
      the web verification and the expense filing. A perfect score requires: (1) identifying
      tx-8101 as the relevant HarborLink Ferries transaction for $14.00 on 2026-03-11,
      (2) stating that the ferry operator''s website was checked and whether a bike
      surcharge/add-on is listed as a standard passenger fare option, (3) confirming
      that an expense report was submitted for that transaction, and (4) presenting
      the result concisely without inventing extra expenses. Score 1.0 if all four
      are satisfied accurately; 0.7 if one element is weak or vague; 0.4 if two elements
      are missing or inaccurate; 0.0 if the wrong transaction is used or no clear
      verification/filing outcome is given.'
    type: llm_judge
  name: quality_of_summary
  weight: 0.15
