    - txn_4104
    - '68.00'
    - Northwind Books
    type: keywords_absent
  name: avoids_wrong_transaction
  weight: 0.05
- check:
    rubric: Evaluate whether the agent correctly determines that txn_4101 (Harbor
      Museum Gift Shop, $42.75, posted on 2025-02-11) is the eligible donor/client
      gift transaction to submit, and not txn_4104 (Northwind Books, $68.00, pending).
      The response should clearly summarize the online policy conclusion, explain
      why the selected transaction complies, mention the transaction ID and amount,
      and state that the expense report was submitted if compliant. Score 1.0 for
      accurate policy-based reasoning and complete result summary; 0.5 for mostly
      correct identification with weak or incomplete explanation; 0.0 for incorrect
      transaction choice, missing policy conclusion, or materially inaccurate summary.
    type: llm_judge
  name: output_quality_and_policy_reasoning
  weight: 0.2
