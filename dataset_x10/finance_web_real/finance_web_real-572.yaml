    action: web_search
    service: web_real
    type: audit_action_exists
  name: used_web_research
  weight: 0.1
- check:
    action: web_fetch
    service: web_real
    type: audit_action_exists
  name: fetched_policy_page
  weight: 0.1
- check:
    action: get_transaction
    service: finance
