- check:
    rubric: 'Evaluate whether the response clearly and accurately: (1) states that
      the agent checked current web guidance rather than assuming policy; (2) explains
      the reimbursement caveat that emergency replacement clothing is often only reimbursable
      when directly tied to business travel disruption, necessity, and company policy/receipts,
      not as ordinary personal apparel; (3) identifies txn_8701 (MetroStyle Menswear
      - emergency suit shirt and tie, $142.35) as the eligible transaction; (4) indicates
      that an expense report was submitted for exactly $142.35; and (5) briefly notes
      why the other fixture transactions are not the wardrobe replacement expense.
      Score 1.0 for complete, accurate coverage of all five elements; 0.7 if one element
      is weak or missing; 0.4 if the correct transaction and amount are given but
      policy caveats or submission clarity are lacking; 0.0 if the wrong transaction
      is chosen or the report status is misstated.'
    type: llm_judge
  name: quality_of_policy_assessment_and_submission_summary
  weight: 0.2
