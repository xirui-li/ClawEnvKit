prompt: I had to buy replacement wardrobe items during a live investor roadshow after
  airline damage delayed our garment case. Please confirm from current web guidance
  whether emergency business-attire replacement is generally reimbursable as a business
  expense, then submit an expense report using the eligible transaction and tell me
  what you filed and any caveats.
reference_solution: '1. Search the web for current guidance on whether emergency replacement
  business attire caused by travel disruption or delayed baggage can be reimbursable
  as a business expense.

  2. Fetch at least one relevant result to confirm the nuance: such purchases may
  be reimbursable when necessary for business duties during travel, but they are often
  subject to company policy and documentation requirements because clothing is normally
  personal.

  3. List the available finance transactions in the relevant March 2026 date range.

  4. Identify the transaction that matches the user''s scenario: txn_8701, MetroStyle
  Menswear - emergency suit shirt and tie, amount $142.35.

  5. Submit an expense report using txn_8701 only, with total_amount set to 142.35
  and a clear title such as "Emergency wardrobe replacement during investor roadshow".

  6. Respond to the user with a concise summary that says current guidance suggests
  this type of expense can be reimbursable when it was necessary due to travel disruption
  and supported by policy/receipts, confirms the submitted report details, and mentions
  any caveat that final approval depends on internal policy.'
