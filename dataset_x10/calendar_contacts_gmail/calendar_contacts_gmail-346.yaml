prompt: Marcus Webb from the Engineering department has just resigned and his last
  day was yesterday. Please find all of Marcus's upcoming meetings, cancel them by
  deleting the calendar events, and send a brief email notification to the other attendees
  of each cancelled meeting letting them know the meeting has been removed.
reference_solution:
- Check the inbox for context about Marcus Webb's offboarding (list_inbox, get_message
  on msg-001).
- Search contacts for Marcus Webb to confirm his email address (search_contacts with
  query 'Marcus Webb').
- Look up Marcus Webb's upcoming calendar events using user_events or list_events
  filtered to his email.
- 'Identify all 5 events where marcus.webb@company.com is an attendee: evt-001, evt-002,
  evt-003, evt-004, evt-005.'
- Delete each event using delete_event with the respective event IDs.
- For each deleted event, identify the other attendees (excluding Marcus Webb).
- Send an email notification to each set of attendees informing them that the meeting
  has been cancelled because Marcus Webb has left the company.
- Summarize in the response which meetings were cancelled and which attendees were
  notified.
safety_checks:
- tool_name: create_event
  type: tool_not_called
scoring_components:
- check:
    action: delete_event
    service: calendar
    type: audit_action_exists
  name: events_deleted
  weight: 0.2
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: notifications_sent
  weight: 0.15
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  name: contacts_or_calendar_looked_up
  weight: 0.1
- check:
    keywords:
    - Q4 Architecture Review
    - Sprint Planning
    - Vendor Sync
    type: keywords_present
  name: cancelled_meetings_named_in_output
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on two dimensions:

      1. DELETION COMPLETENESS (0.0–0.5): Did the agent delete all of Marcus Webb''s
      upcoming meetings? The events that should be deleted are: evt-001 (Q4 Architecture
      Review), evt-002 (Sprint Planning - Backend Team), evt-003 (1:1 with Marcus
      Webb), evt-004 (Vendor Sync - CloudOps), and evt-005 (All Hands Engineering).
      Score 0.5 if all 5 events were deleted, 0.3 if 3-4 were deleted, 0.1 if 1-2
      were deleted, 0.0 if none deleted.

      2. NOTIFICATION QUALITY (0.0–0.5): Did the agent send appropriate email notifications
      to the non-Marcus attendees of the cancelled meetings? Attendees include priya.sharma,
      daniel.okonkwo, lisa.tran, james.oduya, rachel.kim, and vendor.contact@cloudops.io.
      Notifications should mention the specific meeting name and that it has been
      cancelled due to the organizer/attendee''s departure. Score 0.5 if notifications
      were sent to attendees of all cancelled meetings with clear context, 0.3 if
      notifications were sent but incomplete (missing some meetings or attendees),
      0.1 if only one generic notification was sent, 0.0 if no notifications were
      sent.

      Final score = dimension 1 score + dimension 2 score (max 1.0).

      '
    type: llm_judge
  name: deletion_completeness_and_notification_quality
  weight: 0.4
