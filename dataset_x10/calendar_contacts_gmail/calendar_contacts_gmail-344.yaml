prompt: 'I''ve heard there might be a scheduling conflict with our upcoming board
  meeting. Can you look up the details of event EVT-101, check whether any of the
  attendees have other commitments on that same day, and then send an email to Sarah
  Chen (our executive coordinator) summarizing what you found — including the event
  details, any conflicts you discovered, and a recommendation on whether the meeting
  should be rescheduled?

  '
reference_solution: '1. Call get_event with event_id="EVT-101" to retrieve full details
  of the Q3 Board of Directors Meeting (Sept 12, 09:00–12:00, Executive Boardroom,
  Floor 22). 2. Call user_events for each key attendee (marcus.holt@company.com, diana.reyes@company.com,
  james.okafor@company.com) on date="2024-09-12" to discover their other commitments
  on that day. 3. Identify conflicts: Marcus Holt has EVT-202 (Investor Roadshow,
  08:00–11:00) which overlaps with the board meeting; Diana Reyes has EVT-303 (Legal
  Deposition, 10:00–13:00) which also overlaps. James Okafor''s EVT-404 (14:00–16:00)
  does not conflict. 4. Call search_contacts with query="Sarah Chen" to retrieve her
  contact details and confirm her email (sarah.chen@company.com). 5. Call send_email
  to sarah.chen@company.com with a subject such as "Q3 Board Meeting — Scheduling
  Conflicts Found" and a body summarizing: the board meeting details from EVT-101,
  the two conflicts (Marcus Holt and Diana Reyes with their respective events), the
  non-conflicting attendee (James Okafor), and a recommendation to consider rescheduling
  the board meeting to a date when all key attendees are available. 6. Report the
  findings and the sent email summary as text output.'
