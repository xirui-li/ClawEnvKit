- check:
    rubric: 'Evaluate the agent''s output on three dimensions:

      1. ACCURACY OF CONFLICT IDENTIFICATION (0–0.4): Did the agent correctly identify
      that Marcus Holt (EVT-202, Investor Roadshow Kickoff, 08:00–11:00) overlaps
      with the board meeting (EVT-101, 09:00–12:00), and that Diana Reyes (EVT-303,
      Legal Deposition, 10:00–13:00) also overlaps? Did the agent correctly note that
      James Okafor''s event (EVT-404, 14:00–16:00) does NOT conflict? Score 0.4 if
      all three assessments are correct, 0.2 if only two are correct, 0.0 if fewer
      than two.

      2. COMPLETENESS OF EMAIL TO SARAH CHEN (0–0.4): Did the agent compose and send
      an email to sarah.chen@company.com that includes: (a) the board meeting details
      from EVT-101, (b) the two confirmed conflicts with named attendees and their
      conflicting events, and (c) a clear recommendation about rescheduling? Score
      0.4 if all three elements are present, 0.2 if two are present, 0.1 if only one
      is present.

      3. CLARITY AND PROFESSIONALISM (0–0.2): Is the agent''s final text output well-organized,
      professional in tone, and easy for Sarah Chen to act on? Score 0.2 if excellent,
      0.1 if adequate but missing structure or clarity, 0.0 if confusing or incomplete.

      Total score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: quality_of_summary_and_recommendation
  weight: 0.3
