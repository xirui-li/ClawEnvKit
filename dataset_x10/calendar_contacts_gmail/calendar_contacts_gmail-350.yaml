tools:
- description: List calendar events for a given date range
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get details of a specific calendar event by ID
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Search contacts by name, email, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get a contact's full details by contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a direct message to a contact by contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
- description: List emails in the inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a specific email message by ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
