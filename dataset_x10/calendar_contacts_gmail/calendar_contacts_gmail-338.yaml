- check:
    rubric: 'Evaluate whether the agent sent a follow-up summary email to the event
      organizer Daniel Torres (daniel.torres@company.com). The summary should name
      all five attendees who were notified (Priya Nair, Marcus Webb, Sofia Delgado,
      James Okafor, Rachel Kim), confirm that each received a cancellation message,
      and mention that a new date will be communicated. Score 1.0 if the summary is
      complete, names all five attendees, and is addressed to Daniel Torres. Score
      0.6 if the summary is sent to Daniel Torres but omits one or two attendee names.
      Score 0.3 if a summary email was sent but is missing significant detail or sent
      to the wrong person. Score 0.0 if no summary email was sent to the organizer.

      '
    type: llm_judge
  name: organizer_summary_quality
  weight: 0.2
- check:
    rubric: 'Evaluate the quality and completeness of the individual cancellation
      messages sent to each attendee of event evt-501 (Q3 Team Retrospective on 2024-07-17).
      Each message should: (1) clearly state the Q3 Team Retrospective is cancelled,
      (2) mention the reason (conflict with executive offsite), and (3) indicate a
      new date will be communicated soon. Score 1.0 if all five attendees (Priya Nair,
      Marcus Webb, Sofia Delgado, James Okafor, Rachel Kim) received clear, complete,
      and professional messages meeting all three criteria. Score 0.7 if all five
      were messaged but one or more messages are missing a criterion (e.g., no reason
      given). Score 0.4 if only some attendees were messaged or messages are vague.
      Score 0.0 if no individual messages were sent to attendees.

      '
    type: llm_judge
  name: cancellation_message_quality
  weight: 0.2
