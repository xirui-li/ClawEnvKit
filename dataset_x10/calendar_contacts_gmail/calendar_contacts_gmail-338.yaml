prompt: 'Our quarterly team retrospective scheduled for this week has been cancelled
  due to a conflict with the executive offsite. Please find the retrospective event
  on the calendar, look up each attendee''s contact information, and send each of
  them a personal message letting them know the meeting is cancelled and that a new
  date will be communicated soon. Also send a follow-up email to the event organizer
  summarizing who you notified.

  '
reference_solution: '1. Call list_events for the current week to find the Q3 Team
  Retrospective (evt-501) on 2024-07-17. 2. Call get_event with event_id=evt-501 to
  retrieve the full attendee list: priya.nair@company.com, marcus.webb@company.com,
  sofia.delgado@company.com, james.okafor@company.com, rachel.kim@company.com, and
  organizer daniel.torres@company.com. 3. For each attendee email, call search_contacts
  to find their contact record and retrieve their contact_id (cnt-101 through cnt-105).
  4. Call send_message for each of the five attendees (cnt-101 through cnt-105) with
  a message stating the Q3 Team Retrospective is cancelled due to the executive offsite
  conflict and that a new date will be shared soon. 5. Look up Daniel Torres (cnt-106)
  via search_contacts or get_contact. 6. Call send_email to daniel.torres@company.com
  with a summary listing all five attendees who were notified of the cancellation.
  7. Report back to the user confirming all five attendees were messaged and the organizer
  was emailed with a summary.'
