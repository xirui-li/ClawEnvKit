prompt: A colleague has sent you an email requesting to schedule a Quarterly Business
  Review meeting. Check your inbox for the details, look up the attendees in the contacts
  directory to get their emails, check everyone's availability for the proposed date,
  and then create the calendar event with all the right details. Summarize what you
  did and confirm the event has been created.
reference_solution:
- Call list_inbox to retrieve recent emails and identify the scheduling request from
  Sarah Chen (msg-001).
- 'Call get_message with message_id msg-001 to read the full email and extract: attendees
  (Marcus Webb, Diana Okafor, Tom Reyes), date (July 22 2025), time (2:00–4:00 PM),
  location (Executive Boardroom, Floor 12).'
- Call search_contacts for each attendee name (Marcus Webb, Diana Okafor, Tom Reyes)
  to retrieve their email addresses from the contacts directory.
- Call user_events for each attendee (marcus.webb@company.com, diana.okafor@company.com,
  tom.reyes@company.com) on July 22 2025 to verify they are free from 2:00–4:00 PM.
  Note existing events but confirm the 2–4 PM window is clear.
- Call create_event with title 'Q3 Business Review', start_time '2025-07-22T14:00:00',
  end_time '2025-07-22T16:00:00', attendees [marcus.webb@company.com, diana.okafor@company.com,
  tom.reyes@company.com, sarah.chen@company.com], location 'Executive Boardroom, Floor
  12'.
- 'Summarize the outcome: confirm the event was created, list the attendees and their
  email addresses, note the time and location, and mention that availability was verified
  with no conflicts in the 2–4 PM window.'
