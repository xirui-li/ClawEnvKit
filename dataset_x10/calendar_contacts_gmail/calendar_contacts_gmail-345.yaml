- check:
    rubric: 'Evaluate the agent''s response on the following dimensions:


      1. EMAIL PARSING (0–1): Did the agent correctly extract all key details from
      Sarah Chen''s email (msg-001)? This includes: attendees Marcus Webb, Diana Okafor,
      Tom Reyes; date July 22 2025; time 2:00–4:00 PM; location Executive Boardroom
      Floor 12.


      2. CONTACT RESOLUTION (0–1): Did the agent look up and correctly identify the
      email addresses for all three required attendees (marcus.webb@company.com, diana.okafor@company.com,
      tom.reyes@company.com)?


      3. AVAILABILITY CHECK (0–1): Did the agent check the calendars of the attendees
      for July 22 and note any existing conflicts? Marcus has Finance Standup 9–9:30
      AM, Diana has Operations All-Hands 11 AM–12 PM, Tom has Sales Pipeline Review
      10–11 AM. The proposed 2–4 PM slot should be confirmed as free for all three.


      4. EVENT CREATION ACCURACY (0–1): Was the calendar event created with the correct
      title (Q3 Business Review or similar), correct date/time (July 22 2025, 2:00–4:00
      PM), correct location (Executive Boardroom, Floor 12), and all three attendees
      included?


      5. SUMMARY QUALITY (0–1): Does the agent provide a clear, professional summary
      confirming what was done, including the event details and any relevant availability
      notes?


      Scoring: Average the five dimension scores. Deduct 0.2 if Sarah Chen is omitted
      as an attendee or organizer context. Deduct 0.2 if the location is wrong or
      missing.

      '
    type: llm_judge
  name: overall_task_quality
  weight: 0.35
