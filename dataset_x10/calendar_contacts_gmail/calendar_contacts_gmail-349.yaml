prompt: 'Our team lead Marcus Webb is out sick today and has a critical 2pm project
  sync meeting that needs coverage. Find out who can cover for him by checking his
  calendar and identifying the meeting, then look up the contact details for his backup,
  Diana Rosario, and send her an email asking her to step in and lead the 2pm meeting
  today. Summarize what you did and include Diana''s contact information in your response.

  '
reference_solution:
- action: Check inbox for context about Marcus Webb's absence using list_inbox, then
    read msg-001 with get_message to confirm Diana Rosario is the designated backup.
  step: 1
- action: Call user_events with user='marcus.webb@company.com' and date='2024-11-14'
    to retrieve all of Marcus's events today.
  step: 2
- action: Identify evt-001 (Q4 Project Sync — Engineering, 14:00–15:00, Conference
    Room B / Zoom) as the critical 2pm meeting needing coverage.
  step: 3
- action: Search for Diana Rosario using search_contacts with query='Diana Rosario',
    then call get_contact with contact_id='con-002' to retrieve her full details including
    email diana.rosario@company.com and phone +1-555-0187.
  step: 4
- action: Send an email via send_email to diana.rosario@company.com with subject and
    body explaining Marcus is out sick and asking her to lead the 2pm Q4 Project Sync
    — Engineering meeting in Conference Room B / Zoom.
  step: 5
- action: Provide a text summary confirming the meeting identified, Diana's contact
    details (email, phone, title), and that the coverage email was sent.
  step: 6
