- check:
    rubric: 'Evaluate the email sent to Diana Rosario asking her to cover the 2pm
      Q4 Project Sync — Engineering meeting (evt-001, 2024-11-14 14:00–15:00, Conference
      Room B / Zoom) for Marcus Webb who is out sick. Score 1.0 if the email clearly
      explains the situation (Marcus is sick), names the specific meeting (Q4 Project
      Sync or the 2pm meeting), asks Diana to lead or cover it, and has a professional
      tone. Score 0.7 if the email covers most of these but is missing one element
      (e.g., no mention of location or time). Score 0.4 if the email is vague or missing
      key context about which meeting or why coverage is needed. Score 0.0 if no email
      was sent or the email is addressed to the wrong person.

      '
    type: llm_judge
  name: coverage_email_quality
  weight: 0.2
- check:
    rubric: 'Evaluate the agent''s final text summary of what was accomplished. The
      summary should: (1) Confirm that Marcus Webb''s calendar was checked and the
      2pm Q4 Project Sync (evt-001) was identified as the critical meeting needing
      coverage today (2024-11-14); (2) State that Diana Rosario (diana.rosario@company.com,
      +1-555-0187, Senior Software Engineer) was identified as the backup and her
      contact details were retrieved; (3) Confirm that an email was sent to Diana
      requesting she lead the meeting. Score 1.0 if all three elements are present
      and accurate. Score 0.6 if two of three elements are present. Score 0.3 if only
      one element is present or details are inaccurate. Score 0.0 if the summary is
      missing or entirely incorrect.

      '
    type: llm_judge
  name: summary_completeness
  weight: 0.15
