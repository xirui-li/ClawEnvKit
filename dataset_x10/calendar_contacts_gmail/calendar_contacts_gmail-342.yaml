  method: POST
  name: get_event
  service: calendar
- description: Get all calendar events for a specific user on a given date
  endpoint: /calendar/user_events
  method: POST
  name: user_events
  service: calendar
- description: List recent emails from the inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email message by ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Save an email as a draft without sending it
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
- description: Search for contacts by name, email, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full details of a contact by ID
  endpoint: /contacts/get
