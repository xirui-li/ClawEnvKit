- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: used_email_service_to_send
  weight: 0.1
- check:
    keywords:
    - Daniel Okonkwo
    - Marcus Webb
    type: keywords_present
  name: absent_attendees_identified
  weight: 0.2
- check:
    keywords:
    - daniel.okonkwo@company.com
    - marcus.webb@company.com
    type: keywords_present
  name: recap_email_recipients_correct
  weight: 0.15
- check:
    keywords:
    - Q3 Product Roadmap
    - roadmap
    type: keywords_present
  name: meeting_content_referenced
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s overall performance on this task across three dimensions:

      1. CORRECT IDENTIFICATION OF ABSENT ATTENDEES (0.0–0.4): The agent should have
      identified Daniel Okonkwo (daniel.okonkwo@company.com) and Marcus Webb (marcus.webb@company.com)
      as absent from the Q3 Product Roadmap Review (evt-001) on 2025-07-14 14:00–15:30,
      because Daniel had a conflicting Engineering Standup (evt-002) and Marcus had
      a conflicting Client Call (evt-003) at the same time. Lisa Chen and Sofia Reyes
      should NOT be flagged as absent (no conflicting events). Score 0.4 if both absent
      attendees correctly identified, 0.2 if only one, 0.0 if neither or if present
      attendees are incorrectly flagged.

      2. EMAIL PERSONALIZATION AND CONTENT (0.0–0.4): Each recap email sent to Daniel
      Okonkwo and Marcus Webb should: (a) address the recipient by their first name,
      (b) reference the Q3 Product Roadmap Review meeting, (c) include key agenda
      items from the meeting (e.g., Q2 retrospective, feature prioritization for Q3
      — mobile checkout, API v2, analytics dashboard — resource allocation, timeline
      sign-off), and (d) ask the recipient to review the notes or follow up. Score
      0.4 if both emails are personalized and substantive, 0.2 if emails are sent
      but generic or missing agenda details, 0.0 if no emails sent or completely off-topic.

      3. PROCESS CLARITY IN OUTPUT (0.0–0.2): The agent''s final text response should
      clearly summarize what it did — which attendees were absent and why (conflicting
      events), and confirm that recap emails were sent to each. Score 0.2 if the summary
      is clear and accurate, 0.1 if partial, 0.0 if missing or confusing.

      Total score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: quality_and_completeness
  weight: 0.25
