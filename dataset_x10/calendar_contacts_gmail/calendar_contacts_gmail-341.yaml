prompt: 'I need you to help me follow up after yesterday''s product roadmap review
  meeting. Look up the meeting details, find out which invited attendees were absent
  by checking their calendars for that time slot, and send each absent attendee a
  personalized recap email summarizing the meeting agenda and asking them to review
  the notes. Make sure to address each person by name in the email.

  '
reference_solution: "1. Call get_event with event_id \"evt-001\" to retrieve full\
  \ details of the Q3 Product Roadmap\n   Review, including its attendee list and\
  \ time slot (2025-07-14 14:00–15:30).\n2. Call list_inbox or get_message on msg-001\
  \ to retrieve the meeting agenda details (Q2\n   retrospective, feature prioritization\
  \ — mobile checkout, API v2, analytics dashboard —\n   resource allocation, timeline\
  \ sign-off).\n3. For each attendee (daniel.okonkwo, lisa.chen, marcus.webb, sofia.reyes\
  \ — excluding the\n   organizer priya.sharma), call user_events with the attendee's\
  \ email and date \"2025-07-14\"\n   to check for conflicting events during 14:00–15:30.\n\
  4. Determine that Daniel Okonkwo had a conflicting Engineering Standup (evt-002,\
  \ 14:00–14:30)\n   and Marcus Webb had a conflicting Client Call (evt-003, 13:30–15:00),\
  \ making them the\n   absent attendees. Lisa Chen and Sofia Reyes had no conflicts\
  \ during that window.\n5. Optionally call search_contacts or get_contact to confirm\
  \ full names and email addresses\n   for Daniel Okonkwo (cnt-002) and Marcus Webb\
  \ (cnt-004).\n6. Call send_email twice — once to daniel.okonkwo@company.com and\
  \ once to\n   marcus.webb@company.com — each with a personalized subject like \"\
  Q3 Product Roadmap Review\n   — Meeting Recap\", addressing them by first name,\
  \ summarizing the agenda items, and asking\n   them to review the notes and follow\
  \ up with any questions.\n7. Report in the final text output which attendees were\
  \ absent, why (conflicting calendar\n   events), and confirm that personalized recap\
  \ emails were sent to each."
