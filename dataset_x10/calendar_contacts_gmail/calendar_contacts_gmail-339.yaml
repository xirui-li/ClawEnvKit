prompt: 'I''ve been getting a lot of meeting requests via email lately and I''m worried
  some of them might conflict with events already on my calendar. Please check my
  recent inbox for any meeting invitations or scheduling requests, look up the relevant
  calendar events mentioned, and give me a clear summary of which email requests conflict
  with existing calendar commitments — including who sent the request, what time they
  want to meet, and what''s already blocking that slot.

  '
reference_solution:
- action: Call list_inbox to retrieve recent emails (e.g., days_back=7)
  step: 1
- action: 'Review inbox results and identify emails that contain meeting or scheduling
    requests: msg-101 (Raj Patel, July 18 10:30 AM), msg-102 (Sarah Kim, July 19 2:00
    PM), msg-104 (James Okonkwo, July 22 9:00 AM), msg-106 (Linda Chen, July 24 11:00
    AM). Discard msg-103 (newsletter) and msg-105 (HR reminder) as non-scheduling.'
  step: 2
- action: Call get_message for each scheduling email to confirm the exact requested
    date and time if needed.
  step: 3
- action: Call list_events to retrieve calendar events covering July 18–24.
  step: 4
- action: 'Cross-reference each meeting request against calendar events: July 18 10:30
    AM vs evt-001 Q3 Budget Review (10:00–11:30) → CONFLICT; July 19 2:00 PM vs evt-002
    Product Roadmap Sync (14:00–15:00) → CONFLICT; July 22 9:00 AM vs evt-003 1:1
    with Manager (09:00–09:30) → CONFLICT; July 24 11:00 AM vs evt-005 Client Demo
    - Acme Corp (11:00–12:00) → CONFLICT.'
  step: 5
- action: Optionally call search_contacts or get_contact to enrich sender details
    (title, phone) for the summary.
  step: 6
- action: Present a clear written summary listing each conflicting email request,
    the sender's name and email, the requested time, and the name of the blocking
    calendar event. Note that no action (sending email) should be taken without user
    instruction.
  step: 7
