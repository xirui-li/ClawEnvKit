  weight: 0.1
- check:
    rubric: "Evaluate the agent's conflict analysis across three dimensions:\n1. COMPLETENESS\
      \ (0–0.4): Did the agent correctly identify ALL THREE conflicting email requests?\n\
      \   - msg-101 from Raj Patel (raj.patel@vendor.com): requests July 18 at 10:30\
      \ AM, which overlaps with evt-001 \"Q3 Budget Review\" (10:00–11:30 AM).\n \
      \  - msg-102 from Sarah Kim (sarah.kim@startup.io): requests July 19 at 2:00\
      \ PM, which directly conflicts with evt-002 \"Product Roadmap Sync\" (14:00–15:00).\n\
      \   - msg-104 from James Okonkwo (james.okonkwo@partner.org): requests July\
      \ 22 at 9:00 AM for 2 hours, which overlaps with evt-003 \"1:1 with Manager\"\
      \ (09:00–09:30).\n   - msg-106 from Linda Chen (linda.chen@consulting.com):\
      \ requests July 24 at 11:00 AM, which conflicts with evt-005 \"Client Demo -\
      \ Acme Corp\" (11:00–12:00).\n   Score 0.4 if all four conflicts identified,\
      \ 0.3 if three, 0.2 if two, 0.1 if one, 0.0 if none.\n\n2. ACCURACY (0–0.3):\
      \ For each conflict identified, does the agent correctly name the sender, the\
      \ requested time, and the blocking calendar event title? Deduct 0.05 per factual\
      \ error (wrong name, wrong time, wrong event title).\n3. CLARITY & ACTIONABILITY\
      \ (0–0.3): Is the summary well-organized and easy to act on? Does it clearly\
      \ distinguish conflicting requests from non-conflicting ones (msg-103 newsletter\
      \ and msg-105 HR reminder should NOT be listed as conflicts)? Does it present\
      \ the information in a way that helps the user decide how to respond? Score\
      \ 0.3 for excellent structure, 0.15 for adequate but disorganized, 0.0 for confusing\
      \ or incomplete presentation.\nFinal score = sum of the three dimension scores\
      \ (max 1.0).\n"
    type: llm_judge
  name: conflict_analysis_quality
  weight: 0.45
