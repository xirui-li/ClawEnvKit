prompt: 'Our VIP client Sarah Chen from Meridian Partners is arriving for an onboarding
  session next week. I need you to look up her contact details, check what''s already
  scheduled for her on 2025-02-10, and then find any related emails about her onboarding.
  Based on all of this, give me a full briefing: her contact info, what''s on her
  calendar that day, and a summary of any relevant email correspondence so I can prepare
  properly for her visit.

  '
reference_solution: "1. Call search_contacts with query \"Sarah Chen\" to find her\
  \ contact record and retrieve her contact ID (cnt-001). 2. Call get_contact with\
  \ contact_id \"cnt-001\" to retrieve her full details: title (Chief Strategy Officer),\n\
  \   email (sarah.chen@meridianpartners.com), phone (+1-415-555-0192).\n3. Call list_events\
  \ or user_events for date 2025-02-10 to retrieve all four events scheduled that\
  \ day:\n   Onboarding Kickoff (evt-101), Platform Demo (evt-102), Executive Lunch\
  \ (evt-103), Contract Review (evt-104).\n4. Optionally call get_event on individual\
  \ events to retrieve full attendee and location details. 5. Call list_inbox to retrieve\
  \ recent emails, then call get_message on relevant messages (msg-201, msg-202, msg-203)\n\
  \   to read the full content of onboarding-related correspondence.\n6. Synthesize\
  \ all gathered information into a structured briefing covering:\n   - Sarah Chen's\
  \ contact details and role\n   - The full schedule for February 10 with times, locations,\
  \ and attendees\n   - Key email highlights: her data privacy concern, Linda's note\
  \ about CSO-level treatment,\n     and Marcus Webb joining the technical demo\n\
  \   - Actionable preparation notes for the host"
