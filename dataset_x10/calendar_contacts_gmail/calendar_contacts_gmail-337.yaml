- check:
    rubric: "Evaluate the agent's briefing on Sarah Chen's onboarding visit on 2025-02-10.\
      \ Score on four dimensions:\n1. Contact Information (0.25): Does the output\
      \ include Sarah Chen's full name, title (Chief Strategy Officer),\n   email\
      \ (sarah.chen@meridianpartners.com), and phone (+1-415-555-0192)?\n\n2. Calendar\
      \ Coverage (0.25): Does the output accurately describe all four events on Feb\
      \ 10:\n   (a) Meridian Partners Onboarding Kickoff at 09:00 in Conference Room\
      \ A,\n   (b) Platform Demo & Technical Walkthrough at 11:00 in Tech Lab,\n \
      \  (c) Executive Lunch at 12:30 at The Rooftop Dining Room,\n   (d) Contract\
      \ Review & SLA Discussion at 14:30 in Legal Suite?\n\n3. Email Correspondence\
      \ Summary (0.25): Does the output reference key email threads, including\n \
      \  Sarah's request to focus on data privacy clauses (msg-201), Linda's prep\
      \ checklist noting\n   Sarah is CSO-level (msg-202), and Priya's confirmation\
      \ that Marcus Webb will join the demo (msg-203)?\n\n4. Actionable Preparation\
      \ Value (0.25): Is the briefing organized, professional, and genuinely useful\n\
      \   for someone preparing to host Sarah Chen? Does it highlight important details\
      \ like the data privacy\n   concern and the multi-stakeholder nature of the\
      \ day?\n\nScoring: 1.0 = all four dimensions well-covered; 0.75 = three dimensions\
      \ covered; 0.5 = two dimensions; 0.25 = one dimension; 0.0 = output is missing,\
      \ incoherent, or factually wrong about key details.\n"
    type: llm_judge
  name: briefing_quality
  weight: 0.25
