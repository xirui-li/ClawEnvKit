tools:
- description: Search for contacts by name, email, or keyword
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details for a specific contact by ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: List calendar events for a given date range
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get all calendar events for a specific user on a specific date
  endpoint: /calendar/user_events
  method: POST
  name: user_events
  service: calendar
- description: Get full details of a specific calendar event by ID
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: List recent emails from the inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a specific email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
