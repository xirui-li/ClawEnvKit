- check:
    rubric: 'Evaluate whether the agent successfully created a complete and accurate
      offsite strategy session calendar event based on Sarah Chen''s email (msg-001).

      Score on these dimensions:

      1. Email identification (0–0.2): Did the agent find and read the correct email
      from Sarah Chen about the offsite session?

      2. Attendee resolution (0–0.3): Did the agent look up and correctly include
      all four attendees — Sarah Chen (sarah.chen@company.com), Marcus Webb (marcus.webb@company.com),
      Priya Nair (priya.nair@company.com), and Jordan Okafor (jordan.okafor@company.com)?
      Full credit if all four are included; partial credit (0.15) if 2–3 are included;
      no credit if fewer than 2.

      3. Event details accuracy (0–0.3): Did the agent create the event on October
      17th, 2024, from 9:00 AM to 5:00 PM, with the location "The Riverside Conference
      Center, 42 Harbor Blvd, Suite 300"? Full credit if all three details are correct;
      partial credit (0.15) if 1–2 are correct.

      4. Output clarity (0–0.2): Does the agent''s response clearly confirm what was
      created, listing the event title, date/time, location, and attendees in a readable
      summary?

      Aggregate the four dimension scores into a final score between 0.0 and 1.0.

      '
    type: llm_judge
  name: event_quality_and_completeness
  weight: 0.35
