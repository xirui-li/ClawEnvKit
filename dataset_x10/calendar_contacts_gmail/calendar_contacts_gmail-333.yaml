prompt: A colleague has sent you an email about organizing an offsite strategy session
  for the product team. Find the email, identify the key details (date, time, and
  attendees), look up the attendees' contact information, and create the calendar
  event with all the right participants and the location mentioned in the email.
reference_solution:
- Call list_inbox (POST /gmail/messages) to retrieve recent emails and identify the
  message from Sarah Chen about the offsite strategy session.
- 'Call get_message (POST /gmail/messages/get) with message_id ''msg-001'' to read
  the full email and extract: date (October 17th), time (9:00 AM – 5:00 PM), location
  (The Riverside Conference Center, 42 Harbor Blvd, Suite 300), and attendees (Marcus
  Webb, Priya Nair, Jordan Okafor, Sarah Chen).'
- Call search_contacts (POST /contacts/search) to look up each attendee by name or
  department to retrieve their email addresses.
- 'Confirm the four attendee emails: sarah.chen@company.com, marcus.webb@company.com,
  priya.nair@company.com, jordan.okafor@company.com.'
- Call create_event (POST /calendar/events/create) with title 'Offsite Strategy Session',
  start_time '2024-10-17T09:00:00', end_time '2024-10-17T17:00:00', attendees list
  of all four emails, and location 'The Riverside Conference Center, 42 Harbor Blvd,
  Suite 300'.
- 'Report back to the user confirming the event was created, including all key details:
  title, date, time, location, and the list of attendees.'
