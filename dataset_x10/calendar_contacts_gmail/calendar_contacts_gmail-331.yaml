tools:
- description: List calendar events for a given start date and number of days
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get details of a specific calendar event by ID
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Search for contacts by name, email, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full details of a contact by contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Save a draft email to be reviewed before sending
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
- description: Send an email to a recipient
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
