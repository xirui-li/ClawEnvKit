    - March 14
    type: keywords_present
  name: busy_day_identified
  weight: 0.1
- check:
    rubric: "Evaluate the agent's weekly calendar summary draft intended for sarah.chen@company.com.\
      \ Score on three dimensions:\n1. COMPLETENESS (0–0.4): Does the summary cover\
      \ all 7 events (evt-001 through evt-007)?\n   Specifically: Engineering Standup\
      \ (Mon), Product Roadmap Review (Tue), 1:1 Alex & Tom and Design Sprint Planning\
      \ (Wed),\n   All-Hands Company Meeting and Budget Review with Finance (Thu),\
      \ Sprint Retrospective (Fri).\n   Score 0.4 if all 7 are mentioned, 0.2 if at\
      \ least 4, 0.0 if fewer than 4.\n\n2. CONFLICT/BUSY DAY ANALYSIS (0–0.4): Does\
      \ the agent correctly identify Thursday March 14 as the busiest day\n   (two\
      \ overlapping or back-to-back events: All-Hands 11:00–12:30 and Budget Review\
      \ 14:00–15:00)?\n   Does it note that Wednesday March 13 also has two events?\
      \ Does it flag any attendees (e.g., Sarah Chen, Alex Morgan)\n   who appear\
      \ across multiple events and may be overloaded?\n   Score 0.4 for thorough conflict/busy\
      \ analysis, 0.2 for partial, 0.0 for none.\n\n3. DRAFT QUALITY (0–0.2): Is the\
      \ draft addressed appropriately to Sarah Chen, written in a professional tone,\n\
      \   and structured clearly (e.g., day-by-day or event list with attendee names\
      \ from contacts)?\n   Score 0.2 if professional and well-structured, 0.1 if\
      \ adequate, 0.0 if poor.\n\nTotal score = sum of three dimension scores (max\
      \ 1.0).\n"
    type: llm_judge
  name: summary_quality
  weight: 0.3
