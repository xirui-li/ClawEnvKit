prompt: 'I''m preparing for our quarterly planning kickoff next week and need to understand
  what''s already on the calendar before I start scheduling. Please check the calendar
  for the week of 2024-03-11 (7 days), then look up contact details for any attendees
  you find, and finally draft an email to sarah.chen@company.com summarizing the week''s
  scheduled events, who''s involved, and any potential scheduling conflicts or busy
  days I should be aware of.

  '
reference_solution:
- Call list_events with date=2024-03-11 and days=7 to retrieve all events for the
  week.
- Review the 7 returned events and note attendees, times, and locations.
- Call search_contacts or get_contact to look up names and titles for key attendees
  (Alex Morgan, Priya Nair, Tom Walsh, Sarah Chen, Diana Ross, James Okafor).
- Identify Thursday March 14 as the busiest day with two events (All-Hands and Budget
  Review) and Wednesday March 13 as having two events (1:1 and Design Sprint Planning).
- Note that Sarah Chen and Alex Morgan appear across multiple events throughout the
  week.
- Call create_draft with to=sarah.chen@company.com, a subject like "Weekly Calendar Summary: March
    11–15", and a body that lists all events day by day with attendees, locations,
    and highlights the busy days and potential scheduling conflicts.
- Report back to the user confirming the draft has been saved and summarize the key
  findings.
