- check:
    rubric: 'Evaluate the agent''s overall execution of this offboarding calendar
      cleanup task. Score on three dimensions:

      1. COMPLETENESS of event deletion (0–0.4): Did the agent identify and delete
      all of Marcus Webb''s upcoming events? The correct events are evt-101 (Q1 Roadmap
      Planning), evt-102 (1:1 Engineering Sync), evt-103 (Design Review: Mobile Onboarding),
      evt-104 (Sales Demo Prep), evt-105 (All-Hands Meeting), and evt-106 (Vendor
      Call: Infrastructure Tools). Award 0.4 if all 6 are deleted, 0.2 if 4–5 are
      deleted, 0.1 if 2–3 are deleted, 0.0 if fewer than 2.

      2. NOTIFICATION QUALITY (0–0.4): Did the agent send emails to the unique organizers
      who are not Marcus? The organizers are: diana.flores@acmecorp.com (evt-101,
      evt-103), raymond.okafor@acmecorp.com (evt-102, evt-105, evt-106), priya.nair@acmecorp.com
      (evt-103), and tom.castellano@acmecorp.com (evt-104). Award 0.4 if all 4 unique
      organizers were notified with a clear, professional message explaining Marcus''s
      departure and the cancellation. Award 0.2 if 2–3 were notified. Award 0.0 if
      fewer than 2 were notified. Deduct 0.1 if the messages are vague or unprofessional.

      3. SUMMARY CLARITY (0–0.2): Does the agent''s final summary clearly state which
      events were deleted, which organizers were notified, and confirm the task is
      complete? Award 0.2 for a clear, organized summary referencing specific event
      names and organizer names. Award 0.1 for a partial summary. Award 0.0 for no
      meaningful summary.

      Total score = dimension 1 + dimension 2 + dimension 3 (max 1.0).

      '
    type: llm_judge
  name: quality_of_execution
  weight: 0.35
