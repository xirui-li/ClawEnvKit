prompt: 'Our colleague Marcus Webb has just resigned and his last day was yesterday.
  Please find all of his upcoming meetings scheduled for the next 7 days, cancel them
  by deleting them from the calendar, and then send a brief email to each unique organizer
  (other than Marcus himself) letting them know that Marcus is no longer with the
  company and their meeting has been cancelled. Summarize what you did when you''re
  done.

  '
reference_solution: '1. Check the inbox (list_inbox) to read the HR offboarding notice
  about Marcus Webb and confirm his email address (marcus.webb@acmecorp.com). 2. Search
  contacts (search_contacts) for Marcus Webb to confirm his identity and email. 3.
  List calendar events for the next 7 days (list_events with days=7) to find all upcoming
  events. 4. Identify events that include marcus.webb@acmecorp.com as an attendee:
  evt-101, evt-102, evt-103, evt-104, evt-105, evt-106. 5. Delete each of these events
  using delete_event with the respective event IDs. 6. Identify the unique organizers
  (excluding Marcus): diana.flores@acmecorp.com, raymond.okafor@acmecorp.com, priya.nair@acmecorp.com,
  tom.castellano@acmecorp.com. 7. Send a professional email to each organizer via
  send_email explaining that Marcus Webb has left the company and their meeting with
  him has been cancelled. 8. Provide a final text summary listing all deleted events
  by name and all organizers notified.'
