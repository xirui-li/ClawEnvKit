scoring_components:
- check:
    action: search_contacts
    service: contacts
    type: audit_action_exists
  description: Agent searched contacts to find department representatives
  name: searched_departments
  weight: 0.1
- check:
    action: user_events
    service: calendar
    type: audit_action_exists
  description: Agent checked individual user calendars for conflicts
  name: checked_calendars
  weight: 0.1
- check:
    action: create_event
    service: calendar
    type: audit_action_exists
  description: Agent created the workshop calendar event
  name: event_created
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  description: Agent sent email invitations to attendees
  name: emails_sent
  weight: 0.1
- check:
    keywords:
    - Lucas Ferreira
    - Aisha Kamara
    type: keywords_present
  description: Agent correctly identified Lucas Ferreira (Design, free) and Aisha
    Kamara (Engineering, free) as available attendees; Priya Nair and James Okafor
    have conflicts
  name: correct_attendees_identified
  weight: 0.2
- check:
    keywords:
    - conflict
    - Priya Nair
    - James Okafor
    type: keywords_present
  description: Agent reported that Priya Nair and James Okafor have scheduling conflicts
    during the 10 AM–12 PM window
  name: conflict_detection_reported
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following dimensions:

      1. CONFLICT DETECTION (0–0.4): Did the agent correctly identify that James Okafor
      (evt-101, Sprint Planning 9–10:30 AM) overlaps with the 10–12 PM window, and
      that Priya Nair (evt-102, Brand Strategy Sync 11 AM–12 PM) also conflicts? Lucas
      Ferreira (Design Review at 2 PM) and Aisha Kamara (All-Hands at 1 PM) are free
      during 10–12 PM. Score 0.4 if all four correctly assessed, 0.2 if two correctly
      assessed, 0.0 if none.

      2. EVENT CREATION ACCURACY (0–0.3): Did the agent create the event on 2025-02-04
      from 10:00 to 12:00 with the correct available attendees (Lucas Ferreira and
      Aisha Kamara, plus Priya Nair from Marketing if the agent chose Tom Whitfield
      instead as an alternative)? Score 0.3 if the event includes only conflict-free
      attendees, 0.15 if partially correct, 0.0 if incorrect.

      3. INVITATION QUALITY (0–0.3): Did the agent send personalized email invitations
      that mention the Innovation Workshop purpose, the date/time (February 4, 10
      AM–12 PM), and Sarah Chen as the organizer? Score 0.3 if emails are clear and
      complete, 0.15 if minimal, 0.0 if missing.

      Total score is the sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: overall_quality
  weight: 0.25
