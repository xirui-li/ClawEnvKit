tools:
- description: List calendar events for a given date and number of days
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get full details of a specific calendar event by event ID
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Get all calendar events for a specific user on a given date
  endpoint: /calendar/user_events
  method: POST
  name: user_events
  service: calendar
- description: Search for contacts by name, query, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Get full contact details by contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send an email to a recipient
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email as a draft
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
- description: List emails in the inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get a single email message by ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Delete a calendar event by event ID
  endpoint: /calendar/events/delete
  method: POST
  name: delete_event
  service: calendar
