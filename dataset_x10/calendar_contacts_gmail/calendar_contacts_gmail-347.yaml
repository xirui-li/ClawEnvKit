    - Weekly Engineering Standup
    - Q1 Budget Review
    - Vendor Call
    - 08:00
    - '14:00'
    type: keywords_present
  description: Agent's output correctly identifies the existing events on Feb 8 for
    Marcus and Priya
  name: conflict_analysis_correct
  weight: 0.15
- check:
