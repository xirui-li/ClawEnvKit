    - Grand Conference Center
    - 450 Market St
    - '9:00'
    - '12:00'
    type: keywords_present
  description: Agent's output references the correct offsite location and time slot
  name: event_details_mentioned
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response on three dimensions:

      1. CONFLICT ANALYSIS (0-1): Did the agent correctly identify and report Marcus
      Webb''s and Priya Nair''s existing commitments on 2024-02-08? The agent should
      mention: Marcus has ''Weekly Engineering Standup'' at 8:00-8:30 AM and ''Vendor
      Call - CloudSystems'' at 1:00-1:45 PM; Priya has ''Weekly Engineering Standup''
      at 8:00-8:30 AM and ''Q1 Budget Review'' at 2:00-3:30 PM. The proposed 9:00
      AM-12:00 PM slot should be identified as conflict-free for both. Score 1.0 if
      all conflicts named, 0.6 if most identified, 0.2 if minimal.

      2. EVENT CREATION CONFIRMATION (0-1): Did the agent confirm that the offsite
      event was created with the correct details — title referencing strategy/offsite,
      time 9:00 AM to 12:00 PM on 2024-02-08, location at The Grand Conference Center
      (450 Market St), and both marcus.webb@company.com and priya.nair@company.com
      as attendees? Score 1.0 if all details confirmed, 0.5 if partial.

      3. EMAIL NOTIFICATION (0-1): Did the agent send (not draft) individual emails
      to both Marcus Webb and Priya Nair informing them of the offsite, including
      the venue (The Grand Conference Center, 450 Market St) and the time? Score 1.0
      if both emailed with venue info, 0.5 if one emailed or venue missing, 0.0 if
      no emails sent.

      Final score = average of the three dimension scores.

      '
    type: llm_judge
  name: overall_task_quality
  weight: 0.25
