prompt: 'Our team is planning a half-day offsite strategy session for next Thursday
  (2024-02-08). Before booking anything, check what Marcus Webb and Priya Nair already
  have scheduled that day so we don''t create conflicts. Then create a 3-hour offsite
  event from 9:00 AM to 12:00 PM that includes both of them, and send each of them
  a brief email letting them know the offsite has been scheduled and where it will
  be held (The Grand Conference Center, 450 Market St).

  '
reference_solution: "1. Use user_events to check Marcus Webb's schedule on 2024-02-08\
  \ (marcus.webb@company.com). 2. Use user_events to check Priya Nair's schedule on\
  \ 2024-02-08 (priya.nair@company.com). 3. Analyze results: Marcus has Standup at\
  \ 8:00-8:30 AM and Vendor Call at 1:00-1:45 PM;\n   Priya has Standup at 8:00-8:30\
  \ AM and Budget Review at 2:00-3:30 PM.\n   The 9:00 AM - 12:00 PM window is free\
  \ for both.\n4. Use search_contacts to find Marcus Webb and Priya Nair to retrieve\
  \ their contact details and emails. 5. Use create_event to create the offsite event:\
  \ title \"Q1 Strategy Offsite\", start 2024-02-08T09:00:00,\n   end 2024-02-08T12:00:00,\
  \ attendees [marcus.webb@company.com, priya.nair@company.com],\n   location \"The\
  \ Grand Conference Center, 450 Market St\".\n6. Use send_email to notify Marcus\
  \ Webb (marcus.webb@company.com) about the scheduled offsite,\n   including the\
  \ date, time, and venue.\n7. Use send_email to notify Priya Nair (priya.nair@company.com)\
  \ with the same information. 8. Report back with a summary of the existing schedules,\
  \ the conflict analysis, the created event details,\n   and confirmation that both\
  \ attendees have been notified."
