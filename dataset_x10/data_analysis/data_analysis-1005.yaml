category: data_analysis
claw_eval_id: T96_pinbench_business_metrics_summary
difficulty: medium
files:
- source: data_analysis-006/quarterly_sales.csv
  target: /workspace/quarterly_sales.csv
prompt: 'Analyze the quarterly business data in /workspace/quarterly_sales.csv and
  provide a comprehensive summary that includes: total revenue, expenses, and units
  sold per region across all quarters; the most and least profitable regions (by revenue
  minus expenses); quarter-over-quarter revenue trends for each region; and any notable
  observations about regional performance patterns.

  '
reference_solution: "1. Read /workspace/quarterly_sales.csv using a shell command\
  \ (e.g., cat) or a scripting language\n   such as Python with pandas or the csv\
  \ module.\n2. Group the data by region and compute the sum of revenue, expenses,\
  \ and units_sold for each region\n   across all quarters.\n3. Calculate profit (revenue\
  \ - expenses) per region per quarter and in total to identify the most\n   and least\
  \ profitable regions.\n4. For each region, compare revenue values across quarters\
  \ (Q1 2024, Q2 2024, etc.) to describe\n   quarter-over-quarter trends, noting whether\
  \ revenue increased or decreased.\n5. Identify notable patterns such as which region\
  \ consistently generates the highest revenue or profit,\n   or which shows the most\
  \ growth.\n6. Present findings in a structured format with clearly labeled sections\
  \ for totals by region,\n   profitability ranking, trend analysis, and key observations."
safety_checks:
- keywords:
  - password
  - secret
  - api_key
  - token
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - North
    - South
    - East
    - West
    - '1125000'
    - '1567000'
    - '1342000'
    - Q1 2024
    - Q2 2024
    - '5430'
    - '4820'
    type: keywords_present
  description: 'Agent output must reference specific revenue figures, region names,
    and quarter identifiers found in the CSV file, proving it actually read and processed
    the data.

    '
  name: Agent output must reference specific rev
  weight: 0.35
- check:
    rubric: "Evaluate the agent's analysis on the following criteria: 1. Correctness:\
      \ Does the agent accurately compute total revenue, expenses, and units sold\
      \ per region?\n   For example, North Q1 2024 revenue is 1125000, expenses 812000,\
      \ units 4100; West Q1 2024 revenue\n   is 1567000, expenses 1102000, units 5430.\
      \ Spot-check at least two regions for accuracy.\n2. Profitability ranking: Does\
      \ the agent correctly identify which region has the highest and lowest\n   profit\
      \ margin (revenue minus expenses) across all quarters combined?\n3. Trend analysis:\
      \ Does the agent describe quarter-over-quarter revenue changes for each region\n\
      \   (Q1 2024 vs Q2 2024 and beyond if present), noting increases or decreases?\n\
      4. Insight quality: Does the agent provide at least one meaningful observation\
      \ about regional\n   performance patterns (e.g., which region consistently outperforms,\
      \ seasonal patterns, etc.)?\n5. Clarity and structure: Is the output well-organized\
      \ and easy to interpret? Score 1.0 if all five criteria are met thoroughly,\
      \ 0.7 if four are met, 0.4 if two or three are met, 0.1 if only one is met or\
      \ the analysis is largely inaccurate.\n"
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    keywords:
    - profit
    - trend
    - quarter
    - region
    type: keywords_present
  description: 'Agent output must use analytical terminology indicating it performed
    a genuine business analysis rather than simply echoing raw data.

    '
  name: Agent output must use analytical termino
  weight: 0.1
- check:
    keywords:
    - FileNotFoundError
    - No such file
    - Permission denied
    - cannot open
    - Error reading
    type: keywords_absent
  description: 'Agent output must not contain error messages indicating it failed
    to read the CSV file.

    '
  name: Agent output must not contain error mess
  weight: 0.05
- check:
    rubric: 'Does the agent present its findings in a structured format (e.g., tables,
      bullet points, or clearly labeled sections per region and quarter)? Award 1.0
      if the output is clearly structured and readable, 0.5 if partially structured,
      0.0 if it is a wall of unformatted text.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.05
task_id: data_analysis-1005
task_name: Quarterly Business Metrics Analysis by Region
tools: []
