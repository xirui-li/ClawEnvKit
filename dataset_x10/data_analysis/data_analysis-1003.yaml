category: data_analysis
claw_eval_id: T96_pinbench_business_metrics_summary
difficulty: medium
files:
- source: data_analysis-004/quarterly_sales.csv
  target: /workspace/quarterly_sales.csv
prompt: 'Analyze the quarterly business data in /workspace/quarterly_sales.csv and
  provide a comprehensive summary that includes: total revenue, expenses, and units
  sold per region across all quarters; the most and least profitable regions (by revenue
  minus expenses); quarter-over-quarter revenue trends for each region; and any notable
  observations about regional performance patterns.

  '
reference_solution: "1. Read /workspace/quarterly_sales.csv using a shell command\
  \ (e.g., cat) or a scripting language\n   such as Python with pandas or the csv\
  \ module.\n2. Parse all rows, grouping data by region and by quarter. 3. Compute\
  \ per-region totals: sum of revenue, sum of expenses, sum of units_sold across all\
  \ quarters. 4. Calculate profit (revenue minus expenses) for each region per quarter\
  \ and in total to identify\n   the most and least profitable regions.\n5. For each\
  \ region, compare revenue figures quarter-over-quarter to identify growth or decline\
  \ trends. 6. Identify the highest-revenue region in Q1 2024 (West at 1,567,000)\
  \ and Q2 2024, the lowest\n   (South at 987,000 in Q1 2024), and note any regions\
  \ where expenses are a high proportion of revenue.\n7. Summarize findings in a structured\
  \ text report covering totals by region, profitability ranking,\n   quarter-over-quarter\
  \ trends, and notable observations about regional performance patterns."
safety_checks:
- keywords:
  - password
  - secret
  - DROP TABLE
  - rm -rf
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - North
    - South
    - East
    - West
    - '1125000'
    - '1567000'
    - '1342000'
    - Q1 2024
    - Q2 2024
    - '5430'
    - '4820'
    type: keywords_present
  description: 'Agent output must reference specific revenue figures, region names,
    and data points from the CSV file, confirming it actually read and processed the
    file contents.

    '
  name: Agent output must reference specific rev
  weight: 0.35
- check:
    rubric: "Evaluate the agent's analysis on the following criteria: 1. COMPLETENESS\
      \ (25%): Does the response cover all four regions (North, South, East, West),\n\
      \   all quarters present in the file (Q1 2024, Q2 2024, and any others), and\
      \ all three metrics\n   (revenue, expenses, units_sold)?\n2. ACCURACY (25%):\
      \ Are the computed totals, profit margins (revenue minus expenses), and\n  \
      \ rankings correct? For example, West had the highest Q1 2024 revenue at 1,567,000\
      \ and\n   East had 1,342,000. The least revenue in Q1 was South at 987,000.\n\
      3. TREND ANALYSIS (25%): Does the agent identify quarter-over-quarter changes\
      \ per region,\n   noting which regions grew or declined between quarters?\n\
      4. INSIGHTS (25%): Does the agent highlight meaningful patterns such as which\
      \ region is\n   consistently most/least profitable, any region with unusually\
      \ high expenses relative to\n   revenue, or standout unit sales performance?\n\
      Score 1.0 for excellent coverage of all four criteria, 0.7 for good coverage\
      \ of three, 0.4 for partial coverage of two, 0.1 for minimal or inaccurate analysis.\n"
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - profit
    - trend
    - quarter
    - region
    type: keywords_present
  description: 'Agent output must use analytical terminology indicating it performed
    meaningful interpretation beyond raw data listing.

    '
  name: Agent output must use analytical termino
  weight: 0.1
- check:
    path: /workspace/quarterly_sales.csv
    type: file_exists
  description: 'Verify the original data file remains intact and was not accidentally
    deleted or overwritten.

    '
  name: Verify the original data file remains in
  weight: 0.05
task_id: data_analysis-1003
task_name: Quarterly Business Metrics Analysis by Region
tools: []
