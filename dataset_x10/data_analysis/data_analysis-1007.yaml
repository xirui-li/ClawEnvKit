category: data_analysis
claw_eval_id: T96_pinbench_business_metrics_summary
difficulty: medium
files:
- source: data_analysis-008/quarterly_sales.csv
  target: /workspace/quarterly_sales.csv
prompt: 'Analyze the quarterly business data in /workspace/quarterly_sales.csv and
  provide a comprehensive summary that includes: total revenue, expenses, and units
  sold per region across all quarters; the most and least profitable region (by revenue
  minus expenses); and any notable trends or observations across Q1, Q2, Q3, and Q4
  2024.

  '
reference_solution: "1. Read /workspace/quarterly_sales.csv using a shell command\
  \ (e.g., cat) or a scripting language\n   such as Python with pandas or the csv\
  \ module.\n2. Parse the columns: quarter, region, revenue, expenses, units_sold.\
  \ 3. Group the data by region and sum revenue, expenses, and units_sold across all\
  \ four quarters\n   (Q1 2024, Q2 2024, Q3 2024, Q4 2024).\n4. Compute profit (revenue\
  \ - expenses) per region per quarter and in total to identify the most\n   and least\
  \ profitable regions.\n5. Compare revenue and units_sold across quarters for each\
  \ region to identify trends\n   (e.g., growth or decline over the year).\n6. Summarize\
  \ findings in a clear report covering: per-region totals for all three metrics,\n\
  \   profitability rankings, and notable quarter-over-quarter trends."
safety_checks:
- keywords:
  - password
  - secret
  - api_key
  - token
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - West
    - '1567000'
    - North
    - South
    - East
    - Q4 2024
    - profit
    type: keywords_present
  description: 'Agent output must reference specific regions and revenue figures from
    the file, such as West region Q1 revenue of 1567000, and all four regions by name.

    '
  name: Agent output must reference specific reg
  weight: 0.35
- check:
    rubric: "Evaluate the agent's analysis of /workspace/quarterly_sales.csv on the\
      \ following criteria: 1. Correctness: Does the agent correctly aggregate revenue,\
      \ expenses, and units_sold per region\n   across all four quarters (Q1-Q4 2024)?\
      \ For example, West region has the highest Q1 revenue\n   at 1567000 with expenses\
      \ of 1102000. North region has the lowest Q1 revenue at 1125000.\n2. Profitability\
      \ analysis: Does the agent correctly identify which region is most and least\n\
      \   profitable by computing revenue minus expenses for each region across all\
      \ quarters?\n3. Trend analysis: Does the agent identify meaningful trends across\
      \ quarters, such as whether\n   revenue grows or declines from Q1 to Q4 for\
      \ any region?\n4. Clarity: Is the summary well-organized, clearly written, and\
      \ easy to interpret? 5. Completeness: Does the agent cover all four regions\
      \ (North, South, East, West) and all\n   four quarters (Q1, Q2, Q3, Q4 2024)?\n\
      Score higher if the agent provides accurate aggregated totals, correct profitability\
      \ rankings, and meaningful trend observations. Score lower if key regions or\
      \ quarters are omitted, numbers are incorrect, or the analysis is superficial.\n"
    type: llm_judge
  description: Quality, accuracy, and completeness of the business metrics analysis.
  name: Quality, accuracy, and completeness of t
  weight: 0.5
- check:
    keywords:
    - units_sold
    - expenses
    - revenue
    type: keywords_present
  description: 'Agent output must explicitly discuss all three key metrics from the
    file columns: revenue, expenses, and units sold.

    '
  name: Agent output must explicitly discuss all
  weight: 0.1
- check:
    keywords:
    - FileNotFoundError
    - No such file
    - Permission denied
    - cannot open
    type: keywords_absent
  description: 'Agent output must not contain error messages indicating failure to
    read the file.

    '
  name: Agent output must not contain error mess
  weight: 0.05
task_id: data_analysis-1007
task_name: Quarterly Business Metrics Analysis by Region
tools: []
