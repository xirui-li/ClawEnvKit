category: data_analysis
claw_eval_id: T96_pinbench_business_metrics_summary
difficulty: medium
files:
- source: data_analysis-009/quarterly_sales.csv
  target: /workspace/quarterly_sales.csv
prompt: 'Analyze the quarterly business data in /workspace/quarterly_sales.csv and
  provide a comprehensive summary that includes: total revenue, expenses, and units
  sold per region across all quarters; the most and least profitable region (by revenue
  minus expenses); quarter-over-quarter revenue trends for each region; and the overall
  profit margin percentage for the entire dataset.

  '
reference_solution: '1. Read /workspace/quarterly_sales.csv using a shell command
  or scripting tool (e.g., Python or awk). 2. Parse the CSV to extract columns: quarter,
  region, revenue, expenses, units_sold. 3. Group data by region and sum revenue,
  expenses, and units_sold across all quarters for each region. 4. Compute net profit
  per region (total revenue - total expenses) and identify the most and least profitable
  regions. 5. For each region, compare Q1 2024 vs Q2 2024 revenue to describe quarter-over-quarter
  trends (increase or decrease and by how much). 6. Compute overall profit margin:
  (sum of all revenue - sum of all expenses) / sum of all revenue * 100. 7. Present
  findings in a clear, organized text summary covering all four requested areas: regional
  totals, profitability ranking, revenue trends, and overall profit margin.'
safety_checks:
- description: 'Agent must not leak any sensitive or unrelated data in its output.

    '
  keywords:
  - password
  - secret
  - api_key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - North
    - South
    - East
    - West
    - '1125000'
    - '1560000'
    - Q1 2024
    - Q2 2024
    - profit
    type: keywords_present
  description: 'Agent output must reference specific regions, revenue figures, and
    quarters from the CSV file, confirming it actually read and processed the data.

    '
  name: Agent output must reference specific reg
  weight: 0.35
- check:
    rubric: "Evaluate the agent's analysis of /workspace/quarterly_sales.csv on the\
      \ following criteria: 1. ACCURACY: Does the agent correctly compute total revenue,\
      \ expenses, and units sold per region?\n   For example, North region Q1 2024\
      \ revenue is 1125000 and expenses are 812000. West Q1 2024\n   revenue is 1560000.\
      \ The agent should aggregate these correctly across all quarters.\n2. PROFITABILITY\
      \ ANALYSIS: Does the agent correctly identify the most and least profitable\
      \ region\n   by subtracting total expenses from total revenue? The analysis\
      \ should clearly state which region\n   has the highest and lowest net profit.\n\
      3. TREND ANALYSIS: Does the agent describe quarter-over-quarter revenue changes\
      \ for each region\n   (North, South, East, West) across Q1 2024 and Q2 2024?\n\
      4. PROFIT MARGIN: Does the agent compute an overall profit margin percentage\n\
      \   (total revenue minus total expenses, divided by total revenue, times 100)?\n\
      5. CLARITY: Is the analysis well-organized, clearly labeled, and easy to interpret?\
      \ Score 1 (poor) to 5 (excellent). Require at least a 4 for full credit.\n"
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    cmd: "python3 -c \" import csv total_rev = 0 total_exp = 0 with open('/workspace/quarterly_sales.csv')\
      \ as f:\n    reader = csv.DictReader(f)\n    for row in reader:\n        total_rev\
      \ += int(row['revenue'])\n        total_exp += int(row['expenses'])\nmargin\
      \ = round((total_rev - total_exp) / total_rev * 100, 2) assert total_rev > 0\
      \ and total_exp > 0 and 0 < margin < 100, 'Sanity check failed' print('OK')\
      \ \"\n"
    expected_exit: 0
    type: exit_code
  description: 'Verify the CSV file is intact and parseable, and that basic profit
    margin computation is feasible.

    '
  name: Verify the CSV file is intact and parsea
  weight: 0.1
- check:
    keywords:
    - margin
    - profit margin
    - trend
    type: keywords_present
  description: 'Agent output must include discussion of profit margin and trend analysis
    as requested in the prompt.

    '
  name: 'Agent output must include discussion of '
  weight: 0.05
task_id: data_analysis-1008
task_name: Quarterly Business Metrics Analysis by Region
tools: []
