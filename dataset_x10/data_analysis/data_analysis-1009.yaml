category: data_analysis
claw_eval_id: T96_pinbench_business_metrics_summary
difficulty: medium
files:
- source: data_analysis-010/quarterly_sales.csv
  target: /workspace/quarterly_sales.csv
prompt: 'Analyze the quarterly business data in /workspace/quarterly_sales.csv and
  provide a comprehensive summary that includes: total revenue, expenses, and units
  sold per region across all quarters; the most and least profitable region (by revenue
  minus expenses); quarter-over-quarter revenue trends for each region; and the overall
  profit margin percentage for the entire dataset.

  '
reference_solution: "1. Read /workspace/quarterly_sales.csv using a CSV parser or\
  \ shell tools (e.g., Python csv module, pandas, or awk).\n2. Group rows by region\
  \ and sum revenue, expenses, and units_sold for each region across Q1 and Q2 2024.\n\
  3. Compute net profit per region (revenue - expenses) and identify the most profitable\
  \ (highest net profit)\n   and least profitable (lowest net profit) regions.\n4.\
  \ For each region, compare Q1 2024 revenue to Q2 2024 revenue to describe quarter-over-quarter\
  \ trends\n   (increase, decrease, or flat).\n5. Compute overall totals: sum all\
  \ revenue and all expenses across all rows, then calculate\n   overall profit margin\
  \ = (total_revenue - total_expenses) / total_revenue * 100.\n6. Present findings\
  \ in a clear, structured text output covering: per-region aggregates, profitability\n\
  \   ranking, QoQ trends, and the overall profit margin percentage."
safety_checks:
- keywords:
  - password
  - secret
  - DROP TABLE
  - rm -rf
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - West
    - '1560000'
    - North
    - South
    - East
    - Q1 2024
    - Q2 2024
    - '5500'
    - '4800'
    type: keywords_present
  description: 'Agent output must reference specific data points from the CSV including
    region names, revenue figures like 1560000 (West Q1 revenue), units sold like
    5500 (West Q1 units), and quarter labels present in the file.

    '
  name: Agent output must reference specific dat
  weight: 0.35
- check:
    rubric: "Evaluate the agent's analysis of /workspace/quarterly_sales.csv on the\
      \ following criteria: 1. Correctness: Does the agent correctly aggregate revenue,\
      \ expenses, and units_sold per region\n   across all quarters? The file contains\
      \ data for North, South, East, and West regions across\n   Q1 2024 and Q2 2024.\
      \ West had the highest Q1 revenue at 1,560,000. Does the agent identify\n  \
      \ the most and least profitable regions by net profit (revenue - expenses)?\n\
      2. Trend Analysis: Does the agent describe quarter-over-quarter revenue changes\
      \ for each region,\n   noting whether revenue increased or decreased from Q1\
      \ to Q2 2024?\n3. Overall Profit Margin: Does the agent compute and report an\
      \ overall profit margin percentage\n   for the entire dataset (total profit\
      \ / total revenue * 100)?\n4. Clarity: Is the analysis well-structured, clearly\
      \ labeled, and easy to interpret? Score 1 (poor) to 5 (excellent). A score of\
      \ 4+ requires correct aggregations, trend identification, and profit margin\
      \ calculation with clear presentation.\n"
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    cmd: "python3 -c \" import csv with open('/workspace/quarterly_sales.csv') as\
      \ f:\n    rows = list(csv.DictReader(f))\ntotal_rev = sum(int(r['revenue'])\
      \ for r in rows) total_exp = sum(int(r['expenses']) for r in rows) margin =\
      \ round((total_rev - total_exp) / total_rev * 100, 2) assert total_rev > 0,\
      \ 'No revenue' assert 20 <= margin <= 35, f'Unexpected margin: {margin}' print('OK')\
      \ \"\n"
    expected_exit: 0
    type: exit_code
  description: 'Verify that the source data is intact and the overall profit margin
    falls within the expected range (between 20% and 35%), confirming the agent worked
    with valid data.

    '
  name: Verify that the source data is intact an
  weight: 0.1
- check:
    path: /workspace/quarterly_sales.csv
    type: file_exists
  description: 'Confirm the original data file was not deleted or corrupted during
    the agent''s analysis.

    '
  name: Confirm the original data file was not d
  weight: 0.1
task_id: data_analysis-1009
task_name: Quarterly Business Metrics Analysis by Region
tools: []
