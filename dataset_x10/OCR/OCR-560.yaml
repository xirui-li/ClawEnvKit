category: OCR
claw_eval_id: T51zh_su7_price_from_image
difficulty: medium
files:
- source: OCR-010/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the handwritten meeting notes image at /workspace/image.jpg using
  OCR or visual analysis. Extract and report all text you can read from the image,
  with special attention to any action items, assigned tasks, deadlines, names of
  people mentioned, and dates. Present the findings in a structured format.
reference_solution: '1. Use a native shell command or available OCR tool (such as
  tesseract) to extract text from /workspace/image.jpg.

  2. Run: tesseract /workspace/image.jpg stdout or use python with pytesseract/PIL
  to read the image.

  3. Alternatively, use a vision-capable model to describe and transcribe the handwritten
  content.

  4. Parse the extracted text to identify action items, assigned persons, deadlines,
  and dates.

  5. Present the results in a structured format with sections for: Meeting Overview,
  Attendees (if visible), Action Items (with owner and deadline), and any other notable
  information.

  6. Report all findings as text output in the response.'
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - action item
    - meeting
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    keywords:
    - date
    - deadline
    - due
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: 'Evaluate whether the agent successfully extracted and presented text
      from the handwritten meeting notes image. Award full marks if the agent: (1)
      clearly reports readable text from the image including any names, dates, or
      deadlines visible in the notes, (2) identifies and lists action items or tasks
      in a structured way, (3) attributes tasks to specific people if names are visible,
      (4) presents the information in an organized and readable format. Deduct marks
      if the agent fails to attempt OCR or visual analysis, reports no content from
      the image, or provides only vague descriptions without specific extracted text.'
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    path: /workspace/image.jpg
    type: file_exists
  name: file_exists
  weight: 0.05
- check:
    keywords:
    - cannot process images
    - unable to read
    - no OCR capability
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
task_id: OCR-560
task_name: Extract Action Items from Handwritten Meeting Notes
tools: []
