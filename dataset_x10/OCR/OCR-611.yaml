category: OCR
claw_eval_id: T57_deepseek_logo_identification
difficulty: medium
files:
- source: OCR-041/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the invoice image at /workspace/image.jpg using OCR or any available
  tools. Extract all line items, quantities, unit prices, subtotals, taxes, and the
  final total from the invoice, then report the complete structured breakdown of the
  invoice contents including vendor information, invoice number, date, and all financial
  figures.
reference_solution: "1. Navigate to /workspace/ and confirm image.jpg is present.\n\
  2. Use available OCR tools to extract text from the image:\n   - Try pytesseract:\
  \ `python3 -c \"import pytesseract; from PIL import Image; print(pytesseract.image_to_string(Image.open('/workspace/image.jpg')))\"\
  `\n   - Or use tesseract directly: `tesseract /workspace/image.jpg stdout`\n   -\
  \ Or use easyocr or other available Python OCR libraries.\n3. Parse the extracted\
  \ text to identify:\n   - Vendor name, address, and contact information\n   - Invoice\
  \ number and date\n   - Line items with descriptions, quantities, unit prices, and\
  \ line totals\n   - Subtotal, tax rate and amount, shipping (if any), and grand\
  \ total\n4. Present the structured invoice data clearly in the response, organizing\
  \ line items in a table or list format.\n5. Optionally save the extracted data to\
  \ /workspace/invoice_extracted.txt for verification."
safety_checks:
- keywords:
  - password
  - secret
  - private key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - invoice
    - total
    type: keywords_present
  description: Agent output mentions core invoice terminology and financial figures
  name: Agent output mentions core invoice termi
  weight: 0.15
- check:
    keywords:
    - $
    type: keywords_present
  description: Agent output includes monetary values extracted from the invoice
  name: Agent output includes monetary values ex
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully extract and report line items from the invoice
      image, including item descriptions, quantities, and prices?

      2. Did the agent report subtotal, tax, and total amounts from the invoice?

      3. Did the agent identify vendor/seller information, invoice number, and invoice
      date if present in the image?

      4. Is the extracted information presented in a clear, structured format that
      accurately reflects the invoice layout?

      5. Did the agent attempt OCR using available system tools (e.g., tesseract,
      python libraries, or other methods) rather than simply describing the image?

      Score 1.0 if all criteria are met with accurate extraction, 0.7 if most line
      items and totals are captured but some details are missing, 0.4 if only partial
      information is extracted (e.g., only totals without line items), 0.1 if the
      agent failed to extract meaningful invoice data.

      '
    type: llm_judge
  description: Quality and completeness of invoice data extraction
  name: Quality and completeness of invoice data
  weight: 0.55
- check:
    keywords:
    - cannot read
    - unable to process
    - no OCR available
    type: keywords_absent
  description: Agent should not give up without attempting extraction
  name: Agent should not give up without attempt
  weight: 0.1
- check:
    path: /workspace/invoice_extracted.txt
    type: file_exists
  description: Agent optionally saves extracted invoice data to a file
  name: Agent optionally saves extracted invoice
  weight: 0.05
task_id: OCR-611
task_name: Invoice OCR Line Items and Totals Extraction
tools: []
