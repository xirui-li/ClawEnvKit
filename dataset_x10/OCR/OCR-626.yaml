category: OCR
claw_eval_id: T58zh_painting_identification
difficulty: medium
files:
- source: OCR-056/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the whiteboard diagram image at /workspace/image.jpg and identify
  all labeled components, text, arrows, and structural elements visible in the diagram.
  Provide a comprehensive description of the diagram's content, including all readable
  text labels, the relationships between components, and the overall structure or
  flow depicted.
reference_solution: "1. Use native shell capabilities to inspect the image file at\
  \ /workspace/image.jpg (e.g., check file size and type with `file /workspace/image.jpg`).\n\
  2. Use an available OCR or image analysis tool (such as tesseract, pytesseract via\
  \ Python, or a vision-capable model) to extract text from the whiteboard image.\n\
  \   Example: `tesseract /workspace/image.jpg stdout` or a Python script using pytesseract.\n\
  3. Examine the extracted text and any structural cues to identify labeled components,\
  \ arrows, and relationships.\n4. Organize the findings into a structured description\
  \ that covers:\n   - All readable text labels and component names\n   - The type\
  \ of diagram (flowchart, architecture diagram, mind map, etc.)\n   - Directional\
  \ relationships indicated by arrows or lines\n   - The overall flow or hierarchy\
  \ of the diagram\n5. Report the complete analysis as a clear, structured text output\
  \ describing the whiteboard diagram's content and meaning."
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  - private key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - whiteboard
    - component
    - label
    type: keywords_present
  description: Agent identifies basic diagram elements present in the whiteboard image
  name: 'Agent identifies basic diagram elements '
  weight: 0.15
- check:
    keywords:
    - arrow
    - connection
    - flow
    type: keywords_present
  description: Agent identifies relational or directional elements in the diagram
    such as arrows or connectors
  name: Agent identifies relational or direction
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria for analyzing
      the whiteboard diagram at /workspace/image.jpg:

      1. Completeness: Did the agent identify and list all visible labeled components
      and text in the diagram? Award full marks if all major text labels and components
      are mentioned.

      2. Accuracy: Are the described components and their relationships accurately
      represented? Penalize if the agent fabricates components not present in the
      image.

      3. Structure: Did the agent describe the overall layout, flow, or hierarchy
      of the diagram (e.g., top-down flow, left-to-right process, hierarchical tree)?

      4. Relationships: Did the agent explain how components are connected or related
      to each other based on arrows, lines, or spatial arrangement?

      5. Clarity: Is the response well-organized and easy to understand?

      Score 1.0 if all criteria are met thoroughly, 0.7 if most criteria are met,
      0.4 if only partial analysis is provided, 0.1 if the response is vague or mostly
      incorrect.

      '
    type: llm_judge
  description: Holistic evaluation of the quality, completeness, and accuracy of the
    diagram analysis
  name: Holistic evaluation of the quality, comp
  weight: 0.55
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image is blank
    type: keywords_absent
  description: Agent does not falsely claim the image is unreadable or empty when
    content is present
  name: Agent does not falsely claim the image i
  weight: 0.15
task_id: OCR-626
task_name: Whiteboard Diagram Component Extraction
tools: []
