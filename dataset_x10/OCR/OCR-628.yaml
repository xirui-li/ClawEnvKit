category: OCR
claw_eval_id: T58zh_painting_identification
difficulty: medium
files:
- source: OCR-058/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the product specification sheet image at /workspace/image.jpg using
  OCR or image analysis capabilities. Extract all technical details, specifications,
  model numbers, dimensions, power ratings, and any other product information visible
  in the image, then provide a comprehensive structured summary of the findings.
reference_solution: 1. Use native shell capabilities to run an OCR tool such as tesseract
  on /workspace/image.jpg, or use a Python library such as pytesseract or easyocr
  to extract text from the image. 2. Alternatively, use a vision-capable model or
  tool to analyze the image directly. 3. Parse the extracted text to identify product
  name, model number, technical specifications including electrical ratings (voltage,
  wattage, frequency), physical dimensions, performance metrics, and compliance certifications.
  4. Organize the findings into a structured summary with clearly labeled categories
  and accurate values with their units. 5. Present the complete structured output
  as the final response.
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - W
    - mm
    - Hz
    - V
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    keywords:
    - specification
    - model
    - product
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: Evaluate whether the agent successfully extracted and presented technical
      specifications from the product sheet image. The response should include structured
      information about product details visible in the image, such as model identifiers,
      numerical specifications with units, technical parameters, and any other product
      attributes. Award full marks if the agent provides a well-organized, comprehensive
      extraction of all readable text and data from the image. Deduct marks if the
      agent fails to extract numerical values with units, omits major sections of
      the specification sheet, or provides only a vague description without specific
      technical details.
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    rubric: Assess the structure and completeness of the agent's output. The agent
      should organize extracted information into logical categories such as electrical
      specifications, physical dimensions, performance parameters, and product identification.
      Award full marks for clearly labeled sections with accurate values and units.
      Deduct marks if the output is unstructured, missing units on numerical values,
      or if the agent reports inability to process the image without making a genuine
      attempt.
    type: llm_judge
  name: llm_judge
  weight: 0.2
task_id: OCR-628
task_name: Product Specification Sheet OCR Extraction
tools: []
