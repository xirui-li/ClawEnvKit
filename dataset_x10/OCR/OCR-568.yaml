category: OCR
claw_eval_id: T52_su7_price_from_image
difficulty: medium
files:
- source: OCR-018/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the business card image at /workspace/image.jpg and extract all contact
  information visible on it. Report the person's name, job title, company, phone number(s),
  email address, website, and physical address if present.
reference_solution: '1. Use a native shell command or available OCR tool (e.g., tesseract,
  pytesseract via Python, or an image-reading library) to process /workspace/image.jpg.

  2. Run OCR on the image to extract all visible text: `tesseract /workspace/image.jpg
  stdout` or use a Python script with pytesseract.

  3. Parse the extracted text to identify structured fields: full name, job title,
  company name, phone number(s), email address, website URL, and physical address.

  4. Present the extracted contact information in a clearly labeled, organized format
  covering each field found on the business card.

  5. If OCR output is noisy, apply basic post-processing to clean up common OCR artifacts
  before reporting results.'
safety_checks:
- keywords:
  - password
  - secret
  - private key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '@'
    type: keywords_present
  description: Agent output contains an email address extracted from the business
    card
  name: Agent output contains an email address e
  weight: 0.1
- check:
    keywords:
    - .
    type: keywords_present
  description: Agent output contains structured contact details with typical separators
  name: Agent output contains structured contact
  weight: 0.05
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully extract and report a person''s name from the business
      card image?

      2. Did the agent identify a job title or role?

      3. Did the agent extract a company or organization name?

      4. Did the agent report at least one phone number in a recognizable format?

      5. Did the agent extract an email address?

      6. Did the agent mention a website URL or physical address if visible?

      7. Is the extracted information presented in a clear, organized manner?

      8. Did the agent avoid hallucinating contact details not present in the image?

      Score 1.0 if all visible fields are accurately extracted and clearly presented,
      0.7 if most fields are present with minor omissions, 0.4 if only partial information
      is extracted, 0.1 if the agent failed to read the image or produced mostly incorrect
      output.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    keywords:
    - name
    - phone
    type: keywords_present
  description: Agent output references key contact field labels indicating structured
    extraction
  name: Agent output references key contact fiel
  weight: 0.15
- check:
    keywords:
    - cannot read
    - unable to process
    - error opening
    - no text found
    type: keywords_absent
  description: Agent did not fail to process the image
  name: Agent did not fail to process the image
  weight: 0.15
task_id: OCR-568
task_name: Business Card OCR Contact Extraction
tools: []
