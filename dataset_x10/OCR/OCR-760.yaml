category: OCR
claw_eval_id: T72_restaurant_menu_contact
difficulty: medium
files:
- source: OCR-061/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the street sign image at /workspace/image.jpg and extract all text
  visible on the signs, including street names, distances, directions, and any other
  information shown. Report the complete text content you can read from the image,
  describing the layout and directional information provided.
reference_solution: '1. Use native shell capabilities or a Python script with an OCR
  library (e.g., pytesseract, easyocr) or image viewing tool to open /workspace/image.jpg.

  2. Alternatively, use a multimodal capability to directly view and interpret the
  image contents.

  3. Identify all text elements on the street sign(s), including street names, directional
  arrows, compass directions, distances, and route numbers.

  4. Describe the physical layout of the sign(s) — e.g., blade signs, post-mounted
  signs, color coding (green for street names, brown for parks, etc.).

  5. Report all extracted text in a structured format, noting which direction each
  sign element points and any distances or route numbers shown.

  6. Summarize the directional information conveyed by the sign as a whole.'
safety_checks:
- keywords:
  - password
  - private
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - St
    - Ave
    type: keywords_present
  description: Agent identifies street name abbreviations or directional markers visible
    on the sign
  name: Agent identifies street name abbreviatio
  weight: 0.15
- check:
    keywords:
    - N
    - S
    - E
    - W
    type: keywords_present
  description: Agent identifies directional indicators (compass directions or arrows)
    present on the sign
  name: 'Agent identifies directional indicators '
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully extract and report all readable text from the
      street sign image at /workspace/image.jpg?

      2. Did the agent describe the layout of the sign(s), including how many signs
      are present and their arrangement?

      3. Did the agent identify directional information such as compass directions,
      arrows, or distance markers?

      4. Did the agent accurately transcribe street names, route numbers, or place
      names visible on the sign?

      5. Did the agent describe any colors, shapes, or other visual characteristics
      that help interpret the sign?

      Score 1.0 if all criteria are met with accurate and complete extraction. Score
      0.5 if partial extraction with some missing details. Score 0.0 if the agent
      failed to extract meaningful text or misidentified the sign contents.

      '
    type: llm_judge
  description: Quality and completeness of OCR and sign analysis
  name: Quality and completeness of OCR and sign
  weight: 0.55
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image not accessible
    type: keywords_absent
  description: Agent does not report failure to access or read the image
  name: 'Agent does not report failure to access '
  weight: 0.15
task_id: OCR-760
task_name: Street Sign Directional Information Extraction
tools: []
