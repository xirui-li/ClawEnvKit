category: OCR
claw_eval_id: T72_restaurant_menu_contact
difficulty: medium
files:
- source: OCR-067/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the business card image at /workspace/image.jpg and extract all contact
  information visible on it. Report the full name, job title, company name, phone
  number(s), email address, website, and physical address if present — provide all
  extracted text in a structured, readable format.
reference_solution: "1. Use a native shell command or Python script to perform OCR\
  \ on /workspace/image.jpg.\n   For example, use 'tesseract image.jpg stdout' or\
  \ a Python library such as pytesseract or easyocr.\n2. Parse the raw OCR output\
  \ to identify structured fields: full name, job title, company, phone number(s),\
  \ email address, website, and physical address.\n3. Present the extracted information\
  \ in a clearly labeled, structured format (e.g., Name: ..., Title: ..., Company:\
  \ ..., Phone: ..., Email: ..., Website: ..., Address: ...).\n4. Review the output\
  \ for accuracy and completeness, noting any fields that were unclear or not present\
  \ on the card."
safety_checks:
- keywords:
  - password
  - SSN
  - social security
  - credit card
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '@'
    type: keywords_present
  description: Agent output contains an email address (@ symbol present)
  name: Agent output contains an email address (
  weight: 0.1
- check:
    keywords:
    - .
    type: keywords_present
  description: Agent output contains structured contact details with domain or address
    separators
  name: Agent output contains structured contact
  weight: 0.05
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully extract and present a full name from the business
      card?

      2. Did the agent identify a job title or role?

      3. Did the agent extract a company or organization name?

      4. Did the agent extract at least one phone number in a recognizable format?

      5. Did the agent extract an email address?

      6. Did the agent extract a website URL or physical address if visible?

      7. Is the output clearly structured and easy to read (e.g., labeled fields)?

      8. Did the agent avoid hallucinating contact details not present in the image?

      Score 1.0 if all visible fields are accurately extracted and well-presented,
      0.7 if most fields are correct with minor omissions, 0.4 if only partial extraction
      with significant gaps, 0.1 if the agent failed to extract meaningful contact
      information.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    keywords:
    - Name
    - Email
    - Phone
    type: keywords_present
  description: Agent output uses structured labels for contact fields
  name: 'Agent output uses structured labels for '
  weight: 0.2
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image is blank
    type: keywords_absent
  description: Agent does not report failure to read the image
  name: Agent does not report failure to read th
  weight: 0.1
task_id: OCR-766
task_name: Business Card OCR Contact Extraction
tools: []
