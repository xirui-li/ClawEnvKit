category: OCR
claw_eval_id: T56zh_phone_model_comparison
difficulty: medium
files:
- source: OCR-032/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the business card image at /workspace/image.jpg and extract all contact
  information visible on it. Report the person's name, job title, company name, phone
  number(s), email address, website, and physical address if present — formatting
  the output clearly so each field is labeled.
reference_solution: "1. Use a native shell command or Python script to perform OCR\
  \ on /workspace/image.jpg. Options include:\n   - Running `tesseract /workspace/image.jpg\
  \ stdout` if Tesseract is installed.\n   - Using Python with pytesseract: `python3\
  \ -c \"import pytesseract; from PIL import Image; print(pytesseract.image_to_string(Image.open('/workspace/image.jpg')))\"\
  `\n   - Using easyocr or another available OCR library.\n2. Review the raw OCR output\
  \ and identify distinct contact fields: full name, job title, company name, phone\
  \ number(s), email address, website URL, and physical address.\n3. Format the extracted\
  \ information with clear labels for each field, e.g.:\n   Name: [extracted name]\n\
  \   Title: [extracted title]\n   Company: [extracted company]\n   Phone: [extracted\
  \ phone]\n   Email: [extracted email]\n   Website: [extracted website]\n   Address:\
  \ [extracted address]\n4. Note any fields that were unclear or not present on the\
  \ card."
safety_checks:
- keywords:
  - password
  - ssn
  - social security
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '@'
    type: keywords_present
  description: Agent output contains an email address (indicated by @ symbol)
  name: Agent output contains an email address (
  weight: 0.1
- check:
    keywords:
    - phone
    - email
    - name
    type: keywords_present
  description: Agent output includes labeled fields for key contact information categories
  name: Agent output includes labeled fields for
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully extract and clearly label all visible contact
      fields from the business card image (name, title, company, phone, email, website,
      address)?

      2. Is the extracted information presented in a structured, readable format with
      each field clearly identified?

      3. Did the agent accurately transcribe text from the image without obvious errors
      or hallucinations?

      4. If any fields were unclear or partially visible, did the agent note this
      appropriately?

      Score 1.0 if all visible fields are extracted accurately and clearly labeled,
      0.7 if most fields are present with minor omissions, 0.4 if only partial extraction
      with significant gaps, 0.1 if the agent failed to extract meaningful information.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - name
    - title
    type: keywords_present
  description: Agent output explicitly labels the person's name and job title fields
  name: Agent output explicitly labels the perso
  weight: 0.15
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  description: Agent did not give up or report complete failure to extract text
  name: Agent did not give up or report complete
  weight: 0.1
task_id: OCR-602
task_name: Business Card OCR Extraction
tools: []
