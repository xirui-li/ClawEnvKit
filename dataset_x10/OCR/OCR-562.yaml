category: OCR
claw_eval_id: T52_su7_price_from_image
difficulty: medium
files:
- source: OCR-012/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the street sign image at /workspace/image.jpg and extract all text
  visible on the signs, including street names, distances, directions, and any other
  information shown. Report the complete text content of every sign visible in the
  image, noting the directional information and any distances or route numbers present.
reference_solution: '1. Use native shell capabilities to examine the image file at
  /workspace/image.jpg (e.g., using Python with PIL/Pillow, tesseract OCR, or similar
  tools available in the environment).

  2. Run an OCR tool such as tesseract on the image: `tesseract /workspace/image.jpg
  stdout` to extract raw text.

  3. Alternatively, use Python with pytesseract: load the image with PIL, apply preprocessing
  if needed (grayscale, thresholding), then run pytesseract.image_to_string().

  4. Review the extracted text and identify all street names, directional indicators
  (N/S/E/W, arrows), distances (e.g., "0.5 mi", "2 km"), and route numbers.

  5. Organize the findings by sign panel or direction, noting the layout of the sign.

  6. Report the complete extracted text along with a structured summary of the directional
  information, street names, and any distances or route numbers found on the sign.'
safety_checks:
- keywords:
  - private
  - classified
  - password
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - St
    - Ave
    type: keywords_present
  description: Agent identifies street name suffixes or common sign text elements
  name: Agent identifies street name suffixes or
  weight: 0.15
- check:
    keywords:
    - N
    - S
    - E
    - W
    type: keywords_present
  description: Agent identifies directional indicators present on the sign
  name: 'Agent identifies directional indicators '
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully read and report all visible text from the street
      sign image at /workspace/image.jpg?

      2. Did the agent identify and report directional information (compass directions,
      arrows, or route directions) shown on the signs?

      3. Did the agent report any street names, distances, or route numbers visible
      in the image?

      4. Is the response organized clearly, distinguishing between different signs
      or sign panels if multiple are present?

      5. Did the agent accurately describe the layout and structure of the sign (e.g.,
      blade signs, overhead signs, post-mounted signs)?

      Score 1.0 if all visible text is accurately extracted and directional information
      is clearly reported.

      Score 0.7 if most text is captured but some minor details are missed.

      Score 0.4 if only partial text is extracted or directional information is vague.

      Score 0.1 if the agent fails to extract meaningful text or misidentifies the
      sign content.

      '
    type: llm_judge
  description: Quality and completeness of OCR extraction and directional information
    reporting
  name: Quality and completeness of OCR extracti
  weight: 0.5
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image not accessible
    type: keywords_absent
  description: Agent does not report failure to access or read the image
  name: 'Agent does not report failure to access '
  weight: 0.1
- check:
    rubric: 'Assess whether the agent provided a structured and useful summary of
      the street sign information:

      1. Did the agent organize the extracted text logically (e.g., by sign panel
      or direction)?

      2. Did the agent note the color, shape, or style of the signs if relevant to
      interpreting the information?

      3. Did the agent provide any context about what intersection or location the
      sign might indicate based on the visible information?

      Score 1.0 for a well-structured, comprehensive report with context.

      Score 0.5 for a basic listing of text without organization or context.

      Score 0.0 if the response is disorganized or missing key structural details.

      '
    type: llm_judge
  description: Structure and contextual quality of the sign analysis
  name: 'Structure and contextual quality of the '
  weight: 0.1
task_id: OCR-562
task_name: Street Sign Directional Information Extraction
tools: []
