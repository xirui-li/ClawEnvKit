category: OCR
claw_eval_id: T58zh_painting_identification
difficulty: medium
files:
- source: OCR-051/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the product specification sheet image at /workspace/image.jpg using
  OCR or image analysis capabilities. Extract all technical details, specifications,
  model numbers, measurements, and any other relevant product information visible
  in the image, then provide a comprehensive summary of the product and its specifications.
reference_solution: 1. Use a native OCR tool such as tesseract (e.g., tesseract /workspace/image.jpg
  stdout) or a Python library like pytesseract or easyocr to extract text from the
  image. 2. If OCR tools are unavailable, use an image analysis approach via Python
  PIL/Pillow to inspect the image and attempt text extraction. 3. Parse the extracted
  text to identify product name, model number, technical specifications such as dimensions,
  weight, power requirements, frequency ranges, and other measurable parameters. 4.
  Organize the findings into a structured summary covering all major specification
  categories visible in the document. 5. Report the complete list of specifications
  with their values and units clearly stated.
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - specification
    - model
    - technical
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - mm
    - kg
    - MHz
    - GHz
    - watt
    - volt
    - amp
    - inch
    - cm
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    rubric: Evaluate whether the agent successfully extracted and reported technical
      specifications from the product sheet image. The response should include specific
      numerical values, units of measurement, model identifiers or product names,
      and organized technical details. Penalize responses that are vague, incomplete,
      or fail to extract concrete data from the image. Award full marks if the agent
      provides a well-structured summary with multiple specific technical parameters
      extracted from the document.
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image is blank
    type: keywords_absent
  name: keywords_absent
  weight: 0.15
task_id: OCR-621
task_name: Product Specification Sheet OCR Extraction
tools: []
