category: OCR
claw_eval_id: T72_restaurant_menu_contact
difficulty: medium
files:
- source: OCR-065/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the product specification sheet image at /workspace/image.jpg and
  extract all technical details, specifications, and product information visible in
  the document. Report the product name, model number, key technical specifications
  (such as dimensions, power ratings, operating conditions, or performance metrics),
  and any other important details found on the sheet.
reference_solution: '1. Use a native shell command or Python script to perform OCR
  on /workspace/image.jpg. For example, use the ''tesseract'' CLI tool: ''tesseract
  /workspace/image.jpg stdout'' to extract all text from the image.

  2. Alternatively, use Python with pytesseract: ''python3 -c "import pytesseract;
  from PIL import Image; print(pytesseract.image_to_string(Image.open(\"/workspace/image.jpg\")))"''

  3. Review the extracted text output and identify the product name, model number,
  and all technical specifications listed (dimensions, electrical ratings, operating
  temperature ranges, performance metrics, certifications, etc.).

  4. Organize the extracted information into a structured report with clear sections
  for product identification, technical specifications, and any additional notes or
  compliance information.

  5. Report all findings as text output, ensuring numerical values and units are accurately
  transcribed from the specification sheet.'
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - W
    - V
    - mm
    type: keywords_present
  description: Agent identifies units of measurement present in the specification
    sheet
  name: Agent identifies units of measurement pr
  weight: 0.15
- case_sensitive: false
  check:
    keywords:
    - model
    - specification
    - product
    type: keywords_present
  description: Agent identifies core product documentation terminology from the sheet
  name: Agent identifies core product documentat
  weight: 0.2
- check:
    rubric: 'Evaluate whether the agent successfully performed OCR on the product
      specification sheet image and extracted meaningful technical content. The agent
      should have identified and reported: (1) any product name or model identifier
      visible in the image, (2) numerical technical specifications such as dimensions,
      voltages, wattages, temperatures, or performance values, (3) any section headers
      or categories organizing the specifications, (4) any compliance markings, certifications,
      or standards references. Score higher if the agent provides a structured, organized
      summary of the extracted information rather than a disorganized dump of text.
      Penalize heavily if the agent claims it cannot read the image or provides no
      extracted content.'
    type: llm_judge
  description: Quality and completeness of OCR extraction and technical detail reporting
  name: Quality and completeness of OCR extracti
  weight: 0.5
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image is blank
    type: keywords_absent
  description: Agent does not falsely claim inability to extract information from
    the image
  name: Agent does not falsely claim inability t
  weight: 0.15
task_id: OCR-764
task_name: Extract Product Specification Sheet Details
tools: []
