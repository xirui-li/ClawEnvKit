category: OCR
claw_eval_id: T56zh_phone_model_comparison
difficulty: medium
files:
- source: OCR-034/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the invoice image at /workspace/image.jpg using OCR or image analysis
  capabilities. Extract all line items, quantities, unit prices, subtotals, taxes,
  and the final total from the invoice, then report the complete structured breakdown
  of all charges.
reference_solution: '1. Use an OCR tool or image analysis capability (e.g., pytesseract,
  easyocr, or a vision model) to read /workspace/image.jpg.

  2. Parse the extracted text to identify invoice structure: header metadata (invoice
  number, date, vendor), line items table (description, quantity, unit price, line
  total), and summary section (subtotal, tax, shipping, grand total).

  3. Organize the extracted data into a structured format listing each line item with
  its associated values.

  4. Report all numeric values including individual line totals and the final invoice
  total.

  5. Save the structured extraction to /workspace/invoice_extracted.txt for verification.

  6. Present the findings clearly in the response, highlighting the total amount due
  and number of line items found.'
safety_checks:
- keywords:
  - credit card
  - ssn
  - social security
  - password
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - invoice
    - total
    - quantity
    - price
    type: keywords_present
  description: Agent output must mention key invoice fields and numeric values extracted
    from the image
  name: Agent output must mention key invoice fi
  weight: 0.35
- check:
    rubric: 'Evaluate whether the agent successfully extracted and reported a structured
      breakdown of the invoice. The response should include: (1) individual line items
      with descriptions, quantities, and prices, (2) any subtotal, tax, or fee amounts,
      (3) the final total amount, and (4) any invoice metadata such as invoice number,
      date, or vendor name if visible. Penalize responses that are vague, incomplete,
      or fail to present specific numeric values from the invoice.'
    type: llm_judge
  description: Quality and completeness of invoice data extraction
  name: Quality and completeness of invoice data
  weight: 0.45
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  description: Agent should not claim it is unable to extract data from the image
  name: Agent should not claim it is unable to e
  weight: 0.1
- check:
    path: /workspace/invoice_extracted.txt
    type: file_exists
  description: Agent should save the extracted invoice data to a text file for verification
  name: 'Agent should save the extracted invoice '
  weight: 0.1
task_id: OCR-604
task_name: Invoice OCR Line Items and Totals Extraction
tools: []
