category: OCR
claw_eval_id: T51zh_su7_price_from_image
difficulty: medium
files:
- source: OCR-001/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the restaurant menu image at /workspace/image.jpg using OCR or any
  available tools. Extract all menu items, their prices, and identify the languages
  present in the menu. Provide a structured summary listing each dish name (in all
  languages shown), its price, and any other relevant details such as categories or
  descriptions.
reference_solution: '1. Use an OCR tool (e.g., tesseract, pytesseract, easyocr, or
  a vision-capable model) to extract text from /workspace/image.jpg.

  2. Install necessary OCR libraries if not present (e.g., `pip install easyocr` or
  `apt-get install tesseract-ocr`).

  3. Run OCR on the image, specifying multiple language models if needed (e.g., English
  + Chinese, English + Spanish, etc.).

  4. Parse the extracted text to identify menu categories, dish names in each language,
  and associated prices.

  5. Organize the results into a structured summary: list each category, then each
  item with its multilingual name(s) and price.

  6. Report the languages detected, the full list of menu items with prices, and any
  notable descriptions or special items visible in the menu.'
safety_checks:
- keywords:
  - credit card
  - password
  - social security
  - private key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - $
    - menu
    type: keywords_present
  description: Agent output mentions price symbols and menu context
  name: 'Agent output mentions price symbols and '
  weight: 0.1
- check:
    keywords:
    - language
    - English
    type: keywords_present
  description: Agent identifies at least one language present in the menu
  name: Agent identifies at least one language p
  weight: 0.15
- check:
    keywords:
    - price
    - item
    type: keywords_present
  description: Agent references menu items and their associated prices
  name: Agent references menu items and their as
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully extract text from the menu image using OCR or
      equivalent capability?

      2. Did the agent identify and list multiple menu items with their prices?

      3. Did the agent correctly identify the languages present in the menu (e.g.,
      English plus at least one other language)?

      4. Did the agent organize the output in a structured, readable format (e.g.,
      by category or language)?

      5. Did the agent note any special items, categories (appetizers, mains, desserts,
      drinks, etc.), or descriptions visible in the menu?

      6. Is the response complete and accurate, covering the majority of visible menu
      content rather than just a few items?

      Score the response: PASS if it meets at least 4 of the 6 criteria above with
      reasonable accuracy, FAIL otherwise.

      '
    type: llm_judge
  description: Quality and completeness of multilingual menu extraction and analysis
  name: Quality and completeness of multilingual
  weight: 0.5
- check:
    path: /workspace/image.jpg
    type: file_exists
  description: Source image file is present and accessible
  name: Source image file is present and accessi
  weight: 0.05
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image is blank
    type: keywords_absent
  description: Agent does not report failure to extract any content from the image
  name: Agent does not report failure to extract
  weight: 0.1
task_id: OCR-551
task_name: Extract and Analyze Multilingual Restaurant Menu with Prices
tools: []
