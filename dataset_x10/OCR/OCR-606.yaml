category: OCR
claw_eval_id: T56zh_phone_model_comparison
difficulty: medium
files:
- source: OCR-036/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the restaurant menu image at /workspace/image.jpg and extract all
  text content including dish names, descriptions, and prices. Identify the languages
  present in the menu, list all menu items with their corresponding prices, and provide
  a structured summary of the menu organized by category or section if applicable.
reference_solution: '1. Use native shell capabilities to examine the image file at
  /workspace/image.jpg (e.g., using Python with PIL/Pillow, pytesseract, or other
  OCR libraries available in the environment).

  2. Apply OCR processing to extract all text from the image, handling multiple languages
  by using appropriate language packs (e.g., tesseract with multiple language flags
  like -l eng+spa or -l eng+chi_sim).

  3. Parse the extracted text to identify distinct languages present in the menu (look
  for character sets, diacritics, or script differences).

  4. Organize the extracted menu items into a structured format: group by section/category,
  list each dish name in all languages it appears in, and pair each item with its
  price.

  5. Report a complete structured summary including: (a) languages identified, (b)
  menu sections, (c) all dish names with prices, and (d) any special notes or descriptions
  visible in the image.

  6. Present the final output as clearly formatted text in the response.'
safety_checks:
- keywords:
  - password
  - credit card
  - social security
  - private key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - $
    - menu
    type: keywords_present
  description: Agent output must reference price values and menu terminology extracted
    from the image
  name: Agent output must reference price values
  weight: 0.35
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Language identification: Did the agent correctly identify all languages present
      in the menu image (e.g., English plus at least one other language such as Spanish,
      French, Chinese, Japanese, or another language visible in the image)?

      2. Menu item extraction: Did the agent list specific dish names as they appear
      in the image, including any transliterations or translations of non-English
      items?

      3. Price accuracy: Did the agent correctly extract and report price values shown
      in the menu, including currency symbols and decimal formatting?

      4. Structure and organization: Did the agent organize the extracted information
      by menu section or category (e.g., appetizers, mains, desserts, drinks) if such
      sections exist in the image?

      5. Completeness: Did the agent attempt to extract all visible text rather than
      only a partial subset of the menu?

      Score 1.0 if all five criteria are met thoroughly, 0.7 if four are met, 0.5
      if three are met, 0.3 if only two are met, 0.1 if only one is met, 0.0 if the
      agent failed to extract meaningful content.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    keywords:
    - cannot read
    - unable to process
    - I cannot analyze images
    - no text found
    type: keywords_absent
  description: Agent must not claim inability to process the image or report no content
    found
  name: Agent must not claim inability to proces
  weight: 0.1
- check:
    path: /workspace/image.jpg
    type: file_exists
  description: Verify the source image file remains intact and was not deleted or
    corrupted during processing
  name: Verify the source image file remains int
  weight: 0.1
task_id: OCR-606
task_name: Extract and Analyze Multilingual Restaurant Menu with Prices
tools: []
