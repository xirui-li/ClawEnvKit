category: OCR
claw_eval_id: T57_deepseek_logo_identification
difficulty: medium
files:
- source: OCR-042/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the whiteboard diagram image at /workspace/image.jpg using OCR and
  visual inspection. Identify and list all labeled components, text, arrows, shapes,
  and any structural relationships shown in the diagram. Provide a comprehensive description
  of the diagram's content and layout.
reference_solution: '1. Use a native image reading capability or OCR tool (e.g., tesseract,
  pytesseract, or a vision-capable model) to open and analyze /workspace/image.jpg.

  2. Extract all visible text from the whiteboard diagram using OCR.

  3. Identify structural elements such as boxes, circles, arrows, and connecting lines.

  4. Map out the labeled components and their relationships or flow directions.

  5. Describe the overall diagram structure, including any hierarchy, sequence, or
  grouping of components.

  6. Present findings as a structured textual summary listing all identified labels,
  shapes, and connections.'
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - whiteboard
    - label
    - component
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - arrow
    - box
    - text
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: 'The agent should provide a detailed description of the whiteboard diagram
      in /workspace/image.jpg. Evaluate whether the agent: (1) successfully extracted
      readable text and labels from the image, (2) described the structural layout
      including shapes, arrows, and connections between components, (3) identified
      the relationships or flow shown in the diagram, (4) organized the findings in
      a clear and logical manner. Award full marks if the agent provides a thorough,
      accurate description of all visible elements including any numbered or named
      components, directional indicators, and hierarchical relationships visible in
      the whiteboard diagram.'
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - error reading
    - cannot process
    - unable to open
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
- check:
    path: /workspace/image.jpg
    type: file_exists
  name: file_exists
  weight: 0.1
task_id: OCR-612
task_name: Whiteboard Diagram OCR and Component Labeling
tools: []
