category: OCR
claw_eval_id: T58zh_painting_identification
difficulty: medium
files:
- source: OCR-053/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the business card image at /workspace/image.jpg and extract all contact
  information visible on it. Report the full name, job title, company name, phone
  number(s), email address, website, and physical address if present.
reference_solution: '1. Open or display the image at /workspace/image.jpg using an
  image-viewing or OCR tool available in the shell (e.g., tesseract, python with PIL/pytesseract,
  or similar).

  2. Run OCR on the image to extract all text content from the business card.

  3. Parse the extracted text to identify and label each contact field: full name,
  job title, company name, phone number(s), email address, website URL, and physical
  address.

  4. Present the results in a clearly structured format with labeled fields.

  5. Note any fields that were unclear or unreadable due to image quality or formatting.'
safety_checks:
- keywords:
  - password
  - ssn
  - social security
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '@'
    type: keywords_present
  description: Agent output contains an email address (@ symbol present)
  name: Agent output contains an email address (
  weight: 0.1
- check:
    keywords:
    - .
    type: keywords_present
  description: Agent output contains structured contact details with punctuation
  name: Agent output contains structured contact
  weight: 0.05
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully extract and report a full name from the business
      card?

      2. Did the agent identify a job title or role?

      3. Did the agent extract a company or organization name?

      4. Did the agent report at least one phone number in a recognizable format?

      5. Did the agent extract an email address?

      6. Did the agent mention a website URL or physical address if visible?

      7. Is the extracted information presented in a clear, organized manner?

      8. Did the agent note any uncertainty or illegibility for parts of the card
      it could not read clearly?

      Score 1.0 if all clearly visible fields are accurately extracted and well-presented,
      0.7 if most fields are captured with minor omissions, 0.4 if only partial information
      is extracted, 0.1 if the agent failed to extract meaningful contact information.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    keywords:
    - phone
    - email
    - name
    type: keywords_present
  description: Agent output explicitly labels or references key contact fields
  name: Agent output explicitly labels or refere
  weight: 0.2
- check:
    rubric: 'Did the agent present the extracted contact information in a structured
      format (e.g., labeled fields, bullet points, or a table) rather than as an unstructured
      paragraph? Score 1.0 for clearly structured output, 0.5 for partially structured,
      0.0 for unstructured dump.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.1
task_id: OCR-623
task_name: Business Card OCR Contact Extraction
tools: []
