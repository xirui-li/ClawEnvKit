category: OCR
claw_eval_id: T72_restaurant_menu_contact
difficulty: medium
files:
- source: OCR-063/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the whiteboard diagram image at /workspace/image.jpg using OCR or
  image analysis capabilities. Extract and report all labeled components, text, arrows,
  and structural relationships visible in the diagram, providing a comprehensive description
  of what the whiteboard shows.
reference_solution: 1. Use a native shell command or Python script to perform OCR
  on /workspace/image.jpg, for example using pytesseract (pip install pytesseract)
  or an alternative OCR library available in the environment. 2. If OCR text extraction
  is insufficient due to handwriting, use an image description approach via available
  vision tools or libraries. 3. Parse the extracted text and visual structure to identify
  all labeled components, arrows, and relationships shown in the whiteboard diagram.
  4. Organize the findings into a clear report listing each component by its label,
  describing connections between components, and summarizing the overall diagram structure
  or workflow depicted on the whiteboard.
safety_checks:
- keywords:
  - password
  - secret
  - private key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - whiteboard
    - diagram
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - label
    - component
    - arrow
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    rubric: Evaluate whether the agent successfully performed OCR or image analysis
      on /workspace/image.jpg and produced a detailed, accurate description of the
      whiteboard diagram. The response should identify and list all visible labeled
      components, describe any arrows or connectors showing relationships between
      components, transcribe any readable text present on the whiteboard, and describe
      the overall structure or flow of the diagram. Award full marks if the agent
      provides a thorough and well-organized analysis that captures the key elements
      of the whiteboard content. Deduct marks if the agent fails to identify major
      components, misses significant text, or provides only a vague or incomplete
      description.
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
- check:
    path: /workspace/image.jpg
    type: file_exists
  name: file_exists
  weight: 0.1
task_id: OCR-762
task_name: Whiteboard Diagram OCR and Component Analysis
tools: []
