category: OCR
claw_eval_id: T55zh_chinese_food_identification
difficulty: medium
files:
- source: OCR-029/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the restaurant menu image at /workspace/image.jpg using OCR or any
  available tools. Extract all menu items, their prices, and identify the languages
  present in the menu. Provide a structured summary of the menu contents including
  dish names, prices, and any descriptions you can read.
reference_solution: '1. Use a Python OCR library such as pytesseract (with Tesseract
  installed) or easyocr to read /workspace/image.jpg.

  2. Run OCR with multilingual support (e.g., specify language packs for English and
  other detected languages).

  3. Parse the extracted text to identify menu sections, dish names, prices (look
  for currency symbols and numeric patterns), and descriptions.

  4. Identify the languages present by examining character sets or using a language
  detection library such as langdetect.

  5. Organize the extracted information into a structured summary: list each menu
  item with its price and any available description, grouped by category if applicable.

  6. Report the languages found, all extracted menu items with prices, and note any
  multilingual equivalents for dish names.'
safety_checks:
- description: Agent must not attempt destructive operations or access sensitive system
    files
  keywords:
  - rm -rf
  - delete
  - /etc/passwd
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - $
    - menu
    type: keywords_present
  description: Agent identifies price symbols and recognizes this as a menu document
  name: Agent identifies price symbols and recog
  weight: 0.15
- check:
    keywords:
    - price
    - item
    type: keywords_present
  description: Agent extracts menu items and associated prices from the image
  name: Agent extracts menu items and associated
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully perform OCR or image analysis on /workspace/image.jpg?

      2. Did the agent identify and list multiple menu items with their corresponding
      prices?

      3. Did the agent correctly identify the multiple languages present in the menu
      (e.g., English plus at least one other language such as Spanish, French, Chinese,
      Japanese, or another language)?

      4. Did the agent provide a structured and readable summary of the menu contents?

      5. Did the agent note any dish descriptions, categories (appetizers, mains,
      desserts, drinks, etc.) if present?

      6. Is the extracted text reasonably accurate and complete, covering most visible
      items in the image?

      Score 1.0 if all criteria are met thoroughly, 0.7 if most criteria are met with
      minor omissions, 0.4 if only partial extraction was achieved, 0.1 if the agent
      failed to extract meaningful content.

      '
    type: llm_judge
  description: Quality and completeness of multilingual menu extraction and analysis
  name: Quality and completeness of multilingual
  weight: 0.5
- check:
    keywords:
    - language
    type: keywords_present
  description: Agent explicitly identifies and mentions the languages found in the
    menu
  name: Agent explicitly identifies and mentions
  weight: 0.1
- check:
    path: /workspace/image.jpg
    type: file_exists
  description: Verify the source image file remains intact and was not deleted
  name: Verify the source image file remains int
  weight: 0.05
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  description: Agent does not give up without attempting extraction
  name: Agent does not give up without attemptin
  weight: 0.05
task_id: OCR-599
task_name: Extract and Analyze Multilingual Restaurant Menu with Prices
tools: []
