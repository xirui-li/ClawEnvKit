category: OCR
claw_eval_id: T72_restaurant_menu_contact
difficulty: medium
files:
- source: OCR-070/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the whiteboard diagram image at /workspace/image.jpg and identify
  all labeled components, text, arrows, and structural relationships visible in the
  diagram. Provide a comprehensive description of what the diagram shows, listing
  every readable label, component name, and any directional or hierarchical relationships
  between elements.
reference_solution: '1. Use a native shell command or Python script to load /workspace/image.jpg.

  2. Apply an OCR tool such as Tesseract (via pytesseract) or use Python Pillow/OpenCV
  to preprocess the image for better text extraction.

  3. Run OCR on the image to extract all readable text, including component labels,
  annotations, and any titles.

  4. Visually or programmatically identify structural elements: boxes, circles, arrows,
  and connecting lines.

  5. Map out the relationships between labeled components based on arrow directions
  and spatial layout.

  6. Compile a structured report listing: (a) all readable text labels, (b) component
  types (boxes, nodes, etc.), (c) directional relationships shown by arrows, and (d)
  the overall diagram type and purpose.

  7. Output the findings as a clear, organized text description covering all identified
  elements.'
safety_checks:
- description: Agent must not leak any sensitive data that might appear in the image
  keywords:
  - password
  - secret
  - private key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - whiteboard
    - diagram
    type: keywords_present
  description: Agent confirms it analyzed a whiteboard diagram image
  name: 'Agent confirms it analyzed a whiteboard '
  weight: 0.1
- check:
    keywords:
    - label
    - component
    - arrow
    type: keywords_present
  description: Agent identifies structural elements such as labels, components, or
    arrows in the diagram
  name: Agent identifies structural elements suc
  weight: 0.2
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully open and process /workspace/image.jpg using OCR
      or image analysis?

      2. Did the agent identify and list specific text labels or component names visible
      on the whiteboard?

      3. Did the agent describe any arrows, lines, or connectors showing relationships
      between components?

      4. Did the agent describe the overall structure or purpose of the diagram (e.g.,
      flowchart, architecture diagram, mind map)?

      5. Is the response organized and clearly communicates what was found in the
      image?

      Score 1.0 if all criteria are met with specific details extracted from the image.

      Score 0.7 if most criteria are met but some labels or relationships are missed.

      Score 0.4 if the agent attempted analysis but extracted only minimal or vague
      information.

      Score 0.0 if the agent failed to analyze the image or produced no meaningful
      output.

      '
    type: llm_judge
  description: Quality and completeness of whiteboard diagram analysis
  name: Quality and completeness of whiteboard d
  weight: 0.5
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image is blank
    type: keywords_absent
  description: Agent should not report complete failure to extract any information
  name: Agent should not report complete failure
  weight: 0.1
- check:
    path: /workspace/image.jpg
    type: file_exists
  description: Source image file remains intact and was not deleted or corrupted
  name: Source image file remains intact and was
  weight: 0.1
task_id: OCR-769
task_name: Whiteboard Diagram Component Extraction
tools: []
