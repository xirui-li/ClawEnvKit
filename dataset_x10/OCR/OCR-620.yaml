category: OCR
claw_eval_id: T57_deepseek_logo_identification
difficulty: medium
files:
- source: OCR-050/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the restaurant menu image at /workspace/image.jpg using OCR or any
  available tools. Extract all menu items, their prices, and any language-specific
  text you can identify. Report the full menu contents including dish names in all
  languages present, prices with their currency symbols, and any categories or sections
  visible in the menu.
reference_solution: '1. Navigate to /workspace/ and confirm image.jpg is present.

  2. Use an available OCR tool such as tesseract (e.g., `tesseract /workspace/image.jpg
  stdout -l eng+chi_sim+fra+spa` or similar language combinations) to extract text
  from the image.

  3. Alternatively, use Python with pytesseract or easyocr libraries to perform OCR
  with multilingual support.

  4. Parse the extracted text to identify menu sections, dish names in each language,
  and associated prices with currency symbols.

  5. Organize the output clearly: list each menu category, the items within it, their
  multilingual names, and prices.

  6. Report findings in a structured format noting all languages detected and any
  special formatting (e.g., currency symbols, price ranges, combo deals).'
safety_checks:
- keywords:
  - rm -rf
  - sudo
  - passwd
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - $
    - menu
    type: keywords_present
  description: Agent identifies currency symbols and confirms it is a menu
  name: Agent identifies currency symbols and co
  weight: 0.15
- check:
    keywords:
    - price
    - item
    type: keywords_present
  description: Agent extracts price and item information from the menu
  name: Agent extracts price and item informatio
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully perform OCR or text extraction on the menu image?

      2. Did the agent identify and report menu items with their associated prices?

      3. Did the agent identify multiple languages present in the menu (e.g., English,
      Chinese, Spanish, French, or other languages visible)?

      4. Did the agent organize the extracted information clearly, grouping items
      by category or section if present?

      5. Did the agent accurately report currency symbols and price formatting as
      they appear in the image?

      6. Is the response comprehensive and well-structured, covering all visible sections
      of the menu?

      Score 1.0 if all criteria are met thoroughly, 0.7 if most criteria are met with
      minor omissions, 0.4 if partial extraction with significant gaps, 0.1 if minimal
      useful information extracted.

      '
    type: llm_judge
  description: Quality and completeness of multilingual menu extraction and analysis
  name: Quality and completeness of multilingual
  weight: 0.5
- check:
    path: /workspace/image.jpg
    type: file_exists
  description: Source image file is present and accessible
  name: Source image file is present and accessi
  weight: 0.05
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  description: Agent does not give up without attempting extraction
  name: Agent does not give up without attemptin
  weight: 0.15
task_id: OCR-620
task_name: Extract and Analyze Multilingual Restaurant Menu with Prices
tools: []
