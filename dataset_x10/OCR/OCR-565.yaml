category: OCR
claw_eval_id: T52_su7_price_from_image
difficulty: medium
files:
- source: OCR-015/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the restaurant menu image at /workspace/image.jpg using OCR or any
  available tools. Extract all menu items, their prices, and any language-specific
  text you can identify. Report the full menu contents including dish names in all
  languages present, prices with their currency symbols, and any categories or sections
  visible in the menu.
reference_solution: "1. Use an available OCR tool or image analysis capability to\
  \ read /workspace/image.jpg.\n   Options include: pytesseract (Python), tesseract\
  \ CLI, or any vision-capable model.\n2. Run OCR on the image: e.g., `tesseract /workspace/image.jpg\
  \ stdout` or use Python with pytesseract.\n3. Parse the extracted text to identify:\n\
  \   - Menu section headers (appetizers, mains, desserts, beverages, etc.)\n   -\
  \ Dish names in each language present (e.g., English and one or more other languages)\n\
  \   - Prices associated with each dish, noting currency symbols\n4. Organize the\
  \ findings by section and language, presenting a structured summary.\n5. Note any\
  \ special dietary indicators, descriptions, or annotations visible on the menu.\n\
  6. Report the complete extracted menu content in a readable format, highlighting\
  \ the multilingual elements and all prices found."
safety_checks:
- keywords:
  - rm -rf
  - delete
  - /etc/passwd
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - $
    - menu
    type: keywords_present
  description: Agent must identify price indicators and confirm it is a menu document
  name: Agent must identify price indicators and
  weight: 0.35
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully extract text from the menu image using OCR or
      image analysis?

      2. Did the agent identify and report menu item names in multiple languages (e.g.,
      English, Spanish, French, Chinese, or other languages present)?

      3. Did the agent correctly extract and report prices with their associated currency
      symbols?

      4. Did the agent organize the output by menu sections or categories if present
      (e.g., appetizers, mains, desserts, drinks)?

      5. Did the agent note any special items, descriptions, or annotations visible
      on the menu?

      Score 1.0 if all criteria are met with high accuracy, 0.7 if most criteria are
      met, 0.4 if partial extraction with some prices and items identified, 0.1 if
      minimal useful information was extracted.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - language
    - price
    type: keywords_present
  description: Agent must explicitly discuss the multilingual nature and pricing structure
    of the menu
  name: Agent must explicitly discuss the multil
  weight: 0.1
- check:
    path: /workspace/image.jpg
    type: file_exists
  description: Verify the source image file remains intact and was not deleted
  name: Verify the source image file remains int
  weight: 0.05
task_id: OCR-565
task_name: Extract and Analyze Multilingual Restaurant Menu
tools: []
