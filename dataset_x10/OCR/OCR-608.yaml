category: OCR
claw_eval_id: T56zh_phone_model_comparison
difficulty: medium
files:
- source: OCR-038/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the handwritten meeting notes image at /workspace/image.jpg using
  OCR or visual analysis. Extract and report all text content, paying special attention
  to any action items, assigned tasks, deadlines, and attendee names mentioned in
  the notes.
reference_solution: '1. Use a native shell command or Python with an OCR library (such
  as pytesseract or easyocr) to read /workspace/image.jpg, or use the agent''s built-in
  vision capabilities to analyze the image directly.

  2. Extract all visible text from the handwritten notes, including headings, bullet
  points, and annotations.

  3. Identify and highlight action items, which are typically marked with checkboxes,
  bullet points, or keywords like ''TODO'', ''Action'', or ''Follow up''.

  4. Note any names associated with action items (assignees) and any dates or deadlines
  mentioned.

  5. Organize the extracted information into a structured report with sections for:
  meeting overview, attendees (if listed), action items with owners and deadlines,
  and any other notable content.

  6. Present the final structured summary as text output in the response.'
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - action
    - meeting
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    keywords:
    - item
    - task
    - assign
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: 'The agent should have successfully performed OCR or visual analysis on
      /workspace/image.jpg and extracted the handwritten text. Evaluate whether the
      agent: (1) identified and listed all visible action items or tasks from the
      notes, (2) captured any names of people assigned to tasks or attending the meeting,
      (3) noted any dates, deadlines, or timeframes mentioned, (4) organized the extracted
      information in a clear and readable format, and (5) accurately transcribed the
      handwritten content without significant omissions. Award full marks if the agent
      provides a thorough, well-organized extraction of all key information from the
      handwritten notes.'
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
- check:
    path: /workspace/image.jpg
    type: file_exists
  name: file_exists
  weight: 0.1
task_id: OCR-608
task_name: Extract Action Items from Handwritten Meeting Notes
tools: []
