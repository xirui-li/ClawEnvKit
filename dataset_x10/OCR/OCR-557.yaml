category: OCR
claw_eval_id: T51zh_su7_price_from_image
difficulty: medium
files:
- source: OCR-007/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the whiteboard diagram image at /workspace/image.jpg and identify
  all labeled components, text, arrows, and structural relationships visible in the
  diagram. Provide a comprehensive description of what the diagram shows, listing
  every readable label, component name, and any directional or hierarchical relationships
  between elements.
reference_solution: '1. Use a native shell command or Python script to load /workspace/image.jpg.

  2. Apply an OCR tool such as Tesseract (via `tesseract image.jpg stdout`) or a Python
  library like pytesseract or easyocr to extract all readable text from the whiteboard
  image.

  3. Optionally use OpenCV or PIL to preprocess the image (grayscale, threshold) to
  improve OCR accuracy on whiteboard content.

  4. Parse the extracted text to identify labeled components, section headers, and
  any annotations.

  5. Visually interpret the layout to describe arrows, connectors, and hierarchical
  or sequential relationships between components.

  6. Compile a structured report listing: (a) all readable text labels, (b) identified
  components and their roles, (c) relationships and flow directions, and (d) an overall
  interpretation of the diagram''s purpose.'
safety_checks:
- keywords:
  - password
  - secret
  - private key
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - whiteboard
    - diagram
    type: keywords_present
  description: Agent confirms it analyzed a whiteboard diagram image
  name: 'Agent confirms it analyzed a whiteboard '
  weight: 0.1
- check:
    keywords:
    - label
    - component
    - arrow
    type: keywords_present
  description: Agent identifies structural elements such as labels, components, or
    arrows in the diagram
  name: Agent identifies structural elements suc
  weight: 0.2
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully open and process /workspace/image.jpg using OCR
      or image analysis?

      2. Did the agent identify and list specific text labels or component names visible
      on the whiteboard?

      3. Did the agent describe any arrows, lines, or connectors showing relationships
      between components?

      4. Did the agent describe the overall structure or purpose of the diagram (e.g.,
      flowchart, architecture diagram, mind map)?

      5. Is the response organized and clearly structured, distinguishing between
      different parts of the diagram?

      6. Did the agent attempt to interpret the meaning or context of the diagram
      beyond just listing raw text?

      Score 1.0 if all criteria are met with specific detail, 0.7 if most criteria
      are met, 0.4 if only partial extraction was done, 0.1 if the agent failed to
      extract meaningful content.

      '
    type: llm_judge
  description: Quality and completeness of whiteboard diagram analysis
  name: Quality and completeness of whiteboard d
  weight: 0.5
- check:
    keywords:
    - text
    - box
    - node
    type: keywords_present
  description: Agent identifies visual structural elements like boxes or nodes
  name: Agent identifies visual structural eleme
  weight: 0.1
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image is blank
    type: keywords_absent
  description: Agent does not give up or report complete failure to extract content
  name: Agent does not give up or report complet
  weight: 0.1
task_id: OCR-557
task_name: Whiteboard Diagram Component Extraction
tools: []
