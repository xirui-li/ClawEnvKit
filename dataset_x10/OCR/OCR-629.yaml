category: OCR
claw_eval_id: T58zh_painting_identification
difficulty: medium
files:
- source: OCR-059/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the handwritten meeting notes image at /workspace/image.jpg using
  OCR or visual analysis. Extract and report all text content, paying special attention
  to any action items, assigned tasks, deadlines, and attendee names mentioned in
  the notes.
reference_solution: '1. Use a native vision or OCR capability to open and analyze
  /workspace/image.jpg.

  2. Apply OCR processing or visual inspection to extract all handwritten text from
  the image.

  3. Parse the extracted text to identify structured elements such as action items,
  task owners, deadlines, and meeting attendees.

  4. Organize the findings into a clear report with sections for: general meeting
  notes, action items (with assignees and due dates if present), and any other relevant
  details.

  5. Present the full transcription along with a structured summary of action items
  in the response.'
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - action
    - meeting
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    keywords:
    - item
    - task
    - assign
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: 'The agent should have successfully performed OCR or visual analysis on
      /workspace/image.jpg and extracted the handwritten text. Evaluate whether the
      agent: (1) identified and listed all visible action items or tasks from the
      notes, (2) extracted any names of people assigned to tasks or attendees present,
      (3) identified any dates, deadlines, or timeframes mentioned, (4) organized
      the extracted information in a clear and readable format, and (5) accurately
      transcribed the handwritten content without significant omissions. Award full
      marks if the agent provides a thorough, well-organized extraction of the meeting
      notes content including action items with owners and deadlines where present.'
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  name: keywords_absent
  weight: 0.15
task_id: OCR-629
task_name: Extract Action Items from Handwritten Meeting Notes
tools: []
