category: OCR
claw_eval_id: T51zh_su7_price_from_image
difficulty: medium
files:
- source: OCR-009/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the product specification sheet image at /workspace/image.jpg using
  OCR or image analysis capabilities. Extract and report all technical specifications,
  model numbers, dimensions, performance metrics, and any other key details visible
  in the document.
reference_solution: 1. Use native image analysis or OCR capability to read /workspace/image.jpg.
  2. Identify the product name, model number, and manufacturer if visible. 3. Extract
  all technical specifications including electrical parameters (voltage, current,
  power, frequency), mechanical parameters (dimensions, weight, materials), and performance
  metrics. 4. Note any certifications, compliance standards, or regulatory markings.
  5. Organize the extracted information into clearly labeled categories and report
  all values with their appropriate units. 6. Flag any text that was difficult to
  read or ambiguous.
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - specification
    - model
    - voltage
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - mm
    - kg
    - Hz
    - W
    - A
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    rubric: Evaluate whether the agent successfully extracted and reported technical
      details from the product specification sheet image. The response should include
      structured information such as product name or model identifier, technical parameters
      (electrical, mechanical, or performance specs), dimensional or weight data if
      present, and any certifications or compliance markings visible. Award full marks
      if the agent provides a comprehensive, well-organized extraction of all visible
      technical content. Deduct marks if key specification categories are missing,
      values are vague or unreadable without explanation, or the response is disorganized.
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    rubric: Assess the accuracy and completeness of the OCR extraction. The agent
      should clearly distinguish between different specification categories (e.g.,
      electrical specs vs mechanical specs), report numeric values with their units,
      and note any text that was unclear or partially readable. Full marks if the
      agent provides a thorough and accurate transcription with proper units and labels.
      Partial marks if some values are missing or units are omitted. Zero marks if
      the agent fails to extract meaningful content from the image.
    type: llm_judge
  name: llm_judge
  weight: 0.15
task_id: OCR-559
task_name: Extract Technical Details from Product Specification Sheet
tools: []
