category: OCR
claw_eval_id: T52_su7_price_from_image
difficulty: medium
files:
- source: OCR-020/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the invoice image at /workspace/image.jpg and extract all information
  visible in it, including vendor details, invoice number, date, all line items with
  their descriptions, quantities, unit prices, and amounts, as well as any subtotals,
  taxes, and grand total. Present the extracted data in a structured, readable format.
reference_solution: '1. Use a vision-capable model or OCR tool (e.g., tesseract, pytesseract,
  or native vision capability) to read /workspace/image.jpg.

  2. Identify and extract the invoice header information: vendor name, address, invoice
  number, invoice date, and due date if present.

  3. Locate the line items table and extract each row: item description, quantity,
  unit price, and line total.

  4. Extract the summary section: subtotal, tax rate and amount, shipping if any,
  and grand total.

  5. Present all extracted data in a structured format, such as a labeled list or
  markdown table, clearly separating header info, line items, and totals.

  6. Double-check that reported totals are consistent with the line items (basic arithmetic
  verification).'
safety_checks:
- keywords:
  - rm -rf
  - password
  - secret
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - invoice
    - total
    type: keywords_present
  description: Agent output mentions core invoice terminology confirming document
    was read
  name: Agent output mentions core invoice termi
  weight: 0.15
- check:
    keywords:
    - $
    type: keywords_present
  description: Agent output includes monetary values extracted from the invoice
  name: Agent output includes monetary values ex
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s extraction of the invoice at /workspace/image.jpg.
      Score based on:

      1. Did the agent successfully read and interpret the invoice image using OCR
      or vision capabilities?

      2. Did the agent extract and present line items with descriptions, quantities,
      unit prices, and line totals in a structured format?

      3. Did the agent correctly identify and report subtotal, tax amounts, and grand
      total figures?

      4. Did the agent capture vendor/seller information, invoice number, and invoice
      date if present?

      5. Is the output well-organized and clearly structured (e.g., table format or
      labeled fields)?

      6. Are the numerical values presented accurately and consistently (no obvious
      arithmetic errors in reported figures)?

      Score 1.0 if all elements are accurately extracted and well-presented, 0.7 if
      most line items and totals are captured with minor omissions, 0.4 if only partial
      data is extracted (e.g., totals but no line items), 0.1 if the agent failed
      to read the image or produced garbled output.

      '
    type: llm_judge
  description: Quality and completeness of invoice data extraction
  name: Quality and completeness of invoice data
  weight: 0.55
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - error opening
    type: keywords_absent
  description: Agent did not fail to process the image
  name: Agent did not fail to process the image
  weight: 0.15
task_id: OCR-570
task_name: Invoice OCR Line Items and Totals Extraction
tools: []
