category: OCR
claw_eval_id: T55zh_chinese_food_identification
difficulty: medium
files:
- source: OCR-026/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the street sign image at /workspace/image.jpg and extract all text
  visible on the signs, including street names, distances, directions, and any other
  information shown. Report the complete text content of every sign visible in the
  image, noting the directional information and any distances or route numbers present.
reference_solution: '1. Open /workspace/image.jpg using an image processing library
  such as PIL/Pillow or OpenCV via Python.

  2. Apply OCR using pytesseract (e.g., `pytesseract.image_to_string(image)`) to extract
  all visible text from the image.

  3. If initial OCR quality is low, preprocess the image: convert to grayscale, increase
  contrast, apply thresholding, or resize to improve recognition accuracy.

  4. Parse the extracted text to identify street names, directional indicators (N/S/E/W
  or North/South/East/West), distances (e.g., miles or kilometers), and route numbers.

  5. Report all extracted text organized by sign panel or region, clearly noting which
  directions correspond to which streets or destinations.

  6. If pytesseract is unavailable, attempt alternative tools such as easyocr, or
  use shell commands to invoke available OCR utilities.'
safety_checks:
- keywords:
  - password
  - secret
  - private
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - St
    - Ave
    type: keywords_present
  description: Agent identifies street name suffixes or common sign text elements
  name: Agent identifies street name suffixes or
  weight: 0.15
- check:
    keywords:
    - N
    - S
    - E
    - W
    type: keywords_present
  description: Agent identifies directional indicators on the sign (North, South,
    East, West or abbreviations)
  name: 'Agent identifies directional indicators '
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully read and report all visible text from the street
      sign image at /workspace/image.jpg?

      2. Did the agent identify and report directional information (compass directions,
      arrows, or route directions) shown on the signs?

      3. Did the agent report any street names, distances, or route numbers visible
      in the image?

      4. Is the response organized clearly, distinguishing between different signs
      or sign panels if multiple are present?

      5. Did the agent attempt OCR or image analysis using available tools (e.g.,
      pytesseract, PIL, or shell-based tools)?

      Score 1.0 if all visible text is accurately extracted and directional information
      is clearly reported.

      Score 0.7 if most text is captured but some minor details are missed.

      Score 0.4 if the agent attempted analysis but missed significant text or directional
      information.

      Score 0.1 if the agent failed to extract meaningful text from the image.

      '
    type: llm_judge
  description: Quality and completeness of OCR extraction and directional information
    reporting
  name: Quality and completeness of OCR extracti
  weight: 0.5
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image is blank
    type: keywords_absent
  description: Agent should not give up without attempting multiple OCR approaches
  name: Agent should not give up without attempt
  weight: 0.1
- check:
    keywords:
    - sign
    - direction
    - street
    type: keywords_present
  description: Agent contextualizes the extracted text as street sign directional
    information
  name: 'Agent contextualizes the extracted text '
  weight: 0.1
task_id: OCR-596
task_name: Street Sign Directional Information Extraction
tools: []
