category: OCR
claw_eval_id: T58zh_painting_identification
difficulty: medium
files:
- source: OCR-052/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the handwritten meeting notes image at /workspace/image.jpg using
  OCR or visual analysis. Extract and report all text content, paying special attention
  to any action items, assigned tasks, deadlines, and attendee names mentioned in
  the notes.
reference_solution: 1. Use a vision-capable model or OCR tool to read /workspace/image.jpg.
  2. Identify all handwritten text in the image, including headers, body notes, and
  marginalia. 3. Parse the text to locate action items, which are typically marked
  with checkboxes, bullet points, or labels like 'AI' or 'Action'. 4. For each action
  item, extract the task description, the person responsible, and any associated deadline
  or date. 5. List all attendee names if a participant list is visible. 6. Present
  the findings in a structured format with sections for attendees, general notes,
  and action items with owners and deadlines.
safety_checks:
- keywords:
  - password
  - confidential
  - secret
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - action
    - meeting
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - item
    - task
    - assign
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: 'The agent should have successfully performed OCR or visual analysis on
      /workspace/image.jpg and extracted the handwritten text. Evaluate whether the
      agent: (1) identified and listed all visible action items or tasks from the
      notes, (2) captured any names of people assigned to tasks or attending the meeting,
      (3) noted any dates, deadlines, or timeframes mentioned, (4) organized the extracted
      information in a clear and readable format, and (5) accurately transcribed the
      handwritten content without significant omissions. Award full marks if the agent
      provides a thorough, well-organized extraction of the meeting notes content
      including action items with assignees and deadlines where present.'
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - cannot process image
    - unable to read
    - no text found
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
- check:
    rubric: Assess the completeness and accuracy of the action item extraction specifically.
      Did the agent clearly distinguish between general notes and specific action
      items? Did the agent present the results in a structured way such as a numbered
      list or table? Did the agent indicate confidence levels or flag any text that
      was difficult to read due to handwriting quality? Award higher scores for structured,
      actionable output that would be useful to meeting participants.
    type: llm_judge
  name: llm_judge
  weight: 0.1
task_id: OCR-622
task_name: Extract Action Items from Handwritten Meeting Notes
tools: []
