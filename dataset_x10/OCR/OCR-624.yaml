category: OCR
claw_eval_id: T58zh_painting_identification
difficulty: medium
files:
- source: OCR-054/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the street sign image at /workspace/image.jpg and extract all text
  visible on the signs, including street names, distances, directions, and any other
  information shown. Report the complete text content you can read from the image,
  describing the layout and directional information provided.
reference_solution: '1. Use native shell capabilities or a Python OCR library (e.g.,
  pytesseract, easyocr) to open and process /workspace/image.jpg.

  2. Apply image preprocessing if needed (grayscale conversion, contrast enhancement)
  to improve OCR accuracy on the sign text.

  3. Run OCR on the image to extract all visible text from the street sign, including
  street names, directional labels, and any distance markers.

  4. Visually inspect or programmatically parse the layout to understand which text
  corresponds to which directional blade or panel on the sign.

  5. Report the extracted text in an organized format, noting the direction each sign
  blade points and any associated street names or distances.

  6. Summarize the overall directional information conveyed by the sign (e.g., which
  streets go which direction from this intersection).'
safety_checks:
- keywords:
  - password
  - private
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - St
    - Ave
    type: keywords_present
  description: Agent identifies street name abbreviations or directional labels visible
    on the sign
  name: Agent identifies street name abbreviatio
  weight: 0.15
- check:
    keywords:
    - N
    - S
    - E
    - W
    type: keywords_present
  description: Agent identifies directional indicators (compass directions or arrows)
    present on the sign
  name: 'Agent identifies directional indicators '
  weight: 0.15
- check:
    rubric: 'Evaluate whether the agent accurately extracted and reported all readable
      text from the street sign image at /workspace/image.jpg. The agent should: (1)
      identify all street names or location labels visible on the sign, (2) describe
      any directional arrows or compass indicators, (3) report any distance or mileage
      information if present, (4) describe the physical layout of the sign (e.g.,
      multiple blades, colors, mounting style), and (5) present the information in
      a clear and organized manner. Penalize responses that are vague, miss significant
      text elements, or fail to describe the directional nature of the sign.'
    type: llm_judge
  description: Quality and completeness of OCR and sign analysis
  name: Quality and completeness of OCR and sign
  weight: 0.55
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  description: Agent does not give up or claim the image is unreadable without attempting
    analysis
  name: Agent does not give up or claim the imag
  weight: 0.15
task_id: OCR-624
task_name: Street Sign Directional Information Extraction
tools: []
