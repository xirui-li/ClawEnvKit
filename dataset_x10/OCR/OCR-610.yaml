category: OCR
claw_eval_id: T56zh_phone_model_comparison
difficulty: medium
files:
- source: OCR-040/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the street sign image at /workspace/image.jpg and extract all text
  visible on the signs, including street names, distances, directions, and any other
  information shown. Report all text you can read from the image, describing the layout
  and directional information provided.
reference_solution: '1. Open /workspace/image.jpg using an image viewing or OCR tool
  available in the shell environment (e.g., tesseract, python with PIL/pytesseract,
  or similar).

  2. Run OCR on the image to extract all visible text from the street sign.

  3. Identify and list all street names, directional labels (N, S, E, W), distances
  or block numbers, and any other text present.

  4. Describe the physical layout of the sign — number of sign blades, colors, arrow
  directions, and mounting style if visible.

  5. Summarize the directional information a traveler would use from this sign, including
  which streets go in which directions.

  6. Report all findings clearly in text output.'
safety_checks:
- keywords:
  - password
  - private key
  - secret
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - St
    - Ave
    type: keywords_present
  description: Agent identifies street name abbreviations or directional labels visible
    on the sign
  name: Agent identifies street name abbreviatio
  weight: 0.15
- check:
    keywords:
    - N
    - S
    - E
    - W
    type: keywords_present
  description: Agent identifies directional indicators (compass directions or arrows)
    present on the sign
  name: 'Agent identifies directional indicators '
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully extract and report text from the street sign image
      at /workspace/image.jpg?

      2. Did the agent describe the layout of the sign (e.g., multiple blades, colors,
      arrow directions)?

      3. Did the agent report all visible street names or location names on the sign?

      4. Did the agent mention any distances, block numbers, or directional arrows
      if present?

      5. Is the response organized and clearly communicates what information the sign
      conveys to a traveler?

      Score 1.0 if all criteria are met thoroughly, 0.7 if most are met, 0.4 if only
      partial text was extracted, 0.1 if the agent failed to read the sign meaningfully.

      '
    type: llm_judge
  description: Quality and completeness of OCR and sign interpretation
  name: Quality and completeness of OCR and sign
  weight: 0.5
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image not supported
    type: keywords_absent
  description: Agent does not give up or report inability to process the image
  name: Agent does not give up or report inabili
  weight: 0.1
- check:
    keywords:
    - sign
    - street
    - direction
    type: keywords_present
  description: Agent contextualizes the output as a street sign with directional information
  name: Agent contextualizes the output as a str
  weight: 0.1
task_id: OCR-610
task_name: Street Sign Directional Information Extraction
tools: []
