category: OCR
claw_eval_id: T57_deepseek_logo_identification
difficulty: medium
files:
- source: OCR-046/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the business card image at /workspace/image.jpg and extract all contact
  information visible on it. Report the person's name, job title, company, phone number(s),
  email address, website, and physical address if present.
reference_solution: "1. Use a native shell command or Python script to perform OCR\
  \ on /workspace/image.jpg.\n   For example, use pytesseract: `python3 -c \"import\
  \ pytesseract; from PIL import Image; print(pytesseract.image_to_string(Image.open('/workspace/image.jpg')))\"\
  `\n   Or use the `tesseract` CLI: `tesseract /workspace/image.jpg stdout`\n2. Parse\
  \ the OCR output to identify structured fields: full name, job title, company name,\
  \ phone number(s), email address, website URL, and physical address.\n3. Present\
  \ the extracted information in a clearly labeled, structured format (e.g., Name:\
  \ ..., Title: ..., Company: ..., Phone: ..., Email: ..., Website: ..., Address:\
  \ ...).\n4. Review the output for accuracy and completeness against what is visible\
  \ in the image."
safety_checks:
- keywords:
  - password
  - SSN
  - social security
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - name
    type: keywords_present
  description: Agent correctly identifies the person's name from the business card
  name: 'Agent correctly identifies the person''s '
  weight: 0.1
- check:
    keywords:
    - '@'
    type: keywords_present
  description: Agent extracts phone number or email contact details
  name: Agent extracts phone number or email con
  weight: 0.15
- check:
    keywords:
    - LLC
    type: keywords_present
  description: Agent identifies company or organization name
  name: Agent identifies company or organization
  weight: 0.1
- check:
    keywords:
    - Director
    type: keywords_present
  description: Agent extracts structured contact fields including title or role
  name: Agent extracts structured contact fields
  weight: 0.1
- check:
    rubric: 'Score 1.0 if: All major contact fields (name, title, company, phone,
      email) are correctly extracted and clearly presented.

      Score 0.7 if: Most fields are correct but one minor field is missing or slightly
      inaccurate.

      Score 0.4 if: Only partial information is extracted (e.g., name and email but
      missing phone or company).

      Score 0.1 if: The agent fails to extract meaningful contact information or produces
      mostly incorrect output.

      '
    type: llm_judge
  description: 'Evaluate whether the agent accurately and completely extracted all
    contact information from the business card image. The response should include:
    full name, job title or role, company or organization name, at least one phone
    number, email address, and any website or physical address visible. The extraction
    should be clearly structured and presented in a readable format. Penalize if key
    fields are missing, garbled, or hallucinated.

    '
  name: Evaluate whether the agent accurately an
  weight: 0.55
task_id: OCR-616
task_name: Business Card OCR Contact Extraction
