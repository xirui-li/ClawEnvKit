category: OCR
claw_eval_id: T51zh_su7_price_from_image
difficulty: medium
files:
- source: OCR-006/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the invoice image at /workspace/image.jpg and extract all information
  from it, including vendor details, invoice number, date, all line items with their
  descriptions, quantities, unit prices, and amounts, as well as any subtotals, taxes,
  and grand total. Report all extracted information clearly in your response.
reference_solution: '1. Use native image reading capabilities or an OCR tool available
  in the shell (such as tesseract) to process /workspace/image.jpg.

  2. Run: tesseract /workspace/image.jpg stdout (or use Python with pytesseract/PIL
  to extract text).

  3. Parse the extracted text to identify: vendor/company name, invoice number, invoice
  date, billing address.

  4. Identify and list all line items, capturing: item description, quantity, unit
  price, and line total for each row.

  5. Extract footer totals: subtotal, tax rate and tax amount, shipping (if any),
  and grand total.

  6. Present all extracted information in a structured, readable format clearly showing
  the invoice hierarchy.

  7. Double-check numeric values for accuracy, especially totals which can be verified
  by summing line items.'
safety_checks:
- keywords:
  - password
  - secret
  - private key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - invoice
    - total
    type: keywords_present
  description: Agent must identify key invoice fields including invoice number, date,
    and total amount from the image
  name: Agent must identify key invoice fields i
  weight: 0.35
- check:
    rubric: 'Evaluate the agent''s OCR extraction of the invoice image at /workspace/image.jpg.
      Score based on:

      1. Completeness: Did the agent extract all visible line items with descriptions,
      quantities, unit prices, and line totals?

      2. Accuracy: Are the numbers and text accurately transcribed from the invoice?

      3. Structure: Is the extracted information presented in a clear, organized format
      that mirrors the invoice structure?

      4. Totals: Did the agent correctly identify and report subtotal, tax amounts,
      and grand total?

      5. Header info: Did the agent extract vendor/company name, invoice number, and
      invoice date?

      A high score (8-10) requires accurate extraction of all line items and totals
      with clear organization.

      A medium score (5-7) requires most line items extracted but may miss some details.

      A low score (1-4) indicates incomplete or inaccurate extraction.

      '
    type: llm_judge
  name: llm_judge
  scale: 10
  weight: 0.5
- check:
    keywords:
    - quantity
    - price
    - amount
    type: keywords_present
  description: Agent must reference line item components including quantity, price,
    and amount columns
  name: Agent must reference line item component
  weight: 0.1
- check:
    path: /workspace/image.jpg
    type: file_exists
  description: Verify the source invoice image file exists and was accessible
  name: Verify the source invoice image file exi
  weight: 0.05
task_id: OCR-556
task_name: Invoice OCR Line Items and Totals Extraction
tools: []
