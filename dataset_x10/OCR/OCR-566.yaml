category: OCR
claw_eval_id: T52_su7_price_from_image
difficulty: medium
files:
- source: OCR-016/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the product specification sheet image at /workspace/image.jpg using
  OCR or image analysis capabilities. Extract and report all technical specifications,
  model numbers, dimensions, performance metrics, and any other key details visible
  in the document.
reference_solution: 1. Use native shell capabilities to invoke an OCR tool (such as
  tesseract) or a vision-capable model to read /workspace/image.jpg. 2. Process the
  image to extract all visible text, paying attention to tables, labels, and numerical
  values with units. 3. Organize the extracted information into logical categories
  such as product identification, electrical specifications, mechanical specifications,
  environmental ratings, and certifications. 4. Report all findings as structured
  text output, preserving numerical values and their associated units accurately.
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - specification
    - model
    - voltage
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - mm
    - kg
    - Hz
    - W
    - MHz
    - GHz
    - dB
    - A
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    rubric: Evaluate whether the agent successfully extracted and reported technical
      specifications from the product specification sheet image. The response should
      include structured information about product parameters, numerical values with
      units, model identifiers or part numbers, and any performance or physical characteristics
      visible in the image. Award full marks if the agent provides a comprehensive,
      well-organized extraction of all visible technical data. Deduct points if the
      agent fails to extract numerical values, misses major specification categories,
      or provides only a vague description without concrete technical details.
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    rubric: 'Assess the completeness and accuracy of the OCR extraction. The agent
      should have identified and reported all major sections of the specification
      sheet, including but not limited to: product name or model designation, electrical
      or mechanical parameters with units, dimensional or weight information, operating
      conditions or environmental ratings, and any compliance or certification markings.
      Penalize responses that are incomplete, contain obvious misreadings of numbers
      or units, or fail to organize the extracted data in a readable format.'
    type: llm_judge
  name: llm_judge
  weight: 0.2
task_id: OCR-566
task_name: Extract Technical Details from Product Specification Sheet
tools: []
