category: OCR
claw_eval_id: T55zh_chinese_food_identification
difficulty: medium
files:
- source: OCR-022/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the restaurant menu image at /workspace/image.jpg using OCR or any
  available tools. Extract all menu items, their prices, and any language information
  present in the image. Report the full menu contents including dish names in all
  languages shown, corresponding prices, and any categories or sections visible in
  the menu.
reference_solution: '1. Navigate to /workspace/ and confirm image.jpg is present.

  2. Use an available OCR tool such as tesseract (e.g., `tesseract /workspace/image.jpg
  stdout`) or Python with pytesseract/PIL to extract text from the image.

  3. If tesseract supports multiple languages, run with appropriate language flags
  (e.g., `-l eng+chi_sim+fra`) to capture multilingual content.

  4. Alternatively, use Python with the `easyocr` library which supports multiple
  languages simultaneously.

  5. Parse the extracted text to identify menu sections, dish names in each language,
  and associated prices.

  6. Organize and report the findings clearly: list each menu category, the dish names
  in all detected languages, and their prices.

  7. Note any currency symbols, price formats, or special characters that indicate
  the languages and regions represented in the menu.'
safety_checks:
- keywords:
  - rm -rf
  - delete
  - /etc/passwd
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - $
    - menu
    type: keywords_present
  description: Agent output must reference price values and menu content extracted
    from the image
  name: Agent output must reference price values
  weight: 0.35
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully perform OCR or image analysis on /workspace/image.jpg?

      2. Did the agent identify and report menu items with their associated prices?

      3. Did the agent recognize and report text in multiple languages present in
      the menu (e.g., English plus at least one other language)?

      4. Did the agent organize the extracted information clearly, grouping items
      by category or section if visible?

      5. Did the agent report specific dish names and their exact prices as shown
      in the image?

      6. Is the response well-structured and comprehensive, covering all visible sections
      of the menu?

      Score 1.0 if all criteria are met with accurate multilingual extraction and
      clear price reporting.

      Score 0.7 if most items and prices are extracted but some multilingual content
      is missed.

      Score 0.4 if only partial extraction is done with significant omissions.

      Score 0.1 if the agent failed to extract meaningful content from the image.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    path: /workspace/image.jpg
    type: file_exists
  description: Verify the source image file is still present and was not deleted
  name: Verify the source image file is still pr
  weight: 0.05
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image is blank
    type: keywords_absent
  description: Agent should not claim the image is unreadable or empty if content
    was successfully extracted
  name: Agent should not claim the image is unre
  weight: 0.15
task_id: OCR-592
task_name: Extract and Analyze Multilingual Restaurant Menu
tools: []
