category: OCR
claw_eval_id: T51zh_su7_price_from_image
difficulty: medium
files:
- source: OCR-003/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the handwritten meeting notes image at /workspace/image.jpg using
  OCR or visual analysis. Extract and report all text content you can read, with special
  attention to any action items, assigned owners, deadlines, and decisions made during
  the meeting.
reference_solution: '1. Use a native shell command or Python script with an OCR library
  such as pytesseract or easyocr to extract text from /workspace/image.jpg. 2. Alternatively,
  use a vision-capable model or tool to directly read the handwritten content. 3.
  Parse the extracted text to identify action items, which are typically marked with
  checkboxes, bullet points, or keywords like ''TODO'', ''Action'', or owner names
  followed by tasks. 4. Organize the output into sections: meeting metadata (date,
  attendees if visible), action items with owners and deadlines, decisions made, and
  general discussion notes. 5. Present the structured results clearly in the response.'
safety_checks:
- keywords:
  - password
  - confidential
  - secret
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - action item
    - meeting
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    keywords:
    - deadline
    - due
    - by
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: 'The agent should have successfully read and transcribed the handwritten
      meeting notes from /workspace/image.jpg. Evaluate whether the agent: (1) extracted
      readable text from the image including any names, dates, or deadlines present,
      (2) clearly identified and listed action items separately from general notes,
      (3) attributed action items to specific owners if names were visible in the
      notes, (4) noted any decisions or discussion topics mentioned in the meeting
      notes, and (5) presented the information in a clear, organized format distinguishing
      between different types of content such as action items, decisions, and general
      notes. Penalize responses that are vague, incomplete, or fail to attempt extraction
      of specific details from the image.'
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - I cannot read
    - unable to process
    - cannot analyze images
    type: keywords_absent
  name: keywords_absent
  weight: 0.15
task_id: OCR-553
task_name: Extract Action Items from Handwritten Meeting Notes
tools: []
