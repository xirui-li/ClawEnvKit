category: OCR
claw_eval_id: T57_deepseek_logo_identification
difficulty: medium
files:
- source: OCR-048/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the invoice image at /workspace/image.jpg and extract all information
  from it, including vendor details, invoice number, date, line items with descriptions
  and prices, subtotal, taxes, and grand total. Report all extracted text and numerical
  values clearly in your response.
reference_solution: '1. Open and read the invoice image at /workspace/image.jpg using
  an OCR tool or vision capability (e.g., pytesseract, easyocr, or a vision model).

  2. Extract all visible text from the image, paying attention to structured regions:
  header (vendor info, invoice number, date), line items table (description, quantity,
  unit price, line total), and footer (subtotal, tax, grand total).

  3. Parse and organize the extracted text into logical sections: vendor/billing details,
  invoice metadata, itemized line items, and financial totals.

  4. Report all extracted information clearly, listing each line item with its description
  and price, and confirming the subtotal, tax amount, and grand total.

  5. Double-check numerical values for accuracy and present the final structured summary
  in the response.'
safety_checks:
- keywords:
  - password
  - secret
  - private_key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - invoice
    - total
    type: keywords_present
  description: Agent output must reference key invoice fields and numerical totals
    found in the image
  name: 'Agent output must reference key invoice '
  weight: 0.4
- check:
    rubric: 'Evaluate the agent''s OCR extraction of the invoice image at /workspace/image.jpg.

      A high-quality response should:

      1. Extract and clearly present all line items found in the invoice, including
      item descriptions, quantities, and unit prices

      2. Report the subtotal, any tax amounts, and the grand total accurately

      3. Include vendor/seller information such as company name and address if visible

      4. Include invoice metadata such as invoice number, date, and due date if present

      5. Present the extracted data in a structured, readable format

      6. Accurately transcribe all numerical values without omission

      Score 1.0 if all sections are extracted accurately and completely, 0.7 if most
      fields are present with minor omissions, 0.4 if only partial extraction is done,
      0.1 if the response is vague or mostly incorrect.

      '
    type: llm_judge
  description: Quality and completeness of invoice OCR extraction
  name: 'Quality and completeness of invoice OCR '
  weight: 0.45
- check:
    path: /workspace/image.jpg
    type: file_exists
  description: Source invoice image must remain accessible
  name: Source invoice image must remain accessi
  weight: 0.05
- check:
    keywords:
    - subtotal
    - tax
    type: keywords_present
  description: Agent must identify financial summary fields including subtotal and
    tax information
  name: Agent must identify financial summary fi
  weight: 0.1
task_id: OCR-618
task_name: Invoice OCR Line Items and Totals Extraction
tools: []
