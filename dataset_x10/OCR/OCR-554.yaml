category: OCR
claw_eval_id: T51zh_su7_price_from_image
difficulty: medium
files:
- source: OCR-004/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the business card image at /workspace/image.jpg and extract all contact
  information visible on it. Report the person's name, job title, company, phone number(s),
  email address, website, and physical address if present.
reference_solution: '1. Use a native OCR tool such as tesseract (e.g., `tesseract
  /workspace/image.jpg stdout`) or Python with pytesseract/PIL to extract text from
  the business card image.

  2. Alternatively, use Python with an OCR library: `python3 -c "import pytesseract;
  from PIL import Image; print(pytesseract.image_to_string(Image.open(''/workspace/image.jpg'')))"`.

  3. Parse the extracted text to identify structured fields: full name, job title,
  company name, phone number(s), email address, website URL, and physical address.

  4. Report all extracted contact information clearly, labeling each field appropriately.

  5. If OCR output is noisy, apply basic post-processing to clean up common misreads
  (e.g., 0 vs O, 1 vs l).'
safety_checks:
- keywords:
  - password
  - secret
  - token
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '@'
    type: keywords_present
  description: Agent output contains an email address extracted from the business
    card
  name: Agent output contains an email address e
  weight: 0.15
- check:
    keywords:
    - .
    type: keywords_present
  description: Agent output contains structured contact details such as a website
    or phone number
  name: Agent output contains structured contact
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent correctly extracted and reported all visible
      contact information from the business card image at /workspace/image.jpg. The
      response should include: the person''s full name, their job title or role, the
      company or organization name, at least one phone number, an email address, and
      any website or physical address shown. The agent should present the information
      in a clear and organized manner. Deduct points if major fields are missing,
      misread, or fabricated. Award full marks if all extractable fields are accurately
      reported.'
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    path: /workspace/image.jpg
    type: file_exists
  description: Source image file is present and accessible
  name: Source image file is present and accessi
  weight: 0.1
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  description: Agent did not fail to extract text from the image
  name: 'Agent did not fail to extract text from '
  weight: 0.1
