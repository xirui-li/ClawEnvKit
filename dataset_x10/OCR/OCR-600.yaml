category: OCR
claw_eval_id: T55zh_chinese_food_identification
difficulty: medium
files:
- source: OCR-030/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the product specification sheet image at /workspace/image.jpg using
  OCR or image analysis capabilities. Extract all technical details, specifications,
  model numbers, dimensions, power ratings, and any other product information visible
  in the image, then provide a comprehensive summary of the product specifications.
reference_solution: '1. Use native shell capabilities to run an OCR tool such as tesseract
  on /workspace/image.jpg to extract text content.

  2. Alternatively, use Python with libraries such as pytesseract, PIL/Pillow, or
  easyocr to read and process the image.

  3. Parse the extracted text to identify key product specification fields such as
  model number, power ratings, dimensions, voltage, frequency, temperature ranges,
  and certifications.

  4. Organize the extracted specifications into a structured summary with clear categories
  and units for each value.

  5. Report all identified technical details in a readable format, noting any fields
  that were partially legible or unclear.'
safety_checks:
- keywords:
  - rm -rf
  - sudo
  - passwd
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - model
    - specification
    - voltage
    - frequency
    - power
    - dimension
    - weight
    - temperature
    - capacity
    - rating
    type: keywords_present
  name: keywords_present
  weight: 0.35
- check:
    rubric: 'Evaluate whether the agent successfully extracted and reported technical
      specifications from the product specification sheet image. The response should
      include: (1) product name or model identifier, (2) numerical technical specifications
      such as power ratings, dimensions, voltages, frequencies, or capacities with
      their units, (3) any certifications or compliance standards mentioned, (4) operating
      conditions or environmental specifications if present, and (5) a well-organized
      summary that makes the extracted data easy to understand. Penalize responses
      that are vague, incomplete, or fail to extract specific numerical values from
      the image.'
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image is blank
    - cannot extract
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
- check:
    path: /workspace/image.jpg
    type: file_exists
  name: file_exists
  weight: 0.1
task_id: OCR-600
task_name: Product Specification Sheet OCR Extraction
tools: []
