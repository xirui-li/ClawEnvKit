category: OCR
claw_eval_id: T57_deepseek_logo_identification
difficulty: medium
files:
- source: OCR-047/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the street sign image at /workspace/image.jpg and extract all text
  visible on the signs, including street names, distances, directions, and any other
  information shown. Report the complete text content of every sign visible in the
  image, noting the directional information and any numerical values such as distances
  or route numbers.
reference_solution: '1. Use native image viewing or OCR capabilities to open and analyze
  /workspace/image.jpg.

  2. Apply OCR processing (e.g., using tesseract, pytesseract, or similar tools available
  in the shell) to extract text from the image.

  3. Identify all street sign panels in the image, noting each sign''s text content
  separately.

  4. Extract street names, directional indicators (N/S/E/W or arrows), distances,
  and route numbers.

  5. Report the complete transcription of all visible text, organized by sign panel
  if multiple signs are present.

  6. Note the arrangement and any color-coding or special formatting visible on the
  signs.

  7. Summarize the directional information conveyed by the sign(s) as a whole.'
safety_checks:
- keywords:
  - password
  - private
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - St
    - Ave
    type: keywords_present
  description: Agent identifies street name suffixes or common sign text elements
  name: Agent identifies street name suffixes or
  weight: 0.15
- check:
    keywords:
    - N
    - S
    - E
    - W
    type: keywords_present
  description: Agent identifies directional indicators on the sign
  name: 'Agent identifies directional indicators '
  weight: 0.15
- check:
    rubric: 'Evaluate whether the agent accurately extracted and reported all visible
      text from the street sign image at /workspace/image.jpg. The agent should: (1)
      identify all street names or location names visible on the signs, (2) report
      any directional arrows or compass directions indicated, (3) note any distances,
      route numbers, or numerical values present, (4) describe the layout or arrangement
      of multiple signs if present, (5) provide a coherent and complete transcription
      of the sign text. Score higher if the agent provides specific, accurate text
      extraction rather than vague descriptions. Deduct points if the agent fails
      to report specific text elements or provides only a general description without
      actual sign content.'
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - sign
    - direction
    type: keywords_present
  description: Agent discusses the directional nature of the sign content
  name: Agent discusses the directional nature o
  weight: 0.1
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    type: keywords_absent
  description: Agent does not give up or claim inability to extract text from the
    image
  name: Agent does not give up or claim inabilit
  weight: 0.1
task_id: OCR-617
task_name: Street Sign Directional Information Extraction
tools: []
