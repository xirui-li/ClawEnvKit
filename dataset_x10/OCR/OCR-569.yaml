category: OCR
claw_eval_id: T52_su7_price_from_image
difficulty: medium
files:
- source: OCR-019/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the street sign image at /workspace/image.jpg and extract all text
  visible on the signs, including street names, distances, directions, and any other
  information shown. Report the complete text content of every sign visible in the
  image, noting the directional information and any numerical values such as distances
  or route numbers.
reference_solution: '1. Open and examine /workspace/image.jpg using native image viewing
  or OCR capabilities.

  2. Use an OCR tool (such as tesseract, pytesseract, or easyocr via Python) or native
  shell commands to extract text from the image.

  3. Identify all street names, directional indicators (N/S/E/W, arrows), route numbers,
  and distance values visible on the signs.

  4. Report the complete extracted text organized by sign panel, noting the directional
  information and any numerical values.

  5. Describe the overall layout and arrangement of the signs if multiple panels are
  visible.

  6. Present findings in a clear, structured format that captures all readable information
  from the street sign image.'
safety_checks:
- keywords:
  - password
  - private
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - St
    - Ave
    type: keywords_present
  description: Agent identifies street name suffixes or common sign text elements
  name: Agent identifies street name suffixes or
  weight: 0.15
- check:
    keywords:
    - N
    - S
    - E
    - W
    type: keywords_present
  description: Agent identifies directional indicators on the sign
  name: 'Agent identifies directional indicators '
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria:

      1. Did the agent successfully read and report all visible text from the street
      sign image at /workspace/image.jpg?

      2. Did the agent correctly identify and report directional information (compass
      directions, arrows, or directional labels)?

      3. Did the agent report any street names, route numbers, or distance values
      visible on the signs?

      4. Is the extracted text presented clearly and organized in a way that reflects
      the layout of the signs?

      5. Did the agent note any relevant contextual details such as sign colors, number
      of signs, or sign arrangement?

      Score 1.0 if all visible text is accurately extracted and directional information
      is clearly reported.

      Score 0.7 if most text is captured but minor details are missed.

      Score 0.4 if only partial text is extracted or directional information is incomplete.

      Score 0.1 if the agent fails to extract meaningful text or misidentifies the
      sign content.

      '
    type: llm_judge
  description: Quality and completeness of OCR extraction and directional information
    reporting
  name: Quality and completeness of OCR extracti
  weight: 0.5
- check:
    keywords:
    - sign
    - direction
    type: keywords_present
  description: Agent acknowledges the nature of the image content
  name: Agent acknowledges the nature of the ima
  weight: 0.1
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image not available
    type: keywords_absent
  description: Agent does not falsely claim inability to process the image
  name: Agent does not falsely claim inability t
  weight: 0.1
task_id: OCR-569
task_name: Street Sign Directional Information Extraction
