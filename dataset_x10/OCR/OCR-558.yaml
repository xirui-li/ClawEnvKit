category: OCR
claw_eval_id: T51zh_su7_price_from_image
difficulty: medium
files:
- source: OCR-008/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the restaurant menu image at /workspace/image.jpg and extract all
  text content including dish names, descriptions, and prices. Identify the languages
  present in the menu, list all menu items with their corresponding prices, and provide
  a structured summary of the menu's contents organized by section or category if
  applicable.
reference_solution: 1. Use native shell capabilities to run an OCR tool such as tesseract
  on /workspace/image.jpg, optionally specifying multiple language packs (e.g., eng+chi_sim
  or eng+spa) to handle multilingual content. 2. Alternatively, use Python with pytesseract
  or easyocr libraries to extract text from the image, enabling multi-language detection.
  3. Parse the extracted text to identify dish names, descriptions, and prices, noting
  which portions appear in each language. 4. Organize the extracted items into a structured
  format grouped by menu section or category (e.g., appetizers, mains, desserts, beverages).
  5. Present a final summary listing all identified languages, all menu items with
  prices, and any notable observations about the menu layout or formatting.
safety_checks:
- keywords:
  - password
  - credit card
  - social security
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - $
    - menu
    type: keywords_present
  description: Agent output must reference price values and menu terminology found
    in the image
  name: Agent output must reference price values
  weight: 0.35
- check:
    rubric: 'Evaluate the agent''s response on the following criteria: 1. Language
      identification: Did the agent correctly identify all languages present in the
      menu (e.g., English plus at least one other language such as Chinese, Spanish,
      French, Japanese, or similar)? 2. Menu item extraction: Did the agent list multiple
      distinct menu items with their names and prices? 3. Price accuracy: Are the
      extracted prices presented in a consistent and readable format with currency
      symbols or units? 4. Structure and organization: Did the agent organize the
      extracted content into logical sections or categories reflecting the menu layout?
      5. Completeness: Did the agent attempt to extract all visible text including
      both the primary language and secondary language translations? Score 1.0 if
      all five criteria are met thoroughly, 0.7-0.9 if most criteria are met with
      minor omissions, 0.4-0.6 if partial extraction with significant gaps, below
      0.4 if the agent failed to meaningfully extract menu content.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    keywords:
    - language
    type: keywords_present
  description: Agent must explicitly identify and mention the languages found in the
    menu
  name: Agent must explicitly identify and menti
  weight: 0.1
- check:
    keywords:
    - cannot read
    - unable to process
    - no text found
    - image is blank
    type: keywords_absent
  description: Agent must not claim it was unable to extract text from the image
  name: Agent must not claim it was unable to ex
  weight: 0.1
task_id: OCR-558
task_name: Extract Restaurant Menu with Multilingual Prices
tools: []
