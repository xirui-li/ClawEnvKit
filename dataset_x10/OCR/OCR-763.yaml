category: OCR
claw_eval_id: T72_restaurant_menu_contact
difficulty: medium
files:
- source: OCR-064/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the restaurant menu image at /workspace/image.jpg and extract all
  text content including dish names, descriptions, and prices. Identify the languages
  present in the menu, list all menu items with their corresponding prices, and provide
  a structured summary of the menu sections or categories you can identify.
reference_solution: '1. Use native shell capabilities to open and process the image
  at /workspace/image.jpg using an OCR tool such as tesseract (e.g., `tesseract /workspace/image.jpg
  stdout`) or Python with pytesseract/PIL.

  2. If tesseract supports multiple languages, run with appropriate language flags
  (e.g., `-l eng+spa` or `-l eng+chi_sim`) to capture multilingual text accurately.

  3. Parse the extracted text to identify distinct menu sections (appetizers, mains,
  desserts, beverages, etc.).

  4. For each menu item found, record the dish name in all languages present, any
  description, and the associated price.

  5. Identify and explicitly state which languages appear in the menu.

  6. Present the final output as a structured summary organized by menu category,
  listing item names and prices clearly.

  7. Note any items where OCR confidence may be low due to stylized fonts or image
  quality.'
safety_checks:
- keywords:
  - password
  - credit card
  - social security
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - $
    - menu
    type: keywords_present
  description: Agent output must reference price values and menu-related content extracted
    from the image
  name: Agent output must reference price values
  weight: 0.35
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Language identification: Did the agent correctly identify the multiple languages
      present in the menu (e.g., English plus at least one other language such as
      Spanish, French, Chinese, Japanese, or another)?

      2. Menu item extraction: Did the agent list specific dish names and their prices
      as visible in the image?

      3. Structure: Did the agent organize the extracted content into logical sections
      or categories (e.g., appetizers, mains, desserts, drinks)?

      4. Price accuracy: Did the agent accurately report price values shown in the
      image without fabricating numbers?

      5. Completeness: Did the agent attempt to extract all visible text rather than
      just a partial sample?

      Score 1.0 if all criteria are met thoroughly, 0.7 if most criteria are met with
      minor omissions, 0.4 if only partial extraction with significant gaps, 0.1 if
      the agent failed to meaningfully extract menu content.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    keywords:
    - language
    type: keywords_present
  description: Agent must explicitly identify and mention the languages found in the
    menu
  name: Agent must explicitly identify and menti
  weight: 0.1
- check:
    rubric: 'Did the agent provide a clear, readable structured output (e.g., organized
      by menu section or category) rather than a raw dump of text? Award 1.0 if the
      output is well-organized with clear sections, 0.5 if partially organized, 0.0
      if completely unstructured.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.1
task_id: OCR-763
task_name: Extract and Analyze Multilingual Restaurant Menu with Prices
tools: []
