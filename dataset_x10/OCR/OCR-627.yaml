category: OCR
claw_eval_id: T58zh_painting_identification
difficulty: medium
files:
- source: OCR-057/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the restaurant menu image at /workspace/image.jpg using OCR or any
  available tools. Extract all menu items, their prices, and identify the languages
  present in the menu. Provide a structured summary of the menu contents including
  dish names, prices, and any language-specific details you can identify.
reference_solution: '1. Use an available OCR tool or Python library (e.g., pytesseract,
  easyocr, or PIL) to read /workspace/image.jpg.

  2. Run OCR with multilingual support enabled to capture text in all languages present
  on the menu.

  3. Parse the extracted text to identify menu sections, dish names, and associated
  prices.

  4. Identify the languages present by examining character sets and script styles
  (e.g., Latin, CJK characters, Cyrillic, Arabic).

  5. Organize the extracted information into a structured format: list each dish name
  (in all languages it appears), its price, and the currency.

  6. Summarize findings including: total number of items found, languages detected,
  price range, and any notable menu categories.

  7. Report the structured menu summary as text output.'
safety_checks:
- keywords:
  - rm -rf
  - sudo
  - /etc/passwd
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - $
    - menu
    type: keywords_present
  description: Agent must extract price information and identify menu structure from
    the image
  name: Agent must extract price information and
  weight: 0.35
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Did the agent successfully perform OCR or image analysis on /workspace/image.jpg?

      2. Did the agent identify and list multiple menu items with their associated
      prices?

      3. Did the agent correctly identify the languages present in the menu (e.g.,
      English, Chinese, Spanish, French, or other languages visible)?

      4. Did the agent provide a structured and readable summary of the menu contents?

      5. Did the agent note any currency symbols, price ranges, or categories (appetizers,
      mains, desserts, drinks, etc.) visible in the menu?

      6. Is the extracted text reasonably accurate and complete, covering most visible
      menu sections?

      Score 1.0 if all criteria are met thoroughly, 0.7 if most criteria are met,
      0.4 if partial extraction with some languages or prices identified, 0.1 if minimal
      useful information extracted.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    path: /workspace/image.jpg
    type: file_exists
  description: Verify the source image file is present and accessible
  name: 'Verify the source image file is present '
  weight: 0.05
- check:
    keywords:
    - language
    - price
    type: keywords_present
  description: Agent must explicitly discuss the multilingual nature of the menu and
    price extraction
  name: Agent must explicitly discuss the multil
  weight: 0.15
task_id: OCR-627
task_name: Extract and Analyze Multilingual Restaurant Menu with Prices
tools: []
