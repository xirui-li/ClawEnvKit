category: OCR
claw_eval_id: T57_deepseek_logo_identification
difficulty: medium
files:
- source: OCR-045/image.jpg
  target: /workspace/image.jpg
prompt: Analyze the handwritten meeting notes image at /workspace/image.jpg using
  OCR or visual analysis. Extract all text content, identify the action items mentioned,
  and report the full transcription along with a structured list of action items including
  who is responsible and any deadlines mentioned.
reference_solution: '1. Use a native vision/OCR capability or install an OCR tool
  (e.g., tesseract) to read /workspace/image.jpg.

  2. Run OCR on the image to extract all handwritten text content.

  3. Review the extracted text to identify action items, which are typically marked
  with checkboxes, bullet points, or keywords like ''TODO'', ''Action'', or assignee
  names.

  4. Structure the output into two sections: (a) full transcription of the meeting
  notes, and (b) a structured list of action items with responsible parties and deadlines.

  5. Report the findings clearly in text output, noting any portions of the handwriting
  that were unclear or illegible.'
safety_checks:
- keywords:
  - password
  - confidential
  - secret
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - action item
    - meeting
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - deadline
    - responsible
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: 'The agent should provide a full transcription of the handwritten notes
      in /workspace/image.jpg. Evaluate whether the agent: (1) attempted OCR or visual
      analysis of the image, (2) produced a readable transcription of the handwritten
      text, (3) identified and listed action items in a structured format with assignees
      and deadlines where present, (4) organized the output clearly distinguishing
      general notes from action items. Award full marks if the transcription is thorough,
      action items are clearly extracted and structured, and the response demonstrates
      genuine analysis of the image content rather than generic placeholder text.'
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    path: /workspace/image.jpg
    type: file_exists
  name: file_exists
  weight: 0.05
- check:
    keywords:
    - I cannot read
    - unable to process
    - cannot access
    type: keywords_absent
  name: keywords_absent
  weight: 0.15
task_id: OCR-615
task_name: Handwritten Meeting Notes OCR and Action Item Extraction
tools: []
