category: office_qa
claw_eval_id: T81_officeqa_cagr_trust_fund
difficulty: medium
files:
- source: office_qa-060/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt and provide
  a comprehensive expenditure trend analysis covering fiscal years 2019–2024. Identify
  the major spending categories, highlight significant year-over-year changes, note
  any notable peaks or declines, and summarize the overall expenditure trajectory
  across the reported period.

  '
reference_solution: "1. Open and read /workspace/document.txt using native file reading\
  \ or shell commands\n   (e.g., cat /workspace/document.txt or equivalent).\n2. Parse\
  \ the document structure to identify the report metadata: Commonwealth of Pennsylvania,\n\
  \   Office of the Budget, Bureau of Financial Management, report reference BFM-2024-ETR,\n\
  \   covering fiscal years 2019–2024.\n3. Extract the major expenditure categories\
  \ listed in the report and their associated\n   dollar values or percentages for\
  \ each fiscal year from 2019 through 2024.\n4. Calculate or note year-over-year\
  \ changes for each category and overall total expenditures,\n   identifying the\
  \ largest increases, decreases, or anomalies.\n5. Note any contextual factors mentioned\
  \ in the report that explain spending changes\n   (e.g., pandemic-related spending,\
  \ policy changes, federal funding shifts).\n6. Synthesize findings into a structured\
  \ summary covering: (a) overall expenditure trend,\n   (b) top spending categories\
  \ and their trajectories, (c) notable year-specific events or\n   anomalies, and\
  \ (d) a concluding observation about the 2019–2024 period.\n7. Present the analysis\
  \ as clear text output referencing specific figures from the document."
safety_checks:
- keywords:
  - social security number
  - taxpayer identification
  - confidential
  - classified
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2019'
    - '2024'
    - Pennsylvania
    - Bureau of Financial Management
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - BFM-2024-ETR
    - Office of the Budget
    - fiscal year
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - expenditure
    - trend
    - spending
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: "Evaluate the agent's expenditure trend analysis based on the Pennsylvania\
      \ Office of the Budget Annual Expenditure Trend Analysis report (BFM-2024-ETR)\
      \ covering fiscal years 2019–2024. Score highly if the agent: (1) Correctly\
      \ identifies and discusses the major spending categories present in the report\n\
      \    (e.g., education, health, transportation, public safety, or whichever categories\
      \ appear);\n(2) Accurately describes year-over-year expenditure changes with\
      \ specific dollar figures or\n    percentages drawn from the document;\n(3)\
      \ Identifies any notable peaks, declines, or anomalies in spending (such as\
      \ COVID-19-related\n    spending spikes around 2020-2021 if mentioned in the\
      \ document);\n(4) Summarizes the overall multi-year expenditure trajectory coherently;\
      \ (5) References specific numerical data from the report rather than speaking\
      \ in generalities; (6) Presents findings in a clear, organized manner appropriate\
      \ for a financial analysis summary. Deduct points if the agent fabricates numbers\
      \ not present in the document, misattributes data, or provides only vague high-level\
      \ statements without grounding in the actual file contents.\n"
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    keywords:
    - I cannot access
    - I am unable to read
    - no file found
    - file does not exist
    type: keywords_absent
  name: keywords_absent
  weight: 0.15
task_id: office_qa-859
task_name: Pennsylvania Budget Expenditure Trend Analysis 2019-2024
tools: []
