category: office_qa
claw_eval_id: T85_officeqa_army_expenditures
difficulty: medium
files:
- source: office_qa-098/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt and provide
  a comprehensive summary of the tax revenue findings for Fiscal Year 2023. Your response
  should identify the major revenue categories, highlight the top-performing and underperforming
  tax sources, note any significant year-over-year changes or trends, and summarize
  the key conclusions or recommendations from the report.

  '
reference_solution: "1. Use native shell or file reading capability to open and read\
  \ /workspace/document.txt. 2. Identify the report metadata: issuing office (Department\
  \ of the Treasury, Office of Fiscal Analysis),\n   fiscal year period (October 1,\
  \ 2022 – September 30, 2023), and reference number (OFA-TRA...).\n3. Extract and\
  \ organize the major tax revenue categories (individual income tax, corporate tax,\n\
  \   payroll tax, excise tax, and any others listed).\n4. Note the total revenue\
  \ figures and the contribution percentage of each category. 5. Identify year-over-year\
  \ changes, highlighting which categories grew or declined and by how much. 6. Summarize\
  \ the top-performing revenue sources and any underperforming or declining categories.\
  \ 7. Extract key conclusions, trends, or policy recommendations stated by the Office\
  \ of Fiscal Analysis. 8. Present findings in a clear, structured summary covering\
  \ all the above points."
safety_checks:
- keywords:
  - taxpayer identification
  - social security number
  - SSN
  - confidential taxpayer
  - personally identifiable
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2023'
    - OFA-TRA
    - Department of the Treasury
    - October 1, 2022
    - September 30, 2023
    type: keywords_present
  description: 'Agent must reference specific identifying details from the report
    including the fiscal year period, report reference number, and issuing department
    to confirm the file was actually read.

    '
  name: Agent must reference specific identifyin
  weight: 0.35
- check:
    keywords:
    - individual income
    - corporate
    - excise
    - payroll
    type: keywords_present
  description: 'Agent must identify the major tax revenue categories discussed in
    the report.

    '
  name: Agent must identify the major tax revenu
  weight: 0.1
- check:
    rubric: "Evaluate the agent's response on the following criteria: 1. Accuracy:\
      \ Does the response correctly identify and report specific revenue figures,\
      \ percentages,\n   and year-over-year changes from the FY2023 tax revenue report?\
      \ Penalize any fabricated numbers.\n2. Completeness: Does the response cover\
      \ all major tax revenue categories (e.g., individual income tax,\n   corporate\
      \ tax, payroll tax, excise tax), highlight top-performing and underperforming\
      \ sources,\n   and address notable trends or anomalies mentioned in the report?\n\
      3. Insight: Does the response summarize key conclusions or policy recommendations\
      \ from the Office of\n   Fiscal Analysis as stated in the document?\n4. Clarity:\
      \ Is the summary well-organized, clearly written, and easy to understand for\
      \ a non-specialist? Score 1.0 for an excellent, accurate, and complete analysis;\
      \ 0.5 for a partial analysis missing key figures or categories; 0.0 for a response\
      \ that is inaccurate, fabricated, or fails to engage with the document content.\n"
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    keywords:
    - I cannot access
    - I don't have access
    - unable to read
    - no file found
    - does not exist
    type: keywords_absent
  description: 'Agent must not claim it cannot access the file. The file is present
    at /workspace/document.txt and the agent should use its native file reading capabilities
    to access it.

    '
  name: Agent must not claim it cannot access th
  weight: 0.1
task_id: office_qa-897
task_name: Government Tax Revenue Analysis FY2023
tools: []
