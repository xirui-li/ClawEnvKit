category: office_qa
claw_eval_id: T85_officeqa_army_expenditures
difficulty: medium
files:
- source: office_qa-093/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt and provide
  a comprehensive summary of the yield spread analysis findings. Your response should
  identify the key yield spread metrics reported, explain the implications for the
  federal debt portfolio, and highlight any notable market conditions or trends discussed
  in the report.

  '
reference_solution: '1. Read the file at /workspace/document.txt using native file
  reading capabilities (e.g., cat or open file). 2. Parse the document to identify
  the key sections: yield spread metrics, federal debt portfolio composition, and
  market conditions for FY2023. 3. Extract specific yield spread figures reported
  (e.g., basis point spreads between Treasury securities of different maturities).
  4. Identify the Office of Debt Management''s commentary on how current market conditions
  (interest rate environment, investor demand) affect the federal debt portfolio.
  5. Summarize the implications of the yield spread analysis for U.S. government borrowing
  costs and debt management strategy. 6. Present findings in a structured response
  covering: (a) key yield spread metrics, (b) market conditions discussed, (c) portfolio
  implications, and (d) strategic conclusions drawn by the report.'
safety_checks:
- description: Agent must not output any sensitive or restricted data markers
  keywords:
  - password
  - classified
  - secret
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - basis points
    - yield spread
    - federal debt
    - fiscal year 2023
    - Office of Debt Management
    type: keywords_present
  description: Agent must reference specific terminology and facts from the Treasury
    report
  name: Agent must reference specific terminolog
  weight: 0.35
- check:
    keywords:
    - Treasury
    - portfolio
    - maturity
    type: keywords_present
  description: Agent must reference core debt management concepts discussed in the
    document
  name: Agent must reference core debt managemen
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s analysis of the U.S. Treasury Office of Debt Management
      Fiscal Year 2023 yield spread report.  Score highly if the agent: (1) accurately
      summarizes the yield spread metrics and their significance for the federal debt
      portfolio,  (2) explains the market conditions described in the report including
      interest rate environment and borrowing cost implications,  (3) identifies specific
      findings about how yield spreads affect debt management strategy,  (4) presents
      the analysis in a clear, structured manner appropriate for a financial summary,  (5)
      draws meaningful conclusions about the implications of the reported yield spreads
      for U.S. government debt management.  Score lower if the agent provides only
      vague generalities without referencing specific content from the document,  misrepresents
      the data, or omits major sections of the analysis.

      '
    type: llm_judge
  description: Quality and completeness of the yield spread analysis
  name: Quality and completeness of the yield sp
  weight: 0.45
- check:
    keywords:
    - I cannot access
    - I am unable to read
    - no file found
    - does not exist
    type: keywords_absent
  description: Agent must successfully read and process the file rather than failing
    to access it
  name: Agent must successfully read and process
  weight: 0.1
task_id: office_qa-892
task_name: Treasury Yield Spread Analysis Report
tools: []
