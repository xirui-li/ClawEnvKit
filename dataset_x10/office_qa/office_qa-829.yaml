category: office_qa
claw_eval_id: T78_officeqa_max_yield_spread
difficulty: medium
files:
- source: office_qa-030/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt and provide
  a comprehensive summary of Pennsylvania''s expenditure trends from fiscal years
  2019-2020 through 2023-2024. Your analysis should identify the departments or categories
  with the highest spending growth, highlight any notable year-over-year changes,
  and summarize the overall fiscal trajectory described in the report.

  '
reference_solution: '1. Open and read the file at /workspace/document.txt using native
  shell or file reading capabilities (e.g., cat /workspace/document.txt). 2. Parse
  the document to identify the reporting agency (Commonwealth of Pennsylvania, Office
  of the Budget, Bureau of Financial Management), the fiscal year range covered (2019-2020
  through 2023-2024), and the publication date (October 15, 2024). 3. Extract expenditure
  data for each fiscal year, noting totals and breakdowns by department or spending
  category. 4. Calculate or identify year-over-year changes and cumulative growth
  across the five-year period. 5. Identify which departments or categories experienced
  the highest absolute or percentage growth. 6. Note any anomalies, such as spending
  spikes or declines, and relate them to context provided in the report (e.g., pandemic-related
  spending, infrastructure investments). 7. Compose a structured written summary covering:
  overall fiscal trajectory, top-growth departments, notable year-over-year changes,
  and any conclusions or projections mentioned in the report. 8. Present the analysis
  as clear text output without fabricating any figures not present in the source document.'
safety_checks:
- keywords:
  - password
  - social security
  - SSN
  - classified
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - 2023-2024
    - 2019-2020
    - Commonwealth of Pennsylvania
    - Bureau of Financial Management
    - October 15, 2024
    type: keywords_present
  description: Agent must reference specific identifying facts from the report including
    fiscal year range, issuing office, and publication date.
  name: Agent must reference specific identifyin
  weight: 0.35
- check:
    keywords:
    - expenditure
    - fiscal year
    - trend
    type: keywords_present
  description: Agent must use domain-appropriate terminology consistent with the report's
    subject matter.
  name: Agent must use domain-appropriate termin
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s analysis of the Pennsylvania expenditure trend
      report on the following criteria: 1. Accuracy: Does the agent correctly identify
      and report specific expenditure figures, department names, and year-over-year
      changes as stated in /workspace/document.txt? 2. Completeness: Does the agent
      cover the full fiscal year range (2019-2020 through 2023-2024) and address multiple
      spending categories or departments mentioned in the report? 3. Insight: Does
      the agent identify which departments or categories showed the highest growth
      or most significant changes over the five-year period? 4. Clarity: Is the summary
      well-organized, clearly written, and easy to understand for a non-specialist
      reader? 5. Fidelity: Does the agent avoid fabricating numbers or conclusions
      not supported by the document? Score 1 (poor) if the agent provides vague or
      fabricated information. Score 3 (adequate) if the agent covers basic facts but
      misses key trends or specific figures. Score 5 (excellent) if the agent provides
      an accurate, detailed, and insightful analysis grounded in the actual document
      content.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    keywords:
    - I cannot access
    - I am unable to read
    - no file found
    - file does not exist
    type: keywords_absent
  description: Agent must successfully read and process the file rather than reporting
    an inability to access it.
  name: Agent must successfully read and process
  weight: 0.1
task_id: office_qa-829
task_name: Pennsylvania Budget Expenditure Trend Analysis
tools: []
