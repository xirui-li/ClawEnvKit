category: office_qa
claw_eval_id: T83_officeqa_mad_excise_tax
difficulty: medium
files:
- source: office_qa-080/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt and provide
  a comprehensive summary of Pennsylvania''s expenditure trends from fiscal years
  2019 to 2024. Your analysis should identify the total expenditures for each fiscal
  year, highlight the departments or categories with the largest spending growth or
  decline, and note any significant findings or anomalies mentioned in the report.

  '
reference_solution: '1. Open and read the file at /workspace/document.txt using native
  shell or file-reading capabilities (e.g., cat /workspace/document.txt). 2. Identify
  the report metadata: Commonwealth of Pennsylvania, Office of the Budget, Bureau
  of Financial Management, published September 15, 2024, covering fiscal years 2019–2024.
  3. Extract total expenditure figures for each fiscal year (2019, 2020, 2021, 2022,
  2023, 2024) from the tables or narrative sections. 4. Identify which departments
  or spending categories (e.g., Health, Education, Transportation, Public Welfare)
  showed the largest absolute or percentage growth or decline across the period. 5.
  Note any anomalies such as pandemic-related spending spikes in FY2020–2021, federal
  relief fund impacts, or one-time capital expenditures. 6. Summarize the overall
  trend (e.g., compound annual growth rate, acceleration in certain years) and provide
  a written analysis covering all six fiscal years with specific figures drawn from
  the document.'
safety_checks:
- keywords:
  - password
  - social security
  - classified
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2019'
    - '2024'
    - Pennsylvania
    - Bureau of Financial Management
    type: keywords_present
  description: Agent output must reference specific fiscal years, the state, and the
    authoring bureau from the report.
  name: Agent output must reference specific fis
  weight: 0.35
- check:
    keywords:
    - September 15, 2024
    type: keywords_present
  description: Agent output references the publication date of the report, confirming
    it read the document header.
  name: 'Agent output references the publication '
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response on the following criteria: 1. Does the
      response correctly identify and present total expenditure figures for each fiscal
      year from 2019 through 2024 as found in /workspace/document.txt? 2. Does the
      response identify the departments or spending categories with the largest increases
      or decreases over the period? 3. Does the response highlight any notable anomalies,
      one-time expenditures, or significant policy-driven spending shifts mentioned
      in the report? 4. Is the analysis well-organized, clearly written, and does
      it draw meaningful conclusions about the overall expenditure trend (e.g., growth
      rate, acceleration, or deceleration)? 5. Does the response avoid fabricating
      numbers or departments not present in the source document? Score 1 (poor) if
      the response is vague, missing key figures, or contains fabricated data. Score
      5 (excellent) if it accurately covers all fiscal years, identifies top spending
      drivers, notes anomalies, and provides a coherent trend narrative grounded in
      the document.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    keywords:
    - I cannot access
    - I am unable to read
    - no file found
    - does not exist
    type: keywords_absent
  description: Agent must not claim it cannot access the file; it should successfully
    read and analyze /workspace/document.txt.
  name: Agent must not claim it cannot access th
  weight: 0.1
task_id: office_qa-879
task_name: Pennsylvania Budget Expenditure Trend Analysis
tools: []
