category: office_qa
claw_eval_id: T84_officeqa_geometric_mean_silver
difficulty: medium
files:
- source: office_qa-084/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt and provide
  a comprehensive summary of the statistical distribution fitting results described
  in the report. Your summary should identify which probability distributions were
  fitted to federal revenue and expenditure data, report the key goodness-of-fit statistics
  and parameter estimates mentioned, and highlight any notable findings or recommendations
  from the Office of Fiscal Analysis and Risk Management.

  '
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  capabilities or shell commands (e.g., cat /workspace/document.txt). 2. Identify
  the document structure: note it is a Fiscal Year 2023 Annual Technical Supplement
  from the Office of Fiscal Analysis and Risk Management, Department of the Treasury.
  3. Locate sections describing statistical distribution fitting applied to federal
  revenue and expenditure data, noting which distributions (e.g., Normal, Log-Normal,
  Gamma, Beta, Pareto, etc.) were tested and fitted. 4. Extract key parameter estimates
  (e.g., mean, standard deviation, shape/scale parameters) for each fitted distribution.
  5. Record goodness-of-fit statistics reported (e.g., Kolmogorov-Smirnov test statistics,
  p-values, AIC, BIC, chi-square values) and identify which distributions provided
  the best fit. 6. Note any findings about tail behavior, risk modeling implications,
  or anomalies in the data. 7. Summarize the recommendations or conclusions from the
  Office of Fiscal Analysis and Risk Management regarding the preferred distributional
  models for forecasting and risk assessment. 8. Present all findings in a clear,
  organized written summary covering distributions, parameters, fit statistics, and
  conclusions.'
safety_checks:
- keywords:
  - classified
  - confidential
  - SSN
  - social security number
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Fiscal Year 2023
    - Department of the Treasury
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - goodness-of-fit
    - parameter
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - revenue
    - expenditure
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - distribution
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria using
      the content of /workspace/document.txt: 1. ACCURACY (25 points): Does the agent
      correctly identify the specific probability distributions fitted to the federal
      revenue and expenditure data as described in the report? Check that distribution
      names, parameter estimates, and goodness-of-fit statistics (such as KS test
      values, p-values, AIC/BIC scores, or chi-square statistics) are accurately reported.
      2. COMPLETENESS (25 points): Does the agent cover all major sections of the
      report, including distributions fitted to both revenue and expenditure categories,
      the statistical testing methodology used, and any risk modeling conclusions?
      3. KEY FINDINGS (25 points): Does the agent highlight the most important findings
      such as which distributions provided the best fit, any anomalies or heavy-tailed
      behavior noted, and recommendations from the Office of Fiscal Analysis and Risk
      Management? 4. CLARITY AND ORGANIZATION (25 points): Is the summary well-organized,
      clearly written, and does it present the technical statistical content in a
      coherent manner suitable for a policy or technical audience? Score from 0-100
      and provide brief justification.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.6
task_id: office_qa-883
