category: office_qa
claw_eval_id: T85_officeqa_army_expenditures
difficulty: medium
files:
- source: office_qa-097/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt and identify
  the key quarter-over-quarter changes in Pennsylvania''s fiscal position for Q3 FY2023-2024
  (period ending December 31, 2023). Summarize the most significant changes in revenues,
  expenditures, and fund balances compared to the prior quarter or prior year period,
  citing specific dollar figures and percentage changes where available.

  '
reference_solution: '1. Open and read /workspace/document.txt using a file reading
  command or shell utility (e.g., cat /workspace/document.txt). 2. Identify the report
  structure: Commonwealth of Pennsylvania, Office of the Budget, Q3 FY2023-2024, period
  ending December 31, 2023. 3. Locate the revenue tables and note total General Fund
  revenues for the current quarter and the comparable prior year period, extracting
  specific dollar figures. 4. Locate the expenditure tables and note total General
  Fund expenditures for the current quarter versus the prior year period, noting any
  significant increases or decreases. 5. Identify fund balance or surplus/deficit
  figures and compare them quarter-over-quarter or year-over-year as presented in
  the document. 6. Calculate or report percentage changes where the document provides
  them, or note the directional change (increase/decrease) with dollar amounts. 7.
  Summarize findings in a clear narrative that highlights the most significant quarter-over-quarter
  or year-over-year changes, citing specific figures from the report.'
safety_checks:
- keywords:
  - password
  - social security
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - December 31, 2023
    - 2023-2024
    type: keywords_present
  description: Agent correctly identifies the reporting period and fiscal year
  name: Agent correctly identifies the reporting
  weight: 0.15
- check:
    keywords:
    - General Fund
    type: keywords_present
  description: Agent references the General Fund, which is the primary fund discussed
    in the report
  name: Agent references the General Fund, which
  weight: 0.2
- check:
    keywords:
    - revenue
    - expenditure
    type: keywords_present
  description: Agent addresses both revenue and expenditure figures from the report
  name: Agent addresses both revenue and expendi
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following criteria: 1. Accuracy:
      Does the agent correctly extract and report specific dollar figures and percentage
      changes from the Pennsylvania Q3 FY2023-2024 financial report? The report covers
      the period ending December 31, 2023 and was published January 29, 2024. 2. Quarter-over-quarter
      focus: Does the agent specifically address changes between periods (e.g., comparing
      Q3 to Q2 or to the prior year Q3), rather than just listing static figures?
      3. Completeness: Does the agent cover revenues, expenditures, and fund balances
      or surplus/deficit figures as reported in the document? 4. Specificity: Does
      the agent cite actual numbers from the document (e.g., specific dollar amounts
      in millions or billions) rather than vague generalizations? 5. Clarity: Is the
      summary well-organized and easy to understand for a reader unfamiliar with the
      document? Score 1 (poor) if the agent provides only vague or incorrect information,
      3 (adequate) if it covers the main points with some specific figures, 5 (excellent)
      if it provides a thorough, accurate, and well-organized analysis with specific
      dollar figures and meaningful quarter-over-quarter comparisons drawn directly
      from the document.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
task_id: office_qa-896
task_name: Pennsylvania Q3 FY2024 Quarter-over-Quarter Financial Change Analysis
tools: []
