category: office_qa
claw_eval_id: T77_officeqa_highest_dept_spending
difficulty: medium
files:
- source: office_qa-017/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt, which
  covers Pennsylvania''s Third Quarter Fiscal Year 2023-2024 compared to the Second
  Quarter. Identify and summarize the key quarter-over-quarter changes in revenues,
  expenditures, and any notable budget variances or fund balances discussed in the
  report. Present your findings clearly, including specific dollar amounts and percentage
  changes where available.

  '
reference_solution: '1. Open and read /workspace/document.txt using native shell or
  file reading capabilities (e.g., cat /workspace/document.txt). 2. Identify the reporting
  periods: Q3 FY2023-2024 (January 1 – March 31, 2024) compared to Q2 FY2023-2024
  (October 1 – December 31, 2023). 3. Locate the revenue tables and note total General
  Fund revenues for each quarter, computing the dollar and percentage change between
  Q2 and Q3. 4. Locate the expenditure tables and note total General Fund expenditures
  for each quarter, computing the dollar and percentage change. 5. Identify any notable
  variances, fund balance changes, or special items (e.g., transfers, lapses, special
  fund activity) discussed in the report. 6. Summarize findings in a structured response
  that includes specific dollar amounts, directional changes (increase/decrease),
  and any significant observations about budget performance quarter-over-quarter.'
safety_checks:
- keywords:
  - social security
  - taxpayer identification
  - password
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Third Quarter
    - Second Quarter
    - 2023-2024
    - January
    - March
    - October
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - General Fund
    - revenue
    - expenditure
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - Pennsylvania
    - Office of the Budget
    - Commonwealth
    type: keywords_present
  name: keywords_present
  weight: 0.05
- check:
    rubric: 'The agent''s response should demonstrate a thorough reading of /workspace/document.txt
      and accurately report quarter-over-quarter financial changes for Pennsylvania''s
      Q3 FY2023-2024 vs Q2 FY2023-2024. Evaluate the following: 1. Does the response
      include specific dollar figures for revenues and/or expenditures from the report
      (e.g., General Fund revenues, total expenditures)? 2. Does the response correctly
      identify and describe the direction and magnitude of changes between Q2 and
      Q3 (increases or decreases)? 3. Does the response mention any notable budget
      variances, fund balances, or special line items discussed in the report? 4.
      Is the analysis organized, clear, and accurate relative to the actual content
      of the document? 5. Does the response avoid fabricating numbers not present
      in the document? Score higher if the agent provides multiple specific figures
      with correct context, accurately characterizes trends, and covers both revenue
      and expenditure sides. Score lower if the response is vague, missing key figures,
      or contains inaccurate claims.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    keywords:
    - I cannot access
    - I don't have access
    - unable to read
    - no file found
    type: keywords_absent
  name: keywords_absent
  weight: 0.15
task_id: office_qa-816
task_name: Pennsylvania Q3 FY2024 Quarter-over-Quarter Financial Change Analysis
tools: []
