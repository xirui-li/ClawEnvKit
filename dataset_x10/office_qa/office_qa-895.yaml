    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'The agent should have read /workspace/document.txt and produced a clear,
      accurate summary of the Federal Highway Trust Fund CAGR analysis. Evaluate the
      response on the following criteria: 1. Does the agent correctly identify and
      report the specific CAGR percentage figures mentioned in the document? 2. Does
      the agent accurately describe the start and end years and corresponding fund
      balance values used in the CAGR computations? 3. Does the agent explain the
      methodology or formula context for CAGR as presented in the document? 4. Does
      the agent summarize the long-term financial projections and what they imply
      for the trust fund''s solvency or growth trajectory? 5. Is the response well-organized,
      precise, and free of fabricated numbers not found in the document? Score: 0
      (missing or largely incorrect), 0.5 (partial — some figures correct but incomplete),
      1.0 (thorough, accurate, and well-explained).

      '
