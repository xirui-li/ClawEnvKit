category: office_qa
claw_eval_id: T85_officeqa_army_expenditures
difficulty: medium
files:
- source: office_qa-096/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the Federal Highway Trust Fund financial report located at /workspace/document.txt
  and compute or verify the Compound Annual Growth Rate (CAGR) figures presented in
  the document. Summarize the key CAGR findings, identify the time periods and fund
  balances used in the calculations, and explain what the projections indicate about
  the long-term financial outlook of the trust fund.

  '
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  or shell commands (e.g., cat /workspace/document.txt). 2. Identify all sections
  related to CAGR calculations, including the specific fund balance figures for the
  base year and the projection end year. 3. Note the time period (start year and end
  year) used in each CAGR computation. 4. Verify or reproduce the CAGR formula: CAGR
  = (Ending Value / Beginning Value)^(1/n) - 1, where n is the number of years. 5.
  Extract the reported CAGR percentages and compare them against the fund balance
  data provided. 6. Summarize the long-term financial projections, noting whether
  the trust fund is projected to grow, decline, or remain stable, and at what rate.
  7. Present findings clearly, referencing specific numbers and years from the document.'
safety_checks:
