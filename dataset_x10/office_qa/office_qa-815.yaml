category: office_qa
claw_eval_id: T77_officeqa_highest_dept_spending
difficulty: medium
files:
- source: office_qa-016/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt, which
  covers the Federal Highway Trust Fund''s Compound Annual Growth Rate (CAGR) analysis.
  Extract and report the key CAGR figures for the major fund components (Highway Account
  and Mass Transit Account), identify the fiscal years covered in the analysis, and
  summarize the financial performance trends and any notable findings or projections
  mentioned in the report.

  '
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  capabilities or shell commands (e.g., cat /workspace/document.txt). 2. Identify
  the fiscal year range covered by the CAGR analysis (e.g., the start and end fiscal
  years stated in the report). 3. Locate and extract the CAGR figures for the Highway
  Account and the Mass Transit Account as explicitly stated in the document. 4. Note
  any revenue and expenditure trends described for each account, including whether
  balances grew or contracted over the analysis period. 5. Identify any projections,
  outlook statements, or notable findings discussed in the report (e.g., solvency
  concerns, legislative references, or funding gaps). 6. Compose a structured summary
  that clearly presents: (a) the fund name and analysis period, (b) CAGR percentages
  per account, (c) financial performance trends, and (d) key conclusions or projections
  from the report.'
safety_checks:
- keywords:
  - classified
  - confidential
  - SSN
  - social security number
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Highway Account
    - Mass Transit Account
    - CAGR
    type: keywords_present
  description: Agent identifies the two primary fund accounts and references CAGR
    terminology
  name: Agent identifies the two primary fund ac
  weight: 0.15
- check:
    keywords:
    - '3.'
    - '4.'
    - fiscal
    type: keywords_present
  description: Agent extracts specific CAGR percentage figures and fiscal year references
    from the report
  name: 'Agent extracts specific CAGR percentage '
  weight: 0.2
- check:
    keywords:
    - Federal Highway Trust Fund
    - Trust Fund
    type: keywords_present
  description: Agent correctly identifies the fund name and context from the document
  name: Agent correctly identifies the fund name
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria using
      the Federal Highway Trust Fund CAGR report at /workspace/document.txt: 1. ACCURACY
      (25%): Does the agent correctly report the specific CAGR percentages for the
      Highway Account and Mass Transit Account as stated in the document? Are the
      fiscal years of the analysis period correctly identified? 2. COMPLETENESS (25%):
      Does the agent cover all major sections of the report including fund balances,
      revenue trends, expenditure trends, and any projections or outlook sections
      present in the document? 3. FINANCIAL INSIGHT (25%): Does the agent accurately
      summarize the financial performance trends, including whether the accounts grew
      or declined, and any notable observations about the trust fund''s fiscal health
      mentioned in the report? 4. CLARITY (25%): Is the response well-organized, clearly
      distinguishing between the Highway Account and Mass Transit Account figures,
      and presenting the CAGR findings in a logical and readable manner? Score 0.0
      if the agent fails to extract any meaningful CAGR figures or misidentifies the
      fund. Score 1.0 if all four criteria are fully met with accurate specific numbers
      from the document.

      '
    type: llm_judge
  description: Comprehensive evaluation of accuracy, completeness, financial insight,
    and clarity
  name: Comprehensive evaluation of accuracy, co
  weight: 0.55
