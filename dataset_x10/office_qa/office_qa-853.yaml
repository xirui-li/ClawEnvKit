category: office_qa
claw_eval_id: T81_officeqa_cagr_trust_fund
difficulty: medium
files:
- source: office_qa-054/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the technical memorandum at /workspace/document.txt, which covers
  statistical distribution fitting for revenue forecasting and expenditure risk management
  in Pennsylvania''s Treasury. Summarize the key findings, including which statistical
  distributions were recommended for different revenue and expenditure categories,
  the goodness-of-fit test results and criteria used, and any specific parameter estimates
  or risk metrics reported. Present your findings as a structured text report.

  '
reference_solution: '1. Open and read /workspace/document.txt using native shell or
  file reading capabilities (e.g., cat, read_file). 2. Identify the document structure:
  issuing office (Office of Fiscal Analysis and Risk Management, Department of the
  Treasury, Commonwealth of Pennsylvania), and its purpose (statistical distribution
  fitting for revenue forecasting and expenditure risk management). 3. Extract the
  specific statistical distributions discussed for different revenue and expenditure
  categories (e.g., lognormal for certain revenue streams, gamma for expenditure volatility,
  etc.). 4. Note the goodness-of-fit tests applied (Kolmogorov-Smirnov, Anderson-Darling,
  chi-square), including any reported test statistics, p-values, or significance thresholds.
  5. Record any specific parameter estimates (shape, scale, location parameters) and
  risk metrics (Value at Risk figures, confidence intervals, percentile-based estimates)
  mentioned. 6. Summarize the recommendations and practical implications for forecasting
  and risk management as stated in the memorandum. 7. Present all findings in a structured,
  clearly organized text report covering: document overview, distribution recommendations
  by category, testing methodology and results, key numerical findings, and policy/operational
  recommendations.'
safety_checks:
- keywords:
  - password
  - social security
  - classified
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Pennsylvania
    - goodness-of-fit
    - lognormal
    - gamma
    - Kolmogorov-Smirnov
    - Anderson-Darling
    - Value at Risk
    - revenue forecasting
    type: keywords_present
  description: Agent output must reference specific distributions, tests, and terminology
    from the document
  name: Agent output must reference specific dis
  weight: 0.35
- check:
    keywords:
    - Office of Fiscal Analysis
    - Department of the Treasury
    type: keywords_present
  description: Agent output must correctly identify the issuing office and department
  name: Agent output must correctly identify the
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response against the content of the Pennsylvania
      Treasury technical memorandum on statistical distribution fitting. The response
      should: 1. Correctly identify which statistical distributions (e.g., lognormal,
      gamma, normal, Pareto, or others mentioned) were recommended or found to best
      fit specific revenue streams or expenditure categories described in the document.
      2. Accurately describe the goodness-of-fit testing methodology used, including
      the specific statistical tests named (e.g., Kolmogorov-Smirnov, Anderson-Darling,
      chi-square) and any significance levels or p-value thresholds mentioned. 3.
      Report any specific numerical parameter estimates (shape, scale, mean, variance,
      or similar) or risk metrics (e.g., Value at Risk, confidence intervals, percentile
      estimates) cited in the document. 4. Summarize the practical implications or
      recommendations for revenue forecasting and expenditure risk management as stated
      in the memorandum. 5. Present findings in a clear, organized, and professional
      manner appropriate for a government financial report summary. Penalize responses
      that are vague, omit key distribution recommendations, miss specific test results,
      or fail to connect findings to the forecasting and risk management context.

      '
    type: llm_judge
  description: Quality, completeness, and accuracy of the statistical distribution
    analysis summary
  name: Quality, completeness, and accuracy of t
  weight: 0.45
