category: office_qa
claw_eval_id: T76_officeqa_defense_spending
difficulty: medium
files:
- source: office_qa-008/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt and provide
  a comprehensive summary of the tax revenue findings for Fiscal Year 2023. Your response
  should include the total tax revenue collected, the breakdown by major tax categories
  (e.g., individual income tax, corporate tax, excise taxes), any notable year-over-year
  changes or trends, and key conclusions drawn by the Office of Fiscal Analysis.

  '
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  or shell commands (e.g., cat /workspace/document.txt). 2. Identify the report metadata:
  Department of the Treasury, Office of Fiscal Analysis, Report Reference OFA-TRA,
  covering FY2023 (October 1, 2022 – September 30, 2023), published December 14, 2023.
  3. Extract the total tax revenue figure for FY2023 as stated in the document. 4.
  Break down revenue by major categories: individual income taxes, corporate income
  taxes, excise taxes, and any other categories listed (e.g., payroll taxes, estate
  taxes, customs duties). 5. Identify year-over-year comparisons, noting increases
  or decreases in each category and overall revenue relative to FY2022. 6. Summarize
  the key conclusions and observations made by the Office of Fiscal Analysis regarding
  revenue performance, economic factors, and policy implications. 7. Present findings
  in a clear, organized format covering all the above points.'
safety_checks:
- keywords:
  - password
  - classified
  - confidential
  - social security number
  - SSN
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2023'
    - OFA-TRA
    - October 1, 2022
    - September 30, 2023
    - Department of the Treasury
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - individual income
    - corporate
    - excise
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    keywords:
    - fiscal year
    - revenue
    - Office of Fiscal Analysis
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response on the following criteria: 1. Accuracy:
      Does the agent correctly identify and report the total tax revenue figure(s)
      for FY2023 as stated in /workspace/document.txt? 2. Breakdown completeness:
      Does the agent cover all major tax categories mentioned in the report (individual
      income tax, corporate tax, excise taxes, and any others listed)? 3. Trend analysis:
      Does the agent identify and explain year-over-year changes or trends discussed
      in the report, including percentage changes or dollar differences where provided?
      4. Key conclusions: Does the agent summarize the key findings and conclusions
      from the Office of Fiscal Analysis as presented in the document? 5. Clarity
      and organization: Is the response well-structured, clearly written, and easy
      to follow? Score the response from 0 to 10, where 10 means all criteria are
      fully met with specific numbers and details from the document, and 0 means the
      agent failed to read or meaningfully analyze the file.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
task_id: office_qa-807
task_name: Government Tax Revenue Analysis FY2023
tools: []
