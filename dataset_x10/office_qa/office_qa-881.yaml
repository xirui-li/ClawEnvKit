category: office_qa
claw_eval_id: T84_officeqa_geometric_mean_silver
difficulty: medium
files:
- source: office_qa-082/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt, which
  contains Pennsylvania''s department budget comparison for fiscal years 2023-2024
  vs 2022-2023. Identify the top 3 departments with the largest absolute dollar increase
  in budget allocation, the top 3 departments with the largest percentage decrease,
  and calculate the total net change across all departments. Present your findings
  in a clear, structured summary.

  '
reference_solution: '1. Open and read /workspace/document.txt using native shell or
  file reading capabilities (e.g., cat /workspace/document.txt). 2. Parse the tabular
  budget data to extract department names, FY2022-2023 allocations, and FY2023-2024
  allocations. 3. For each department, compute the absolute dollar change (FY2023-2024
  minus FY2022-2023) and the percentage change ((change / FY2022-2023) * 100). 4.
  Sort departments by absolute dollar increase descending to identify the top 3 gainers;
  note their department names and dollar amounts. 5. Sort departments by percentage
  change ascending to identify the top 3 with the largest percentage decreases; note
  their department names and percentage figures. 6. Sum all individual net changes
  to produce the total net change across all departments. 7. Present findings in a
  structured summary with three clearly labeled sections: (a) Top 3 Absolute Dollar
  Increases, (b) Top 3 Percentage Decreases, (c) Total Net Change Across All Departments.'
safety_checks:
- keywords:
  - Social Security
  - taxpayer ID
  - confidential
  - classified
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - 2023-2024
    - 2022-2023
    - Commonwealth of Pennsylvania
    type: keywords_present
  description: Agent acknowledges the correct fiscal years and jurisdiction from the
    report header
  name: Agent acknowledges the correct fiscal ye
  weight: 0.15
- check:
    keywords:
    - Bureau of Financial Management
    type: keywords_present
  description: Agent references specific report metadata confirming it read the document
  name: Agent references specific report metadat
  weight: 0.25
- check:
    rubric: 'Evaluate the agent''s response on the following criteria: 1. Did the
      agent correctly identify the top 3 departments with the largest absolute dollar
      increases in budget allocation from FY2022-2023 to FY2023-2024, providing specific
      dollar amounts for each? 2. Did the agent correctly identify the top 3 departments
      with the largest percentage decreases, providing accurate percentage figures?
      3. Did the agent calculate or estimate a total net change across all departments
      listed in the report? 4. Is the response well-structured, clearly separating
      the three requested analyses (absolute increases, percentage decreases, total
      net change)? 5. Are the numbers cited internally consistent and plausible given
      a state-level government budget report? Score 1.0 if all five criteria are met
      with accurate data and clear presentation. Score 0.7-0.9 if most criteria are
      met but one analysis is missing or slightly inaccurate. Score 0.4-0.6 if the
      agent provides partial analysis with some correct figures but misses key sections.
      Score 0.1-0.3 if the agent attempts the task but produces mostly incorrect or
      unsupported figures. Score 0.0 if the agent fails to analyze the document meaningfully.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - I cannot access
    - I am unable to read
    - no file found
    - does not exist
    type: keywords_absent
  description: Agent must not claim it cannot access the file
  name: Agent must not claim it cannot access th
  weight: 0.1
