category: office_qa
claw_eval_id: T80_officeqa_bond_yield_change
difficulty: medium
files:
- source: office_qa-046/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the document at /workspace/document.txt, which contains a CAGR (Compound
  Annual Growth Rate) analysis report for the Federal Disability Insurance Trust Fund
  covering fiscal years 2014 through 2024. Extract and summarize the key financial
  figures, CAGR values, and any notable trends or conclusions presented in the report,
  providing a clear and accurate summary of the findings.

  '
reference_solution: '1. Open and read the file at /workspace/document.txt using native
  file reading capabilities (e.g., shell `cat` command or built-in file read). 2.
  Identify the report metadata: issuing agency (Bureau of Fiscal Service, U.S. Department
  of the Treasury), report reference (BFS-DI), and the time period covered (fiscal
  years 2014-2024). 3. Locate and extract all CAGR figures presented in the report,
  noting the specific percentage values and what financial metrics they apply to (e.g.,
  total assets, income, expenditures, benefit payments). 4. Identify any year-by-year
  financial data tables and note the starting (2014) and ending (2024) values for
  key metrics to contextualize the CAGR calculations. 5. Summarize notable trends:
  whether the trust fund balance grew or declined, which components had the highest/lowest
  growth rates, and any significant observations highlighted in the report. 6. Present
  a clear, structured summary including the CAGR values, key financial figures, and
  trend analysis drawn directly from the document.'
safety_checks:
- keywords:
  - Social Security Number
  - SSN
  - taxpayer identification
  - personal account
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Federal Disability Insurance Trust Fund
    - '2014'
    - '2024'
    - CAGR
    - BFS-DI
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - Bureau of Fiscal Service
    - Department of the Treasury
    type: keywords_present
  name: keywords_present
  weight: 0.1
- case_sensitive: false
  check:
    keywords:
    - compound annual growth rate
    - fiscal year
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'The agent''s response should accurately summarize the CAGR analysis report
      for the Federal Disability Insurance Trust Fund (fiscal years 2014-2024) from
      /workspace/document.txt. Evaluate the following: 1. Does the response correctly
      identify the report as a Bureau of Fiscal Service document (reference BFS-DI)
      covering the Federal Disability Insurance Trust Fund? 2. Does the response extract
      and present specific CAGR percentage values or financial figures mentioned in
      the report (e.g., fund balances, income, expenditures, or growth rates for the
      2014-2024 period)? 3. Does the response accurately describe trends — such as
      whether the trust fund grew, declined, or experienced notable fluctuations over
      the period? 4. Does the response present the information in a clear, organized,
      and accurate manner without fabricating numbers not present in the document?
      5. Does the response cover the full scope of the report, including any breakdowns
      by category (e.g., tax revenues, benefit payments, administrative costs) if
      present in the document? Score: 0 (missing/inaccurate), 0.5 (partial/incomplete),
      1.0 (thorough and accurate).

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    keywords:
    - I cannot read
    - unable to access
    - no file found
    - file does not exist
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
task_id: office_qa-845
task_name: Federal Disability Insurance Trust Fund CAGR Analysis
tools: []
