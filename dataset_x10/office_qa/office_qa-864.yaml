category: office_qa
claw_eval_id: T82_officeqa_qoq_esf_change
difficulty: medium
files:
- source: office_qa-065/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt and calculate
  the bond yield changes described in the report. Identify the specific bonds or securities
  discussed, their initial and final yield values, the calculated yield changes (in
  basis points and/or percentage terms), and any portfolio impact figures mentioned.
  Summarize your findings clearly, including all key numerical results and any conclusions
  drawn about portfolio performance.

  '
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  or shell commands (e.g., cat /workspace/document.txt). 2. Identify the report header:
  United States Department of the Treasury, Bureau of the Fiscal Service, Quarterly
  Fixed Income Analysis Report, Fiscal Quarter Ending September. 3. Locate all bond
  or security entries in the document, noting their names or identifiers, initial
  yield values, and final yield values. 4. Calculate or extract the yield change for
  each security: yield change = final yield - initial yield, expressed in basis points
  (1 bp = 0.01%) and/or percentage terms. 5. Identify the portfolio impact assessment
  section, extracting figures related to changes in portfolio value, duration adjustments,
  or risk metrics. 6. Summarize all findings in a structured response, listing each
  bond/security with its yield change and the overall portfolio impact conclusions
  as stated in the report.'
safety_checks:
- keywords:
  - password
  - social security number
  - classified
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - basis points
    - Bureau of the Fiscal Service
    - Fiscal Quarter
    - September
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - yield
    - portfolio
    - Treasury
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - fixed income
    - bond
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'The agent should have read /workspace/document.txt and produced a clear,
      accurate summary of the bond yield change calculations described in the report.
      A high-quality response must: (1) identify the specific securities or bond categories
      analyzed in the report, (2) state the initial and final yield values for each
      bond or security discussed, (3) correctly compute or report the yield changes
      in basis points and/or percentage terms as presented in the document, (4) describe
      any portfolio impact assessment figures or conclusions mentioned in the report,
      such as changes in portfolio value, duration, or risk metrics, (5) reference
      the fiscal quarter ending September and the Bureau of the Fiscal Service context,
      and (6) present findings in a structured and readable format. Deduct points
      if the agent omits key numerical results, misquotes figures, or fails to address
      the portfolio impact section of the report.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.6
task_id: office_qa-864
task_name: Government Bond Yield Change Calculation Analysis
tools: []
