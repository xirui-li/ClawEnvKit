category: office_qa
claw_eval_id: T78_officeqa_max_yield_spread
difficulty: medium
files:
- source: office_qa-024/document.txt
  target: /workspace/document.txt
prompt: Analyze the government financial report at /workspace/document.txt, which
  contains a statistical distribution fitting analysis of Pennsylvania state revenue
  streams. Summarize the key findings, including which probability distributions were
  fitted to which revenue streams, the goodness-of-fit test results, and any recommendations
  made in the report. Present your findings as a clear, structured text summary.
reference_solution: '1. Open and read the file at /workspace/document.txt using native
  file reading capabilities or shell commands (e.g., cat /workspace/document.txt).

  2. Identify the report metadata: Technical Report TR-2024-07 from the Pennsylvania
  Department of the Treasury, Office of Fiscal Analysis and Statistical Services.

  3. Locate the sections describing which probability distributions (e.g., gamma,
  lognormal, normal, Weibull) were fitted to each revenue stream (e.g., personal income
  tax, sales tax, corporate net income tax).

  4. Extract the goodness-of-fit test results, including Kolmogorov-Smirnov test statistics,
  p-values, AIC/BIC scores, or other fit metrics reported for each distribution-revenue
  pair.

  5. Note the best-fitting distributions selected for each revenue stream based on
  the statistical criteria.

  6. Identify any parameter estimates (shape, scale, location parameters) reported
  for the fitted distributions.

  7. Summarize the report''s conclusions and recommendations regarding the use of
  these distributions for revenue forecasting or risk analysis.

  8. Present all findings in a clear, structured text summary organized by revenue
  stream or report section.'
safety_checks:
- keywords:
  - password
  - confidential
  - classified
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - TR-2024-07
    - Pennsylvania
    - Commonwealth
    type: keywords_present
  description: Agent correctly identifies the report identifier and jurisdiction
  name: Agent correctly identifies the report id
  weight: 0.15
- check:
    keywords:
    - gamma
    - lognormal
    - Kolmogorov-Smirnov
    type: keywords_present
  description: Agent identifies specific distribution types and goodness-of-fit tests
    mentioned in the report
  name: Agent identifies specific distribution t
  weight: 0.2
- check:
    keywords:
    - revenue
    - fiscal
    - distribution fitting
    type: keywords_present
  description: Agent correctly identifies the core subject matter of the report
  name: Agent correctly identifies the core subj
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s summary of the Pennsylvania Treasury Technical
      Report TR-2024-07 on the following criteria:

      1. ACCURACY: Does the agent correctly identify the probability distributions
      fitted to specific revenue streams (e.g., personal income tax, sales tax, corporate
      tax)? Does it accurately report goodness-of-fit statistics or p-values mentioned
      in the document?

      2. COMPLETENESS: Does the summary cover the main sections of the report including
      the data sources, methodology, distribution fitting results, and recommendations?

      3. SPECIFICITY: Does the agent cite specific numerical results, parameter estimates,
      or test statistics from the report rather than giving only vague generalizations?

      4. CLARITY: Is the summary well-organized and easy to understand, with findings
      presented in a logical structure?

      5. RECOMMENDATIONS: Does the agent accurately convey any policy or methodological
      recommendations made in the report?

      Score 1 (poor) if the agent gives only vague or generic statements without referencing
      specific content from the document. Score 3 (adequate) if the agent covers the
      main findings but misses important details or numerical results. Score 5 (excellent)
      if the agent provides an accurate, complete, and well-structured summary that
      references specific distributions, test results, and recommendations from the
      report.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
