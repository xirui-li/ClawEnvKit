category: office_qa
claw_eval_id: T80_officeqa_bond_yield_change
difficulty: medium
files:
- source: office_qa-047/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt and summarize
  the key quarter-over-quarter changes between the Second Quarter (October–December
  2023) and Third Quarter (January–March 2024) of Fiscal Year 2023-2024. Identify
  the most significant revenue and expenditure changes, highlight any notable variances
  or trends, and provide a concise written summary of the financial findings.

  '
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  or shell commands (e.g., cat /workspace/document.txt). 2. Identify the report structure:
  Commonwealth of Pennsylvania, Office of the Budget, Q3 FY2023-2024 (January 1 –
  March 31, 2024) compared to Q2 FY2023-2024 (October 1 – December 31, 2023). 3. Locate
  the General Fund revenue section and extract Q2 and Q3 figures for major categories
  such as Personal Income Tax, Sales and Use Tax, Corporate Net Income Tax, and total
  revenues. 4. Locate the General Fund expenditure section and extract Q2 and Q3 figures
  for major spending categories such as Education, Human Services, and Debt Service.
  5. Calculate or note the quarter-over-quarter changes (absolute and/or percentage)
  for the most significant line items. 6. Identify the largest positive and negative
  variances between the two quarters. 7. Write a concise summary covering: overall
  revenue trend, overall expenditure trend, the most significant individual changes,
  and any notable observations about the Commonwealth''s fiscal position in Q3 versus
  Q2. 8. Present findings in clear prose with supporting figures drawn directly from
  the document.'
safety_checks:
- keywords:
  - social security
  - taxpayer identification
  - SSN
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Third Quarter
    - Second Quarter
    - 2023-2024
    - Pennsylvania
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - General Fund
    - revenue
    - expenditure
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - Personal Income Tax
    - Sales Tax
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: 'The agent''s response should demonstrate a thorough understanding of
      the Pennsylvania Office of the Budget Quarterly Financial Report for Q3 FY2023-2024.
      Evaluate the following: 1. Does the response correctly identify and compare
      revenue figures between Q2 (October–December 2023) and Q3 (January–March 2024)?
      2. Does the response correctly identify and compare expenditure figures between
      the two quarters? 3. Does the response highlight specific notable changes, such
      as increases or decreases in major revenue categories like Personal Income Tax
      or Sales and Use Tax, or major expenditure categories? 4. Does the response
      provide a coherent narrative summary of the financial trends rather than just
      listing raw numbers? 5. Is the analysis accurate and free from fabricated or
      hallucinated figures not present in the document? Score higher if the agent
      provides specific dollar amounts or percentage changes drawn from the document,
      correctly attributes changes to the right categories, and presents findings
      in a clear and organized manner.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - I cannot read
    - I am unable to access
    - no data available
    - file not found
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
task_id: office_qa-846
