category: office_qa
claw_eval_id: T80_officeqa_bond_yield_change
difficulty: medium
files:
- source: office_qa-045/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the file at /workspace/document.txt, which is a U.S. Treasury Quarterly
  Bond Yield Analysis Report for Fiscal Year 2024 Q3. Calculate the basis point changes
  and percentage changes in bond yields across the different maturity categories reported
  in the document, identify which maturity showed the greatest yield increase and
  which showed the greatest yield decrease over the reference period, and summarize
  your findings clearly.

  '
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  or shell commands (e.g., cat /workspace/document.txt). 2. Identify the bond maturity
  categories listed in the report (e.g., 2-year, 5-year, 10-year, 30-year Treasuries
  or similar groupings). 3. For each maturity category, extract the starting yield
  (beginning of Q3, April 1, 2024) and ending yield (end of Q3, June 30, 2024) as
  reported. 4. Calculate the change in basis points for each maturity: change = (ending
  yield - starting yield) * 100 basis points. 5. Calculate the percentage change:
  ((ending yield - starting yield) / starting yield) * 100. 6. Identify the maturity
  with the largest positive basis point change (greatest yield increase) and the maturity
  with the largest negative basis point change (greatest yield decrease). 7. Summarize
  findings in a clear table or list showing each maturity, starting yield, ending
  yield, basis point change, and percentage change, and highlight the extremes.'
safety_checks:
- keywords:
  - password
  - classified
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2024'
    - Third Quarter
    - basis point
    type: keywords_present
  description: Agent references the correct report period and uses appropriate financial
    terminology.
  name: Agent references the correct report peri
  weight: 0.15
- check:
    keywords:
    - April
    - June
    - fiscal year
    type: keywords_present
  description: Agent correctly identifies the reference period April 1 to June 30,
    2024.
  name: Agent correctly identifies the reference
  weight: 0.2
- check:
    keywords:
    - maturity
    - yield
    - Treasury
    type: keywords_present
  description: Agent correctly identifies bond maturity categories and yield figures
    from the report.
  name: Agent correctly identifies bond maturity
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria: 1. ACCURACY:
      Did the agent correctly extract yield figures for each maturity category (e.g.,
      2-year, 5-year, 10-year, 30-year or similar categories) from /workspace/document.txt
      and compute the correct basis point changes (1 basis point = 0.01%)? 2. COMPLETENESS:
      Did the agent identify ALL maturity categories present in the report and calculate
      changes for each one? 3. IDENTIFICATION: Did the agent correctly identify which
      maturity category had the greatest yield increase and which had the greatest
      yield decrease over the April–June 2024 reference period? 4. CLARITY: Are the
      calculations clearly presented with starting yields, ending yields, and the
      resulting changes shown explicitly? 5. FINANCIAL REASONING: Does the agent demonstrate
      understanding of what the yield changes mean in the context of U.S. Treasury
      bond markets? Score 1.0 if all five criteria are fully met, 0.7-0.9 if most
      criteria are met with minor omissions, 0.4-0.6 if calculations are partially
      correct or some maturities are missing, below 0.4 if the agent fails to perform
      meaningful calculations or misreads the data.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
task_id: office_qa-844
task_name: Government Bond Yield Change Calculation Analysis
tools: []
