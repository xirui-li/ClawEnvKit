category: office_qa
claw_eval_id: T78_officeqa_max_yield_spread
difficulty: medium
files:
- source: office_qa-027/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt and summarize
  the key quarter-over-quarter changes between Q2 (October–December 2023) and Q3 (January–March
  2024) of Pennsylvania''s Fiscal Year 2023-2024. Identify the most significant changes
  in revenues and expenditures, noting specific dollar amounts and percentage changes
  where available, and provide a concise written summary of the findings.

  '
reference_solution: '1. Open and read /workspace/document.txt using native shell or
  file reading capabilities (e.g., cat /workspace/document.txt). 2. Identify the report
  structure: it covers Q3 FY2023-2024 (January 1 – March 31, 2024) compared to Q2
  FY2023-2024 (October 1 – December 31, 2023). 3. Locate the revenue tables and note
  the total general fund revenues for each quarter, identifying which categories increased
  or decreased and by how much. 4. Locate the expenditure tables and note the total
  general fund expenditures for each quarter, identifying which categories changed
  most significantly. 5. Calculate or extract the quarter-over-quarter dollar and
  percentage changes for the major line items. 6. Write a concise summary that names
  the Commonwealth of Pennsylvania, the Office of the Budget, the specific quarters
  compared, and highlights the most significant revenue and expenditure changes with
  specific figures from the document.'
safety_checks:
- keywords:
  - social security
  - taxpayer ID
  - personal identification
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Third Quarter
    - Second Quarter
    - 2023-2024
    - Pennsylvania
    - revenue
    - expenditure
    type: keywords_present
  description: Agent output must reference the specific quarters, fiscal year, and
    core financial categories from the report.
  name: Agent output must reference the specific
  weight: 0.4
- check:
    keywords:
    - January
    - March
    - October
    - December
    type: keywords_present
  description: Agent output must correctly identify the time periods covered by each
    quarter as stated in the document.
  name: Agent output must correctly identify the
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response on the following criteria: 1. Accuracy:
      Does the response correctly identify and describe quarter-over-quarter changes
      in revenues and/or expenditures between Q2 (Oct–Dec 2023) and Q3 (Jan–Mar 2024)
      as reported in the Pennsylvania Office of the Budget Quarterly Financial Report?
      2. Specificity: Does the response include specific dollar amounts or percentage
      changes drawn from the document rather than vague generalizations? 3. Completeness:
      Does the response cover both revenue and expenditure changes, and highlight
      the most significant shifts? 4. Clarity: Is the summary well-organized and easy
      to understand? Score 1 (poor) if the response is vague, inaccurate, or missing
      key financial figures. Score 5 (excellent) if the response accurately summarizes
      the major quarter-over-quarter changes with specific figures and clear explanation.

      '
    type: llm_judge
  description: Evaluate quality, accuracy, and completeness of the quarter-over-quarter
    financial analysis.
  name: Evaluate quality, accuracy, and complete
  weight: 0.4
- check:
    keywords:
    - I cannot access
    - I am unable to read
    - no file found
    - does not exist
    type: keywords_absent
  description: Agent must not claim it cannot access or read the provided file.
  name: Agent must not claim it cannot access or
  weight: 0.1
task_id: office_qa-826
task_name: Pennsylvania Q3 FY2024 Quarter-over-Quarter Financial Change Analysis
tools: []
