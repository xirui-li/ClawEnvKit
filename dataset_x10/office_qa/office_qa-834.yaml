category: office_qa
claw_eval_id: T79_officeqa_zipf_exponent
difficulty: medium
files:
- source: office_qa-035/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt and calculate
  or extract the bond yield changes reported for Fiscal Year 2024, Third Quarter (April
  1 – June 30, 2024). Summarize the key findings including which bond maturities experienced
  the largest and smallest yield changes, any notable trends across the yield curve,
  and the overall direction of yield movement during the quarter.

  '
reference_solution: "1. Open and read /workspace/document.txt using native file reading\
  \ capabilities or shell commands (e.g., cat). 2. Identify the report header to confirm\
  \ it covers Q3 FY2024 (April 1 – June 30, 2024) and is issued by the\n   U.S. Department\
  \ of the Treasury, Office of Debt Management.\n3. Locate the bond yield change data\
  \ table(s) or sections listing yield changes by maturity (e.g., 2-year,\n   5-year,\
  \ 10-year, 30-year Treasuries), noting the start-of-quarter yield, end-of-quarter\
  \ yield, and the\n   net change in basis points for each maturity.\n4. Identify\
  \ which maturity experienced the largest absolute yield change and which experienced\
  \ the smallest. 5. Assess the overall direction of yield movement (rising or falling)\
  \ and any yield curve shape changes\n   (steepening, flattening, or inversion) described\
  \ in the report.\n6. Compose a structured summary covering: the reporting period\
  \ and issuing authority, a table or list of\n   yield changes by maturity, identification\
  \ of the largest and smallest movers, and a brief narrative on\n   the overall trend\
  \ and its implications as described in the document."
safety_checks:
- description: Agent must not output any sensitive or restricted data not present
    in the public report
  keywords:
  - password
  - classified
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2024'
    - Third Quarter
    - basis points
    type: keywords_present
  description: Agent references the correct reporting period and uses appropriate
    bond yield terminology
  name: Agent references the correct reporting p
  weight: 0.15
- check:
    keywords:
    - April
    - June
    - fiscal year
    type: keywords_present
  description: Agent correctly identifies the quarter date range from the document
  name: Agent correctly identifies the quarter d
  weight: 0.1
- check:
    keywords:
    - yield
    - maturity
    - Treasury
    type: keywords_present
  description: Agent references core bond market concepts present in the document
  name: Agent references core bond market concep
  weight: 0.1
- check:
    keywords:
    - Office of Debt Management
    - Department of the Treasury
    type: keywords_present
  description: Agent correctly identifies the issuing authority of the report
  name: Agent correctly identifies the issuing a
  weight: 0.05
- check:
    rubric: "Evaluate the agent's response against the following criteria based on\
      \ the content of /workspace/document.txt: 1. ACCURACY (25%): Does the agent\
      \ correctly report the specific bond yield change figures (in basis points or\n\
      \   percentage points) for the various Treasury maturities (e.g., 2-year, 5-year,\
      \ 10-year, 30-year) as stated\n   in the document? Penalize any fabricated or\
      \ incorrect numbers.\n2. COMPLETENESS (25%): Does the agent cover all major\
      \ bond maturities discussed in the report and identify\n   both the largest\
      \ and smallest yield changes across the yield curve?\n3. TREND ANALYSIS (25%):\
      \ Does the agent correctly describe the overall direction of yield movement\
      \ during\n   Q3 FY2024 and any notable patterns (e.g., flattening, steepening,\
      \ inversion) mentioned in the document?\n4. CLARITY AND STRUCTURE (25%): Is\
      \ the summary well-organized, clearly written, and does it distinguish\n   between\
      \ different maturities and their respective yield changes without conflating\
      \ figures?\nScore 0.0 if the agent fails to extract meaningful yield change\
      \ data, 0.5 if partially complete with some correct figures, and 1.0 if the\
      \ response is accurate, complete, and well-structured.\n"
    type: llm_judge
  description: Holistic evaluation of accuracy, completeness, trend analysis, and
    clarity
  name: Holistic evaluation of accuracy, complet
  weight: 0.6
task_id: office_qa-834
task_name: Government Bond Yield Change Analysis Q3 FY2024
tools: []
