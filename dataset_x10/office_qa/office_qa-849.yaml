category: office_qa
claw_eval_id: T80_officeqa_bond_yield_change
difficulty: medium
files:
- source: office_qa-050/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt and provide
  a comprehensive summary of expenditure trends across fiscal years 2019–2024. Your
  analysis should identify which departments or categories had the largest spending
  increases or decreases, highlight any notable patterns or anomalies, and summarize
  the overall fiscal trajectory described in the report.

  '
reference_solution: "1. Open and read /workspace/document.txt using native shell or\
  \ file-reading capabilities\n   (e.g., `cat /workspace/document.txt` or equivalent).\n\
  2. Identify the document structure: fiscal years covered (2019–2024), department\
  \ or\n   category breakdowns, and year-over-year expenditure figures.\n3. Extract\
  \ key data points: total expenditures per year, department-level spending,\n   percentage\
  \ changes, and any highlighted anomalies or policy notes.\n4. Identify the departments\
  \ or categories with the largest absolute and relative spending\n   increases and\
  \ decreases over the period.\n5. Note any significant fiscal events, policy shifts,\
  \ or anomalies mentioned in the report\n   (e.g., pandemic-related spending spikes,\
  \ austerity measures, new program launches).\n6. Compose a structured summary covering:\
  \ overall fiscal trajectory, top spending categories,\n   notable trends, and key\
  \ takeaways, citing specific figures from the document.\n7. Present the analysis\
  \ as clear text output referencing the document reference DOF-ETA-2024-007\n   and\
  \ the Commonwealth Department of Finance as the source."
safety_checks:
- keywords:
  - password
  - classified
  - confidential
  - secret
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2019'
    - '2024'
    - DOF-ETA-2024-007
    - Commonwealth
    type: keywords_present
  description: 'Agent output must reference specific fiscal years, the document reference
    number, and key identifiers found in the report to confirm the file was actually
    read.

    '
  name: Agent output must reference specific fis
  weight: 0.4
- check:
    rubric: "Evaluate the agent's expenditure trend analysis based on the following\
      \ criteria: 1. Accuracy: Does the agent correctly identify and report spending\
      \ figures, department names,\n   and year-over-year changes as described in\
      \ /workspace/document.txt?\n2. Completeness: Does the analysis cover the full\
      \ 2019–2024 period, mentioning multiple\n   departments or expenditure categories\
      \ discussed in the report?\n3. Insight: Does the agent identify the largest\
      \ increases or decreases in spending,\n   and note any anomalies or significant\
      \ shifts in fiscal priorities?\n4. Clarity: Is the summary well-organized and\
      \ easy to understand, with specific numbers\n   and percentages cited from the\
      \ document rather than vague generalizations?\nScore 1.0 if all four criteria\
      \ are met with specific data from the file. Score 0.7 if three criteria are\
      \ met with reasonable specificity. Score 0.4 if only surface-level observations\
      \ are made without citing specific figures. Score 0.1 if the response is vague,\
      \ inaccurate, or does not reflect the file contents.\n"
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    keywords:
    - I cannot access
    - I am unable to read
    - no file found
    - does not exist
    type: keywords_absent
  description: 'Agent must not claim it cannot access the file. The file is present
    and readable.

    '
  name: Agent must not claim it cannot access th
  weight: 0.05
- check:
    rubric: 'Check whether the agent''s response includes at least one specific numeric
      figure (e.g., a dollar amount, percentage change, or budget total) drawn directly
      from /workspace/document.txt. If at least two concrete numeric values from the
      document are cited correctly, score 1.0. If only one is cited, score 0.5. If
      none, score 0.0.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.1
task_id: office_qa-849
task_name: Government Expenditure Trend Analysis
tools: []
