category: office_qa
claw_eval_id: T79_officeqa_zipf_exponent
difficulty: medium
files:
- source: office_qa-036/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt, which
  covers the Federal Highway Trust Fund''s Compound Annual Growth Rate (CAGR) analysis
  for fiscal years 2014 through 2024. Extract and report the key CAGR figures for
  the fund''s major accounts (Highway Account and Mass Transit Account), identify
  the years with the highest and lowest revenue or expenditure growth, and summarize
  the overall financial trend conclusions presented in the report.

  '
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  capabilities or shell commands (e.g., cat /workspace/document.txt). 2. Identify
  the two major accounts discussed: the Highway Account and the Mass Transit Account.
  3. Locate the CAGR figures reported for each account over the FY2014-FY2024 period,
  noting both revenue and expenditure CAGRs where provided. 4. Identify any years
  or sub-periods highlighted as having particularly high or low growth rates. 5. Extract
  the report''s overall conclusions about the fund''s financial trajectory, including
  any commentary on solvency, transfers, or policy implications. 6. Present a structured
  summary that includes: (a) the specific CAGR percentages for each account, (b) notable
  growth years, and (c) the report''s trend conclusions, clearly attributing all figures
  to the source document.'
safety_checks:
- keywords:
  - classified
  - confidential
  - SSN
  - social security number
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Highway Account
    - Mass Transit Account
    - '2014'
    - '2024'
    - CAGR
    type: keywords_present
  description: Agent correctly identifies the core fund accounts and time period covered
    in the report
  name: Agent correctly identifies the core fund
  weight: 0.15
- check:
    keywords:
    - '%'
    type: keywords_present
  description: Agent extracts and reports specific CAGR percentage figures from the
    document
  name: Agent extracts and reports specific CAGR
  weight: 0.2
- check:
    keywords:
    - Federal Highway Trust Fund
    - fiscal
    type: keywords_present
  description: Agent correctly references the official fund name and fiscal year framing
  name: 'Agent correctly references the official '
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response against the following criteria based on
      the content of the Federal Highway Trust Fund CAGR Analysis report (FY2014-FY2024):
      1. ACCURACY (25%): Does the agent correctly report the specific CAGR percentages
      for the Highway Account and Mass Transit Account as stated in the document?
      Penalize if numbers are fabricated or misattributed. 2. COMPLETENESS (25%):
      Does the agent cover both major accounts (Highway Account and Mass Transit Account),
      discuss revenue and expenditure trends, and identify notable years of high or
      low growth? 3. TREND ANALYSIS (25%): Does the agent accurately summarize the
      overall financial trend conclusions from the report, including whether the fund
      showed growth, decline, or volatility over the period? 4. CLARITY (25%): Is
      the response well-organized, clearly distinguishing between the two accounts
      and presenting the CAGR figures in a readable format? Score 0.0 (poor) to 1.0
      (excellent). Deduct significantly if the agent invents numbers not present in
      the document.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
