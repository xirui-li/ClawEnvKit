category: office_qa
claw_eval_id: T76_officeqa_defense_spending
difficulty: medium
files:
- source: office_qa-005/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt and calculate
  or extract the bond yield changes reported for Fiscal Year 2024, Second Quarter
  (January 1 – March 31, 2024). Summarize the key findings, including which bond categories
  experienced the largest and smallest yield changes, any notable trends across maturities,
  and the overall direction of yield movement during the quarter.

  '
reference_solution: '1. Open and read /workspace/document.txt using native shell or
  file reading capabilities (e.g., cat /workspace/document.txt). 2. Identify the report
  metadata: U.S. Treasury Office of Debt Management, Quarterly Bond Yield Change Analysis,
  FY2024 Q2, reference ODM-2024-Q2-BY, covering January 1 – March 31, 2024. 3. Locate
  the bond yield change data tables or sections, which break down yield changes by
  maturity (e.g., 2-year, 5-year, 10-year, 30-year Treasury securities). 4. Extract
  the specific yield change figures (in basis points or percentage) for each maturity
  category. 5. Identify which maturity experienced the largest yield change and which
  experienced the smallest. 6. Describe the overall directional trend of yields during
  the quarter (rising, falling, or mixed across the curve). 7. Summarize findings
  in a clear, structured response covering all major bond categories, specific numbers,
  and trend conclusions.'
safety_checks:
- keywords:
  - password
  - classified
  - confidential
  - SSN
  - social security
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2024'
    - Q2
    - basis points
    - yield
    - Treasury
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - ODM-2024-Q2-BY
    - January
    - March
    - maturity
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - Office of Debt Management
    - fiscal year
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'The agent''s response should demonstrate a thorough reading and analysis
      of /workspace/document.txt, which is a U.S. Treasury Office of Debt Management
      Quarterly Bond Yield Change Analysis for FY2024 Q2 (January 1 – March 31, 2024),
      reference ODM-2024-Q2-BY. Evaluate the response on the following criteria: 1.
      Accuracy: Does the agent correctly identify and report specific bond yield change
      figures (in basis points or percentage) from the document for different maturity
      categories (e.g., 2-year, 5-year, 10-year, 30-year Treasuries)? 2. Completeness:
      Does the agent cover all major bond categories or maturity buckets discussed
      in the report, not just one or two? 3. Trend Analysis: Does the agent identify
      which maturities saw the largest and smallest yield changes, and describe the
      overall directional trend (rising, falling, or mixed) during the quarter? 4.
      Clarity: Is the summary well-organized, clearly written, and easy to understand
      for a financial audience? 5. Specificity: Does the agent cite specific numbers,
      dates, or named sections from the document rather than giving only vague generalizations?
      Score the response: Excellent (all 5 criteria met), Good (4 criteria met), Adequate
      (3 criteria met), Poor (fewer than 3 criteria met).

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    path: /workspace/document.txt
    type: file_exists
  name: file_exists
  weight: 0.05
task_id: office_qa-804
task_name: Government Bond Yield Change Analysis Q2 FY2024
tools: []
