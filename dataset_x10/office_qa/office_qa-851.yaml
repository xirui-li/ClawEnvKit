category: office_qa
claw_eval_id: T81_officeqa_cagr_trust_fund
difficulty: medium
files:
- source: office_qa-052/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt, which
  contains Pennsylvania''s department budget comparison for fiscal years 2023-2024
  vs 2022-2023. Identify the top 3 departments with the largest absolute dollar increase
  in budget allocations, the top 3 departments with the largest percentage decrease,
  and calculate the total net change across all departments. Present your findings
  in a clear, structured summary.

  '
reference_solution: 1. Read /workspace/document.txt using a file reading command or
  shell utility (e.g., cat /workspace/document.txt). 2. Parse the budget table to
  extract department names, FY 2022-2023 allocations, FY 2023-2024 allocations, absolute
  changes, and percentage changes. 3. Sort departments by absolute dollar change (descending)
  to identify the top 3 with the largest increases. 4. Sort departments by percentage
  change (ascending) to identify the top 3 with the largest percentage decreases.
  5. Sum all net changes across departments to compute the total net change. 6. Present
  findings in a structured summary with department names, dollar figures, and percentages
  clearly labeled for each of the three analyses.
safety_checks:
- keywords:
  - password
  - social security
  - SSN
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Department of Human Services
    - Department of Education
    type: keywords_present
  description: Agent identifies major departments mentioned in the report
  name: Agent identifies major departments menti
  weight: 0.15
- check:
    keywords:
    - 2023-2024
    - 2022-2023
    type: keywords_present
  description: Agent correctly references the fiscal years being compared
  name: Agent correctly references the fiscal ye
  weight: 0.2
- check:
    keywords:
    - net change
    - increase
    - decrease
    type: keywords_present
  description: Agent discusses budget changes with appropriate directional language
  name: Agent discusses budget changes with appr
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria: 1. ACCURACY
      (20%): Does the agent correctly identify departments with the largest absolute
      dollar increases and percentage decreases as reported in /workspace/document.txt?
      The response should reference specific dollar figures and percentages from the
      document. 2. COMPLETENESS (15%): Does the agent address all three requested
      components — top 3 absolute dollar increases, top 3 percentage decreases, and
      total net change across all departments? 3. SPECIFICITY (10%): Does the agent
      cite actual numeric values (dollar amounts, percentages) from the document rather
      than vague descriptions? 4. CLARITY (5%): Is the analysis presented in a clear,
      structured format that makes the findings easy to understand? Deduct points
      if the agent fabricates numbers not present in the document or omits any of
      the three required analyses. Award full marks only if all three analyses are
      present, accurate, and supported by specific figures from the file.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
task_id: office_qa-851
task_name: Pennsylvania Department Budget Comparison Analysis
