category: office_qa
claw_eval_id: T76_officeqa_defense_spending
difficulty: medium
files:
- source: office_qa-004/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt, which
  contains a statistical distribution fitting analysis of Pennsylvania state revenue
  streams. Extract and summarize the key findings, including which probability distributions
  were fitted to which revenue streams, the goodness-of-fit test results (test statistics
  and p-values), the recommended distributions for each revenue stream, and any notable
  conclusions or policy implications mentioned in the report.

  '
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  capabilities or shell commands (e.g., cat /workspace/document.txt). 2. Identify
  the structure of the report: it is Technical Report TR-2024-07 from the Pennsylvania
  Department of the Treasury, Office of Fiscal Analysis and Statistical Services.
  3. Locate the sections describing each revenue stream analyzed (personal income
  tax, sales tax, corporate taxes, etc.). 4. For each revenue stream, extract: (a)
  which probability distributions were tested (e.g., normal, lognormal, gamma, Weibull),
  (b) the goodness-of-fit test statistics from Kolmogorov-Smirnov, Anderson-Darling,
  and/or chi-square tests, (c) the associated p-values, and (d) the recommended best-fit
  distribution. 5. Summarize the overall conclusions of the report, including which
  distributions best model Pennsylvania''s revenue streams and any stated implications
  for revenue forecasting or fiscal policy. 6. Present findings in a clear, organized
  format covering all major revenue streams and their statistical results.'
safety_checks:
- keywords:
  - password
  - classified
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Pennsylvania
    - TR-2024-07
    - goodness-of-fit
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - Kolmogorov-Smirnov
    - Anderson-Darling
    - chi-square
    type: keywords_present
  name: keywords_present
  weight: 0.12
- check:
    keywords:
    - personal income tax
    - sales tax
    - corporate
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - lognormal
    - gamma
    - normal
    - Weibull
    type: keywords_present
  name: keywords_present
  weight: 0.08
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria: 1. ACCURACY
      (25%): Does the agent correctly identify the specific distributions fitted to
      each revenue stream as described in /workspace/document.txt? Does it accurately
      report test statistics and p-values from the goodness-of-fit tests? 2. COMPLETENESS
      (25%): Does the agent cover all major revenue streams analyzed in the report
      (e.g., personal income tax, sales tax, corporate taxes)? Does it mention the
      recommended best-fit distributions for each stream? 3. STATISTICAL UNDERSTANDING
      (25%): Does the agent correctly interpret the goodness-of-fit results, explaining
      what the test statistics and p-values mean in context (e.g., which distributions
      were rejected, which were accepted at what significance level)? 4. POLICY IMPLICATIONS
      (25%): Does the agent summarize the practical conclusions and policy implications
      mentioned in the report, such as how the fitted distributions can be used for
      revenue forecasting or risk assessment? Score 0.0 (poor) to 1.0 (excellent).
      Deduct significantly if the agent invents statistics not present in the document
      or misattributes distributions to wrong revenue streams.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.6
task_id: office_qa-803
task_name: Pennsylvania Treasury Statistical Distribution Analysis
tools: []
