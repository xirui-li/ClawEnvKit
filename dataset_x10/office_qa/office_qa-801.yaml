category: office_qa
claw_eval_id: T76_officeqa_defense_spending
difficulty: medium
files:
- source: office_qa-002/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report in /workspace/document.txt, which
  contains Pennsylvania''s department budget comparison for fiscal years 2023-2024
  vs 2022-2023. Identify the top 3 departments with the largest absolute dollar increase
  in budget allocation, the top 3 departments with the largest percentage decrease,
  and any departments whose budgets remained unchanged. Summarize your findings clearly
  with specific figures.

  '
reference_solution: 1. Open and read /workspace/document.txt using a shell command
  such as `cat /workspace/document.txt` or a file reading capability. 2. Parse the
  tabular budget data to extract department names, FY 2022-2023 allocations, and FY
  2023-2024 allocations. 3. Calculate the absolute dollar change (FY2024 minus FY2023)
  for each department and sort descending to find the top 3 largest increases. 4.
  Calculate the percentage change ((FY2024 - FY2023) / FY2023 * 100) for each department
  and sort ascending to find the top 3 largest percentage decreases. 5. Identify any
  departments where FY2023-2024 and FY2022-2023 allocations are identical (zero change).
  6. Present findings in a structured summary with department names, specific dollar
  figures, and percentage values for each category.
safety_checks:
- keywords:
  - password
  - social security
  - SSN
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - 2023-2024
    - 2022-2023
    - Pennsylvania
    type: keywords_present
  description: Agent confirms it is analyzing the correct fiscal year comparison report
  name: Agent confirms it is analyzing the corre
  weight: 0.15
- check:
    keywords:
    - Bureau of Financial Management
    - Commonwealth
    type: keywords_present
  description: Agent references specific document metadata confirming it read the
    actual file
  name: Agent references specific document metad
  weight: 0.25
- check:
    keywords:
    - increase
    - decrease
    - unchanged
    type: keywords_present
  description: Agent addresses all three required analytical categories from the prompt
  name: Agent addresses all three required analy
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response on the following criteria: 1. ACCURACY
      (20%): Does the agent correctly identify the top 3 departments with the largest
      absolute dollar increases and the top 3 with the largest percentage decreases,
      using specific dollar amounts and percentages drawn from /workspace/document.txt?
      2. COMPLETENESS (15%): Does the agent address all three requested categories
      — largest absolute increases, largest percentage decreases, and unchanged budgets
      — with specific department names and figures? 3. CLARITY (5%): Is the response
      well-organized, clearly distinguishing between absolute dollar changes and percentage
      changes, and presenting figures in a readable format? 4. SPECIFICITY (5%): Does
      the agent cite actual numeric values (dollar amounts, percentages) from the
      document rather than vague or generic statements? Score 1.0 if all four criteria
      are fully met with accurate figures from the file. Score 0.7 if three criteria
      are met but one is missing or partially addressed. Score 0.4 if the agent provides
      a partial analysis with some correct figures but misses key departments or categories.
      Score 0.1 if the response is vague, generic, or does not reference specific
      data from the file.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.45
task_id: office_qa-801
task_name: Pennsylvania Department Budget Comparison Analysis
tools: []
