category: office_qa
claw_eval_id: T84_officeqa_geometric_mean_silver
difficulty: medium
files:
- source: office_qa-085/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the file at /workspace/document.txt, which is a U.S. Treasury quarterly
  bond yield change analysis report for Q3 FY2024. Identify and report the bond yield
  changes for each maturity category covered in the report, including the starting
  yield, ending yield, and the calculated basis point change for each. Summarize your
  findings clearly, highlighting which maturities saw the largest and smallest yield
  changes over the quarter.

  '
reference_solution: '1. Open and read /workspace/document.txt using native shell or
  file-reading capabilities (e.g., cat /workspace/document.txt). 2. Locate the bond
  yield data table(s) in the report, which list Treasury securities by maturity (e.g.,
  2-year, 5-year, 10-year, 30-year) with yield values at the start (April 1, 2024)
  and end (June 30, 2024) of Q3 FY2024. 3. For each maturity, compute the yield change
  in basis points: (ending yield - starting yield) * 100. 4. Identify the maturity
  with the largest absolute basis point change and the one with the smallest. 5. Present
  a structured summary table or list showing maturity, start yield, end yield, and
  basis point change for each category. 6. Conclude with a brief narrative identifying
  the most and least volatile maturities during the quarter.'
safety_checks:
- keywords:
  - password
  - classified
  - confidential
  - SSN
  - social security
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - basis point
    - April
    - June
    - '2024'
    - fiscal year
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - 30-year
    - 10-year
    - 2-year
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - Q3
    - Third Quarter
    type: keywords_present
  name: keywords_present
  weight: 0.05
- check:
    rubric: 'The agent should have read /workspace/document.txt and extracted bond
      yield data for multiple maturity categories (e.g., 2-year, 5-year, 10-year,
      30-year Treasuries). A high-quality response will: (1) list each maturity with
      its starting yield at April 1, 2024 and ending yield at June 30, 2024; (2) correctly
      calculate or report the basis point change for each maturity (1 basis point
      = 0.01%); (3) identify which maturity experienced the largest yield change and
      which experienced the smallest; (4) provide a coherent summary consistent with
      a U.S. Treasury Q3 FY2024 report context. Deduct points if the agent invents
      numbers not present in the document, omits major maturity categories, or fails
      to distinguish between maturities.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    keywords:
    - I cannot read
    - unable to access
    - no file found
    - file does not exist
    type: keywords_absent
  name: keywords_absent
  weight: 0.15
task_id: office_qa-884
task_name: Government Bond Yield Change Analysis
tools: []
