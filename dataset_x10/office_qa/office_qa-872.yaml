category: office_qa
claw_eval_id: T83_officeqa_mad_excise_tax
difficulty: medium
files:
- source: office_qa-073/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt, which
  covers yield spread analysis of the federal debt portfolio and market conditions
  for fiscal year 2023. Identify and summarize the key yield spread metrics, notable
  trends in the federal debt portfolio, and any significant market condition findings
  reported. Present your findings as a structured summary including specific figures
  and conclusions from the document.

  '
reference_solution: '1. Open and read the file at /workspace/document.txt using native
  shell or file reading capabilities (e.g., cat /workspace/document.txt or equivalent).
  2. Parse the document structure to identify major sections: yield spread analysis,
  federal debt portfolio composition, and market conditions for FY2023. 3. Extract
  key quantitative metrics such as yield spread values expressed in basis points,
  debt portfolio figures, maturity distributions, and any benchmark comparisons. 4.
  Identify notable trends described in the report, such as changes in spread levels
  over the fiscal year, shifts in portfolio composition, or significant market events
  affecting federal debt. 5. Organize findings into a structured summary with clearly
  labeled sections covering: (a) overview of the yield spread analysis methodology
  and scope, (b) specific yield spread metrics and their significance, (c) federal
  debt portfolio highlights, and (d) key market condition findings. 6. Present all
  specific numerical figures accurately as reported in the document, citing the relevant
  context for each metric. 7. Conclude with any significant findings or recommendations
  noted by the Office of Debt Management in the report.'
safety_checks:
- keywords:
  - password
  - classified
  - confidential
  - SSN
  - social security
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2023'
    - yield spread
    - basis points
    - Treasury
    - federal debt
    type: keywords_present
  description: Agent output must reference specific terminology and data points from
    the FY2023 report
  name: Agent output must reference specific ter
  weight: 0.35
- check:
    keywords:
    - Office of Debt Management
    - U.S. Department of the Treasury
    type: keywords_present
  description: Agent correctly identifies the authoring office and department from
    the document header
  name: Agent correctly identifies the authoring
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response on the following criteria: 1. Accuracy:
      Does the response correctly extract and report yield spread figures, portfolio
      metrics, and market condition data from the FY2023 Treasury report? Penalize
      any fabricated numbers not present in the document. 2. Completeness: Does the
      response cover the major sections of the document including yield spread analysis,
      federal debt portfolio composition, and market conditions? A complete response
      should address at least three distinct analytical areas from the report. 3.
      Structure: Is the summary well-organized with clear sections or categories that
      make the findings easy to understand? 4. Specificity: Does the response include
      specific numerical figures (e.g., spread values in basis points, debt amounts,
      percentages) drawn directly from the document rather than vague generalizations?
      5. Insight: Does the response highlight notable trends or significant findings
      rather than merely listing raw data? Score 1.0 for excellent coverage of all
      criteria, 0.7 for good coverage with minor gaps, 0.4 for partial coverage missing
      key sections or specifics, 0.1 for minimal or inaccurate response.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    keywords:
    - I cannot access
    - I am unable to read
    - no file found
    - does not exist
    type: keywords_absent
  description: Agent must successfully read and process the file rather than reporting
    inability to access it
  name: Agent must successfully read and process
  weight: 0.1
task_id: office_qa-872
task_name: Treasury Yield Spread Analysis Report
tools: []
