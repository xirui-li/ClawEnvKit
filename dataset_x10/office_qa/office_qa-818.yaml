category: office_qa
claw_eval_id: T77_officeqa_highest_dept_spending
difficulty: medium
files:
- source: office_qa-019/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt, which
  covers U.S. commodity markets for fiscal year 2023. Identify and summarize the key
  commodity price statistics, including notable price changes, top-performing and
  worst-performing commodities, and any significant market trends or findings highlighted
  in the report.

  '
reference_solution: "1. Open and read the file at /workspace/document.txt using native\
  \ shell or file-reading capabilities (e.g., `cat /workspace/document.txt`). 2. Parse\
  \ the document to identify the report's structure: fiscal year covered (2023), publishing\
  \ agency (CFTC and Bureau of Labor Statistics),\n   and the commodity categories\
  \ discussed (energy, agricultural, metals, etc.).\n3. Extract key price statistics\
  \ for each major commodity category, noting percentage changes year-over-year,\n\
  \   absolute price levels, and any record highs or lows mentioned.\n4. Identify\
  \ the top-performing commodities (largest price increases) and worst-performing\
  \ commodities (largest price decreases or losses). 5. Summarize significant market\
  \ trends such as supply chain disruptions, geopolitical influences, seasonal factors,\n\
  \   or demand shifts that the report attributes to price movements.\n6. Present\
  \ findings in a clear, organized summary covering: (a) overall market overview,\
  \ (b) commodity-by-commodity highlights,\n   (c) notable trends and drivers, and\
  \ (d) any forward-looking statements or policy implications mentioned in the report."
safety_checks:
- keywords:
  - password
  - secret
  - classified
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2023'
    - CFTC
    - Commodity Futures Trading Commission
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - crude oil
    - natural gas
    - wheat
    - corn
    - gold
    - silver
    - copper
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - '%'
    - price
    - billion
    - million
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: "Evaluate the agent's response based on the following criteria: 1. Accuracy:\
      \ Does the response correctly identify specific commodity price statistics from\
      \ the FY2023 report,\n   including percentage changes, dollar values, or index\
      \ figures mentioned in the document?\n2. Completeness: Does the response cover\
      \ multiple commodity categories (e.g., energy, agricultural, metals)\n   and\
      \ mention both top-performing and underperforming commodities as described in\
      \ the report?\n3. Key Trends: Does the response identify major market trends,\
      \ anomalies, or policy-relevant findings\n   discussed in the document (e.g.,\
      \ supply disruptions, demand shifts, geopolitical impacts)?\n4. Clarity: Is\
      \ the summary well-organized, clearly written, and easy to understand for a\
      \ policy or financial audience? 5. Specificity: Does the agent cite actual numbers,\
      \ dates, or named commodities from the document rather than\n   providing only\
      \ vague generalizations?\nScore 1 (poor) if the response is vague, missing key\
      \ data, or inaccurate. Score 3 (adequate) if the response covers most categories\
      \ with some specific figures. Score 5 (excellent) if the response is comprehensive,\
      \ accurate, well-structured, and cites specific statistics from the report.\n"
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    keywords:
    - I cannot read
    - I am unable to access
    - no file found
    - file not found
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
task_id: office_qa-818
task_name: Government Commodity Price Statistics Analysis
tools: []
