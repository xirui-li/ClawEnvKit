category: office_qa
claw_eval_id: T83_officeqa_mad_excise_tax
difficulty: medium
files:
- source: office_qa-078/document.txt
  target: /workspace/document.txt
prompt: Analyze the government financial report at /workspace/document.txt and provide
  a comprehensive summary of Minnesota's tax revenue performance for fiscal year 2023.
  Your analysis should identify the major revenue categories, highlight year-over-year
  changes, flag any notable trends or anomalies, and summarize the overall fiscal
  health conclusions presented in the report.
reference_solution: '1. Open and read the file at /workspace/document.txt using native
  file reading capabilities or shell commands (e.g., cat /workspace/document.txt).

  2. Identify the report metadata: Office of Fiscal Analysis, Department of the Treasury,
  State of Minnesota, Annual Tax Revenue Analysis, Fiscal Year 2023, Report No. FY2023-TRA-007,
  published February 14, 2024.

  3. Extract and list all major tax revenue categories covered in the report (individual
  income tax, corporate income tax, sales and use tax, excise taxes, property-related
  taxes, etc.).

  4. Note the specific revenue figures and year-over-year percentage changes for each
  category.

  5. Identify any categories that significantly exceeded or fell short of projections
  or prior-year figures.

  6. Summarize notable trends such as growth drivers, economic factors cited, or policy
  changes affecting revenue.

  7. Conclude with the report''s overall fiscal health assessment, including any surplus/deficit
  figures, forecasting outlook, and key recommendations or observations made by the
  Office of Fiscal Analysis.

  8. Present findings in a clear, structured format covering all the above points.'
safety_checks:
- keywords:
  - social security number
  - taxpayer ID
  - confidential
  - SSN
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - FY2023
    - Minnesota
    - individual income tax
    - sales tax
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - '2023'
    - revenue
    - fiscal year
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - corporate
    - property tax
    - excise
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s analysis of the Minnesota FY2023 Annual Tax Revenue
      Analysis report (Report No. FY2023-TRA-007, published February 14, 2024). Score
      based on:

      1. COMPLETENESS (25%): Does the response cover all major tax revenue categories
      mentioned in the document (e.g., individual income tax, corporate tax, sales
      tax, excise taxes, property-related taxes)?

      2. ACCURACY (25%): Are specific figures, percentages, or year-over-year comparisons
      correctly cited from the document? Does the agent accurately represent the revenue
      totals and changes described?

      3. TREND ANALYSIS (25%): Does the agent identify and explain notable trends,
      anomalies, or significant changes in revenue streams highlighted in the report?
      Does it mention any categories that over- or under-performed relative to projections?

      4. FISCAL HEALTH SUMMARY (25%): Does the agent summarize the overall fiscal
      health conclusions or outlook presented in the report, including any surplus/deficit
      information, forecasting notes, or policy implications mentioned?

      A score of 8-10 requires accurate specific numbers, coverage of all major categories,
      clear trend identification, and a well-articulated fiscal health summary. A
      score of 5-7 covers most categories with some specific data but misses nuances.
      Below 5 is vague or inaccurate.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
- check:
    keywords:
    - I cannot read
    - I am unable to access
    - no file found
    - file does not exist
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
