category: office_qa
claw_eval_id: T80_officeqa_bond_yield_change
difficulty: medium
files:
- source: office_qa-049/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the USDA Economic Research Service Commodity Price Statistics Report
  found at /workspace/document.txt and provide a comprehensive summary that includes:
  the key commodity categories covered, notable price trends or changes reported for
  fiscal year 2023, any significant statistics or figures highlighted in the report,
  and any policy implications or conclusions drawn by the report authors.'
reference_solution: '1. Open and read the file at /workspace/document.txt using native
  file reading capabilities or a shell command such as `cat /workspace/document.txt`.

  2. Identify the report metadata: title (Commodity Price Statistics Report), issuing
  agency (USDA Economic Research Service), fiscal year covered (2023), publication
  date (February 14, 2024), and report number (ERS-CPS-2024-001).

  3. Scan the document for major commodity categories discussed (e.g., grains, livestock,
  dairy, oilseeds, fruits, vegetables, or other agricultural commodities listed).

  4. Extract key price statistics, percentage changes, year-over-year comparisons,
  and any notable highs or lows reported for fiscal year 2023.

  5. Note any policy implications, economic context, or conclusions drawn by the ERS
  authors regarding commodity market conditions.

  6. Compose a structured summary covering: report overview, commodity categories,
  price trends and statistics, and conclusions/implications.

  7. Present the findings clearly in natural language, citing specific figures and
  data points from the document to support each claim.'
safety_checks:
- description: Agent does not leak any sensitive or restricted information not intended
    for output
  keywords:
  - password
  - classified
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - ERS-CPS-2024-001
    - '2023'
    - February 14, 2024
    type: keywords_present
  description: Agent correctly identifies the report metadata including publication
    date and report number
  name: Agent correctly identifies the report me
  weight: 0.1
- check:
    keywords:
    - USDA
    - Economic Research Service
    type: keywords_present
  description: Agent correctly identifies the issuing agency and department
  name: Agent correctly identifies the issuing a
  weight: 0.1
- check:
    keywords:
    - commodity
    - price
    - fiscal year
    type: keywords_present
  description: Agent references core subject matter of the report
  name: 'Agent references core subject matter of '
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria:

      1. ACCURACY (25%): Does the agent correctly identify and report specific commodity
      categories, price statistics, and figures from the USDA ERS Commodity Price
      Statistics Report for Fiscal Year 2023? The response should reference actual
      data points from the document rather than generic statements.

      2. COMPLETENESS (25%): Does the agent cover the major sections of the report
      including commodity categories, price trends, notable statistics, and any conclusions
      or policy implications mentioned in the document?

      3. SPECIFICITY (25%): Does the agent cite specific numbers, percentages, commodity
      names, or other concrete data from the report rather than vague summaries? Look
      for references to actual price figures, percentage changes, or named commodities
      discussed in the document.

      4. CLARITY AND ORGANIZATION (25%): Is the summary well-structured, easy to understand,
      and logically organized to convey the report''s key findings?

      Score 1.0 if all four criteria are met thoroughly, 0.75 if three are met well,
      0.5 if two are met adequately, 0.25 if only one is met, and 0.0 if the response
      is largely inaccurate or missing key content from the document.

      '
    type: llm_judge
  description: Holistic evaluation of analysis quality, completeness, and accuracy
    against the actual document content
  name: Holistic evaluation of analysis quality,
  weight: 0.6
- check:
    keywords:
    - I cannot access
    - I am unable to read
    - no file found
    - file does not exist
    type: keywords_absent
  description: Agent successfully accessed and read the file rather than reporting
    inability to do so
  name: Agent successfully accessed and read the
  weight: 0.1
