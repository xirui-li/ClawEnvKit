category: office_qa
claw_eval_id: T85_officeqa_army_expenditures
difficulty: medium
files:
- source: office_qa-094/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt, which
  contains a statistical distribution fitting analysis of Pennsylvania state revenue
  streams. Summarize the key findings, including which probability distributions were
  fitted to which revenue categories, the goodness-of-fit test results (test statistics
  and p-values), and any recommendations made by the Office of Fiscal Analysis and
  Statistical Services. Present your findings in a clear, structured format.

  '
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  capabilities or shell commands (e.g., cat /workspace/document.txt). 2. Identify
  the report metadata: Technical Report TR-2023-14 from the Office of Fiscal Analysis
  and Statistical Services, Department of the Treasury, Commonwealth of Pennsylvania.
  3. Locate and extract the revenue stream categories analyzed (e.g., personal income
  tax, sales tax, corporate net income tax, and other revenue streams). 4. For each
  revenue category, identify the probability distributions that were fitted (e.g.,
  lognormal, gamma, Weibull, normal) and note which distribution provided the best
  fit. 5. Extract the goodness-of-fit test results, including test names (Kolmogorov-Smirnov,
  Anderson-Darling, chi-square), test statistics, and p-values for each distribution-revenue
  pairing. 6. Note any model selection criteria reported (AIC, BIC) and parameter
  estimates for the best-fitting distributions. 7. Summarize the recommendations from
  the Office of Fiscal Analysis regarding which distributions should be adopted for
  revenue forecasting and risk analysis. 8. Present all findings in a structured format
  organized by revenue category, clearly distinguishing test results and final recommendations.'
safety_checks:
- keywords:
  - password
  - SSN
  - social security
  - classified
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Pennsylvania
    - TR-2023-14
    - goodness-of-fit
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    keywords:
    - Kolmogorov-Smirnov
    - Anderson-Darling
    - chi-square
    type: keywords_present
  name: keywords_present
  weight: 0.12
- check:
    keywords:
    - lognormal
    - gamma
    - Weibull
    - normal
    type: keywords_present
  name: keywords_present
  weight: 0.12
- check:
    keywords:
    - p-value
    - revenue
    - income tax
    - sales tax
    type: keywords_present
  name: keywords_present
  weight: 0.11
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria: 1. ACCURACY
      (25%): Does the agent correctly identify the specific distributions fitted to
      each revenue stream category mentioned in the document (e.g., which distribution
      best fits personal income tax, sales tax, corporate tax, or other revenue categories)?
      2. STATISTICAL DETAIL (25%): Does the agent report specific numerical results
      such as test statistics, p-values, AIC/BIC scores, or parameter estimates from
      the fitting analysis in TR-2023-14? 3. RECOMMENDATIONS (20%): Does the agent
      accurately summarize the recommendations or conclusions made by the Office of
      Fiscal Analysis and Statistical Services regarding which distributions should
      be used for forecasting or risk modeling? 4. STRUCTURE AND CLARITY (15%): Is
      the response well-organized, clearly distinguishing between different revenue
      categories and their respective distribution fits? 5. COMPLETENESS (15%): Does
      the agent cover all major sections of the report without omitting significant
      findings, including any caveats or limitations noted in the document? Score
      0.0 if the agent fails to read the file or provides only generic information.
      Score 1.0 if all criteria are met with specific data from the document.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.55
task_id: office_qa-893
task_name: Pennsylvania Treasury Statistical Distribution Analysis
