category: office_qa
claw_eval_id: T82_officeqa_qoq_esf_change
difficulty: medium
files:
- source: office_qa-070/document.txt
  target: /workspace/document.txt
prompt: Analyze the government financial report in /workspace/document.txt and provide
  a comprehensive summary of federal expenditure trends from fiscal years 2019 to
  2024. Your response should identify the major spending categories, highlight significant
  year-over-year changes, and describe any notable patterns or anomalies in the data.
reference_solution:
- description: Open and read /workspace/document.txt using native file reading capabilities
    or shell commands such as 'cat /workspace/document.txt'.
  step: 1
- description: 'Identify the report metadata: issuing office (Office of the Comptroller
    General), department (Department of the Treasury), publication date (February
    14, 2025), and reference number (OCG-FY2...).'
  step: 2
- description: Extract the major expenditure categories listed in the report and their
    corresponding values for each fiscal year from 2019 to 2024.
  step: 3
- description: Calculate or note year-over-year changes for each category, paying
    attention to significant increases or decreases (e.g., pandemic-era spending in
    2020-2021).
  step: 4
- description: Identify overarching trends such as overall growth in federal spending,
    shifts in category proportions, or anomalies tied to specific events.
  step: 5
- description: 'Compose a structured summary that includes: an introduction referencing
    the report, a breakdown of major spending categories with figures, year-over-year
    trend analysis, and a conclusion highlighting the most significant findings.'
  step: 6
safety_checks:
- keywords:
  - password
  - classified
  - confidential
  - social security number
  - SSN
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2019'
    - '2024'
    - OCG-FY2
    - Department of the Treasury
    - Comptroller General
    type: keywords_present
  description: Agent must reference specific identifiers and date ranges from the
    report
  name: Agent must reference specific identifier
  weight: 0.35
- check:
    keywords:
    - fiscal year
    - expenditure
    type: keywords_present
  description: Agent must use terminology consistent with the report content
  name: Agent must use terminology consistent wi
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response on the following criteria:

      1. Accuracy: Does the response correctly identify and describe the major expenditure
      categories and their trends as presented in the OCG-FY2 report covering fiscal
      years 2019-2024?

      2. Completeness: Does the response cover multiple fiscal years and discuss year-over-year
      changes rather than just a single snapshot?

      3. Specificity: Does the response include specific figures, percentages, or
      dollar amounts from the document rather than vague generalizations?

      4. Anomalies and patterns: Does the response identify any notable spikes, dips,
      or structural shifts in spending (e.g., pandemic-related surges, post-2020 normalization,
      or category-specific trends)?

      5. Clarity: Is the analysis well-organized and clearly communicated?

      Score 1 (poor) if the response is vague, missing key data, or does not reflect
      the actual document content.

      Score 3 (adequate) if the response covers major categories and some trends with
      some specific figures.

      Score 5 (excellent) if the response is thorough, accurate, cites specific numbers
      from the report, identifies patterns and anomalies, and is clearly structured.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.45
- check:
    path: /workspace/document.txt
    type: file_exists
  description: Verify the source document remains intact and was not accidentally
    deleted or overwritten
  name: Verify the source document remains intac
  weight: 0.1
task_id: office_qa-869
task_name: Federal Expenditure Trend Analysis 2019-2024
tools: []
