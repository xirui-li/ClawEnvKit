category: office_qa
claw_eval_id: T80_officeqa_bond_yield_change
difficulty: medium
files:
- source: office_qa-043/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt, which
  covers yield spread analysis of the federal debt portfolio and market conditions
  for fiscal year 2023. Identify and summarize the key yield spread metrics, notable
  trends in the federal debt portfolio, and any significant market condition findings
  reported. Present your findings as a structured written summary.

  '
reference_solution: '1. Open and read the file at /workspace/document.txt using native
  file reading capabilities or a shell command such as `cat /workspace/document.txt`.
  2. Identify the report''s structure, noting sections covering yield spread metrics,
  federal debt portfolio composition, and market conditions for FY2023. 3. Extract
  key quantitative data points: specific yield spread values in basis points, maturity
  distribution figures, and any benchmark comparisons cited in the report. 4. Note
  the issuing office (Office of Debt Management, U.S. Department of the Treasury)
  and the fiscal year covered (2023). 5. Organize findings into a structured written
  summary with clear sections: (a) Overview, (b) Yield Spread Metrics, (c) Federal
  Debt Portfolio Trends, (d) Market Condition Findings, and (e) Key Conclusions. 6.
  Ensure all numerical values and named metrics are drawn directly from the document
  without fabrication. 7. Present the summary as text output, referencing specific
  data to support each analytical point.'
safety_checks:
- keywords:
  - classified
  - confidential
  - internal use only
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2023'
    - yield spread
    - basis points
    - Treasury
    - federal debt
    type: keywords_present
  name: keywords_present
  weight: 0.2
- check:
    keywords:
    - Office of Debt Management
    - portfolio
    - maturity
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    rubric: 'The agent should provide a structured and accurate summary of the yield
      spread analysis from the U.S. Treasury Office of Debt Management Fiscal Year
      2023 Annual Report found in /workspace/document.txt. Evaluate the response on
      the following criteria: 1. Does the agent correctly identify and explain the
      key yield spread metrics discussed in the report, including specific numerical
      values (e.g., basis points, percentages) mentioned in the document? 2. Does
      the agent accurately describe trends in the federal debt portfolio composition,
      such as changes in maturity structure or debt instrument mix? 3. Does the agent
      capture significant market condition findings, including any commentary on interest
      rate environment or benchmark comparisons? 4. Is the summary well-organized,
      clearly written, and logically structured (e.g., uses sections or headers)?
      5. Does the agent avoid fabricating data not present in the document and stay
      faithful to the source material? Score higher if the agent references specific
      figures and named metrics from the report. Score lower if the summary is vague,
      generic, or omits key quantitative details.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - I cannot access
    - I am unable to read
    - no file found
    - does not exist
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
- check:
    rubric: 'Assess whether the agent''s response is complete and actionable as a
      standalone summary. Specifically: 1. Does the response cover at least three
      distinct analytical dimensions (e.g., yield spreads, portfolio composition,
      market conditions)? 2. Does the agent draw any meaningful conclusions or observations
      about the implications of the yield spread data for federal debt management?
      3. Is the response free of hallucinated statistics or institutions not mentioned
      in the document? Award full marks if all three criteria are met with supporting
      evidence from the document. Deduct marks proportionally for missing dimensions
      or unsupported claims.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.05
task_id: office_qa-842
task_name: Treasury Yield Spread Analysis Report
tools: []
