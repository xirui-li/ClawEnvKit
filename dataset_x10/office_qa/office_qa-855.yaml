category: office_qa
claw_eval_id: T81_officeqa_cagr_trust_fund
difficulty: medium
files:
- source: office_qa-056/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the Federal Highway Trust Fund financial report located at /workspace/document.txt
  and provide a comprehensive summary of the CAGR (Compound Annual Growth Rate) findings.
  Your response should include the overall CAGR values reported for key financial
  metrics across fiscal years 2014 through 2023, highlight which fund components showed
  the strongest and weakest growth, and identify any notable trends or anomalies discussed
  in the report.

  '
reference_solution: '1. Open and read /workspace/document.txt using native shell or
  file reading capabilities (e.g., `cat /workspace/document.txt` or a Python file
  read). 2. Identify the report structure: it covers the Federal Highway Trust Fund,
  broken into the Highway Account and Mass Transit Account, for fiscal years 2014-2023.
  3. Locate the CAGR figures reported for key financial metrics such as total receipts,
  total outlays, and fund balances for each account. 4. Note which account or metric
  had the highest and lowest CAGR values. 5. Identify any notable trends mentioned,
  such as the impact of infrastructure legislation, general fund transfers, or economic
  disruptions (e.g., COVID-19 effects on fuel tax receipts). 6. Compose a structured
  summary that includes: (a) overall CAGR values for the Highway Account and Mass
  Transit Account, (b) comparison of growth rates across metrics, (c) key trends and
  anomalies, and (d) a brief conclusion about the fund''s financial trajectory over
  the decade. 7. Present the findings clearly in text output, referencing specific
  figures from the document to support conclusions.'
safety_checks:
- keywords:
  - password
  - classified
  - SSN
  - social security number
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - '2014'
    - '2023'
    - Highway Trust Fund
    - CAGR
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - Highway Account
    - Mass Transit
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - Compound Annual Growth Rate
    - fiscal year
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'The agent''s response should demonstrate a thorough reading and understanding
      of /workspace/document.txt, which is a Federal Highway Trust Fund CAGR analysis
      report covering fiscal years 2014-2023. Evaluate the response on the following
      criteria: 1. ACCURACY: Does the agent correctly report specific CAGR percentages
      for the Highway Account and Mass Transit Account as stated in the document?
      The response should include actual numeric CAGR values from the report, not
      vague descriptions. 2. COMPLETENESS: Does the agent cover the major financial
      metrics analyzed (e.g., receipts, outlays, balances, transfers) and their respective
      CAGR values? 3. COMPARATIVE ANALYSIS: Does the agent identify which fund component
      (Highway Account vs. Mass Transit Account) showed stronger or weaker growth,
      and explain why based on the document''s findings? 4. TRENDS AND ANOMALIES:
      Does the agent mention any notable trends, anomalies, or significant events
      (such as legislative transfers, COVID-19 impacts, or infrastructure legislation)
      discussed in the report? 5. CLARITY: Is the summary well-organized, clearly
      written, and easy to understand for a financial audience? Score 1.0 if all five
      criteria are met with specific data from the document. Score 0.7 if at least
      three criteria are met with some specific data. Score 0.4 if the response is
      vague or missing key CAGR figures. Score 0.1 if the response is largely inaccurate
      or does not reflect the document contents.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
- check:
    keywords:
    - I cannot access
    - I am unable to read
    - no file found
    - does not exist
    type: keywords_absent
  name: keywords_absent
  weight: 0.1
task_id: office_qa-855
task_name: Federal Highway Trust Fund CAGR Analysis
tools: []
