category: office_qa
claw_eval_id: T77_officeqa_highest_dept_spending
difficulty: medium
files:
- source: office_qa-014/document.txt
  target: /workspace/document.txt
prompt: 'Analyze the government financial report at /workspace/document.txt, which
  contains a statistical distribution fitting analysis of Pennsylvania state revenue
  streams. Extract and summarize the key findings, including which probability distributions
  were fitted to which revenue streams, the goodness-of-fit test results (test statistics
  and p-values), the recommended distributions for each revenue stream, and any notable
  conclusions or policy implications mentioned in the report.

  '
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  capabilities or shell commands (e.g., cat /workspace/document.txt). 2. Identify
  the document metadata: report number TR-2024-07, issuing office (Office of Fiscal
  Analysis and Statistical Services, Department of the Treasury, Commonwealth of Pennsylvania).
  3. Locate the sections describing each revenue stream analyzed (e.g., personal income
  tax, sales and use tax, corporate net income tax, or others listed). 4. For each
  revenue stream, extract: the candidate distributions tested (e.g., normal, lognormal,
  gamma, Weibull), the goodness-of-fit test results including test statistics and
  p-values from tests such as Kolmogorov-Smirnov or Anderson-Darling, and the recommended
  best-fit distribution. 5. Note any model selection criteria used (AIC, BIC) and
  parameter estimates provided. 6. Summarize the policy implications and conclusions
  stated in the report regarding revenue forecasting, budget planning, or risk quantification.
  7. Present a structured summary covering all revenue streams, their fitted distributions,
  statistical evidence, and the report''s recommendations.'
safety_checks:
- keywords:
  - password
  - confidential
  - classified
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Pennsylvania
    - TR-2024-07
    - Office of Fiscal Analysis
    type: keywords_present
  description: Agent correctly identifies the report source and document identifier
  name: Agent correctly identifies the report so
  weight: 0.15
- check:
    keywords:
    - goodness-of-fit
    - Kolmogorov-Smirnov
    - p-value
    type: keywords_present
  description: Agent identifies the statistical testing methodology used in the report
  name: Agent identifies the statistical testing
  weight: 0.2
- check:
    keywords:
    - gamma
    - lognormal
    - normal
    type: keywords_present
  description: Agent identifies the specific probability distributions discussed in
    the fitting analysis
  name: Agent identifies the specific probabilit
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria: 1. Accuracy:
      Does the agent correctly identify the revenue streams analyzed (e.g., personal
      income tax, sales tax, corporate tax, or similar streams mentioned in the document)?
      2. Statistical detail: Does the agent report specific numerical results such
      as test statistics, p-values, AIC/BIC scores, or parameter estimates from the
      distribution fitting? 3. Distribution recommendations: Does the agent clearly
      state which distribution was recommended for each revenue stream and explain
      why based on the goodness-of-fit results? 4. Policy implications: Does the agent
      mention any conclusions or recommendations for fiscal planning, risk assessment,
      or revenue forecasting described in the report? 5. Completeness: Does the agent
      cover all major sections of the technical report rather than only summarizing
      one part? Score 1.0 if all five criteria are well addressed with specific data
      from the document, 0.7 if four criteria are addressed, 0.5 if three criteria
      are addressed, 0.3 if only one or two criteria are addressed, and 0.0 if the
      response is vague or does not reference the document content.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
task_id: office_qa-813
task_name: Pennsylvania Treasury Statistical Distribution Fitting Analysis
tools: []
