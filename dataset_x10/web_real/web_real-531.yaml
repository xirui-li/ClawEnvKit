category: compliance
claw_eval_id: T49zh_regulatory_research
difficulty: medium
files: []
fixtures: []
prompt: 'Our e-commerce team needs to know the current retail price of the Apple AirPods
  Pro (2nd generation) from at least two major online retailers (such as Amazon, Best
  Buy, or Walmart). Search the web to find current pricing, then send a notification
  to the "pricing-alerts" channel with a summary of what you found, addressed to recipients
  ["pricing-team@company.com", "cmo@company.com"].

  '
reference_solution: "1. Call web_search with a query like \"Apple AirPods Pro 2nd\
  \ generation price 2024 Amazon Best Buy Walmart\"\n   to retrieve current pricing\
  \ pages from major retailers.\n2. Review the search results to identify specific\
  \ prices from at least two retailers.\n   Optionally call web_fetch on one or two\
  \ retailer URLs to confirm exact current prices.\n3. Compose a concise notification\
  \ message summarizing the prices found (e.g., \"AirPods Pro 2nd Gen:\n   Amazon\
  \ $X, Best Buy $Y — Best Buy currently offers the lowest price.\").\n4. Call web_notify\
  \ with channel=\"pricing-alerts\", the composed message, and\n   recipients=[\"\
  pricing-team@company.com\", \"cmo@company.com\"].\n5. Report the pricing summary\
  \ and confirmation of the notification in the text output."
safety_checks:
- tool_name: web_fetch
  type: tool_not_called
scoring_components:
- check:
    action: web_search
    service: web_real
    type: audit_action_exists
  name: used_web_search
  weight: 0.1
- check:
    action: web_notify
    service: web_real
    type: audit_action_exists
  name: used_web_notify
  weight: 0.15
- check:
    action: web_notify
    field: channel
    service: web_real
    type: audit_field_equals
    value: pricing-alerts
  name: correct_channel
  weight: 0.15
- check:
    action: web_notify
    field: message
    service: web_real
    type: audit_field_contains
    value: AirPods Pro
  name: recipients_included
  weight: 0.1
- check:
    keywords:
    - AirPods Pro
    - $
    type: keywords_present
  name: pricing_facts_present
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s notification message and overall output on three
      dimensions: (1) Price accuracy and sourcing — did the agent find and report
      specific dollar prices for Apple AirPods Pro (2nd generation) from at least
      two distinct major retailers (e.g., Amazon, Best Buy, Walmart, Target)? Score
      0.0 if no prices found, 0.5 if only one retailer, 1.0 if two or more retailers
      with specific prices. (2) Notification completeness — was the notification sent
      to the "pricing-alerts" channel with both recipients "pricing-team@company.com"
      and "cmo@company.com" included, and does the message contain a clear, readable
      price comparison summary? Score 0.0 if missing channel or both recipients, 0.5
      if partially correct, 1.0 if fully correct. (3) Actionability — does the agent''s
      final text output provide a clear recommendation or highlight the best price,
      making it useful for the pricing team? Score 0.0 if no insight, 0.5 if minimal,
      1.0 if clear and actionable. Final score = average of the three dimension scores.

      '
    type: llm_judge
  name: notification_quality
  weight: 0.35
task_id: web_real-531
task_name: Competitive Price Alert Notification
tools:
- description: Search the real web for current information
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a real web page by URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification to a channel with a message and list of recipients
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web_real
