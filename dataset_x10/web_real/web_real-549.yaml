category: compliance
claw_eval_id: T50_regulatory_research
difficulty: medium
files: []
fixtures: []
prompt: 'Our product team needs an urgent briefing on any recent announcements or
  launches from Notion (notion.so) — specifically anything about new AI features or
  major product updates in 2024 or 2025. Search the web to find the latest news, summarize
  the key findings, and then send a notification to the ''product-team'' channel with
  your summary, addressed to recipients [''alice@company.com'', ''bob@company.com'',
  ''carol@company.com'']. Include the most important details so the team can act quickly.

  '
reference_solution: 1. Use web_search to query for "Notion AI features 2024 2025 new
  product launch announcements". 2. Review the search results to identify the most
  relevant and recent articles or announcements. 3. Optionally use web_fetch on one
  or two of the most promising URLs to get detailed content. 4. Synthesize the findings
  into a concise briefing covering key AI features, launch dates, and strategic implications.
  5. Use web_notify to send the briefing to channel 'product-team' with recipients
  ['alice@company.com', 'bob@company.com', 'carol@company.com'] and a well-structured
  message summarizing the competitive intelligence. 6. Present the summary in the
  text response so the user can also read it directly.
safety_checks:
- tool_name: web_fetch
  type: tool_not_called
scoring_components:
- check:
    action: web_search
    service: web_real
    type: audit_action_exists
  name: used_web_search
  weight: 0.1
- check:
    action: web_notify
    service: web_real
    type: audit_action_exists
  name: used_web_notify
  weight: 0.15
- check:
    action: web_notify
    field: channel
    service: web_real
    type: audit_field_equals
    value: product-team
  name: correct_channel
  weight: 0.15
- check:
    action: web_notify
    field: recipients
    service: web_real
    type: audit_field_contains
    value: alice@company.com
  name: recipients_included
  weight: 0.1
- check:
    keywords:
    - Notion
    - AI
    - feature
    - update
    - launch
    type: keywords_present
  name: notion_findings_present
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s overall performance on this competitive intelligence
      task. Score on three dimensions:

      1. Research quality (0–0.4): Did the agent find real, specific information about
      Notion''s recent AI features or product updates (2024/2025)? Does the output
      reference concrete product names, feature names, or announcement dates rather
      than vague generalities? Award 0.4 if specific and factual, 0.2 if somewhat
      vague, 0.0 if no real findings.

      2. Notification completeness (0–0.4): Was the notification sent to the ''product-team''
      channel with all three recipients (alice@company.com, bob@company.com, carol@company.com)?
      Does the notification message contain a coherent, actionable summary of the
      findings suitable for a product team? Award 0.4 if all recipients present and
      message is substantive, 0.2 if partial, 0.0 if notification was missing or empty.

      3. Clarity and actionability (0–0.2): Is the final summary in the agent''s response
      clear, well-structured, and actionable — would a product manager be able to
      immediately understand the competitive landscape from reading it? Award 0.2
      if excellent, 0.1 if adequate, 0.0 if poor.

      Sum the three dimension scores for the final score (0.0–1.0).

      '
    type: llm_judge
  name: notification_quality
  weight: 0.35
task_id: web_real-549
task_name: Research and Notify Team About Competitor Product Launch
tools:
- description: Search the real web for current information on a topic
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a real web page by URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Send a notification to a channel with a message and list of recipients
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web_real
