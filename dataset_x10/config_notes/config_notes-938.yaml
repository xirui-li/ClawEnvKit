  name: list_integrations
  service: config
- description: Get full details of an integration including API key and secret
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Send a notification email (to, subject, body)
  endpoint: /config/notify
  method: POST
  name: config_notify
  service: config
- description: List available meeting and review notes
  endpoint: /notes/list
  method: POST
  name: list_notes
  service: notes
- description: Get the full content of a specific note by ID
  endpoint: /notes/get
  method: POST
  name: get_note
  service: notes
- description: Share a note with specified recipients
  endpoint: /notes/share
  method: POST
  name: share_note
  service: notes
