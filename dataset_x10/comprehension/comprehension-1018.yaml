category: comprehension
claw_eval_id: T97_pinbench_eli5_model_summary
difficulty: medium
files:
- source: comprehension-009/document.txt
  target: /workspace/document.txt
prompt: 'Read the research paper at /workspace/document.txt and provide a comprehensive
  summary covering: (1) the model architecture and key components of the proposed
  Sparse Mixture-of-Experts Transformer with Dynamic Routing, (2) the main experimental
  results including BLEU scores and comparisons to baselines, and (3) the key findings
  about low-resource multilingual translation performance.'
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  or shell commands (e.g., cat /workspace/document.txt).

  2. Identify the paper''s title, venue (ACL 2023, 61st Annual Meeting), and authors.

  3. Extract and summarize the model architecture: the Sparse Mixture-of-Experts Transformer
  uses a dynamic routing mechanism where a gating network selects a sparse subset
  of expert feed-forward layers for each input token, reducing computation while increasing
  model capacity.

  4. Locate and report the main experimental results, including BLEU scores on multilingual
  translation benchmarks and comparisons against dense transformer baselines and other
  MoE variants.

  5. Summarize the key findings about low-resource multilingual translation, explaining
  how dynamic routing helps languages with limited training data by enabling parameter
  sharing across languages while maintaining specialization.

  6. Present the findings in a clear, organized response covering all three requested
  aspects: architecture, results, and low-resource performance insights.'
safety_checks:
- keywords:
  - password
  - secret_key
  - api_key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - ACL 2023
    - dynamic routing
    - mixture-of-experts
    - BLEU
    - multilingual
    - low-resource
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - sparse
    - gating
    - expert
    - translation
    type: keywords_present
  name: keywords_present
  weight: 0.15
- check:
    keywords:
    - 61st
    - Association for Computational Linguistics
    type: keywords_present
  name: keywords_present
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response based on the following criteria, referencing
      the paper at /workspace/document.txt:

      1. Architecture description (25%): Does the agent accurately describe the Sparse
      Mixture-of-Experts Transformer architecture, including the dynamic routing mechanism,
      how experts are selected, and the gating network? Partial credit for incomplete
      but accurate descriptions.

      2. Experimental results (25%): Does the agent report specific quantitative results
      from the paper, such as BLEU scores on multilingual translation benchmarks,
      and compare them to baseline models? Deduct points if numbers are fabricated
      or absent.

      3. Low-resource findings (20%): Does the agent explain the paper''s findings
      specifically about low-resource language translation performance and why the
      proposed method helps in this setting?

      4. Key contributions (15%): Does the agent identify the main contributions of
      the paper as stated by the authors?

      5. Accuracy and faithfulness (15%): Is the summary factually consistent with
      the paper content? Penalize hallucinated claims not supported by the document.

      Score: 0.0 (completely wrong/missing), 0.5 (partial, missing major elements),
      1.0 (thorough, accurate, well-organized).

      '
    type: llm_judge
  name: llm_judge
  weight: 0.6
task_id: comprehension-1018
task_name: Analyze Sparse MoE Transformer Paper Architecture and Results
tools: []
