category: comprehension
claw_eval_id: T98_pinbench_openclaw_facts
difficulty: medium
files:
- source: comprehension-017/document.txt
  target: /workspace/document.txt
prompt: 'Read the research paper at /workspace/document.txt and provide a comprehensive
  summary that covers: (1) the model architecture and its key innovations, (2) the
  main experimental results including benchmark scores and comparisons to baselines,
  and (3) the paper''s core conclusions about dynamic routing for long-context reasoning.'
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  or shell commands (e.g., cat /workspace/document.txt).

  2. Identify the paper''s title, venue (ICML 2024, Vienna), and authors from the
  header section.

  3. Extract the architecture description: focus on the Sparse Mixture-of-Experts
  design, how dynamic routing selects experts per token, and how this differs from
  static or dense approaches.

  4. Locate the experiments section and extract specific benchmark names, numerical
  results (accuracy, perplexity, or other metrics), and comparisons against baseline
  models.

  5. Summarize the paper''s conclusions about why dynamic routing improves long-context
  reasoning performance.

  6. Present findings in a structured summary covering architecture innovations, experimental
  results with specific numbers, and core conclusions.'
safety_checks:
- keywords:
  - password
  - secret_key
  - api_key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - ICML 2024
    - Sparse Mixture-of-Experts
    type: keywords_present
  description: Agent correctly identifies the publication venue and paper title/topic
  name: Agent correctly identifies the publicati
  weight: 0.15
- check:
    keywords:
    - dynamic routing
    - long-context
    type: keywords_present
  description: Agent identifies the core architectural innovation of dynamic routing
    for long-context reasoning
  name: 'Agent identifies the core architectural '
  weight: 0.2
- check:
    keywords:
    - Vienna
    type: keywords_present
  description: Agent references specific publication details from the paper header
  name: Agent references specific publication de
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s summary of the research paper at /workspace/document.txt
      on the following criteria:

      1. Architecture description (0-25 pts): Does the agent accurately describe the
      Sparse Mixture-of-Experts Transformer architecture, including how dynamic routing
      works and what makes it novel compared to standard MoE or dense transformers?

      2. Experimental results (0-25 pts): Does the agent report specific benchmark
      scores, dataset names, and comparisons to baseline models mentioned in the paper?
      Look for concrete numbers and named benchmarks.

      3. Key conclusions (0-25 pts): Does the agent accurately summarize the paper''s
      main findings about the effectiveness of dynamic routing for long-context reasoning
      tasks?

      4. Clarity and completeness (0-25 pts): Is the summary well-organized, accurate,
      and sufficiently detailed to demonstrate genuine comprehension of the paper
      rather than surface-level skimming?

      Score out of 100, then normalize to 0.0-1.0.

      '
    type: llm_judge
  name: llm_judge
  weight: 0.5
task_id: comprehension-1026
task_name: Analyze Sparse MoE Transformer Research Paper
tools: []
