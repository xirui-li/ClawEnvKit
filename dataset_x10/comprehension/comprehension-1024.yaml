category: comprehension
claw_eval_id: T98_pinbench_openclaw_facts
difficulty: medium
files:
- source: comprehension-015/document.txt
  target: /workspace/document.txt
prompt: 'Read the research paper at /workspace/document.txt and provide a comprehensive
  summary covering: the model architecture and its key innovations, the datasets and
  languages used in experiments, the main quantitative results reported, and the key
  conclusions drawn by the authors.'
reference_solution: '1. Open and read the file at /workspace/document.txt using native
  shell or file reading capabilities (e.g., cat /workspace/document.txt or reading
  via code).

  2. Parse the document to identify: (a) the paper title, venue, and submission date;
  (b) the proposed model architecture — a Sparse Mixture-of-Experts Transformer with
  an adaptive routing mechanism for selecting experts per token; (c) the experimental
  setup including multilingual low-resource translation benchmarks and language pairs
  tested; (d) quantitative results such as BLEU score improvements over baseline models;
  (e) the authors'' conclusions about the effectiveness of adaptive routing for low-resource
  multilingual translation.

  3. Compose a structured summary covering all four requested areas: architecture
  innovations, datasets/languages, quantitative results, and key conclusions.

  4. Output the summary as clear, organized text referencing specific numbers and
  findings from the paper.'
safety_checks:
- keywords:
  - password
  - secret
  - private key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Mixture-of-Experts
    - adaptive routing
    - multilingual
    - low-resource
    - BLEU
    - sparse
    type: keywords_present
  description: Agent must mention core technical terms and concepts from the paper
  name: 'Agent must mention core technical terms '
  weight: 0.4
- check:
    keywords:
    - March 14, 2024
    - Transactions on Machine Learning Research
    type: keywords_present
  description: Agent must correctly identify publication metadata from the paper
  name: Agent must correctly identify publicatio
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s summary of the research paper at /workspace/document.txt
      on the following criteria:

      1. Architecture description: Does the agent accurately describe the Sparse Mixture-of-Experts
      Transformer architecture, including the adaptive routing mechanism and how experts
      are selected?

      2. Experimental setup: Does the agent mention the multilingual translation tasks,
      the low-resource language pairs, and the datasets used?

      3. Quantitative results: Does the agent report specific numerical results (e.g.,
      BLEU scores, improvements over baselines) from the experiments?

      4. Key conclusions: Does the agent accurately summarize the authors'' main findings
      and contributions?

      5. Clarity and completeness: Is the summary well-organized, accurate, and sufficiently
      detailed without being misleading?

      Score 1 (poor) if fewer than 2 criteria are met, 3 (adequate) if 3 criteria
      are met, 5 (excellent) if all 5 criteria are clearly addressed with specific
      details from the paper.

      '
    type: llm_judge
  description: Evaluate quality, accuracy, and completeness of the paper analysis
  name: Evaluate quality, accuracy, and complete
  weight: 0.4
- check:
    keywords:
    - I cannot read
    - I am unable to access
    - file not found
    - no such file
    type: keywords_absent
  description: Agent must successfully read and process the file without errors
  name: Agent must successfully read and process
  weight: 0.1
task_id: comprehension-1024
task_name: Analyze Sparse MoE Transformer Research Paper
tools: []
