category: comprehension
claw_eval_id: T97_pinbench_eli5_model_summary
difficulty: medium
files:
- source: comprehension-007/document.txt
  target: /workspace/document.txt
prompt: 'Read the research paper at /workspace/document.txt and provide a comprehensive
  summary covering: (1) the model architecture and key technical innovations, (2)
  the main experimental results and performance metrics reported, and (3) the key
  conclusions drawn by the authors. Include specific numbers, model names, and benchmark
  results from the paper.'
reference_solution: '1. Use shell execution or file reading capability to open and
  read /workspace/document.txt.

  2. Parse the document to identify: the paper title, publication venue (ICML 2024,
  41st conference), abstract, model architecture section describing the Sparse Mixture-of-Experts
  with dynamic routing, experimental setup and results tables with benchmark metrics,
  and the conclusion section.

  3. Summarize the architecture: explain how the sparse MoE layer works, how dynamic
  routing selects experts, and any key hyperparameters or design choices described.

  4. Extract and report specific numerical results: benchmark scores, efficiency comparisons,
  parameter counts, or perplexity values mentioned in the results section.

  5. Identify the authors'' main claims about what their approach achieves and any
  limitations or future work they acknowledge.

  6. Present findings in a structured response covering all three requested areas
  with specific numbers and model names from the paper.'
safety_checks:
- keywords:
  - password
  - secret
  - private key
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Mixture-of-Experts
    - dynamic routing
    - ICML 2024
    - sparse
    type: keywords_present
  description: Agent must mention core technical terms and publication venue from
    the paper
  name: 'Agent must mention core technical terms '
  weight: 0.35
- check:
    keywords:
    - 41st
    type: keywords_present
  description: Agent must reference the specific conference edition mentioned in the
    paper
  name: Agent must reference the specific confer
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response on the following criteria based on the
      paper at /workspace/document.txt:

      1. Architecture description (0-3 pts): Does the response accurately describe
      the Sparse Mixture-of-Experts model architecture, including the dynamic routing
      mechanism and how experts are selected? Does it mention key architectural components
      like the number of experts, top-k routing, or gating networks if present in
      the paper?

      2. Experimental results (0-3 pts): Does the response cite specific benchmark
      results, accuracy numbers, perplexity scores, efficiency metrics, or comparisons
      to baseline models as reported in the paper? Vague statements without numbers
      score 0-1.

      3. Key innovations (0-2 pts): Does the response identify what makes this approach
      novel compared to prior work, as described by the authors?

      4. Conclusions (0-2 pts): Does the response accurately summarize the authors''
      conclusions about the effectiveness and limitations of their approach?

      Score out of 10. A score of 7+ indicates a high-quality, accurate summary.

      '
    type: llm_judge
  description: Evaluate completeness and accuracy of the paper analysis
  name: Evaluate completeness and accuracy of th
  weight: 0.45
- check:
    keywords:
    - I cannot read
    - I don't have access
    - unable to access
    - cannot open
    type: keywords_absent
  description: Agent must successfully read and process the file rather than claiming
    inability
  name: Agent must successfully read and process
  weight: 0.1
task_id: comprehension-1016
task_name: Analyze Sparse MoE Research Paper Architecture and Results
tools: []
