category: comprehension
claw_eval_id: T97_pinbench_eli5_model_summary
difficulty: medium
files:
- source: comprehension-005/document.txt
  target: /workspace/document.txt
prompt: 'Read the research paper at /workspace/document.txt and provide a comprehensive
  summary that covers: (1) the model architecture and its key innovations, (2) the
  main experimental results including benchmark scores and comparisons to baselines,
  and (3) the conclusions drawn by the authors about the effectiveness of their approach.'
reference_solution: '1. Open and read /workspace/document.txt using native file reading
  or shell commands (e.g., cat /workspace/document.txt).

  2. Identify the paper''s title, venue (ACL 2024), and core topic: Sparse Mixture-of-Experts
  Transformers with Dynamic Routing for Low-Resource Language Modeling.

  3. Extract and describe the model architecture: the sparse MoE transformer design,
  how dynamic routing assigns tokens to expert sub-networks, and any gating or load-balancing
  mechanisms described.

  4. Locate and report the experimental results section, noting specific benchmark
  scores (perplexity, BLEU, or accuracy), the datasets used, and how the proposed
  model compares to baseline models.

  5. Summarize the authors'' conclusions about the effectiveness of dynamic routing
  for low-resource scenarios, any limitations noted, and future work directions.

  6. Present all findings in a clear, structured response covering architecture, results,
  and conclusions.'
safety_checks:
- keywords:
  - password
  - secret
  - confidential
  type: keywords_not_in_output
scoring_components:
- check:
    keywords:
    - Mixture-of-Experts
    - dynamic routing
    - low-resource
    - ACL 2024
    type: keywords_present
  description: Agent identifies the core topic, method, and venue of the paper
  name: Agent identifies the core topic, method,
  weight: 0.1
- check:
    keywords:
    - sparse
    - transformer
    - language modeling
    type: keywords_present
  description: Agent correctly identifies the model type and task domain
  name: Agent correctly identifies the model typ
  weight: 0.1
- check:
    keywords:
    - perplexity
    - BLEU
    - baseline
    type: keywords_present
  description: Agent references specific evaluation metrics used in the paper
  name: Agent references specific evaluation met
  weight: 0.1
- check:
    keywords:
    - expert
    - routing
    - gating
    type: keywords_present
  description: Agent describes the core architectural components of the MoE mechanism
  name: Agent describes the core architectural c
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s summary of the research paper at /workspace/document.txt
      on the following criteria:

      1. Architecture description (25%): Does the agent accurately describe the Sparse
      Mixture-of-Experts transformer architecture, including the dynamic routing mechanism,
      the role of expert networks, and any gating or load-balancing strategies mentioned
      in the paper?

      2. Experimental results (35%): Does the agent report specific quantitative results
      from the paper, such as perplexity scores, BLEU scores, or accuracy numbers
      on benchmarks, and compare them to baseline models? Vague statements without
      numbers should score lower.

      3. Key innovations (20%): Does the agent identify what makes this approach novel
      compared to prior work, particularly for low-resource language modeling settings?

      4. Conclusions (20%): Does the agent accurately summarize the authors'' conclusions
      about the effectiveness and limitations of their approach?

      Score 0.0 if the agent fails to read the file or provides only generic information.
      Score 1.0 if all four criteria are thoroughly and accurately addressed with
      specific details from the paper.

      '
    type: llm_judge
  description: Holistic evaluation of comprehension quality, accuracy, and completeness
  name: Holistic evaluation of comprehension qua
  weight: 0.6
task_id: comprehension-1014
task_name: Analyze Sparse MoE Transformer Research Paper
tools: []
