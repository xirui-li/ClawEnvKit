  name: kb_article_updated
  weight: 0.08
- check:
    rubric: "Evaluate the agent's Q3 vendor spend analysis on the following dimensions:\n\
      1. SPEND ACCURACY (0-0.3): Does the agent correctly calculate total Q3 spend\
      \ as $77,500\n   (txn-001 $12,000 + txn-002 $8,500 + txn-003 $6,000 + txn-004\
      \ $15,000 + txn-005 $9,200\n   + txn-006 $4,800 + txn-007 $22,000)? Does it\
      \ break down by category — Software ($22,800:\n   Salesforce + HubSpot + Zendesk),\
      \ Infrastructure ($17,700: AWS x2), Facilities ($15,000),\n   Personnel ($22,000)?\n\
      \n2. CUSTOMER COMPARISON (0-0.3): Does the agent correctly identify which enterprise\
      \ customers\n   have revenue exceeding $77,500 total spend? Vertex Financial\
      \ Group (cust-102, $142,000)\n   and Apex Dynamics Corp (cust-101, $95,000)\
      \ qualify. Orion Health Systems ($61,000) and\n   Pinnacle Tech Solutions ($77,500)\
      \ do not exceed the threshold. Is this comparison clearly\n   stated?\n\n3.\
      \ KB UPDATE QUALITY (0-0.2): Did the agent find kb-301 \"Vendor Management Best\
      \ Practices\"\n   and/or kb-302 \"Software Procurement Policy\" and update them\
      \ with Q3 spend figures?\n   Is the updated content meaningful and relevant?\n\
      \n4. NEWSLETTER COMPLETENESS (0-0.2): Was a newsletter published to the finance\
      \ team summarizing\n   the Q3 findings? Does it include the total spend figure,\
      \ top categories, and customer\n   revenue comparison?\n\nScore 1.0 if all four\
      \ dimensions are well-addressed, 0.75 if three are strong, 0.5 if two are addressed\
      \ adequately, 0.25 if only one dimension is covered, 0.0 if the output is missing\
      \ or entirely incorrect.\n"
    type: llm_judge
  name: analysis_quality
  weight: 0.32
