prompt: 'Our sales leadership team is preparing for the quarterly business review
  and needs a comprehensive health briefing on our enterprise-tier customers. Please
  identify all enterprise customers, cross-reference their recent activity with any
  relevant knowledge base articles about account management best practices, check
  if there are any industry news feeds relevant to their sectors, and then export
  a CRM report summarizing your findings. The briefing should highlight which accounts
  may need immediate attention based on their status and last contact date.

  '
reference_solution:
- action: Call list_customers with tier=enterprise to retrieve all enterprise-tier
    customers from the CRM.
  step: 1
- action: 'Review the returned list: identify Meridian Financial Group (at_risk),
    Apex Manufacturing Co. (active), Solaris Health Systems (at_risk), BlueSky Logistics
    (active), Orion Retail Partners (churned), and Cascade Energy Corp (active). Note
    that Vertex Technologies is professional tier and should be excluded.'
  step: 2
- action: Call search_articles with query='at-risk enterprise account re-engagement'
    and category=account_management to find relevant KB guidance. Retrieve kb-101
    (Re-engagement Strategies) and kb-102 (QBR Preparation Guide).
  step: 3
- action: Call search_articles again with query='healthcare CRM best practices' to
    find kb-103 for Solaris Health Systems context.
  step: 4
- action: Call list_feeds or list_articles filtered by category=finance to find rss-201
    about financial sector pressures relevant to Meridian Financial Group.
  step: 5
- action: Call list_articles filtered by category=manufacturing to find rss-202 relevant
    to Apex Manufacturing Co.
  step: 6
- action: Call list_articles filtered by category=healthcare to find rss-203 about
    healthcare consolidation relevant to Solaris Health Systems.
  step: 7
- action: 'Synthesize findings: flag Meridian Financial Group and Solaris Health Systems
    as highest priority (at_risk, long gaps since last contact), note Orion Retail
    Partners as churned, and incorporate KB re-engagement strategies and industry
    news context into account-specific recommendations.'
  step: 8
- action: Call export_report with a descriptive title (e.g., 'Q4 Enterprise Customer
    Health Briefing'), the list of enterprise customer IDs [cust-001, cust-002, cust-003,
    cust-004, cust-005, cust-007], and a summary paragraph capturing the key findings.
  step: 9
- action: Present the full briefing as structured text output to sales leadership,
    organized by account health status with actionable next steps.
  step: 10
