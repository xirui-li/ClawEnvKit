  name: churned_account_flagged
  weight: 0.05
- check:
    rubric: 'Evaluate the quality and completeness of the agent''s enterprise customer
      health briefing on the following dimensions:

      1. CUSTOMER COVERAGE (0–0.25): Does the briefing correctly identify all 5 active/at-risk/churned
      enterprise-tier customers — Meridian Financial Group (cust-001, at_risk), Apex
      Manufacturing Co. (cust-002, active), Solaris Health Systems (cust-003, at_risk),
      BlueSky Logistics (cust-004, active), Orion Retail Partners (cust-005, churned),
      and Cascade Energy Corp (cust-007, active)? Does it correctly exclude Vertex
      Technologies (professional tier)? Score 0.25 if all 6 enterprise customers are
      covered and Vertex is excluded, 0.15 if most are covered, 0.05 if fewer than
      3 are mentioned.

      2. RISK PRIORITIZATION (0–0.25): Does the briefing clearly flag Meridian Financial
      Group and Solaris Health Systems as at-risk accounts needing immediate attention,
      noting their last contact dates (Sep 15 and Aug 30 respectively)? Does it mention
      Orion Retail Partners as churned? Score 0.25 if all three are correctly prioritized
      with context, 0.15 if two are flagged, 0.05 if only one or none.

      3. CROSS-SERVICE INSIGHTS (0–0.25): Does the briefing incorporate relevant knowledge
      base guidance (e.g., re-engagement strategies from kb-101, QBR prep from kb-102,
      healthcare compliance from kb-103) and industry news context (e.g., financial
      sector margin pressure affecting Meridian, healthcare consolidation affecting
      Solaris, supply chain issues for Apex)? Score 0.25 if both KB and RSS insights
      are woven into the account narratives, 0.15 if only one source is integrated,
      0.05 if neither is meaningfully used.

      4. ACTIONABILITY & CLARITY (0–0.25): Is the briefing structured, clear, and
      actionable for sales leadership? Does it provide specific next steps or recommendations
      per account rather than generic statements? Score 0.25 if the output is well-organized
      with concrete recommendations, 0.15 if partially actionable, 0.05 if vague or
      disorganized.

      Final score = sum of the four dimension scores (max 1.0).

      '
    type: llm_judge
  name: briefing_quality
  weight: 0.35
