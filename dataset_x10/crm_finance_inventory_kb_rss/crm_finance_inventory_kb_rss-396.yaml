- check:
    rubric: "Evaluate the agent's final summary for quality and completeness across\
      \ these dimensions:\n1. CUSTOMER IDENTIFICATION (0–0.3): Did the agent correctly\
      \ identify the three active enterprise\n   customers — Apex Dynamics Inc. (cust-101),\
