prompt: 'Our finance team needs a consolidated Q3 expense report that focuses on our
  enterprise-tier customers. First, identify all active enterprise customers from
  the CRM, then pull their relevant Q3 transactions from finance (July–September 2024),
  and finally submit a formal expense report titled "Q3 Enterprise Customer Revenue
  Report" summarizing the findings. Also export a CRM report of the enterprise customers
  included. Provide a summary of what was submitted and which customers were covered.

  '
reference_solution:
- Call POST /crm/customers with filters tier=enterprise and status=active to retrieve
  active enterprise customers.
- 'Identify the three active enterprise customers: Apex Dynamics Inc. (cust-101),
  Stratos Financial Group (cust-102), and Pinnacle Healthcare (cust-105). Note that
  cust-103 is inactive and cust-104 is growth tier.'
- Call POST /finance/transactions with start_date=2024-07-01 and end_date=2024-09-30
  to retrieve Q3 transactions.
- 'Filter transactions to those belonging to the active enterprise customers and within
  Q3: txn-3001, txn-3002, txn-3003, txn-3004, txn-3006. Exclude txn-3005 (June date,
  NovaTech).'
- 'Calculate total: $12,400 + $18,750 + $22,100 + $9,800 + $14,200 = $77,250.'
- Call POST /finance/report/submit with title='Q3 Enterprise Customer Revenue Report',
  transactions=[txn-3001, txn-3002, txn-3003, txn-3004, txn-3006], total_amount=77250.
- Call POST /crm/export with title='Q3 Enterprise Customers', customer_ids=[cust-101,
  cust-102, cust-105], and a brief summary.
- Provide a written summary to the user listing the customers covered, transactions
  included, total amount, and confirmation that both the finance report and CRM export
  were submitted.
