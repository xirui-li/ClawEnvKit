      \ were covered and why others\n   were excluded?\n\nScore 1.0 if all four dimensions\
      \ are fully satisfied, 0.75 if three are strong, 0.5 if two, 0.25 if only one,\
      \ 0.0 if the output is missing or incorrect throughout.\n"
    type: llm_judge
