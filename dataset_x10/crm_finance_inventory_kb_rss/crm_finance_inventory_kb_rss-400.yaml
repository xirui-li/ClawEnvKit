prompt: 'Our sales team is preparing for Q4 outreach to enterprise customers. Please
  search the knowledge base for articles about competitive positioning and enterprise
  sales strategies, then identify our top-tier enterprise customers who are currently
  active, and pull relevant industry news from RSS feeds to enrich the briefing. Finally,
  export a consolidated report for the enterprise accounts with a summary that includes
  key competitive insights and relevant news headlines the sales team can use in their
  outreach.

  '
reference_solution:
- Call search_articles with query='competitive positioning enterprise sales' and category='competitive'
  to find relevant KB articles (kb-001, kb-003).
- Call search_articles again with query='enterprise sales playbook Q4' or category='sales'
  to retrieve kb-002 and kb-004.
- Optionally call get_kb_article for kb-001, kb-002, and kb-003 to read full content
  on competitive differentiators, objection handling, and Q4 strategy.
- Call list_customers with tier='enterprise' and status='active' to retrieve Meridian
  Financial Group (cust-101), Apex Healthcare Systems (cust-102), and Vantage Logistics
  Corp (cust-103). Note that Cascade Retail Group is inactive and Orion Tech Partners
  is mid-market.
- Call list_feeds with category='industry' to discover available RSS feeds.
- Call list_articles with category='industry' or source='CRM Industry Weekly' to retrieve
  rss-201 (Salesforce price increase) and rss-203 (finance data residency). Call list_articles
  again for category='technology' to retrieve rss-202 (healthcare CRM surge).
- 'Synthesize findings: link Salesforce price increase news to competitive positioning
  (kb-001), connect data residency article to Meridian Financial''s finance industry,
  and tie healthcare CRM surge to Apex Healthcare.'
- Call export_report with title='Q4 Enterprise Account Competitive Briefing', customer_ids=['cust-101','cust-102','cust-103'],
  and a summary incorporating KB insights and RSS headlines.
- Present the briefing in text output, listing the three enterprise accounts, key
  competitive talking points, relevant news, and recommended sales actions for each
  account.
