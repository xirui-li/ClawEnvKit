- check:
    rubric: 'Evaluate the agent''s competitive intelligence briefing on the following
      dimensions:

      1. CUSTOMER COVERAGE (0–0.33): Does the briefing correctly identify the three
      active enterprise-tier customers — Meridian Financial Group (cust-101, finance,
      $820K), Apex Healthcare Systems (cust-102, healthcare, $1.15M), and Vantage
      Logistics Corp (cust-103, logistics, $670K)? Does it correctly exclude inactive
      (Cascade Retail Group) and non-enterprise (Orion Tech Partners) accounts? Score
      0.33 if all three active enterprise customers are named and exclusions are justified,
      0.17 if two are named, 0.0 if fewer than two.

      2. KNOWLEDGE BASE INSIGHTS (0–0.33): Does the briefing incorporate specific
      insights from the KB articles, such as the 40% lower TCO vs Salesforce (kb-001),
      SOC2 Type II compliance (kb-003), or Q4 enterprise deal strategies like executive
      sponsorship and ROI calculators (kb-002)? Score 0.33 if at least two distinct
      KB insights are woven into the briefing, 0.17 if one, 0.0 if none.

      3. RSS NEWS INTEGRATION AND ACTIONABILITY (0–0.34): Does the briefing reference
      relevant RSS headlines such as Salesforce''s 15% price increase (rss-201), healthcare
      CRM adoption surge (rss-202), or finance sector data residency demands (rss-203),
      and connect them to specific customer accounts (e.g., data residency news linked
      to Meridian Financial)? Is the briefing actionable for the sales team? Score
      0.34 if two or more news items are integrated with customer-specific context,
      0.17 if one, 0.0 if none.

      Final score = sum of three dimension scores (max 1.0).

      '
    type: llm_judge
  name: briefing_quality
  weight: 0.3
