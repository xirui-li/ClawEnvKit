prompt: 'Our enterprise-tier customers in the technology industry are asking for a
  curated briefing on the latest market trends. Pull recent articles from our RSS
  feeds on the technology category, identify which of our active enterprise-tier tech
  customers should receive this briefing, and then export a CRM report summarizing
  the customers selected along with a brief description of the trending topics you
  found. Finally, search our knowledge base for any existing customer communication
  guidelines we should follow when reaching out to enterprise clients.

  '
reference_solution: '1. Call list_feeds (or list_articles directly) to discover technology-category
  RSS feeds. 2. Call list_articles with category "technology" to retrieve the five
  recent tech articles (art-001 through art-005) covering AI agents, cloud consolidation,
  quantum computing, cybersecurity, and edge computing. 3. Call list_customers with
  tier "enterprise", industry "technology", and status "active" to identify qualifying
  customers: Nexora Systems (cust-101), Brightwave Analytics (cust-102), and Pinnacle
  Cloud Inc (cust-105). Note that Solaris Data Corp is inactive and Vertex AI Solutions
  is standard tier — both should be excluded. 4. Call search_articles in the knowledge
  base with a query like "enterprise client communication" to find kb-201 (Enterprise
  Client Communication Guidelines) and kb-202 (Newsletter Best Practices). Call get_kb_article
  on kb-201 to retrieve the full guidelines including the 4-hour SLA and personalization
  requirements. 5. Call export_report with the three qualifying customer IDs (cust-101,
  cust-102, cust-105), a title such as "Enterprise Technology Trend Briefing — November
  2024", and a summary that includes the trending topics from the RSS articles. 6.
  Present the agent''s output as a text briefing that lists the trending topics, names
  the three target customers, explains why others were excluded, and notes the key
  communication guidelines from the knowledge base.'
