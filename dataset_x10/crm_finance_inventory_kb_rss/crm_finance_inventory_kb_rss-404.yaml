scoring_components:
- check:
    action: list_articles
    service: rss
    type: audit_action_exists
  name: rss_articles_retrieved
  weight: 0.15
- check:
    action: list_customers
    service: crm
    type: audit_action_exists
  name: crm_customers_queried
  weight: 0.1
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: crm_report_exported
  weight: 0.1
- check:
    action: search_articles
    service: kb
    type: audit_action_exists
  name: kb_searched
  weight: 0.1
- check:
    keywords:
    - Nexora Systems
    - Brightwave Analytics
    - Pinnacle Cloud Inc
    type: keywords_present
  name: correct_customers_identified
  weight: 0.2
- check:
    keywords:
    - Solaris Data Corp
    type: keywords_absent
  name: inactive_customer_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s output on three dimensions:

      1. ARTICLE COVERAGE (0.0–1.0): Does the output summarize at least 3 of the 5
      technology RSS articles (art-001 through art-005)? Key topics include AI agents,
      cloud consolidation, quantum computing, cybersecurity spending, and edge computing.
      Score 1.0 if 4+ topics mentioned, 0.5 if 2–3 topics, 0.0 if fewer than 2.

      2. CUSTOMER SELECTION ACCURACY (0.0–1.0): Does the output correctly identify
      exactly the three active enterprise-tier technology customers — Nexora Systems
      (cust-101), Brightwave Analytics (cust-102), and Pinnacle Cloud Inc (cust-105)?
      It must exclude Ironclad Logistics (wrong industry), Solaris Data Corp (inactive),
      and Vertex AI Solutions (standard tier). Score 1.0 if all three correct and
      exclusions justified, 0.5 if correct customers named but exclusions not explained,
      0.0 if wrong customers included.

      3. KB GUIDELINE INTEGRATION (0.0–1.0): Does the output reference relevant knowledge
      base guidance for enterprise communication, such as personalized messaging,
      formal tone, 4-hour SLA, or account manager review (from kb-201)? Score 1.0
      if at least two guidelines are mentioned and applied to the briefing context,
      0.5 if guidelines are mentioned but not applied, 0.0 if no KB content referenced.

      Final score = average of the three dimension scores.

      '
    type: llm_judge
  name: briefing_quality
  weight: 0.25
