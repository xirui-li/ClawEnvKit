tools:
- description: List inventory products, optionally filtered by category
  endpoint: /inventory/products
  method: POST
  name: list_products
  service: inventory
- description: Get detailed information about a specific product by ID
  endpoint: /inventory/products/get
  method: POST
  name: get_product
  service: inventory
- description: List CRM customers, optionally filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information about a specific customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with customer IDs and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
- description: List finance transactions within a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get details of a specific finance transaction by ID
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Search the knowledge base for articles by query and category
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
