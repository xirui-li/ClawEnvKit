  kb:
    articles:
    - author: Sarah Okonkwo
      category: customer-success
      content: 'Retaining enterprise customers requires proactive communication, dedicated
        account management, and early identification of churn signals. Key strategies
        include quarterly business reviews, personalized outreach within 30 days of
        reduced engagement, and offering service credits or upgrades to at-risk accounts.
        Always acknowledge supply or service disruptions transparently and provide
        estimated resolution timelines.

        '
      id: kb-201
      last_updated: '2024-10-05'
      title: Enterprise Customer Retention Best Practices
    - author: James Whitfield
      category: customer-success
      content: 'When enterprise clients are affected by low inventory or supply chain
        delays, communicate proactively via direct email or account manager outreach.
        Provide alternative product options where available, and set clear expectations
        on restock timelines. Offering temporary workarounds or service substitutions
        can significantly reduce churn risk during supply disruptions.

        '
      id: kb-202
      last_updated: '2024-11-12'
      title: Handling Product Availability Issues with Enterprise Clients
prompt: 'Our enterprise-tier customers have been showing signs of churn risk. Please
  identify our active enterprise customers, check whether any of our premium inventory
  products are running low on stock (below minimum levels), and then publish a personalized
  retention newsletter to those customers highlighting our commitment to service and
  flagging any supply updates they should know about. Include a brief summary of relevant
  knowledge base guidance on customer retention in the newsletter content.

  '
reference_solution: "1. Call list_customers with filters for tier=enterprise and status=active\
  \ to identify Meridian Logistics (cust-001),\n   Apex Financial Group (cust-002),\
  \ and Solaris Tech Partners (cust-004). Note that Brightfield Retail (cust-003)\n\
  \   is inactive and Greenway Healthcare (cust-005) is standard tier — both should\
  \ be excluded.\n\n2. Call list_products to retrieve all inventory items. Review\
  \ quantities against min_stock thresholds:\n   - Enterprise Support Suite (prod-101):\
  \ qty 4 < min 10 → LOW STOCK\n   - Dedicated Server Cluster (prod-102): qty 2 <\
  \ min 5 → LOW STOCK\n   - Secure VPN Gateway (prod-104): qty 3 < min 6 → LOW STOCK\n\
  \   - Premium Analytics Module (prod-103): qty 18 > min 8 → OK\n   - On-Site Training\
  \ Package (prod-105): qty 12 > min 4 → OK\n\n3. Call search_articles with query=\"\
  enterprise customer retention\" and category=customer-success to find\n   kb-201\
  \ and kb-202. Call get_kb_article for one or both to retrieve actionable retention\
  \ guidance.\n\n4. Compose a professional retention newsletter that:\n   - Addresses\
  \ enterprise customers by name or collectively\n   - Transparently communicates\
  \ the three low-stock product situations\n   - Incorporates KB guidance on proactive\
  \ communication and retention strategies\n   - Reassures customers of the company's\
  \ commitment to service continuity\n\n5. Call publish_newsletter with the composed\
  \ content and recipients set to the emails of the three\n   active enterprise customers:\
  \ contact@meridianlogistics.com, ops@apexfinancial.com, hello@solaristech.com.\n\
  \n6. Report back with a summary of which customers were targeted, which products\
  \ are low-stock, and\n   the key retention messages included in the newsletter."
