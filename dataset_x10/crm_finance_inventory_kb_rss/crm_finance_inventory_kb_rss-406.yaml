tools:
- description: List CRM customers filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information about a specific customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with customer IDs and summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
- description: List inventory products filtered by category
  endpoint: /inventory/products
  method: POST
  name: list_products
  service: inventory
- description: Get detailed information about a specific inventory product
  endpoint: /inventory/products/get
  method: POST
  name: get_product
  service: inventory
- description: Create a restock order for a product
  endpoint: /inventory/orders/create
  method: POST
  name: create_order
  service: inventory
- description: Search knowledge base articles by query and category
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Get a specific knowledge base article by ID
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
- description: Publish a newsletter to a list of recipients
  endpoint: /rss/publish
  method: POST
  name: publish_newsletter
  service: rss
