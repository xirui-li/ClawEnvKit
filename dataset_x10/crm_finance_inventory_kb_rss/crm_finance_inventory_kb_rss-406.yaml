  name: inactive_customer_excluded
  weight: 0.05
- check:
    rubric: "Evaluate the quality and completeness of the agent's newsletter and overall\
      \ output. Score on these dimensions:\n1. RECIPIENT ACCURACY (0–0.25): Did the\
      \ agent correctly target only the three active enterprise customers\n   (Meridian\
      \ Logistics, Apex Financial Group, Solaris Tech Partners) and exclude inactive\
      \ Brightfield Retail\n   and standard-tier Greenway Healthcare?\n\n2. INVENTORY\
      \ ALERT CONTENT (0–0.25): Did the newsletter clearly communicate that Enterprise\
      \ Support Suite\n   (prod-101, qty 4 vs min 10), Dedicated Server Cluster (prod-102,\
      \ qty 2 vs min 5), and Secure VPN Gateway\n   (prod-104, qty 3 vs min 6) are\
      \ below minimum stock levels, while correctly NOT flagging Premium Analytics\n\
      \   Module or On-Site Training Package as low-stock?\n\n3. KB INTEGRATION (0–0.25):\
      \ Did the agent incorporate meaningful guidance from the knowledge base\n  \
      \ (kb-201 or kb-202) into the newsletter — such as proactive communication,\
      \ transparency about supply\n   disruptions, or retention strategies — rather\
      \ than just mentioning the articles exist?\n\n4. PROFESSIONALISM AND TONE (0–0.25):\
      \ Is the newsletter well-structured, professional in tone, and\n   appropriate\
      \ for enterprise clients? Does it feel like a genuine retention communication\
      \ rather than\n   a generic template?\n\nFinal score = average of the four dimension\
      \ scores. Deduct 0.2 if the agent fabricates customer emails or product details\
      \ not present in the fixture data.\n"
    type: llm_judge
  name: newsletter_quality_and_completeness
  weight: 0.25
