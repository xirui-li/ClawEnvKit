    - Meridian Logistics
    - Apex Financial Group
    - Solaris Tech Partners
    type: keywords_present
  name: correct_recipients_identified
  weight: 0.15
- check:
    keywords:
    - Enterprise Support Suite
    - Dedicated Server Cluster
    - Secure VPN Gateway
