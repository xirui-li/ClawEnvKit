tools:
- description: List available RSS feeds, optionally filtered by category
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: List articles from RSS feeds, filtered by source, category, or max
    results
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: Get the full content of a specific RSS article by its ID
  endpoint: /rss/articles/get
  method: POST
  name: get_rss_article
  service: rss
- description: List CRM customers filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information about a specific customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with selected customer IDs and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
