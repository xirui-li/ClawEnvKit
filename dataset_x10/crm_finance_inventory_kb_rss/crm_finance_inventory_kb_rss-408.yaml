scoring_components:
- check:
    action: get_customer
    service: crm
    type: audit_action_exists
  name: retrieved_customer_profiles
  weight: 0.15
- check:
    keywords:
    - Meridian Logistics Group
    - Apex Financial Partners
    - Solaris Health Systems
    - Nexus Tech Ventures
    type: keywords_present
  name: active_enterprise_customers_identified
  weight: 0.15
- check:
    action: list_transactions
    service: finance
    type: audit_action_exists
  name: finance_transactions_consulted
  weight: 0.1
- check:
    action: search_articles
    service: kb
    type: audit_action_exists
  name: kb_articles_searched
  weight: 0.1
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: crm_report_exported
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent correctly cross-referenced customer revenue
      with finance transactions. The agent should note that Meridian Logistics Group
      ($285K revenue) has a completed Q4 renewal payment of $71,250 (txn-1001), Apex
      Financial Partners ($412K) has a completed payment of $103,000 (txn-1002), Solaris
      Health Systems ($530K) has a completed installment of $132,500 (txn-1003), and
      Nexus Tech Ventures ($375K) has a PENDING payment of $93,750 (txn-1004) which
      is a risk flag. Score 1.0 if all four customers'' transactions are mentioned
      with correct amounts and the pending status of Nexus Tech is flagged. Score
      0.7 if three customers are covered accurately. Score 0.4 if only one or two
      are covered or the pending flag is missed. Score 0.0 if no transaction cross-referencing
      is present.

      '
    type: llm_judge
  name: revenue_and_transaction_accuracy
  weight: 0.15
- check:
    rubric: 'Evaluate whether the agent incorporated relevant knowledge base insights
      for each active enterprise customer''s industry. Expected: logistics insights
      from kb-201 for Meridian, finance compliance notes from kb-202 for Apex, healthcare/HIPAA
      guidance from kb-203 for Solaris, and technology renewal playbook from kb-204
      for Nexus Tech. Score 1.0 if industry-specific KB insights are mentioned for
      at least 3 of the 4 customers. Score 0.6 if insights are mentioned for 2 customers.
      Score 0.3 if only 1 customer has KB insights. Score 0.0 if no KB content is
      referenced in the brief.

      '
    type: llm_judge
  name: kb_industry_insights_quality
  weight: 0.15
- check:
    rubric: 'Evaluate the overall quality of the intelligence brief produced for the
      sales team. A high-quality brief should: (1) clearly identify the 4 active enterprise
      customers (excluding churned Greenfield Manufacturing and standard-tier Brightwave),
      (2) present each customer''s revenue, recent transaction status, and industry-specific
      renewal strategy, (3) highlight the Nexus Tech Ventures pending payment as a
      risk requiring follow-up, (4) be organized and readable for a sales audience.
      Score 1.0 if all four criteria are met with clear structure. Score 0.7 if three
      criteria are met. Score 0.4 if the brief is present but incomplete or disorganized.
      Score 0.0 if no coherent brief is produced.

      '
    type: llm_judge
  name: brief_completeness_and_actionability
  weight: 0.1
