  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with selected customer IDs and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
- description: List finance transactions within a date range
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Get details of a specific finance transaction
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Search knowledge base articles by query and category
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Get a specific knowledge base article by ID
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
