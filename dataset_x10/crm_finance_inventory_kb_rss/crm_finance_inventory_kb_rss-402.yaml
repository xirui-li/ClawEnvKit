tools:
- description: List CRM customers, optionally filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information about a specific customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
- description: List inventory products, optionally filtered by category
  endpoint: /inventory/products
  method: POST
  name: list_products
  service: inventory
- description: Get details of a specific inventory product by ID
  endpoint: /inventory/products/get
  method: POST
  name: get_product
  service: inventory
- description: Search knowledge base articles by query, category, or max results
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Retrieve a specific knowledge base article by ID
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
- description: Update the content of a knowledge base article by ID
  endpoint: /kb/articles/update
  method: POST
  name: update_article
  service: kb
