prompt: 'Our sales team has flagged that several enterprise customers are at risk
  of churning. Pull the list of at-risk customers from the CRM (those with ''at_risk''
  status), look up their revenue details, then find the relevant knowledge base article
  about churn prevention strategies and update it with a current summary of which
  customers are affected and their combined revenue exposure. Also check if we have
  any low-stock retention gift products in inventory that could be used for outreach,
  and include that in your final report to me.

  '
reference_solution:
- 'Call list_customers with status=''at_risk'' to retrieve at-risk customers: Meridian
  Logistics (cust-101, $142,000), Apex Manufacturing (cust-102, $98,500), and Crestwood
  Financial (cust-104, $211,000).'
- 'Optionally call get_customer for each at-risk customer to confirm revenue details.
  Calculate combined revenue exposure: $142,000 + $98,500 + $211,000 = $451,500.'
- Call search_articles with query='churn prevention enterprise' or category='customer-success'
  to locate kb-501 ('Churn Prevention Strategies for Enterprise Accounts').
- Call get_kb_article with article_id='kb-501' to read the current content.
- Call update_article with article_id='kb-501' and updated content that includes the
  current at-risk customers (Meridian Logistics, Apex Manufacturing, Crestwood Financial),
  their combined revenue exposure of $451,500, and the date of the update.
- Call list_products with category='retention' to check retention gift inventory.
  Identify that 'Premium Client Gift Box' (qty 4, min_stock 10) and 'Executive Branded
  Notebook Set' (qty 2, min_stock 15) are both below minimum stock levels.
- 'Report back to the user with: the three at-risk customers and their revenue, the
  total exposure of $451,500, confirmation that kb-501 was updated, and a note that
  two retention gift products are critically low in stock and should be restocked
  before outreach campaigns.'
