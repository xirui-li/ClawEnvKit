    - Premium Client Gift Box
    - Executive Branded Notebook Set
    type: keywords_present
  name: low_stock_retention_items_flagged
  weight: 0.1
- check:
    rubric: 'Evaluate the quality of the agent''s knowledge base article update and
      final report on three dimensions:

      1. ACCURACY (0–0.4): Did the agent correctly identify the three at-risk customers
      (Meridian Logistics cust-101, Apex Manufacturing cust-102, Crestwood Financial
      cust-104) and their combined revenue of $451,500? Did the agent update kb-501
      ("Churn Prevention Strategies for Enterprise Accounts") rather than an unrelated
      article?

      2. INVENTORY INSIGHT (0–0.3): Did the agent correctly identify that "Premium
      Client Gift Box" (qty 4, min 10) and "Executive Branded Notebook Set" (qty 2,
      min 15) are both below minimum stock levels and flag them as low-stock retention
      items relevant to outreach?

      3. COMPLETENESS & USEFULNESS (0–0.3): Is the final report to the user clear,
      actionable, and complete — covering which customers are at risk, the revenue
      exposure, the KB article that was updated, and the inventory gap for retention
      gifts?

      Score 1.0 if all three dimensions are fully satisfied, 0.7 if two are fully
      satisfied, 0.4 if only one is fully satisfied, 0.0 if the output is missing
      or largely incorrect.

      '
    type: llm_judge
  name: kb_article_update_quality
  weight: 0.2
