tools:
- description: List available RSS feed sources, optionally filtered by category
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: List recent articles from RSS feeds, filtered by source, category,
    or max results
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: Get full details of a specific RSS article by ID
  endpoint: /rss/articles/get
  method: POST
  name: get_rss_article
  service: rss
- description: List CRM customers filtered by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get full details of a specific CRM customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
