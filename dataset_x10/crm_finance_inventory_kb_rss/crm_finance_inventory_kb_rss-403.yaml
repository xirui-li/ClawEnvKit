prompt: 'Our sales team wants a competitive intelligence briefing for our enterprise-tier
  customers in the technology industry. First, identify which RSS feed categories
  are available, then find relevant technology or business news articles, and cross-reference
  with our enterprise tech customers to produce a summary report exported from the
  CRM that includes the customer list and a news-informed outreach summary.

  '
reference_solution: "1. Call list_feeds (optionally with category=technology) to discover\
  \ available RSS feed sources such as\n   TechCrunch (feed-001), Wired (feed-003),\
  \ and VentureBeat (feed-005).\n2. Call list_articles with category=technology to\
  \ retrieve recent articles including \"AI Adoption Surges\n   Among Enterprise Software\
  \ Firms\" (rss-art-001), \"Cloud Spending Rebounds\" (rss-art-002), and\n   \"SaaS\
  \ Consolidation Wave\" (rss-art-003).\n3. Call list_customers with tier=enterprise\
  \ and industry=technology to identify Apex Systems Inc. (cust-101),\n   NovaTech\
  \ Solutions (cust-102), and Meridian Analytics (cust-103). Confirm that Greenfield\
  \ Retail Co.\n   and BlueSky Logistics do not qualify.\n4. Synthesize the news trends\
  \ with the customer profiles to craft an outreach summary explaining why\n   AI\
  \ adoption, cloud spending recovery, and SaaS consolidation are relevant talking\
  \ points for these accounts.\n5. Call export_report with title=\"Enterprise Tech\
  \ Customer Briefing Q4 2024\",\n   customer_ids=[cust-101, cust-102, cust-103],\
  \ and a summary incorporating the news-informed outreach rationale.\n6. Present\
  \ the full briefing in the response, including the list of target customers, key\
  \ news themes,\n   and the confirmation that the CRM report was exported."
