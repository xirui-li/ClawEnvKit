  weight: 0.1
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: used_export_report
  weight: 0.1
- check:
    keywords:
    - Apex Systems
    - NovaTech
    - Meridian Analytics
    type: keywords_present
  name: enterprise_tech_customers_identified
  weight: 0.15
- check:
    keywords:
    - AI Adoption
    - Cloud Spending
    type: keywords_present
  name: news_articles_referenced
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s competitive intelligence briefing and CRM export
      on the following dimensions:

      1. CUSTOMER IDENTIFICATION (0–0.3): Did the agent correctly identify the three
      enterprise-tier technology customers — Apex Systems Inc. (cust-101), NovaTech
      Solutions (cust-102), and Meridian Analytics (cust-103)? Did it correctly exclude
      non-tech or non-enterprise customers like Greenfield Retail Co. and BlueSky
      Logistics?

      2. NEWS INTEGRATION (0–0.3): Did the agent surface relevant technology articles
      (e.g., "AI Adoption Surges Among Enterprise Software Firms", "Cloud Spending
      Rebounds", "SaaS Consolidation Wave") and connect them meaningfully to the enterprise
      tech customer segment? Is the connection between news trends and outreach rationale
      logical and actionable?

      3. CRM EXPORT QUALITY (0–0.2): Did the agent export a CRM report that includes
      the correct enterprise tech customer IDs (cust-101, cust-102, cust-103) and
      a summary that reflects the news-informed outreach context?

      4. OVERALL CLARITY AND USEFULNESS (0–0.2): Is the final briefing clear, well-structured,
      and genuinely useful for a sales team preparing outreach? Does it synthesize
      both the RSS intelligence and CRM data into a coherent narrative?

      Score 1.0 if all four dimensions are fully satisfied. Score 0.7 if customer
      identification and news integration are correct but export or clarity is weak.
      Score 0.4 if only one dimension is well-addressed. Score 0.0 if the output is
      missing, incoherent, or uses wrong customers.

      '
    type: llm_judge
  name: briefing_quality
  weight: 0.35
