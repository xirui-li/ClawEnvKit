prompt: 'Our finance team needs a reconciliation summary for Q3 2024: identify which
  vendors we paid the most, then cross-reference those vendor relationships with our
  top-tier CRM customers to see if there''s alignment between our spending and our
  highest-value accounts. Pull the Q3 transactions, find our premium customers, and
  produce a consolidated report that includes a CRM export and a submitted expense
  summary so both teams have a record.

  '
reference_solution: '1. Call list_transactions with start_date "2024-07-01" and end_date
  "2024-09-30" to retrieve all six Q3 transactions (txn-001 through txn-006). 2. Review
  the transactions and aggregate spend by vendor: Apex Systems = $61,250 (txn-001
  + txn-003), NovaTech Cloud = $46,600 (txn-002 + txn-005), Meridian Partners = $36,800
  (txn-004 + txn-006). Total Q3 spend = $144,650. 3. Call list_customers filtered
  by tier "platinum" to retrieve Hartwell Manufacturing (cust-101, $580K) and Solaris
  Energy Group (cust-102, $430K). Optionally also retrieve gold-tier customers (cust-103,
  cust-104). 4. Cross-reference: Apex Systems'' software/marketing spend aligns with
  tech needs of manufacturing and energy clients; NovaTech Cloud infrastructure supports
  both platinum accounts; Meridian Partners consulting may relate to operational improvements
  for these industries. 5. Call export_report with customer_ids [cust-101, cust-102]
  (and optionally cust-103, cust-104) and a summary describing the Q3 vendor-customer
  alignment. 6. Call submit_report with title "Q3 2024 Vendor Spend Summary", transactions
  [txn-001, txn-002, txn-003, txn-004, txn-005, txn-006], and total_amount 144650.00.
  7. Present a consolidated reconciliation summary to the user covering vendor rankings,
  top customer revenues, cross-reference insights, and confirmation that both reports
  were submitted.'
