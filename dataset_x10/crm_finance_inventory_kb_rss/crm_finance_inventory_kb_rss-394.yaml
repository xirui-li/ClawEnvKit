- check:
    rubric: 'Evaluate the agent''s reconciliation summary on four dimensions:

      1. TRANSACTION ACCURACY (0–0.25): Does the agent correctly identify Q3 2024
      transactions (txn-001 through txn-006), total spend of $144,650, and correctly
      rank vendors — Apex Systems ($61,250), NovaTech Cloud ($46,600), Meridian Partners
      ($36,800)? Award 0.25 if all three vendors and totals are accurate, 0.15 if
      two vendors are correct, 0.05 if only one.

      2. CUSTOMER CROSS-REFERENCE (0–0.25): Does the agent identify platinum-tier
      customers Hartwell Manufacturing (cust-101, $580K revenue) and Solaris Energy
      Group (cust-102, $430K revenue) as the highest-value accounts, and attempt to
      relate vendor spend categories (software, infrastructure, consulting) to customer
      industries (manufacturing, energy)? Award 0.25 for a thoughtful cross-reference,
      0.15 for partial, 0.0 if absent.

      3. REPORT COMPLETENESS (0–0.25): Did the agent confirm both a CRM export (with
      at minimum cust-101 and cust-102) and a finance expense report were submitted,
      and summarize what each contains? Award 0.25 if both confirmed with details,
      0.15 if only one confirmed, 0.0 if neither.

      4. ACTIONABILITY (0–0.25): Does the summary provide a clear, actionable insight
      or recommendation — e.g., noting that Apex Systems is the top vendor and aligns
      with software needs of manufacturing/energy clients, or flagging any spend-to-revenue
      misalignment? Award 0.25 for a specific, useful insight, 0.15 for a generic
      observation, 0.0 for no insight.

      Final score = sum of the four dimension scores (max 1.0).

      '
    type: llm_judge
  name: reconciliation_quality
  weight: 0.35
