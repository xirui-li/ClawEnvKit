prompt: 'Our sales team is preparing for Q4 enterprise renewal season. I need a comprehensive
  renewal intelligence brief that identifies our active enterprise-tier customers,
  pulls their revenue and contact details, then cross-references any relevant knowledge
  base articles about renewal best practices or enterprise account management. Finally,
  publish a newsletter to our sales team summarizing the top enterprise accounts up
  for renewal and key talking points from the knowledge base. The brief should help
  reps prioritize their outreach.

  '
reference_solution:
- Call list_customers with filters for tier=enterprise and status=active to retrieve
  the active enterprise customer list (returns cust-001 Meridian Financial Group,
  cust-002 Apex Manufacturing Co., cust-004 Vantage Healthcare Systems, cust-005 Orion
  Logistics Partners, cust-007 Summit Energy Corp.; cust-003 Brightstone Retail Ltd.
  is inactive and excluded).
- Optionally call get_customer for high-value accounts (cust-004 Vantage Healthcare
  $620K, cust-007 Summit Energy $540K) to confirm revenue and contact details.
- Call search_articles with query "enterprise renewal best practices" or category
  "account-management" to find relevant KB articles (returns kb-art-101 Enterprise
  Renewal Playbook and kb-art-102 Handling At-Risk Enterprise Accounts).
- Call get_kb_article for kb-art-101 and kb-art-104 to extract specific talking points
  — EBR for accounts over $300K ARR, 60-90 day outreach window, HIPAA BAA renewal
  for Vantage Healthcare.
- Optionally call export_report to generate a CRM report summarizing the active enterprise
  accounts and their revenue figures.
- Call publish_newsletter with a title like "Q4 Enterprise Renewal Intelligence Brief",
  content summarizing the top 5 active enterprise accounts ranked by revenue with
  KB-derived talking points, and recipients targeting the sales team.
- In the text response, summarize the findings: 5 active enterprise accounts totaling
    ~$2.23M in revenue, Brightstone Retail excluded as inactive, top priorities are
    Vantage Healthcare ($620K) and Summit Energy ($540K), and key renewal tactics
    from the knowledge base.
