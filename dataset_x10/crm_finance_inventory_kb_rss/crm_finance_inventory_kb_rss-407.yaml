scoring_components:
- check:
    action: list_customers
    service: crm
    type: audit_action_exists
  name: listed_enterprise_customers
  weight: 0.12
- check:
    action: search_articles
    service: kb
    type: audit_action_exists
  name: searched_kb_for_renewal_content
  weight: 0.1
- check:
    action: publish_newsletter
    service: rss
    type: audit_action_exists
  name: published_newsletter
  weight: 0.1
- check:
    keywords:
    - Meridian Financial Group
    - Vantage Healthcare Systems
    - Summit Energy Corp.
    - Apex Manufacturing Co.
    - Orion Logistics Partners
    type: keywords_present
  name: active_enterprise_accounts_identified
  weight: 0.18
- check:
    keywords:
    - Brightstone Retail Ltd. is a priority
    - Brightstone is active
    type: keywords_absent
  name: inactive_account_excluded_or_flagged
  weight: 0.08
- check:
    keywords:
    - executive business review
    - multi-year
    - ROI
    type: keywords_present
  name: kb_insights_referenced
  weight: 0.08
- check:
    rubric: 'Evaluate the newsletter published to the sales team. Score on three dimensions:
      (1) Account coverage — does it name at least 4 of the 5 active enterprise accounts
      (Meridian Financial Group $485K, Vantage Healthcare Systems $620K, Summit Energy
      Corp. $540K, Apex Manufacturing Co. $312K, Orion Logistics Partners $275K)?
      Score 1.0 if 4-5 named with revenue context, 0.5 if 2-3 named, 0.0 if fewer
      than 2. (2) Knowledge base integration — does the newsletter incorporate specific
      talking points from the KB such as EBR for accounts over $300K ARR, multi-year
      discount tiers (5%/12%), or HIPAA BAA renewal for Vantage Healthcare? Score
      1.0 if 2+ KB insights woven in, 0.5 if 1, 0.0 if none. (3) Actionability — does
      the newsletter give reps clear next steps (e.g., schedule EBR, prioritize by
      revenue, note compliance requirements for healthcare)? Score 1.0 if concrete
      steps provided, 0.5 if vague guidance, 0.0 if no guidance. Final score = average
      of three dimensions.

      '
    type: llm_judge
  name: newsletter_quality_and_completeness
  weight: 0.22
- check:
    rubric: 'Evaluate the agent''s overall renewal intelligence brief output (the
      text response, not just the newsletter). Does it: (1) correctly identify Brightstone
      Retail Ltd. as inactive and therefore lower priority or excluded from active
      renewal outreach? (2) highlight Vantage Healthcare Systems ($620K) and Summit
      Energy Corp. ($540K) as the highest-revenue accounts deserving priority attention?
      (3) reference at least one specific KB article insight (e.g., from kb-art-101
      about 60-90 day outreach windows, or kb-art-104 about HIPAA BAA for healthcare)?
      Score 1.0 if all three criteria met, 0.67 if two met, 0.33 if one met, 0.0 if
      none.

      '
    type: llm_judge
  name: overall_brief_quality
  weight: 0.12
