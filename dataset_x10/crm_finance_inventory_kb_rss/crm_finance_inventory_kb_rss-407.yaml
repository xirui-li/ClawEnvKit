  kb:
    articles:
    - author: Sarah Chen
      category: account-management
      content: 'Q4 renewals require early outreach (60-90 days before expiry). Key
        tactics: executive sponsor alignment, ROI documentation, multi-year discount
        offers (5-15%), and competitive displacement analysis. Always schedule an
        executive business review (EBR) for accounts over $300K ARR.

        '
      id: kb-art-101
      last_updated: '2024-08-01'
      title: Enterprise Renewal Playbook — Q4 Strategies
    - author: Marcus Rivera
      category: account-management
      content: 'Indicators of churn risk include reduced login frequency, support
        ticket spikes, and missed QBRs. Mitigation steps: assign a dedicated CSM,
        offer a complimentary health check, and escalate to VP of Sales for accounts
        above $400K. Document all touchpoints in CRM.

        '
      id: kb-art-102
      last_updated: '2024-09-10'
      title: Handling At-Risk Enterprise Accounts
    - author: Priya Nair
      category: sales-strategy
      content: 'When proposing multi-year deals, anchor on total cost of ownership
        savings. Offer 5% discount for 2-year, 12% for 3-year commitments. Include
        SLA upgrades and dedicated support as sweeteners. Finance approval required
        for discounts above 10%.

        '
      id: kb-art-103
      last_updated: '2024-07-15'
      title: Multi-Year Contract Negotiation Tips
    - author: James Okafor
      category: vertical-playbooks
      content: 'Healthcare customers require HIPAA BAA renewal alongside contract
        renewal. Ensure legal review is completed 45 days before expiry. Highlight
        new compliance features in the renewal pitch. Reference Vantage Healthcare
        Systems as a success story for compliance-led renewals.

        '
      id: kb-art-104
      last_updated: '2024-09-20'
      title: Healthcare Vertical — Compliance Considerations for Renewals
