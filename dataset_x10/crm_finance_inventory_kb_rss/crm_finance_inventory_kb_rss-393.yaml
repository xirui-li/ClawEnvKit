- check:
    rubric: "Evaluate the agent's final summary response on four dimensions:\n1. COVERAGE\
      \ (0–0.25): Does the response cover all four active/at-risk enterprise customers\n\
      \   (Meridian Logistics Group cust-101, Apex Financial Partners cust-102, Solaris\
      \ Energy Corp cust-103,\n   NovaTech Manufacturing cust-104) and note Pinnacle\
      \ Healthcare Systems (cust-105) as churned?\n   Score 0.25 if all five mentioned\
      \ with correct status, 0.15 if 3-4 mentioned, 0.05 if fewer.\n\n2. MARKET CONTEXT\
      \ (0–0.25): Does the response incorporate relevant external context from RSS\
      \ news\n   or KB articles — e.g., logistics Q4 headwinds (rss-201), energy contract\
      \ renegotiations (rss-202),\n   finance RegTech opportunity (rss-203), or KB\
      \ playbooks for at-risk accounts (kb-003)?\n   Score 0.25 if 2+ sources cited\
      \ with relevance, 0.15 if 1 source, 0.0 if none.\n\n3. ACTIONABILITY (0–0.25):\
      \ Does the response include specific, actionable recommendations for the VP\n\
      \   (e.g., executive outreach for Solaris Energy, upsell pitch for Apex Financial,\
      \ multi-year contract\n   for NovaTech)? Score 0.25 if 2+ concrete recommendations\
      \ tied to specific clients, 0.15 if vague,\n   0.0 if no recommendations.\n\n\
      4. REPORT EXPORT (0–0.25): Did the agent confirm that a CRM report was exported,\
      \ and does the summary\n   indicate the report includes the enterprise customer\
      \ IDs and a narrative summary suitable for board review?\n   Score 0.25 if confirmed\
      \ with detail, 0.15 if mentioned without detail, 0.0 if not mentioned.\n\nFinal\
      \ score = sum of four dimension scores (max 1.0).\n"
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.25
