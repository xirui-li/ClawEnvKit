prompt: 'Our VP of Sales needs a comprehensive health report for our enterprise-tier
  customers ahead of the Q4 board meeting. Pull together the enterprise clients, cross-reference
  any relevant industry news or knowledge base articles about their sectors, and export
  a polished CRM report summarizing their status, revenue, and any notable context
  that could affect renewals. Summarize your findings in your response so the VP can
  review before the board meeting.

  '
reference_solution:
- Call list_customers with tier=enterprise to retrieve all enterprise-tier customers
  (cust-101 through cust-105).
- Optionally call get_customer for individual enterprise customers to retrieve full
  details including revenue and last_contact.
- Call search_articles in the KB with queries related to logistics, finance, energy,
  and manufacturing to find relevant industry insight articles (kb-001, kb-002, kb-003,
  kb-004).
- Call get_kb_article for the most relevant articles to read full content and extract
  actionable guidance.
- Call list_articles on the RSS service filtered by relevant categories (logistics,
  energy, finance) to surface recent market news (rss-201, rss-202, rss-203).
- Call get_rss_article for key news items to extract full summaries for context.
- Call export_report with a title such as "Q4 Enterprise Client Health Report", include
  customer_ids for all enterprise customers (cust-101, cust-102, cust-103, cust-104,
  cust-105), and write a summary narrative incorporating client statuses, revenues,
  KB guidance, and RSS market context.
- In the text response, summarize findings for the VP: highlight active high-revenue
    clients (Apex Financial $720K, NovaTech $560K, Meridian $485K), flag Solaris Energy
    as at-risk with recommended QBR outreach, note Pinnacle Healthcare as churned,
    and include market context (logistics headwinds, energy renegotiations, finance
    RegTech upsell opportunity). Confirm the report has been exported for board review.
