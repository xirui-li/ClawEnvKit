- check:
    rubric: "Evaluate the agent's final strategic account review output on the following\
      \ dimensions:\n1. COMPLETENESS (0-0.4): Does the output correctly identify all\
      \ four enterprise-tier customers\n   (cust-001 Meridian Financial Group $485K,\
      \ cust-002 Apex Manufacturing $312K,\n   cust-003 Brightstone Retail at_risk\
      \ $198K, cust-005 Nexus Healthcare $620K)?\n   Does it exclude non-enterprise\
      \ customers (Coastal Logistics, Orion Tech)?\n   Score 0.4 if all four named\
      \ with correct context, 0.2 if two or three, 0.0 if fewer than two.\n\n2. CROSS-SERVICE\
      \ INSIGHTS (0-0.3): Does the output incorporate relevant RSS news trends\n \
      \  (e.g., interest rate pressure for Meridian Financial, supply chain issues\
      \ for Apex Manufacturing,\n   healthcare IT spending surge for Nexus Healthcare)\
      \ and KB best practices\n   (QBRs, 60-day contact rule, at-risk intervention)?\n\
      \   Score 0.3 if at least two industry-specific news items are linked to specific\
      \ accounts,\n   0.15 if only one linkage is made, 0.0 if no cross-service insights\
      \ are present.\n\n3. ACTIONABILITY (0-0.3): Does the output provide concrete,\
      \ prioritized recommendations\n   for the leadership team — such as flagging\
      \ Brightstone Retail for immediate at-risk intervention,\n   identifying Nexus\
      \ Healthcare ($620K) as the top revenue account for executive sponsorship,\n\
      \   or noting that Brightstone's last contact (2024-07-10) exceeds the 60-day\
      \ threshold?\n   Score 0.3 if three or more specific actionable recommendations\
      \ are given,\n   0.15 if one or two are given, 0.0 if the output is generic\
      \ with no specific actions.\n\nFinal score = sum of dimension scores (max 1.0).\n"
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.3
