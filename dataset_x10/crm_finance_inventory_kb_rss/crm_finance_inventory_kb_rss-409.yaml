prompt: 'Our sales leadership team is preparing for Q4 planning and needs a consolidated
  strategic account review. Identify our enterprise-tier customers, cross-reference
  any relevant industry news or trends from our RSS feeds that might affect these
  accounts, check our knowledge base for any account management best practices, and
  then export a comprehensive report summarizing the enterprise accounts with actionable
  insights for the leadership team.

  '
reference_solution:
- Call list_customers with tier=enterprise to retrieve enterprise accounts (cust-001,
  cust-002, cust-003, cust-005).
- Optionally call get_customer for individual enterprise customers to retrieve full
  details including revenue and last_contact dates.
- Call list_feeds or list_articles on the RSS service to retrieve relevant industry
  news for finance, manufacturing, and healthcare categories.
- Call search_articles on the KB service with queries like "enterprise account management"
  or "Q4 planning" to find kb-art-001 and kb-art-002.
- Optionally call get_kb_article to retrieve full content of relevant KB articles.
- Synthesize findings: identify Nexus Healthcare ($620K) as top revenue account, flag
    Brightstone Retail (at_risk, last contact 2024-07-10 — over 60 days) for immediate
    intervention, link RSS trends to specific accounts (rate pressure for Meridian,
    supply chain for Apex, IT spending surge for Nexus).
- Call export_report with title, the four enterprise customer IDs (cust-001, cust-002,
  cust-003, cust-005), and a comprehensive summary incorporating the cross-service
  insights and actionable recommendations.
- Present the exported report summary to the leadership team in the text response.
