    articles:
    - author: Sarah Nguyen
      category: retention
      content: 'Key signals of churn risk include: last contact older than 90 days,
        overdue invoices, partial payments, and declining engagement scores. Recommended
        actions: schedule executive business review within 2 weeks, offer flexible
        payment terms, assign dedicated CSM, and provide early renewal discount of
        10-15%.'
      id: kb-201
      last_updated: '2024-08-01'
      title: Enterprise Customer Churn Prevention Playbook
    - author: James Okafor
      category: retention
      content: Start renewal conversations 90 days before contract end. Prepare ROI
        summary reports for each account. Escalate at-risk accounts to VP of Sales.
        Use multi-stakeholder outreach strategy. Offer multi-year discounts to lock
        in revenue.
