prompt: 'We''re heading into Q4 renewal season and I need a comprehensive risk assessment
  for our top-tier enterprise customers. Pull detailed profiles on each of our "enterprise"
  tier customers, cross-reference their revenue against any recent financial transactions
  related to their accounts, and search our knowledge base for any churn or renewal
  best practices we should apply. Then compile and export a renewal risk report summarizing
  which customers are at risk and what actions to take, and publish a brief internal
  newsletter to the sales team with the key findings.

  '
reference_solution:
- Call list_customers with tier=enterprise to retrieve all enterprise-tier customers.
- Call get_customer for each enterprise customer (cust-001 through cust-005) to retrieve
  full profiles including status, revenue, and last_contact dates.
- Note that cust-002 (Apex Logistics Group) and cust-004 (Vantage Capital Partners)
  have status=at_risk and very old last_contact dates.
- Call list_transactions with a broad date range (e.g., 2024-01-01 to 2024-10-31)
  to retrieve recent financial transactions.
- Identify txn-102 (Apex Logistics partial payment) and txn-104 (Vantage Capital overdue
  invoice of $132,500) as financial risk signals.
- Call search_articles with query="churn prevention renewal enterprise" and category=retention
  to find relevant KB articles.
- Review kb-201 (Enterprise Customer Churn Prevention Playbook) and kb-202 (Q4 Renewal
  Best Practices) for recommended actions.
- Call export_report with customer_ids=[cust-002, cust-004] (and optionally all enterprise
  customers) and a summary of renewal risk findings.
- Call publish_newsletter with a title like "Q4 Enterprise Renewal Risk Alert" and
  content summarizing at-risk accounts and recommended actions, addressed to the sales
  team.
- Present a final text summary identifying Apex Logistics and Vantage Capital as high-risk,
  with specific recommended actions drawn from KB guidance and financial data.
