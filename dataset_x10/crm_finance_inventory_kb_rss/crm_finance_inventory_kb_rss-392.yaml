- check:
    rubric: "Evaluate the agent's renewal risk assessment output on the following\
      \ dimensions:\n1. ACCURACY (0-0.4): Does the agent correctly identify Apex Logistics\
      \ Group (cust-002, at_risk, last contact 2024-07-02,\n   partial payment txn-102)\
      \ and Vantage Capital Partners (cust-004, at_risk, last contact 2024-06-18,\
      \ overdue invoice\n   txn-104 of $132,500) as the highest-risk customers? Does\
      \ it note that Vantage Capital has an overdue invoice and\n   has not been contacted\
      \ since June 2024?\n\n2. KNOWLEDGE BASE INTEGRATION (0-0.3): Does the agent\
      \ reference or apply guidance from the KB articles — such as\n   scheduling\
      \ executive business reviews, offering flexible payment terms, escalating overdue\
      \ accounts, or the\n   90-day renewal conversation rule from kb-201 and kb-202?\n\
      \n3. ACTIONABILITY (0-0.3): Does the agent provide specific, concrete recommended\
      \ actions for each at-risk customer\n   (e.g., immediate outreach to Vantage\
      \ Capital, payment plan discussion for Apex Logistics)? Are the active\n   customers\
      \ (Meridian, Solaris, BlueSky) also addressed with appropriate renewal strategies?\n\
      \nScore 1.0 if all three dimensions are fully addressed with specific customer\
      \ names and data-backed recommendations. Score 0.7 if two dimensions are well-covered.\
      \ Score 0.4 if only one dimension is addressed. Score 0.0 if the output is generic\
      \ or missing key customers.\n"
    type: llm_judge
  name: risk_assessment_quality
  weight: 0.3
