  kb:
    articles:
    - author: Sarah Kimura
      category: sales-playbooks
      content: 'When approaching enterprise upsell opportunities for hardware, focus
        on customers with annual revenue above $1.5M and active status. Lead with
        ROI framing: calculate total cost of ownership vs. productivity gains. For
        finance and healthcare verticals, emphasize compliance and data security features.
        For manufacturing and logistics, highlight throughput and uptime improvements.
        Always reference the customer''s last contact date to personalize outreach
        timing. Recommended bundle: ProServer X9 + DataVault 5000 for data-intensive
        industries.

        '
      id: kb-201
      last_updated: '2024-10-01'
      title: Enterprise Upsell Playbook — Hardware Solutions
    - author: James Okafor
      category: customer-success
      content: 'Enterprise tier customers are defined as accounts with annual contract
        value exceeding $500K. Engagement cadence should be monthly for active accounts.
        Upsell conversations should be initiated by the account executive within 30
        days of last contact if no renewal discussion has occurred.

        '
      id: kb-202
      last_updated: '2024-09-15'
      title: Customer Tier Definitions and Engagement Guidelines
    - author: Sarah Kimura
      category: sales-playbooks
      content: 'ProServer X9 is best positioned for compute-heavy workloads in finance
        and technology sectors. DataVault 5000 targets healthcare and finance for
        secure data archival. NetShield Pro is ideal for any industry requiring network
        security compliance. WorkStation Elite suits distributed teams in retail and
        manufacturing. Always cross-reference inventory levels before committing to
        customer proposals.

        '
      id: kb-203
      last_updated: '2024-11-05'
      title: Hardware Product Positioning Guide
prompt: 'Our sales team is preparing an upsell campaign targeting enterprise-tier
  customers. For each of our premium hardware products, I need you to pull the full
  product details, then identify which active enterprise customers would be the best
  fit based on their industry and revenue. Finally, compile a CRM export report summarizing
  the recommended customer-product pairings, and check our knowledge base for any
  existing upsell playbooks or best practices we should reference in the campaign.

  '
reference_solution: '1. Call list_products with category=enterprise-hardware to discover
  all premium hardware products. 2. Call get_product for each of the four products
  (prod-101 ProServer X9, prod-102 DataVault 5000, prod-103 NetShield Pro, prod-104
  WorkStation Elite) to retrieve full pricing and supplier details. 3. Call list_customers
  with tier=enterprise and status=active to retrieve the five active enterprise customers
  (cust-001 through cust-003, cust-005, cust-006), noting that cust-004 Stellar Retail
  Partners is inactive and should be excluded. 4. Optionally call get_customer for
  individual customers to confirm details. 5. Call search_articles with a query like
  "upsell playbook enterprise hardware" and category=sales-playbooks to find kb-201
  and kb-203. 6. Call get_kb_article for kb-201 (Enterprise Upsell Playbook) and kb-203
  (Hardware Product Positioning Guide) to extract industry-specific pairing guidance.
  7. Using the KB guidance, construct customer-product pairings: Meridian Financial
  Group → ProServer X9 + DataVault 5000; Apex Healthcare Systems → DataVault 5000
  + NetShield Pro; Orion Logistics Corp → NetShield Pro; BlueSky Manufacturing → WorkStation
  Elite + NetShield Pro; Pinnacle Tech Ventures → ProServer X9. 8. Call export_report
  with a descriptive title (e.g., "Enterprise Upsell Campaign — Hardware Product Fit
  Analysis"), the list of active enterprise customer IDs, and a summary of the recommended
  pairings and KB-backed rationale. 9. Present the full analysis in the text response,
  including product details, customer-product pairings with justification, and key
  takeaways from the KB playbooks.'
