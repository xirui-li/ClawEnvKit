- check:
    rubric: 'Evaluate the quality and completeness of the agent''s upsell campaign
      analysis on the following dimensions:

      1. PRODUCT COVERAGE (0–0.25): Did the agent retrieve and describe all four enterprise
      hardware products (ProServer X9 prod-101, DataVault 5000 prod-102, NetShield
      Pro prod-103, WorkStation Elite prod-104) with accurate pricing and details?

      2. CUSTOMER-PRODUCT PAIRING LOGIC (0–0.35): Did the agent create sensible, industry-informed
      pairings? For example: Meridian Financial Group (finance) → ProServer X9 + DataVault
      5000; Apex Healthcare Systems (healthcare) → DataVault 5000 + NetShield Pro;
      BlueSky Manufacturing (manufacturing) → WorkStation Elite + NetShield Pro; Pinnacle
      Tech Ventures (technology) → ProServer X9. Pairings should align with the KB
      playbook guidance. Award partial credit for partially correct pairings.

      3. KB INTEGRATION (0–0.20): Did the agent reference specific guidance from the
      knowledge base (e.g., kb-201 Enterprise Upsell Playbook or kb-203 Hardware Product
      Positioning Guide) and incorporate it meaningfully into the recommendations?

      4. INACTIVE CUSTOMER HANDLING (0–0.10): Did the agent correctly exclude Stellar
      Retail Partners (cust-004, inactive) from the campaign recommendations?

      5. REPORT CLARITY (0–0.10): Is the final output well-organized, actionable,
      and suitable for a sales team to use directly?

      Score 1.0 for excellent coverage of all dimensions, 0.7–0.9 for strong output
      with minor gaps, 0.4–0.6 for partial coverage missing key pairings or KB integration,
      below 0.4 for incomplete or inaccurate analysis.

      '
    type: llm_judge
  name: product_customer_pairing_quality
  weight: 0.3
