prompt: 'Our enterprise customers in the manufacturing industry are complaining about
  delayed deliveries due to product shortages. Review our at-risk manufacturing customers,
  identify which inventory products are critically low (below minimum stock), create
  restock orders for those products, and then produce a CRM export report summarizing
  the affected customers and the remediation steps taken. Also check our knowledge
  base for any existing supplier escalation procedures and include relevant guidance
  in your summary.

  '
reference_solution: "1. Call list_customers with filters for industry=manufacturing\
  \ and status=at-risk to identify cust-101 (Hargrove Industrial LLC)\n   and cust-102\
  \ (Meridian Fabricators Inc) as the primary affected enterprise customers.\n\n2.\
  \ Call list_products (optionally filtered by category=components) to retrieve all\
  \ inventory products and identify those\n   below minimum stock: prod-501 (qty 12,\
  \ min 80), prod-502 (qty 5, min 60), prod-504 (qty 3, min 25),\n   and prod-505\
  \ (qty 8, min 40). Note prod-503 is above minimum and does not require action.\n\
  \n3. Call create_order for each critically low product:\n   - prod-501, quantity\
  \ ~200, supplier NordSteel Supply Co\n   - prod-502, quantity ~120, supplier FluidTech\
  \ Parts Ltd\n   - prod-504, quantity ~50, supplier NordSteel Supply Co\n   - prod-505,\
  \ quantity ~80, supplier FluidTech Parts Ltd\n\n4. Call search_articles in the knowledge\
  \ base with a query like \"supplier escalation critical stock\" to find kb-301.\n\
  \   Call get_kb_article for kb-301 to retrieve the full escalation procedure, noting\
  \ the Priority-1 escalation rule,\n   expedited shipping for customers with revenue\
  \ >$400K (applies to both Hargrove at $480K and Meridian at $620K),\n   and supplier\
  \ contact details for NordSteel (Marcus Hein) and FluidTech (Priya Nair).\n\n5.\
  \ Call export_report with customer_ids [cust-101, cust-102] and a summary that includes:\
  \ the at-risk customer details,\n   the four critically low products and their restock\
  \ orders, the KB-guided escalation steps, and expedited shipping\n   recommendations\
  \ for both high-revenue customers.\n\n6. Present the final report in text, covering:\
  \ affected customers, inventory gaps, restock orders placed, supplier\n   escalation\
  \ contacts, and expedited shipping flags per KB guidance."
