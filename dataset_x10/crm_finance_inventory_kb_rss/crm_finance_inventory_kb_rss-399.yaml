- check:
    rubric: "Evaluate the agent's final summary report on four dimensions:\n1. CUSTOMER\
      \ IDENTIFICATION (0–0.25): Did the agent correctly identify the at-risk manufacturing\
      \ customers\n   (cust-101 Hargrove Industrial LLC and cust-102 Meridian Fabricators\
      \ Inc) as the primary affected parties?\n   Full credit if both named with context;\
      \ partial if only one.\n\n2. INVENTORY ANALYSIS (0–0.25): Did the agent correctly\
      \ identify all four critically low products —\n   prod-501 (Precision Steel\
      \ Bearings, qty 12 vs min 80), prod-502 (Industrial Hydraulic Seals, qty 5 vs\
      \ min 60),\n   prod-504 (Heavy-Duty Drive Shafts, qty 3 vs min 25), and prod-505\
      \ (Pneumatic Valve Assemblies, qty 8 vs min 40)?\n   Full credit for all four;\
      \ partial for 2–3; minimal for 1.\n\n3. RESTOCK ACTIONS (0–0.25): Did the agent\
      \ create restock orders for the critically low products and mention\n   the\
      \ relevant suppliers (NordSteel Supply Co for prod-501 and prod-504; FluidTech\
      \ Parts Ltd for prod-502 and prod-505)?\n   Full credit if orders placed and\
      \ suppliers referenced; partial if orders placed without supplier detail.\n\n\
      4. KB INTEGRATION (0–0.25): Did the agent incorporate guidance from the knowledge\
      \ base article kb-301\n   (Supplier Escalation Procedure), including the Priority-1\
      \ escalation rule, expedited shipping recommendation\n   for customers with\
      \ revenue over $400,000 (Hargrove at $480K and Meridian at $620K), or supplier\
      \ contact details?\n   Full credit for meaningful integration; partial for surface-level\
      \ mention; zero if KB content ignored.\n\nScore: Sum of the four dimension scores\
      \ (0.0–1.0).\n"
    type: llm_judge
  name: output_quality_and_completeness
  weight: 0.2
