- check:
    rubric: 'Evaluate the agent''s overall analysis on four dimensions:

      1. VENDOR SPEND ACCURACY (0–0.25): Did the agent correctly identify NovaTech
      Solutions as the top vendor with a combined Q1 2024 spend of $119,500 (txn-001:
      $48,200 + txn-003: $39,500 + txn-005: $31,800)? Did it note this exceeds the
      $50,000 single-vendor quarterly threshold from KB article kb-201, triggering
      a required CFO sign-off and formal vendor review?

      2. CUSTOMER IMPACT ASSESSMENT (0–0.25): Did the agent review enterprise-tier
      customers and specifically flag cust-103 (Solaris Manufacturing Ltd) as at-risk
      with last contact on 2024-01-05, noting this violates the 14-day executive outreach
      policy from KB article kb-202? Did it confirm cust-101 (Apex Dynamics), cust-102
      (Harrington Financial), and cust-105 (Pinnacle Health) are active?

      3. RECOMMENDATIONS QUALITY (0–0.25): Did the agent provide actionable recommendations
      such as negotiating volume discounts with NovaTech (per kb-203, quarterly spend
      >$30K warrants negotiation), scheduling an executive outreach to Solaris Manufacturing,
      and initiating a formal vendor review? Are recommendations specific and grounded
      in the KB policies?

      4. NEWSLETTER AND REPORT COMPLETENESS (0–0.25): Did the agent publish a newsletter
      summarizing the key findings (NovaTech overspend, at-risk customer, policy violations)
      and export a CRM report covering the enterprise customers reviewed? Is the output
      coherent and executive-ready?

      Score 1.0 if all four dimensions are fully addressed, 0.75 if three are strong,
      0.5 if two are adequate, 0.25 if only one is addressed, 0.0 if the output is
      missing or incoherent.

      '
    type: llm_judge
  name: analysis_quality
  weight: 0.3
