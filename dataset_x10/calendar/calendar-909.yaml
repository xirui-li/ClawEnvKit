prompt: I'm coordinating a rehearsal for our museum's donor preview on 2026-09-18.
  Please find a time that works for both Priya Shah and Mateo Alvarez that afternoon,
  schedule a 45-minute event called "Donor Preview Rehearsal" in the East Atrium,
  and tell me the final time you booked.
reference_solution: '1. Check Priya Shah''s events on 2026-09-18 using the user-specific
  calendar lookup.

  2. Check Mateo Alvarez''s events on 2026-09-18 using the same user-specific lookup.

  3. Compare their afternoon availability. Priya is unavailable at 13:00-13:30, 14:00-14:30,
  and 15:00-16:00. Mateo is unavailable at 13:30-14:15, 14:00-14:30, and 16:00-16:30.

  4. Determine that the only conflict-free 45-minute afternoon slot for both is 16:30-17:15
  on 2026-09-18.

  5. Create a new event titled ''Donor Preview Rehearsal'' from 2026-09-18T16:30:00
  to 2026-09-18T17:15:00 with attendees Priya Shah and Mateo Alvarez at East Atrium.

  6. Respond with a concise confirmation including the event title, date, exact booked
  time, location, and attendees.'
