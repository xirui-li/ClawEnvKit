- check:
    rubric: 'Evaluate whether the agent correctly found a conflict-free afternoon
      slot on 2026-09-18 for both Priya Shah and Mateo Alvarez and clearly reported
      the booking. From the fixtures: Priya Shah is busy 13:00-13:30, 14:00-14:30,
      and 15:00-16:00; Mateo Alvarez is busy 13:30-14:15, 14:00-14:30, and 16:00-16:30.
      The only valid 45-minute afternoon slot for both is 16:30-17:15. Score 1.0 if
      the response clearly states that ''Donor Preview Rehearsal'' was booked for
      16:30-17:15 on 2026-09-18 in East Atrium for Priya Shah and Mateo Alvarez, with
      no claimed conflicts. Score 0.7 if the slot is correct but one detail like duration,
      location, or attendee mention is omitted. Score 0.3 if the response shows partial
      understanding of availability but gives an incorrect or ambiguous time. Score
      0.0 if it books a conflicting time or fails to report a concrete booking.'
    type: llm_judge
  name: scheduling_quality
  weight: 0.25
