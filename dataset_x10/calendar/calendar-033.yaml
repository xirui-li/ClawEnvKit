    - '2026-06-16'
    - '13:30'
    - '14:15'
    - Skyline Conference Room
    type: keywords_present
  name: output_mentions_scheduled_slot
  weight: 0.1
- check:
    keywords:
    - Maya Chen
    - Luis Ortega
    - Priya Nandakumar
    type: keywords_present
  name: output_mentions_attendees
  weight: 0.1
- check:
    keywords:
    - could not find any time
    - no availability
    - unable to schedule
    type: keywords_absent
  name: no_false_conflict_claims
  weight: 0.05
- check:
    rubric: Evaluate whether the agent correctly scheduled the requested 45-minute
      meeting for next Tuesday, 2026-06-16, at a time when Maya Chen, Luis Ortega,
      and Priya Nandakumar are all free and the Skyline Conference Room is available.
      Based on the fixtures, the best valid slot is 13:30-14:15 because Maya is free
      after 12:00 until 14:00, Luis is free from 13:30 until 14:00 standup, Priya
      is free from 12:00 until 14:00, and the Skyline Conference Room is occupied
      only from 15:00-16:00. Score 1.0 if the response clearly states that the event
      was booked for 13:30-14:15 on 2026-06-16 in Skyline Conference Room with all
      three attendees; 0.7 if the event appears correctly created but the response
      is missing one key detail such as attendee list or location; 0.3 if the response
      gives an incorrect time or ambiguous confirmation; 0.0 if it fails to schedule
      a valid meeting.
    type: llm_judge
  name: scheduling_quality
  weight: 0.3
