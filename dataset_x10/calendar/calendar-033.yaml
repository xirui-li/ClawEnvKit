    type: audit_field_equals
    value: Rooftop Drone Permit Briefing
  name: correct_event_title
  weight: 0.1
- check:
    action: create_event
    field: location
    service: calendar
    type: audit_field_equals
    value: Skyline Conference Room
  name: correct_location
  weight: 0.1
- check:
