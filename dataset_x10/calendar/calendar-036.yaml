    field: location
    service: calendar
    type: audit_field_equals
    value: Scent Lab
  name: location_is_scent_lab
  weight: 0.1
- check:
    keywords:
    - '2025-06-18'
    - '12:00'
    - '12:45'
    type: keywords_present
  name: mentions_scheduled_time
  weight: 0.1
- check:
    keywords:
    - Formula stability review
    - Retail launch sync
    - Creative direction standup
    type: keywords_present
  name: mentions_key_conflicts
  weight: 0.1
- check:
    keywords:
    - '10:30'
    - '14:30'
    - 15:30 to 16:15
    type: keywords_absent
  name: does_not_claim_wrong_slot
  weight: 0.08
- check:
    rubric: Evaluate whether the response correctly identifies and communicates a
      valid 45-minute conflict-free slot for Maya Chen, Oliver Grant, and Priya Nair
      on 2025-06-18 during business hours. Full credit (1.0) if it clearly states
      the scheduled meeting is from 12:00 to 12:45 in Scent Lab, notes that this avoids
      the existing conflicts from evt-1602 'Formula stability review' (10:00-11:00,
      Priya), evt-1603 'Retail launch sync' (11:30-12:00, Oliver and Maya), evt-1604
      'Creative direction standup' (13:00-13:30, Maya and Priya), evt-1605 'Budget
      sign-off' (14:00-15:00, Oliver), and evt-1606 'Fragrance blotter test' (15:30-16:00,
      Priya and Oliver), and is concise and professional. Partial credit (0.5) if
      the chosen slot is valid but the explanation is incomplete or misses some relevant
      conflicts. No credit (0.0) if the slot conflicts with any listed event, omits
      the scheduled result, or gives materially incorrect reasoning.
    type: llm_judge
  name: output_quality_and_accuracy
  weight: 0.16
scoring_components_additional:
- check:
