    - 1:30 PM
    - 2:00 PM
    type: keywords_absent
  name: output_avoids_false_earlier_slot
  weight: 0.06
- check:
    rubric: 'Evaluate whether the agent correctly determined the earliest 45-minute
      conflict-free slot for Maya Chen and Leo Park on March 18, 2026 between 1:00
      PM and 5:00 PM, created the requested event, and clearly reported the result.
      The correct booking is 2:30 PM to 3:15 PM in Studio B for "Foley Cue Review"
      with Maya Chen and Leo Park attending. Earlier windows are invalid because Maya
      is busy until 1:30 PM and again 2:00-2:30 PM, while Leo is busy 1:15-2:00 PM.
      Score 1.0 if the response clearly states the correct booked time, title, and
      location and indicates the event was scheduled; 0.5 if the event appears scheduled
      but the explanation or reported details are incomplete; 0.0 if the booked slot
      is wrong or the response is misleading.

      '
    type: llm_judge
  name: result_quality_and_accuracy
  weight: 0.2
scoring_components_additional:
- check:
    rubric: 'Assess whether the response demonstrates accurate understanding of attendee
      availability from the fixture events: evt-2601 ADR Pickup Session, evt-2602
      Sound Library Vendor Call, evt-2603 Temp Mix Notes Review, evt-2604 Cue Sheet
      Cleanup, evt-2605 Trailer Stem Export, and evt-2606 Foley Prop Inventory Check.
      Score 1.0 if the response is consistent with these conflicts and does not imply
      an impossible earlier slot; 0.5 if the final booking is correct but reasoning
      is minimal; 0.0 if the response contradicts the fixture schedule.

      '
    type: llm_judge
  name: attendee_and_conflict_reasoning
  weight: 0.1
