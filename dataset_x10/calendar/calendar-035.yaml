    - Q1 Budget Review
    - Engineering Roadmap Planning
    - Vendor Contract Negotiation
    type: keywords_present
  name: conflict_events_identified
  weight: 0.15
- check:
    keywords:
    - '2025-02-14'
    - conflict
    - free
    type: keywords_present
  name: free_vs_busy_accuracy
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s conflict summary for the 2025-02-14 leadership
      sync planning request. The correct findings are: - sarah.chen: BUSY — has "Q1
      Budget Review" (09:00–10:30), "Product Launch Debrief" (13:00–14:00), and "1:1
      with CEO" (16:00–16:30) - marcus.obi: BUSY — has "Team Standup" (08:30–08:45)
      and "Engineering Roadmap Planning" (11:00–12:30) - priya.nair: BUSY — has "Vendor
      Contract Negotiation" (14:00–15:30) - tom.walsh: BUSY — has "Q1 Budget Review"
      (09:00–10:30) and "Product Launch Debrief" (13:00–14:00) Score 1.0 if: all four
      leaders are assessed, all conflicts are named with times, and a clear recommendation
      is given (e.g., reschedule since all have conflicts). Score 0.7 if: all four
      leaders are assessed and most conflicts are named but minor details are missing.
      Score 0.4 if: only 2–3 leaders are assessed or significant conflicts are omitted.
      Score 0.0 if: the output is vague, incorrect, or fails to address the scheduling
      question.

      '
    type: llm_judge
  name: output_quality_and_completeness
  weight: 0.3
- check:
    rubric: 'Does the agent''s response include a concrete recommendation for HR about
      whether to proceed with the 2025-02-14 all-hands leadership sync? Since all
      four leaders (sarah.chen, marcus.obi, priya.nair, tom.walsh) have at least one
      conflict on that date, the correct recommendation is to reschedule or find a
      time window that avoids all conflicts. Score 1.0 if a clear, actionable recommendation
      is given with reasoning. Score 0.5 if a recommendation is implied but not explicitly
      stated. Score 0.0 if no recommendation is provided.

      '
    type: llm_judge
  name: recommendation_provided
  weight: 0.1
task_id: calendar-035
task_name: Cross-Team Availability Conflict Detector
tools:
- description: Retrieve all calendar events for a specific user on a given date
  endpoint: /calendar/user_events
  method: POST
  name: user_events
  service: calendar
- description: List all calendar events for a date range
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get detailed information about a specific event by its ID
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
