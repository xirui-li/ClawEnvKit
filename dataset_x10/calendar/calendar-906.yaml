  name: list_events
  service: calendar
- description: Get full details for a specific event by ID
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Create a new calendar event
  endpoint: /calendar/events/create
  method: POST
  name: create_event
  service: calendar
- description: Delete a calendar event by ID
  endpoint: /calendar/events/delete
  method: POST
  name: delete_event
  service: calendar
- description: Get events for a specific user on a specific date
  endpoint: /calendar/user_events
  method: POST
  name: user_events
  service: calendar
