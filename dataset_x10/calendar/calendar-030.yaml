    field: location
    service: calendar
    type: audit_field_equals
    value: Photo Intake Room
  name: correct_location_used
  weight: 0.1
- check:
    action: create_event
    field: attendees
    service: calendar
    type: audit_field_contains
    value: maya.ortiz@northlightgallery.org
  name: correct_attendees_included
  weight: 0.1
- check:
    actions:
    - user_events
    - create_event
    service: calendar
    type: audit_sequence
  name: logical_order_lookup_before_create
  weight: 0.1
- check:
    keywords:
    - '11:45'
    - '12:30'
    - Photo Intake Room
    - Archive Box Handoff
    type: keywords_present
  name: output_mentions_booked_time_and_place
  weight: 0.1
- check:
    keywords:
    - '10:30'
    - '11:00'
    - '13:00'
    type: keywords_absent
  name: output_avoids_false_conflict_claims
  weight: 0.05
- check:
    rubric: Evaluate whether the response correctly identifies and communicates a
      valid 45-minute overlap for Maya Ortiz and Leo Bennett on 2025-09-18 based on
      the fixture events. Maya is busy 09:00-09:30, 10:00-11:00, 11:30-12:00, and
      13:00-13:30; Leo is busy 09:30-10:15, 11:00-11:45, and 13:00-13:30. The best
      same-day 45-minute slot is 11:45-12:30, and the created event should be 'Archive
      Box Handoff' in Photo Intake Room with both attendees. Score 1.0 if the response
      clearly states the booked time, confirms both attendees, and is consistent with
      the fixtures; 0.5 if the event is created but the explanation is incomplete
      or slightly unclear; 0.0 if the booked slot conflicts with fixture events or
      key details are wrong.
    type: llm_judge
  name: scheduling_quality
  weight: 0.15
