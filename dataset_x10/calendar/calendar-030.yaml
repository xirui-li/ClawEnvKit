scoring_components:
- check:
    action: user_events
    service: calendar
    type: audit_action_exists
  name: used_user_event_lookup
  weight: 0.15
- check:
    action: create_event
    service: calendar
    type: audit_action_exists
  name: created_handoff_event
  weight: 0.15
- check:
    action: create_event
    field: title
    service: calendar
    type: audit_field_equals
    value: Archive Box Handoff
  name: correct_title_used
  weight: 0.1
- check:
