  name: created_replacement_event
  weight: 0.1
- check:
    action: delete_event
    service: calendar
    type: audit_action_exists
  name: deleted_original_event
  weight: 0.1
- check:
    action: create_event
    field: title
    service: calendar
    type: audit_field_contains
    value: debrief
  name: replacement_title_is_debrief
  weight: 0.1
- check:
    action: create_event
    field: location
    service: calendar
    type: audit_field_equals
    value: Atlas Studio Kitchen
  name: kept_same_location
  weight: 0.1
- check:
    actions:
    - get_event
    - user_events
    - create_event
    - delete_event
    service: calendar
    type: audit_sequence
  name: correct_order_replace_then_remove
  weight: 0.1
- check:
    keywords:
    - EVT-2041
    - Priya Nair
    - Atlas Studio Kitchen
    - 930
    - 960
    type: keywords_present
  name: output_mentions_key_results
  weight: 0.1
- check:
    rubric: Evaluate whether the response clearly and accurately explains the outcome
      using the fixture details. Full credit (1.0) if it states that EVT-2041 'Zero-proof
      Beverage Tasting' conflicted with Priya Nair's 14:30-15:00 Investor Prep Call,
      that the original event was replaced with a 30-minute debrief later that afternoon,
      and that the final scheduled time is 15:30-16:00 at Atlas Studio Kitchen for
      the same attendees (Priya Nair, Mateo Silva, Jules Park). Partial credit (0.5)
      if the response gets the replacement action right but omits one key detail such
      as the conflict reason, exact time, location, or attendee continuity. No credit
      (0.0) if it reports an incorrect time, fails to indicate replacement, or contradicts
      the fixture data.
    type: llm_judge
  name: response_quality
  weight: 0.15
