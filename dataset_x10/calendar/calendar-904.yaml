    type: keywords_present
  name: output_mentions_booked_time
  weight: 0.1
- check:
    keywords:
    - Maya Chen
    - Omar Haddad
    type: keywords_present
  name: output_mentions_both_attendees
  weight: 0.1
- check:
    keywords:
    - deleted
    - canceled
    type: keywords_absent
  name: no_irrelevant_deletion
  weight: 0.05
- check:
    rubric: Evaluate whether the agent correctly identified a conflict-free 45-minute
      slot for both Maya Chen and Omar Haddad on 2025-06-18 and communicated the result
      clearly. Based on the fixtures, Maya is busy 09:00-10:00, 11:30-12:00, and 14:30-15:00;
      Omar is busy 10:30-11:15, 11:30-12:00, and 13:00-14:00. The earliest valid shared
      45-minute opening after the joint 11:30-12:00 meeting is 12:00-12:45, and the
      created event should be 'Wetlands Field Recording Handoff' in Studio B with
      both attendees. Score 1.0 if the response clearly states that it booked the
      event for Maya Chen and Omar Haddad from 12:00 to 12:45 on 2025-06-18 at Studio
      B; 0.7 if the booking is correct but the explanation is incomplete or slightly
      unclear; 0.4 if it schedules a plausible but non-earliest shared slot or omits
      a key detail like location or attendee confirmation; 0.0 if the time conflicts
      with fixture events or the response misstates the booking.
    type: llm_judge
  name: scheduling_quality
  weight: 0.25
