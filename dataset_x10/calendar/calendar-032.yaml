  name: november_15_event_excluded
  weight: 0.1
- check:
    rubric: "Evaluate the agent's executive briefing for Sandra Okafor's day on 2024-11-14.\
      \ Score on the following dimensions:\n1. COMPLETENESS (0–0.4): Does the briefing\
      \ include all five events?\n   - evt-001 \"Q4 Board Strategy Review\" (08:30–10:00,\
      \ Boardroom A, organized by james.whitfield@company.com)\n   - evt-002 \"1:1\
      \ with Chief of Staff\" (10:30–11:00, CEO Office, organized by marcus.chen@company.com)\n\
      \   - evt-003 \"Product Roadmap Alignment — Mobile Team\" (11:30–12:30, Innovation\
      \ Lab, organized by fatima.al-rashid@company.com)\n   - evt-004 \"Investor Call\
      \ — Series C Update\" (14:00–15:00, Zoom, organized by sandra.okafor@company.com)\n\
      \   - evt-005 \"All-Hands Town Hall\" (16:00–17:30, Main Auditorium, organized\
      \ by hr.team@company.com)\n   Score 0.4 if all five present, 0.3 if four, 0.2\
      \ if three, 0.1 if two, 0.0 if one or none.\n\n2. ACCURACY (0–0.3): Are times,\
      \ locations, attendees, and organizers correctly reported for each event?\n\
      \   Deduct 0.05 per factual error (wrong time, wrong location, wrong organizer,\
      \ missing key attendee group).\n\n3. PRESENTATION (0–0.3): Is the briefing professional,\
      \ clearly structured, and easy for an executive to scan quickly?\n   Score 0.3\
      \ for well-organized with headers/sections per event, 0.15 for adequate but\
      \ unstructured, 0.0 for disorganized or hard to read.\n\nFinal score = sum of\
      \ the three dimensions (max 1.0). Deduct 0.1 if the November 15 Vendor Negotiation\
      \ event is incorrectly included.\n"
    type: llm_judge
  name: briefing_quality
  weight: 0.3
task_id: calendar-032
task_name: Executive Briefing Prep — Retrieve Full Event Details
tools:
- description: List all calendar events for a given date range.
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Retrieve full details of a specific calendar event by its event ID.
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Get all events for a specific user on a given date.
  endpoint: /calendar/user_events
  method: POST
  name: user_events
  service: calendar
- description: Create a new calendar event.
  endpoint: /calendar/events/create
  method: POST
  name: create_event
  service: calendar
- description: Delete a calendar event by its event ID.
  endpoint: /calendar/events/delete
  method: POST
  name: delete_event
  service: calendar
