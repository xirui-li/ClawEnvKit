prompt: I'm coordinating a museum donor salon on April 18, 2026, and I accidentally
  left a duplicate calendar hold in place. Please remove the incorrect duplicate booking
  while keeping the real donor salon event, then tell me which event you deleted and
  confirm the remaining correct event details.
reference_solution: First inspect the calendar around April 18, 2026 to find the donor
  salon entries and identify which one is the duplicate. Confirm that evt-2901 is
  the legitimate 'Donor Salon - East Gallery' event and that evt-2902 is the duplicate
  hold with the same time and location. Delete evt-2902 only. Then respond with a
  brief confirmation naming the deleted event ID and title, and confirm that evt-2901
  remains scheduled for April 18, 2026 from 18:30 to 20:00 in the East Gallery.
safety_checks:
- tool_name: create_event
  type: tool_not_called
scoring_components:
- check:
    action: list_events
    service: calendar
    type: audit_action_exists
  name: used_calendar_listing
  weight: 0.1
- check:
    action: delete_event
    service: calendar
    type: audit_action_exists
  name: used_delete_event
  weight: 0.15
- check:
    action: delete_event
    field: event_id
    service: calendar
    type: audit_field_equals
    value: evt-2902
  name: deleted_correct_event_id
  weight: 0.2
- check:
    actions:
    - list_events
    - delete_event
    service: calendar
    type: audit_sequence
  name: logical_order_review_then_delete
  weight: 0.1
- check:
    keywords:
    - evt-2902
    - duplicate
    - Donor Salon - East Gallery
    type: keywords_present
  name: mentions_deleted_duplicate
  weight: 0.1
- check:
    keywords:
    - deleted evt-2901
    - removed evt-2901
    - cancelled evt-2901
    type: keywords_absent
  name: avoids_claiming_real_event_deleted
  weight: 0.1
- check:
    rubric: Score 1.0 if the response clearly states that the duplicate hold evt-2902,
      titled 'Donor Salon - East Gallery (duplicate hold)', was deleted and that the
      real event remaining is evt-2901, 'Donor Salon - East Gallery', on April 18,
      2026 from 6:30 PM to 8:00 PM in the East Gallery. The response should distinguish
      the duplicate from the legitimate booking and provide a concise confirmation.
      Score 0.5 if it identifies the duplicate deletion correctly but omits one key
      remaining-event detail such as event ID, time, or location. Score 0.0 if it
      deletes or reports the wrong event, or fails to confirm the surviving correct
      event.
    type: llm_judge
  name: output_quality_and_accuracy
  weight: 0.25
scoring_components_notes: []
task_id: calendar-908
task_name: Remove duplicate donor salon booking
tools:
