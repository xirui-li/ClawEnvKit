  method: POST
  name: get_event
  service: calendar
- description: Create a calendar event
  endpoint: /calendar/events/create
  method: POST
  name: create_event
  service: calendar
- description: Delete a calendar event
  endpoint: /calendar/events/delete
  method: POST
  name: delete_event
  service: calendar
- description: Get events for a specific user on a date
  endpoint: /calendar/user_events
  method: POST
  name: user_events
  service: calendar
