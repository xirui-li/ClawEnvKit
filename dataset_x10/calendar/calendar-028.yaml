- check:
    rubric: Evaluate whether the agent scheduled an appropriate 45-minute meeting
      for Maya Patel, Jordan Lee, and Elena Gomez on April 18, 2025 during business
      hours, based on the fixture conflicts. Strong answers should reflect that Maya
      is busy 09:00-09:30, 13:00-13:30, and 14:00-14:30; Jordan is busy 09:00-09:30,
      11:30-12:00, and 15:00-15:30; Elena is busy 10:00-11:00, 14:00-14:30, and 15:00-15:30.
      A fully correct answer identifies a valid shared slot such as 12:00-12:45 or
      13:30-14:15, states the scheduled time clearly, and mentions at least one relevant
      conflict it avoided. Score 1.0 for a correct slot with clear explanation, 0.5
      for a plausible but incomplete explanation, 0.0 for an invalid or conflicting
      schedule.
    type: llm_judge
  name: scheduling_quality
  weight: 0.2
