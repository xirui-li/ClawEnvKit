prompt: We need to set up a 45-minute emergency war room for the cold brew canning
  recall on April 18, 2025. Find a time that works for Maya Patel, Jordan Lee, and
  Elena Gomez during business hours, book it in the Recall Ops Room, and tell me the
  scheduled time plus any relevant conflicts you worked around.
reference_solution: '1. Check April 18, 2025 availability for Maya Patel, Jordan Lee,
  and Elena Gomez using the user-specific calendar lookup.

  2. Compare their conflicts during business hours and identify a 45-minute overlap
  that is free for all three attendees.

  3. Valid shared options include 12:00-12:45 and 13:30-14:15; choose one valid slot.

  4. Create a new event titled "Cold Brew Recall War Room" in the "Recall Ops Room"
  with the three attendees and the chosen 45-minute time.

  5. Respond with the scheduled date/time, location, attendees, and a brief note about
  conflicts avoided such as Elena''s 10:00-11:00 QA Lab Retest Review and the 14:00-14:30
  Retailer Statement Draft Review involving Maya and Elena.'
