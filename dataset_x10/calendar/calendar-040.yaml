    field: title
    service: calendar
    type: audit_field_equals
    value: Costume Fitting Handoff
  name: correct_title_used
  weight: 0.1
- check:
    action: create_event
    field: location
    service: calendar
    type: audit_field_equals
    value: Wardrobe Studio B
  name: correct_location_used
  weight: 0.1
- check:
    keywords:
    - '2025-07-18'
    - '12:00'
    - '12:30'
    - Wardrobe Studio B
    type: keywords_present
  name: output_mentions_booked_time
  weight: 0.1
- check:
    keywords:
    - Maya Chen
    - Leo Park
    type: keywords_present
  name: output_mentions_attendees
  weight: 0.1
- check:
    keywords:
    - deleted
    - canceled
    type: keywords_absent
  name: no_irrelevant_deletion
  weight: 0.05
- check:
    rubric: Evaluate whether the agent correctly identified a conflict-free 30-minute
      slot for both Maya Chen and Leo Park on 2025-07-18 using the fixture schedule.
      The correct shared opening before their 13:00 Matinee Cue Sync is 12:00-12:30,
      since Maya Chen is busy at 09:00-09:30, 10:00-11:00, 11:30-12:00 and Leo Park
      is busy at 09:30-10:00, 10:00-11:00, 11:00-11:30, with both busy again at 13:00-14:00.
      Score 1.0 if the response clearly states that 'Costume Fitting Handoff' was
      booked for 12:00-12:30 in Wardrobe Studio B for Maya Chen and Leo Park, with
      no contradictions. Score 0.5 if the response is partially correct but misses
      one key detail such as location, attendee confirmation, or exact end time. Score
      0.0 if it gives an incorrect time, ignores conflicts, or fails to confirm the
      booking.
    type: llm_judge
  name: response_quality_and_accuracy
  weight: 0.25
