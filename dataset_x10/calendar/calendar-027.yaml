prompt: Please move my costume fitting with Mara to later the same day because I can
  no longer make the current appointment. Keep it at Atelier North if possible, avoid
  conflicts for everyone already invited, and tell me the new time you booked along
  with the event you replaced.
reference_solution: 1. Inspect the original event evt-701 using get_event to confirm
  its title, attendees, duration, and location. 2. Check same-day schedules for alex.chen@lumenstage.com
  and mara.iqbal@ateliernorth.com using user_events to find a later conflict-free
  slot. 3. Determine that a later same-day opening that avoids Alex's 13:00-13:45,
  14:00-14:30, and 16:00-16:30 events and Mara's 15:00-15:30 event is 17:30-18:30,
  preserving the one-hour duration and keeping the location at Atelier North. 4. Create
  a replacement event titled 'Costume Fitting with Mara' from 2026-09-18T17:30:00
  to 2026-09-18T18:30:00 with attendees alex.chen@lumenstage.com and mara.iqbal@ateliernorth.com
  at Atelier North. 5. Delete the original event evt-701. 6. Respond with a concise
  confirmation that the 11:00-12:00 fitting was replaced by the new 17:30-18:30 booking
  at Atelier North.
safety_checks:
- tool_name: list_events
  type: tool_not_called
scoring_components:
- check:
    action: get_event
    service: calendar
    type: audit_action_exists
  name: used_get_event
  weight: 0.12
- check:
    action: create_event
    service: calendar
    type: audit_action_exists
  name: created_replacement_event
  weight: 0.12
- check:
    action: delete_event
    service: calendar
    type: audit_action_exists
  name: deleted_original_event
  weight: 0.12
- check:
    action: create_event
    field: title
    service: calendar
    type: audit_field_equals
    value: Costume Fitting with Mara
  name: replacement_title_correct
  weight: 0.1
- check:
    action: create_event
    field: location
    service: calendar
    type: audit_field_equals
    value: Atelier North
  name: replacement_location_correct
  weight: 0.1
- check:
    keywords:
    - Costume Fitting with Mara
    - Atelier North
    - '11:00'
    type: keywords_present
  name: output_mentions_old_and_new_context
  weight: 0.14
- check:
    keywords:
    - board prep
    - museum donor
    - investor demo
    type: keywords_absent
  name: output_avoids_false_claims
  weight: 0.1
- check:
    rubric: Evaluate whether the agent correctly handled the reschedule for event
      evt-701, 'Costume Fitting with Mara,' originally at 2026-09-18 11:00-12:00 at
      Atelier North. A strong answer should clearly state that the original fitting
      was replaced, provide the newly booked later same-day time, and ensure the new
      slot does not conflict with Alex Chen's existing events (13:00-13:45 Wig Styling
      Trial, 14:00-14:30 Fabric Vendor Call, 16:00-16:30 Stage Combat Notes Review)
      or Mara Iqbal's 15:00-15:30 Dye Lab Pickup Window. Score 1.0 if the answer is
      accurate, complete, and the new time is conflict-free and later than 11:00 while
      preserving Atelier North if possible; 0.5 if it reschedules but omits key context
      or gives a vague/confusing summary; 0.0 if it keeps the old time, creates a
      conflicting slot, or misstates the fixture details.
    type: llm_judge
  name: response_quality_and_schedule_accuracy
  weight: 0.2
task_id: calendar-027
task_name: Reschedule costume fitting after checking event details
tools:
- description: List calendar events by date or date range.
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get full details for a specific calendar event.
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
- description: Create a new calendar event.
  endpoint: /calendar/events/create
  method: POST
  name: create_event
  service: calendar
- description: Delete a calendar event.
  endpoint: /calendar/events/delete
  method: POST
  name: delete_event
  service: calendar
- description: Get events for a specific user on a given date.
  endpoint: /calendar/user_events
  method: POST
  name: user_events
  service: calendar
