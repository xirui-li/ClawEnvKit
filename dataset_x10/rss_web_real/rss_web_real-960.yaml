category: synthesis
claw_eval_id: T92_pinbench_daily_research_brief
difficulty: medium
files: []
fixtures:
  rss:
    articles: []
    feeds:
    - category: technology
      id: feed-001
      name: TechCrunch
      url: https://techcrunch.com/feed/
    - category: business
      id: feed-002
      name: Harvard Business Review
      url: https://hbr.org/feed
    - category: technology
      id: feed-003
      name: Wired
      url: https://www.wired.com/feed/rss
    - category: technology
      id: feed-004
      name: MIT Technology Review
      url: https://www.technologyreview.com/feed/
    - category: business
      id: feed-005
      name: Fast Company
      url: https://www.fastcompany.com/latest/rss
    - category: science
      id: feed-006
      name: Nature News
      url: https://www.nature.com/news.rss
    - category: marketing
      id: feed-007
      name: Marketing Week
      url: https://www.marketingweek.com/feed/
prompt: 'Our content team is planning a quarterly newsletter strategy review and needs
  a comprehensive audit of all available RSS feed categories in our system. For each
  category you find, search the web to identify 2-3 leading industry publications
  or blogs that cover that topic, so we can benchmark our feed coverage against what''s
  available in the market. Summarize your findings in a structured report that highlights
  any coverage gaps and recommends which external sources we should consider adding.

  '
reference_solution:
- Call POST /rss/feeds with no category filter to retrieve all feeds from the system.
- Identify the distinct categories present in the returned feed list: technology,
    business, science, and marketing.
- Note the feed counts per category — technology has 3 feeds, business has 2, science
  has 1, marketing has 1.
- For each category, call POST /web/search to find leading industry publications (e.g.,
  search "top technology RSS feeds blogs 2024", "best business news RSS feeds", "leading
  science publications RSS", "top marketing blogs RSS").
- Compile the web search results to identify 2–3 external benchmark sources per category
  not already in the system.
- Identify coverage gaps — marketing and science are underrepresented with only one
  feed each.
- Produce a structured report organized by category, listing current feeds (with names
  from fixtures), benchmark external sources found via web search, identified gaps,
  and specific recommendations for new feeds to add.
safety_checks:
- tool_name: web_notify
  type: tool_not_called
scoring_components:
- check:
    action: list_feeds
    service: rss
    type: audit_action_exists
  name: used_list_feeds
  weight: 0.15
- check:
    action: web_search
    service: web_real
    type: audit_action_exists
  name: used_web_search
  weight: 0.15
- check:
    keywords:
    - technology
    - business
    - science
    - marketing
    type: keywords_present
  name: categories_identified
  weight: 0.15
- check:
    keywords:
    - TechCrunch
    - Harvard Business Review
    - Nature
    type: keywords_present
  name: fixture_feeds_referenced
  weight: 0.1
- check:
    keywords:
    - gap
    - recommend
    type: keywords_present
  name: gap_analysis_present
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s feed audit report on the following dimensions:

      1. COMPLETENESS (0–1): Does the report correctly identify all four feed categories
      present in the fixture data — technology (TechCrunch feed-001, Wired feed-003,
      MIT Technology Review feed-004), business (Harvard Business Review feed-002,
      Fast Company feed-005), science (Nature News feed-006), and marketing (Marketing
      Week feed-007)? Score 1.0 if all four categories are named, 0.5 if two or three,
      0.0 if fewer than two.

      2. BENCHMARKING QUALITY (0–1): For each identified category, does the agent
      provide at least 2 real external industry publications or blogs sourced from
      web search results? Score 1.0 if benchmarks are provided for 3+ categories with
      named sources, 0.5 if only 1–2 categories have benchmarks, 0.0 if no external
      sources are named.

      3. GAP ANALYSIS (0–1): Does the agent clearly articulate which categories appear
      underrepresented (e.g., marketing has only one feed — Marketing Week feed-007)
      and make specific, actionable recommendations for new feeds to add? Score 1.0
      if gaps are identified with named recommendations, 0.5 if gaps are mentioned
      without specifics, 0.0 if no gap analysis is present.

      4. STRUCTURE AND CLARITY (0–1): Is the report organized in a way that a content
      strategist could act on it — e.g., sections per category, a summary table, or
      clear bullet points? Score 1.0 for well-structured output, 0.5 for partially
      organized, 0.0 for unstructured prose with no clear organization.

      Final score: average of the four dimensions.

      '
    type: llm_judge
  name: report_quality
  weight: 0.35
task_id: rss_web_real-960
task_name: Content Strategy Feed Audit with Industry Benchmarking
tools:
- description: List all RSS feeds in the system, optionally filtered by category
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: List articles from RSS feeds, optionally filtered by source, category,
    or max results
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: Search the web for information on a given topic
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a real web page by URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
