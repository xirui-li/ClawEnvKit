  name: list_feeds
  service: rss
- description: List articles from RSS feeds, optionally filtered by source or category
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: Get full details of a specific article by its ID
  endpoint: /rss/articles/get
  method: POST
  name: get_rss_article
  service: rss
- description: Search the real web for recent news and information
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a real web page by URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: Publish a newsletter with a title, content, and list of recipients
  endpoint: /rss/publish
  method: POST
  name: publish_newsletter
  service: rss
