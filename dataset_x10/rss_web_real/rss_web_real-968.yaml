tools:
- description: List articles from RSS feeds, optionally filtered by source, category,
    or max results
  endpoint: /rss/articles
  method: POST
  name: list_articles
  service: rss
- description: List available RSS feeds, optionally filtered by category
  endpoint: /rss/feeds
  method: POST
  name: list_feeds
  service: rss
- description: Get the full details of a specific article by its ID
  endpoint: /rss/articles/get
  method: POST
  name: get_rss_article
  service: rss
- description: Publish a newsletter with a title, content, and list of recipients
  endpoint: /rss/publish
  method: POST
  name: publish_newsletter
  service: rss
- description: Search the real web for current news, trends, and discussions
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the content of a real web page by URL
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
