prompt: 'Our legal team needs a summary of the post-merger integration planning meeting
  that took place in October 2023. Find the relevant meeting notes and provide a clear
  summary including the key decisions made, action items assigned, and the names of
  all attendees present at that meeting.

  '
reference_solution:
- Call list_notes to retrieve an overview of available notes and identify candidates
  related to the merger.
- Identify note-002 ("Post-Merger Integration Planning — Phase 1", dated 2023-10-12)
  as the relevant note based on its title and tags.
- Call get_note with note_id "note-002" to retrieve the full content of the meeting
  notes.
- Parse the retrieved content and compose a clear summary covering the three key decisions
  (IT consolidation, HR onboarding, brand transition), the three action items with
  owners and deadlines (James Okafor by Oct 20, Priya Nair by Oct 25, Rachel Stein
  by Nov 5), and the full attendee list (James Okafor, Priya Nair, Rachel Stein, Marcus
  Webb, Diana Torres).
- Present the summary in a structured, readable format for the legal team without
  sharing or modifying the note.
