prompt: 'Our legal and finance teams just wrapped up a series of post-merger integration
  meetings last month, and the relevant stakeholders still haven''t received the notes.
  Find the meeting notes related to the merger integration, then share them with the
  appropriate attendees listed in each note. Summarize what you shared and with whom.

  '
reference_solution:
- Call list_notes to retrieve the available notes and identify candidates.
- Review the titles and tags of returned notes to identify merger-related ones (note-001,
  note-002, note-003, note-005, note-007).
- Call get_note for each merger-related note to retrieve full content and attendee
  lists.
- Call share_note for note-001 with recipients [sarah.chen@acme.com, tom.harris@acme.com,
  linda.park@acme.com].
- Call share_note for note-002 with recipients [james.okafor@acme.com, priya.nair@acme.com,
  linda.park@acme.com].
- Call share_note for note-003 with recipients [rachel.kim@acme.com, tom.harris@acme.com,
  james.okafor@acme.com].
- Call share_note for note-005 with recipients [sarah.chen@acme.com, devops.lead@acme.com,
  linda.park@acme.com].
- Call share_note for note-007 with recipients [linda.park@acme.com, hr.director@acme.com,
  tom.harris@acme.com].
- Skip note-004 (product roadmap) and note-006 (customer success standup) as they
  are not merger-related.
- Provide a summary listing each shared note by title and ID, and the recipients it
  was shared with.
