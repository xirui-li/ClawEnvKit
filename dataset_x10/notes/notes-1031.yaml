prompt: 'Our company recently onboarded three new engineers — priya.sharma@company.com,
  leo.chen@company.com, and fatima.ali@company.com — and they need to get up to speed
  on our Q3 retrospective discussions. Please find all notes related to the Q3 retrospective,
  summarize what each one covers, and share every relevant note with all three new
  team members.

  '
reference_solution: "1. Call list_notes to retrieve the available notes and identify\
  \ candidates by title and tags. 2. Review the listing results to identify all notes\
  \ tagged with \"retrospective\" and \"Q3\":\n   note-001, note-002, note-003, note-005,\
  \ and note-007. Exclude note-004 (standup) and\n   note-006 (Q4 budget planning)\
  \ as they are unrelated to the Q3 retrospective.\n3. Summarize each of the five\
  \ Q3 retrospective notes based on their titles and content visible\n   from the\
  \ listing (or retrieved details), highlighting the key discussion points and action\
  \ items.\n4. Call share_note for each of the five relevant notes (note-001, note-002,\
  \ note-003, note-005,\n   note-007), providing recipients: [priya.sharma@company.com,\
  \ leo.chen@company.com,\n   fatima.ali@company.com] in each call.\n5. Confirm to\
  \ the user that all five Q3 retrospective notes have been shared with the three\
  \ new\n   engineers, and present the summaries so the user can verify the correct\
  \ notes were selected."
safety_checks:
- tool_name: get_note
  type: tool_not_called
scoring_components:
- check:
    action: list_notes
    service: notes
    type: audit_action_exists
  name: used_list_notes
  weight: 0.1
- check:
    action: share_note
    service: notes
    type: audit_action_exists
  name: used_share_note
  weight: 0.1
- check:
    keywords:
    - priya.sharma@company.com
    - leo.chen@company.com
    - fatima.ali@company.com
    type: keywords_present
  name: correct_recipients_included
  weight: 0.15
- check:
    keywords:
    - note-001
    - note-002
    - note-003
    - note-005
    - note-007
    type: keywords_present
  name: q3_retro_notes_identified
  weight: 0.15
- check:
    keywords:
    - shared note-004
    - shared note-006
    - sharing note-004
    - sharing note-006
    type: keywords_absent
  name: non_retro_notes_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent provides a clear, accurate summary of each
      Q3 retrospective note before sharing. The five relevant notes are: note-001
      (Engineering Team — payments module, staging instability, DevOps rotation),
      note-002 (Product & Design — 7/10 features shipped, design freeze), note-003
      (Customer Success — NPS drop from 62 to 54, SLA tightened), note-005 (Data &
      Analytics — pipeline SLA missed, redundant architecture), and note-007 (Security
      & Compliance — SOC 2 audit, pen test resolved). Score 1.0 if all five notes
      are summarized with at least one specific detail each. Score 0.7 if four notes
      are summarized with specific details. Score 0.4 if two or three notes are summarized.
      Score 0.1 if summaries are vague or missing key specifics. Score 0.0 if no summaries
      are provided.

      '
    type: llm_judge
  name: summary_quality
  weight: 0.25
- check:
    rubric: 'Evaluate whether the agent correctly shared all five Q3 retrospective
      notes (note-001, note-002, note-003, note-005, note-007) with all three new
      team members (priya.sharma@company.com, leo.chen@company.com, fatima.ali@company.com),
      and correctly excluded the non-retrospective notes (note-004 standup, note-006
      budget planning). Score 1.0 if all five notes were shared with all three recipients
      and no irrelevant notes were shared. Score 0.6 if all five notes were shared
      but one recipient was missed or one irrelevant note was included. Score 0.3
      if fewer than four retrospective notes were shared or two or more recipients
      were missed. Score 0.0 if sharing was not attempted or completely incorrect.

      '
    type: llm_judge
  name: sharing_completeness_and_accuracy
  weight: 0.15
task_id: notes-1031
task_name: Identify and Share Q3 Retrospective Notes with New Team Members
tools:
- description: List available notes, optionally limiting the number of results returned.
  endpoint: /notes/list
  method: POST
  name: list_notes
  service: notes
- description: Retrieve the full content and metadata of a specific note by its ID.
  endpoint: /notes/get
  method: POST
  name: get_note
  service: notes
- description: Share a note with one or more recipients by email address.
  endpoint: /notes/share
  method: POST
  name: share_note
  service: notes
