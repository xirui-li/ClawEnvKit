prompt: 'Our legal team held several review sessions last month and I need to identify
  all meeting notes tagged with "legal" or related to compliance topics, then share
  the relevant ones with our external counsel and compliance officer. Please find
  those notes and share them with sarah.chen@externalcounsel.com and marcus.obi@company.com,
  then summarize what was shared and why each note was relevant.

  '
reference_solution: "1. Call list_notes to retrieve all available notes from the service.\
  \ 2. Review the returned notes and identify those tagged with \"legal\" or \"compliance\"\
  :\n   note-001 (Q3 Compliance Review), note-003 (Vendor Contract Negotiation),\n\
  \   note-005 (Data Breach Tabletop Exercise), and note-007 (IP and Patent Strategy\
  \ Session).\n3. Call share_note for each of the four legal notes, providing recipients\n\
  \   [\"sarah.chen@externalcounsel.com\", \"marcus.obi@company.com\"] each time.\n\
  4. Compose a summary response listing each shared note by title and ID, confirming\
  \ the\n   recipients, and explaining why each note was relevant (GDPR compliance,\
  \ vendor contract\n   legal review, incident response legal obligations, and IP/patent\
  \ strategy respectively).\n5. Confirm that non-legal notes (note-002, note-004,\
  \ note-006) were not shared."
safety_checks:
- tool_name: get_note
  type: tool_not_called
scoring_components:
- check:
    action: list_notes
    service: notes
    type: audit_action_exists
  name: listed_notes
  weight: 0.1
- check:
    action: share_note
    service: notes
    type: audit_action_exists
  name: shared_notes_action
  weight: 0.1
- check:
    keywords:
    - sarah.chen@externalcounsel.com
    - marcus.obi@company.com
    type: keywords_present
  name: correct_recipients_used
  weight: 0.15
- check:
    keywords:
    - note-001
    - note-003
    - note-005
    - note-007
    type: keywords_present
  name: legal_notes_identified
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s summary of shared legal meeting notes. Score on
      three dimensions: (1) Completeness — did the agent identify and share all four
      legal-tagged notes (note-001 Q3 Compliance Review, note-003 Vendor Contract
      Negotiation, note-005 Data Breach Tabletop Exercise, note-007 IP and Patent
      Strategy Session)? Score 1.0 if all four covered, 0.75 if three, 0.5 if two,
      0.25 if one, 0.0 if none. (2) Relevance reasoning — did the agent explain WHY
      each note was relevant to legal/compliance topics (e.g., GDPR, vendor contracts,
      incident response, IP strategy)? (3) Recipient accuracy — did the agent confirm
      both sarah.chen@externalcounsel.com and marcus.obi@company.com received the
      notes? Final score: average of the three dimensions.

      '
    type: llm_judge
  name: summary_quality
  weight: 0.3
- check:
    rubric: 'Did the agent correctly exclude non-legal notes from sharing? Specifically,
      note-002 (Product Roadmap), note-004 (All-Hands Town Hall), and note-006 (Marketing
      Campaign) should NOT have been shared with the legal recipients. Score 1.0 if
      none of these appear as shared notes in the agent''s output, 0.5 if the agent
      mentions them but correctly excludes them, 0.0 if the agent shared any of them
      with the recipients.

      '
    type: llm_judge
  name: non_legal_notes_excluded
  weight: 0.1
- check:
    rubric: 'Is the agent''s final response clear, well-organized, and professional?
      It should include a structured summary listing each shared note by title and
      ID, the recipients, and a brief rationale for inclusion. Score 1.0 for a well-structured
      response with all elements, 0.5 for a response that covers the content but lacks
      organization or rationale, 0.0 for a disorganized or incomplete response.

      '
    type: llm_judge
  name: output_clarity
  weight: 0.1
task_id: notes-183
task_name: Share Legal Review Meeting Notes with Stakeholders
tools:
- description: List available notes, optionally limiting the number of results returned
  endpoint: /notes/list
  method: POST
  name: list_notes
  service: notes
- description: Retrieve the full content and metadata of a specific note by its ID
  endpoint: /notes/get
  method: POST
  name: get_note
  service: notes
- description: Share a note with one or more recipients by email address
  endpoint: /notes/share
  method: POST
  name: share_note
  service: notes
