prompt: 'Our CFO, Sandra Okafor, missed last week''s board meeting and needs to review
  the notes urgently. Find the board meeting notes from last week, confirm the key
  decisions and action items discussed, and share them with Sandra (sandra.okafor@company.com)
  and her deputy, Marcus Trent (marcus.trent@company.com).

  '
reference_solution: "1. Call list_notes to browse available notes and identify candidates\
  \ related to a board meeting. 2. Review the listing and identify note-002 (\"Board\
  \ Meeting — Strategic Priorities and Capital\n   Allocation\", 2024-10-07) as the\
  \ most recent board meeting note from last week.\n3. Call get_note with note_id=\"\
  note-002\" to retrieve the full content of the board meeting notes. 4. Read and\
  \ summarize the key decisions: $2.1M data center capex approved, Project Falcon\n\
  \   greenlit for Q1 2025, Series C deferred to Q2 2025; and action items for David\
  \ Solis and\n   James Whitfield.\n5. Call share_note with note_id=\"note-002\" and\
  \ recipients=[\"sandra.okafor@company.com\",\n   \"marcus.trent@company.com\"] to\
  \ share the note with the CFO and her deputy.\n6. Report back to the user with a\
  \ summary of the board meeting decisions and confirmation\n   that the note has\
  \ been shared with both Sandra Okafor and Marcus Trent."
safety_checks:
- tool_name: list_notes
  type: tool_not_called
scoring_components:
- check:
    action: get_note
    service: notes
    type: audit_action_exists
  name: retrieved_board_meeting_note
  weight: 0.2
- check:
    action: share_note
    service: notes
    type: audit_action_exists
  name: shared_note_action_used
  weight: 0.1
- check:
    action: share_note
    field: note_id
    service: notes
    type: audit_field_equals
    value: note-002
  name: correct_note_shared
  weight: 0.15
- check:
    keywords:
    - Project Falcon
    - data center
    - Series C
    - 2.1M
    type: keywords_present
  name: key_decisions_mentioned
  weight: 0.15
- check:
    keywords:
    - sandra.okafor@company.com
    - marcus.trent@company.com
    type: keywords_present
  name: recipients_in_output
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response on three dimensions:

      1. CORRECT NOTE IDENTIFIED (0.0–0.4): Did the agent correctly identify note-002
      ("Board Meeting — Strategic Priorities and Capital Allocation", dated 2024-10-07)
      as the relevant board meeting note from last week? Award 0.4 if clearly identified,
      0.2 if partially identified or ambiguous, 0.0 if wrong note selected.

      2. KEY CONTENT SUMMARIZED (0.0–0.4): Does the agent''s output accurately summarize
      the three key decisions from note-002: (a) $2.1M capital expenditure for data
      center, (b) Project Falcon greenlit for Q1 2025 SMB launch, (c) Series C fundraising
      deferred to Q2 2025? Also mentions action items (David Solis RFP by Oct 25,
      James Whitfield briefing by Oct 18)? Award 0.4 if all major points covered,
      0.2 if at least two decisions mentioned, 0.0 if content is missing or inaccurate.

      3. SHARING CONFIRMED (0.0–0.2): Does the agent confirm that the note was shared
      with both sandra.okafor@company.com and marcus.trent@company.com? Award 0.2
      if both recipients explicitly confirmed, 0.1 if only one confirmed, 0.0 if sharing
      not confirmed.

      Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: output_quality_and_completeness
  weight: 0.3
task_id: notes-175
task_name: Retrieve and share board meeting notes with finance team
tools:
- description: List available notes, optionally limiting the number of results returned.
  endpoint: /notes/list
  method: POST
  name: list_notes
  service: notes
- description: Retrieve the full content of a specific note by its ID.
  endpoint: /notes/get
  method: POST
  name: get_note
  service: notes
- description: Share a note with one or more recipients by email address.
  endpoint: /notes/share
  method: POST
  name: share_note
  service: notes
