prompt: 'Our team has been holding project kickoff meetings over the past few months,
  and I need a summary of all the notes we have tagged with "kickoff". For each one,
  tell me the title, date, attendees, and a brief summary of the content. I want to
  understand which projects have been kicked off and what was discussed, so I can
  prepare a status report for leadership.

  '
reference_solution:
- Call list_notes to retrieve the available notes (using max_results sufficient to
  see all records).
- Review the returned list and identify notes tagged with "kickoff": note-001, note-002,
    note-004, and note-006.
- Call get_note for each of the four kickoff notes (note-001, note-002, note-004,
  note-006) to retrieve full details including content, attendees, and dates.
- Compile a structured summary for each kickoff note covering the project name, date,
  attendees, and key discussion points from the content.
- Present the compiled summary as a leadership-ready status report listing all four
  kickoff projects, excluding unrelated notes such as the Weekly Sync, Q4 Budget Review,
  and Design System Review.
