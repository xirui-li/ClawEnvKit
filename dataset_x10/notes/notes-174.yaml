    - Design System Review
    - Weekly Sync
    type: keywords_absent
  name: non_kickoff_notes_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s status report summary of kickoff meeting notes.
      Score on three dimensions:

      1. COMPLETENESS (0–0.4): Does the output cover all four kickoff notes — note-001
      (Alpha Project Kickoff, 2024-09-10), note-002 (Beta Platform Kickoff, 2024-10-03),
      note-004 (Gamma Initiative Kickoff, 2024-10-22), and note-006 (Delta Compliance
      Kickoff, 2024-11-14)? Award 0.4 if all four are present, 0.2 if two or three,
      0.0 if fewer than two.

      2. ACCURACY (0–0.4): For each kickoff note included, does the output correctly
      report the date, attendees, and a meaningful content summary? For example: Alpha
      mentions $250,000 budget and Q1 milestones; Beta mentions microservices and
      sprint zero; Gamma mentions APAC market and 18-month timeline; Delta mentions
      regulatory compliance and external auditor. Award 0.4 if details are accurate
      and specific for all included notes, 0.2 if partially accurate, 0.0 if vague
      or incorrect.

      3. USEFULNESS FOR LEADERSHIP (0–0.2): Is the output organized and presented
      in a way that would be useful for a leadership status report? Does it clearly
      distinguish projects, highlight key decisions or risks, and avoid irrelevant
      meeting notes (Weekly Sync, Q4 Budget Review, Design System Review)? Award 0.2
      if well-structured and leadership-ready, 0.1 if somewhat organized, 0.0 if disorganized
      or includes irrelevant notes.

      Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: summary_quality
  weight: 0.3
task_id: notes-174
