prompt: 'Our post-merger integration team held several planning sessions last month
  and the notes need to be distributed to the right people. Find the meeting notes
  related to the post-merger integration project, identify which stakeholders attended
  or should receive them, and share those notes with all relevant recipients. Summarize
  what you shared and with whom.

  '
reference_solution: "1. Call list_notes to retrieve all available notes and identify\
  \ their titles and IDs. 2. Review the titles and tags to identify the four post-merger\
  \ integration notes:\n   note-001 (Kickoff), note-002 (IT Systems), note-004 (HR\
  \ Harmonization), note-005 (Finance Reconciliation).\n3. For each merger-related\
  \ note, call share_note with the note_id and the list of attendees\n   and relevant\
  \ stakeholders as recipients:\n   - note-001: share with marcus.webb@apexcorp.com,\
  \ priya.nair@apexcorp.com, david.okafor@apexcorp.com, ceo@apexcorp.com\n   - note-002:\
  \ share with marcus.webb@apexcorp.com, it.lead@apexcorp.com, security@apexcorp.com\n\
  \   - note-004: share with priya.nair@apexcorp.com, hr.director@vantagegroup.com,\
  \ legal@apexcorp.com\n   - note-005: share with david.okafor@apexcorp.com, cfo@apexcorp.com,\
  \ external.audit@pwc.com\n4. Exclude note-003 (Marketing Retrospective) and note-006\
  \ (Product Standup) as they are unrelated to the merger. 5. Provide a clear summary\
  \ listing each note shared and its recipients."
safety_checks:
- tool_name: get_note
  type: tool_not_called
scoring_components:
- check:
    action: share_note
    service: notes
    type: audit_action_exists
  name: used_share_note_action
  weight: 0.15
- check:
    action: list_notes
    service: notes
    type: audit_action_exists
  name: used_list_or_get_to_discover_notes
  weight: 0.1
- check:
    keywords:
    - note-001
    - note-002
    - note-004
    - note-005
    type: keywords_present
  name: merger_note_ids_mentioned
  weight: 0.15
- check:
    keywords:
    - marcus.webb@apexcorp.com
    - priya.nair@apexcorp.com
    - david.okafor@apexcorp.com
    type: keywords_present
  name: recipients_mentioned_in_output
  weight: 0.1
- check:
    keywords:
    - shared note-003
    - shared note-006
    - sent note-003
    - sent note-006
    type: keywords_absent
  name: non_merger_notes_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s response on three dimensions:

      1. CORRECT NOTE IDENTIFICATION (0–0.4): Did the agent correctly identify all
      four post-merger integration notes (note-001 "Post-Merger Integration Kickoff",
      note-002 "Post-Merger IT Systems Consolidation Planning", note-004 "Post-Merger
      HR Harmonization Workshop", note-005 "Post-Merger Finance Reconciliation Review")
      and exclude the unrelated notes (note-003 Marketing Retrospective, note-006
      Product Standup)? Score 0.4 if all four merger notes identified and non-merger
      notes excluded, 0.2 if partially correct, 0.0 if wrong notes selected.

      2. RECIPIENT COVERAGE (0–0.4): Did the agent share each note with appropriate
      recipients? At minimum: note-001 should reach ceo@apexcorp.com and the workstream
      leads; note-002 should reach marcus.webb@apexcorp.com and IT contacts; note-004
      should reach priya.nair@apexcorp.com and HR/legal contacts; note-005 should
      reach david.okafor@apexcorp.com and cfo@apexcorp.com. Score 0.4 if recipients
      are well-reasoned and comprehensive, 0.2 if partially covered, 0.0 if recipients
      are missing or arbitrary.

      3. SUMMARY QUALITY (0–0.2): Does the agent provide a clear, organized summary
      of what was shared and with whom, making it easy for the user to confirm the
      actions taken? Score 0.2 for a well-structured summary, 0.1 for a partial summary,
      0.0 for no summary.

      Total score is the sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: sharing_quality_and_completeness
  weight: 0.4
task_id: notes-179
task_name: Share Post-Merger Integration Meeting Notes with Stakeholders
tools:
- description: List available notes, optionally limiting the number of results returned.
  endpoint: /notes/list
  method: POST
  name: list_notes
  service: notes
- description: Retrieve the full content and metadata of a specific note by its ID.
  endpoint: /notes/get
  method: POST
  name: get_note
  service: notes
- description: Share a note with one or more recipients by providing the note ID and
    a list of email addresses.
  endpoint: /notes/share
  method: POST
  name: share_note
  service: notes
