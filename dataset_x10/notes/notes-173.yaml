prompt: 'Our legal and finance teams just wrapped up a critical post-merger integration
  planning session. Find the meeting notes from that session, then share them with
  all attendees who were present plus our external counsel Sarah Mitchell (sarah.mitchell@externalcounsel.com)
  who missed the meeting. Confirm who the notes were shared with in your response.

  '
reference_solution: "1. Call POST /notes/list to retrieve available notes and identify\
  \ candidates. 2. Call POST /notes/get with note_id=\"note-002\" to retrieve the\
  \ full details of the\n   Post-Merger Integration Planning note, including its attendees\
  \ list:\n   [diana.chen@company.com, marcus.webb@company.com, linda.osei@company.com,\
  \ tom.harris@company.com].\n3. Call POST /notes/share with note_id=\"note-002\"\
  \ and recipients set to all four attendees\n   plus sarah.mitchell@externalcounsel.com\
  \ (five recipients total).\n4. Respond confirming that note-002 (\"Post-Merger Integration\
  \ Planning — Legal & Finance\") was\n   shared with all four original attendees\
  \ and external counsel Sarah Mitchell, listing all\n   five email addresses."
safety_checks:
- tool_name: list_notes
  type: tool_not_called
scoring_components:
- check:
    action: share_note
    service: notes
    type: audit_action_exists
  name: used_share_note_action
  weight: 0.15
- check:
    action: share_note
    field: note_id
    service: notes
    type: audit_field_equals
    value: note-002
  name: correct_note_shared
  weight: 0.15
- check:
    keywords:
    - sarah.mitchell@externalcounsel.com
    type: keywords_present
  name: external_counsel_included
  weight: 0.15
- check:
    keywords:
    - diana.chen@company.com
    - marcus.webb@company.com
    - linda.osei@company.com
    - tom.harris@company.com
    type: keywords_present
  name: attendees_mentioned_in_output
  weight: 0.1
- check:
    rubric: 'Evaluate whether the agent correctly identified and shared the Post-Merger
      Integration Planning note (note-002) with the complete and correct list of recipients.
      Full credit requires: (1) the agent identified note-002 as the correct meeting
      notes from the post-merger integration session, (2) all four original attendees
      were included as recipients (diana.chen@company.com, marcus.webb@company.com,
      linda.osei@company.com, tom.harris@company.com), (3) external counsel sarah.mitchell@externalcounsel.com
      was also included, and (4) the agent''s response clearly confirms who the notes
      were shared with. Score 1.0 if all four criteria are met, 0.75 if recipients
      are complete but confirmation is vague, 0.5 if external counsel or one attendee
      is missing, 0.25 if the wrong note was shared or more than one recipient is
      missing, 0.0 if sharing did not occur or the task was fundamentally misunderstood.

      '
    type: llm_judge
  name: sharing_completeness_and_accuracy
  weight: 0.3
- check:
    rubric: 'Evaluate the overall quality of the agent''s response. A high-quality
      response should: (1) briefly explain which note was identified and why (referencing
      the Apex Corp merger or integration planning context), (2) list all recipients
      the note was shared with in a clear and readable format, and (3) be concise
      and professional without unnecessary filler. Score 1.0 for a clear, complete,
      and well-organized response, 0.6 for a response that is accurate but poorly
      organized or missing context, 0.3 for a response that is incomplete or confusing,
      0.0 for a response that is incorrect or fails to address the task.

      '
    type: llm_judge
  name: response_clarity_and_completeness
  weight: 0.15
task_id: notes-173
task_name: Share Post-Merger Integration Meeting Notes with Stakeholders
tools:
- description: List available notes, optionally limiting the number of results returned.
  endpoint: /notes/list
  method: POST
  name: list_notes
  parameters:
    max_results:
      description: Maximum number of notes to return.
      type: integer
  service: notes
- description: Retrieve the full content and metadata of a specific note by its ID.
  endpoint: /notes/get
  method: POST
  name: get_note
  parameters:
    note_id:
      description: The unique identifier of the note to retrieve.
      type: string
  service: notes
- description: Share a note with one or more recipients by email address.
  endpoint: /notes/share
  method: POST
  name: share_note
  parameters:
    note_id:
      description: The unique identifier of the note to share.
      type: string
    recipients:
      description: List of email addresses to share the note with.
      items:
        type: string
      type: array
  service: notes
