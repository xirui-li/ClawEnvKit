- check:
    rubric: "Evaluate whether the agent correctly identified all merger-related notes\
      \ and shared each one with the right recipients. The five merger notes are:\
      \ note-001 (Post-Merger Integration Kickoff), note-002 (Legal Due Diligence\
      \ Review), note-003 (Finance Integration Planning), note-004 (IT Systems Consolidation\
      \ Workshop), and note-006 (HR Policy Alignment). Non-merger notes note-005 and\
      \ note-007 should NOT have been shared. Each note should have been shared with\
      \ its listed attendees:\n  note-001: diana.chen, raj.patel, susan.ford\n  note-002:\
      \ marcus.lee, diana.chen, priya.nair\n  note-003: raj.patel, helen.wu, tom.briggs\n\
      \  note-004: susan.ford, kevin.osei, diana.chen\n  note-006: priya.nair, tom.briggs,\
      \ helen.wu\nScore 1.0 if all five notes were shared with all correct recipients\
      \ and non-merger notes were excluded. Score 0.7 if four notes were correctly\
      \ shared or minor recipient omissions occurred. Score 0.4 if only two or three\
      \ notes were shared correctly. Score 0.1 if fewer than two notes were shared\
      \ or wrong notes were included. Score 0.0 if no sharing occurred or only non-merger\
      \ notes were shared.\n"
    type: llm_judge
  name: sharing_quality_and_completeness
  weight: 0.3
- check:
    rubric: 'Evaluate the quality of the agent''s final summary. A good summary should:
      (1) List each merger-related note by title and ID (note-001 through note-004
      and note-006), (2) Clearly state who each note was shared with, (3) Explain
      why non-merger notes (note-005, note-007) were excluded, (4) Be organized and
      easy for a stakeholder to read. Score 1.0 if all four criteria are met with
      specific details. Score 0.6 if three criteria are met or details are partially
      missing. Score 0.3 if the summary is vague or missing two or more criteria.
      Score 0.0 if no meaningful summary is provided.

      '
    type: llm_judge
  name: summary_quality
  weight: 0.15
task_id: notes-1039
task_name: Share Post-Merger Integration Meeting Notes with Stakeholders
tools:
- description: List available notes, optionally limiting the number of results returned.
  endpoint: /notes/list
  method: POST
  name: list_notes
  parameters:
    max_results:
      description: Maximum number of notes to return.
      type: integer
  service: notes
- description: Retrieve the full details of a specific note by its ID.
  endpoint: /notes/get
  method: POST
  name: get_note
  parameters:
    note_id:
      description: The unique identifier of the note to retrieve.
      type: string
  service: notes
- description: Share a note with one or more recipients by email address.
  endpoint: /notes/share
  method: POST
  name: share_note
  parameters:
    note_id:
      description: The unique identifier of the note to share.
      type: string
    recipients:
      description: List of email addresses to share the note with.
      items:
        type: string
      type: array
  service: notes
