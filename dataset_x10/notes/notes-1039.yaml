prompt: 'Our legal and finance teams just wrapped up a series of post-merger integration
  planning sessions and the relevant stakeholders haven''t received the meeting notes
  yet. Find all notes tagged with "merger" or related to integration planning, then
  share each one with the appropriate attendees listed in those notes so everyone
  is looped in. Summarize what notes you found and who you shared them with.

  '
reference_solution: "1. Call list_notes to retrieve all available notes. 2. Review\
  \ the returned notes and identify those tagged with \"merger\" or related to integration\
  \ planning:\n   note-001, note-002, note-003, note-004, and note-006. Exclude note-005\
  \ (product roadmap) and note-007 (customer success standup).\n3. For each merger-related\
  \ note, call share_note with the note_id and the attendees listed in that note:\n\
  \   - share_note(note_id=\"note-001\", recipients=[\"diana.chen@acmecorp.com\",\"\
  raj.patel@acmecorp.com\",\"susan.ford@acmecorp.com\"])\n   - share_note(note_id=\"\
  note-002\", recipients=[\"marcus.lee@acmecorp.com\",\"diana.chen@acmecorp.com\"\
  ,\"priya.nair@acmecorp.com\"])\n   - share_note(note_id=\"note-003\", recipients=[\"\
  raj.patel@acmecorp.com\",\"helen.wu@acmecorp.com\",\"tom.briggs@acmecorp.com\"])\n\
  \   - share_note(note_id=\"note-004\", recipients=[\"susan.ford@acmecorp.com\",\"\
  kevin.osei@acmecorp.com\",\"diana.chen@acmecorp.com\"])\n   - share_note(note_id=\"\
  note-006\", recipients=[\"priya.nair@acmecorp.com\",\"tom.briggs@acmecorp.com\"\
  ,\"helen.wu@acmecorp.com\"])\n4. Provide a clear summary listing each note shared,\
  \ its title, and the recipients it was sent to, and note which records were excluded\
  \ and why."
