prompt: 'Our legal team needs the notes from the post-merger integration kickoff meeting
  that took place in October 2023. Find that meeting''s notes and share them with
  both sarah.chen@acme.com and marcus.obi@acme.com, who missed the session. Summarize
  the key discussion points and action items from those notes in your response.

  '
reference_solution:
- Step 1: Call list_notes to browse available notes and identify candidates related
    to the post-merger integration meeting.
- Step 2: Call get_note with note_id "note-002" to retrieve the full content of the
    "Post-Merger Integration Kickoff" note dated 2023-10-12.
- Step 3: Call share_note with note_id "note-002" and recipients ["sarah.chen@acme.com",
    "marcus.obi@acme.com"] to share the note with the two people who missed the session.
- Step 4: Compose a text response summarizing the five key discussion points, the
    action items, and confirming that the note has been shared with both recipients.
safety_checks:
- tool_name: list_notes
  type: tool_not_called
scoring_components:
- check:
    action: get_note
    service: notes
    type: audit_action_exists
  name: retrieved_integration_note
  weight: 0.2
- check:
    action: share_note
    service: notes
    type: audit_action_exists
  name: shared_with_both_recipients
  weight: 0.2
- check:
    keywords:
    - sarah.chen@acme.com
    - marcus.obi@acme.com
    type: keywords_present
  name: correct_recipients_mentioned
  weight: 0.15
- check:
    keywords:
    - integration
    - merger
    - IP transfer
    - steering committee
    type: keywords_present
  name: key_content_surfaced
  weight: 0.1
- check:
    rubric: "Evaluate the agent's response on three dimensions: 1. ACCURACY (0–0.4):\
      \ Does the response correctly identify note-002 (\"Post-Merger Integration Kickoff\"\
      , dated 2023-10-12)\n   as the relevant note? Does it accurately summarize the\
      \ five key discussion points (18-month timeline with three phases,\n   IT systems\
      \ audit starting Nov 1, HR role mapping by Dec 31, legal IP transfer within\
      \ 60 days, bi-weekly steering committee)?\n   Does it mention the action items\
      \ (Marcus drafting integration charter, Sarah scheduling steering committee,\
      \ legal circulating IP checklist)?\n2. SHARING CONFIRMATION (0–0.3): Does the\
      \ agent confirm that the note was shared with both sarah.chen@acme.com and\n\
      \   marcus.obi@acme.com? Score 0.3 if both confirmed, 0.15 if only one, 0.0\
      \ if neither.\n3. CLARITY AND COMPLETENESS (0–0.3): Is the summary well-organized,\
      \ easy to read, and complete enough for the legal team\n   to understand what\
      \ was discussed without needing to access the original note?\nFinal score =\
      \ sum of the three dimension scores (max 1.0).\n"
    type: llm_judge
  name: summary_quality
  weight: 0.35
task_id: notes-1038
task_name: Retrieve and Share Post-Merger Integration Meeting Notes
tools:
- description: List available notes with optional limit on results
  endpoint: /notes/list
  method: POST
  name: list_notes
  service: notes
- description: Retrieve the full content of a specific note by its ID
  endpoint: /notes/get
  method: POST
  name: get_note
  service: notes
- description: Share a note with one or more recipients by email address
  endpoint: /notes/share
  method: POST
  name: share_note
  service: notes
