tools:
- description: List available notes, optionally limiting the number of results returned.
  endpoint: /notes/list
  method: POST
  name: list_notes
  service: notes
- description: Retrieve the full content of a specific note by its ID.
  endpoint: /notes/get
  method: POST
  name: get_note
  service: notes
- description: Share a note with specified recipients by email or name.
  endpoint: /notes/share
  method: POST
  name: share_note
  service: notes
