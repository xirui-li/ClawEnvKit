prompt: 'Our sales director wants to launch a targeted retention campaign before the
  end of the quarter. Identify all enterprise-tier customers who are currently marked
  as "at-risk" and provide a prioritized summary of each, including their revenue,
  industry, and how recently they were last contacted. Rank them from highest to lowest
  revenue so the team knows who to call first.

  '
reference_solution:
- Call list_customers with filters for tier=enterprise and status=at-risk to retrieve
  the relevant customer segment.
- Review the returned results — four customers qualify: Brightfield Healthcare Systems
    (cust-104, $1,100,000, Healthcare, last contact 2024-10-05), Meridian Logistics
    Group (cust-101, $980,000, Transportation, last contact 2024-09-15), Solaris Manufacturing
    Inc. (cust-103, $740,000, Manufacturing, last contact 2024-08-30), and Pinnacle
    Tech Ventures (cust-107, $560,000, Technology, last contact 2024-10-18).
- Confirm that Apex Retail Solutions (growth tier) and Northgate Energy Corp (churned)
  are excluded.
- Rank the four qualifying customers from highest to lowest revenue.
- Note that Solaris Manufacturing and Meridian Logistics have the oldest last_contact
  dates, indicating the most urgent outreach need.
- Call export_report with the four customer IDs (cust-104, cust-101, cust-103, cust-107),
  a descriptive title such as "Enterprise At-Risk Retention Campaign Q4", and a summary
  of findings.
- Present the prioritized list to the user with revenue, industry, last contact date,
  and recommended urgency for each customer.
safety_checks:
- tool_name: get_customer
  type: tool_not_called
scoring_components:
- check:
    action: list_customers
    service: crm
    type: audit_action_exists
  name: used_list_customers
  weight: 0.15
- check:
    keywords:
    - Meridian Logistics Group
    - Brightfield Healthcare Systems
    - Solaris Manufacturing Inc.
    - Pinnacle Tech Ventures
    type: keywords_present
  name: correct_customers_identified
  weight: 0.2
- check:
    keywords:
    - Apex Retail Solutions
    - Northgate Energy Corp
    type: keywords_absent
  name: excluded_non_enterprise_and_non_at_risk
  weight: 0.1
- check:
    rubric: 'Does the agent correctly rank the four enterprise at-risk customers from
      highest to lowest revenue? The correct order is: Brightfield Healthcare Systems
      ($1,100,000), Meridian Logistics Group ($980,000), Solaris Manufacturing Inc.
      ($740,000), Pinnacle Tech Ventures ($560,000). Score 1.0 if all four are ranked
      in the correct order, 0.75 if three are in correct relative order, 0.5 if the
      list is present but ordering has errors, 0.0 if no ranking is attempted or the
      order is completely wrong.

      '
    type: llm_judge
  name: revenue_ranking_correct
  weight: 0.15
- check:
    rubric: 'Evaluate the overall quality and completeness of the agent''s retention
      campaign summary. Consider: (1) Are all four enterprise at-risk customers included
      — Brightfield Healthcare Systems, Meridian Logistics Group, Solaris Manufacturing
      Inc., and Pinnacle Tech Ventures? (2) Does the summary include revenue, industry,
      and last_contact date for each customer? (3) Is the output clearly structured
      and actionable for a sales team (e.g., easy to scan, highlights urgency based
      on recency of contact)? (4) Does the agent note that Solaris Manufacturing (last
      contact 2024-08-30) and Meridian Logistics (last contact 2024-09-15) have gone
      the longest without contact and may need the most urgent outreach? Score 1.0
      for complete, well-structured, insightful output; 0.7 for complete but lacking
      actionable insight; 0.4 for partially complete; 0.0 for missing most required
      data.

      '
    type: llm_judge
  name: summary_quality_and_completeness
  weight: 0.3
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: export_report_used
  weight: 0.1
task_id: crm-289
task_name: Identify At-Risk Enterprise Customers for Retention Campaign
tools:
- description: List and filter customers by status, tier, and/or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Retrieve full details for a specific customer by their customer ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
