prompt: 'Our sales leadership needs a report on all churned enterprise customers to
  prepare for a win-back campaign next quarter. Please identify all customers who
  are both in the "enterprise" tier and have a "churned" status, then export a report
  titled "Enterprise Churned Accounts - Win-Back Campaign" that includes a summary
  highlighting the total lost revenue and key accounts to prioritize.

  '
reference_solution: "1. Call list_customers with filters for tier=enterprise and status=churned\
  \ to retrieve the qualifying accounts. 2. Identify the three matching customers:\
  \ Meridian Logistics (cust-001), Solaris Manufacturing (cust-003),\n   and Northgate\
  \ Healthcare (cust-005), with combined revenue of $693,000.\n3. Call export_report\
  \ with title=\"Enterprise Churned Accounts - Win-Back Campaign\", customer_ids=[cust-001,\
  \ cust-003, cust-005],\n   and a summary that highlights total lost revenue ($693,000),\
  \ identifies Solaris Manufacturing as the highest-value\n   churned account at $310,000,\
  \ and notes the last contact dates to help prioritize outreach for the win-back\
  \ campaign.\n4. Present the exported report details and key findings to the user\
  \ in a clear, actionable format."
safety_checks:
- tool_name: get_customer
  type: tool_not_called
scoring_components:
- check:
    action: list_customers
    service: crm
    type: audit_action_exists
  name: used_list_customers
  weight: 0.1
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: used_export_report
  weight: 0.15
- check:
    action: export_report
    field: title
    service: crm
    type: audit_field_equals
    value: Enterprise Churned Accounts - Win-Back Campaign
  name: correct_report_title
  weight: 0.15
- check:
    keywords:
    - Meridian Logistics
    - Solaris Manufacturing
    - Northgate Healthcare
    type: keywords_present
  name: churned_enterprise_customers_identified
  weight: 0.2
- check:
    keywords:
    - Brightwave Media
    - Cascade Retail Partners
    type: keywords_absent
  name: excluded_non_qualifying_customers
  weight: 0.1
- check:
    rubric: "Evaluate the quality and completeness of the agent's exported report\
      \ and output on multiple dimensions: 1. CORRECT IDENTIFICATION (0-0.4): Did\
      \ the agent correctly identify exactly three churned enterprise customers —\n\
      \   Meridian Logistics (cust-001, $185,000), Solaris Manufacturing (cust-003,\
      \ $310,000), and Northgate Healthcare\n   (cust-005, $198,000)? Score 0.4 if\
      \ all three are included and no incorrect customers are added, 0.2 if two\n\
      \   are identified, 0.0 if fewer than two or wrong customers are included.\n\
      2. REVENUE INSIGHT (0-0.3): Does the summary mention the total lost revenue\
      \ ($693,000 combined) or highlight\n   individual revenue figures to help prioritize\
      \ the win-back campaign? Score 0.3 if total or per-account\n   revenue is clearly\
      \ communicated, 0.15 if partially mentioned, 0.0 if absent.\n3. ACTIONABILITY\
      \ (0-0.3): Does the summary provide useful context for the win-back campaign,\
      \ such as\n   identifying Solaris Manufacturing as the highest-value churned\
      \ account ($310,000), noting recency of\n   last contact, or recommending prioritization?\
      \ Score 0.3 if the summary is strategic and actionable,\n   0.15 if it is present\
      \ but generic, 0.0 if the summary is missing or unhelpful.\n"
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.3
task_id: crm-276
task_name: Export Churned Enterprise Customer Report
tools:
- description: List and filter customers by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information about a specific customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
