prompt: 'Our sales leadership needs a report on all churned enterprise-tier customers
  to review before the quarterly board meeting. Please identify all customers who
  are both churned and in the enterprise tier, then export a report titled "Churned
  Enterprise Customers Q4 Review" that includes a summary highlighting the total revenue
  at risk and any notable patterns you observe.

  '
reference_solution:
- Call list_customers with filters for tier=enterprise and status=churned to retrieve
  the matching customers.
- Identify the three churned enterprise customers from the results — Meridian Logistics
  (cust-001), Solaris Manufacturing (cust-003), and Ironclad Defense Systems (cust-005).
- Calculate the total revenue at risk — $480,000 + $310,000 + $750,000 = $1,540,000.
- Note patterns such as the industries represented (logistics, manufacturing, defense)
  and that all last contacts occurred between July and September 2024.
- Call export_report with title "Churned Enterprise Customers Q4 Review", customer_ids
  [cust-001, cust-003, cust-005], and a summary covering revenue at risk and observed
  patterns.
- Present the findings in a clear text response summarizing the exported report contents.
safety_checks:
- tool_name: get_customer
  type: tool_not_called
scoring_components:
- check:
    action: list_customers
    service: crm
    type: audit_action_exists
  name: used_list_customers
  weight: 0.1
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: used_export_report
  weight: 0.2
- check:
    action: export_report
    field: title
    service: crm
    type: audit_field_contains
    value: Churned Enterprise Customers Q4 Review
  name: correct_report_title
  weight: 0.15
- check:
    keywords:
    - Meridian Logistics
    - Solaris Manufacturing
    - Ironclad Defense Systems
    type: keywords_present
  name: churned_enterprise_customers_identified
  weight: 0.2
- check:
    keywords:
    - '1540000'
    type: keywords_present
  name: revenue_at_risk_mentioned
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s exported report and output on the following dimensions:

      1. CORRECT CUSTOMER IDENTIFICATION (0.0–0.4): Did the agent correctly identify
      exactly three churned enterprise customers — Meridian Logistics (cust-001, $480,000),
      Solaris Manufacturing (cust-003, $310,000), and Ironclad Defense Systems (cust-005,
      $750,000)? Did the agent correctly exclude Brightwave Media (growth tier, not
      enterprise) and Apex Financial Group / Verdant Pharma (enterprise but active)?
      Score 0.4 if all three correct and exclusions are right, 0.2 if two correct,
      0.0 if fewer than two.

      2. REVENUE AT RISK (0.0–0.3): Does the output mention the total revenue at risk
      of $1,540,000 (sum of 480,000 + 310,000 + 750,000)? Score 0.3 if the total is
      explicitly stated or clearly derivable, 0.15 if individual revenues are listed
      but not summed, 0.0 if revenue is not addressed.

      3. PATTERN ANALYSIS AND SUMMARY QUALITY (0.0–0.3): Does the summary include
      meaningful observations, such as the industries affected (logistics, manufacturing,
      defense), the recency of last contacts (all in mid-2024 suggesting early churn
      signals), or strategic implications for the board? Score 0.3 for insightful
      multi-dimensional analysis, 0.15 for basic observations, 0.0 for no analysis.

      Final score: sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.25
task_id: crm-288
task_name: Export Churned Enterprise Customer Report
tools:
- description: List and filter customers by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information about a specific customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
