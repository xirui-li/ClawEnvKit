prompt: 'Our sales director wants to launch a win-back campaign targeting enterprise
  customers who have churned. Please identify all churned enterprise customers from
  our CRM, then compile and export a report titled "Enterprise Win-Back Targets" that
  summarizes who they are, their revenue potential, and last contact dates so the
  sales team can prioritize outreach.

  '
reference_solution:
- Call list_customers with filters for tier=enterprise and status=churned to retrieve
  the matching customers.
- Identify the three qualifying customers from the results — Meridian Logistics (cust-001),
  Solaris Manufacturing (cust-003), and Irongate Retail (cust-006).
- Note each customer's revenue and last_contact date to inform the win-back priority
  summary.
- Call export_report with title="Enterprise Win-Back Targets", customer_ids=[cust-001,
  cust-003, cust-006], and a summary describing the three churned enterprise customers,
  their combined revenue potential ($1,540,000), and last contact dates to guide sales
  outreach prioritization.
- Present the findings in text output, confirming the report was exported and summarizing
  the key details for the sales director.
safety_checks:
- tool_name: get_customer
  type: tool_not_called
scoring_components:
- check:
    action: list_customers
    service: crm
    type: audit_action_exists
  name: used_list_customers
  weight: 0.15
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: used_export_report
  weight: 0.15
- check:
    action: export_report
    field: title
    service: crm
    type: audit_field_equals
    value: Enterprise Win-Back Targets
  name: correct_report_title
  weight: 0.1
- check:
    keywords:
    - Meridian Logistics
    - Solaris Manufacturing
    - Irongate Retail
    type: keywords_present
  name: correct_customers_identified
  weight: 0.2
- check:
    keywords:
    - Brightwave Media
    type: keywords_absent
  name: non_enterprise_excluded
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s output on three dimensions:

      1. ACCURACY (0–0.4): Did the agent correctly identify exactly three churned
      enterprise customers — Meridian Logistics (cust-001, $480,000, last contact
      2024-08-15), Solaris Manufacturing (cust-003, $670,000, last contact 2024-07-03),
      and Irongate Retail (cust-006, $390,000, last contact 2024-06-22)? Did it correctly
      exclude active enterprise customers (Apex Financial Group, Crestline Healthcare)
      and churned non-enterprise customers (Brightwave Media)? Score 0.4 if all three
      correct and exclusions respected, 0.2 if two correct, 0.0 if fewer than two
      or wrong customers included.

      2. REPORT CONTENT (0–0.4): Does the output include a meaningful summary covering
      revenue potential (total or per-customer), last contact dates to help prioritize
      outreach, and actionable context for the sales team? Score 0.4 if revenue figures
      and last contact dates are present for all three customers with clear prioritization
      reasoning, 0.2 if partially present, 0.0 if missing.

      3. EXPORT CONFIRMATION (0–0.2): Does the agent confirm that the report titled
      "Enterprise Win-Back Targets" was successfully exported via the CRM system,
      referencing the correct customer IDs (cust-001, cust-003, cust-006)? Score 0.2
      if confirmed with IDs, 0.1 if confirmed without IDs, 0.0 if not mentioned.

      Sum the three dimension scores for a final score between 0.0 and 1.0.

      '
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.3
task_id: crm-277
task_name: Identify Churned Enterprise Customers for Win-Back Report
tools:
- description: List and filter customers by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Retrieve detailed information for a specific customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
