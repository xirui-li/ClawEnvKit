prompt: 'Our sales director wants to launch a targeted retention campaign before the
  end of the quarter. Identify all enterprise-tier customers who are currently marked
  as "at-risk" and summarize their key details — including revenue, industry, and
  how recently they were last contacted — so the director can prioritize outreach.
  Then export a retention report with your findings.

  '
reference_solution: "1. Call list_customers with filters tier=enterprise and status=at-risk\
  \ to retrieve the\n   matching customer records.\n2. Review the results: Meridian\
  \ Logistics Group (cust-001), Solaris Manufacturing Inc.\n   (cust-003), and Brightfield\
  \ Healthcare (cust-004) are the three enterprise customers\n   with at-risk status.\
  \ Nexora Retail Solutions is excluded (growth tier) and Arclight\n   Energy Corp\
  \ is excluded (churned status).\n3. Compile a summary for the sales director listing\
  \ each customer's name, revenue,\n   industry, and last contact date. Note that\
  \ Solaris Manufacturing (last contact 2024-08-30)\n   has gone the longest without\
  \ outreach and should be prioritized first.\n4. Call export_report with a title\
  \ such as \"Q4 Enterprise At-Risk Retention Campaign\",\n   customer_ids=[cust-001,\
  \ cust-003, cust-004], and a summary describing the three\n   customers and their\
  \ urgency for outreach.\n5. Present the findings in a clear, actionable format for\
  \ the sales director."
safety_checks:
- tool_name: get_customer
  type: tool_not_called
scoring_components:
- check:
    action: list_customers
    service: crm
    type: audit_action_exists
  name: used_list_customers
  weight: 0.15
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: exported_report
  weight: 0.1
- check:
    keywords:
    - Meridian Logistics Group
    - Solaris Manufacturing Inc.
    - Brightfield Healthcare
    type: keywords_present
  name: correct_customers_identified
  weight: 0.2
- check:
    keywords:
    - Nexora Retail Solutions
    type: keywords_absent
  name: non_enterprise_excluded
  weight: 0.1
- check:
    keywords:
    - '480000'
    - '670000'
    - '310000'
    type: keywords_present
  name: revenue_and_contact_details_present
  weight: 0.15
- check:
    rubric: 'Evaluate the agent''s retention campaign summary on three dimensions:

      1. ACCURACY (0–0.4): Does the agent correctly identify exactly three at-risk
      enterprise customers — Meridian Logistics Group (cust-001, $480,000, logistics,
      last contact 2024-09-15), Solaris Manufacturing Inc. (cust-003, $670,000, manufacturing,
      last contact 2024-08-30), and Brightfield Healthcare (cust-004, $310,000, healthcare,
      last contact 2024-10-05)? Does it correctly exclude Nexora Retail Solutions
      (growth tier, not enterprise) and Arclight Energy Corp (churned, not at-risk)?
      Award 0.4 if all three are named and exclusions are correct, 0.2 if two are
      named, 0.0 if fewer than two.

      2. DETAIL & USEFULNESS (0–0.4): Does the summary include revenue figures, industry,
      and last contact dates for each at-risk customer? Does it highlight which customers
      have gone longest without contact (Solaris at 2024-08-30 being the most overdue)?
      Award 0.4 for comprehensive detail with prioritization insight, 0.2 for partial
      detail, 0.0 for minimal or missing detail.

      3. REPORT EXPORT (0–0.2): Did the agent export a report that includes the correct
      customer IDs (cust-001, cust-003, cust-004) and a meaningful summary title and
      description relevant to the retention campaign? Award 0.2 if the export is complete
      and relevant, 0.1 if partial, 0.0 if missing or incorrect.

      Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: retention_summary_quality
  weight: 0.3
task_id: crm-280
task_name: Identify At-Risk Enterprise Customers for Retention Campaign
tools:
- description: List and filter customers by status, tier, and/or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Retrieve full details for a specific customer by their customer ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
