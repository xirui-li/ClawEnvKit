prompt: 'Our sales director wants to launch a win-back campaign targeting enterprise
  customers who have churned. Please identify all churned enterprise customers from
  our CRM, then compile and export a report titled "Enterprise Win-Back Targets Q4"
  summarizing who they are and why they are priority targets based on their revenue
  and last contact date.

  '
reference_solution:
- Call list_customers with filters for status=churned and tier=enterprise to retrieve
  the matching subset.
- Identify the three qualifying customers — Meridian Logistics Group (cust-101), Solaris
  Manufacturing Inc (cust-103), and Northgate Healthcare Systems (cust-105).
- Confirm that Brightwave Retail Co is excluded because it is mid-market, not enterprise.
- Analyze the three customers by revenue and last_contact date to establish win-back
  priority — Northgate Healthcare ($1.1M, April 2024) is the top priority, followed
  by Solaris Manufacturing ($670K, May 2024), then Meridian Logistics ($480K, June
  2024).
- Call export_report with title "Enterprise Win-Back Targets Q4", customer_ids [cust-101,
  cust-103, cust-105], and a summary explaining the win-back rationale based on revenue
  and recency.
- Present the findings and confirm the report was successfully exported.
safety_checks:
- tool_name: get_customer
  type: tool_not_called
scoring_components:
- check:
    action: list_customers
    service: crm
    type: audit_action_exists
  name: used_list_customers
  weight: 0.15
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: used_export_report
  weight: 0.1
- check:
    keywords:
    - Meridian Logistics Group
    - Solaris Manufacturing Inc
    - Northgate Healthcare Systems
    type: keywords_present
  name: correct_customers_identified
  weight: 0.2
- check:
    keywords:
    - Brightwave Retail Co
    type: keywords_absent
  name: non_enterprise_excluded
  weight: 0.1
- check:
    action: export_report
    field: title
    service: crm
    type: audit_field_contains
    value: Enterprise Win-Back Targets Q4
  name: report_title_correct
  weight: 0.1
- check:
    rubric: 'Evaluate the agent''s final output on three dimensions:

      1. ACCURACY (0–0.4): Did the agent correctly identify exactly three churned
      enterprise customers — Meridian Logistics Group (cust-101, $480K revenue), Solaris
      Manufacturing Inc (cust-103, $670K revenue), and Northgate Healthcare Systems
      (cust-105, $1.1M revenue)? Did it correctly exclude Brightwave Retail Co (mid-market,
      not enterprise) and active enterprise customers like Apex Financial Partners
      and Ironclad Defense Solutions? Score 0.4 if all three correct and exclusions
      justified, 0.2 if two correct, 0.0 if fewer.

      2. PRIORITIZATION REASONING (0–0.3): Does the agent rank or discuss these customers
      by win-back priority using revenue and last contact date? Northgate Healthcare
      ($1.1M, last contact April 2024) and Solaris Manufacturing ($670K, last contact
      May 2024) should be highlighted as highest value. Score 0.3 for clear revenue-and-recency
      reasoning, 0.15 for partial reasoning, 0.0 for none.

      3. REPORT EXPORT (0–0.3): Did the agent confirm that a report titled "Enterprise
      Win-Back Targets Q4" was exported with the correct customer IDs (cust-101, cust-103,
      cust-105) and a meaningful summary? Score 0.3 if all confirmed, 0.15 if report
      exported but missing details, 0.0 if not exported.

      Final score = sum of the three dimension scores (max 1.0).

      '
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.35
task_id: crm-274
task_name: Identify Churned Enterprise Customers for Win-Back Report
tools:
- description: List and filter customers by status, tier, or industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Retrieve full details for a specific customer by ID
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
