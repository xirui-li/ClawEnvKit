  kb:
    articles:
    - author: content-team
      category: API
      content: 'This article covers OAuth2 and API key authentication methods. Rate
        limiting is briefly mentioned: all API keys are subject to rate limits, but
        specific thresholds are not documented here.'
      id: kb-101
      last_updated: '2024-09-10'
      title: API Authentication Overview
    - author: content-team
      category: API
      content: A beginner's guide to making your first API call. Does not cover rate
        limiting policies.
      id: kb-102
      last_updated: '2024-10-01'
      title: Getting Started with the REST API
    - author: content-team
      category: API
      content: 'This article describes the old rate limiting policy from 2022: 100
        requests/minute for free tier, 1000 requests/minute for paid. NOTE: This policy
        was updated in 2023 and this article is no longer accurate.'
      id: kb-103
      last_updated: '2022-06-15'
      title: Rate Limiting — Legacy Policy (Deprecated)
    - author: support-team
      category: Troubleshooting
      content: If you receive a 429 error, you have exceeded the rate limit. Retry
        after the Retry-After header value. Current limits are not specified in this
        article — refer to the rate limiting policy doc.
      id: kb-104
      last_updated: '2024-08-20'
      title: Troubleshooting 429 Too Many Requests Errors
    - author: content-team
      category: Enterprise
      content: Enterprise clients receive dedicated support and higher rate limits
        by default. Contact your account manager for specifics.
      id: kb-105
      last_updated: '2024-07-05'
      title: Enterprise API SLA and Support
  scheduler:
