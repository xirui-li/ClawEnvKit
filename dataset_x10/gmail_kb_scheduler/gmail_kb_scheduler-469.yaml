claw_eval_id: T42_scheduled_task_management
difficulty: medium
fixtures:
  gmail:
    inbox:
    - body: 'Hi Support Team, we have 3 enterprise clients stuck on SSO configuration
        during onboarding. The SAML metadata import keeps timing out after 30 seconds.
        This is blocking go-live for Acme Corp, Brightline Inc, and Vertex Solutions.
        Please advise urgently.

        '
