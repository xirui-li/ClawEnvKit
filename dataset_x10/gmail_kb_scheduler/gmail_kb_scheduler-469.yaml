    - body: 'Following up on our onboarding call. The API key provisioning step in
        the enterprise setup wizard is returning a 403 error for all new accounts
        created after November 10th. Our team cannot proceed with integration testing.
        This is a blocker.

        '
      date: '2024-11-19T11:30:00Z'
      from: james.okafor@brightlineinc.com
      id: msg-102
      priority: high
      read: false
      subject: 'Re: Enterprise Onboarding - API key provisioning broken'
      to: support@ourcompany.com
