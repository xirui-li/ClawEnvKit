category: ops
claw_eval_id: T42_scheduled_task_management
difficulty: medium
files: []
fixtures:
  gmail:
    inbox:
    - body: 'Dear ACME Operations Team, we are experiencing a critical outage affecting
        payment processing for all merchants in the US-EAST region. Transactions are
        failing with error code PAY-5023. Our engineering team is actively working
        on a fix. ETA: 2-4 hours. Please monitor our status page at status.stripevendor.com.
        Incident ID: INC-20241105-007. Contact: vendor-support@stripevendor.com'
      date: '2024-11-05T09:15:00Z'
      from: alerts@stripevendor.com
      id: msg-001
      priority: high
      read: false
      subject: 'URGENT: Payment Processing Outage - Action Required'
      to: ops@acmecorp.com
    - body: Please complete your benefits enrollment by November 15th.
      date: '2024-11-05T08:00:00Z'
      from: hr@acmecorp.com
      id: msg-002
      priority: normal
      read: true
      subject: Q4 Benefits Enrollment Reminder
      to: ops@acmecorp.com
    - body: An unusual spike in EC2 costs has been detected in your account. Review
        in the AWS console.
      date: '2024-11-04T22:30:00Z'
      from: noreply@aws.com
      id: msg-003
      priority: high
      read: false
      subject: AWS Cost Anomaly Detected
      to: ops@acmecorp.com
    - body: 'Hi ACME Team, as a follow-up to our outage alert, here is your dedicated
        escalation contact: Marcus Webb, Senior Incident Manager, +1-800-555-0192,
        marcus.webb@stripevendor.com. Please reference Incident ID INC-20241105-007
        in all communications. We will send updates every 30 minutes.'
      date: '2024-11-05T09:45:00Z'
      from: vendor-support@stripevendor.com
      id: msg-004
      priority: high
      read: false
      subject: 'RE: Payment Outage - Escalation Contact Details'
      to: ops@acmecorp.com
