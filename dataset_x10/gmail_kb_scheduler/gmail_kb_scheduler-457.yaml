category: ops
claw_eval_id: T41zh_scheduled_task_management
difficulty: medium
fixtures:
  gmail:
    inbox:
    - body: 'Hi Support Team, I submitted a refund request on Nov 1st (order #ORD-8821)
        and it has now been 14 days with no update. Your KB article says refunds take
        5-7 business days but that is clearly not accurate. Please update your documentation
        and resolve my case immediately. This is unacceptable.

        '
      date: '2024-11-15T09:22:00Z'
      from: sarah.chen@acmecorp.com
      id: msg-001
      priority: high
      read: false
      subject: 'ESCALATION: Refund still pending after 14 days'
      to: support@company.com
    - body: 'Following up on my earlier ticket. Your help center article still says
        5-7 business days for refunds. Our finance team has confirmed that due to
        the new payment processor migration (completed Oct 15), refunds now take 10-14
