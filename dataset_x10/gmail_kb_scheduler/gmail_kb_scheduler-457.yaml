      subject: Holiday Schedule Reminder
      to: support@company.com
  kb:
    articles:
    - author: support-team
      category: billing
      content: 'Refunds are typically processed within 5-7 business days of approval.
        If you have not received your refund after 7 business days, please contact
        our support team. Note that weekends and public holidays may extend processing
        times slightly.

        '
      id: kb-article-045
      last_updated: '2024-09-10T00:00:00Z'
      title: Refund Processing Delays — What to Expect
    - author: support-team
      category: billing
      content: 'To submit a refund request, log into your account and navigate to
        Orders > Request Refund. Fill in the required fields and submit. You will
        receive a confirmation email within 24 hours.

        '
      id: kb-article-012
      last_updated: '2024-10-01T00:00:00Z'
      title: How to Submit a Refund Request
    - author: support-team
      category: billing
      content: 'We accept Visa, Mastercard, American Express, PayPal, and bank transfers.
        All transactions are processed securely via our payment gateway.

        '
      id: kb-article-078
      last_updated: '2024-10-20T00:00:00Z'
      title: Payment Methods Accepted
  scheduler:
    jobs:
    - action: send_digest_email
      cron_expression: 0 8 * * MON
      enabled: true
      id: job-001
      last_run: '2024-11-11T08:00:00Z'
      name: Weekly Inbox Digest
      status: success
      tags:
      - email
      - weekly
    - action: generate_billing_report
      cron_expression: 0 9 1 * *
      enabled: true
      id: job-002
      last_run: '2024-11-01T09:00:00Z'
      name: Monthly Billing Report
      status: success
