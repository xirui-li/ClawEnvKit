prompt: 'Our knowledge base article on "Refund Processing Delays" is outdated and
  customers keep escalating about it. Check the inbox for any recent escalation emails
  on this topic, review the current KB article, and update the article to reflect
  the latest information from the escalations. Also, schedule a weekly automated reminder
  job to review this article every Monday morning, and send a confirmation email to
  the support team lead summarizing what you updated and why.

  '
reference_solution: "1. Call list_inbox to retrieve recent emails and identify escalation\
  \ messages related to refund processing delays. 2. Call get_message for the high-priority\
  \ escalation emails (msg-001, msg-002, msg-003) to read the full details,\n   noting\
  \ that customers report the old 5-7 business day timeline is wrong, the correct\
  \ timeline is 10-14 business\n   days due to the October payment processor migration,\
  \ and the new refund status portal is at refunds.company.com.\n3. Call search_articles\
  \ with query \"refund processing delays\" or category \"billing\" to locate the\
  \ relevant KB article. 4. Call get_kb_article with article_id \"kb-article-045\"\
  \ to read the current outdated content. 5. Call update_article with article_id \"\
  kb-article-045\" and new content that: replaces the 5-7 business day\n   timeline\
  \ with 10-14 business days, explains the October payment processor migration as\
  \ the cause,\n   and adds the refund status portal URL (refunds.company.com).\n\
  6. Call list_jobs to check existing scheduled jobs, then call create_job to create\
  \ a new weekly reminder job\n   with a Monday morning cron expression (e.g., \"\
  0 9 * * MON\") to review the refund KB article.\n7. Call send_email to the support\
  \ team lead summarizing the changes made to kb-article-045, what was updated\n \
  \  (timeline, portal URL), and why (customer escalations from sarah.chen, james.okafor,\
  \ linda.marsh).\n8. Provide a text summary of all actions taken, confirming the\
  \ article update, the new scheduler job, and the email sent."
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: list_inbox
    service: gmail
    type: audit_action_exists
  name: read_escalation_emails
  weight: 0.1
- check:
    action: update_article
    service: kb
    type: audit_action_exists
  name: kb_article_updated
  weight: 0.15
- check:
    keywords:
    - 10-14 business days
    - refunds.company.com
    type: keywords_present
  name: updated_article_reflects_new_timeline
  weight: 0.2
- check:
    action: create_job
    service: scheduler
    type: audit_action_exists
  name: scheduler_job_created
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: confirmation_email_sent
  weight: 0.1
- check:
    rubric: 'Evaluate the quality of the KB article update performed by the agent
      for article kb-article-045 ("Refund Processing Delays — What to Expect"). Score
      on these dimensions: (1) Accuracy: Does the updated content replace the old
      5-7 business day timeline with the correct 10-14 business day timeline as reported
      in escalation emails from james.okafor and linda.marsh? (0.0-0.4) (2) Completeness:
      Does the update include the new refund status portal URL (refunds.company.com)
      and reference the October payment processor migration as the cause of the delay?
      (0.0-0.4) (3) Clarity: Is the updated article content clear, professional, and
      customer-friendly? (0.0-0.2) Score 1.0 if all three dimensions are fully met,
      0.6-0.8 if timeline and portal are updated but migration context is missing,
      0.3-0.5 if only the timeline is updated, 0.0-0.2 if the article content is not
      meaningfully improved.

      '
    type: llm_judge
  name: article_update_quality
  weight: 0.2
- check:
    rubric: 'Evaluate the confirmation email sent to the support team lead. Score
      on these dimensions: (1) Recipient appropriateness: Is the email addressed to
      a support team lead or equivalent internal recipient (not to a customer)? (0.0-0.3)
      (2) Summary of changes: Does the email clearly explain what was changed in kb-article-045,
      specifically mentioning the timeline update from 5-7 to 10-14 business days
      and the addition of the refund portal URL? (0.0-0.4) (3) Justification: Does
      the email reference the customer escalations (e.g., from sarah.chen, james.okafor,
      or linda.marsh) as the reason for the update? (0.0-0.3) Score 1.0 if all three
      are fully present, 0.5-0.8 if summary is good but justification or recipient
      detail is weak, 0.0-0.4 if the email is vague or missing key details.

      '
    type: llm_judge
  name: confirmation_email_quality
  weight: 0.15
task_id: gmail_kb_scheduler-457
task_name: Sync KB Article with Latest Customer Escalation Details
tools:
- description: List recent emails from the Gmail inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve the full content of a specific email by message ID
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a specified recipient
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email as a draft
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
- description: Search knowledge base articles by query or category
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Retrieve a specific knowledge base article by ID
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
- description: Update the content of a knowledge base article
  endpoint: /kb/articles/update
  method: POST
  name: update_article
  service: kb
- description: List all scheduled jobs
  endpoint: /scheduler/jobs
  method: POST
  name: list_jobs
  service: scheduler
- description: Create a new scheduled job
  endpoint: /scheduler/jobs/create
  method: POST
  name: create_job
  service: scheduler
