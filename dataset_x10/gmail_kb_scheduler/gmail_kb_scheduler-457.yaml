        '
      date: '2024-11-13T11:30:00Z'
      from: linda.marsh@techwave.io
      id: msg-003
      priority: medium
      read: true
      subject: 'Feedback: KB article on refunds is misleading'
      to: support@company.com
    - body: Scheduled maintenance on Nov 20 from 2am-4am UTC. No action required.
      date: '2024-11-12T08:00:00Z'
      from: devops@company.com
      id: msg-004
      priority: low
      read: true
      subject: System Maintenance Window - Nov 20
      to: support@company.com
    - body: Please review the attached holiday schedule for Q4 2024.
      date: '2024-11-11T10:00:00Z'
      from: hr@company.com
      id: msg-005
      priority: low
