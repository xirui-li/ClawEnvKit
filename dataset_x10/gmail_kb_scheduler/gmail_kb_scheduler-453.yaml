    - Meridian Supplies
    - James Whitfield
    - onboarding
    - reminder
    type: keywords_present
  name: key_facts_in_output
  weight: 0.15
- check:
    rubric: "Evaluate the agent's welcome email sent to james.whitfield@meridiansupplies.com\
      \ for Meridian Supplies. Score on the following dimensions:\n1. POLICY COVERAGE\
      \ (0–0.4): Does the email accurately summarize key requirements from kb-101?\n\
      \   Specifically: W-9/W-8 tax form (5 business days), MSA signing, liability\
      \ insurance ($1,000,000 minimum),\n   compliance screening (10 business days),\
      \ and virtual orientation session.\n   Score 0.4 if 4–5 points covered, 0.2\
      \ if 2–3 points, 0.0 if fewer than 2.\n\n2. REMINDER CADENCE MENTIONED (0–0.2):\
      \ Does the email mention that automated reminder emails are sent\n   every 3\
      \ days (as stated in kb-101) and/or reference the scheduled job (job-501)?\n\
      \   Score 0.2 if clearly mentioned, 0.1 if vaguely referenced, 0.0 if absent.\n\
      \n3. TONE AND PROFESSIONALISM (0–0.2): Is the email welcoming, professional,\
      \ and appropriately structured\n   for a vendor onboarding confirmation? Score\
      \ 0.2 if excellent, 0.1 if adequate, 0.0 if poor.\n\n4. PERSONALIZATION AND\
      \ ACCURACY (0–0.2): Does the email address James Whitfield by name and correctly\n\
      \   reference Meridian Supplies? Does it confirm receipt of their onboarding\
      \ paperwork?\n   Score 0.2 if both present, 0.1 if one, 0.0 if neither.\n\n\
      Final score = sum of dimension scores (max 1.0).\n"
    type: llm_judge
  name: email_quality_and_completeness
  weight: 0.35
task_id: gmail_kb_scheduler-453
