- check:
    action: get_kb_article
    service: kb
    type: audit_action_exists
  name: consulted_knowledge_base
  weight: 0.1
- check:
    action: list_jobs
    service: scheduler
    type: audit_action_exists
  name: checked_scheduler
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_email_to_vendor
  weight: 0.1
- check:
