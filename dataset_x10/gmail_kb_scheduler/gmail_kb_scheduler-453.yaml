      to: procurement@ourcompany.com
  kb:
    articles:
    - author: Sarah Nguyen
      category: procurement
      content: 'All new vendors must complete the following steps: (1) Submit W-9
        or W-8 tax form within 5 business days of approval. (2) Sign the Master Service
        Agreement (MSA) before any purchase orders are issued. (3) Provide proof of
        liability insurance with a minimum coverage of $1,000,000. (4) Complete a
        compliance screening via our third-party portal within 10 business days. (5)
        Attend a 30-minute virtual orientation session scheduled by the procurement
        team. Vendors will receive automated reminder emails every 3 days until all
        steps are confirmed complete.'
      id: kb-101
      last_updated: '2024-10-01'
      title: Vendor Onboarding Policy
    - author: David Park
      category: finance
      content: Standard payment terms are Net-30 from invoice date. Early payment
        discounts of 2% are available for invoices paid within 10 days. All invoices
        must reference a valid purchase order number.
      id: kb-102
      last_updated: '2024-09-15'
      title: Vendor Payment Terms
    - author: Lisa Chen
      category: compliance
      content: All suppliers must adhere to our ethical sourcing standards, including
        fair labor practices, environmental compliance, and anti-bribery policies.
      id: kb-103
      last_updated: '2024-08-20'
      title: Supplier Code of Conduct
  scheduler:
    jobs:
    - action: send_vendor_onboarding_reminder
