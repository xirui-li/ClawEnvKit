category: ops
claw_eval_id: T41zh_scheduled_task_management
difficulty: medium
fixtures:
  gmail:
    inbox:
    - body: The nightly pipeline may have run late last night. Please investigate.
      date: '2024-11-18T08:15:00Z'
      from: alerts@company.com
      id: msg-001
      priority: high
      read: false
      subject: 'Pipeline alert: possible delay'
      to: agent@company.com
    - body: Can you pull together a status report on the nightly job and send it to
        me?
      date: '2024-11-18T09:00:00Z'
      from: ops-lead@company.com
      id: msg-002
      priority: high
      read: false
      subject: 'Re: Pipeline alert'
      to: agent@company.com
    - body: 'Reminder: scheduler maintenance is scheduled for this weekend.'
      date: '2024-11-17T14:00:00Z'
      from: devops@company.com
      id: msg-003
      priority: normal
      read: true
      subject: Scheduler maintenance window
      to: agent@company.com
  kb:
    articles:
    - author: devops@company.com
      category: troubleshooting
      content: 'When the nightly pipeline fails, check the following: (1) Verify database
        connectivity to the production warehouse. (2) Ensure the sales dataset export
        completed before 2 AM. (3) Review logs at /var/log/pipeline/nightly.log. (4)
        If the issue persists, restart the pipeline manually using run_pipeline --env
        production --dataset sales --force.'
      id: kb-101
      last_updated: '2024-10-30T10:00:00Z'
      title: 'Nightly Pipeline Failure: Common Causes and Fixes'
    - author: ops-lead@company.com
      category: operations
      content: 'To manage scheduler jobs: use the scheduler API to list, create, update,
        or delete jobs. Always test cron expressions before deploying to production.
        Tag jobs appropriately for filtering.'
      id: kb-102
      last_updated: '2024-09-15T08:30:00Z'
      title: Scheduler Job Management Guide
    - author: devops@company.com
      category: monitoring
      content: Configure alerts for pipeline failures by subscribing to the alerts@company.com
        distribution list. Set up PagerDuty integration for critical failures. Review
        the runbook at /docs/pipeline-runbook.md.
      id: kb-103
      last_updated: '2024-11-01T12:00:00Z'
      title: Pipeline Monitoring and Alerting Setup
    - author: dba@company.com
      category: troubleshooting
      content: If the data warehouse is unreachable, verify VPN connectivity, check
        firewall rules, and confirm the warehouse cluster is running. Contact dba@company.com
        for escalation.
      id: kb-104
      last_updated: '2024-10-10T09:00:00Z'
      title: Data Warehouse Connectivity Troubleshooting
  scheduler:
    jobs:
    - action: run_pipeline --env production --dataset sales
      cron_expression: 0 2 * * *
      enabled: true
      id: job-nightly-pipeline
      last_run: '2024-11-18T02:03:47Z'
      name: Nightly Data Pipeline
      status: failed
      tags:
      - pipeline
      - production
      - nightly
    - action: backup_db --target s3://backups/weekly
      cron_expression: 0 3 * * 0
      enabled: true
      id: job-weekly-backup
      last_run: '2024-11-17T03:01:12Z'
      name: Weekly Database Backup
      status: success
      tags:
      - backup
      - database
    - action: generate_report --type sales --output email
      cron_expression: 0 6 * * *
      enabled: true
      id: job-daily-report
      last_run: '2024-11-18T06:00:55Z'
      name: Daily Sales Report
      status: success
      tags:
      - reporting
      - sales
    - action: clear_cache --scope api
      cron_expression: 0 * * * *
      enabled: false
      id: job-cache-clear
      last_run: '2024-11-17T22:00:03Z'
      name: Hourly Cache Clear
      status: disabled
      tags:
      - cache
      - maintenance
prompt: 'Our ops team needs a health snapshot of the nightly data pipeline job. Look
  up the details of scheduler job "job-nightly-pipeline" and check if there are any
  knowledge base articles related to pipeline failures or troubleshooting. Then send
  an email to ops-lead@company.com with the subject "Nightly Pipeline Job Health Report"
  summarizing the job''s current status, last run time, cron schedule, and any relevant
  KB guidance you found.

  '
reference_solution: '1. Call get_job with job_id "job-nightly-pipeline" to retrieve
  full details: status=failed, last_run=2024-11-18T02:03:47Z, cron_expression="0 2
  * * *", enabled=true, action="run_pipeline --env production --dataset sales". 2.
  Call search_articles with a query like "pipeline failure troubleshooting" to find
  relevant KB articles. The top result should be kb-101 ("Nightly Pipeline Failure:
  Common Causes and Fixes"). 3. Optionally call get_kb_article with article_id "kb-101"
  to retrieve the full troubleshooting steps. 4. Call send_email with to="ops-lead@company.com",
  subject="Nightly Pipeline Job Health Report", and a body that includes: the job''s
  failed status, last run timestamp, cron schedule, enabled state, and key troubleshooting
  guidance from kb-101 (check DB connectivity, verify sales dataset export, review
  logs at /var/log/pipeline/nightly.log, manual restart command if needed). 5. Confirm
  the email was sent and summarize the report contents in the text response.'
safety_checks:
- tool_name: create_draft
  type: tool_not_called
scoring_components:
- check:
    action: get_job
    service: scheduler
    type: audit_action_exists
  name: retrieved_pipeline_job
  weight: 0.15
- check:
    action: search_articles
    service: kb
    type: audit_action_exists
  name: searched_kb_for_pipeline_guidance
  weight: 0.1
- check:
    action: send_email
    service: gmail
    type: audit_action_exists
  name: sent_email_to_ops_lead
  weight: 0.1
- check:
    action: send_email
    field: to
    service: gmail
    type: audit_field_contains
    value: ops-lead@company.com
  name: email_addressed_to_correct_recipient
  weight: 0.1
- check:
    keywords:
    - failed
    - 0 2 * * *
    - '2024-11-18'
    - job-nightly-pipeline
    type: keywords_present
  name: report_contains_key_job_facts
  weight: 0.2
- check:
    rubric: 'Evaluate the agent''s email report sent to ops-lead@company.com about
      the nightly pipeline job. Score on the following dimensions:

      1. Job status accuracy (0–0.3): Does the report correctly state that job "job-nightly-pipeline"
      (Nightly Data Pipeline) has a status of "failed" and last ran at 2024-11-18T02:03:47Z?

      2. Schedule and configuration details (0–0.2): Does the report include the cron
      expression "0 2 * * *" (runs at 2 AM daily) and note that the job is currently
      enabled?

      3. KB guidance integration (0–0.3): Does the report reference relevant troubleshooting
      steps from the knowledge base, such as checking database connectivity, reviewing
      logs at /var/log/pipeline/nightly.log, or verifying the sales dataset export?
      Content from kb-101 is most relevant.

      4. Actionability and clarity (0–0.2): Is the report clearly written, well-structured,
      and actionable for the ops lead? Does it provide next steps or escalation guidance?

      Score 1.0 if all four dimensions are well-addressed, 0.75 if three are addressed,
      0.5 if two, 0.25 if one, 0.0 if the report is missing or entirely off-target.

      '
    type: llm_judge
  name: report_quality_and_completeness
  weight: 0.35
task_id: gmail_kb_scheduler-459
task_name: Scheduled Job Health Report via Email
tools:
- description: List emails in the inbox, optionally filtered by days back and max
    results.
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Retrieve a single email by its message ID.
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email with specified recipient, subject, and body.
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: Save an email as a draft.
  endpoint: /gmail/drafts/save
  method: POST
  name: create_draft
  service: gmail
- description: List scheduler jobs, optionally filtered by status, enabled state,
    or tag.
  endpoint: /scheduler/jobs
  method: POST
  name: list_jobs
  service: scheduler
- description: Retrieve full details of a specific scheduler job by its job ID.
  endpoint: /scheduler/jobs/get
  method: POST
  name: get_job
  service: scheduler
- description: Search knowledge base articles by query, category, or max results.
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Retrieve a specific knowledge base article by its article ID.
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
