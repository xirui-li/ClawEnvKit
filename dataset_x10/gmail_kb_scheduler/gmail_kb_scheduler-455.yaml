category: ops
claw_eval_id: T41zh_scheduled_task_management
difficulty: medium
files: []
fixtures:
  gmail:
    inbox:
    - body: Hi team, we've had three new hires this week say the onboarding guide
        is missing steps for setting up SSO. Can someone escalate this to the content
        team? The article on account setup seems totally outdated.
      date: '2024-11-18'
      from: marcus.lee@company.com
      id: msg-001
      priority: high
      read: false
      subject: Onboarding docs are confusing new hires
      to: support@company.com
    - body: Seconding Marcus's concern. The VPN setup article hasn't been touched
        in over a year and new hires are stuck. We need updated content ASAP.
      date: '2024-11-19'
      from: priya.nair@company.com
      id: msg-002
      priority: high
      read: false
      subject: 'Re: Onboarding checklist missing VPN section'
      to: support@company.com
    - body: Please review the attached Q4 budget proposal and confirm by Friday.
      date: '2024-11-20'
      from: tom.baker@company.com
      id: msg-003
      priority: normal
      read: true
      subject: Q4 budget approval
      to: support@company.com
    - body: Can someone pull together a list of onboarding articles that need attention?
