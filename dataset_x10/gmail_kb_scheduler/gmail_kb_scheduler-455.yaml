      date: '2024-11-20'
      from: sarah.chen@company.com
      id: msg-004
      priority: high
      read: false
      subject: Content audit request
      to: support@company.com
    - body: Systems will be down Saturday 2am-6am for routine maintenance.
      date: '2024-11-21'
      from: devops@company.com
      id: msg-005
      priority: normal
      read: true
      subject: Scheduled maintenance this weekend
      to: support@company.com
  kb:
    articles:
    - author: content-team
      category: onboarding
      content: 'Welcome to the company. This guide covers your first week. Step 1:
        Complete HR paperwork. Step 2: Set up your laptop. Note: SSO setup instructions
        coming soon.'
      id: kb-101
      last_updated: '2023-03-10'
      title: New Hire Onboarding Overview
    - author: it-team
      category: onboarding
      content: Download the VPN client from the IT portal. Contact IT for credentials.
        (This article is pending a full rewrite for the new Cisco AnyConnect rollout.)
      id: kb-102
      last_updated: '2023-01-05'
      title: VPN Setup for Remote Employees
    - author: content-team
      category: onboarding
      content: To configure SSO, navigate to Settings > Security. [PLACEHOLDER - steps
        to be added after IdP migration is complete]
      id: kb-103
      last_updated: '2023-06-22'
      title: Account and SSO Configuration
    - author: hr-team
      category: onboarding
      content: Log in to the HR portal to enroll in health, dental, and vision plans
        within your first 30 days. Contact hr@company.com for assistance.
      id: kb-104
      last_updated: '2024-09-15'
      title: Employee Benefits Enrollment
    - author: finance-team
      category: finance
      content: Submit all expense reports via Concur within 30 days of the expense
        date. Receipts required for amounts over $25.
