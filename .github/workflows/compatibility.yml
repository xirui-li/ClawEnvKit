name: Compatibility Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .

      - name: Run compatibility checks
        run: python -m clawharness.compatibility.checker

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ -q
