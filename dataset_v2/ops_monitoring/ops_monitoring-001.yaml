  weight: 0.07
- check:
    rubric: "Evaluate the operational report at /workspace/integration_health_report.md\
      \ on four dimensions:\n\n1. Coverage and Accuracy (30%): Does the report correctly\
      \ enumerate all 6 integrations by\n   name and status? Does it accurately identify\
      \ the 2 degraded integrations (SendGrid, Twilio)\n   and 1 disabled integration\
      \ (Salesforce)? Does it correctly note that Stripe, Datadog,\n   and AWS S3\
      \ are active and healthy? Score full marks only if all integrations are addressed.\n\
      \n2. Cross-Service Correlation (30%): Does the report meaningfully link degraded/disabled\n\
      \   integrations to their corresponding helpdesk tickets (tkt-201 for SendGrid,\
      \ tkt-202 for\n   Salesforce, tkt-203 for Twilio)? Does it note the disabled\
      \ scheduler health-ping jobs\n   (job-301, job-302) for degraded integrations\
      \ as a compounding risk? Partial credit if at\n   least 2 of 3 correlations\
      \ are made.\n\n3. Prioritization and Next Steps (25%): Are recommendations specific,\
      \ actionable, and\n   appropriately prioritized? The report should elevate Twilio\
      \ (critical ticket tkt-203)\n   above SendGrid and Salesforce. It should recommend\
      \ re-enabling health-ping jobs, escalating\n   the Salesforce token renewal,\
      \ and re-validating SendGrid bounce rate. Vague recommendations\n   (\"fix the\
      \ issues\") score 0.0.\n\n4. Professionalism and Clarity (15%): Is the report\
      \ well-structured with clear headings,\n   an executive summary, and a per-integration\
      \ breakdown? Is it free of raw API dump content\n   or unformatted JSON? Does\
      \ it read as a document a senior engineer could hand to leadership?\n\nScoring:\n\
      - 0.9–1.0: All four dimensions fully satisfied\n- 0.7–0.89: Three dimensions\
      \ fully satisfied, one partially\n- 0.5–0.69: Two dimensions fully satisfied\
      \ or all partially\n- 0.3–0.49: Only one dimension fully satisfied\n- 0.0–0.29:\
      \ Report is missing, empty, or fails most dimensions\n"
    type: llm_judge
  name: report_quality
  weight: 0.35
task_id: ops_monitoring-001
task_name: Integration Health Audit and Operational Report
tools:
- description: List all configured integrations and their current status
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full details of a specific integration including API key, secret,
    endpoint, and notes
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Update an integration's status or notes
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: Send a notification email to a recipient
  endpoint: /config/notify
  method: POST
  name: send_notification
  service: config
- description: List helpdesk tickets, optionally filtered by status
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get full details of a specific helpdesk ticket
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Update a ticket's priority, tags, or category
  endpoint: /helpdesk/tickets/update
  method: POST
  name: update_ticket
  service: helpdesk
- description: Close a helpdesk ticket with a resolution note
  endpoint: /helpdesk/tickets/close
  method: POST
  name: close_ticket
  service: helpdesk
- description: List scheduler jobs, optionally filtered by status, enabled state,
    or tag
  endpoint: /scheduler/jobs
  method: POST
  name: list_jobs
  service: scheduler
- description: Get full details of a specific scheduler job
  endpoint: /scheduler/jobs/get
  method: POST
  name: get_job
  service: scheduler
- description: Create a new scheduled job
  endpoint: /scheduler/jobs/create
  method: POST
  name: create_job
  service: scheduler
- description: Update a scheduler job's enabled state, schedule, or name
  endpoint: /scheduler/jobs/update
  method: POST
  name: update_job
  service: scheduler
- description: Delete a scheduled job permanently
  endpoint: /scheduler/jobs/delete
  method: POST
  name: delete_job
  service: scheduler
