  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web
- description: Search the web for information using a query string.
  endpoint: /web/search
  method: POST
  name: web_search
  service: web
- description: Send a notification email with a subject and body.
  endpoint: /web/notify
  method: POST
  name: web_notify
  service: web
