tools:
- description: Search the web for current information on a topic. Returns a list of
    results with titles, URLs, and snippets.
  endpoint: /web/search
  method: POST
  name: web_search
  service: web
- description: Fetch the full content of a web page given its URL.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web
- description: Send an email notification to a recipient with a subject and body.
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web
