  target: tos_template.txt
fixtures:
  pages:
  - content: 'ACME ANALYTICS TERMS OF SERVICE

      Last Updated: March 15, 2024


      1. DATA RETENTION POLICY

      Acme Analytics retains user data for a period of 24 months following account
      termination.

      Aggregated, anonymized data may be retained indefinitely for product improvement
      purposes.

      Backups are purged within 90 days of the standard retention period.


      2. USER DATA DELETION

      Users may request deletion of their personal data by submitting a request to
      privacy@acmeanalytics.com.

      Deletion requests will be processed within 30 days. Some data may be retained
      to comply with

      legal obligations or resolve disputes.


      3. GDPR COMPLIANCE

      Acme Analytics is fully compliant with the General Data Protection Regulation
      (GDPR).

      We act as a data processor on behalf of our customers, who are the data controllers.

      EU users have the right to access, rectify, erase, and port their data.

      Our Data Protection Officer can be reached at dpo@acmeanalytics.com.


      4. DATA TRANSFERS

      Data may be transferred to servers located outside the European Economic Area.

      Such transfers are protected by Standard Contractual Clauses (SCCs) approved
      by the EU Commission.


      5. CONTACT

      For legal inquiries: legal@acmeanalytics.com

      '
    snippet: Acme Analytics ToS covering data retention (24 months), deletion rights,
      and GDPR compliance.
    title: Terms of Service - Acme Analytics
    url: https://acmeanalytics.com/legal/terms
  - content: 'BRIGHTMETRICS TERMS OF SERVICE

      Effective Date: January 1, 2024


      1. DATA STORAGE AND RETENTION

      BrightMetrics stores customer data on AWS infrastructure located in the United
      States.

      We do not have a defined data retention policy. Data is stored until account
      cancellation.

      Upon cancellation, data may remain in our systems for up to 12 months before
      deletion.


      2. ACCOUNT TERMINATION AND DATA

      Upon termination of your account, you lose access to your data immediately.

      BrightMetrics is not responsible for any data loss following account termination.

      We do not provide data export tools or migration assistance.


      3. PRIVACY

      We take privacy seriously. For questions about your data, contact support@brightmetrics.io.

      NOTE: BrightMetrics does not currently maintain a formal GDPR compliance program.

      European users should be aware that data is stored exclusively in the US without

      Standard Contractual Clauses or other transfer mechanisms in place.


      4. LIMITATION OF LIABILITY

      BrightMetrics shall not be liable for any loss of data, revenue, or profits.


      5. GOVERNING LAW

      These terms are governed by the laws of the State of Delaware, USA.

      '
    snippet: BrightMetrics ToS — limited data policies, no formal GDPR compliance
      program noted.
    title: BrightMetrics Terms of Service
    url: https://brightmetrics.io/terms-of-service
  - content: 'DATAFLOW PRO TERMS OF SERVICE

      Version 4.2 | Updated: February 28, 2024


      1. DATA RETENTION

      DataFlow Pro retains customer data for 36 months post-contract unless otherwise
      agreed in writing.

      Users may configure custom retention windows (minimum 6 months) via account
      settings.

      All data is permanently and irreversibly deleted at the end of the retention
      period.


      2. RIGHT TO ERASURE AND DATA DELETION

      In accordance with GDPR Article 17, users have the right to erasure ("right
      to be forgotten").

      Deletion requests are processed within 72 hours for active accounts.

      A verified deletion certificate is provided upon completion of all erasure requests.

      Exceptions apply for data required for legal compliance (e.g., financial records
      under EU law).


      3. GDPR AND INTERNATIONAL COMPLIANCE

      DataFlow Pro is certified under the EU-US Data Privacy Framework.

      We maintain a comprehensive GDPR compliance program including:

      - Appointed Data Protection Officer (DPO): gdpr@dataflowpro.com

      - Data Processing Agreements (DPAs) available upon request

      - Annual third-party privacy audits

      - Privacy by design principles embedded in product development


      4. DATA PORTABILITY

      Users may export all their data in CSV, JSON, or XML format at any time.

      Export requests are fulfilled within 48 hours.


      5. SUB-PROCESSORS

      A current list of sub-processors is maintained at dataflowpro.com/sub-processors.

      Customers are notified 30 days in advance of any new sub-processor additions.


      6. CONTACT

      DPO: gdpr@dataflowpro.com | Legal: legal@dataflowpro.com

      '
    snippet: DataFlow Pro ToS with detailed GDPR program, 36-month retention, 72hr
      deletion, and DPA availability.
    title: DataFlow Pro — Terms of Service & Legal
    url: https://dataflowpro.com/tos
