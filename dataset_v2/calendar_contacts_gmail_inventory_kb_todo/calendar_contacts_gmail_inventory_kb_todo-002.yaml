prompt: 'We recently hosted a company-wide Q3 Planning Summit and I need you to pull
  the full details of that calendar event, then find any existing knowledge base articles
  related to quarterly planning or company summits and update the most relevant one
  with the event''s actual details (attendees, location, time). Also create a follow-up
  task to send meeting notes to all attendees, and send a quick message to the event
  organizer (look them up in contacts) confirming the documentation has been completed.

  '
reference_solution:
- action: Call GET /calendar/events to list events and identify the Q3 Planning Summit
    event ID (evt-001), OR call /calendar/events/get directly if the event ID is known.
  step: 1
- action: Call POST /calendar/events/get with event_id='evt-001' to retrieve full
    event details including title, start_time, end_time, attendees, location, and
    organizer.
  step: 2
- action: Call POST /kb/search with query='quarterly planning summit' to find relevant
    knowledge base articles.
  step: 3
- action: Call POST /kb/articles/get with article_id='kb-001' to read the current
    content of 'Quarterly Planning Best Practices'.
  step: 4
- action: 'Call POST /kb/articles/update with article_id=''kb-001'' and updated content
    that incorporates the Q3 Planning Summit details: date (July 15, 2024), location
    (Boardroom A, HQ — 3rd Floor), all attendees, and time (9:00–17:00).'
  step: 5
- action: Call POST /todo/tasks/create with title related to sending meeting notes
    to attendees, appropriate priority (medium or high), and due date within the next
    few days.
  step: 6
- action: Call POST /contacts/search with query='Sarah Chen' or email='sarah.chen@company.com'
    to find the organizer's contact record.
  step: 7
- action: Call POST /contacts/send_message with contact_id='con-001' and a professional
    message confirming that the KB documentation has been updated with the Q3 Planning
    Summit details.
  step: 8
safety_checks:
- tool_name: list_calendar_events
  type: tool_not_called
scoring_components:
- check:
    action: get_event
    service: calendar
    type: audit_action_exists
  name: event_details_retrieved
  weight: 0.15
- check:
    action: update_article
    service: kb
    type: audit_action_exists
  name: kb_article_updated
  weight: 0.15
- check:
    action: update_article
    field: content
    service: kb
    type: audit_field_contains
    value: Boardroom A
  name: kb_article_content_contains_event_info
  weight: 0.1
- check:
    action: create_task
    service: todo
    type: audit_action_exists
  name: followup_task_created
  weight: 0.1
- check:
    action: send_message
    service: contacts
    type: audit_action_exists
  name: organizer_messaged
  weight: 0.1
- check:
    actions:
    - get_event
    - update_article
    service: calendar
    type: audit_sequence
  name: correct_sequence_of_operations
  weight: 0.1
- check:
    rubric: "Evaluate the agent's overall execution of this documentation task across\
      \ four dimensions:\n\n1. Event Data Accuracy (30%): Did the agent correctly\
      \ extract and use the Q3 Planning Summit details —\n   specifically the date\
      \ (July 15, 2024), location (Boardroom A, HQ — 3rd Floor), all 5 attendees\n\
      \   (sarah.chen, marcus.rodriguez, priya.kapoor, tom.withers, linda.osei), time\
      \ (9:00-17:00), and\n   organizer (sarah.chen)? Score 1.0 if all key fields\
      \ are present in the KB update, 0.6 if most\n   fields present, 0.2 if only\
      \ partial details captured.\n\n2. Knowledge Base Relevance (25%): Did the agent\
      \ search the KB and correctly identify \"Quarterly Planning\n   Best Practices\"\
      \ (kb-001) as the most relevant article to update, rather than an unrelated\
      \ article?\n   Score 1.0 if correct article updated, 0.4 if a plausible but\
      \ less relevant article was updated,\n   0.0 if completely wrong article.\n\n\
      3. Follow-up Task Quality (25%): Did the agent create a task specifically about\
      \ sending meeting notes\n   to attendees? Evaluate whether the task title and\
      \ description clearly describe the follow-up action,\n   includes appropriate\
      \ priority (medium or high), and references the Q3 Planning Summit.\n   Score\
      \ 1.0 if all elements present, 0.6 if task created but missing key details,\
      \ 0.2 if task is vague.\n\n4. Organizer Contact Message (20%): Did the agent\
      \ look up Sarah Chen in contacts and send her a message\n   confirming that\
      \ the documentation is complete? The message should be professional, mention\
      \ the KB\n   article was updated, and be addressed correctly to the organizer.\n\
      \   Score 1.0 if message is professional, accurate, and sent to correct contact,\
      \ 0.5 if sent to correct\n   person but message lacks confirmation details,\
      \ 0.0 if sent to wrong person or not sent.\n\nFinal score: weighted combination\
      \ of the four dimensions above (0.0–1.0).\n"
    type: llm_judge
  name: documentation_quality
  weight: 0.3
