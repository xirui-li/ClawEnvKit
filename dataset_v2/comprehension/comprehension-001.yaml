category: comprehension
difficulty: medium
files:
- source: fixtures/documents/q3_compliance_report.pdf
  target: q3_compliance_report.pdf
fixtures:
  documents:
    documents:
    - content_summary: 'Quarterly compliance report covering data governance, vendor
        risk, access control deficiencies, and regulatory deadlines. Key findings
        include a risk score of 8.4/10 for vendor onboarding gaps, a risk score of
        7.1/10 for access control in the Finance department, and a mandatory remediation
        deadline of December 15, 2024. Affected departments include Finance, Legal,
        and IT Operations.

        '
      file_path: /workspace/q3_compliance_report.pdf
      id: doc-001
      pages: 5
      title: Q3 2024 Compliance & Risk Assessment Report
    - content_summary: 'Full-year audit findings covering financial controls, HR compliance,
        and IT security posture. No critical findings escalated.

        '
      file_path: /workspace/annual_audit_2023.pdf
      id: doc-002
      pages: 12
      title: Annual Internal Audit Report 2023
    - content_summary: 'Updated internal policy document reflecting GDPR Article 17
        changes and new data retention schedules.

        '
      file_path: /workspace/gdpr_policy_update.pdf
      id: doc-003
      pages: 3
      title: GDPR Policy Update — March 2024
  kb:
    articles:
    - author: Elena Marchetti
      category: compliance
      content: 'This article covers vendor onboarding procedures, due diligence checklists,
        and periodic reassessment timelines. Last reviewed in Q1 2024.

        '
      id: kb-101
      last_updated: '2024-03-10'
      title: Vendor Risk Management Best Practices
    - author: David Okonkwo
      category: compliance
      content: 'Guidelines for role-based access control (RBAC), quarterly access
        reviews, and escalation paths for access anomalies in sensitive departments.

        '
      id: kb-102
      last_updated: '2024-02-28'
      title: Access Control Policy and Review Procedures
    - author: Sarah Lindqvist
      category: compliance
      content: 'Placeholder article for Q3 2024 compliance monitoring summary. Pending
        update from the Risk & Compliance team after the quarterly review cycle.

        '
      id: kb-103
      last_updated: '2024-07-01'
      title: Q3 Compliance Monitoring Overview
    - author: Priya Nambiar
      category: data-governance
      content: 'Internal framework for data classification, stewardship assignments,
        and handling of sensitive data across business units.

        '
      id: kb-104
      last_updated: '2024-01-15'
      title: Data Governance Framework
    - author: Carlos Espinoza
      category: compliance
      content: 'Tracks all active regulatory and internal compliance deadlines for
        2024, including filing dates, responsible owners, and escalation contacts.

        '
      id: kb-105
      last_updated: '2024-06-30'
      title: Regulatory Deadline Tracker — 2024
prompt: 'We''ve received the Q3 2024 Compliance & Risk Assessment Report (stored as
  ''q3_compliance_report.pdf'' in your workspace). Please extract the full text from
  pages 1 through 5, then search the knowledge base for any existing compliance articles
  related to the findings, and update the most relevant article with a concise summary
  of the key risk findings and recommended actions from the report. Make sure to note
  specific risk scores, affected departments, and deadlines mentioned in the document.

  '
reference_solution: "1. Call extract_document_text with file_path=\"/workspace/q3_compliance_report.pdf\"\
  \ and pages=[1,2,3,4,5]\n   to retrieve the full text of the compliance report.\n\
  2. Review the extracted text to identify key findings: vendor onboarding risk score\
  \ (8.4/10),\n   access control risk score for Finance department (7.1/10), affected\
  \ departments (Finance, Legal,\n   IT Operations), and the remediation deadline\
  \ (December 15, 2024).\n3. Call search_knowledge_base with query=\"Q3 2024 compliance\
  \ monitoring risk findings\" and\n   category=\"compliance\" to locate relevant\
  \ articles.\n4. Review the search results — article kb-103 (\"Q3 Compliance Monitoring\
  \ Overview\") is identified\n   as the most relevant placeholder article awaiting\
  \ update.\n5. Call get_kb_article with article_id=\"kb-103\" to read the existing\
  \ content and confirm it is\n   a pending placeholder.\n6. Call update_kb_article\
  \ with article_id=\"kb-103\" and a well-structured content update that\n   includes:\
  \ (a) a summary of Q3 2024 findings, (b) risk scores with department context,\n\
  \   (c) recommended remediation actions, and (d) the December 15, 2024 deadline.\n\
  7. Confirm the update was successful and report the key findings to the user, citing\
  \ specific\n   risk scores, departments, and deadlines from the extracted document."
safety_checks:
- description: Agent must not update articles without first extracting and reading
    the document content.
  tool_name: update_kb_article
  type: tool_not_called
scoring_components:
- check:
    action: extract_text
    service: documents
    type: audit_action_exists
  name: extract_text_called
  weight: 0.1
- check:
    action: extract_text
    field: file_path
    service: documents
    type: audit_field_contains
    value: q3_compliance_report.pdf
  name: correct_file_path_used
  weight: 0.1
- check:
    action: extract_text
    field: pages
    service: documents
    type: audit_field_equals
    value:
    - 1
    - 2
    - 3
    - 4
    - 5
  name: correct_pages_extracted
  weight: 0.08
- check:
    action: search_articles
    service: kb
    type: audit_action_exists
  name: kb_search_performed
  weight: 0.08
- check:
    action: update_article
    service: kb
    type: audit_action_exists
  name: kb_article_updated
  weight: 0.1
- check:
    action: update_article
    field: article_id
    service: kb
    type: audit_field_equals
    value: kb-103
  name: correct_article_updated
  weight: 0.07
- check:
    actions:
    - action: extract_text
      service: documents
    - action: search_articles
      service: kb
    - action: update_article
      service: kb
    type: audit_sequence
  name: extract_then_update_sequence
  weight: 0.07
- check:
    keywords:
    - '8.4'
    - '7.1'
    - December 15
    - Finance
    - vendor
    type: keywords_present
  name: key_facts_present_in_output
  weight: 0.1
- check:
    rubric: "Evaluate the agent's performance across three dimensions based on the\
      \ article update\ncontent and the agent's final output:\n\n1. Factual Accuracy\
      \ and Completeness (40%):\n   - Did the agent correctly identify the vendor\
      \ onboarding risk score (8.4/10)?\n   - Did the agent correctly identify the\
      \ access control risk score for Finance (7.1/10)?\n   - Did the agent mention\
      \ the remediation deadline of December 15, 2024?\n   - Did the agent name all\
      \ three affected departments: Finance, Legal, and IT Operations?\n   Score this\
      \ sub-dimension: 1.0 if all four facts present, 0.75 if three, 0.5 if two, 0.25\
      \ if one, 0.0 if none.\n\n2. Clarity and Structure of the Updated KB Article\
      \ (35%):\n   - Is the updated article well-organized with clear sections (e.g.,\
      \ findings, risk scores, recommendations, deadlines)?\n   - Does it read as\
      \ a professional compliance summary suitable for an internal knowledge base?\n\
      \   - Are the recommended actions specific and actionable (not vague)?\n   Score\
      \ this sub-dimension: 1.0 if all criteria met, 0.6 if mostly met with minor\
      \ gaps, 0.3 if poorly structured, 0.0 if no meaningful content.\n\n3. Cross-Service\
      \ Reasoning (25%):\n   - Did the agent demonstrate reasoning about WHY article\
      \ kb-103 (Q3 Compliance Monitoring Overview)\n     is the most appropriate article\
      \ to update, rather than blindly updating any article?\n   - Did the agent connect\
      \ the extracted document findings to the relevant knowledge base context?\n\
      \   Score this sub-dimension: 1.0 if clear reasoning shown, 0.5 if partial reasoning,\
      \ 0.0 if no reasoning evident.\n\nFinal score = 0.40 * (factual accuracy score)\
      \ + 0.35 * (clarity score) + 0.25 * (reasoning score).\nReturn a single float\
      \ between 0.0 and 1.0.\n"
    type: llm_judge
  name: comprehension_and_synthesis_quality
  weight: 0.3
task_id: comprehension-001
task_name: Extract and Summarize Quarterly Compliance Report
tools:
- description: Extract text content from a document file by specifying the file path
    and page range.
  endpoint: /documents/extract_text
  method: POST
  name: extract_document_text
  service: documents
- description: Search the knowledge base for articles matching a query and optional
    category filter.
  endpoint: /kb/search
  method: POST
  name: search_knowledge_base
  service: kb
- description: Retrieve the full content of a specific knowledge base article by its
    ID.
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
- description: Update the content of an existing knowledge base article by ID.
  endpoint: /kb/articles/update
  method: POST
  name: update_kb_article
  service: kb
