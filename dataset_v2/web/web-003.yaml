difficulty: medium
fixtures:
  pages:
  - content: 'Tree Nut Allergy Overview - FARE

      Tree nut allergies affect approximately 1% of the U.S. population and are one
      of the leading causes of fatal and near-fatal food allergic reactions.


      Common tree nuts include: almonds, cashews, walnuts, pecans, pistachios, Brazil
      nuts, hazelnuts, macadamia nuts, and pine nuts.


      Cross-contamination risks:

      - Shared processing equipment is a significant source of cross-contamination

      - Even trace amounts (as low as 1mg of protein) can trigger reactions in highly
      sensitive individuals

      - Symptoms can appear within minutes to 2 hours after exposure

      - Reactions range from mild (hives, itching) to severe (anaphylaxis, throat
      swelling, difficulty breathing)


      What to do if you suspect cross-contamination:

      1. Notify all potentially affected consumers immediately

      2. Clearly disclose the specific nut involved

      3. Advise individuals with nut allergies to avoid the product entirely

      4. Recommend guests carry their epinephrine auto-injector (EpiPen) if they choose
      to dine

      5. Offer alternative menu options free of the allergen


      Restaurant recommendations:

      - Proactively reach out to guests before their reservation

      - Provide a detailed list of affected menu items

      - Offer full refunds or alternative dining arrangements

      - Document all communications for liability purposes

      '
    snippet: Tree nut allergies are among the most common food allergies and can cause
      severe reactions including anaphylaxis.
    title: Tree Nut Allergy - Food Allergy Research & Education (FARE)
    url: https://www.foodallergy.org/resources/tree-nut-allergy
  - content: 'CDC Food Allergen Emergency Response Guidelines


      When a food service establishment discovers potential allergen cross-contamination,
      immediate action is required:


      Priority 1 - Notification (within 24 hours):

      - Contact all guests with relevant allergies who have upcoming reservations

      - Be specific about which dishes are affected

      - Provide clear language about the nature and severity of the risk

      - Include guidance on what actions the guest should take


      Key messaging elements for allergy alerts:

      - Identify the specific allergen (e.g., tree nuts, peanuts)

      - Name the source of contamination

      - List all affected menu items

      - State the risk level clearly without causing undue panic

      - Offer concrete alternatives or compensation

      - Provide a contact number for questions


      Legal and ethical obligations:

      - Restaurants have a duty of care to disclose known allergen risks

      - Failure to notify can result in serious liability

      - Documentation of notification attempts is essential

      '
    snippet: Immediate notification is critical when cross-contamination is discovered
      in food service settings.
    title: CDC Food Allergen Response Protocol
    url: https://www.cdc.gov/niosh/topics/emres/chemagent/treenut-protocol.html
  - content: 'Harvest Table Winter Menu 2024


