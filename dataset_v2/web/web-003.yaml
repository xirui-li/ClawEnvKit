- check:
    rubric: "Evaluate the allergy alert notifications sent by the agent across all\
      \ three guests.\nReview the body content of each notification on these dimensions:\n\
      \n1. Specificity of Risk (35%): Does the notification clearly identify tree\
      \ nuts as the allergen,\n   mention that the issue stems from supplier cross-contamination\
      \ in house-made pasta, and name\n   specific affected dishes (e.g., Truffle\
      \ Tagliatelle, Butternut Squash Ravioli)?\n   Full credit if all three elements\
      \ are present; partial for two; minimal for one.\n\n2. Health Guidance (35%):\
      \ Does the notification include health risk information such as potential\n\
      \   for anaphylaxis or severe reaction, advise the guest to consider carrying\
      \ an EpiPen,\n   and suggest contacting the restaurant or avoiding the affected\
      \ dishes?\n   Full credit if substantive health guidance is present; partial\
      \ if only vague warnings.\n\n3. Guest-Centered Tone (30%): Is the notification\
      \ respectful, non-alarmist yet urgent,\n   personalized (uses guest name or\
      \ references their allergy profile), and does it offer\n   a concrete next step\
      \ (e.g., reschedule, choose alternative dishes, call the restaurant)?\n   Full\
      \ credit if warm, specific, and actionable; deduct for generic or cold messaging.\n\
      \nScore 1.0 if all three dimensions are fully met across the notifications.\n\
      Score 0.7 if two dimensions are fully met and one is partially met.\nScore 0.4\
      \ if only one dimension is fully met.\nScore 0.2 if notifications were sent\
      \ but content is vague or missing key elements.\nScore 0.0 if no substantive\
      \ notification content is found.\n"
    type: llm_judge
  name: notification_body_quality
  weight: 0.2
- check:
    rubric: "Evaluate how well the agent synthesized information from web research\
      \ into its notifications\nand final response. Consider the following:\n\n1.\
      \ Source Utilization (40%): Did the agent fetch content from at least one authoritative\
      \ source\n   (FARE, CDC, or similar) and incorporate specific facts such as\
      \ reaction severity thresholds,\n   cross-contamination mechanics, or notification\
      \ best practices into the notifications or\n   its summary? Full credit for\
      \ evidence of direct incorporation; partial for vague references.\n\n2. Completeness\
      \ of Affected Guest Identification (30%): Did the agent identify and notify\n\
      \   all three guests who have nut allergies (Margaret Chen, David Okonkwo, and\
      \ Sofia Ramirez)?\n   Full credit if all three are notified; 0.5 if two are\
      \ notified; 0.1 if only one.\n\n3. Actionable Summary (30%): Did the agent provide\
      \ a final summary or confirmation message\n   to the restaurant staff explaining\
      \ what was done, which guests were contacted, what\n   information was included,\
      \ and any recommended follow-up steps?\n   Full credit for a complete, organized\
      \ summary; partial for incomplete; none if absent.\n\nScore 1.0 if all three\
      \ dimensions score full credit.\nScore 0.7 if two dimensions are fully met.\n\
      Score 0.4 if one dimension is fully met.\nScore 0.1 if the agent attempted research\
      \ but produced poor output.\nScore 0.0 if no meaningful research integration\
      \ is evident.\n"
    type: llm_judge
  name: research_integration_quality
  weight: 0.25
