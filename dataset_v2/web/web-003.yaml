tools:
- description: Search the web for information using a query string. Returns a list
    of relevant results with titles, URLs, and snippets.
  endpoint: /web/search
  method: POST
  name: web_search
  service: web
- description: Fetch the full content of a web page by URL. Returns the page title
    and complete text content.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web
- description: Send an email notification to a recipient. Requires 'to' (email address),
    'subject', and 'body' fields.
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web
