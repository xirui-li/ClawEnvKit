fixtures:
  kb:
    articles:
    - author: Maya Patel
      category: security
      content: 'Two-factor authentication (2FA) is a security mechanism that requires
        users to provide two distinct forms of verification before gaining access
        to an account. The first factor is typically a password (something you know),
        and the second factor is usually a one-time code sent to a registered mobile
        device (something you have). Enabling 2FA significantly reduces the risk of
        unauthorized access, even if a password is compromised. Common 2FA methods
        include SMS-based codes, authenticator apps (such as Google Authenticator
        or Authy), and hardware tokens. Organizations should enforce 2FA for all privileged
        accounts and encourage its use across all user accounts.

        '
      id: kb-001
      last_updated: '2024-11-15'
      title: Introduction to Two-Factor Authentication (2FA)
    - author: Jordan Lee
      category: security
      content: 'To enable two-factor authentication on your account, navigate to Account
        Settings > Security > Two-Factor Authentication. Click "Enable 2FA" and choose
        your preferred method: SMS, authenticator app, or hardware key. If using an
        authenticator app, scan the QR code displayed on screen with your chosen app.
        You will be prompted to enter a 6-digit verification code to confirm setup.
        Store your backup codes in a safe location in case you lose access to your
        device. Once enabled, you will be asked for a second factor every time you
        log in from an unrecognized device or browser.

        '
      id: kb-002
      last_updated: '2024-12-01'
      title: Setting Up 2FA on Your Account
    - author: Maya Patel
      category: security
      content: 'If you are unable to log in with two-factor authentication, first
        ensure your device clock is synchronized, as authenticator apps rely on accurate
        time. If you have lost access to your authentication device, use one of the
        backup codes provided during setup. Contact support if you have exhausted
        all backup codes. Do not share your 2FA codes with anyone, including support
        staff. If you suspect your account has been compromised, immediately change
        your password and regenerate your 2FA credentials. SMS-based 2FA may occasionally
        be delayed due to carrier issues; wait up to 5 minutes before requesting a
        new code.

        '
      id: kb-003
      last_updated: '2024-12-10'
      title: Troubleshooting 2FA Login Issues
    - author: Jordan Lee
      category: security
      content: 'All user accounts must comply with the following password policy:
        minimum 12 characters, at least one uppercase letter, one lowercase letter,
        one number, and one special character. Passwords must be changed every 90
        days. Reuse of the last 10 passwords is prohibited. Use a reputable password
        manager to generate and store complex passwords securely. Avoid using personal
        information such as birthdays or names in passwords.

        '
      id: kb-004
      last_updated: '2024-10-20'
      title: Password Policy Requirements
    - author: Chris Nguyen
      category: security
      content: 'Session tokens are temporary credentials issued after a successful
        login that allow users to navigate the platform without re-authenticating
        on every page. Tokens expire after 30 minutes of inactivity or 8 hours from
        issuance, whichever comes first. Users on shared or public computers should
        always log out manually to invalidate their session token. Administrators
        can force-expire all active sessions for a user from the Admin Console under
        User Management.

        '
      id: kb-005
      last_updated: '2024-11-28'
      title: Understanding Session Tokens and Expiry
  rss:
    articles:
    - category: security
      date: '2024-12-05'
      id: rss-001
      source: Krebs on Security
      summary: Cybersecurity researchers report a dramatic increase in real-time phishing
        attacks that intercept one-time passwords. Attackers use fake login pages
        to capture both passwords and 2FA codes simultaneously, bypassing traditional
        two-factor protection. Security experts recommend switching from SMS-based
        2FA to app-based or hardware key authentication.
      title: Phishing Attacks Targeting 2FA Codes Rise 40% in 2024
    - category: security
      date: '2024-12-08'
      id: rss-002
      source: TechCrunch Security
      summary: Security analysts explain that authenticator apps generate time-based
        codes locally on your device, making them far harder for attackers to intercept
        compared to SMS codes, which can be stolen via SIM-swapping scams. Major platforms
        are now defaulting new users to app-based 2FA during account creation.
      title: Why Authenticator Apps Beat SMS for Account Security
    - category: security
      date: '2024-12-11'
      id: rss-003
      source: TechCrunch Security
      summary: 'Experts recommend: enabling 2FA on all accounts, using unique passwords
        with a password manager, being cautious of unsolicited login prompts, regularly
        reviewing account activity, and keeping recovery options up to date. Simple
        habits can block over 90% of automated account attacks.'
      title: Top 5 Account Security Habits Every User Should Practice
    feeds:
    - category: security
      id: feed-001
      name: TechCrunch Security
      url: https://techcrunch.com/security/feed
    - category: security
      id: feed-002
      name: Krebs on Security
      url: https://krebsonsecurity.com/feed
prompt: 'Our product team wants a plain-language FAQ document for new customers who
  are unfamiliar with technical jargon. Please find our knowledge base articles on
  "two-factor authentication" and look up any recent news articles about account security
  best practices. Then rewrite the key information as a simple, friendly ELI5 (Explain
  Like I''m 5) FAQ with at least 3 questions and answers that a non-technical customer
  could understand. Save the final FAQ as /workspace/eli5_faq.md.

  '
reference_solution: '1. Call search_kb with query="two-factor authentication" and
  category="security" to find relevant KB articles.

  2. Call get_kb_article for article IDs kb-001 ("Introduction to Two-Factor Authentication"),
  kb-002 ("Setting Up 2FA"), and kb-003 ("Troubleshooting 2FA Login Issues") to retrieve
  full content.

  3. Call list_rss_articles with category="security" to discover recent news articles
  on account security.

  4. Call get_rss_article for rss-001 ("Phishing Attacks Targeting 2FA Codes Rise
  40%") and rss-002 ("Why Authenticator Apps Beat SMS") to gather current, real-world
  context.

  5. Synthesize information from all sources into a plain-language ELI5 FAQ with at
  least 3 Q&A pairs, covering: (a) what 2FA is in simple terms, (b) how to set it
  up, and (c) what to do if you get locked out or something goes wrong.

  6. Incorporate insights from the RSS articles (e.g., authenticator apps are safer
  than SMS, phishing is a growing risk) in accessible language.

  7. Write the FAQ in a warm, friendly tone using analogies and avoiding technical
  jargon.

  8. Save the completed FAQ as /workspace/eli5_faq.md.

  9. Do NOT call publish_newsletter — the task only asks to create the file, not distribute
  it.'
