- check:
    rubric: "Evaluate the ELI5 FAQ document saved at /workspace/eli5_faq.md across\
      \ four dimensions:\n\n1. Simplicity and Accessibility (30%): Is the language\
      \ genuinely simple enough for a non-technical person?\n   Are complex concepts\
      \ explained using analogies, everyday language, or relatable comparisons (e.g.,\
      \ \"like a second lock on your door\")?\n   Penalize heavily for unexplained\
      \ jargon or overly technical phrasing.\n\n2. Coverage and Completeness (25%):\
      \ Does the FAQ contain at least 3 distinct questions and answers?\n   Do the\
      \ Q&As meaningfully cover different aspects (e.g., what 2FA is, how to set it\
      \ up, what to do if something goes wrong)?\n   Was information drawn from BOTH\
      \ the knowledge base articles AND the RSS news feed summaries?\n\n3. Accuracy\
      \ and Fidelity to Sources (25%): Are the facts consistent with the source material?\n\
      \   The document should correctly reflect that authenticator apps are more secure\
      \ than SMS, that backup codes exist, and that phishing attacks targeting 2FA\
      \ are a growing concern.\n   Penalize for factual errors or contradictions with\
      \ the fixtures.\n\n4. Tone and Friendliness (20%): Is the tone warm, encouraging,\
      \ and customer-friendly?\n   Does it avoid being condescending or overly alarming?\n\
      \   A good ELI5 FAQ should reassure the reader while still motivating them to\
      \ take action.\n\nScoring guide:\n- 1.0: Excellent on all four dimensions; document\
      \ is genuinely ELI5, complete, accurate, and friendly.\n- 0.75: Good overall;\
      \ minor lapses in one dimension (e.g., one jargon term, slightly formal tone).\n\
      - 0.5: Adequate; covers the basics but feels too technical in places, or missing\
      \ a key topic area.\n- 0.25: Weak; mostly technical language, fewer than 3 Q&As,\
      \ or significant inaccuracies.\n- 0.0: File is missing, empty, or completely\
      \ fails to meet the ELI5 requirement.\n"
    type: llm_judge
  name: eli5_faq_quality
  weight: 0.35
