category: content_rewriting
difficulty: medium
files: []
fixtures:
  kb:
    articles:
    - author: Priya Sharma
      category: security
      content: 'All internal systems must use AES-256 encryption for data at rest.
        Data in transit must be protected using TLS 1.3 or higher. Encryption keys
        are managed through our centralized KMS and rotated every 90 days. Exceptions
        must be approved by the CISO and documented in the exception registry. Non-compliance
        results in immediate escalation to the security review board.

        '
      id: kb-art-001
      last_updated: '2024-10-15'
      title: Data Encryption Policy for Internal Systems
    - author: Marcus Chen
      category: security
      content: 'Upon detection of a potential data breach, the incident commander
        must be notified within 15 minutes. The security operations team will isolate
        affected systems within 1 hour. Forensic analysis begins within 4 hours. Regulatory
        notification (GDPR/CCPA) must occur within 72 hours of confirmed breach. A
        post-incident review is mandatory within 30 days.

        '
      id: kb-art-002
      last_updated: '2024-11-02'
      title: Incident Response Playbook — Data Breach
    - author: Lena Hoffmann
      category: security
      content: 'All employee accounts require multi-factor authentication (MFA). Privileged
        access management (PAM) is enforced for all admin roles. Access reviews occur
        quarterly. Dormant accounts are disabled after 30 days of inactivity and purged
        after 90 days. Third-party vendor access is subject to a zero-trust network
        model with time-limited tokens.

        '
      id: kb-art-003
      last_updated: '2024-09-20'
      title: Access Control and Identity Management Standards
    - author: James Okafor
      category: security
      content: 'All cloud storage buckets must be private by default. Public-facing
        buckets require CISO approval and annual review. Server-side encryption must
        be enabled on all S3-equivalent storage. Access logs are retained for 12 months
        and monitored by SIEM. Cross-region replication data must also meet encryption
        requirements.

        '
      id: kb-art-004
      last_updated: '2024-08-30'
      title: Cloud Storage Security Guidelines
    - author: Sofia Reyes
      category: hr
      content: 'All employees complete mandatory security awareness training upon
        onboarding and annually thereafter. Phishing simulation exercises run quarterly.
        Employees who fail simulations are enrolled in remediation training within
        5 business days. Completion rates are reported to the board quarterly. Contractors
        are subject to the same training requirements.

        '
      id: kb-art-005
      last_updated: '2024-07-14'
      title: Employee Security Awareness Training Program
    - author: Priya Sharma
      category: security
      content: 'Critical vulnerabilities (CVSS 9.0+) must be patched within 24 hours.
        High severity (CVSS 7.0-8.9) within 7 days. Medium within 30 days. All internet-facing
        systems are scanned daily. Internal systems are scanned weekly. Patch compliance
        is tracked in the vulnerability management platform and reported to leadership
        monthly.

        '
      id: kb-art-006
      last_updated: '2024-12-01'
      title: Vulnerability Management and Patch Policy
  rss:
    articles:
    - category: cybersecurity
      date: '2024-12-10'
      id: rss-art-001
      source: Krebs on Security
      summary: 'NIST has officially published its first set of post-quantum cryptography
        standards, marking a major milestone. Organizations are urged to begin migration
        planning now, as current AES and RSA implementations may be vulnerable to
        future quantum attacks within the decade. Security teams should conduct a
        cryptographic inventory as a first step.

        '
      title: NIST Finalizes Post-Quantum Cryptography Standards
    - category: cybersecurity
      date: '2024-12-08'
      id: rss-art-002
      source: Dark Reading
      summary: 'Multiple enterprise VPN solutions from major vendors saw active exploitation
        of zero-day vulnerabilities in Q4 2024. Threat actors used these footholds
        for lateral movement and data exfiltration. Security researchers recommend
        MFA enforcement on all VPN endpoints and immediate patch application as mitigations.

        '
      title: Wave of Zero-Day Exploits Targeting Enterprise VPNs
    - category: cybersecurity
      date: '2024-12-05'
      id: rss-art-003
      source: The Hacker News
      summary: 'Leading ransomware groups have pivoted toward exfiltration-and-extortion
        models, skipping encryption entirely to avoid detection. This trend makes
        traditional backup-based recovery strategies insufficient. Organizations need
        robust DLP controls and egress monitoring to counter this emerging threat
        pattern.

        '
      title: Ransomware Groups Shifting to Data Exfiltration-Only Tactics
    - category: cybersecurity
      date: '2024-12-03'
      id: rss-art-004
      source: Dark Reading
      summary: 'The SEC has clarified enforcement of its cybersecurity disclosure
        rules, requiring public companies to disclose material incidents within 4
        business days. Legal and security teams must now work in closer alignment
        to assess materiality quickly. Non-compliance fines have already been issued
        to three major firms.

        '
      title: SEC Tightens Cybersecurity Incident Disclosure Requirements
    - category: cybersecurity
      date: '2024-11-28'
      id: rss-art-005
      source: Krebs on Security
      summary: 'Security researchers report a 200% increase in AI-generated phishing
        emails that successfully bypass traditional filters. These attacks are highly
        personalized and difficult for employees to identify. Behavioral analytics
        and advanced email security gateways are recommended as countermeasures, alongside
        updated phishing simulation training.

        '
      title: AI-Powered Phishing Campaigns Surge 200% in 2024
