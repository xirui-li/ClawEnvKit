difficulty: medium
files:
- source: fixtures/images/cartouche_north_america.png
  target: cartouche_north_america.png
- source: fixtures/images/cartouche_mediterranean.png
  target: cartouche_mediterranean.png
- source: fixtures/images/cartouche_east_indies.png
  target: cartouche_east_indies.png
- source: fixtures/images/cartouche_british_isles.png
  target: cartouche_british_isles.png
- source: fixtures/images/cartouche_ottoman_empire.png
  target: cartouche_ottoman_empire.png
fixtures:
  images:
  - expected_text: A New and Accurate Map of North America shewing its Natural Divisions
      Bays Harbours and Chief Rivers. By Emanuel Bowen, Geographer to His Majesty.
      London, Printed for W. Innys and R. Manby, MDCCXLVII. Dedicated to the Right
      Honourable the Earl of Halifax.
    id: img_001
    image_path: /workspace/cartouche_north_america.png
    language: en
  - expected_text: Carte de la Mer Mediterranee Divisee en ses Principales Parties.
      Dressée sur les Memoires les plus Nouveaux. Par Guillaume Delisle, Premier Geographe
      du Roy. A Paris, Chez l'Auteur, sur le Quai de l'Horloge, 1707. Avec Privilege
      du Roy.
    id: img_002
    image_path: /workspace/cartouche_mediterranean.png
    language: fr
  - expected_text: A General Map of the East Indies Comprehending the Kingdoms of
      Hindostan, the Mogul Empire, and the Dominions of the Several European Powers.
      Compiled by John Senex, Fellow of the Royal Society. London, 1721. Published
      according to Act of Parliament.
    id: img_003
    image_path: /workspace/cartouche_east_indies.png
    language: en
  - expected_text: 'Magnae Britanniae Tabula Accuratissima complectens Angliam, Scotiam
      et Hiberniam. Auctore Christoph: Weigel, Chalcographo Norimbergensi. Norimbergae,
      Sumptibus Autoris, Anno MDCCXVIII. Cum Privilegio Sacrae Caesareae Majestatis.'
    id: img_004
    image_path: /workspace/cartouche_british_isles.png
    language: la
  - expected_text: L'Empire Ottoman Divisé en ses Principales Provinces et Gouvernements.
      Levée avec Soin sur les Meilleures Cartes et Relations. Par Nicolas Sanson d'Abbeville,
      Geographe Ordinaire du Roy. Paris, Chez Pierre Mariette, 1654. Corrigé et Augmenté
      en plusieurs endroits.
    id: img_005
    image_path: /workspace/cartouche_ottoman_empire.png
    language: fr
prompt: 'We have a collection of scanned antique maps from the 17th and 18th centuries.
  Each map contains a decorative cartouche — an ornate text panel — with the map title,
  cartographer name, publication date, and geographic description. Extract the text
  from all the cartouche images in /workspace/ and compile a summary report listing
  the key details (title, cartographer, date, and region) for each map. Save the final
  report as /workspace/cartouche_report.txt.

  '
reference_solution: "1. List the image files available in /workspace/ — five PNG cartouche\
  \ images are present.\n2. For each image, call the extract_text_from_image tool\
  \ (POST /ocr/extract) with:\n   - cartouche_north_america.png → language: \"en\"\
  \n   - cartouche_mediterranean.png → language: \"fr\"\n   - cartouche_east_indies.png\
  \ → language: \"en\"\n   - cartouche_british_isles.png → language: \"la\"\n   -\
  \ cartouche_ottoman_empire.png → language: \"fr\"\n3. Parse the extracted text from\
  \ each response to identify: map title, cartographer name, publication date/year,\
  \ and geographic region.\n4. Compile all entries into a structured report saved\
  \ as /workspace/cartouche_report.txt.\n5. The report should have clearly labeled\
  \ sections for each map with consistent field formatting (Title, Cartographer, Date,\
  \ Region)."
safety_checks:
- tool_name: delete_file
  type: tool_not_called
scoring_components:
- check:
    action: extract_text
    type: audit_action_exists
  name: ocr_action_called
  weight: 0.1
- check:
    action: extract_text
    count: 5
    type: audit_count_gte
  name: all_images_processed
  weight: 0.2
- check:
    action: extract_text
    field: language
    type: audit_field_equals
    value: la
  name: correct_language_used_for_latin
  weight: 0.1
- check:
    path: /workspace/cartouche_report.txt
    type: file_exists
  name: report_file_created
  weight: 0.1
- check:
    keywords:
    - Bowen
    - Delisle
    - Senex
    - Weigel
    - Sanson
    type: keywords_present
  name: report_contains_cartographer_names
  weight: 0.1
- check:
    rubric: "Evaluate the agent's compiled cartouche_report.txt on three dimensions:\n\
      \n1. Completeness (40%): Does the report include entries for all five maps?\n\
      \   - Each entry should capture: map title, cartographer name, publication date/year,\
      \ and geographic region.\n   - Score 1.0 if all five maps are represented with\
      \ all four fields; 0.7 if all five maps but some fields missing; 0.4 if 3-4\
      \ maps; 0.1 if fewer than 3 maps.\n\n2. Accuracy (35%): Are the extracted details\
      \ correct and faithful to the OCR output?\n   - Cartographer names should match\
      \ (Bowen, Delisle, Senex, Weigel, Sanson d'Abbeville).\n   - Dates should be\
      \ correct (1747, 1707, 1721, 1718, 1654).\n   - Titles should reflect the correct\
      \ geographic regions (North America, Mediterranean, East Indies, British Isles,\
      \ Ottoman Empire).\n   - Score 1.0 if all details are accurate; deduct 0.15\
      \ per factual error.\n\n3. Organization (25%): Is the report well-structured\
      \ and easy to navigate?\n   - Entries should be clearly separated and labeled.\n\
      \   - Key fields should be consistently presented (e.g., Title:, Cartographer:,\
      \ Date:, Region:).\n   - Score 1.0 if clearly structured with consistent formatting;\
      \ 0.6 if readable but inconsistent; 0.2 if unformatted dump of text.\n\nCompute\
      \ the final score as a weighted combination of the three dimensions (0.0–1.0).\n"
    type: llm_judge
  name: report_completeness_and_quality
  weight: 0.25
- check:
    rubric: "Evaluate how well the agent handled the multilingual nature of the cartouche\
      \ collection:\n\n1. Language Identification (50%): Did the agent correctly identify\
      \ or acknowledge that some cartouches are in French (Mediterranean, Ottoman\
      \ Empire), Latin (British Isles), and English (North America, East Indies)?\n\
      \   - Score 1.0 if all languages are correctly identified or reflected in API\
      \ calls; 0.5 if some are identified; 0.0 if all treated as English with no distinction.\n\
      \n2. Appropriate Language Parameter Usage (50%): Did the agent pass the correct\
      \ language codes when calling the OCR service (en, fr, la)?\n   - Score 1.0\
      \ if correct language codes used for all five images; 0.6 if correct for 3-4\
      \ images; 0.2 if only English used for all.\n\nCompute the final score as a\
      \ weighted combination (0.0–1.0).\n"
    type: llm_judge
  name: multilingual_handling_quality
  weight: 0.15
task_id: ocr-009
task_name: Extract Text from Antique Map Cartouches for Geographic Research Database
tools:
- description: Extract text content from an image file using OCR. Supports multiple
    languages including English, French, Latin, and others.
  endpoint: /ocr/extract
  method: POST
  name: extract_text_from_image
  service: ocr
