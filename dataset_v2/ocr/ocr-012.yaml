difficulty: medium
files:
- source: fixtures/images/recipe_card_001.jpg
  target: recipe_card_001.jpg
- source: fixtures/images/recipe_card_002.jpg
  target: recipe_card_002.jpg
- source: fixtures/images/recipe_card_003.jpg
  target: recipe_card_003.jpg
- source: fixtures/images/recipe_card_004.jpg
  target: recipe_card_004.jpg
- source: fixtures/images/recipe_card_005.jpg
  target: recipe_card_005.jpg
fixtures:
  images:
  - expected_text: 'Grandma Edna''s Apple Pie Ingredients: 6 large apples (Granny
      Smith), 3/4 cup sugar, 2 tbsp flour, 1 tsp cinnamon, 1/4 tsp nutmeg, 2 tbsp
      butter, pie crust (double). Directions: Peel and slice apples. Mix with sugar,
      flour, spices. Pour into crust, dot with butter. Cover with top crust, vent
      slits. Bake at 375F for 50 minutes. Serves 8.

      '
    id: img_001
    image_path: /workspace/recipe_card_001.jpg
    language: en
  - expected_text: 'Aunt Ruth''s Chicken Casserole Ingredients: 3 cups cooked chicken
      (cubed), 1 can cream of mushroom soup, 1 cup sour cream, 1/2 cup celery (chopped),
      1 cup crushed Ritz crackers, 4 tbsp butter. Directions: Mix chicken, soup, sour
      cream, celery. Pour into greased 9x13 dish. Top with cracker crumbs mixed with
      melted butter. Bake at 350F for 30 minutes. Serves 6.

      '
    id: img_002
    image_path: /workspace/recipe_card_002.jpg
    language: en
  - expected_text: 'Lemon Icebox Cake Ingredients: 2 cans sweetened condensed milk,
      3/4 cup lemon juice (fresh), 3 egg yolks, 1 graham cracker crust, whipped cream
