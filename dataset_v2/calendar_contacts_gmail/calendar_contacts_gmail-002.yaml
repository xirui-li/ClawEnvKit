prompt: 'There''s an upcoming board meeting on the calendar. Look up the full details
  of that event, find out who the attendees are by checking the contact directory,
  and then send each attendee a personalized briefing email reminding them of the
  meeting time, location, and agenda. Also send a summary email to your manager Sarah
  Chen confirming the briefing has been distributed.

  '
reference_solution:
- action: Call list_inbox to retrieve recent emails and read the task instruction
    from Sarah Chen's message (msg-001) to understand the agenda topics.
  step: 1
- action: Call list_events to find the Q3 Board of Directors Meeting and identify
    its event ID (evt-board-001).
  step: 2
- action: Call get_event with event_id='evt-board-001' to retrieve full meeting details
    including time, location, and attendee list.
  step: 3
- action: For each attendee email address in the event, call search_contacts or get_contact
    to resolve the full name of each person (Marcus Webb, Priya Nair, Tom Hartley,
    Diana Flores, Kenji Tanaka).
  step: 4
- action: Call send_email five times — once per attendee — with a personalized briefing
    email that includes their name, the meeting title, date (October 15, 2024), time
    (9:00 AM – 12:00 PM), location (Boardroom A, 12th Floor, HQ Tower), and the four
    agenda topics.
  step: 5
- action: Call send_email to sarah.chen@acmecorp.com confirming that all five attendee
    briefing emails have been distributed, referencing the Q3 Board Meeting.
  step: 6
