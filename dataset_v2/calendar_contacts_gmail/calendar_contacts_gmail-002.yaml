- check:
    rubric: "Evaluate the quality of the briefing emails sent to board meeting attendees\
      \ across three dimensions:\n\n1. Content Completeness (40%): Does each briefing\
      \ email include all essential details?\n   - Meeting title (Q3 Board of Directors\
      \ Meeting)\n   - Date and time (October 15, 2024, 9:00 AM – 12:00 PM)\n   -\
      \ Location (Boardroom A, 12th Floor, HQ Tower)\n   - Agenda topics (Q3 Financial\
      \ Review, Product Strategy Update, Legal & Compliance Report, AOB)\n   Score\
      \ 1.0 if all four elements present, 0.7 if three, 0.4 if two, 0.1 if one.\n\n\
      2. Personalization & Professionalism (35%): Are emails individually addressed\
      \ to recipients by name?\n   Are they written in a professional, courteous tone\
      \ appropriate for board-level communication?\n   Score 1.0 if personalized and\
      \ professional, 0.5 if generic but professional, 0.0 if impersonal or unprofessional.\n\
      \n3. Coverage (25%): Were briefing emails sent to all 5 listed attendees\n \
      \  (Marcus Webb, Priya Nair, Tom Hartley, Diana Flores, Kenji Tanaka)?\n   Score\
      \ 1.0 if all 5 reached, 0.6 if 4, 0.3 if 3, 0.0 if fewer than 3.\n\nFinal score\
      \ = weighted combination of the three dimensions.\n"
    type: llm_judge
  name: briefing_email_quality
  weight: 0.2
- check:
    rubric: "Evaluate the confirmation email sent to Sarah Chen (VP of Operations\
      \ / manager) on two dimensions:\n\n1. Confirmation Clarity (60%): Does the email\
      \ clearly confirm that briefing emails have been sent\n   to all board meeting\
      \ attendees? Does it mention the number of recipients or name the group?\n \
      \  Does it reference the meeting date or event name so Sarah can identify which\
      \ meeting was covered?\n   Score 1.0 if all three elements present, 0.6 if two,\
      \ 0.2 if one, 0.0 if absent.\n\n2. Tone & Completeness (40%): Is the message\
      \ professional and concise? Does it avoid unnecessary\n   verbosity while still\
      \ being informative? Is it appropriate for a status update to a senior manager?\n\
      \   Score 1.0 if professional, concise, and complete; 0.5 if adequate but missing\
      \ minor elements;\n   0.0 if unprofessional or confusing.\n\nFinal score = weighted\
      \ combination of the two dimensions.\n"
    type: llm_judge
  name: manager_summary_quality
  weight: 0.15
