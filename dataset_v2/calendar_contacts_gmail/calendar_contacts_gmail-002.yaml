tools:
- description: Search the company contact directory by name, email, or department
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details for a specific contact by their ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: List recent emails in the inbox
  endpoint: /gmail/messages
  method: POST
  name: list_inbox
  service: gmail
- description: Get the full content of a specific email message
  endpoint: /gmail/messages/get
  method: POST
  name: get_message
  service: gmail
- description: Send an email to a recipient
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
- description: List calendar events for a given date range
  endpoint: /calendar/events
  method: POST
  name: list_events
  service: calendar
- description: Get full details of a specific calendar event by event ID
  endpoint: /calendar/events/get
  method: POST
  name: get_event
  service: calendar
