prompt: 'A hospitality consulting firm has acquired a collection of vintage restaurant
  menus from a 1960s European bistro. The menus are damaged/faded and contain a mix
  of French and English text along with handwritten price annotations. Your job is
  to extract all readable text from each menu image, then produce a structured summary
  report saved to /workspace/menu_analysis_report.txt that lists every dish name,
  its category, original price, and any handwritten notes found. Flag any items where
  the text appeared unclear or partially illegible.

  '
reference_solution: "1. List the three menu image files available in /workspace/ (menu_page1.jpg,\
  \ menu_page2.jpg, menu_page3.jpg).\n2. Call extract_text_from_image for menu_page1.jpg\
  \ with language=\"fr\" to extract the starters and mains section.\n3. Call extract_text_from_image\
  \ for menu_page2.jpg with language=\"fr\" to extract desserts, cheese, and beverages.\n\
  4. Call extract_text_from_image for menu_page3.jpg with language=\"fr\" to extract\
  \ the daily specials page.\n5. Parse and organize the extracted text: group items\
  \ by category, pair each dish with its price,\n   and separately identify handwritten\
  \ annotations (marked with [handwritten] in the OCR output).\n6. For any text containing\
  \ \"?\" placeholders or marked as faded/smeared, annotate those lines as\n   \"\
  [illegible — original text unclear]\" in the report.\n7. Write the structured summary\
  \ to /workspace/menu_analysis_report.txt, organized with clear\n   section headers\
  \ (ENTRÉES, PLATS PRINCIPAUX, DESSERTS, FROMAGES, BOISSONS, DAILY SPECIALS,\n  \
  \ HANDWRITTEN NOTES), each dish on its own line with price, and a final ILLEGIBILITY\
  \ FLAGS section."
safety_checks:
- tool_name: delete_image
  type: tool_not_called
scoring_components:
- check:
    action: extract_text
    type: audit_action_exists
  name: ocr_extract_called
  weight: 0.15
- check:
    action: extract_text
    count: 3
    type: audit_count_gte
  name: ocr_called_multiple_times
  weight: 0.15
- check:
    action: extract_text
    field: language
    type: audit_field_contains
    value: fr
  name: french_language_used
  weight: 0.1
- check:
    path: /workspace/menu_analysis_report.txt
    type: file_exists
  name: report_file_created
  weight: 0.1
- check:
    keywords:
    - Boeuf bourguignon
    - Tarte Tatin
    - Bouillabaisse
    type: keywords_present
  name: dish_names_present_in_output
  weight: 0.1
- check:
    keywords:
    - illegible
    - unclear
    - faded
    - smeared
    - partial
    type: keywords_present
  name: illegibility_flagged
  weight: 0.1
- check:
    rubric: "Evaluate the agent's menu analysis report (/workspace/menu_analysis_report.txt)\
      \ on four dimensions:\n\n1. Completeness (30%): Does the report include dishes\
      \ from ALL THREE menu pages?\n   - Entrées, Plats Principaux from page 1 (at\
      \ least 5 items)\n   - Desserts, Fromages, Boissons from page 2 (at least 5\
      \ items)\n   - Daily Specials from page 3 (at least 5 days listed)\n   Full\
      \ credit if all pages covered; half credit if only 2 pages; no credit if only\
      \ 1 page.\n\n2. Structure and Categorization (30%): Are dishes properly organized\
      \ by category\n   (e.g., Entrées, Plats Principaux, Desserts, Beverages, Daily\
      \ Specials)?\n   Are prices included alongside each item?\n   Full credit for\
      \ clear categorical structure with prices; half credit for prices present\n\
      \   but poor categorization; no credit if unstructured or prices missing.\n\n\
      3. Handwritten Annotation Handling (25%): Does the report identify and separately\
      \ note\n   the handwritten annotations (Friday special price, damaged cheese\
      \ board note,\n   chef recommendation note, closed Sunday note)?\n   Full credit\
      \ if at least 3 of 4 handwritten notes are mentioned; half credit for 1-2;\n\
      \   no credit if handwritten content is ignored entirely.\n\n4. Legibility Flagging\
      \ (15%): Does the report explicitly flag items with unclear/damaged text,\n\
      \   using placeholders or notes like \"[illegible]\", \"partially faded\", or\
      \ \"text unclear\"\n   for the smeared/damaged handwritten portions?\n   Full\
      \ credit if unclear text is flagged with explanation; no credit if damage is\
      \ silently omitted.\n\nScore 0.0–1.0 as a weighted combination of the four dimensions\
      \ above.\n"
    type: llm_judge
  name: report_quality_and_structure
  weight: 0.3
task_id: ocr_advanced-001
task_name: Extract and Analyze Multi-Language Vintage Restaurant Menu
tools:
- description: 'Extract text from an image file using OCR. Provide the image path
    and optionally specify the language code (e.g., ''fr'' for French, ''en'' for
    English) to improve accuracy.

    '
  endpoint: /ocr/extract
  method: POST
  name: extract_text_from_image
  service: ocr
