    image_path: /workspace/deed_004.png
    language: en
  - expected_text: 'TRUSTEES DEED WHEREAS, on this 9th day of February, 1971, THE
      FIRST NATIONAL BANK OF SPRINGFIELD (Grantor/Trustee), acting under Trust No.
