category: ocr_advanced
difficulty: medium
files:
- source: fixtures/images/deed_001.png
  target: deed_001.png
- source: fixtures/images/deed_002.png
  target: deed_002.png
- source: fixtures/images/deed_003.png
  target: deed_003.png
- source: fixtures/images/deed_004.png
  target: deed_004.png
- source: fixtures/images/deed_005.png
  target: deed_005.png
fixtures:
  images:
  - expected_text: 'WARRANTY DEED THIS INDENTURE, made this 14th day of March, 1947,
