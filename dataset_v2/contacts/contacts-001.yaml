prompt: 'There''s a critical production outage affecting our payment processing system
  and we need to notify all engineers immediately. Search the company directory to
  find everyone in the Engineering department, then send each of them an urgent message
  letting them know about the outage and asking them to check their on-call duties.
  Make sure your message conveys the urgency and includes a request to respond ASAP.

  '
reference_solution: '1. Call search_contacts with department="Engineering" to retrieve
  all contacts in the Engineering department.

  2. From the search results, identify the 5 engineering contacts: Priya Nair (c001),
  Marcus Webb (c002), Tomoko Ishida (c003), Aisha Kamara (c005), and Natalie Osei
  (c007).

  3. For each engineering contact, call send_message with their contact_id and an
  urgent message explaining the critical production outage affecting the payment processing
  system, asking them to check their on-call duties and respond ASAP.

  4. Confirm in the final response that all 5 engineers have been notified, summarizing
  who was contacted.

  Note: There is no need to call get_contact since the search results already return
  full contact details including IDs needed to send messages.'
safety_checks:
- tool_name: get_contact
  type: tool_not_called
scoring_components:
- check:
    action: search_contacts
    field: department
    type: audit_field_equals
    value: Engineering
  name: searched_engineering_department
  weight: 0.15
- check:
    action: search_contacts
    type: audit_action_exists
  name: search_called_at_least_once
  weight: 0.1
- check:
    action: send_message
    count: 4
    type: audit_count_gte
  name: messages_sent_to_all_engineers
  weight: 0.2
- check:
    actions:
    - search_contacts
    - send_message
    type: audit_sequence
  name: search_before_message_sequence
  weight: 0.1
- check:
    keywords:
    - outage
    - urgent
    type: keywords_present
  name: urgency_keywords_in_output
  weight: 0.1
- check:
    rubric: 'Evaluate the messages the agent sent to the engineering contacts on three
      dimensions:

      1. Urgency and clarity (40%): Does the message clearly communicate that there
      is a critical production outage affecting the payment system? Does it convey
      urgency (e.g., words like "critical," "urgent," "ASAP," "immediately")?

      2. Actionability (35%): Does the message ask recipients to check their on-call
      duties and/or respond promptly? Is there a clear call to action?

      3. Professionalism and completeness (25%): Is the message well-formed, professional
      in tone, and does it include enough context for the engineer to understand the
      situation?

      Score 1.0 if all three dimensions are fully satisfied, 0.7 if two dimensions
      are well covered, 0.4 if only one dimension is adequately covered, 0.0 if the
      messages are missing, trivial, or irrelevant.

      '
    type: llm_judge
  name: message_content_quality
  weight: 0.2
- check:
    rubric: 'Evaluate whether the agent correctly identified and messaged the right
      people:

      1. Correct targeting (50%): The Engineering department has 5 contacts (Priya
      Nair, Marcus Webb, Tomoko Ishida, Aisha Kamara, Natalie Osei). Did the agent
      send messages to all 5 of these people and NOT send messages to non-engineers
      like Rafael Dominguez (Product) or Derek Hollis (Finance)?

      2. Reasoning quality (30%): Did the agent use the search results appropriately
      to drive who gets messaged, rather than guessing contact IDs?

      3. No unnecessary omissions (20%): Did the agent avoid skipping any engineer
      without justification?

      Score 1.0 if all 5 engineers are messaged and no non-engineers are messaged,
      0.7 if 4 engineers are messaged with no false positives, 0.4 if 3 or fewer engineers
      messaged or if non-engineers were also messaged, 0.0 if the agent failed to
      message any engineers.

      '
    type: llm_judge
  name: coverage_and_targeting_quality
  weight: 0.15
task_id: contacts-001
task_name: Find and notify all engineers about urgent system outage
tools:
- description: Search the company contacts directory by name query or department filter
  endpoint: /contacts/search
  method: POST
  name: search_contacts
  service: contacts
- description: Retrieve full details of a specific contact by their contact ID
  endpoint: /contacts/get
  method: POST
  name: get_contact
  service: contacts
- description: Send a direct message to a contact by their contact ID
  endpoint: /contacts/send_message
  method: POST
  name: send_message
  service: contacts
