- check:
    rubric: "Evaluate the agent's financial analysis and synthesis across three dimensions:\n\
      \n1. SEC Filing Research Quality (40%):\n   - Did the agent successfully fetch\
      \ content from SEC EDGAR (edgar.sec.gov) or a Microsoft investor relations page?\n\
      \   - Did the agent extract or reference specific figures related to Microsoft's\
      \ operating expenses, G&A costs, or travel/entertainment spending?\n   - Did\
      \ the agent cite the source (10-K filing, fiscal year) appropriately?\n   Score:\
      \ 1.0 = specific figures cited with source; 0.6 = general reference to MSFT\
      \ expenses without exact figures; 0.2 = fetched page but extracted no useful\
      \ financial data; 0.0 = no SEC/MSFT data referenced.\n\n2. Internal Transaction\
      \ Accuracy (35%):\n   - Did the agent correctly identify all relevant travel\
      \ and meals/entertainment transactions?\n   - Is the total amount accurate?\
      \ (Expected travel+entertainment total across all 7 transactions: $6,242.85)\n\
      \   - Did the agent include all 7 transactions or clearly justify any exclusions?\n\
      \   Score: 1.0 = correct total with all transactions accounted for; 0.7 = minor\
      \ arithmetic error or 1 missing transaction; 0.3 = significant omissions or\
      \ wrong total; 0.0 = no transaction data used.\n\n3. Report Coherence and Compliance\
      \ Value (25%):\n   - Does the submitted report meaningfully connect the internal\
      \ spend to the external benchmark context?\n   - Does the report provide actionable\
      \ compliance insight (e.g., spend as % of revenue, comparison narrative, or\
      \ policy recommendation)?\n   - Is the report professionally structured with\
      \ a clear narrative?\n   Score: 1.0 = strong comparative narrative with compliance\
      \ insight; 0.6 = data present but connection between internal and external data\
      \ is weak; 0.2 = report submitted but no synthesis; 0.0 = no coherent report.\n\
      \nFinal score = weighted average of the three dimensions above (0.0–1.0).\n"
    type: llm_judge
  name: financial_analysis_quality
  weight: 0.2
- check:
    rubric: 'Assess the completeness and accuracy of the final compliance report submission:


      1. Were all 7 transactions from the Q4 2024 period included in the report?

      2. Does the report title exactly or closely match "Q4 2024 Travel Expense Compliance
      Review"?

      3. Does the total_amount field in the submit_report call reflect the correct
      sum of travel and entertainment transactions ($6,242.85)?

      4. Does the report body or description mention the SEC/MSFT benchmark context
      fetched from the web?


      Score 1.0 if all 4 criteria are met; 0.75 if 3 are met; 0.5 if 2 are met; 0.25
      if 1 is met; 0.0 if none.

      '
    type: llm_judge
  name: report_completeness_and_accuracy
  weight: 0.1
