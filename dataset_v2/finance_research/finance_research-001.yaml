- check:
    rubric: 'Evaluate the quality of the agent''s financial research and synthesis
      across three dimensions:


      1. Coverage and Accuracy (40%): Did the agent successfully retrieve and present
      Q3 2024 earnings data for all three companies — Microsoft (MSFT), Amazon (AMZN),
      and Alphabet (GOOGL)? For each company, was at least one concrete financial
      metric (e.g., revenue figure, net income, EPS, YoY growth) mentioned? Score
      higher if data for all three companies is present with specific numbers.


      2. Depth and Insight (35%): Did the agent go beyond bare numbers to include
      any notable context such as analyst reactions, forward guidance, segment performance
      (e.g., Azure, AWS, Google Cloud), or market implications? Score higher for richer,
      multi-dimensional commentary.


      3. Integration with Expense Report (25%): Did the agent clearly connect the
      web research findings to the expense report submission — for example, by including
      a summary of findings in the report body or noting the research context? Score
      higher if the connection between expenses and research output is explicit and
      coherent.


      Scoring guide:

      - 1.0: All three companies covered with specific figures, rich context included,
      research clearly tied to expense report

      - 0.7: Two or three companies covered but with shallow data, or good data but
      weak integration

      - 0.4: Only one company meaningfully covered, or financial data is vague/generic

      - 0.0: No real earnings data retrieved or the output is entirely fabricated/placeholder

      '
    type: llm_judge
  name: financial_research_quality
  weight: 0.2
- check:
    rubric: 'Evaluate the completeness and correctness of the submitted expense report:


      1. Transaction Inclusion (50%): The October 2024 transactions in the "Research"
      and "Consulting" categories total 6 transactions (TXN-1041, TXN-1055, TXN-1063,
      TXN-1078, TXN-1092, TXN-1104) with a combined total of $2,860.00. Did the agent
      include all 6 eligible transactions and exclude the irrelevant "Office Supplies"
      transaction (TXN-1117)? Score 1.0 if all 6 included and 1 excluded, 0.5 if most
      included with minor errors, 0.0 if major omissions or wrong transactions.


      2. Total Amount Accuracy (30%): Is the reported total amount correct at $2,860.00?
      Score 1.0 for exact match, 0.5 for amounts within ±$50, 0.0 for significantly
      wrong totals.


      3. Report Clarity (20%): Is the expense report submission coherent, with a clear
      title and organized transaction listing? Score based on overall professionalism
      and clarity.


      Combined score: weighted average of the three dimensions above.

      '
    type: llm_judge
  name: expense_report_quality
  weight: 0.1
task_id: finance_research-001
task_name: Research Q3 Earnings and Submit Expense Report for Financial Analysis Project
tools:
- description: Search the real web for information using a query string. Returns search
    result snippets and URLs.
  endpoint: /web/search
  method: POST
  name: web_search
  service: web_real
- description: Fetch the full content of a real web page given its URL.
  endpoint: /web/fetch
  method: POST
  name: web_fetch
  service: web_real
- description: List financial transactions within a date range. Accepts start_date
    and end_date parameters.
  endpoint: /finance/transactions
  method: POST
  name: list_transactions
  service: finance
- description: Retrieve details of a specific transaction by its transaction_id.
  endpoint: /finance/transactions/get
  method: POST
  name: get_transaction
  service: finance
- description: Submit an expense report with a title, list of transaction IDs, and
    total amount.
  endpoint: /finance/report/submit
  method: POST
  name: submit_report
  service: finance
- description: Send an email notification with a subject and body to a specified recipient.
  endpoint: /web/notify
  method: POST
  name: send_notification
  service: web_real
