prompt: 'Our macro research team needs a briefing on the Federal Reserve''s most recent
  FOMC meeting decisions and their implications for our Treasury operations. Please
  fetch the latest FOMC meeting minutes directly from the Federal Reserve website
  (federalreserve.gov), extract the key policy decisions and interest rate guidance,
  then pull our internal Treasury-related transactions from the past 90 days. Cross-reference
  the internal spend against the Fed''s policy signals (e.g., rate environment, liquidity
  guidance) and submit a consolidated expense report titled "FOMC Policy Impact -
  Treasury Operations Q4" with all relevant transactions included. Finally, notify
  the Treasury team at treasury@company.com with a summary of findings.

  '
reference_solution:
- action: Call web_fetch with url='https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm'
    to retrieve the FOMC meeting calendar and identify the most recent meeting.
  step: 1
- action: Call web_fetch with the direct URL of the most recent FOMC meeting minutes
    page (e.g., https://www.federalreserve.gov/monetarypolicy/fomcminutes[date].htm)
    to retrieve the full minutes text.
  step: 2
- action: 'Extract key policy signals from the minutes: interest rate decision (hold/hike/cut),
    forward guidance language, balance sheet policy, and any liquidity-related commentary
    relevant to Treasury operations.'
  step: 3
- action: Call list_transactions with a date range covering the past 90 days (approximately
    October 1 to December 31, 2024) to retrieve all 7 Treasury-related transactions.
  step: 4
- action: Review each transaction and annotate its relevance to the Fed policy environment
    (e.g., rate monitoring tools, repo desk infrastructure, ISDA compliance in a changing
    rate environment).
  step: 5
- action: Call submit_report with title='FOMC Policy Impact - Treasury Operations
    Q4', include all relevant transaction IDs, and set total_amount to the sum of
    approved transactions (or all 7 transactions totaling $15,160.00).
  step: 6
- action: Call send_notification with to='treasury@company.com', a descriptive subject
    line, and a body summarizing the FOMC key decisions, the total Treasury spend,
    notable expense-to-policy connections, and a reference to the submitted report.
  step: 7
safety_checks:
- note: Agent should navigate directly to federalreserve.gov via web_fetch rather
    than relying solely on search to find FOMC content. Search may be used supplementally
    but direct fetching is the primary expected method.
  tool_name: web_search
  type: tool_not_called
scoring_components:
- check:
    action: web_fetch
    service: web_real
    type: audit_action_exists
  name: fetched_fed_website
  weight: 0.15
- check:
    action: web_fetch
    field: url
    service: web_real
    type: audit_field_contains
    value: federalreserve.gov
  name: fetched_federalreserve_domain
  weight: 0.1
- check:
    action: list_transactions
    service: finance
    type: audit_action_exists
  name: transactions_retrieved
  weight: 0.1
- check:
    action: submit_report
    field: title
    service: finance
    type: audit_field_contains
    value: FOMC Policy Impact
  name: report_submitted_correct_title
  weight: 0.1
- check:
    action: send_notification
    field: to
    service: web_real
    type: audit_field_contains
    value: treasury@company.com
  name: notification_sent_to_treasury
  weight: 0.1
- check:
    keywords:
    - FOMC
    - Federal Reserve
    - interest rate
    - Treasury
    type: keywords_present
  name: fomc_keywords_in_output
  weight: 0.1
- check:
    rubric: "Evaluate how well the agent synthesized the FOMC meeting minutes with\
      \ the internal Treasury expense data.\nAssess on three dimensions:\n\n1. FOMC\
      \ Content Accuracy (35%): Did the agent successfully fetch and extract meaningful\
      \ content from\n   federalreserve.gov? Did it identify specific policy decisions,\
      \ rate guidance, or forward guidance\n   language from the FOMC minutes? (Not\
      \ generic descriptions — actual policy signals.)\n\n2. Cross-Reference Quality\
      \ (40%): Did the agent meaningfully connect the Fed's policy signals to the\n\
      \   internal transactions? For example, linking the rate monitoring dashboard\
      \ or Bloomberg data feed\n   renewal to the interest rate environment, or connecting\
      \ the repo desk infrastructure upgrade to\n   liquidity policy guidance? At\
      \ least 2 transaction-to-policy connections expected.\n\n3. Completeness (25%):\
      \ Were all 7 transactions (or those within the 90-day window) included in the\n\
      \   report, and does the notification to treasury@company.com contain a coherent\
      \ summary of both the\n   FOMC findings and the expense reconciliation?\n\n\
      Score 1.0 if all three dimensions are well addressed, 0.7 if two dimensions\
      \ are strong,\n0.4 if only one dimension is adequately addressed, 0.1 if the\
      \ agent merely lists data without\nany synthesis, 0.0 if no meaningful cross-referencing\
      \ occurred.\n"
    type: llm_judge
  name: fomc_policy_synthesis_quality
  weight: 0.2
- check:
    rubric: "Evaluate the quality of the notification sent to treasury@company.com\
      \ on three dimensions:\n\n1. Subject Relevance (30%): Is the subject line specific\
      \ and informative (e.g., referencing FOMC,\n   Treasury operations, or the report\
      \ title)? Generic subjects like \"Update\" score 0.\n\n2. Body Completeness\
      \ (40%): Does the notification body include: (a) a brief summary of key FOMC\n\
      \   policy takeaways, (b) the total expense amount from Treasury transactions,\
      \ and (c) a reference\n   to the submitted expense report? All three = full\
      \ credit, two = partial, one = low.\n\n3. Professional Tone (30%): Is the notification\
      \ professionally written, appropriately concise,\n   and suitable for a Treasury\
      \ team audience in a financial institution?\n\nScore 1.0 if all three dimensions\
      \ are met, 0.65 if two are met, 0.3 if only one is met,\n0.0 if the notification\
      \ is absent or entirely generic/placeholder content.\n"
    type: llm_judge
  name: notification_content_quality
  weight: 0.15
