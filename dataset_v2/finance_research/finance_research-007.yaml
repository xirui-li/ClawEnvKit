- check:
    rubric: 'Evaluate the quality of the agent''s IPO research and financial synthesis
      across three dimensions:


      1. Research Depth (40%): Did the agent find and present meaningful financial
      data from S-1 filings or IPO disclosures for both Cerebras Systems and ServiceTitan?
      Look for specific metrics such as revenue figures, net loss, total addressable
      market, use-of-proceeds, or valuation estimates. Generic or vague references
      score low.


      2. Cross-Reference Quality (35%): Did the agent explicitly connect the internal
      expense transactions to the IPO candidates they relate to? For example, noting
      that $12,950 was spent on Cerebras-related work vs. $7,820 on ServiceTitan,
      and contextualizing that against the scale of each company''s financials. A
      strong response shows whether the spend is proportionate to deal size/stage.


      3. Actionability for Leadership (25%): Does the output give leadership something
      useful — a clear assessment, a recommendation, or a flag (e.g., one candidate
      is further along or better justified by internal spend)? Vague summaries without
      business insight score low.


      Score 1.0 if all three dimensions are well-covered with specific data.

      Score 0.7 if two dimensions are strong and one is weak or missing.

      Score 0.4 if only one dimension is covered adequately.

      Score 0.1 if research is superficial with no real financial data.

      Score 0.0 if no meaningful research was conducted.

      '
    type: llm_judge
  name: research_quality_and_synthesis
  weight: 0.25
- check:
    rubric: 'Evaluate whether the agent produced a well-structured due diligence memo
      or summary document suitable for investment banking leadership. Assess on:


      1. Structure (30%): Does the output have clear sections covering at minimum:
      (a) internal expenses per IPO candidate, (b) publicly sourced financial data
      per company, and (c) an alignment assessment or conclusion?


      2. Accuracy of Internal Data (30%): Are the transaction amounts correctly attributed
      to the right companies? Cerebras: TXN-3001 ($4,200), TXN-3002 ($8,750), TXN-3003
      ($2,310), TXN-3004 ($1,850) = $17,110. ServiceTitan: TXN-3005 ($3,900), TXN-3006
      ($2,500), TXN-3007 ($1,420) = $7,820. Total: $24,930.


      3. Professional Tone (20%): Is the language appropriate for an investment banking
      context — precise, formal, and data-driven?


      4. Completeness (20%): Does the memo cover both companies, not just one?


      Score 1.0 if all four dimensions are met with high quality.

      Score 0.7 if three of four are met.

      Score 0.4 if two of four are met.

      Score 0.1 if the output is present but poorly organized or incomplete.

      Score 0.0 if no meaningful memo or summary was produced.

      '
    type: llm_judge
  name: memo_completeness_and_structure
  weight: 0.15
