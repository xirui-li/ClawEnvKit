prompt: 'Our investment banking team has been tracking several high-profile IPO candidates
  over the past quarter. We need a consolidated due diligence memo that cross-references
  our internal deal-related expenses with publicly available S-1 filing data for the
  companies we''ve been spending on. Search for recent S-1 filings or IPO-related
  financial disclosures for the companies referenced in our expense records, retrieve
  key financial metrics (revenue, net loss, use-of-proceeds), and then submit an expense
  report covering all deal-related transactions. The final output should help leadership
  assess whether our internal spend aligns with the scale and stage of each IPO candidate.

  '
reference_solution: '1. Call list_transactions with date range "2024-09-01" to "2024-10-31"
  to retrieve all 7 deal-related transactions.

  2. Identify the two IPO candidates mentioned: Cerebras Systems (TXN-3001, TXN-3002,
  TXN-3003, TXN-3004 = $17,110) and ServiceTitan (TXN-3005, TXN-3006, TXN-3007 = $7,820).

  3. Call web_search with a query like "Cerebras Systems S-1 IPO filing SEC 2024 financials"
  to find filing information.

  4. Call web_search with a query like "ServiceTitan S-1 IPO SEC filing 2024 revenue
  financials" to find ServiceTitan''s disclosures.

  5. Optionally call web_fetch on relevant SEC EDGAR pages or news articles to retrieve
  specific financial metrics (revenue, net loss, use-of-proceeds, valuation).

  6. Call web_search at least once more to cross-check data or find additional context
  (e.g., IPO valuation comparables).

  7. Synthesize findings into a due diligence memo covering: internal spend per company,
  key financial metrics from S-1 filings, and an alignment assessment for leadership.

  8. Call submit_report with title "Q3-Q4 2024 IPO Deal Expenses — Cerebras Systems
  & ServiceTitan", all 7 transaction IDs (TXN-3001 through TXN-3007), and total_amount
  of 24930.0.

  9. Do NOT call send_notification — the memo goes to leadership through the report
  submission, not via email.'
