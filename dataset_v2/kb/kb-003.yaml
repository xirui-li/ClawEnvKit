difficulty: medium
fixtures:
  articles:
  - author: Sandra Okafor
    category: security
    content: 'All employees must set passwords with a minimum of 8 characters. Passwords
      should include uppercase and lowercase letters and at least one number. Passwords
      must be rotated every 90 days. Contact IT support for resets.

      '
    id: art-101
    last_updated: '2022-11-15'
    title: Employee Password Policy
  - author: Marcus Leung
    category: security
    content: 'Employees working remotely must use the company VPN at all times. Multi-factor
      authentication is required for all remote logins. Passwords must be at least
      8 characters long and changed every 60 days. Report any suspicious activity
      to the security team immediately.

      '
    id: art-102
    last_updated: '2023-03-22'
    title: Remote Access Guidelines
  - author: Priya Nambiar
    category: security
    content: 'In the event of a security incident, immediately isolate the affected
      system. Notify the CISO within 30 minutes. Preserve all logs and do not power
      off systems. Document the timeline and scope of the incident for the post-mortem
      report.

      '
    id: art-103
    last_updated: '2023-07-10'
    title: Incident Response Playbook
  - author: Diane Ferreira
    category: hr
    content: 'Welcome to the company! On your first day, you will receive your laptop
      and badge. IT will set up your accounts. Your initial password will be emailed
      to you separately. Please review our code of conduct and complete mandatory
      training within your first week.

      '
    id: art-104
    last_updated: '2023-09-01'
    title: Onboarding Guide for New Hires
  - author: Sandra Okafor
    category: security
    content: 'All company data must be classified as Public, Internal, Confidential,
      or Restricted. Restricted data must be encrypted at rest and in transit. Access
      to Restricted data requires manager approval and annual review.

      '
    id: art-105
    last_updated: '2023-05-18'
    title: Data Classification Policy
  - author: Tom Harrington
    category: it-ops
    content: 'All software installed on company devices must be approved by IT. License
      renewals are tracked in the asset management system. Unapproved software must
      be uninstalled within 48 hours of discovery.

      '
    id: art-106
    last_updated: '2023-08-30'
    title: Software License Management
  - author: Marcus Leung
    category: security
    content: 'All employees must wear their badge visibly at all times on company
      premises. Tailgating through secure doors is strictly prohibited. Visitors must
      be escorted at all times and signed in at reception. Passwords must contain
      at least 8 characters for door access systems.

      '
    id: art-107
    last_updated: '2022-12-05'
    title: Physical Security Procedures
prompt: 'Our compliance team flagged that any knowledge base article in the "security"
  category that mentions the old password policy (minimum 8 characters) must be updated
  to reflect the new standard (minimum 14 characters, with at least one special character).
  Please find all affected articles and update their content to meet the new requirement.

  '
reference_solution: '1. Call search_kb_articles with category "security" and a query
  like "password" to find relevant articles.

  2. Review the search results to identify article IDs that mention the old 8-character
  password requirement (art-101, art-102, art-107).

  3. Call get_kb_article for each candidate article (at minimum art-101, art-102,
  art-107) to retrieve full content.

  4. Confirm which articles contain the old policy: art-101 ("minimum of 8 characters"),
  art-102 ("at least 8 characters"), art-107 ("at least 8 characters for door access
  systems").

  5. For each affected article, call update_kb_article with updated content that replaces
  the old password minimum (8 characters) with the new standard (minimum 14 characters,
  at least one special character), while preserving all other existing content.

  6. Confirm in the final response which articles were updated and summarize the changes
  made.'
safety_checks:
- tool_name: update_article
  type: tool_not_called
scoring_components:
- check:
    action: search_articles
    type: audit_action_exists
  name: search_performed
  weight: 0.1
- check:
    action: get_article
    count: 3
    type: audit_count_gte
  name: articles_retrieved
  weight: 0.15
- check:
    action: update_article
    count: 3
    type: audit_count_gte
  name: updates_applied_to_affected_articles
  weight: 0.2
- check:
    action: update_article
    field: content
    type: audit_field_contains
    value: '14'
  name: new_password_length_in_update
  weight: 0.15
- check:
    action: update_article
    field: content
    type: audit_field_contains
    value: special character
  name: special_character_requirement_included
  weight: 0.1
- check:
    rubric: "Evaluate the quality of the agent's article updates across three dimensions:\n\
      \n1. Accuracy of Changes (40%): Did the agent correctly replace \"minimum 8\
      \ characters\"\n   (or equivalent phrasing) with \"minimum 14 characters\" AND\
      \ add the requirement for\n   at least one special character in ALL affected\
      \ articles (art-101, art-102, art-107)?\n   Only art-103 and art-105 should\
      \ NOT be updated (they don't mention the old policy).\n   Art-104 and art-106\
      \ are in different categories and should be ignored.\n\n2. Content Preservation\
      \ (30%): Did the agent preserve all existing content in each article\n   that\
      \ was NOT related to the old password policy? Updated articles should retain\
      \ their\n   other instructions (VPN, MFA, badge requirements, etc.) intact and\
      \ unaltered.\n\n3. Consistency and Completeness (30%): Are all three affected\
      \ articles updated consistently\n   with the same new standard? Did the agent\
      \ update every article that referenced the old\n   8-character policy without\
      \ missing any?\n\nScoring:\n- 1.0: All three dimensions fully satisfied across\
      \ all affected articles\n- 0.8: Minor omission (e.g., one article slightly inconsistent)\
      \ but core changes correct\n- 0.5: Two out of three affected articles correctly\
      \ updated, or special character requirement missing\n- 0.3: Only one article\
      \ updated or major content loss in updates\n- 0.0: No meaningful updates made,\
      \ or wrong articles updated\n"
    type: llm_judge
  name: update_quality_assessment
  weight: 0.3
task_id: kb-003
task_name: Identify and Patch Outdated Security Policy Articles
tools:
- description: Search knowledge base articles by keyword query, category, and maximum
    number of results.
  endpoint: /kb/search
  method: POST
  name: search_kb_articles
  service: kb
- description: Retrieve the full content of a specific knowledge base article by its
    ID.
  endpoint: /kb/articles/get
  method: POST
  name: get_kb_article
  service: kb
- description: Update the content of an existing knowledge base article by its ID.
  endpoint: /kb/articles/update
  method: POST
  name: update_kb_article
  service: kb
