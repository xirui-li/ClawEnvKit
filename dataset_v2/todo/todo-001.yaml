    id: task-001
    priority: high
    status: in_progress
    tags:
    - backend
    - blocker
    - security
    title: Migrate authentication service to OAuth2
  - description: The ETL worker process consumes unbounded memory after ~6 hours of
      runtime.
    due_date: '2024-12-08'
    id: task-002
    priority: high
    status: pending
    tags:
    - backend
    - blocker
    - performance
    title: Fix memory leak in data pipeline worker
  - description: Document new per-endpoint rate limits introduced in v2.3 release.
    due_date: '2024-12-20'
    id: task-003
    priority: low
    status: pending
