prompt: 'Our marketing team is launching a targeted outreach campaign for enterprise
  and premium-tier customers in the technology and financial services industries.
  Please identify all active premium and enterprise customers from those industries,
  then search our knowledge base for any relevant industry trend articles, and finally
  publish a newsletter to those customers summarizing the key insights. Also export
  a CRM report documenting which customers were included in the campaign.

  '
reference_solution: "1. Call list_customers with filters for status=active and tier=enterprise\
  \ to retrieve enterprise customers.\n2. Call list_customers again with filters for\
  \ status=active and tier=premium to retrieve premium customers.\n3. From the results,\
  \ filter for customers in the technology and financial services industries:\n  \
  \ - Apex Technologies Inc. (cust-001, enterprise, technology)\n   - BlueStar Financial\
  \ Group (cust-002, premium, financial_services)\n   - NovaSpark Software (cust-004,\
  \ premium, technology)\n   - Meridian Capital Partners (cust-005, enterprise, financial_services)\n\
  \   - ClearView Analytics (cust-007, enterprise, technology)\n   Exclude Redwood\
  \ Retail Group (inactive) and Greenfield Logistics (wrong industry/tier).\n4. Call\
  \ search_articles on the knowledge base with queries like \"technology industry\
  \ trends\" and\n   \"financial services digital transformation\" to find relevant\
  \ articles (kb-art-101, kb-art-102).\n5. Optionally call get_article to retrieve\
  \ full content of relevant KB articles.\n6. Call publish_newsletter with a professional\
  \ title, content synthesizing insights from the KB\n   articles tailored to tech\
  \ and financial services themes, and recipients set to the emails of the\n   five\
  \ identified customers.\n7. Call export_report with a descriptive title, the list\
  \ of five customer IDs, and a summary\n   describing the campaign targeting criteria\
  \ and purpose."
