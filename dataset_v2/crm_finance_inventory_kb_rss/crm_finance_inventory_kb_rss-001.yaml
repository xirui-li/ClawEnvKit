    service: kb
    type: audit_action_exists
  name: kb_articles_searched
  weight: 0.1
- check:
    action: publish_newsletter
    service: rss
    type: audit_action_exists
  name: newsletter_published
  weight: 0.1
- check:
    action: export_report
    service: crm
    type: audit_action_exists
  name: crm_report_exported
  weight: 0.1
- check:
    actions:
    - list_customers
    - export_report
    service: crm
    type: audit_sequence
  name: correct_workflow_sequence
  weight: 0.1
- check:
    rubric: "Evaluate the newsletter that was published via the publish_newsletter\
      \ tool on three dimensions:\n\n1. Audience Targeting (35%): Does the newsletter\
      \ content and recipients list correctly reflect\n   active enterprise and premium\
      \ customers from the technology and financial services industries?\n   The correct\
      \ recipients should include: Apex Technologies Inc., BlueStar Financial Group,\n\
      \   NovaSpark Software, Meridian Capital Partners, and ClearView Analytics.\n\
      \   Inactive customers (Redwood Retail Group) and out-of-scope industries (Greenfield\
      \ Logistics)\n   should NOT be included. Score 1.0 if all correct, 0.6 if 3-4\
      \ correct, 0.3 if 1-2 correct, 0.0 if none.\n\n2. Content Relevance (35%): Does\
      \ the newsletter content incorporate insights from the knowledge\n   base articles\
      \ about technology trends (AI, automation) and financial services digital\n\
      \   transformation? It should reference specific findings such as AI adoption\
      \ growth, digital\n   banking trends, or customer engagement best practices.\
      \ Score 1.0 if both industries addressed\n   with specific data points, 0.6\
      \ if one industry addressed, 0.3 if only generic content, 0.0 if unrelated.\n\
      \n3. Professionalism and Clarity (30%): Is the newsletter well-structured, professional\
      \ in tone,\n   and coherent? Does it have a clear title, logical flow, and actionable\
      \ closing? Score 1.0 if\n   polished and complete, 0.6 if adequate but missing\
      \ structure, 0.3 if rough or unclear, 0.0 if incoherent.\n\nCombine scores as\
      \ a weighted average per the percentages above. Return a score from 0.0 to 1.0.\n"
    type: llm_judge
  name: newsletter_content_quality
  weight: 0.25
- check:
    rubric: "Evaluate the CRM export report submitted via the export_report tool:\n\
      \n1. Customer Completeness (50%): Does the report include the correct customer\
      \ IDs?\n   Expected active enterprise/premium customers in technology and financial\
      \ services:\n   cust-001 (Apex Technologies), cust-002 (BlueStar Financial),\
      \ cust-004 (NovaSpark Software),\n   cust-005 (Meridian Capital Partners), cust-007\
      \ (ClearView Analytics).\n   Inactive or wrong-industry customers should be\
      \ excluded.\n   Score 1.0 if all 5 correct IDs included and no incorrect ones,\
      \ 0.7 if 4 correct, 0.4 if 2-3 correct,\n   0.1 if 1 correct, 0.0 if none or\
      \ wrong.\n\n2. Summary Quality (50%): Does the report summary clearly describe\
      \ the purpose of the campaign,\n   which customer segments were targeted, and\
      \ why? It should mention tiers (enterprise/premium),\n   industries (technology/financial\
      \ services), and the marketing campaign context.\n   Score 1.0 if all three\
      \ elements present, 0.6 if two present, 0.3 if one present, 0.0 if absent.\n\
      \nReturn a combined weighted score from 0.0 to 1.0.\n"
    type: llm_judge
  name: crm_report_quality
  weight: 0.15
task_id: crm_finance_inventory_kb_rss-001
task_name: Identify Premium Customers and Publish Industry Insights Newsletter
tools:
- description: List CRM customers with optional filters for status, tier, and industry
  endpoint: /crm/customers
  method: POST
  name: list_customers
  service: crm
- description: Get detailed information about a specific customer by customer_id
  endpoint: /crm/customers/get
  method: POST
  name: get_customer
  service: crm
- description: Export a CRM report with a title, list of customer IDs, and a summary
  endpoint: /crm/export
  method: POST
  name: export_report
  service: crm
- description: Search the knowledge base for articles by query, category, and max
    results
  endpoint: /kb/search
  method: POST
  name: search_articles
  service: kb
- description: Retrieve a specific knowledge base article by article_id
  endpoint: /kb/articles/get
  method: POST
  name: get_article
  service: kb
- description: Publish a newsletter with a title, content, and list of recipients
  endpoint: /rss/publish
  method: POST
  name: publish_newsletter
  service: rss
