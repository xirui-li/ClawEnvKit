tools:
- description: List all integrations, optionally filtered by status
  endpoint: /config/integrations
  method: POST
  name: list_integrations
  service: config
- description: Get full details of a specific integration including API key and secret
  endpoint: /config/integrations/get
  method: POST
  name: get_integration
  service: config
- description: Update integration status or notes
  endpoint: /config/integrations/update
  method: POST
  name: update_integration
  service: config
- description: Send an internal notification message
  endpoint: /config/notify
  method: POST
  name: send_notification
  service: config
- description: List helpdesk tickets filtered by status
  endpoint: /helpdesk/tickets
  method: POST
  name: list_tickets
  service: helpdesk
- description: Get full details of a specific helpdesk ticket
  endpoint: /helpdesk/tickets/get
  method: POST
  name: get_ticket
  service: helpdesk
- description: Update ticket priority, tags, or category
  endpoint: /helpdesk/tickets/update
  method: POST
  name: update_ticket
  service: helpdesk
- description: Close a helpdesk ticket with a resolution summary
  endpoint: /helpdesk/tickets/close
  method: POST
  name: close_ticket
  service: helpdesk
- description: Send an email via Gmail
  endpoint: /gmail/send
  method: POST
  name: send_email
  service: gmail
