difficulty: medium
fixtures:
  notes:
  - attendees:
    - tom.nguyen@company.com
    - lisa.kim@company.com
    - brett.walker@company.com
    - anita.russo@company.com
    content: 'Date: 2024-09-27

      Facilitator: Tom Nguyen (Chief of Staff)


      KEY OUTCOMES:

      - Engineering OKR completion rate: 74% (below 80% target). Root cause: two senior
      engineers on leave in August.

      - Marketing OKR: Lead generation exceeded target by 18%. Campaign ''Momentum
      Q3'' cited as primary driver.

      - Sales OKR: Revenue target $4.2M achieved vs $4.0M goal. Pipeline health rated
      GREEN.

      - People & Culture OKR: Employee NPS dropped from 42 to 37. Action item: pulse
      survey to launch Oct 7.


      DECISIONS MADE:

      - Engineering will carry over two OKRs into Q4 with adjusted timelines.

      - Marketing budget increased by 12% for Q4 to capitalize on Momentum campaign
      success.

      - HR to present retention strategy at next all-hands (Oct 15).


      NEXT STEPS:

      - All department heads to submit Q4 OKR drafts by Oct 4.

      - Finance to model budget reallocations by Oct 9.

      - Tom Nguyen to schedule 1:1 debrief with each department head.

      '
    date: '2024-09-27'
    id: note-001
    tags:
    - okr
    - q3
    - leadership
    - quarterly-review
    title: Q3 OKR Review — All Hands Leadership
  - attendees:
    - brett.walker@company.com
    - dev-team@company.com
    content: 'Sprint velocity dropped 15% due to unexpected infra migration work.

      Team morale rated 3.8/5. Two action items logged in Jira.

      '
    date: '2024-09-25'
    id: note-002
    tags:
    - engineering
    - sprint
    - retro
    title: Engineering Sprint 41 Retrospective
  - attendees:
    - lisa.kim@company.com
    - priya.shah@company.com
    content: 'Campaign exceeded MQL targets by 22%. Budget utilization at 94%.

      Recommended to extend core messaging into Q4 with updated creative assets.

      '
    date: '2024-09-24'
    id: note-003
    tags:
    - marketing
    - campaign
    - q3
    title: Marketing Campaign Debrief — Momentum Q3
  - attendees:
    - tom.nguyen@company.com
    - brett.walker@company.com
    content: 'Discussed blockers on platform reliability OKR. Agreed to escalate cloud
      vendor SLA issue.

      '
    date: '2024-09-20'
    id: note-004
    tags:
    - 1on1
    - engineering
    - okr
    title: 1:1 Tom Nguyen & Brett Walker — Engineering OKR Check-in
  - attendees:
    - anita.russo@company.com
