[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "clawenvkit"
version = "0.1.0"
description = "AI Agent Evaluation Framework — auto-generated tasks with reliable verification"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Xirui Li"}]

dependencies = [
    "pyyaml>=6.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.20.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
generate = [
    "anthropic>=0.40.0",
    "Pillow>=10.0.0",
    "tqdm>=4.66.0",
]
judge = ["anthropic>=0.40.0"]
services = [
    "httpx>=0.25.0",
    "pypdf>=5.0.0",
    "requests>=2.31.0",
    "trafilatura>=1.9.0",
]
dev = ["pytest>=8.0"]
docs = ["mkdocs-material>=9.0"]
all = [
    "anthropic>=0.40.0",
    "Pillow>=10.0.0",
    "tqdm>=4.66.0",
    "httpx>=0.25.0",
    "pypdf>=5.0.0",
    "requests>=2.31.0",
    "trafilatura>=1.9.0",
    "pytest>=8.0",
    "mkdocs-material>=9.0",
]

[project.scripts]
clawenvkit = "clawenvkit.cli:main"
clawharness = "clawenvkit.cli:main"

[tool.setuptools.packages.find]
include = ["clawenvkit*", "clawharness*"]

# NOTE: mock_services/ and prompts/ are at repo root, NOT inside clawenvkit/.
# Only editable install (pip install -e .) works — paths.py resolves from repo root.
# Standalone wheel/PyPI install is NOT supported.
